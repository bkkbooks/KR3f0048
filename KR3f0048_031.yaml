body:
  text: 欽定四庫全書御製數理精藴下編卷二十六體部四曲線體曲線體設如長圎體徑與髙皆七尺問積㡬何法以長圎體徑七尺用求圎面積法求得圎面積三十八尺四十八寸四十五分零九釐九十六豪二十五絲有餘以髙七尺乗之得二百六十九尺三百九十一寸五百六十九分七百三十七釐有餘即長圎體之積也如圗甲乙丙丁長圎體先以乙丙底徑求得乙己丙戊圎面積而以庚辛髙乗之即得甲乙丙丁長圎體之積也又法以長圎體徑七尺用徑求周法求得圎周二十一尺九寸九分一釐一豪四絲八忽五微五纖有餘與髙七尺相乗得一百五十三尺九十三寸八十分三十九釐八十五豪有餘為長圎體之外面積以半徑三尺五寸乗之得五百三十八尺七百八十三寸一百三十九分四百七十五釐有餘折半得二百六十九尺三百九十一寸五百六十九分七百三十七釐有餘即長圎體之積也如圗甲乙丙丁長圎體先求得乙己丙戊圎周與甲乙髙相乗得甲乙丙丁外面積為底以庚甲半徑乗之得庚甲丙辛長方體為甲乙丙丁長圎體積之二倍葢因長圎體之外面積與長方體之底面積等而長圎體之半徑又與長方體之髙度等則長圎體為長方體之一半見㡬何原本五卷第二十四節故折半即得甲乙丙丁長圎體之積也又法用長方體長圎體之定率比例以長方體積一為一率長圎體積七八五三九八一六三為二率今所設之長圎體徑七尺自乗以髙七尺再乗得三百四十三尺為三率求得四率二百六十九尺三百九十一寸五百六十九分九百零九釐有餘即長圎體之積也此法葢以長方體與長圎體為比例定率之一為長方體積而七八五三九八一六三為長方體同髙同徑之長圎體積故以徑自乗髙再乗得長方體積彼定率之長方體與長圎體之比即同於今所得之長方體積與所求之長圎體積之比也設如尖圎體底徑六尺中髙六尺問積㡬何法以底徑六尺用求圎面積法求得底面積二十八尺二十七寸四十三分三十三釐八十五豪有餘以髙六尺乗之得一百六十九尺六百四十六寸三分一百釐有餘三歸之得五十六尺五百四十八寸六百六十七分七百釐有餘即尖圎體之積也如圗甲乙丙丁戊尖圎體先以乙丁底徑求得乙丙丁戊底面積以甲己髙乗之得庚乙丁辛長圎體為甲乙丙丁戊尖圎體之三倍葢因上下面平行各體與平底尖體同底同髙者其平底尖體皆得上下面平行體之三分之一見㡬何原本五卷第二十三節故以所得庚乙丁辛長圎體積三歸之即得甲乙丙丁戊尖圎體積也又法用尖方體尖圎體之定率比例以尖方體積一為一率尖圎體積七八五三九八一六三為二率今所設之尖圎體底徑六尺自乗以髙六尺再乗得二百一十六尺三歸之得七十二尺成尖方體積為三率求得四率五十六尺五百四十八寸六百六十七分七百三十六釐有餘即尖圎體之積也蓋尖方體為長方體之三分之一而尖圎體為長圎體之三分之一故尖方體與尖圎體之比即同於長方體與長圎體之比也又捷法定率比例以長方體積一為一率尖圎體積二六一七九九三八八為二率今所設之尖圎體底徑六尺自乗以髙六尺再乗得二百一十六尺為三率求得四率五十六尺五百四十八寸六百六十七分八百零八釐有餘即尖圎體之積也此法葢以長方體與尖圎體為比例長方體積為一則長圎體積為七八五三九八一六三將此長圎體積三歸之則得尖圎體積為二六一七九九三八八故定率之長方體與尖圎體之比即同於今底徑自乗髙再乗所得之長方體積與所求之尖圎體積之比也設如尖圎體底周二十二尺自尖至底周之斜線五尺求中垂線之髙幾何法以底周二十二尺用周求徑法求得底徑七尺零二釐八豪一絲七忽有餘折半得半徑三尺五寸零一釐四豪零八忽有餘為勾以自尖至底周之斜線五尺為弦求得股三尺五寸六分九釐三豪三絲三忽有餘即中垂線之髙也如圗甲乙丙丁戊尖圎體以乙丙丁戊底周求得乙丁底徑折半得乙巳半徑為勾以自尖至底周之甲乙斜線為弦求得甲巳股即中垂線之髙也設如圎球徑二尺問外面積幾何法以圎球徑二尺用徑求周法求得周六尺二寸八分三釐一豪八絲五忽有餘與徑二尺相乗得一十二尺五十六寸六十三分七十釐有餘即圎球之外面積也如圗甲乙丙丁圎球體以甲丙全徑與甲乙丙丁全周相乗即得圎球體之外面積葢因圎面半徑與球體半徑等者其圎面積為球體外面積之四分之一而圎面半徑與球體全徑等者其圎面積與球體外面積等見幾何原本十巻第八節故圎球全徑與全周相乗而得圎球之外面積也設如圎球徑一尺二寸問積幾何法以圎球徑一尺二寸用徑求圎面積法求得圎面積一尺一十三寸零九分七十三釐三十五豪四十絲有餘以圎球徑一尺二寸乗之得一尺三百五十七寸一百六十八分零二十四釐有餘為長圎體積三歸之得四百五十二寸三百八十九分三百四十一釐有餘倍之得九百零四寸七百七十八分六百八十二釐有餘即圎球之體積也如圗甲乙丙丁圎球體求得戊己庚辛平圎面積以甲丙全徑乗之得與圎球同徑同髙之壬戊庚癸長圎體此球體之乙丁全徑與長圎體之戊庚底徑度等而球體之甲丙全徑又與長圎體之壬戊髙度等則球體積為長圎體積之三分之二見㡬何原本十卷第九節試以圎球同徑之平圎面積為底圎球之半徑為髙作一甲乙丁尖圎體則其積為甲乙丁半球體積之半夫尖圎體與長圎體同底同髙其比例為三分之一而尖圎體又為半球體之二分之一則半球體必為半長圎體之三分之二半球體既為半長圎體之三分之二則全球體必為全長圎體之三分之二可知故以所得壬戊庚癸長圎體積三歸倍之即得甲乙丙丁圎球體積也又法以圎球徑一尺二寸用求圎球之外面積法求得圎球之外面積四尺五十二寸三十八分九十三釐四十一豪六十絲有餘以半徑六寸乗之得二尺七百一十四寸三百三十六分四十九釐有餘三歸之得九百零四寸七百七十八分六百八十三釐有餘即圎球之體積也如圗甲乙丙丁圎球體先求得外面積乃以此外面積為底戊丙半徑為髙作一戊己庚尖圎體其體積必與圎球體積等葢尖圎體之底面積與球體之外面積等尖圎體之髙度與球體之半徑等則其體積亦必等見㡬何原本五卷第二十五節故以戊丙半徑與外面積相乗三歸之即如得戊己庚尖圗體積而為甲乙丙丁圎球體積也又法以方邉球徑相等方積球積不同之定率比例以方積一為一率球積五二三五九八七七五為二率今所設之圎球徑一尺二寸自乗再乗得一尺七百二十八寸為三率求得四率九百零四寸七百七十八分六百八十三釐有餘即圎球之體積也此法葢因圎球徑與正方邉相等而圎球積與正方積不同故以圎球徑自乗再乗作正方積為體與體之比例如子丑圎球徑為一則其自乗再乗之寅邜辰巳正方體積為一而圎球徑一所得之子午丑未圎球體積為五二三五九八七七五故以子丑圎球徑一自乗再乗之寅夘辰巳正方體積一與子丑圎球徑所得之子午丑未圎球體積五二三五九八七七五之比即同於今所設之甲丙圎球徑一尺二寸自乗再乗之戊己庚辛正方體積一尺七百二十八寸與今所得之甲乙丙丁圎球體積九百零四寸七百七十八分六百八十三釐有餘之比也又法用球積方積相等球徑方邉不同之定率比例以圎球徑一為一率正方邉八五九九五九七為二率今所設之圎球徑一尺二寸為三率求得四率九寸六分七釐一豪九絲五忽一微六纖有餘為與圎球積相等之正方體每邉之數自乗再乗得九百零四寸七百七十八分六百四十九釐有餘即圎球之體積也此法葢以圎球積與正方積設為相等使圎球徑與正方邉不同先定為線與線之比例既得線而後自乗再乗之為體也如子丑圎球徑一其所得之體積開立方則得八五九九五九七即為寅邜辰巳正方體之每一邉是子午丑未圎球積與寅邜辰巳正方積相等故子丑圎球徑一與寅邜正方邉八五九九五九七之比即同於今所設之甲丙圎球徑一尺二寸與今所得之戊巳正方邉九寸六分七釐一豪九絲五忽一微六纖有餘之比既得戊己正方邉自乗再乗得戊己庚辛正方體積即與甲乙丙丁圎球體積為相等也又法以二十一分為一率十一分為二率今所設之圎球徑一尺二寸自乗再乗得一尺七百二十八寸為三率求得四率九百零五寸一百四十二分八百五十七釐有餘為圎球之體積也葢以正方體積一圎球體積五二三五九八七七五之定率約之則正方體積二十一而圎球體積得一九九有餘進而為十一則圎球體積稍大故今所得之圎球體積亦稍大也設如圎球積六尺問徑㡬何法用球徑方邉相等球積方積不同之定率比例以球積一為一率方積一九九八五九三一七為二率今所設之圎球積六尺為三率求得四率十一尺四百五十九寸一百五十五分九百零二釐有餘為與圎球徑相等之正方邉之正方體積開立方得二尺二寸五分四釐五豪零二忽有餘即圎球之徑也葢圎球積為五二三五九八七七五則正方積為一若圎球積為一則正方積為一九九八五九三一七其比例仍同故以圎球積一為一率者即如以圎球積五二三五九八七七五為一率而以正方積一九九八五九三一七為二率者即如以正方積一為二率也又法用球積方積相等球徑方邉不同之定率比例以方邉一為一率球徑一二四七九八為二率今所設之圎球積六尺開立方得一尺八寸一分七釐一豪二絲有餘為三率求得四率二尺二寸五分四釐五豪零二忽有餘即圎球之徑也此法亦以圎球積與正方積設為相等使圎球徑與正方邉不同故以圎球積開立方得立方邉為線與線之比例葢方邉為八五九九五九七則球徑為一若方邉為一則球徑為一二四七九八其比例仍同故以方邉一為一率者即如以方邉八五九九五九七為一率而以球徑一二四七九八為二率者即如以球徑一為二率也設如撱圎體大徑六寸小徑四寸問積幾何法以小徑四寸用徑求圎面積法求得圎面積一十二寸五十六分六十三釐七十豪六十絲有餘以大徑六寸乗之得七十五寸三百九十八分二百二十三釐有餘為長圎體積三歸之得二十五寸一百三十二分七百四十一釐有餘倍之得五十寸二百六十五分四百八十二釐有餘即撱圎體之積也如圗甲乙丙丁撱圎體以乙丁小徑求得戊己庚辛平圎面積再以甲丙大徑乗之得壬戊庚癸長圎體此撱圎體積即為長圎體積之三分之二亦如圎球體積為同徑同髙之長圎體積之三分之二故以所得壬戊庚癸長圎體積三歸倍之即得甲乙丙丁撱圎體積也又法以小徑四寸自乗得十六寸以大徑六寸再乗得九十六寸為長方體積乃用方積球積不同方邉球徑相等之定率比例以方積一為一率球積五二三五九八七七五為二率今所得之長方體積九十六寸為三率求得四率五十寸二百六十五分四百八十二釐有餘即撱圎體之積也葢函撱圎之長方體與所函撱圎體之比同於函球之正方體與所函球體之比見幾何原本十卷第十四節如甲乙丙丁撱圎體甲丙大徑六寸乙丁小徑四寸以乙丁小徑自乗又以甲丙大徑再乗遂成戊己庚辛長方體形此長方體積與撱圎體積之比即同於正方體積與圎球體積之比故以定率之正方體積為一率圎球體積為二率今所得之長方體積為三率求得四率為撱圎體之積也設如撱圎體積五十寸大徑比小徑多二寸問大小徑各㡬何法用方積球積不同方邉球徑相等之定率比例以球積一為一率方積一九九八五九三一七為二率今所設之撱圎體積五十寸為三率求得四率九十五寸四百九十二分九百六十五釐八百五十豪有餘為長方體積乃以大徑比小徑多二寸為長與濶之較用帶一縦開立方法算之得濶三寸九分九釐二豪有餘即撱圎體之小徑加大徑比小徑多二寸得五寸九分九釐二豪有餘即撱圎體之大徑也如圗甲乙丙丁撱圎體用球積與方積之定率比例即成戊己庚辛長方體形其戊己長即甲丙大徑壬庚濶即乙丁小徑甲丙大徑比乙丁小徑多二寸即長濶之較故用帶一縦開立方法算之得濶為撱圎體之小徑得長為撱圎體之大徑也設如上下不等圎面體上徑四尺下徑六尺髙八尺問積㡬何法以上徑四尺用徑求圎面積法求得上圎面積一十二尺五十六寸六十三分七十釐六十豪有餘又以下徑六尺用徑求圎面積法求得下圎面積二十八尺二十七寸四十三分三十三釐八十五豪有餘又以上徑四尺與下徑六尺相乗得二十四尺開方得中徑四尺八寸九分八釐九豪七絲九忽四微八纖有餘用徑求圎面積法求得中圎面積一十八尺八十四寸九十五分五十五釐八十五豪有餘三數相併得五十九尺六十九寸二分六十釐三十豪有餘與髙八尺相乗得四百七十七尺五百二十二寸八十二分四百釐有餘三歸之得一百五十九尺一百七十四寸二十七分四百六十六釐有餘即上下不等圎面體之積也葢上下不等圎面體立法與上下不等正方體同理但上下不等正方體上下俱係方面故求得上中下三方面積相併與髙相乗三歸之而得體積此上下俱係圎面故求得上中下三圎面積相併與髙相乗三歸之而得體積也又法以上徑四尺與下徑六尺相減餘二尺折半得一尺為一率髙八尺為二率下徑六尺折半得三尺為三率求得四率二十四尺為上下不等圎面體上補成一尖圎體之共髙乃以下徑六尺用徑求圎面積法求得圎面積二十八尺二十七寸四十三分三十三釐八十五豪有餘與所得共髙二十四尺相乗得六百七十八尺五百八十四寸一十二分四百釐有餘三歸之得二百二十六尺一百九十四寸六百七十分八百釐有餘為大尖圎體之積又以髙八尺與共髙二十四尺相減餘十六尺為上尖圎體之髙以上徑四尺用徑求圎面積法求得圎面積一十二尺五十六寸六十三分七十釐六十豪有餘與上髙十六尺相乗得二百零一尺六十一寸九百二十九分六百釐有餘三歸之得六十七尺二十寸六百四十三分二百釐有餘為上小尖圎體之積與大尖圎體積二百二十六尺一百九十四寸六百七十分八百釐有餘相減餘一百五十九尺一百七十四寸二十七分六百釐有餘即上下不等圎面體之積也如圗甲乙丙丁上下不等圎面體如戊甲丁小尖圎體遂成戊乙丙大尖圎體故於戊乙丙大尖圎體積内減去戊甲丁小尖圎體積而得甲乙丙丁上下不等圎面體之積也又法用上下不等正方體與上下不等圎面體之定率比例以正方體積一為一率圎面體積七八五三九八一六三為二率上徑四尺自乗下徑六尺自乗上徑四尺與下徑六尺相乗三數相併以髙八尺乗之得六百零八尺三歸之得二百零二尺六百六十六寸六百六十六分六百六十六釐有餘成上下不等正方體積為三率求得四率一百五十九尺一百七十四寸二十七分七百零一釐有餘即上下不等圎面體之積也又捷法定率比例以一為一率二六一七九九三八八為二率上徑四尺相乗下徑六尺自乗上徑四尺與下徑六尺相乗三數相併以髙八尺乗之得六百零八尺為三率求得四率一百五十九尺一百七十四寸二十七分九百釐有餘即上下不等圎面體之積也此法葢以三上下不等正方體與一上下不等圎面體為比例夫一上下不等正方體積為一則一上下不等圎面體積為七八五三九八一六三若三上下不等正方體積為一則一上下不等圎面體積為二六一七九九三八八故以上徑自乗下徑自乗上下徑相乗三數相併以髙乗之所得為三上下不等正方體積彼定率之三上下不等正方體與一上下不等圎面體之比即同於今所得之三上下不等正方體積與所求之一上下不等圎面體積之比也設如上下不等撱圎面體上大徑四尺小徑三尺下大徑八尺小徑六尺髙十尺問積幾何法以上大徑四尺與上小徑三尺相乗得一十二尺以下大徑八尺與下小徑六尺相乗得四十八尺又以上大徑四尺與下小徑六尺相乗下大徑八尺與上小徑三尺相乗共得四十八尺折半得二十四尺三數相併得八十四尺乃用方積圎積之定率比例以方積一為一率圎積七八五三九八一六三為二率三數相併之八十四尺為三率求得四率六十五尺九十七寸三十四分四十五釐六十九豪有餘與髙十尺相乗得六百五十九尺七百三十四寸四百五十六分九百釐有餘三歸之得二百一十九尺九百一十一寸四百八十五分六百三十三釐有餘即上下不等撱圎面體之積也葢上下不等撱圎面體立法與上下不等圎面體同但上下不等圎面體上下俱係圎面故求得上中下三圎面積相併與髙相乗三歸之而得體積此上下俱係撱圎面故必求得上中下三長方面積相併用定率比例得三撱圎面積乃與髙相乗三歸之而得體積也又法以上大徑四尺與下大徑八尺相減餘四尺折半得二尺為一率髙十尺為二率下大徑八尺折半得四尺為三率求得四率二十尺為上下不等撱圎面體上補成一尖撱圎體之共髙乃以下大徑八尺小徑六尺用求撱圎面積法求得下撱圎面積三十七尺六十九寸九十一分一十一釐六十八豪有餘與所得共髙二十尺相乗得七百五十三尺九百八十二寸二百三十三分六百釐有餘三歸之得二百五十一尺三百二十七寸四百一十一分三百釐有餘為大尖撱圎面體之積又以髙十尺與共髙二十尺相減餘十尺為上小尖撱圎面體之髙以上大徑四尺小徑三尺用求撱圎面積法求得上撱圎面積九尺四十二寸四十七分七十七釐九十二豪有餘與上髙十尺相乗得九十四尺二百四十七寸七百七十九分二百釐有餘三歸之得三十一尺四百一十五寸九百二十六分四百釐有餘為上小尖撱圎面體積與大尖撱圎面體積二百五十一尺三百二十七寸四百一十一分三百釐有餘相減餘二百一十九尺九百一十一寸四百八十四分八百釐有餘即上下不等撱圎面體積也如圗甲乙丙丁上下不等撱圎面體如戊甲丁小尖撱圎面積遂成戊乙丙大尖撱圎面體故於戊乙丙大尖撱圎面體内減戊甲丁小尖撱圎面體而得甲乙丙丁上下不等撱圎面體之積也又法用上下不等長方體與上下不等撱圎面體之定率比例以長方體積一為一率長圎體積七八五三九八一六三為二率以上大徑四尺倍之加下大徑八尺共一十六尺與上小徑三尺相乗得四十八尺以下大徑八尺倍之加上大徑四尺共二十尺與下小徑六尺相乗得一百二十尺兩數相併得一百六十八尺以髙十尺乗之得一千六百八十尺六歸之得二百八十尺成上下不等長方體積為三率求得四率二百一十九尺九百一十一寸四百八十五分六百四十釐有餘即上下不等撱圎面體之積也葢長方面積與撱圎面積之比同於方面積與圎面積之比故上下不等長方體與上下不等撱圎面體之比即同於長方體與長圎體之比也又捷法定率比例以一為一率一三八九九六九四為二率以上大徑四尺倍之加下大徑八尺共一十六尺與上小徑三尺相乗得四十八尺以下大徑八尺倍之加上大徑四尺共二十尺與下小徑六尺相乗得一百二十尺兩數相併得一百六十八尺以髙十尺乗之得一千六百八十尺為三率求得四率二百一十九尺九百一十一寸四百八十五分九百二十釐有餘即上下不等撱圎面體之積也此法葢以六上下不等長方體與一上下不等撱圎面體為比例夫一上下不等長方體積為一則一上下不等撱圎面體積為七八五三九八一六三若六上下不等長方體積為一則一上下不等撱圎面體積為一三八九九六九四故以上大徑倍之加下大徑與上小徑相乗以下大徑倍之加上大徑與下小徑相乗兩數相併以髙乗之所得為六上下不等長方體積彼定率之六上下不等長方體積與一上下不等撱圎面體積之比即同於今所得之六上下不等長方體積與所求之一上下不等撱圎面體積之比也設如截球體一段髙二寸底徑九寸六分問積㡬何法以髙二寸為首率底徑九寸六分折半得四寸八分為中率求得末率一尺一寸五分二釐為圎球之截徑加髙二寸得一尺三寸五分二釐為圎球之全徑折半得六寸七分六釐為圎球之半徑又以髙二寸為勾底徑九寸六分折半得四寸八分為股求得弦五寸二分作平圎半徑用求圓面積法求得平圎面積八十四寸九十四分八十六釐有餘即為截球體一段之外面積與圎球半徑六寸七分六釐相乗得五百七十四寸二百五十二分五百三十六釐有餘三歸之得一百九十一寸四百一十七分五百一十二釐有餘為自圎球中心所分球面尖圎體積又以截球體底徑九寸六分用求平圎面積法求得截球體之底面積七十二寸三十八分二十二釐有餘於圎球半徑六寸七分六釐内減去截球體之髙二寸餘四寸七分六釐與截球體之底面積七十二寸三十八分二十二釐有餘相乘得三百四十四寸五百三十九分二百七十二釐有餘三歸之得一百一十四寸八百四十六分四百二十四釐有餘為自圎球中心至截球體底徑所分平面尖圎體積與球面尖圎體積一百九十一寸四百一十七分五百一十二釐有餘相減餘七十六寸五百七十一分八十八釐有餘即截球體一段之積也如圗甲乙丙截球體一段其乙丙底徑即如弧矢形之弦長其甲丁髙即如弧矢形之矢濶故甲丁為首率乙丙底徑折半得乙丁為中率求得丁戊末率為截球徑見各面形弦矢求圎徑法與甲丁髙相加得甲戊為圎球全徑折半得甲巳為圎球半徑又以甲丁為勾乙丁為股求得甲乙弦乃以甲乙弦為半徑求得庚乙丙平圎面積即與甲乙丙截球體一段之外面積等葢圎面半徑與球體半徑等者其圎面積為球體外面積之四分之一而圎面半徑與球體全徑等者其圎面積與球體外面積等見㡬何原本十卷第八節故甲辛戊壬圎球體其外面積為同徑子丑寅邜平圎面積之四倍若甲辛壬半球體其外面積必為子丑寅邜平圎面積之二倍然則甲己半徑求得平圎面積又辛己半徑亦求得平圎面積兩面積相併必與甲辛壬半球體之外面積等矣今甲乙丙截球體一段若以甲丁為半徑求得平圎面積又以乙丁為半徑求得平圎面積兩面積相併亦必與甲乙丙截球體一段之外面積等而甲乙弦自乗之正方與甲丁勾自乗之正方乙丁股自乗之正方相併之積等則甲乙弦為半徑所得之圎面積亦必與甲丁勾為半徑所得之圎面積乙丁股為半徑所得之圎面積相併之積等故以甲乙弦為半徑所得之庚乙丙平圎面積即與甲乙丙截球體一段之外面積相等也既得截球體一段之外面積與甲巳圎球半徑相乗三歸之得己丙甲乙球面尖圎體積又以乙丙截球體底徑求得乙丙底面積與丁巳截半徑相乗三歸之得己丙丁乙平面尖圎體積與己丙甲乙球面尖圎體積相減所餘即甲乙丙截球體一段之積也又法先求得圎球徑一尺三寸五分二釐用徑求周法求得圎周四尺二寸四分七釐四豪三絲三忽有餘與截球體一段之髙二寸相乗得八十四寸九十四分八十六釐有餘即為截球一段之外面積與圎球半徑六寸七分六釐相乗得五百七十四寸二百五十二分五百三十六釐三歸之得一百九十一寸四百一十七分五百一十二釐有餘為自圎球中心所分球面尖圎體積又以截球體底徑九寸六分用求平圎面積法求得截球體之底面積七十二寸三十八分二十二釐有餘於圎球半徑六寸七分六釐内減去截球體之髙二寸餘四寸七分六釐與截球體之底面積七十二寸三十八分二十二釐有餘相乗得三百四十四寸五百三十九分二百七十二釐有餘三歸之得一百一十四寸八百四十六分四百二十四釐有餘為自圎球中心至截球徑所分平面尖圎體積與球面尖圎體積一百九十一寸四百一十七分五百一十二釐有餘相減餘七十六寸五百七十一分八十八釐有餘即截球體一段之積也如圗甲乙丙截球體一段先求得甲戊全徑與庚辛等又求得壬庚癸辛全周與甲丁髙相乗得庚子丑辛截長圎體一段之外面積與甲乙丙截球體一段之外面積等葢球體全徑與長圎體底徑髙度相等者其相當每段之外面積皆相等見㡬何原本十卷第十一節既得甲乙丙截球體一段之外面積則與甲巳半徑相乗三歸之而得己丙甲乙球面尖圎體積又以乙丙截球體底面積與丁己截半徑相乗三歸之而得己丙丁乙平面尖圎體積與己丙甲乙球面尖圎體積相減餘即得甲乙丙截球體一段之積也設如空心圎球積二千寸厚三寸問内外徑數各㡬何法用球徑方邉相等球積方積不同之定率比例以球積一為一率方積一九九八五九三一七為二率今所設之空心圎球積二千寸為三率求得四率三尺八百一十九寸七百一十八分六百三十四釐有餘為空心正方體積乃用算空心正方體法以厚三寸自乗再乗得二十七寸八因之得二百一十六寸與所得空心正方體積三尺八百一十九寸七百一十八分六百三十四釐相減餘三尺六百零三寸七百一十八分六百三十四釐有餘六歸之得六百寸六百一十九分七百七十二釐有餘用厚三寸除之得三尺零二十分六十五釐九十豪為内徑與外徑相乗長方面積乃以厚三寸倍之得六寸為長濶之較用帶縦較數開平方法算之得濶一尺一寸四分六釐三豪九絲七忽有餘即空心圎球内徑得長一尺七寸四分六釐三豪九絲七忽有餘即空心圎球外徑也此法蓋以空心圎球體與空心正方體為比例即如用球積與方積定率為比例也如圗甲乙丙丁戊己庚辛空心圎球體其甲丙外徑與壬癸外方邉等其戊庚内徑與寅邜内方邉等是以甲乙丙丁大球體與壬癸子丑大正方體為比戊己庚辛小球體與寅邜辰已小正方體為比而空心圎球體與空心正方體之比即如球體積與方體積之比也既得空心正方體積則用算空心正方體法以壬酉厚自乗再乗八因之得午巳未申類八小隅體與空心正方體相減則餘空心正方體之六面酉戌坎未類六長方扁體六歸之得酉戌坎未一長方扁體用厚三寸除之得酉戌亥乾一長方面積其酉戌濶與戊庚等即内徑其酉乾長與壬丑等即外徑其酉寅巳乾皆與壬酉厚度等酉寅巳乾併之即長濶之較故以厚三寸倍之為帶縦求得濶為内徑長為外徑也又法用定率比例求得空心正方體積以厚三寸倍之得六寸為内方邉與外方邉之較自乗再乗得二百一十六寸與所得空心正方體積三尺八百一十九寸七百一十八分六百三十四釐有餘相減餘三尺六百零三寸七百一十八分六百三十四釐有餘三歸之得一尺二百零一寸二百三十九分五百四十四釐有餘以内外方邉之較六寸除之得二尺零二十分六十五釐九十豪有餘為長方面積以内外方邉之較六寸為長濶之較用帶縦較數開平方法算之得闊一尺一寸四分六釐三豪九絲七忽有餘即空心圎球内徑得長一尺七寸四分六釐三豪九絲七忽有餘即空心圎球外徑也如圗甲乙丙丁戊己庚辛空心圎球體用定率比例而得壬癸子丑寅邜辰巳空心正方體将寅邜辰巳空心小正方形移置癸角之一隅則空心正方體變為壬寅己辰子申未午罄折體形其壬寅即罄折體之厚為甲丙外徑與戊庚内徑之較依開立方法分之得酉戌亥三方亷體乾坎艮三長亷體震一小隅體以壬寅厚度自乗再乗得震一小隅體與空心正方體積相減餘三方亷體三長亷體三歸之則餘酉一方亷體乾一長亷體共成巽壬癸辰坤離一扁方體其巽壬厚與壬寅等以巽壬厚除巽壬癸辰坤離扁方體則得壬癸辰坤長方面壬寅即長濶之較故用帶縦較數開平方法算之得邜辰濶與寅癸等即空心圎球之内徑以壬寅與寅癸相加得壬癸與甲丙等即空心圎球之外徑也設如圎窖一座周二十四尺髙十尺問盛米㡬何法以周二十四尺用圎周求面積法求得圎面積四十五尺八十三寸六十六分二十二釐有餘與髙一丈相乗得四百五十八尺三百六十六寸二百二十分有餘為圎窖之積數乃以米一石積數定率二千五百寸為一率一石為二率圎窖體積四百五十八尺三百六十六寸二百二十分有餘為三率求得四率一百八十三石三斗四升六合四勺有餘即所盛之米數也此法與求長圎體積之法同如甲乙丙丁長圎窖以甲戊丁巳圎周求得平圎面積用甲乙髙乗之即得甲乙丙丁長圎體積既得體積則以一石積數二千五百寸與一石之比同於今所得之體積與今所求之米數之比也設如圎窖一座盛米一百六十石髙十尺問周徑各㡬何法以米一石為一率一石積數定率二千五百寸為二率盛米一百六十石為三率求得四率四百尺為圎窖之積數以髙十尺除之得四十尺為圎窖之面積乃用圎積方積之定率比例以圎積一為一率方積一二七三二三九五四為二率今所得之圎窖面積四十尺為三率求得四率五十尺九十二寸九十五分八十一釐六十豪有餘開平方得七尺一寸三分六釐四豪九絲有餘即圎窖之徑數再用徑求周法求得周二十二尺四寸一分九釐九豪四絲有餘即圎窖之周數也設如積米一堆髙五尺底周十四尺問米數幾何法以底周十四尺用圎周求面積法求得圎面積一十五尺五十九寸七十一分八十四釐一十二豪有餘為尖圎堆之底面積與髙五尺相乗得七十七尺九百八十五寸九百二十分六百釐有餘三歸之得二十五尺九百九十五寸三百零六分八百二十釐有餘為尖圎堆之積數乃以米一石積數定率二千五百寸為一率一石為二率今所得之尖圎堆之積數二十五尺九百九十五寸三百零六分八百二十釐有餘為三率求得四率一十石零三升九合八勺一抄有餘即所堆之米數也此法與尖圎體求積之法同既得尖圎堆之積而以一石之積數定率為比例即得米數也設如倚壁積米一堆髙四尺底周六尺問米數㡬何法以底周六尺為半周倍之得一十二尺為全周用圎周求面積法求得圎面積一十一尺四十五寸九十一分五十五釐有餘折半得五尺七十二寸九十五分七十七釐有餘為倚壁尖圎堆之底面積以髙四尺乗之得二十二尺九百一十八寸三百零八分有餘三歸之得七尺六百三十九寸四百三十六分有餘為倚壁尖圎堆之積數乃以米一石積數定率二千五百寸為一率一石為二率今所得之倚壁尖圎堆之積數七尺六百三十九寸四百三十六分有餘為三率求得四率三石零五升五合七勺七抄有餘即倚壁所堆之米數也葢倚壁尖圎堆即尖圎體之一半故求得平圎面積折半與髙數相乗又以三歸之得倚壁尖圎堆之積數而以一石積數為比例即得米數也設如倚壁内角積米一堆髙五尺周一十二尺問米數㡬何法以周一十二尺四因之得四十八尺為全周用圎周求面積法求得圎面積一百八十三尺三十四寸六十四分九十釐有餘四歸之得四十五尺八十三寸六十六分二十二釐有餘為倚壁内角尖圎堆之底面積與髙五尺相乗得二百二十九尺一百八十三寸一百一十分三歸之得七十六尺三百九十四寸三百七十分為倚壁内角尖圎堆之積數乃以米一石積數定率二千五百寸為一率一石為二率今所得之倚壁内角尖圎堆之積數七十六尺三百九十四寸三百七十分為三率求得四率三十石零五斗五升七合七勺有餘即倚壁内角所堆之米數也蓋倚壁内角尖圎堆即尖圎體之四分之一故求得平圎面積四歸之與髙數相乗又以三歸之得倚壁内角尖圎堆之積數而以一石積數為比例即得米數也設如倚壁外角積米一堆髙六尺底周三十三尺問米數㡬何法以周三十三尺三歸四因得四十四尺為全周用圎周求面積法求得圎面積一百五十四尺六寸一十九分八十一釐九十二豪有餘四歸三因得一百一十五尺五十四寸六十四分八十八釐四十四豪有餘為倚壁外角尖圎堆之底面積以髙六尺乗之得六百九十三尺二百七十八寸九百一十八分六百四十釐有餘三歸之得二百三十一尺九十二寸九百七十二分八百八十釐有餘即倚壁外角尖圎堆之積數乃以米一石積數定率二千五百寸為一率一石為二率今所得之倚壁外角尖圎堆之積數二百三十一尺九十二寸九百七十二分八百八十釐有餘為三率求得四率九十二石四斗三升七合一勺八抄有餘即倚壁外角所堆之米數也蓋倚壁外角尖圎堆即尖圎體四分之三故求得平圎面積四歸三因與髙數相乗又以三歸之得倚壁外角尖圎堆之積數而以一石積數為比例即得米數也御製數理精蘊下編卷二十六
