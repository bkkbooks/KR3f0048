body:
  text: 欽定四庫全書御製數理精蘊下編卷六線部四和數比例較數比例和數比例比例之中有合率而復有和數者將幾比例之率合為一比例故謂之合率至於有總數又有分數以分數合而與總數相比則謂之和數其在九章總名差分而其實總不越比例之理故今質名之曰和數比例其立法有以實數與實數比者如合衆人數與總物數之比即若每人數與每物數之比是也有以所立衰數與實數比者如合衆衰數與總物數之比即若每人衰數與每物數之比是也又或以加倍數成率者其得數亦為加倍之數或以兩數相乗而成率者其得數亦為兩數相乗之數要之皆以比例而得故於各條詳加解説以明其故焉設如南北二商合本貿易南出本銀一百五十兩北出本銀二百五十兩共得利銀一千兩按各人所出本銀之分分之問二人各得利銀幾何法以南出本銀一百五十兩與北出本銀二百五十兩相併得四百兩為一率利銀一千兩為二率南出本銀一百五十兩為三率推得四率三百七十五兩即南所分利銀數於共利一千兩内減三百七十五兩餘六百二十五兩即北所分利銀數也如以二人本銀共四百兩為一率二人共利一千兩為二率北出本銀二百五十兩為三率推得四率六百二十五兩即北所分利銀數也此法蓋以二人共本比共利即如每人各本比各利而為相當比例四率也又捷法以二人共出本銀四百兩歸除二人共得利銀一千兩得每一兩之利為二兩五錢乃與各人本銀數相乗即得各人所分利銀數此又以每一兩之利與各人所出本銀之利相比而得也設如趙周馮三人合夥生理趙出本銀一千兩周出本銀八百兩馮出本銀六百兩共得利銀一千二百兩按各人所出本銀之分分之問三人各得利銀幾何法以三人各出本銀相併得二千四百兩為一率三人共得利銀一千二百兩為二率三人所出本銀數各為三率推得各四率趙五百兩周四百兩馮三百兩即為各人所得利銀數也若用捷法則以三人所併本銀二千四百兩歸除共得利銀一千二百兩得每一兩之利為五錢按各人本銀數乗之即各人所得利銀數也設如甲乙丙三商共出本銀一千五百二十兩得利銀一百九十兩甲分一百二十兩乙分四十兩丙分三十兩問各人原本銀若干法以共利銀一百九十兩為一率共本銀一千五百二十兩為二率每分利銀各為三率推得各四率甲本銀為九百六十兩乙本銀為三百二十兩丙本銀為二百四十兩如用捷法則以共利銀一百九十兩歸除共本銀一千五百二十兩得每一兩利銀之本銀為八兩乃以八兩乗各人利銀分數即得各人本銀之數矣設如甲丙戊三人合本貿易共得利銀三千二百二十兩甲本銀三千六百兩丙本銀五百一十兩戊本銀不知其數但知該分利銀四百八十兩問其本銀若干法以三人共得利銀三千二百二十兩内減戊之利銀四百八十兩餘二千七百四十兩為一率甲丙二人本銀相併得四千一百一十兩為二率戊利銀四百八十兩為三率推得四率七百二十兩即戊之本銀數也此法於總利中減去戊利銀所餘者即甲丙二人之利銀故以甲丙二人之共利銀與甲丙二人之共本銀相比即若戊一人之利銀與戊一人之本銀相比也設如甲乙丙三商共出本銀一千五百二十兩今得本利共銀一千七百一十兩甲分本利共銀一千零八十兩乙分本利共銀三百六十兩丙分本利共銀二百七十兩問三人所分本利各若干法以三人所得本利共銀一千七百一十兩為一率共出本銀一千五百二十兩為二率各人所分本利共銀各為三率推得各四率甲本銀九百六十兩乙本銀三百二十兩丙本銀二百四十兩即為各人本銀數以各人本銀減各人共銀甲得利銀一百二十兩乙得利銀四十兩丙得利銀三十兩即各人利銀數也設如有三人合本貿易第一人出本銀五百兩係七成第二人出本銀一千兩係八成第三人出本銀一千五百兩係九成共得利銀二千兩皆係十成問每人應得利銀若干法以各人所出本銀數與各銀成色相乗第一人得三百五十兩第二人得八百兩第三人得一千三百五十兩三數相加共得二千五百兩為一率共得利銀二千兩為二率毎人所得相乗之數第一人三百五十兩第二人八百兩第三人一千三百五十兩各為三率推得各四率第一人得二百八十兩第二人得六百四十兩第三人得一千零八十兩即各人應得之利銀數也此法以各銀成色乗各人銀數者是將各銀成色俱變作十成銀也如第一人七成銀五百兩變作十成銀止得三百五十兩第二人八成銀一千兩變作十成銀止得八百兩第三人九成銀一千五百兩變作十成銀止得一千三百五十兩併之得十成銀二千五百兩故以總十成銀二千五百兩與共利銀二千兩之比即若毎人十成本銀與每人應得利銀之比也設如甲丙戊三商合本貿易其所出本銀多寡不同時日亦不同甲出本銀六百兩係八個月丙出本銀四百五十兩係六個月戊出本銀五百兩係十個月共得利銀一千兩問各人應分利銀幾何法以各人本銀與各人月分相乗甲得四千八百兩丙得二千七百兩戊得五千兩三數相併得一萬二千五百兩為一率共利銀一千兩為二率各人本銀乗各人月分之數為三率推得各四率甲得三百八十四兩丙得二百一十六兩戊得四百兩即為各人應得之利銀數也此法先以各人本銀乗各人月分者葢以各人所出本銀按月分以加倍也三人本銀各有月分則行利亦按月加倍也設如乙丙丁三人合夥生理乙出本銀二百兩係八個月出本之兩月後又添本銀四十兩丙出本銀三百二十兩係六個月出本之一月後又添本銀八十兩丁出本銀一百六十兩係十個月共得利銀三百六十兩問每人各該利銀幾何法以乙本銀二百兩與八個月相乗得一千六百兩又以後添四十兩與六個月相乗因出本之兩月後又添銀故用六月得二百四十兩此兩數相加得一千八百四十兩為乙之衰數以丙本銀三百二十兩與六個月相乗得一千九百二十兩又以後添八十兩與五個月相乗因出本之一月後又添銀故用五月得四百兩此兩數相加得二千三百二十兩為丙之衰數以丁本銀一百六十兩與十個月相乗得一千六百兩即丁之衰數乃以三人衰數相加得五千七百六十兩為一率三百六十兩為二率各人衰數各為三率推得各四率乙得一百一十五兩丙得一百四十五兩丁得一百兩即各人應得之利銀數也此法因出銀前後各不同故以各人出銀節次乗各人月分而得各人衰數既得各人衰數則相加而與總利銀為比即如各人衰數與各人利銀相比也設如甲乙丙三商合本貿易共得利銀一千兩甲本銀三百兩係十個月乙本銀六百兩丙本銀四百兩俱不知月分其利銀則甲分五百兩乙分三百兩丙分二百兩問乙丙二人出本銀月分各幾何法以甲之利銀五百兩為一率甲之本銀三百兩與十個月相乗得三千兩為二率乙之利銀三百兩為三率推得四率一千八百兩為乙之本銀六百兩與月分相乗之數以乙之本銀六百兩除之得三個月即乙出銀之月分如以丙之利銀二百兩為三率則得四率一千二百兩為丙之本銀四百兩與月分相乗之數以丙之本銀四百兩除之得三個月即丙出本銀之月分也設如乙丙丁三人合本貿易共得利銀三百八十兩丙得利銀為乙三分之一丁得利銀為乙四分之一乙之本銀為八十兩收利十二個月丙丁二人本銀不知數但知丙收利銀係八個月丁收利銀係四個月問乙丙丁利銀各若干丙與丁本銀各若干法以十二分為乙之衰數兩分母相乗之數取其三分之一得四分為丙之衰數又取其四分之一得三分為丁之衰數將三衰數相併得一十九分為一率共利三百八十兩為二率以各人衰數各為三率推得各四率乙之利銀得二百四十兩丙之利銀得八十兩丁之利銀得六十兩三宗利銀相併共三百八十兩以合前數又用乙利銀二百四十兩為一率乙本銀八十兩與十二個月相乗得九百六十兩為二率丙利銀八十兩為三率推得四率三百二十兩為丙本銀八個月之共分以八個月除之得四十兩即丙之本銀數復以乙利銀二百四十兩為一率乙本銀九百六十兩為二率丁利銀六十兩為三率推得四率二百四十兩為丁本銀四個月之共分以四個月除之得六十兩即丁之本銀數也設如甲丙戊三家每日派一人當差論各家田數定日之多少甲田八十畝丙田六十畝戊田五十二畝問各人一年内連閏月應該當差之日幾何法以甲丙戊三家田數甲八十丙六十戊五十二相併得一百九十二畝為一率一年連閏月作三百八十四日為二率各家田數各為三率推得各四率甲當差一百六十日丙當差一百二十日戊當差一百零四日併之得三百八十四日合一年連閏月之數也設如二人居住相隔一千四百里同日起身一人日行八十里一人日行六十里問途中幾日相㑹法以八十里與六十里相併得一百四十里為一率一日為二率一千四百里為三率推得四率十日即相㑹之日也此法以八十里六十里相併為一率者毎一日之内兩人共行一百四十里也一百四十里行一日則一千四百里行十日矣蓋日行八十里者十日行八百里日行六十里者十日行六百里併之以合原數也設如有銀四百八十六兩糴米麥豆三色其石數相等米每石價銀一兩二錢麥每石價銀九錢豆每石價銀六錢問石數若干法以米價一兩二錢麥價九錢豆價六錢相併共得二兩七錢為一率一石為二率總銀四百八十六兩為三率推得四率一百八十石即各色之石數也此法蓋因三色之石數既相等故三色每石之共價與每一石之比即同於三分之共價四百八十六兩與每一分之一百八十石之比也設如有銀一千二百兩買綾絹二色絹一分綾二分綾每疋價銀三兩六錢絹每疋價銀二兩四錢問綾絹與價銀各幾何法以綾價三兩六錢二因之綾二分故用二因得七兩二錢與絹價二兩四錢相加共得九兩六錢為一率絹一疋為二率總銀一千二百兩為三率推得四率一百二十五疋為絹數倍之得二百五十疋為綾數以絹每疋價銀二兩四錢與絹一百二十五疋相乗得三百兩為共絹價以綾每疋價銀三兩六錢與綾二百五十疋相乗得九百兩為共綾價也此法蓋因絹為一分綾為二分故將綾價二因之與絹價相加即綾二疋絹一疋之共價以綾二疋絹一疋之共價與絹一疋之比即同於綾二分絹一分之共價一千二百兩與絹一分一百二十五疋之比也設如有銀三百三十六兩買羅八十疋絹一百二十疋羅每疋價比絹每疋價加一倍問羅價絹價各幾何法以羅八十疋倍之得一百六十疋與絹一百二十疋相加得二百八十疋為一率絹一疋為二率總銀三百三十六兩為三率推得四率一兩二錢即絹毎一疋之價倍之得二兩四錢即羅每一疋之價也此法蓋因羅價比絹價加一倍故將羅疋數倍之與絹疋數相加為羅二倍絹一倍之共數而以羅二倍絹一倍之共數與絹一疋之比即同於羅二倍絹一倍之共價三百三十六兩與絹一疋之價一兩二錢之比也設如有銀七百八十五兩令甲乙丙丁四人分之乙得甲銀十分之七丙得乙銀十四分之三丁得丙銀十二分之九問各分銀幾何法以一千六百八十分三分母連乗之數為甲衰數取甲十分之七得一千一百七十六分為乙衰數取乙十四分之三得二百五十二分為丙衰數取丙十二分之九得一百八十九分為丁衰數乃以四人衰數相併得三千二百九十七分為一率總銀七百八十五兩爲二率以甲衰一千六百八十分為三率得四率四百兩即甲所分之銀數以乙衰一千一百七十六分為三率得四率二百八十兩即乙所分之銀數以丙衰二百五十二分為三率得四率六十兩即丙所分之銀數以丁衰一百八十九分為三率得四率四十五兩即丁所分之銀數四人所得銀數併之得七百八十五兩以合原數也此法因各分母不同恐難度盡故以分母連乗為甲衰數次各按分取其衰數乃併各衰數為共衰數以共衰數與總銀數之比即同於各人衰數與各銀數之比也設如東西中三村共納糧一千零三十六石東村一百二十戸每戸該納七分西村八十戸每戸該納五分中村六十戸每戸該納四分問各村納糧若干每戸納糧若干法以七分與東村一百二十戸相乗得八百四十分為東村衰數以五分與西村八十戸相乗得四百分為西村衰數以四分與中村六十戸相乗得二百四十分為中村衰數乃以三村衰數相併得一千四百八十分為一率共納糧一千零三十六石為二率各村衰數各為三率推得各四率東村共該納糧五百八十八石西村共該納糧二百八十石中村共該納糧一百六十八石再以各村戸數歸除各村所納糧數則東村每戸該納糧四石九斗西村每戸該納糧三石五斗中村每戸該納糧二石八斗如以三村共衰分數歸除共納糧數得每一分所納糧數而以各村分數乗之即得各村共納糧數以各戸分數乗之即得各村每戸所納之糧數也設如乙丙丁三人共納地租銀十一兩五錢乙田長一百二十丈寛四十丈丙田長二百丈寛六十丈丁田長八十丈寛二十丈問每人該租銀若干法以乙田長一百二十丈與寛四十丈相乗得四千八百丈丙田長二百丈與寛六十丈相乗得一萬二千丈丁田長八十丈與寛二十丈相乗得一千六百丈三數相併共得一萬八千四百丈為一率共地租銀十一兩五錢為二率各田長寛相乗之數各為三率推得各四率乙該銀三兩丙該銀七兩五錢丁該銀一兩併之為十一兩五錢以合原數也設如孫鄭褚三家買貨共載一船逺近船價不同孫家貨物九十五担每担船價六分鄭家貨物八十五担每担船價四分褚家貨物五十六担每担船價二分五釐因中途撥淺共貼銀二兩五錢二分欲照船價分派問各該若干法以孫貨九十五担與每担六分相乗得五兩七錢以鄭貨八十五担與每担四分相乗得三兩四錢以褚貨五十六担與每担二分五釐相乗得一兩四錢乃以三家船價相併共得一十兩五錢為一率共貼銀二兩五錢二分為二率一兩為三率推得四率二錢四分即為每一兩應貼之數復以各家船價銀乗之所得一兩三錢六分八釐即孫應出之數所得八錢一分六釐即鄭應出之數所得三錢三分六釐即褚應出之數也設如甲丙戊三縣共納米四千石論縣之大小米之貴賤運之逺近分之甲縣有三千三百六十戸每米一石價銀八錢運至六十里丙縣有一千二百戸每米一石價銀一兩運至三十里戊縣有二千四百戸每米一石價銀六錢運至八十里問每縣該米若干法以甲縣米價八錢與六十里相乗得四百八十用此數歸除甲縣三千三百六十戸得七為甲縣之衰數又以丙縣米價一兩與三十里相乗得三百用此數歸除丙縣一千二百戸得四為丙縣之衰數以戊縣米價六錢與八十里相乗得四百八十用此數歸除戊縣二千四百戸得五為戊縣之衰數乃以此三衰數相併得一十六為一率總米四千石為二率各縣衰數各為三率推得各四率甲縣為一千七百五十石丙縣為一千石戊縣為一千二百五十石三數相併共四千石以合原數也設如甲乙丙丁戊五處共輸粟二千石以田地之多寡道里之逺近粟價之貴賤均輸之甲田一萬三千零六十畝粟每石價銀二兩自輸本處乙田一萬二千三百一十二畝粟每石價銀一兩至輸所二百里丙田七千一百八十二畝粟每石價銀一兩二錢至輸所一百五十里丁田一萬三千三百三十八畝粟毎石價銀一兩七錢至輸所二百五十里戊田五千一百三十畝粟每石價銀一兩三錢至輸所一百五十里每石每里車價四釐問各處所輸若干法以甲粟毎石價二兩歸除甲田一萬三千零六十畝得六百五十三為甲衰數次以乙輸所二百里與每石車價四釐相乗得八錢併入乙粟毎石價一兩共一兩八錢歸除乙田一萬二千三百一十二畝得六百八十四為乙衰數次以丙輸所一百五十里與每石車價四釐相乗得六錢併入丙粟每石價一兩二錢共一兩八錢歸除丙田七千一百八十二畝得三百九十九為丙衰數次又以丁輸所二百五十里與每石車價四釐相乗得一兩併入丁粟每石價一兩七錢共二兩七錢歸除丁田一萬三千三百三十八畝得四百九十四為丁衰數次又以戊輸所一百五十里與每石車價四釐相乗得六錢併入戊粟每石價一兩三錢共一兩九錢歸除戊田五千一百三十畝得二百七十為戊衰數乃合五衰數共二千五百為一率共粟二千石為二率五處各衰數各為三率推得各四率甲為五百二十二石四斗乙為五百四十七石二斗丙為三百一十九石二斗丁為三百九十五石二斗戊爲二百一十六石五數相併共二千石以合原數也此法蓋因地畝以定粟數故粟可以均然粟之價既有貴賤而道里又有逺近故取粟價以除地畝正所以均其貴賤而取車價併入粟價以除地畝又所以均其逺近也設如買米八十四石每米一石價一兩四錢七分運價一錢三分今欲抽米作運價與之問正米與運價米各幾何法以每石米價一兩四錢七分與每石運價一錢三分相加得一兩六錢為一率總米八十四石為二率每石米價一兩四錢七分為三率推得四率七十七石一斗七升五合即正米數如先求運價米數則仍以一兩六錢為一率總米八十四石為二率每石運價一錢三分為三率推得四率六石八斗二升五合即運價米數也既得正米數與運價相乗得十兩零三分二釐七豪五絲為共運價而以運費米數與米價相乗亦得十兩零三分二釐七豪五絲其數適相當也此法蓋因八十四石為正米與運價米之總數今抽米作運費故以米價與運價相併亦為米價與運價之總數以總價與總米之比即同於米價與正米之比又以總價與總米之比即同於運價與運米之比也此法即和數差分之變體舊算書名為就物抽分因其以總米内抽運價故為抽分然要以米價運價之和與總米為比例故附於和數比例之後設如有絲四十三斤十二兩每織絹一疋用絲一斤與織工絲四兩問織絹絲與織工絲各幾何法以織絹絲一斤通為十六兩與織工絲四兩相加得二十兩為一率總絲四十三斤十二兩通為七百兩為二率織工絲四兩為三率得四率一百四十兩收為八斤十二兩即織工絲與總絲相減餘三十五斤即織絹絲也此亦就物抽分法也以毎疋織絹絲及織工絲之共數與總絲之比即同於每疋織工絲與總織工絲之比也較數比例比例之中有和數而復有較數者以數相合而為比例故謂之和數若夫因數之相較而成比例則謂之較數在九章謂之匿價差分其立法蓋以每一物與較數之比即若共物與共較之比或以共物之較與每一物價之較為比即若共物與每一物價之比也又或有以實數相比者或有以各物分數相比者雖未有一定之規然而總不越以彼此相差之較數為比例故今質名之曰較數比例焉設如有錢買綾羅二色綾七尺羅九尺兩價相等但知綾每尺比羅每尺價多三十六文問二色毎尺價錢幾何法以綾一尺為一率綾比羅每尺價多三十六文為二率綾七尺為三率推得四率二百五十二文即綾七尺共多之數又以綾七尺與羅九尺相減餘羅二尺為一率綾七尺共多二百五十二文為二率羅一尺為三率推得四率一百二十六文即羅一尺之價加多三十六文得一百六十二文即綾一尺之價以一百二十六文乗羅九尺得一千一百三十四文以一百六十二文乗綾七尺亦得一千一百三十四文兩價相等也此法蓋因綾一尺多三十六文則綾七尺共多二百五十二文也夫綾價多二百五十二文羅多二尺而其價相等則二百五十二文即羅二尺之價羅二尺價二百五十二文則羅一尺價一百二十六文也既得羅價則綾價亦可推矣又法以綾七尺與羅九尺相減餘二尺為一率綾比羅每尺價多三十六文為二率綾七尺為三率推得四率一百二十六文即羅毎一尺之價加多三十六文得一百六十二文即綾每一尺之價如以羅九尺為三率推得四率一百六十二文即綾每一尺之價減多三十六文餘一百二十六文即羅每一尺之價也此法共綾與共羅之較為二尺綾每尺與羅每尺之較為三十六文凡共物之較與共價之較相比即同於共物與共價之比而共物之較與每一物價之較相比亦必同於共物與每一物價之比故以綾共少二尺與羅每尺價少三十六文之比即同於綾共七尺與羅每尺價一百二十六文之比也又以羅共多二尺與綾每尺多三十六文之比亦即同於羅共九尺與綾毎尺價一百六十二文之比也設如有銀買駝馬二色馬十匹駝六匹兩價相等但知駝每匹比馬每匹價多八兩問二色每匹價銀若干法以駝一匹為一率駝比馬每匹價多八兩為二率駝六匹為三率推得四率四十八兩即駝六匹共多之數又以馬十匹與駝六匹相減餘馬四匹為一率駝六匹共多四十八兩為二率馬一匹為三率推得四率十二兩即馬一匹之價加多八兩得二十兩即駝一匹之價以二十兩乗駝六匹得一百二十兩以十二兩乗馬十匹亦得一百二十兩兩價相等也此法蓋因駝一匹多八兩則駝六匹共多四十八兩也夫駝價多四十八兩馬多四匹而其價相等則四十八兩即馬四匹之價馬四匹價四十八兩則馬一匹價十二兩也又法以駝六匹與馬十匹相減餘四匹為一率駝比馬每匹價多八兩為二率駝六匹為三率推得四率十二兩即馬每匹之價加多八兩得二十兩即駝毎匹之價如以馬十匹為三率推得四率二十兩即駝每匹之價減多八兩餘十二兩即馬每匹之價也蓋駝共少四匹與馬每匹價少八兩之比即同於駝共六匹與馬每匹價十二兩之比又馬共多四匹與駝每匹價多八兩之比即同於馬共十匹與駝每匹價二十兩之比也設如有稻一十八石稷二十二石兩價相等如交換五石則兩邊俱差銀一兩六錢問每石價與共價各若干法以交換五石為一率相差一兩六錢為二率稻一十八石為三率推得四率五兩七錢六分即稻一十八石共多之數又以稻一十八石與稷二十二石相減餘稷四石為一率稻一十八石共多五兩七錢六分為二率稷一石為三率推得四率一兩四錢四分即稷一石之價以稷二十二石乗之得三十一兩六錢八分即稷之共價亦即稻之共價以稻十八石除之得一兩七錢六分即稻一石之價也如交換五石則一為稻十三石稷五石稻十三石價二十二兩八錢八分稷五石價七兩二錢相加得三十兩零八分比共價三十一兩六錢八分少一兩六錢一為稷十七石稻五石稷十七石價二十四兩四錢八分稻五石價八兩八錢相加得三十三兩二錢八分比共價三十一兩六錢八分則多一兩六錢是兩邊俱差一兩六錢也此法蓋因稻五石多一兩六錢則稻十八石共多五兩七錢六分也夫稻多五兩七錢六分稷多四石而其價相等則五兩七錢六分即稷四石之共價稷四石價五兩七錢六分則稷一石價必一兩四錢四分而稷二十二石價必三十一兩六錢八分與稻十八石之價相等故以十八除之得稻每一石之價也設如有金球八銀球十二兩重相等今移換三則銀球邊多六十兩問金球銀球各重幾何法以移换之三為一率多六十兩折半得三十兩即三金球比三銀球所多之數為二率金球八為三率推得四率八十兩即金球八共多之數又以金球八與銀球十二相減餘銀球四為一率共多八十兩為二率銀球一為三率推得四率二十兩即銀球一之重數以十二乗之得二百四十兩即銀球十二之共重數亦即金球八之共重數以金球八除之得三十兩即金球一之重數也此法蓋因移換三而差六十兩即三金球比三銀球多三十兩三銀球比三金球少三十兩其總差為六十兩故折半為三金球多於三銀球之重數也三金球多三十兩則八金球共多八十兩夫金球多八十兩銀球多四而其重相等則八十兩即四銀球之重數四銀球重八十兩則一銀球重二十兩而十二銀球必重二百四十兩與八金球之重相等故以八除之即得金球之重數也設如甲乙丙三人合本為商共得利銀四百兩乙比甲多分十二兩丙比乙又多分十六兩問各分利銀幾何法以共利銀四百兩内減乙比甲多十二兩又減丙比甲多二十八兩丙比乙多十六兩則比甲多二十八兩餘三百六十兩乃以甲乙丙共三人為一率三百六十兩為二率甲一人為三率推得四率一百二十兩即甲應得利銀數加十二兩得一百三十二兩為乙應得利銀數又加十六兩得一百四十八兩為丙應得利銀數也此法減去乙丙共多於甲之數所餘者即三人均分之數故以三人與三百六十兩之比即同於甲一人與一百二十兩之比也設如有銀七百四十兩共買馬驢一百匹馬八十匹驢二十匹其馬每匹價比驢每匹價多三兩問馬驢每匹價各得幾何法以馬驢共一百匹為一率馬每匹多三兩與馬八十匹相乗得二百四十兩於總銀内減之餘五百兩為二率驢一匹為三率推得四率五兩即驢一匹之價加馬每匹多三兩得八兩即馬一匹之價以馬價八兩乗馬八十匹得馬共價六百四十兩以驢價五兩乗驢二十匹得驢共價一百兩也此法蓋因馬每匹多三兩則馬八十匹共多二百四十兩於總銀内減去馬共多之價則馬價皆同於驢價矣故以總數一百匹與銀五百兩之比即同於驢一匹與銀五兩之比也設如有銀二千九百九十六兩二錢買上等田一百六十畝中等田三百畝下等田四百六十畝其上等田比中等田每畝價多四錢七分中等田比下等田每畝價多一兩三錢五分問三等田每畝價銀幾何法以上中下三等田數相併得九百二十畝為一率將中等田三百畝用中等比下等每畝多一兩三錢五分乗之得四百零五兩為中等比下等共多之數又以上等田一百六十畝用上等比下等每畝多一兩八錢二分乗之上等比中等每畝多四錢七分中等比下等每畝多一兩三錢五分共為一兩八錢二分得二百九十一兩二錢為上等比下等共多之數爰併兩數共六百九十六兩二錢與總銀二千九百九十六兩二錢相減餘二千三百兩為二率下等田一畝為三率推得四率二兩五錢即下等田每一畝之價加多一兩三錢五分得三兩八錢五分即中等田每一畝之價再加多四錢七分得四兩三錢二分即上等田每一畝之價也此法蓋因中等田比下等田每畝多一兩三錢五分則三百畝共多四百零五兩上等田比下等田毎畝多一兩八錢二分則一百六十畝共多二百九十一兩二錢於總銀内減去兩等共多之數則上等田價中等田價皆同於下等田價矣故以三等田共九百二十畝與銀二千三百兩之比即同於下等田每一畝與銀二兩五錢之比也設如二人行路疾徐不等疾行者日行九十五里徐行者日行七十五里今令徐行者先行八日問疾行者追及之日數幾何法以徐行七十五里與疾行九十五里相減餘二十里為一率一日為二率徐行七十五里與先行八日相乗得六百里為三率推得四率三十日即追及之日數也此法蓋因徐行者先行八日以日行七十五里計之則已多行六百里今疾行者日行九十五里則比徐行者每日多行二十里多二十里為一日追行之數多六百里則為三十日追行之數可知矣設如二人自鄉上城一人步行一人騎馬使步行者先行三十七里騎馬者追至一百五十四里尚不及二十三里問追及之里數幾何法以不及二十三里與先行三十七里相減餘一十四里為一率追至一百五十四里為二率不及二十三里為三率推得四率二百五十三里即追及之里數也此法蓋因步行者已先行三十七里今騎馬者追之止不及二十三里是已追過十四里也追過十四里必須一百五十四里今尚不及二十三里則必須二百五十三里方能追及也設如一人行路步行則三十日可到騎行則二十日可到今行二十六日到問步行騎行日數各幾何法以三十日與二十日相減餘十日為一率步行三十日為二率今行二十六日與騎行二十日相較多六日為三率推得四率十八日為步行之日數與共二十六日相減餘八日即騎行之日數也如以十日為一率騎行二十日為二率今行二十六日與步行三十日相較少四日為三率推得四率八日即騎行之日數也此法蓋因步行三十日可到騎行二十日可到則步行比騎行遲十日即騎行比步行早十日也步行比騎行遲十日而步行為三十日今步行比騎行遲六日則步行為十八日可知矣騎行比步行早十日而騎行為二十日今騎行比步行早四日則騎行為八日可知矣設如有上下二等酒上等酒每斤價銀五分下等酒每斤價銀三分今以二等酒相合一處共重一百二十斤每斤價銀三分六釐問二等酒各幾何法以上等酒價銀五分内減下等酒價銀三分餘二分為一率二等酒共一百二十斤為二率二等酒相合毎斤價銀三分六釐與下等酒價銀三分相較得多六釐為三率推得四率三十六斤為上等酒數於二等酒共一百二十斤内減三十六斤餘八十四斤即下等酒數也如以二等酒相合毎斤價銀三分六釐與上等酒價銀五分相較得少一分四釐為三率則得四率八十四斤即下等酒數也此法上等酒價五分下等酒價三分是上等比下等多二分即下等比上等少二分也若二等酒相合價比下等酒價多二分則一百二十斤皆上等酒矣因二等酒相合價比下等價多六釐故知上等酒有三十六斤也又二等酒相合價比上等酒價少二分則一百二十斤皆下等酒矣因二等酒相合價比上等價少一分四釐故知下等酒有八十四斤也設如有布三百一十疋每疋長四十尺但知每疋扣運費二尺共扣去一十六疋復找囘錢六百文問布毎疋價錢幾何法以毎疋扣運費二尺與總布三百一十疋相乗得六百二十尺又以每疋長四十尺與共扣布一十六疋相乗得六百四十尺兩數相減餘二十尺為一率找囘錢六百文為二率每疋長四十尺為三率推得四率一千二百文即每一疋之價也此法蓋以每疋扣運費二尺計之則總布三百一十疋當扣六百二十尺今乃抽去十六疋則扣去六百四十尺是多扣去二十尺也多扣去二十尺而找回錢六百文是六百錢即二十尺之價二十尺價六百文則四十尺一疋之數價必一千二百文也設如有銀一千零八兩買線一分絲二分綿三分共重三百六十斤俱不言價但知綿二兩當線一兩之價線一兩當絲一兩六錢之價問三色各重若干三色每斤價銀若干法以線一分絲二分綿三分相併得六分為一率共重三百六十斤為二率線一分為三率推得四率六十斤即線一分之重數二因之得一百二十斤即絲二分之重數三因之得一百八十斤即綿三分之重數既得各色之重數即以線重六十斤為線之衰分綿二兩當線一兩之價即將綿一百八十斤二歸之得九十斤為綿之衰分絲一兩六錢當線一兩之價即將絲一百二十斤用一六除之得七十五斤為絲之衰分併三衰分共二百二十五斤為一率總銀一千零八兩為二率線一斤為三率推得四率四兩四錢八分即線每斤之價二歸之得二兩二錢四分即綿每斤之價一六除之得二兩八錢即絲每斤之價也此法先求各色之重數以共分與共重數之比即同於線一分與線重數之比又以各分數因之即得各重數也次求各色之價數既以線重六十斤為線衰分則絲價與綿價必俱變為與線相當之數而後可以為比例蓋綿二兩當線一兩之價則綿一百八十斤必當線九十斤之價故以九十為綿之衰分絲一兩六錢當線一兩之價則絲一百二十斤必當線七十五斤之價故以七十五為絲之衰分既得各衰分併之與總銀相比即同於線每斤與每斤之價相比也既得線每斤之價以二除之得綿每斤之價者綿價居線價二分之一也既得線每斤之價又以一六除之得絲每斤之價者絲價居線價十六分之十也設如李王二人合本生理不知二人本銀之數但知李本銀比王本銀多一倍零八兩共得利銀二十二兩李分十六兩王分六兩問二人各出本銀若干法以王利銀六兩加一倍因李本銀比王本銀多一倍故加一倍也得十二兩與李利銀十六兩相減餘四兩為一率所零八兩為二率王之利銀六兩為三率推得四率十二兩即王之本銀數加一倍又加八兩共三十二兩為李之本銀數也蓋李之本銀比王之本銀多一倍又多八兩李之利銀比王之利銀多一倍又多四兩是四兩即為八兩所得之利銀數利銀四兩知本銀為八兩則王之利銀六兩即知其本銀為十二兩也設如買緞一千疋不言出銀之數但知每疋賣價七兩二錢則比原出銀少十分之一問原出銀若干法以分母十與分子一相減餘九分為一率以七兩二錢與一千疋相乗得七千二百兩為二率十分為三率推得四率八千兩即原出銀之數也此法蓋因每疋賣價七兩二錢比原出銀少十分之一則今賣價止得原出銀十分之九故以九分與今賣價之比即同於十分與原出銀之比也設如甲丙丁三人合本貿易丙之本銀為甲本銀五分之四丁之本銀為甲本銀三分之二丙之本銀比丁之本銀多十兩問三人本銀各若干法以十五分為甲之衰數兩分母相乗之數取甲五分之四得十二分為丙之衰數取甲三分之二得十分為丁之衰數乃以丁十分與丙十二分相減餘二分為一率多十兩為二率甲十五分為三率推得四率七十五兩為甲本銀數如以丙十二分為三率則得四率六十兩為丙本銀數如以丁十分為三率則得四率五十兩為丁本銀數以丁銀與丙銀相減餘十兩即丙多於丁之數也設如有銀賞三等人一等八人二等六人三等九人二等每人所得為一等每人三分之二三等每人所得為二等每人四分之一二等比三等共多得三百兩問每等每人各得幾何法以十二分為一等每人之衰數兩分母相乗之數取十二分中之三分之二得八分為二等每人之衰數又取八分中之四分之一得二分為三等每人之衰數乃以一等十二分與一等八人相乗得九十六分為一等八人共衰數二等八分與二等六人相乗得四十八分為二等六人共衰數三等二分與三等九人相乗得十八分為三等九人共衰數乃以三等共衰十八分與二等共衰四十八分相減餘三十分為一率二等比三等共多得三百兩為二率一等每人衰數十二分為三率推得四率一百二十兩為一等每人所得之數以一等八人乗之得九百六十兩即一等八人所得之共數如以二等每人衰數八分為三率則得四率八十兩為二等每人所得之數以二等六人乗之得四百八十兩即二等六人所得之共數如以三等每人衰數二分為三率則得四率二十兩為三等每人所得之數以三等九人乗之得一百八十兩即三等九人所得之共數以二等共得四百八十兩與三等共得一百八十兩相減餘三百兩即二等共多於三等之銀數也設如有田一百二十畝一人一日耕四畝一人一日種六畝欲令二人同日完工問耕者該先起工幾何法以四畝與六畝相乗得二十四畝以四畝互乗一日得四日以六畝互乗一日得六日乃以二十四畝為一率四日六日相減餘二日為二率一百二十畝為三率推得四率十日即是耕者該先起工十日也此法蓋因四畝與六畝不同故用互乗以齊其分一得二十四畝耕六日一得二十四畝種四日欲令同日完工則耕者當先起工二日然則田二十四畝當先起工二日今田一百二十畝則當先起工十日也御製數理精藴下編卷六
