body:
  text: 欽定四庫全書御製數理精藴下編卷三十一末部一借根方比例定位法乘法除加法法減法借根方比例借根方者假借根數方數以求實數之法也凡法必借根借方加減乘除令與未知之數比例齊等而本數以出大意與借衰疊借略同然借衰疊借之法止可以御本部而此法則線面體諸部皆可御之其中有借根借方之不同葢因根者方之邊數即所謂線以根自乘得平方以根自乘再乘得立方以根累次乘即得累次多乘方故以線類爲問者則借根數以比之以面類爲問者則借平方長方以比之以體類爲問者則借立方或累次多乘方以比之至於借數又有一定之位與降位之法定位降位法俱詳後要之此法設立虚數依所問之比例乘除加減務令根方之數與眞數相當適等而所求之數以出此亦借數之巧也定位法衆數之經緯盡歸乘除而乘除之條理又取準於定位况借數一法又用根方諸名一經乘除俱變爲幾根幾方之號而本數之比例由此而生其定位與常法稍異故變從簡易設表如左右表前行所列者借數之名後行所列者定數之位其借數者即比例也根與方數俱爲相連比例率如根爲二則平方爲四立方爲八以立方與平方之比同於平方與根數之比即爲八與四之比同於四與二之比也然必借方借根者何也葢以巳知未知之數權約爲幾根幾方以統御之加減後餘幾根幾方即知眞數若干矣如根爲二數其平方即爲四若餘二平方即知其真數有八或餘二根即知其真數有四也其定位者即視根方所對之位也乘法定位以兩數所對之位數相加其加數所對之方即乘出之方也除法定位以兩數所對之位數相減其減餘數所對之方即除出之方也乘法以眞數乘根仍得根葢根對一而眞數對無可加也如以根乘根即得平方葢根對一一與一相加得二二所對之表爲平方故定乘得之數爲平方也如以根乘平方即得立方葢根對一平方對二一二相加得三而三所對之表爲立方故定乘得之數爲立方也又如以平方乘平方則二與二相加爲四查所對之表得三乘方以平方乘立方則二與三相加爲五查所對之表得四乘方以立方乘立方則三與三相加爲六查所對之表得五乘方餘皆倣此除法以真數除根仍得根葢根對一而真數對無可減也如以根除根即得真數葢根對一一與一相減得而所對之表爲眞數故定除得之數爲真數也如以根除平方即得根葢根對一平方對二一二相減餘一而一所對之表爲根故定除得之數爲根數也又如以平方除平方則二與二減盡爲查所對之表得真數以平方除立方則二與三相減餘一查所對之表得根數以立方除立方則三與三相減得查所對之表亦得真數也餘皆倣此定多少與相同號式凡數有多者用此號一如一平方多二根則如此列之凡數有少者用此號一如一立方少二平方則如此列之凡數有相等者用此號一如二立方與十六相等則如此列之至於數之多少不齊用號各異加減乘除之後有不變者有以多變少以少變多者俱詳於本法加法凡多與多加得數仍爲多少與少加得數仍爲少多與少加少與多加則反相減爲所得數而多數大則得數亦爲多少數大則得數亦爲少其故何也葢因多數大少數小以其所多補其所少而其所多者尚有餘也少數大多數小以其所多補其所少而其所少者仍不足也多少之號定而加法不淆矣設如有三平方多四根與二平方多三根相加問得幾何法以三平方與二平方相加得五平方四根與三根相加得七根是爲五平方多七根即所求之數也此多與多加得數仍爲多也如以數明之以根爲二則一平方爲四上數三平方得十二多四根得多八是十二多八共二十下數二平方得八多三根得多六是八多六共十四上十二與下八相加得二十即五平方之數上多八與下多六相加得十四即多七根之數葢上數共二十下數共十四兩數相加得三十四即二十多十四也設如有四立方少一平方與三立方少二平方相加問得幾何法以四立方與三立方相加得七立方一平方與二平方相加得三平方是爲七立方少三平方即所求之數也此少與少加得數仍爲少也如以數明之以平方爲九則一立方爲二十七上數四立方得一百零八少一平方得少九是一百零八少九爲九十九下數三立方得八十一少二平方得少十八是八十一少十八爲六十三上一百零八與下八十一相加得一百八十九即七立方之數上少九與下少十八相加得二十七即少三平方之數葢上數九十九下數六十三兩數相加得一百六十二即一百八十九少二十七也設如有四平方多四根與二平方少三根相加問得幾何法以四平方與二平方相加得六平方四根與三根相加應得七根今多少兩數不同故於多四根内反減去少三根餘一根因多數大故得數爲多是爲六平方多一根即所求之數也此多少兩數不同相加所多數大以其所多補足所少而所多仍有餘葢以上數多四根補足下數少三根仍多一根也如以數明之以根爲二則一平方爲四上數四平方得十六多四根得多八是十六多八共二十四下數二平方得八少三根得少六是八少六爲二上十六與下八相加得二十四即六平方之數上多八補足下少六仍餘二即多一根之數葢上數二十四下數二兩數相加得二十六即二十四多二也設如有二立方少三平方與一立方多二平方相加問得幾何法以二立方與一立方相加得三立方三平方與二平方相加應得五平方今多少兩數不同故於少三平方内反減去多二平方餘一平方因少數大故得數爲少是爲三立方少一平方即所求之數也此多少兩數不同相加所少數大以其所多補其所少而所少仍不足葢於上數少三平方内增入下數多二平方仍少一平方也如以數明之以平方爲九則一立方爲二十七上數二立方得五十四少三平方得少二十七是五十四少二十七爲二十七下數一立方得二十七多二平方得多十八是二十七多十八共四十五上五十四與下二十七相加得八十一即三立方之數上少二十七内增入下多十八仍少九即少一平方之數葢上數二十七下數四十五兩數相加得七十二即八十一少九也設如有二立方多三平方少四根與一立方多二平方少三根相加問得幾何法以二立方與一立方相加得三立方三平方與二平方相加得五平方四根與三根相加得七根是爲三立方多五平方少七根即所求之數也此三位相加多少各自相同故多與多加仍爲多少與少加仍爲少也如以數明之以根爲二則一平方爲四一立方爲八上數二立方得十六多三平方得多十二少四根得少八是十六多十二又少八爲二十下數一立方得八多二平方得多八少三根得少六是八多八又少六爲十上十六與下八相加得二十四即三立方之數上多十二與下多八相加得二十即多五平方之數上少八與下少六相加得十四即少七根之數葢上數二十下數十兩數相加得三十即二十四多二十又少十四也設如有四立方多三平方少二根多五眞數與五立方少一平方多三根少二眞數相加問得幾何法以四立方與五立方相加得九立方多三平方與少一平方相減餘二平方多數大故爲多少二根與多三根相減餘一根多數大故爲多多五眞數與少二眞數相減餘三眞數多數大故爲多是爲九立方多二平方多一根多三眞數即所求之數也此四位相加而多少各自不同須各以所多補足所少故相減所餘爲所得數也如以數明之以根爲二則一平方爲四一立方爲八上數四立方得三十二多三平方得多十二少二根得少四又多眞數五是三十二多十二少四又多五爲四十五下數五立方得四十少一平方得少四多三根得多六又少眞數二是四十少四多六又少二爲四十上三十二與下四十相加得七十二即九立方之數上多十二補足下少四仍餘八即多二平方之數上少四增入下多六反多二即多一根之數上多五補足下少二仍餘三即多三眞數葢上數四十五下數四十兩數相加得八十五即七十二多八又多二又多三也設如有一立方多三根與一平方少一根相加問得幾何法以一立方與一平方相加得一立方多一平方多三根與少一根相減餘二根多數大故爲多是爲一立方多一平方多二根即所求之數也此相加兩數位分不同須各按位列號補足位分始不相淆今上層無平方位而下層却有平方位故上層列一空平方位以補之凡法皆當如此也如以數明之以根爲三則一平方爲九一立方爲二十七上數一立方得二十七多三根得多九是二十七多九共三十六下數一平方得九少一根得少三是九少三爲六上二十七與下無可加仍得二十七即一立方之數下九與上空位亦無可加仍得九即一平方之數上多九補足下少三仍餘六即多二根之數葢上數三十六下數六兩數相加得四十二即二十七多九又多六也減法凡多與多減原數大於減數則減餘仍爲多少與少減原數大於減數則減餘仍爲少若多與多減減數大於原數則反減而減餘即變爲少葢減數之所多既大於原數之所多則原數之所多内減盡與原數之所多相等之數仍須於原數之整分内多減去所大之幾何則所餘之整分内即少幾何矣若少與少減減數大於原數則反減而減餘即變爲多葢減數之所少既大於原數之所少則原數之所少内減盡與原數之所少相等之數仍須於原數之整分内少減所大之幾何故所餘之整分内即多幾何矣至於多與少減少與多減則反相加爲減餘數而原數多則減餘仍爲多原數少則減餘仍爲少其故何也葢因原數多減數少則原數已多在彼而減數又少於此是所餘益多也原數少減數多則原數已少在彼而減數又多於此是所餘益少也多少之號明而減法不淆矣設如有四平方多五根内減二平方多二根問所餘幾何法以四平方減二平方餘二平方五根減二根餘三根是爲二平方多三根即所求之數也此多與多減原數大於減數故減餘仍爲多也如以數明之以根爲三則一平方爲九上數四平方得三十六多五根得多十五是三十六多十五共五十一下數二平方得十八多二根得多六是十八多六共二十四上三十六内減下十八餘十八即二平方之數上十五内減下六餘九即三根之數葢上數共五十一下數共二十四兩數相減餘二十七即十八多九也設如有四立方少三平方内減三立方少二平方問所餘幾何法以四立方減三立方餘一立方三平方減二平方餘一平方是爲一立方少一平方即所求之數也此少與少減原數大於減數故減餘仍爲少也如以數明之以平方爲九則一立方爲二十七上數四立方得一百零八少三平方得少二十七是一百零八少二十七爲八十一下數三立方得八十一少二平方得少十八是八十一少十八爲六十三上一百零八内減下八十一餘二十七即一立方之數上二十七内減下十八餘九即少一平方之數葢上數八十一下數六十三兩數相減餘十八即二十七少九也設如有七平方多三根内減四平方多五根問所餘幾何法以七平方減四平方餘三平方三根内不能減五根乃於下數多五根内反減上數多三根餘二根即變爲少是爲三平方少二根即所求之數也此多與多減減數大於原數故反減而減餘即變爲少葢原數多三根減數多五根是減數比原數大二根如於原數三根内減去減數三根則減數仍餘二根此二根必須於原數平方内減之原數既多減二根則餘數即少二根也如以數明之以根爲三則一平方爲九上數七平方得六十三多三根得多九是六十三多九共七十二下數四平方得三十六多五根得多十五是三十六多十五共五十一上六十三内減下三十六餘二十七即三平方之數下十五内反減上九餘六即少二根之數葢上數共七十二下數共五十一兩數相減餘二十一即二十七少六也設如有六平方少三根内減二平方少四根問所餘幾何法以六平方減二平方餘四平方三根内不能減四根乃於下數少四根内反減上數少三根餘一根即變爲多是爲四平方多一根即所求之數也此少與少減減數大於原數故反減而減餘即變爲多葢原數少三根減數少四根是減數比原數大一根如於原數三根内減去減數三根則減數仍餘一根此一根係原數平方内所少減之一根原數既少減一根則餘數即多一根也如以數明之以根爲四則一平方爲十六上數六平方得九十六少三根得少十二是九十六少十二爲八十四下數二平方得三十二少四根得少十六是三十二少十六爲十六上九十六内減下三十二餘六十四即四平方之數下十六反減上十二餘四即多一根之數葢上數八十四下數十六兩數相減餘六十八即六十四多四也設如有三平方多四根内減二平方少一根問所餘幾何法以三平方減二平方餘一平方四根減一根應餘三根今多少兩數不同故反相加得五根因原數多故得數仍爲多是爲一平方多五根即所求之數也此多少兩數不同相減原數多減數少原數已多而減數又少則所餘者愈多葢原數多四根減數少一根是原數比減數已多五根故減餘即爲多五根也如以數明之以根爲四則一平方爲十六上數三平方得四十八多四根得多十六是四十八多十六共六十四下數二平方得三十二少一根得少四是三十二少四爲二十八上四十八内減下三十二餘十六即一平方之數上多十六加下少四得二十即多五根之數葢上數六十四下數二十八兩數相減餘三十六即十六多二十也設如有五平方少二根内減三平方多三根問所餘幾何法以五平方減三平方餘二平方二根不能減三根且多少兩數不同故反相加得五根因原數少故得數仍爲少是爲二平方少五根即所求之數也此多少兩數不同相減原數少減數多原數已少減數又多則所餘者愈少葢原數少二根減數多三根是原數比減數已少五根故減餘即爲少五根也如以數明之以根爲五則一平方爲二十五上數五平方得一百二十五少二根得少十是一百二十五少十爲一百一十五下數三平方得七十五多三根得多十五是七十五多十五共九十上一百二十五内減下七十五餘五十即二平方之數上少十加下多十五得二十五即少五根之數葢上數一百一十五下數九十兩數相減餘二十五即五十少二十五也設如有四立方多六平方内減二立方多三平方多三根問所餘幾何法以四立方減二立方餘二立方六平方減三平方再減三根餘三平方少三根是爲二立方多三平方少三根即所求之數也此相減兩數位分不同須各按位列號補足位分始不相淆今上層無根位而下層却有根位故上層作一空根位以補之是原根位無數而減數多三根故所餘即少三根也如以數明之以根爲二則一平方爲四一立方爲八上數四立方得三十二多六平方得多二十四是三十二多二十四共五十六下數二立方得十六多三平方得多十二多三根得多六是十六多十二又多六爲三十四上三十二内減下十六餘十六即二立方之數上二十四内減下十二餘十二即三平方之數下六無可減仍爲六即少三根之數葢上數五十六下數三十四兩數相減餘二十二即十六多十二又少六也設如有五立方多四平方多三根少八眞數内減四立方多二平方多二根少九眞數問所餘幾何法以五立方減四立方餘一立方四平方減二平方餘二平方多與多減原數大故爲多多三根減二根餘一根多與多減原數大故爲多八眞數不能減九眞數乃於下數少九内反減上數少八餘一即變爲多是爲一立方多二平方多一根多一眞數即所求之數也如以數明之以根爲三則一平方爲九一立方爲二十七上數五立方得一百三十五多四平方得多三十六多三根得多九又少眞數八是一百三十五多三十六又多九又少八爲一百七十二下數四立方得一百零八多二平方得多十八多二根得多六又少眞數九是一百零八多十八又多六又少九爲一百二十三上一百三十五内減下一百零八餘二十七即一立方之數上三十六内減下十八餘十八即多二平方之數上九内減下六餘三即多一根之數下九反減上八餘一即多一眞數葢上數一百七十二下數一百二十三兩數相減餘四十九即二十七多十八又多三又多一也設如有二立方多三根内減一平方少一根問所餘幾何法以二立方減一平方餘二立方少一平方三根減一根應餘二根今多少兩數不同故反相加得四根因原數多故得數仍爲多是爲二立方少一平方多四根即所求之數也如以數明之以根爲三則一平方爲九一立方爲二十七上數二立方得五十四多三根得多九是五十四多九共六十三下數一平方得九少一根得少三是九少三爲六上五十四無可減仍爲五十四即二立方之數下九無可減仍爲九即少一平方之數上多九與下少三相加得十二即多四根之數葢上數六十三下數六兩數相減餘五十七即五十四少九又多十二也乘法凡乘法各按位分上下横列自末位起逐位遍乘與常法同其書乘出之數以類相從如乘出之數爲根俱書於根之下乘出之數爲平方俱書於平方之下皆依定位表例其定多少之號則臨期互有轉移葢法實俱止一位者其乘出之數爲多不必言矣法實不止一位俱係多者如幾平方多幾根或幾根多幾眞數又或幾平方多幾根又多幾眞數之類其乘出之數亦俱爲多葢以多乘多則多者益多也法實兩數俱係少者其爲首一位已係整數爲多如幾平方少幾根或幾根少幾眞數或幾平方少幾根又少幾眞數之類故乘出之數則有多少之分如爲首一位相乘係多與多乘其乘出之數爲多而次位爲少者與首位乘是爲少與多乘或首位與次位爲少者乘是爲多與少乘則其乘出之數俱爲少葢少與多乘多與少乘則少者益少而得數固少也如㡬平方少幾根與幾眞數相乘以眞數乘平方即爲多與多乘以眞數乘根即爲多與少乘也至於少與少乘其乘出之數反變爲多如幾立方少幾平方與幾根少幾眞數相乘以眞數乘平方即爲少與少乘也其故何也葢法實首位爲多次位以後爲少則乘出之數首位内少次位之數必多末位之數須於乘出首位數中減去次位之數加入末位之數始與實數相合除首位上下兩整數相乘以後次位皆係少與少乘爲多而次位對首位乘必爲少與多乘或多與少乘則此兩數俱爲少合之爲首位數内少次位之數而多末位之數葢因次位所少數内有兩分末位之數首位數内減去次位之全數即如多減去一末位之數倘能於次位數中先減去末位數然後再於首位數中減之始與實數相合今次位數中既不能先減去末位數故轉於首位數中減去次位數反加入一末位數也所謂減者即少數所謂加者即多數多少之分既定則依加法相加即爲所得之數也設如有三根多二眞數以三眞數乘之問得幾何法以三眞數乘二眞數得多六眞數以多與多乘故爲多也又几以眞數乘根方之數其位皆不變如以眞數乘眞數仍得眞數以眞數乘根仍得根葢定位表中眞數之位爲於根方之位無所加也以三眞數乘三根得多九根是爲九根多六眞數即所求之數也如以數明之以根爲四則上數三根得十二多二眞數共得十四以下眞數三乘之所得三十六即九根之數所得多六即多六眞數葢以下數三與上數十四相乘得四十二即三十六多六也設如有四根多二眞數以二根多三眞數乘之問得幾何法以多三眞數乘多二眞數得多六眞數以多三眞數乘四根得多十二根又以二根乘多二眞數得多四根以二根乘四根得八平方以根與根乘即得平方葢根所對之位爲一以一加一爲二即平方所對之位故得數定爲平方相加得八平方多一十六根又多六眞數即所求之數也如圖甲乙爲四根乙丙爲多二眞數甲丁爲二根丁戊爲多三眞數以甲丙四根多二眞數與甲戊二根多三眞數相乘成甲戊己丙長方形其甲丁庚乙長方形即八平方其乙庚辛丙與丁戊壬庚二長方形即所多十六根其庚壬己辛長方形即所多六眞數也如以數明之以根爲四則一平方爲十六上數四根得十六多二眞數共得十八下數二根得八多三真數共得十一相乘所得一百二十八即八平方之數所得多六十四即多十六根之數所得多六即多六眞數葢以下數十一與上數十八相乘得一百九十八即一百二十八多六十四又多六也設如有二平方多三根以二根多四眞數乘之問得幾何法因上層無眞數位故列一空位以補之以多四眞數乘空眞數仍爲空以多四眞數乘多三根得多十二根以多四眞數乘二平方得多八平方以二根乘空眞數仍爲空以二根乘多三根得多六平方以二根乘二平方得四立方以根乘平方即得立方葢根所對之位爲一平方所對之位爲二以一加二得三即立方所對之位也相加得四立方多十四平方又多十二根即所求之數也此相乘兩數位分不同須各按位列號補足位分始不相淆凡法皆當如此如圖甲乙丙丁爲二平方丁丙戊己爲多三根庚辛爲二根戊庚爲多四眞數以甲乙戊己二平方多三根與戊辛二根多四眞數相乘成乙己辛癸扁方體其丙己庚子十二根即四真數乘三根之數其甲乙丙丁子丑八平方即四眞數乘二平方之數其子寅庚辛壬卯六平方即二根乘三根之數其丑子卯癸四立方即二根乘二平方之數也如以數明之以根爲五則一平方爲二十五一立方爲一百二十五上數二平方得五十多三根得多十五共得六十五下數二根得一十多四眞數共得十四相乘所得五百即四立方之數所得多三百五十即多十四平方之數所得多六十即多十二根之數葢以下數十四與上數六十五相乘得九百一十即五百多三百五十又多六十也設如有二根少四眞數以一根多三眞數乘之問得幾何法以多三眞數乘少四眞數得少十二眞數多與少乘故爲少以多三眞數乘二根得多六根凡爲首一位皆爲多而數前無號者亦即爲多今以多三眞數與多二根相乘故其得數仍爲多又以一根乘少四眞數得少四根以多與少乘故爲少以一根乘二根得二平方相加得二平方多二根少十二眞數即所求之數也如圖甲乙爲二根丙乙爲少四眞數甲丁爲一根丁戊爲多三真數以甲乙二根少四眞數與甲戊一根多三眞數相乘成甲戊己乙長方形其庚壬己辛長方形即多三眞數乘少四眞數之十二眞數丁戊己辛長方形即多三眞數乘二根之六根丙庚辛乙長方形即一根乘少四眞數之四根甲丁辛乙長方形即一根乘二根之二平方合之爲甲丁辛乙二平方而少丙庚辛乙之四根又多丁戊己辛之六根而少庚壬己辛之十二眞數今以丁戊己辛之多六根少十二眞數補丙庚辛乙之少四根仍多二根而少十二眞數也如以數明之以根爲六則一平方爲三十六上數二根得十二少四眞數則餘八下數一根得六多三眞數共得九相乘所得七十二即二平方之數所得多十二即多二根之數所得少十二即少十二眞數之數葢以下數九與上數八相乘得七十二即七十二多十二又少十二也設如有一根少一眞數以一根少二眞數乘之問得幾何法以少二眞數乘少一眞數得多二眞數少與少乘故爲多以少二眞數乘一根得少二根一根爲首且無號故爲多今以少二眞數與多一根相乘故其得數亦爲少也又以一根乘少一眞數得少一根多與少乘故爲少以一根乘一根得一平方相加得一平方少三根多二眞數即所求之數也如圖甲乙爲一根丙乙爲少一眞數甲丁亦爲一根戊丁爲少二眞數以甲乙一根少一眞數與甲丁一根少二眞數相乘成甲乙己丁正方形其庚壬己辛小長方形即少二眞數乘少一眞數之二眞數其戊壬己丁即二眞數乘一根之二根其丙乙己辛即一根乘少一眞數之一根其甲乙己丁爲一根乘一根之一平方合之爲甲乙己丁一平方而少丙乙己辛之一根又少戊壬己丁之二根而多庚壬己辛之二眞數實得甲丙庚戊之一長方形葢甲乙己丁之一正方内減戊壬己丁之二根又減丙乙己辛之一根是重減去庚壬己辛之二眞數則甲丙庚戊長方内必缺二眞數故將少二眞數乘少一眞數所得之二眞數即預定爲多號以補重減之分然後得甲丙庚戊之一長方爲所得之實數也是則少與少乘之爲多者非於整數之外有盈分而爲多實因所少之數有過分而爲多也如以數明之以根爲六則一平方爲三十六上數一根爲六少一眞數則餘五下數一根爲六少二眞數則餘四相乘所得三十六即一平方之數所得少十八即少三根之數所得多二即多二眞數之數葢以下數四與上數五相乘得二十即三十六少十八多二也設如有二立方少二平方少一根以二平方少二根乘之問得幾何法因上下兩層皆無眞數位故各列一空位以補之以空眞數乘上層各位仍得各空位以少二根乘空眞數仍得空根以少二根乘少一根得多二平方以少二根乘少二平方得多四立方以少二根乘二立方得少四三乘方又以二平方乘空眞數仍得空平方以二平方乘少一根得少二立方以二平方乘少二平方得少四三乘方以二平方乘二立方得四四乘方相加共得四四乘方少八三乘方多二立方又多二平方即所求之數也如以數明之以根爲三則一平方爲九一立方爲二十七一三乘方爲八十一一四乘方爲二百四十三上數二立方得五十四少二平方得少十八少一根得少三是五十四少十八又少三爲三十三下數二平方得十八少二根得少六是十八少六爲十二相乘所得九百七十二即四四乘方之數所得少六百四十八即少八三乘方之數所得多五十四即多二立方之數所得多十八即多二平方之數葢以下數十二與上數三十三相乘得三百九十六即九百七十二内少六百四十八又多五十四復多十八也設如有三平方少二根多二眞數與一平方多二根少三眞數相乘問得幾何法以少三眞數乘多二眞數得少六眞數以少三眞數乘少二根得多六根以少三眞數乘三平方得少九平方又以多二根乘多二眞數得多四根以多二根乘少二根得少四平方以多二根乘三平方得多六立方又以一平方乘多二眞數得多二平方以一平方乘少二根得少二立方以一平方乘三平方得三三乘方相加得三三乘方多四立方少十一平方多十根少六眞數即所求之數也如以數明之以根爲四則一平方爲十六一立方爲六十四一三乘方爲二百五十六上數三平方得四十八少二根得少八多二眞數共得四十二下數一平方得十六多二根得多八少三眞數共得二十一相乘所得七百六十八即三三乘方之數所得多二百五十六即多四立方之數所得少一百七十六即少十一平方之數所得多四十即多十根之數所得少六即少六眞數之數葢以下數二十一與上數四十二相乘得八百八十二即七百六十八多二百五十六又少一百七十六仍多四十復少六也除法凡除法按位列數必以眞數爲單位法尾未至眞數者須補以存其位如法尾爲根則補一以存眞數位法尾爲平方則補二以存眞數位法尾爲立方則補三以存眞數位將得數首位紀於眞數之上如眞數之位爲者則紀於位之上眞數所對實中之位即得數首位之數如眞數對實中根位即定得數首位爲根如眞數對實中平方位即定得數首位爲平方如眞數對實中立方位即定得數首位爲立方餘俱倣此其歸除遞減皆與常法同至於定號亦與乘法同俱詳設如於左設如有十二立方多九平方多六根以三眞數除之問得幾何法以三眞數除十二立方得四立方以四立方乘三眞數得十二立方與實相減恰盡餘多九平方多六根復以三眞數除多九平方得多三平方以多三平方乘三眞數得多九平方與實相減恰盡餘多六根又以三眞數除多六根得多二根以多二根乘三眞數得多六根與實相減恰盡無餘是爲四立方多三平方多二根即所求之數也此法葢因眞數除立方多平方與多根故得數之位仍從實數之位且眞數之位下對實中立方之位故定得數首位亦爲立方又因實數皆爲多故得數亦皆爲多也如以數明之以根爲三則一平方爲九一立方爲二十七實數十二立方得三百二十四多九平方得多八十一多六根得多十八是三百二十四多八十一又多十八共爲四百二十三以眞數三除之所得一百零八即四立方之數所得多二十七即多三平方之數所得多六即多二根之數葢以四百二十三以三除之得一百四十一即一百零八多二十七又多六也設如有十二立方多八平方多六根以二根除之問得幾何法因法尾未至眞數位故設一空眞數位以補之以二根除十二立方得六平方以六平方乘二根得十二立方與實相減恰盡餘多八平方多六根復以二根除多八平方得多四根以多四根乘二根得多八平方與實相減恰盡餘多六根復以二根除多六根得多三眞數以多三眞數乘二根得多六根與實相減恰盡無餘是爲六平方多四根多三眞數即所求之數也此法葢因根數除立方多平方與多根故根除立方得平方根除多平方得多根根除多根而得多眞數且眞數之位下對實中平方之位故定得數首位亦爲平方又因實數皆爲多故得數亦皆爲多也如以數明之以根爲二則一平方爲四一立方爲八實數十二立方得九十六多八平方得多三十二多六根得多十二是九十六多三十二又多十二共爲一百四十法數二根爲四除之所得二十四即六平方之數所得多八即多四根之數所得多三即多三眞數之數葢一百四十以四除之得三十五即二十四多八又多三也設如有四三乘方多八立方又多八平方以四平方除之問得幾何法以四平方除四三乘方得一平方以一平方乘四平方得四三乘方與實相減恰盡餘多八立方多八平方復以四平方除多八立方得多二根以多二根乘四平方得多八立方與實相減恰盡餘多八平方又以四平方除多八平方得多二眞數以多二眞數乘四平方得多八平方與實相減恰盡無餘是爲一平方多二根又多二眞數即所求之數也此法葢因平方除三乘方多立方與多平方故平方除三乘方得平方平方除多立方得多根平方除多平方得多眞數且眞數之位下對實中平方之位故定得數首位亦爲平方又因實數皆爲多故得數亦皆爲多也如以數明之以根爲三則一平方爲九一立方爲二十七一三乘方爲八十一實數四三乘方得三百二十四多八立方得多二百一十六多八平方得多七十二是三百二十四多二百一十六又多七十二共爲六百一十二法數四平方爲三十六除之所得之九即一平方之數所得多六即多二根之數所得多二即多二眞數之數葢六百一十二以三十六除之得十七即九多六又多二也設如有四立方多八平方多七根多二眞數以二平方多三根多二眞數除之問得幾何法以二平方多三根多二眞數除四立方多八平方多七根得二根以二根乘多二眞數得多四根以二根乘多三根得多六平方以二根乘二平方得四立方與實相減餘多二平方多三根多二眞數復以二平方多三根多二眞數除二平方多三根多二眞數得多一眞數以多一眞數乘多二眞數得多二眞數以多一眞數乘多三根得多三根以多一眞數乘二平方得多二平方與實相減恰盡無餘是爲二根多一眞數即所求之數也此法葢因平方多根多眞數除立方多平方多根多眞數故以平方除立方得根以平方除多平方得多眞數且眞數之位下對實中根位故定得數首位爲根又因實數皆爲多故得數亦皆爲多也如以數明之以根爲三則一平方爲九一立方爲二十七實數四立方得一百零八多八平方得多七十二多七根得多二十一多二眞數即多二是爲一百零八多七十二又多二十一又多二共爲二百零三法數二平方得十八多三根得多九多二眞數即多二是爲十八多九又多二共爲二十九除之所得之六即二根之數所得多一即多一眞數葢二百零三以二十九除之得七即六多一也設如有六平方少一根少十五眞數以三根少五眞數除之問得幾何法以三根少五眞數除六平方少一根得二根以二根乘少五眞數得少十根以二根乘三根得六平方與實相減平方恰盡根之減數大於原數轉減之餘多九根少十五眞數復以三根少五眞數除多九根少十五眞數得多三眞數減餘之九根爲多故除得之三眞數亦爲多也以多三眞數與少五眞數相乘得少十五眞數以多三眞數與三根相乘得多九根與實相減恰盡無餘是爲二根多三眞數即所求之數也此法葢因根少眞數除平方少根少眞數故以根除平方得根以根除多根根原爲少而減餘數變爲多得多眞數且眞數之位下對實中根位故定得數首位爲根又因實數原爲少而次位餘實之數變爲多故定得數次位爲多也如以數明之以根爲五則一平方爲二十五實數六平方得一百五十少一根得少五少十五真數即少十五是爲一百五十少五又少十五共爲一百三十法數三根得十五少五眞數即少五是爲十五少五共爲一十除之所得之一十即二根之數所得之多三即多三眞數之數葢一百三十以十除之得十三即十多三也設如有九立方少十二平方少五根多六眞數以三平方少二根少三眞數除之問得幾何法以三平方少二根少三眞數除九立方少十二平方少五根得三根以三根乘少三眞數得少九根以三根乘少二根得少六平方以三根乘三平方得九立方與實相減立方恰盡原少十二平方減少六平方餘少六平方原少五根不能減九根轉減之餘多四根又多六眞數復以三平方少二根少三眞數除少六平方多四根多六眞數得少二眞數以少二眞數乘少三眞數得多六眞數以少二眞數乘少二根得多四根以少二眞數乘三平方得少六平方與實相減恰盡無餘是爲三根少二眞數即所求之數也此法葢因平方少根少眞數除立方少平方少根與多眞數故以平方除立方得根以平方除少平方得少眞數且眞數之位下對實中根位故定得數首位爲根又實數之號雖有少有多不同而次位餘實之首數爲少故定得數次位爲少也如以數明之以根爲七則一平方爲四十九一立方爲三百四十三實數九立方得三千零八十七少十二平方得少五百八十八少五根得少三十五多六眞數即多六是爲三千零八十七少五百八十八又少三十五仍多六共爲二千四百七十法數三平方得一百四十七少二根得少十四少三眞數即少三是爲一百四十七少十四又少三共爲一百三十除之所得之二十一即三根之數所得之少二即少二眞數之數葢二千四百七十以一百三十除之得十九即二十一少二也設如有八立方多八平方多二根少四眞數以二平方多三根多二眞數除之問得幾何法以二平方多三根多二眞數除八立方多八平方多二根得四根以四根乘多二眞數得多八根以四根乘多三根得多十二平方以四根乘二平方得八立方與實相減立方恰盡平方與根之減數俱大於原數故皆轉減之餘少四平方少六根又少四眞數復以二平方多三根多二眞數除少四平方少六根少四眞數得少二眞數以少二眞數乘多二眞數得少四眞數以少二眞數乘多三根得少六根以少二眞數乘二平方得少四平方與實相減恰盡無餘是爲四根少二眞數即所求之數也此法葢因平方多根多眞數除立方多平方多根與少眞數故以平方除立方得根以平方除少平方平方原爲多而減餘數變爲少得少眞數且眞數之位下對實中根位故定得數首位爲根又實數之號雖有多有少不同而次位餘實皆變爲少故定得數次位爲少也如以數明之以根爲三則一平方爲九一立方爲二十七實數八立方得二百一十六多八平方得多七十二多二根得多六少四眞數即少四是二百一十六多七十二又多六仍少四共爲二百九十法數二平方得十八多三根得多九多二眞數即多二是十八多九又多二共爲二十九除之所得十二即四根之數所得少二即少二眞數之數葢二百九十以二十九除之得十即十二少二也設如有四三乘方少二立方少四平方多五根少二眞數以二平方少二根多一眞數除之問得幾何法以二平方少二根多一眞數除四三乘方少二立方少四平方得二平方以二平方乘多一眞數得多二平方以二平方乘少二根得少四立方以二平方乘二平方得四三乘方與實相減三乘方恰盡原少二立方不能減少四立方轉減之餘多二立方原少四平方減多二平方故相加爲少六平方仍多五根復以二平方少二根多一眞數除多二立方少六平方多五根得多一根以多一根乘多一眞數得多一根以多一根乘少二根得少二平方以多一根乘二平方得多二立方與實相減立方恰盡原少六平方減少二平方餘少四平方原多五根減多一根餘多四根仍少二眞數又以二平方少二根多一眞數除少四平方多四根少二眞數得少二眞數以少二眞數乘多一眞數得少二眞數以少二眞數乘少二根得多四根以少二眞數乘二平方得少四平方與實相減恰盡無餘是爲二平方多一根少二眞數即所求之數也此法葢因平方少根多眞數除三乘方少立方又少平方仍多根與少眞數故以平方除三乘方得平方以平方除多立方立方原爲少而減餘數變爲多得多根以平方除少平方得少眞數且眞數之位下對實中平方之位故定得數首位爲平方又實數之號雖有多有少不同而次位餘實之首數變爲多三位餘實之首數仍爲少故定得數之次位爲多三位爲少也如以數明之以根爲六則一平方爲三十六一立方爲二百一十六一三乘方爲一千二百九十六實數四三乘方得五千一百八十四少二立方得少四百三十二少四平方得少一百四十四多五根得多三十少二眞數即少二是五千一百八十四少四百三十二又少一百四十四仍多三十復少二共爲四千六百三十六法數二平方得七十二少二根得少十二多一眞數即多一是七十二少十二又多一共爲六十一除之所得七十二即二平方之數所得多六即多一根之數所得少二即少二眞數之數葢四千六百三十六以六十一除之得七十六即七十二多六少二也御製數理精藴下編卷三十一
