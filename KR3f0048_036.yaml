body:
  text: 欽定四庫全書御製數理精藴下編卷三十一末部一借根方比例定位法乘法除加法法減法借根方比例借根方者假借根數方數以求實數之法也凡法必借根借方加減乘除令與未知之數比例齊等而本數以出大意與借衰疊借略同然借衰疊借之法止可以御本部而此法則線面體諸部皆可御之其中有借根借方之不同蓋因根者方之邊數即所謂線以根自乘得平方以根自乘再乘得立方以根纍次乘即得纍次多乘方故以線類為問者則借根數以比之以面類為問者則借平方長方以比之以體類為問者則借立方或纍次多乘方以比之至於借數又有一定之位與降位之法定位降位法俱詳後要之此法設立虛數依所問之比例乘除加減務令根方之數與真數相當適等而所求之數以出此亦借數之巧也定位法衆數之經緯盡歸乘除而乘除之條理又取準於定位况借數一法又用根方諸名一經乘除俱變為幾根幾方之號而本數之比例由此而生其定位與常法稍異故變從簡易設表如左右表前行所列者借數之名後行所列者定數之位其借數者即比例也根與方數俱為相連比例率如根為二則平方為四立方為八以立方與平方之比同於平方與根數之比即為八與四之比同於四與二之比也然必借方借根者何也蓋以巳知未知之數權約為幾根幾方以統御之加減後餘幾根幾方即知真數若干矣如根為二數其平方即為四若餘二平方即知其真數有八或餘二根即知其真數有四也其定位者即視根方所對之位也乘法定位以兩數所對之位數相加其加數所對之方即乘出之方也除法定位以兩數所對之位數相減其減餘數所對之方即除出之方也乘法以真數乘根仍得根蓋根對一而真數對無可加也如以根乘根即得平方蓋根對一一與一相加得二二所對之表為平方故定乘得之數為平方也如以根乘平方即得立方蓋根對一平方對二一二相加得三而三所對之表為立方故定乘得之數為立方也又如以平方乘平方則二與二相加為四查所對之表得三乘方以平方乘立方則二與三相加為五查所對之表得四乘方以立方乘立方則三與三相加為六查所對之表得五乘方餘皆倣此除法以真數除根仍得根蓋根對一而真數對無可減也如以根除根即得真數蓋根對一一與一相減得而所對之表為真數故定除得之數為真數也如以根除平方即得根蓋根對一平方對二一二相減餘一而一所對之表為根故定除得之數為根數也又如以平方除平方則二與二減盡為查所對之表得真數以平方除立方則二與三相減餘一查所對之表得根數以立方除立方則三與三相減得查所對之表亦得真數也餘皆倣此定多少與相同號式凡數有多者用此號一如一平方多二根則如此列之凡數有少者用此號一如一立方少二平方則如此列之凡數有相等者用此號一如二立方與十六相等則如此列之至於數之多少不齊用號各異加減乘除之後有不變者有以多變少以少變多者俱詳於本法加法凡多與多加得數仍為多少與少加得數仍為少多與少加少與多加則反相減為所得數而多數大則得數亦為多少數大則得數亦為少其故何也蓋因多數大少數小以其所多補其所少而其所多者尚有餘也少數大多數小以其所多補其所少而其所少者仍不足也多少之號定而加法不淆矣設如有三平方多四根與二平方多三根相加問得幾何法以三平方與二平方相加得五平方四根與三根相加得七根是為五平方多七根即所求之數也此多與多加得數仍為多也如以數明之以根為二則一平方為四上數三平方得十二多四根得多八是十二多八共二十下數二平方得八多三根得多六是八多六共十四上十二與下八相加得二十即五平方之數上多八與下多六相加得十四即多七根之數蓋上數共二十下數共十四兩數相加得三十四即二十多十四也設如有四立方少一平方與三立方少二平方相加問得幾何法以四立方與三立方相加得七立方一平方與二平方相加得三平方是為七立方少三平方即所求之數也此少與少加得數仍為少也如以數明之以平方為九則一立方為二十七上數四立方得一百零八少一平方得少九是一百零八少九為九十九下數三立方得八十一少二平方得少十八是八十一少十八為六十三上一百零八與下八十一相加得一百八十九即七立方之數上少九與下少十八相加得二十七即少三平方之數蓋上數九十九下數六十三兩數相加得一百六十二即一百八十九少二十七也設如有四平方多四根與二平方少三根相加問得幾何法以四平方與二平方相加得六平方四根與三根相加應得七根今多少兩數不同故於多四根內反減去少三根餘一根因多數大故得數為多是為六平方多一根即所求之數也此多少兩數不同相加所多數大以其所多補足所少而所多仍有餘蓋以上數多四根補足下數少三根仍多一根也如以數明之以根為二則一平方為四上數四平方得十六多四根得多八是十六多八共二十四下數二平方得八少三根得少六是八少六為二上十六與下八相加得二十四即六平方之數上多八補足下少六仍餘二即多一根之數蓋上數二十四下數二兩數相加得二十六即二十四多二也設如有二立方少三平方與一立方多二平方相加問得幾何法以二立方與一立方相加得三立方三平方與二平方相加應得五平方今多少兩數不同故於少三平方內反減去多二平方餘一平方因少數大故得數為少是為三立方少一平方即所求之數也此多少兩數不同相加所少數大以其所多補其所少而所少仍不足蓋於上數少三平方內增入下數多二平方仍少一平方也如以數明之以平方為九則一立方為二十七上數二立方得五十四少三平方得少二十七是五十四少二十七為二十七下數一立方得二十七多二平方得多十八是二十七多十八共四十五上五十四與下二十七相加得八十一即三立方之數上少二十七內增入下多十八仍少九即少一平方之數蓋上數二十七下數四十五兩數相加得七十二即八十一少九也設如有二立方多三平方少四根與一立方多二平方少三根相加問得幾何法以二立方與一立方相加得三立方三平方與二平方相加得五平方四根與三根相加得七根是為三立方多五平方少七根即所求之數也此三位相加多少各自相同故多與多加仍為多少與少加仍為少也如以數明之以根為二則一平方為四一立方為八上數二立方得十六多三平方得多十二少四根得少八是十六多十二又少八為二十下數一立方得八多二平方得多八少三根得少六是八多八又少六為十上十六與下八相加得二十四即三立方之數上多十二與下多八相加得二十即多五平方之數上少八與下少六相加得十四即少七根之數蓋上數二十下數十兩數相加得三十即二十四多二十又少十四也設如有四立方多三平方少二根多五真數與五立方少一平方多三根少二真數相加問得幾何法以四立方與五立方相加得九立方多三平方與少一平方相減餘二平方多數大故為多少二根與多三根相減餘一根多數大故為多多五真數與少二真數相減餘三真數多數大故為多是為九立方多二平方多一根多三真數即所求之數也此四位相加而多少各自不同須各以所多補足所少故相減所餘為所得數也如以數明之以根為二則一平方為四一立方為八上數四立方得三十二多三平方得多十二少二根得少四又多真數五是三十二多十二少四又多五為四十五下數五立方得四十少一平方得少四多三根得多六又少真數二是四十少四多六又少二為四十上三十二與下四十相加得七十二即九立方之數上多十二補足下少四仍餘八即多二平方之數上少四增入下多六反多二即多一根之數上多五補足下少二仍餘三即多三真數蓋上數四十五下數四十兩數相加得八十五即七十二多八又多二又多三也設如有一立方多三根與一平方少一根相加問得幾何法以一立方與一平方相加得一立方多一平方多三根與少一根相減餘二根多數大故為多是為一立方多一平方多二根即所求之數也此相加兩數位分不同須各按位列號補足位分始不相淆今上層無平方位而下層却有平方位故上層列一空平方位以補之凡法皆當如此也如以數明之以根為三則一平方為九一立方為二十七上數一立方得二十七多三根得多九是二十七多九共三十六下數一平方得九少一根得少三是九少三為六上二十七與下無可加仍得二十七即一立方之數下九與上空位亦無可加仍得九即一平方之數上多九補足下少三仍餘六即多二根之數蓋上數三十六下數六兩數相加得四十二即二十七多九又多六也減法凡多與多減原數大於減數則減餘仍為多少與少減原數大於減數則減餘仍為少若多與多減減數大於原數則反減而減餘即變為少蓋減數之所多既大於原數之所多則原數之所多內減盡與原數之所多相等之數仍須於原數之整分內多減去所大之幾何則所餘之整分內即少幾何矣若少與少減減數大於原數則反減而減餘即變為多蓋減數之所少既大於原數之所少則原數之所少內減盡與原數之所少相等之數仍須於原數之整分內少減所大之幾何故所餘之整分內即多幾何矣至於多與少減少與多減則反相加為減餘數而原數多則減餘仍為多原數少則減餘仍為少其故何也蓋因原數多減數少則原數已多在彼而減數又少於此是所餘益多也原數少減數多則原數已少在彼而減數又多於此是所餘益少也多少之號明而減法不淆矣設如有四平方多五根內減二平方多二根問所餘幾何法以四平方減二平方餘二平方五根減二根餘三根是為二平方多三根即所求之數也此多與多減原數大於減數故減餘仍為多也如以數明之以根為三則一平方為九上數四平方得三十六多五根得多十五是三十六多十五共五十一下數二平方得十八多二根得多六是十八多六共二十四上三十六內減下十八餘十八即二平方之數上十五內減下六餘九即三根之數蓋上數共五十一下數共二十四兩數相減餘二十七即十八多九也設如有四立方少三平方內減三立方少二平方問所餘幾何法以四立方減三立方餘一立方三平方減二平方餘一平方是為一立方少一平方即所求之數也此少與少減原數大於減數故減餘仍為少也如以數明之以平方為九則一立方為二十七上數四立方得一百零八少三平方得少二十七是一百零八少二十七為八十一下數三立方得八十一少二平方得少十八是八十一少十八為六十三上一百零八內減下八十一餘二十七即一立方之數上二十七內減下十八餘九即少一平方之數蓋上數八十一下數六十三兩數相減餘十八即二十七少九也設如有七平方多三根內減四平方多五根問所餘幾何法以七平方減四平方餘三平方三根內不能減五根乃於下數多五根內反減上數多三根餘二根即變為少是為三平方少二根即所求之數也此多與多減減數大於原數故反減而減餘即變為少蓋原數多三根減數多五根是減數比原數大二根如於原數三根內減去減數三根則減數仍餘二根此二根必須於原數平方內減之原數既多減二根則餘數即少二根也如以數明之以根為三則一平方為九上數七平方得六十三多三根得多九是六十三多九共七十二下數四平方得三十六多五根得多十五是三十六多十五共五十一上六十三內減下三十六餘二十七即三平方之數下十五內反減上九餘六即少二根之數蓋上數共七十二下數共五十一兩數相減餘二十一即二十七少六也設如有六平方少三根內減二平方少四根問所餘幾何法以六平方減二平方餘四平方三根內不能減四根乃於下數少四根內反減上數少三根餘一根即變為多是為四平方多一根即所求之數也此少與少減減數大於原數故反減而減餘即變為多蓋原數少三根減數少四根是減數比原數大一根如於原數三根內減去減數三根則減數仍餘一根此一根係原數平方內所少減之一根原數既少減一根則餘數即多一根也如以數明之以根為四則一平方為十六上數六平方得九十六少三根得少十二是九十六少十二為八十四下數二平方得三十二少四根得少十六是三十二少十六為十六上九十六內減下三十二餘六十四即四平方之數下十六反減上十二餘四即多一根之數蓋上數八十四下數十六兩數相減餘六十八即六十四多四也設如有三平方多四根內減二平方少一根問所餘幾何法以三平方減二平方餘一平方四根減一根應餘三根今多少兩數不同故反相加得五根因原數多故得數仍為多是為一平方多五根即所求之數也此多少兩數不同相減原數多減數少原數已多而減數又少則所餘者愈多蓋原數多四根減數少一根是原數比減數已多五根故減餘即為多五根也如以數明之以根為四則一平方為十六上數三平方得四十八多四根得多十六是四十八多十六共六十四下數二平方得三十二少一根得少四是三十二少四為二十八上四十八內減下三十二餘十六即一平方之數上多十六加下少四得二十即多五根之數蓋上數六十四下數二十八兩數相減餘三十六即十六多二十也設如有五平方少二根內減三平方多三根問所餘幾何法以五平方減三平方餘二平方二根不能減三根且多少兩數不同故反相加得五根因原數少故得數仍為少是為二平方少五根即所求之數也此多少兩數不同相減原數少減數多原數已少減數又多則所餘者愈少蓋原數少二根減數多三根是原數比減數已少五根故減餘即為少五根也如以數明之以根為五則一平方為二十五上數五平方得一百二十五少二根得少十是一百二十五少十為一百一十五下數三平方得七十五多三根得多十五是七十五多十五共九十上一百二十五內減下七十五餘五十即二平方之數上少十加下多十五得二十五即少五根之數蓋上數一百一十五下數九十兩數相減餘二十五即五十少二十五也設如有四立方多六平方內減二立方多三平方多三根問所餘幾何法以四立方減二立方餘二立方六平方減三平方再減三根餘三平方少三根是為二立方多三平方少三根即所求之數也此相減兩數位分不同須各按位列號補足位分始不相淆今上層無根位而下層却有根位故上層作一空根位以補之是原根位無數而減數多三根故所餘即少三根也如以數明之以根為二則一平方為四一立方為八上數四立方得三十二多六平方得多二十四是三十二多二十四共五十六下數二立方得十六多三平方得多十二多三根得多六是十六多十二又多六為三十四上三十二內減下十六餘十六即二立方之數上二十四內減下十二餘十二即三平方之數下六無可減仍為六即少三根之數蓋上數五十六下數三十四兩數相減餘二十二即十六多十二又少六也設如有五立方多四平方多三根少八真數內減四立方多二平方多二根少九真數問所餘幾何法以五立方減四立方餘一立方四平方減二平方餘二平方多與多減原數大故為多多三根減二根餘一根多與多減原數大故為多八真數不能減九真數乃於下數少九內反減上數少八餘一即變為多是為一立方多二平方多一根多一真數即所求之數也如以數明之以根為三則一平方為九一立方為二十七上數五立方得一百三十五多四平方得多三十六多三根得多九又少真數八是一百三十五多三十六又多九又少八為一百七十二下數四立方得一百零八多二平方得多十八多二根得多六又少真數九是一百零八多十八又多六又少九為一百二十三上一百三十五內減下一百零八餘二十七即一立方之數上三十六內減下十八餘十八即多二平方之數上九內減下六餘三即多一根之數下九反減上八餘一即多一真數蓋上數一百七十二下數一百二十三兩數相減餘四十九即二十七多十八又多三又多一也設如有二立方多三根內減一平方少一根問所餘幾何法以二立方減一平方餘二立方少一平方三根減一根應餘二根今多少兩數不同故反相加得四根因原數多故得數仍為多是為二立方少一平方多四根即所求之數也如以數明之以根為三則一平方為九一立方為二十七上數二立方得五十四多三根得多九是五十四多九共六十三下數一平方得九少一根得少三是九少三為六上五十四無可減仍為五十四即二立方之數下九無可減仍為九即少一平方之數上多九與下少三相加得十二即多四根之數蓋上數六十三下數六兩數相減餘五十七即五十四少九又多十二也乘法凡乘法各按位分上下橫列自末位起逐位遍乘與常法同其書乘出之數以類相從如乘出之數為根俱書於根之下乘出之數為平方俱書於平方之下皆依定位表例其定多少之號則臨期互有轉移蓋法實俱止一位者其乘出之數為多不必言矣法實不止一位俱係多者如幾平方多幾根或幾根多幾真數又或幾平方多幾根又多幾真數之類其乘出之數亦俱為多蓋以多乘多則多者益多也法實兩數俱係少者其為首一位已係整數為多如幾平方少幾根或幾根少幾真數或幾平方少幾根又少幾真數之類故乘出之數則有多少之分如為首一位相乘係多與多乘其乘出之數為多而次位為少者與首位乘是為少與多乘或首位與次位為少者乘是為多與少乘則其乘出之數俱為少蓋少與多乘多與少乘則少者益少而得數固少也如幾平方少幾根與幾真數相乘以真數乘平方即為多與多乘以真數乘根即為多與少乘也至於少與少乘其乘出之數反變為多如幾立方少幾平方與幾根少幾真數相乘以真數乘平方即為少與少乘也其故何也蓋法實首位為多次位以後為少則乘出之數首位內少次位之數必多末位之數須於乘出首位數中減去次位之數加入末位之數始與實數相合除首位上下兩整數相乘以後次位皆係少與少乘為多而次位對首位乘必為少與多乘或多與少乘則此兩數俱為少合之為首位數內少次位之數而多末位之數蓋因次位所少數內有兩分末位之數首位數內減去次位之全數即如多減去一末位之數倘能於次位數中先減去末位數然後再於首位數中減之始與實數相合今次位數中既不能先減去末位數故轉於首位數中減去次位數反加入一末位數也所謂減者即少數所謂加者即多數多少之分既定則依加法相加即為所得之數也設如有三根多二真數以三真數乘之問得幾何法以三真數乘二真數得多六真數以多與多乘故為多也又几以真數乘根方之數其位皆不變如以真數乘真數仍得真數以真數乘根仍得根蓋定位表中真數之位為於根方之位無所加也以三真數乘三根得多九根是為九根多六真數即所求之數也如以數明之以根為四則上數三根得十二多二真數共得十四以下真數三乘之所得三十六即九根之數所得多六即多六真數蓋以下數三與上數十四相乘得四十二即三十六多六也設如有四根多二真數以二根多三真數乘之問得幾何法以多三真數乘多二真數得多六真數以多三真數乘四根得多十二根又以二根乘多二真數得多四根以二根乘四根得八平方以根與根乘即得平方蓋根所對之位為一以一加一為二即平方所對之位故得數定為平方相加得八平方多一十六根又多六真數即所求之數也如圖甲乙為四根乙丙為多二真數甲丁為二根丁戊為多三真數以甲丙四根多二真數與甲戊二根多三真數相乘成甲戊己丙長方形其甲丁庚乙長方形即八平方其乙庚辛丙與丁戊壬庚二長方形即所多十六根其庚壬己辛長方形即所多六真數也如以數明之以根為四則一平方為十六上數四根得十六多二真數共得十八下數二根得八多三真數共得十一相乘所得一百二十八即八平方之數所得多六十四即多十六根之數所得多六即多六真數蓋以下數十一與上數十八相乘得一百九十八即一百二十八多六十四又多六也設如有二平方多三根以二根多四真數乘之問得幾何法因上層無真數位故列一空位以補之以多四真數乘空真數仍為空以多四真數乘多三根得多十二根以多四真數乘二平方得多八平方以二根乘空真數仍為空以二根乘多三根得多六平方以二根乘二平方得四立方以根乘平方即得立方蓋根所對之位為一平方所對之位為二以一加二得三即立方所對之位也相加得四立方多十四平方又多十二根即所求之數也此相乘兩數位分不同須各按位列號補足位分始不相淆凡法皆當如此如圖甲乙丙丁為二平方丁丙戊己為多三根庚辛為二根戊庚為多四真數以甲乙戊己二平方多三根與戊辛二根多四真數相乘成乙己辛癸扁方體其丙己庚子十二根即四真數乘三根之數其甲乙丙丁子丑八平方即四真數乘二平方之數其子寅庚辛壬卯六平方即二根乘三根之數其丑子卯癸四立方即二根乘二平方之數也如以數明之以根為五則一平方為二十五一立方為一百二十五上數二平方得五十多三根得多十五共得六十五下數二根得一十多四真數共得十四相乘所得五百即四立方之數所得多三百五十即多十四平方之數所得多六十即多十二根之數蓋以下數十四與上數六十五相乘得九百一十即五百多三百五十又多六十也設如有二根少四真數以一根多三真數乘之問得幾何法以多三真數乘少四真數得少十二真數多與少乘故為少以多三真數乘二根得多六根凡為首一位皆為多而數前無號者亦即為多今以多三真數與多二根相乘故其得數仍為多又以一根乘少四真數得少四根以多與少乘故為少以一根乘二根得二平方相加得二平方多二根少十二真數即所求之數也如圖甲乙為二根丙乙為少四真數甲丁為一根丁戊為多三真數以甲乙二根少四真數與甲戊一根多三真數相乘成甲戊己乙長方形其庚壬己辛長方形即多三真數乘少四真數之十二真數丁戊己辛長方形即多三真數乘二根之六根丙庚辛乙長方形即一根乘少四真數之四根甲丁辛乙長方形即一根乘二根之二平方合之為甲丁辛乙二平方而少丙庚辛乙之四根又多丁戊己辛之六根而少庚壬己辛之十二真數今以丁戊己辛之多六根少十二真數補丙庚辛乙之少四根仍多二根而少十二真數也如以數明之以根為六則一平方為三十六上數二根得十二少四真數則餘八下數一根得六多三真數共得九相乘所得七十二即二平方之數所得多十二即多二根之數所得少十二即少十二真數之數蓋以下數九與上數八相乘得七十二即七十二多十二又少十二也設如有一根少一真數以一根少二真數乘之