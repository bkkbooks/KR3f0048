body:
  text: 欽定四庫全書御製數理精藴下編卷二十七體部五各等面體各等面體設如四面體每邊一尺二寸求積幾何法以每邊一尺二寸為弦每邊折半得六寸為勾求得股一尺零三分九釐二豪三絲零四微有餘為每一面之中垂線與每邊一尺二寸相乘折半得六十二寸三十五分三十八釐二十四豪有餘為每一面之面積又以每邊一尺二寸為弦每一面之中垂線取其三分之二得六寸九分二釐八豪二絲零二微有餘為勾求得股九寸七分九釐七豪九絲五忽九微有餘為四面體自尖至底中心之立垂線或以每一面之中垂線一尺零三分九釐二豪三絲零四微有餘為弦每一面之中垂線取其三分之一得三寸四分六釐四豪一絲零一微有餘為勾亦得股九寸七分九釐七豪九絲五忽八微有餘為四面體自尖至底之中之立垂線以此立垂線與每一面之面積六十二寸三十五分三十八釐二十四豪有餘相乘三歸之得二百零三寸六百四十六分七百三十七釐有餘即四面體之積也如圗甲乙丙丁四面體其稜六角四平鋪之則面亦四各成一等邊三角形試以乙丙丁之一面為底以乙丙一邊為弦丁丙一邊折半得戊丙為勾求得乙戊股與甲戊等即每一面之中垂線與丁丙一邊相乘折半得乙丙丁底面積又以甲丙一邊為弦己丙中垂線之三分之二為勾求得甲己股為自尖至底中心之立垂線或以甲戊每一面之中垂線為弦己戊中垂線之三分之一為勾亦得甲己股為自尖至底中心之立垂線乃以甲己立垂線與乙丙丁底面積相乘三歸之即得甲乙丙丁四面體之積也又求自尖至底中心之立垂線捷法以每邊一尺二寸自乘得一尺四十四寸三歸二因得九十六寸開平方得九寸七分九釐七豪九絲五忽八微有餘即自尖至底中心之立垂線也此法蓋因甲丙為弦戊丙為勾求得甲戊股則甲戊自乘方為甲丙自乘方之四分之三見等邊三角形求中垂線法又甲戊為弦己戊為勾求得甲己股則甲己自乘方為甲戊自乘方之九分之八己戊為甲戊三分之一則甲戊自乘方為九分己戊自乘方為一分甲己自乘方為八分甲戊自乘方既為甲丙自乘方四分之三今命甲戊自乘方為甲丙自乘方十二分之九而甲己自乘方又為甲戊自乘方九分之八則甲己自乘方必為甲丙自乘方十二分之八即三分之二故以一邊自乘三歸二因得甲己自乘方積而開方得甲己為立垂線之髙數也又用知一邊求髙數之定率比例求自尖至底中心之立垂線以定率之四面體之每邊一為一率四面體之立垂線八一六四九六五八為二率今所設之四面體之每邊一尺二寸為三率求得四率九寸七分九釐七豪九絲五忽八微有餘即四面體自尖至底中心之立垂線也又用邊線相等體積不同之定率比例以定率之正方體積一為一率四面體積一一七八五一一二九為二率今所設之四面體之每邊一尺二寸自乘再乘得一尺七百二十八寸為三率求得四率二百零三寸六百四十六分七百五十釐有餘即四面體之積也蓋四面體之每一邊為一則其自乘再乘之正方體積為一而四面體之每一邊一所得之四面體積為一一七八五一一二九故以子丑寅卯四面體之每邊一尺自乘再乘之辰巳午未正方體積一與子丑寅卯四面體積一一七八五一一二九之比即同於今所設之甲乙丙丁四面體之每邊一尺二寸自乘再乘之戊己庚辛正方體積一尺七百二十八寸與今所得之甲乙丙丁四面體積二百零三寸六百四十六分七百五十釐有餘之比也又用體積相等邊線不同之定率比例以定率之四面體之每邊二三九六四八九為一率正方體之每邊一為二率今所設之四面體之每邊一尺二寸為三率求得四率五寸八分八釐三豪三絲六忽五微有餘為與四面體積相等之正方體每邊之數自乘再乘得二百零三寸六百四十六分七百釐有餘即四面體之積也蓋四面體之每邊為二三九六四八九正方體之每邊為一則兩體積相等故以子丑寅卯四面體之每邊二三九六四八九與辰巳午未正方體之每邊一之比即同於今所設之甲乙丙丁四面體之每邊一尺二寸與今所得之戊己庚辛正方體之每邊五寸八分八釐三豪三絲六忽五微有餘之比既得一邊自乘再乘得戊己庚辛正方體積即與甲乙丙丁四面體之積為相等也如有四面體積二百零三寸六百四十六分七百五十釐求每邊之數則用邊線相等體積不同之定率比例以定率之四面體積一一七八五一一二九為一率正方體積一為二率今所設之四面體積二百零三寸六百四十六分七百五十釐為三率求得四率一尺七百二十八寸開立方得一尺二寸即四面體之每一邊也此法蓋因四面體之每邊與正方體之每邊相等四面體積與正方體積不同故先定為體與體之比例既得正方體積而後開立方得線也又法用體積相等邊線不同之定率比例以定率之正方體之每邊一為一率四面體之每邊二三九六四八九為二率今所設之四面體積二百零三寸六百四十六分七百五十釐開立方得五寸八分八釐三豪三絲六忽五微有餘為三率求得四率一尺二寸即四面體之每一邊也此法蓋因四面體積與正方體積相等四面體之每邊與正方體之每邊不同故以四面體積先開立方得正方體之每邊而後為線與線之比例也設如八面體每邊一尺二寸求積幾何法以八面體分作二尖方體算之將每邊一尺二寸自乘得一尺四十四寸為二尖方體之共底面積又以每邊自乘之一尺四十四寸倍之得二尺八十八寸開平方得一尺六寸九分七釐零五絲六忽二微有餘為二尖方體之共髙即八面體之對角斜線以此斜線與二尖方體之共底面積一尺四十四寸相乘三歸之得八百一十四寸五百八十六分九百七十六釐有餘即八面體之積也如圖甲乙丙丁戊己八面體其稜十二角六平鋪之則面為八各成一等邊三角形自體正中對四角平分截之則成甲乙己丁戊丙乙戊丁己二尖方體甲丙為二尖方體之共髙即甲乙丙丁正方形之對角斜線故以戊乙一邊自乘得戊乙己丁正方面積為二尖方體之共底又以戊乙己丁正方面積倍之開平方即如甲乙為勾乙丙為股各自乘相併開方得甲丙弦為八面體之對角斜線即二尖方體之共髙以此共髙與戊乙己丁二尖方體之底面積相乘三歸之得二尖方體積即八面體之總積也又用邊線相等體積不同之定率比例以定率之正方體積一為一率八面體積四七一四四五二一為二率今所設之八面體之每邊一尺二寸自乘再乘得一尺七百二十八寸為三率求得四率八百一十四寸五百八十七分一十二釐有餘即八面體之積也蓋八面體之每一邊為一則其自乘再乘之正方體積為一而八面體之每一邊一所得之八面體積為四七一四四五二一故以子丑寅卯辰已八面體之每邊一尺自乘再乘之午未申酉正方體積一與子丑寅卯辰己八面體積四七一四四五二一之比即同於今所設之甲乙丙丁戊己八面體之每邊一尺二寸自乘再乘之庚辛壬癸正方體積一尺七百二十八寸與今所得之甲乙丙丁戊己八面體積八百一十四寸五百八十七分一十二釐有餘之比也又用體積相等邊線不同之定率比例以定率之八面體之每邊一二八四八九八二九為一率正方體之每邊一為二率今所設之八面體之每邊一尺二寸為三率求得四率九寸三分三釐九豪二絲六忽有餘為與八面體積相等之正方體每邊之數自乘再乘得八百一十四寸五百八十六分八百五十六釐有餘即八面體之積也蓋八面體之每邊為一二八四八九八二九正方體之每邊為一則兩體積相等故以子丑寅卯辰己八面體之每邊一二八四八九八二九與午未申酉正方體之每邊一之比即同於今所設之甲乙丙丁戊己八面體之每邊一尺二寸與今所得之庚辛壬癸正方體之每邊九寸三分三釐九豪二絲六忽有餘之比既得一邊自乘再乘得庚辛壬癸正方體積即與甲乙丙丁戊己八面體之積為相等也如有八面體積八百一十四寸五百八十七分一十二釐求每邊之數則用邊線相等體積不同之定率比例以定率之八面體積四七一四四五二一為一率正方體積一為二率今所設之八面體積八百一十四寸五百八十七分一十二釐為三率求得四率一尺七百二十八寸開立方得一尺二寸即八面體之每一邊也此法蓋因八面體之每邊與正方體之每邊相等八面體積與正方體積不同故先定為體與體之比例既得正方體積而後開立方得線也又法用體積相等邊線不同之定率比例以定率之正方體之每邊一為一率八面體之每邊一二八四八九八二九為二率今所設之八面體積八百一十四寸五百八十七分一十二釐開立方得九寸三分三釐九豪二絲六忽有餘為三率求得四率一尺二寸即八面體之每一邊也此法蓋因八面體積與正方體積相等八面體之每邊與正方體之每邊不同故以八面體積先開立方得正方體之每邊而後為線與線之比例也設如十二面體每邊一尺二寸求積幾何法以十二面體分作十二五角尖體算之將每邊一尺二寸求得五等邊形之分角線為一尺零二分零七豪八絲零九微有餘自中心至每邊之垂線為八寸二分五釐八豪二絲九忽一微有餘面積為二尺四十七寸七十四分八十七釐三十豪有餘乃用理分中末線之大分六一八三三九九為一率全分一為二率今所設之每邊一尺二寸為三率求得四率一尺九寸四分一釐六豪四絲零七微有餘為每一面兩角相對之斜線又用理分中末線之大分六一八三三九九為一率全分一為二率今所得之每一面兩角相對之斜線折半得九寸七分零八豪二絲零三微有餘為三率求得四率一尺五寸七分零八豪二絲零二微有餘為十二面體之中心至每邊正中之斜線乃以此斜線為弦每一面中心至邊之垂線八寸二分五釐八豪二絲九忽一微有餘為勾求得股一尺三寸三分六釐二豪一絲九忽六微有餘為十二面體之中心至每一面中心之立垂線爰以此立垂線與每一面積二尺四十七寸七十四分八十七釐三十豪有餘相乘三歸之得一尺一百零三寸四百八十九分零二十九釐有餘為一五角尖體積十二因之得一十三尺二百四十一寸八百六十八分三百四十八釐有餘即十二面體之總積也如圖甲乙丙丁戊十二面體其稜三十角二十平鋪之則面十二各成一等邊五角形先求得己庚辛壬癸五等邊形之子已類分角線又求得子丑自中心至每邊之垂線復求得己庚辛壬癸五等邊形之面積次以辛壬一邊為大分己辛兩角相對斜線為全分故辛壬與己辛之比同於理分中末線之大分與全分之比而得兩角相對之斜線又自十二面體之正中截之則成十等邊之面形而其所截之處皆正當每邊之一半故其所截之寅卯等線亦為乙丙兩角相對斜線與己辛等之一半而為十等邊形之一邊故寅卯與辰寅之比又同於理分中末線之大分與全分之比而得十二面體之中心至每邊正中之斜線乃以辰寅斜線為弦每面中心至每邉之子丑垂線為勾求得辰子股即十二面體中心至每面中心之立垂線以此辰子立垂線與己庚辛壬癸一面積相乘三歸之得辰巳庚辛壬癸一五角尖體積十二因之即得甲乙丙丁戊十二面體之總積也又用邉線相等體積不同之定率比例以定率之正方體積一為一率十二面體積七六六三一一八九三為二率今所設之十二面體之每邉一尺二寸自乘再乘得一尺七百二十八寸為三率求得四率一十三尺二百四十一寸八百六十九分四百六十四釐有餘即十二面體之積也蓋十二面體之每一邉為一則其自乘再乘之正方體積為一而十二面體之每一邉一所得之十二面體積為七六六三一一八九三故以子丑寅邜辰十二面體之每邉一尺自乘再乘之巳午未申正方體積一與子丑寅邜辰十二面體積七六六三一一八九三之比即同於今所設之甲乙丙丁戊十二面體之每邉一尺二寸自乘再乘之巳庚辛壬正方體積一尺七百二十八寸與今所得之甲乙丙丁戊十二面體積一十三尺二百四十一寸八百六十九分四百六十四釐有餘之比也又用體積相等邉線不同之定率比例以定率之十二面體之每邉五七二二三七為一率正方體之每邉一為二率今所設之十二面體之每邉一尺二寸為三率求得四率二尺三寸六分五釐八豪二絲七忽六微有餘為與十二面體積相等之正方體每邉之數自乘再乘得一十三尺二百四十一寸八百六十八分八百四十八釐有餘即十二面體之積也蓋十二面體之每邉為五七二二二七正方體之每邉為一則兩體積相等故以子丑寅邜辰十二面體之每邉五七二二二七與巳午未申正方體之每邉一之比即同於今所設之甲乙丙丁戊十二面體之每邉一尺二寸與今所得之己庚辛壬正方體之每邉二尺三寸六分五釐八豪二絲七忽六微有餘之比既得一邉自乘再乘得己庚辛壬正方體積即與甲乙丙丁戊十二面體之積為相等也如有十二面體積一十三尺二百四十一寸八百六十九分四百六十四釐求每邉之數則用邉線相等體積不同之定率比例以定率之十二面體積七六六三一一八九三為一率正方體積一為二率今所設之十二面體積一十三尺二百四十一寸八百六十九分四百六十四釐為三率求得四率一尺七百二十八寸開立方得一尺二寸即十二面體之每一邉也此法蓋因十二面體之每邉與正方體之每邉相等十二面體積與正方體積不同故先定為體與體之比例既得正方體積而後開立方得線也又法用體積相等邉線不同之定率比例以定率之正方體之每邉一為一率十二面體之每邉五七二二二七為二率今所設之十二面體積一十三尺二百四十一寸八百六十九分四百六十四釐開立方得二尺三寸六分五釐八豪二絲七忽六微有餘為三率求得四率一尺二寸即十二面體之每一邉也此法蓋因十二面體積與正方體積相等十二面體之每邉與正方體之每邉不同故以十二面體積先開立方得正方體之每邉而後為線與線之比例也設如二十面體每邉一尺二寸求積幾何法以二十面體分作二十三角尖體算之將每邉一尺二寸求得三等邉形之分角線為六寸九分二釐八豪二絲零二微有餘自中心至每邉之垂線為三寸四分六釐四豪一絲零一微有餘面積為六十二寸三十五分三十八釐二十四豪有餘乃用理分中末線之大分六一八三三九九為一率全分一為二率今所設之每邉一尺二寸折半得六寸為三率求得四率九寸七分零八豪二絲零三微有餘為二十面體之中心至每邉正中之斜線乃以此斜線為弦每一面中心至邉之垂線三寸四分六釐四豪一絲零一微有餘為勾求得股九寸零六釐九豪一絲三忽五微有餘為二十面體之中心至每一面中心之立垂線爰以此立垂線與每一面積六十二寸三十五分三十八釐二十四豪有餘相乘三歸之得一百八十八寸四百九十八分四百一十五釐有餘為一三角尖體積二十因之得三尺七百六十九寸九百六十八分三百釐有餘即二十面體之總積也如圗甲乙丙丁戊二十面體其稜三十角十二平鋪之則面二十各成一等邉三角形先求得己丙丁三等邉形之己庚類分角線又求得庚辛自中心至每邉之垂線復求得巳丙丁三等邉形之面積次自二十面體之正中截之則成十等邉之面形而其所截之處皆正當每邉之一半故其所截之壬癸等線亦為乙丙每邉之一半而為十等邉形之一邉故壬癸與子壬之比同於理分中末線之大分與全分之比而得二十面體之中心至每邉正中之斜線乃以子壬斜線為弦每面中心至每邉之庚辛垂線為勾求得子庚股即二十面體中心至每面中心之立垂線以此子庚立垂線與己丙丁一面積相乘三歸之得子己丙丁一三角尖體積二十因之即得甲乙丙丁戊二十面體之總積也又用邉線相等體積不同之定率比例以定率之正方體積一為一率二十面體積二一八一六九四九六九為二率今所設之二十面體之每邉一尺二寸自乘再乘得一尺七百二十八寸為三率求得四率三尺七百六十九寸九百六十八分九百零六釐有餘即二十面體之積也蓋二十面體之每一邉為一則其自乘再乘之正方體積為一而二十面體之每一邉一所得之二十面體積為二一八一六九四九六九故以子丑寅邜辰巳二十面體之每邉一尺自乘再乘之午未申酉正方體積一與子丑寅邜辰巳二十面體積二一八一六九四九六九之比即同於今所設之甲乙丙丁戊己二十面體之每邉一尺二寸自乘再乘之庚辛壬癸正方體積一尺七百二十八寸與今所得之甲乙丙丁戊己二十面體積三尺七百六十九寸九百六十八分九百零六釐有餘之比也又用體積相等邉線不同之定率比例以定率之二十面體之每邉七七一二五三四為一率正方體之每邉一為二率今所設之二十面體之每邉一尺二寸為三率求得四率一尺五寸五分六釐三豪六絲九忽有餘為與二十面體積相等之正方體每邉之數自乘再乘得三尺七百六十九寸九百六十八分四百四十九釐有餘即二十面體之積也蓋二十面體之每邉為七七一二五三四正方體之每邉為一則兩體積相等故以子丑寅邜辰巳二十面體之每邉七七一