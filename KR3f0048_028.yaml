body:
  text: 欽定四庫全書御製數理精藴下編卷二十三體部一立方立方立方者等邊六面之體積也以形而言雖為六面十二邊之所合以積而言則為自乗再乗之數因其縱横與髙俱相等故十二邊皆如一線得其一邊而十二邊莫不相同其積之也自線而面自面而體次第相乗而後得其全積其開之也必次第析之而後得其一邊是故古人立為方廉長廉之制每積三位而得邊之一位所謂一千商十定無疑三萬纔為三十餘九十九萬不離十百萬方為一百推是也其法先從一角而剖其體以自一至九自乗再乗之數為方根與實相審量其足減者而定之是為初商初商減盡無餘則方根止一位若有餘實即初商方積外别成一缺角三面磬折體其附初商之三面者謂之方廉其附初商之三邊者謂之長廉其附初商之角者謂之隅廉有三故以三為廉法隅惟一而隅之三面即符於三長廉之端合三方廉三長廉一隅始合次商之數故商除之法以初商自乗三因為三方廉面積視初商餘實足方廉面積幾倍即定為次商乃以次商乗三長廉為三長廉面積又以次商自乗為小隅面積共合三方廉三長廉及一小隅面積以次商數乗之為次商廉隅之共積所謂初商方積外别成一缺角三面磬折體者是也如次商外尚有不盡之實則初商次商方積外仍為三方廉三長廉一小隅又成一三面磬折體但較前方廉愈大長廉愈長而隅愈小耳凡有幾層廉隅俱照次商之例逓析之實盡而止如開至多位實仍不盡者必非自乗再乗之正數此開立方之定法也體形不一而容積皆以立方為準故立方為算諸體之本諸體必通之立方而法乃可施也設如正方體積一百二十五尺開立方問毎一邊數幾何法列正方體積一百二十五尺自末位起算每方積三位定方邊一位今積止有三位則於五尺上作記定單位以自一至九自乗再乗之方根數與之相審知與五尺自乗再乗之數恰合乃以五尺書於方積五尺之上而以五尺自乗再乗之一百二十五尺書於方積原數之下相減恰盡即得開方之數為五尺也如圖甲乙丙丁戊己正方體形毎邊皆五尺其中函一尺小方體一百二十五自邊計之為五尺自面計之則為五尺自乗之二十五尺自通體計之則為五尺自乗再乗之一百二十五尺以積開之則與五尺自乗再乗之數相準故商除之恰盡也蓋方積為三位是以方邊止一位方積即五尺自乗再乗之數别無廉隅故不用次商如有餘實則自成廉隅而用次商矣設如正方體積一丈七百二十八尺開立方問每一邊數幾何法列正方體積一丈七百二十八尺自末位起算每方積三位定方邊一位故隔二位作記即於八尺上定尺位一丈上定丈位其一丈為初商積與一丈自乗再乗之數相合即定初商為一丈書於方積一丈之上而以一丈自乗再乗之一丈書於初商積之下相減恰盡爰以方邊末位餘積七百二十八尺續書於下大凡以餘積續書於下者每取方積之三位以當方邊之一位也為次商廉隅之共積乃以初商之一丈作一十尺自乗得一百尺三因之得三百尺為次商三方廉面積以除方積七百二十八尺足二尺即定次商為二尺書於方積八尺之上而以初商之一十尺與次商之二尺相乗得二十尺三因之得六十尺為次商三長廉面積復以次商二尺自乗得四尺為次商一小隅面積合三方廉三長廉一小隅面積共得三百六十四尺為廉隅共法書於餘積之左以次商之二尺乗之得七百二十八尺與餘積相減恰盡是開得一丈二尺為正方體積每一邊之數也如圖甲乙丙丁正方體形毎邊皆一丈二尺其中函積一丈七百二十八尺是為共積其先從一角所分戊乙庚己方體每邊一丈即初商數其中函積亦一丈即初商自乗再乗之數所餘辛形壬形癸形三方體為三方廉其每邊一丈即初商數其厚二尺即次商數而子形丑形寅形三長方體為三長廉其每邊一丈亦即初商數其闊其厚皆二尺亦即次商數方廉有三故三倍初商之自乗為廉法以定次商其卯形一小正方體為隅其長與闊與厚皆同為二尺亦即次商數故以次商為隅法合辛壬癸三方廉子丑寅三長廉夘一方隅而成一磬折體形附於初商自乗再乗之方體三面而成一甲乙丙丁之總正方體積此立方廉隅之法所由生也三商以後皆倣此逓析開之又法列積一丈七百二十八尺自末位起算作記定位同前乃截一丈為初商積與一丈自乗再乗之數相合則定初商為一丈書於方積一丈之上而以一丈自乗再乗之一丈書於初商積之下相減恰盡乃以方邊末位餘積七百二十八尺續書於下為次商廉隅之共積而以初商之一丈作一十尺自乗得一百尺三因之得三百尺為次商三方廉面積即以三方廉面積三百尺除方積七百二十八尺足二尺則定次商為二尺書於方積八尺之上合初商共一丈二尺自乗再乗得一丈七百二十八尺與原積符合相減恰盡即定立方邊為一丈二尺也此法止用三方廉面積除立方體積得次商數即併初商數自乗再乗得數與原積相減雖為省去長廉小隅一層然方邊位數少者還為簡易至於方邊位數過四位以上則累次自乗再乗反比逓析之理為煩矣設如正方體積一十四萬八千八百七十七尺開立方問每一邊數幾何此題正方體積之六位皆以尺命位似與前題分丈尺者不同然其取方積三位續書於下其末位即命為單位立算則與丈尺同也法列正方體積一十四萬八千八百七十七尺自末位起算每方積三位定方邊一位故隔二位作記乃於七尺上定單位八千尺上定十位其一十四萬八千尺為初商積以初商本位計之則八千尺為初商積之單位而一十四萬八千尺為一百四十八止與五自乗再乗之數相準即定初商為五書於方積八千尺之上而以五自乗再乗之一百二十五書於初商積之下相減餘二萬三千尺爰以方邊第二位餘積八百七十七尺續書於下共二萬三千八百七十七尺為次商廉隅之共積乃以初商之五作五十尺自乗得二千五百尺三因之得七千五百尺為次商三方廉面積以除方積二萬三千八百七十七尺足三尺即定次商為三尺書於方積七尺之上而以初商之五十尺與次商之三尺相乗得一百五十尺三因之得四百五十尺為次商三長廉面積復以次商三尺自乗得九尺為次商一小隅面積合三方廉三長廉一小隅面積共得七千九百五十九尺為廉隅共法書於餘積之左以次商之三尺乗之得二萬三千八百七十七尺與餘積相減恰盡是開得五十三尺為正方體積每一邊之數也如圖甲乙丙丁正方體形每邊五十三尺其中函積一十四萬八千八百七十七尺是為共積其從一角所分戊乙庚己方體每邊五十尺即初商邊數其中函積一十二萬五千尺即初商自乗再乗之數所餘辛形壬形癸形三方體為三方廉其每邊五十尺即初商數其厚三尺即次商數而子形丑形寅形三長方體為三長廉其每邊五十尺亦即初商數其闊其厚皆三尺亦即次商數方廉有三故三倍初商之自乗為廉法以定次商其邜形一小正方體為隅其長與闊與厚皆同為三尺亦即次商數故以次商為隅法合辛壬癸三方廉子丑寅三長廉卯一方隅而成一磬折體形附於初商自乗再乗之方體三面而成一甲乙丙丁之總正方體積也又法列積一十四萬八千八百七十七尺自末位起算作記定位同前乃截一十四萬八千尺為初商積與五十自乗再乗之數相準則定初商五十尺書於方積八千尺之上而以五十自乗再乗之一十二萬五千尺書於原積一十四萬八千之下相減餘二萬三千尺乃合第二位積八百七十七尺共二萬三千八百七十七尺為次商廉隅之共積而以初商五十尺自乗得二千五百尺三因之得七千五百尺為次商三方廉面積即以三方廉面積除方積二萬三千八百七十七尺足三尺即定次商為三尺書於方積七尺之上合初商共得五十三尺自乗再乗得一十四萬八千八百七十七尺與原積符合相減恰盡即定立方邊為五十三尺也此法亦止用三方廉面積除立方體積得次商數即併初商數自乗再乗以減原積也設如正方體積一丈八百六十尺八百六十七寸開立方問每一邊數幾何法列正方體積一丈八百六十尺八百六十七寸自末位起算每方積三位定方邊一位故隔二位作記即於七寸上定寸位空尺上定尺位一丈上定丈位其一丈為初商積與一丈自乗再乗之數相合即定初商為一丈書於方積一丈之上而以一丈自乗再乗之一丈書於初商積之下相減恰盡爰以方邊第二位餘積八百六十尺續書於下為次商廉隅之共積乃以初商之一丈作一十尺自乗得一百尺三因之得三百尺為次商三方廉面積以除八百六十尺足二尺即定次商為二尺書於方積空尺之上而以初商之一十尺與次商之二尺相乗得二十尺三因之得六十尺為次商三長廉面積復以次商之二尺自乗得四尺為次商一小隅面積合三方廉三長廉一小隅面積共得三百六十四尺為次商廉隅共法書於餘積之左以次商之二尺乗之得七百二十八尺與次商廉隅共積相減餘一百三十二尺即一十三萬二千寸復以方邊第三位餘積八百六十七寸續書於下共一十三萬二千八百六十七寸為三商廉隅之共積乃以初商次商之一丈二尺作一百二十寸自乗得一萬四千四百寸三因之得四萬三千二百寸為三商三方廉面積以除一十三萬二千八百六十七寸足三寸即定三商為三寸書於方積七寸之上而以初商次商之一百二十寸與三商之三寸相乗得三百六十寸三因之得一千零八十寸為三商三長廉面積復以三商之三寸自乗得九寸為三商一小隅面積合三方廉三長廉一小隅面積共得四萬四千二百八十九寸為三商廉隅共法書於餘積之左以三商之三寸乗之得一十三萬二千八百六十七寸與三商廉隅共積相減恰盡是開得一丈二尺三寸為正方體積每一邊之數也設如正方體積九千四百八十一萬八千八百一十六尺開立方問每一邊數幾何法列正方體積九千四百八十一萬八千八百一十六尺自末位起算每方積三位定方邊一位故隔二位作記乃於六尺上定單位八千尺上定十位四百萬尺上定百位其九千四百萬尺為初商積以初商本位計之則四百萬尺為初商積之單位而九千四百萬尺為九十四止與四自乗再乗之數相準即定初商為四書於方積四百萬尺之上而以四自乗再乗之六十四書於初商積之下相減餘三千萬尺爰以方邊第二位餘積八十一萬八千尺續書於下共三十零八十一萬八千尺為次商廉隅之共積以次商本位計之則八千尺為次商積之單位而三千零八十一萬八千尺為三萬零八百一十八而初商之四即為四十乃以初商之四十自乗得一千六百三因之得四千八百為次商三方廉面積以除三萬零八百一十八足五倍即定次商為五書於方積八千尺之上而以初商之四十與次商之五相乗得二百三因之得六百為次商三長廉面積復以次商之五自乗得二十五為次商一小隅面積合三方廉三長廉一小隅面積共得五千四百二十五為次商廉隅共法書於餘積之左以次商之五乗之得二萬七千一百二十五與次商廉隅共積相減餘三百六十九萬三千尺復以方邊末位餘積八百一十六尺續書於下共三百六十九萬三千八百一十六尺為三商廉隅之共積以三商本位計之則積與邊皆仍為本位乃以初商次商之四百五十尺自乗得二十萬零二千五百三因之得六十萬零七千五百為三商三方廉面積以除三百六十九萬三千八百一十六尺足六倍即定三商為六書