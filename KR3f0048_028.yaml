積是三商不可商九也乃改商八而以初商次商之一百四十與三商之八相乗得一千一百二十三因之得三千三百六十為三商三長廉面積復以三商之八自乗得六十四為三商一小隅面積合三方廉三長廉一小隅面積共得六萬二千二百二十四為三商廉隅共法以三商之八乗之得四十九萬七千七百九十二是小於三商廉隅之共積可減也乃以三商之八書於方積六千尺之上而以三商乗廉隅共法之四十九萬七千七百九十二與三商廉隅之共積相減餘五千二百八十五萬四千尺復以方邊末位餘積二百七十二尺續書於下共五千二百八十五萬四千二百七十二尺為四商廉隅之共積以四商本位計之則積與邊皆仍為本位乃以初商次商三商之一千四百八十尺自乗得二百一十九萬零四百三因之得六百五十七萬一千二百為四商三方廉面積以除五千二百八十五萬四千二百七十二足八倍即定四商為八書於方積二尺之上而以初商次商三商之一千四百八十與四商之八相乗得一萬一千八百四十三因之得三萬五千五百二十為四商三長廉面積復以四商之八自乗得六十四為四商一小隅面積合三方廉三長廉一小隅面積共得六百六十萬六千七百八十四為四商廉隅共法以四商之八乗之得五千二百八十五萬四千二百七十二與餘積相減恰盡是開得一千四百八十八尺為正方體積毎一邊之數也此法蓋因方邊之第三位第四位二數太大故次商廉隅之共積以次商之三方廉除得次商之邊繼而以次商之邊與次商廉隅共法相乗大於原積甚多改商三次所乗之數始與次商廉隅之共積相準而後次商之數可定凡開立方遇此類者皆依此例推之如或廉隅共法與商出之數相乗得數大於廉隅共積幾一倍者則改商必審其與廉隅共積相近小數始可為準也設如有積一萬四千七百三十四尺開立方問每一邊數幾何法列積一萬四千七百三十四尺自末位起算隔二位作記於四尺上定單位四千尺上定十位其一萬四千尺為初商積以初商本位計之則四千尺為初商積之單位而一萬四千為一十四止與二自乗再乗之數相準即定初商為二書於方積四千尺之上而以二自乗再乗之八書於初商積之下相減餘六千尺爰以方邊第二位餘積七百三十四尺續書於下共六千七百三十四尺為次商廉隅之共積以次商本位計之則邊與積皆仍為本位而初商之二則為二十尺乃以初商之二十尺自乗得四百尺三因之得一千二百尺為次商三方廉面積以除方積六千七百三十四尺足五尺乃以初商之二十尺與次商之五尺相乗得一百尺三因之得三百尺為次商三長廉面積復以次商之五尺自乗得二十五尺為次商一小隅面積合三方廉三長廉一小隅面積共一千五百二十五尺為次商廉隅共法以次商之五尺乗之得七千六百二十五尺大於次商廉隅之共積是次商不可商五尺也乃改商四尺書於方積四尺之上而以初商之二十尺與次商之四尺相乗得八十尺三因之得二百四十尺為次商三長廉面積復以次商之四尺自乗得一十六尺為次商一小隅面積合三方廉三長廉一小隅面積共得一千四百五十六尺為次商廉隅共法書於餘積之左以次商之四尺乗之得五千八百二十四尺與餘積相減仍餘九百一十尺是開得二十四尺為方體每一邊之數仍餘九百一十尺不盡也如欲以餘數再開則得方邊之寸數乃増三空於總積之後復續書三空於九百一十尺之後為幾百幾十幾寸之位是則九百一十尺作九十一萬寸為三商廉隅之共積爰以初商次商之二十四尺作二百四十寸自乗得五萬七千六百寸三因之得一十七萬二千八百寸為三商三方廉面積以除餘積九十一萬寸足五寸即定三商為五寸書於餘積空寸之上而以初商次商之二百四十寸與三商之五寸相乗得一千二百寸三因之得三千六百寸為三商三長廉面積復以三商之五寸自乗得二十五寸為三商一小隅面積合三方廉三長廉一小隅面積共得一十七萬六千四百二十五寸為三商廉隅共法書於餘積之左以三商之五寸乗之得八十八萬二千一百二十五寸與餘積相減仍餘二萬七千八百七十五寸不盡如再以餘數開之則得方邊之分數乃又續書三空於原積空寸之後復續書三空於二萬七千八百七十五寸之後為幾百幾十幾分之位是則二萬七千八百七十五寸作二千七百八十七萬五千分為四商廉隅之共積爰以初商次商三商之二十四尺五寸作二千四百五十分自乗得六百萬零二千五百分三因之得一千八百萬零七千五百分為四商三方廉面積以除餘積二千七百八十七萬五千分足一分即定四商為一分書於餘積空分之上而以初商次商三商之二千四百五十分與四商之一分相乗仍得二千四百五十分三因之得七千三百五十分為四商三長廉面積復以四商之一分自乗仍得一分為四商一小隅面積合三方廉三長廉一小隅面積共得一千八百零一萬四千八百五十一分為四商廉隅共法書於餘積之左以四商之一分乗之仍得一千八百零一萬四千八百五十一分與餘積相減仍餘九百八十六萬零一百四十九分不盡是開得二十四尺五寸一分為方體每一邊之數也此法原積本非自乗再乗所得之數雖逓析之終不能盡凡開立方遇此類者皆以此例推之設如有方亭幾座用方甎鋪地共用一千七百二十八塊其所鋪之座數與毎座毎行之甎數相等問亭之座數幾何法列方甎一千七百二十八塊為立方積用開立方法開之於八塊上定單位一千塊上定十位其一千塊為初商積以初商本位計之則一千為初商積之單位與一自乗再乗之數相合即定初商為一書於方積一千之上而以一自乗再乗之一書於初商積之下相減恰盡爰以第二位餘積七百二十八塊續書於下為次商廉隅之共積而以初商之一作一十自乗得一百三因之得三百為次商三方廉面積以除七百二十八足二倍即定次商為二書於方積八塊之上而以初商之一十與次商之二相乗得二十三因之得六十為次商三長廉面積復以次商之二自乗得四為次商一小隅面積合三方廉三長廉一小隅面積共得三百六十四書於餘積之左以次商之二乗之得七百二十八與餘積相減恰盡是得所鋪亭數為一十二座也此法因所鋪之亭數與每行甎數相等是每行甎一十二塊其亭亦一十二座雖非立方形而法則立方法也故用立方開之設如有方倉一座共盛糧八百七十八石八斗問倉髙幾何法以每石定法二尺五百寸乗八百七十八石八斗得二千一百九十七尺為立方積用開立方法開之其二千尺為初商積以初商本位計之則二千尺為初商積之單位止與一自乗再乗之數相準即定初商為一書於方積二千之上而以一自乗再乗之一書於初商積之下相減餘一千尺爰以第二位餘積一百九十七尺續書於下共一千一百九十七尺為次商廉隅之共積而以初商之一作一十自乗得一百三因之得三百為次商三方廉面積以除一千一百九十七尺足三倍即定次商為三書於方積七尺之上而以初商之一十與次商之三相乗得三十三因之得九十為次商三長廉面積復以次商之三自乗得九為次商一小隅面積合三方廉三長廉一小隅面積共得三百九十九為次商廉隅共法書於餘積之左以次商之三乗之得一千一百九十七尺與餘積相減恰盡是開得方倉之高為一十三尺也此法因糧是石法所問乃倉之尺數故先將石變為尺而開立方即得倉之髙也設如有方石一塊重一二萬六千六百二十兩問每邊尺寸幾何法以石之定率每寸重二兩五錢除二萬六千六百二十兩得一萬零六百四十八寸為立方積用開立方法開之其一萬寸為初商積以初商本位計之則空千位為初商積之單位而一萬尺為一十與二自乗再乗之數相準即定初商為二書於空千寸之上而以二自乗再乗之八書於初商積之下相減餘二千寸爰以第二位餘積六百四十八寸續書於下共二千六百四十八寸為次商廉隅之共積而以初商之二作二十自乗得四百三因之得一千二百為次商三方廉面積以除二千六百四十八寸足二倍即定次商為二書於方積八寸之上而以初商之二十與次商之二相乗得四十三因之得一百二十為次商三長廉面積復以次商之二自乗得四為次商一小隅面積合三方廉三長廉一小隅面積共得一千三百二十四為次商廉隅共法書於餘積之左以次商之二乗之得二千六百四十八寸與餘積相減恰盡是開得二十二寸為正方石毎一邊之數也此法因石是兩數所問乃石之寸數故先將石之兩數變為寸而開立方即得石之寸數也設如有水銀一萬六千三百四十四兩六錢八分欲作一方匣盛之問匣高幾何法先以水銀定率毎寸重一十二兩二錢八分除一萬六千三百四十四兩六錢八分得一千三百三十一寸為立方積用開立方法開之其一千寸為初商積以初商本位計之則一千為初商積之單位與一自乗再乗之數相合即定初商為一書於一千寸之上而以一自乗再乗之一書於方積一千寸之下相減恰盡爰以第二位餘積三百三十一寸續書於下為次商廉隅之共積而以初商之一作一十自乗得一百三因之得三百為次商三方廉面積以除三百三十一寸足一倍即定次商為一書於方積一寸之上而以初商之一十與次商之一相乗得一十三因之得三十為次商三長廉面積復以次商之一自乗仍得一為一小隅面積合三方廉三長廉一小隅面積共得三百三十一為次商廉隅共法書於餘積之左以次商之一乗之仍得三百三十一與餘積相減恰盡是開得一十一寸為方匣之高也設如有方池一區其深與方相等容水四千零九十六尺問深幾何法列四千零九十六尺為立方積用開立方法開之其四千尺為初商積以初商本位計之則四千為初商積之單位與一自乗再乗之數相準即定初商為一書於四千尺之上而以一自乗再乗之一書於方積四千尺之下相減餘三千尺爰以第二位餘積九十六尺續書於下共三千零九十六尺為次商廉隅之共積而以初商之一作一十自乗得一百三因之得三百為次商三方廉面積以除三千零九十六尺可得十尺若商十尺則合於初商之數再合方廉長廉小隅面積必大於次商廉隅之共積可知故商九尺八尺七尺皆仍大於次商廉隅之共積乃改商六尺書於方積六尺之上而以初商之一十與次商之六相乗得六十三因之得一百八十為次商三長廉面積復以次商之六自乗得三十六為次商一小隅面積合三方廉三長廉一小隅面積共得五百一十六為次商廉隅共法書於餘積之左以次商之六乗之得三千零九十六與餘積相減恰盡是開得一十六尺為池之深也此法因池之深與方相等其所容水數即正方體積故立方開之得一邊之數即池之深也御製數理精藴下編卷二十三
