body:
  text: 欽定四庫全書御製數理精藴下編卷五線部三按數加减比例遞加遞减差分互平差分超位加减差分首尾互凖差分按數加減比例差分之内又有按數遞加遞減或互和折半者皆為相當比例其法有四一曰遞加遞減差分蓋所加所減之中遞次數目皆同者也一曰超位加減差分乃加減之中彼此分數不同者也一曰互和折半差分蓋立法以首尾二數之較互和折半以求中數而遞加遞減者也一曰首尾互準差分乃以前幾分之數與後幾分之數互相比較或以前幾分與後幾分定為同數以立準則然後立衰數以求之者也然超位加減即遞加遞减之一類也首尾互凖又為互和折半之變體也遞加者其數自少而多以漸而加也遞減者其數自多而少以漸而減也加減之數遞次皆同故以遞次名之法中有三色者以總法比總實即得中一數凡單位者俱按此例如五色七色九色之類是也有四色者以總法比總實得中二數相和折半之數凡雙位者皆按此例如六色八色十色之類是也既得中數按定數加減則各色之數可得矣超位加減者加減之中遞次分數不同即如三人分銀若干一得三分一得五分一得八分而彼此分數之比例不同又如三人買物第一人比第二人多出二倍第二人比第三人又多出一倍而加倍之比例不同故謂之超位加減然立衰分求之與遞次加減無異故次於遞次加減之後互和折半者亦如遞次加減之理但用法㣲異遞次加減知總物數知總人數併知遞加遞減之數以求各數互和折半則亦知總物數總人數但知首一人比末一人之較數而求遞加遞減之數以得各數是以三色者第一數第三數相和折半即第二數四色者第一數第四數相和折半即第二數第三數之中數既得中數按較數之分加減之即得遞加之數五色六色以至多位者止分竒偶立法總以三四為例俱可以相和折半而得故名之曰互和折半也首尾互準者即互和折半之變體蓋互和折半知總物數知總人數又知首一人比末一人之較數因此較數而得各人分數首尾互準則不知總物數但知總人數與首尾二人各分數或但知首尾幾位共分數由此互相準折而得各項分數與總數要之但以互和折半之法逆推之而即得故次於互和折半之後焉遞加遞減差分設如有金六十兩令甲乙丙三人依次遞加五兩分之問各得幾何法以三人為一率金六十兩為二率一人為三率推得四率二十兩即乙應得之數自乙數加五兩得二十五兩即丙應得之數自乙數減五兩得十五兩即甲應得之數也此法因甲丙二人所得較之乙所得加減之數皆同故以總三人與總六十兩之比即若中一人與中一分二十兩之比也設如有鉛三百五十斤欲作四球依次遞加二十五斤問每球重數若干法以四球為一率鉛三百五十斤為二率一球為三率推得四率八十七斤半即第二球第三球相和折半之數乃以遞加二十五斤折半得十二斤半與八十七斤半相加得一百斤即第三球之重與八十七斤半相減餘七十五斤即第二球之重於第三球重數内再加二十五斤得一百二十五斤即第四球之重於第二球重數内再減二十五斤餘五十斤即第一球之重也此法比例所得八十七斤半較之第二球多十二斤半較之第三球則少十二斤半故為二球相和折半之數以遞加二十五斤之數折半加減之即得中二球之重再以二十五斤加減之即得第一與第四球之重也設如有金七十五斤分與公侯伯子男五等自男以上遞加五斤問各該幾何法以五人為一率金七十五斤為二率一人爲三率推得四率十五斤即伯所得之數自伯十五斤而上加五斤得二十斤即侯所得之數再加五斤得二十五斤即公所得之數自伯十五斤而下減五斤餘十斤即子所得之數再減五斤餘五斤即男所得之數也設如有俸糧三百零五石令五等官依品級遞減十三石給之問各得若干法以五分為一率即五等官五分也糧三百零五石為二率一分為三率推得四率六十一石即三等官俸自六十一石遞加十三石得二等七十四石一等八十七石自六十一石遞減十三石得四等四十八石五等三十五石也設如有銀九百九十六錠分給八人自末名以上依次遞加十七錠問首末兩人各該幾何法以八人為一率銀九百九十六錠為二率一人為三率推得四率一百二十四錠半為第四人第五人相和折半之數乃以遞加十七錠折半得八錠半與一百二十四錠半相加得一百三十三錠即第四人應得之數再以十七錠遞加三次得一百八十四錠即第一人應得之數以八錠半與一百二十四錠半相減餘一百一十六錠即第五人應得之數再以十七錠遞減三次餘六十五錠即第八人應得之數也設如一人有九子不明説出各人歲數但云共有二百零七歲自長至少皆遞差三嵗問各歲幾何法以九分為一率即以九子為九分也二百零七歲為二率一分為三率推得四率二十三歲即第五子之年自二十三嵗遞加三歲得四子二十六嵗三子二十九歳二子三十二歲長子三十五歲自二十三歲遞減三嵗得六子二十歲七子十七嵗八子十四歲九子十一歲也設如有敘功之二十人其末一人賞銀一百兩以上遞加三十兩問第一人賞銀幾何共賞銀幾何法以一分為一率遞加三十兩為二率十九分為三率推得四率五百七十兩即第一人比末一人共多之數於此數内加入末名之一百兩共六百七十兩即第一人應得之數以第一人所得之數與末一人所得之數併之共七百七十兩復以二十人乘之得一萬五千四百兩折半得七千七百兩即二十人共得之銀數也此法蓋以第一人比第二十人共多十九個三十兩故以一分與遞加之三十兩相比即如十九分與第一人共多於第二十人之五百七十兩相比也既得十九分共多之數再加入末一人之一百兩即得第一人應得之數矣又首末二數相併以人數二十乘之折半得其銀數者蓋以遞加之數彼此均同首一人得數至多末一人得數至少首末二人之數相併折半即為中數以中數乘人數而得共數今首末二人之數相併而末折半即用人數乗之故所得之數為應得共數之加倍數是以半之而始得共銀數也設如有牛四十區但云第一區是三十頭餘遞加二十頭問第四十區該幾何總數幾何法以一分為一率遞加二十頭為二率三十九分為三率推得四率七百八十加入第一區之三十共八百一十頭即第四十區之數以首末二區數相併共八百四十頭用四十區乗之得三萬三千六百頭折半得一萬六千八百頭即四十區之總數也此法第二區比第一區加二十由此遞加則第四十區比第一區共多三十九個二十故以一分與二十頭相比即如三十九分與第四十區共多於第一區之七百八十頭相比也再加入第一區之三十頭即第四十區之數繼而併首末兩數以總區數四十乗之折半即得共數也設如有人一百名第一人賞銀一百兩以下遞減五錢問共該銀幾何法以一分為一率遞減五錢為二率九十九分為三率推得四率四十九兩五錢即第一名多於第一百名之數於一百兩内減之餘五十兩零五錢即第一百名應賞之數又與第一名賞銀相併得一百五十兩零五錢以一百名乗之得一萬五千零五十兩折半得七千五百二十五兩即共賞銀數也蓋賞銀遞減五錢則第一名比第一百名多九十九個五錢故以一分與五錢相比即如九十九分與第一名總多於第一百名之數相比也爰以首尾兩數相併以名數一百乗之折半而得總銀數也設如一人染絹初日染八尺日加一尺加至六十尺止問日與絹各幾何法以初日之八尺與末日之六十尺相加得六十八尺為首尾兩日共染之絹數又看八尺以前遞減至一尺有幾分今有七分即為七尺乃於末日之六十尺減去七尺餘五十三尺即為共日五十三日乃以二日為一率六十八尺為二率五十三日為三率推得四率一千八百零二尺即五十三日共染之絹數也此法以二日為一率者取其首末相合之共日為準也以初日末日之尺數相併為二率者取其首末尺數相合與首末兩日為比也以八尺遞減至一尺而得日數為三率者蓋以初日之八尺上數至一尺得數必為七分即爲七尺理與一面尖堆法同而今有之末日六十尺内減去七尺餘五十三尺即為五十三日故二日與首末相合之尺數相比即如共日五十三日與共絹之尺數相比也設如一人行路日増六里共行三百二十里但知初末兩日所行共一百六十里問共行幾日及初日末日各行幾里法以初末兩日行數一百六十里折半得八十里乃共日之中數為一率一日為二率共行三百二十里為三率推得四率四日即共行日數也又以日増六里折半得三里與六里相併得九里加於中數八十里得八十九里即第四日所行之數減於中數八十里餘七十一里即第一日所行之數也此法以第四日第一日行數相併折半者為得四日之中數既得四日之中數與一日之比即如共數與四日之比也又以日増之數折半而與日増之數相併加於中數而得末日所行之數減於中數而得初日所行之數者其所得之中數在第二日第三日之間故此中數内加日増數之半即得第三日所行之數減日増數之半即得第二日所行之數故再加日増數之全而得末日所行之數再減日増數之全而得初日所行之數也設如一人織布厯十三日共織一千三百五十二寸因日漸長每日加功六寸至末日比初日多織七十二寸問初末二日各織幾何法以十三日為一率共織數一千三百五十二寸為二率一日為三率推得四率一百零四寸乃初末二日之中數為第七日所織之數以第七日上計初日下計末日俱得六分於是以六分與日加六寸相乗得三十六寸乃以三十六寸於第七日之一百零四寸内減之得六十八寸即初日所織之數於第七日之一百零四寸上加之得一百四十寸即末日所織之數也此法雖求初末兩日之數然以十三日與總織數之比即一日與初末兩日中數之比既得中數按分加之何所不得此又遞次加減法中之又一例也設如有田七百二十畝令甲乙丙三戸依次遞減分耕問各該幾何法以三分為甲衰數二分為乙衰數一分為丙衰數相併得六分為一率總田七百二十畝為二率一分為三率推得四率一百二十畝為一分即丙所耕之數以二分因之得二百四十畝即乙所耕之數以三分因之得三百六十畝即甲所耕之數也此法併總衰分為一率總田數為二率者是將總衰分比總田數故六分得七百二十畝而一分得一百二十畝也六分中甲得三分乙得二分丙得一分自甲遞次至乙至丙皆減一百二十畝故為遞減也凡命法中不定所減分數者即以此法為例設如有銀九十二兩令伯仲叔季四人遞減分之問各得幾何法以四分為伯衰數三分為仲衰數二分為叔衰數一分為季衰數相併得十分為一率總銀九十二兩為二率一分為三率推得四率九兩二錢即季所得之數以二分因之得一十八兩四錢即叔所得之數以三分因之得二十七兩六錢即仲所得之數以四分因之得三十六兩八錢即伯所得之數也此法以十分比總銀即如總銀分為十分也是以十分中伯得四分仲得三分叔得二分季得一分自伯遞次至季皆減一分故謂之遞減差分也設如有金一十二兩六錢欲挨次遞減造套杯六個問各重若干法以六五四三二一為六杯衰分併之得二十一分為一率共金數一十二兩六錢為二率一分為三率推得四率六錢即第六杯之重以二分因之得一兩二錢即第五杯之重以三分因之得一兩八錢即第四杯之重以四分因之得二兩四錢即第三杯之重以五分因之得三兩即第二杯之重以六分因之得三兩六錢即第一杯之重也此法以總分比總銀即如以一分比末一杯之重也以上遞加一分即各杯之重矣設如有糧一千一百三十四石令五等戸遞減納之一等二十四戸二等三十三户三等四十二戸四等五十一户五等六十户問各等每戸應納若干法以五四三二一為五等衰分以五分因一等户二十四得一百二十分以四分因二等戸三十三得一百三十二分以三分因三等户四十二得一百二十六分以二分因四等戸五十一得一百零二分以一分因五等户六十仍得六十分總併之得五百四十分為一率總糧一千一百三十四石為二率一分為三率推得四率二石一斗即五等每户所納之數以二分因之得四石二斗即四等每户所納之數以三分因之得六石三斗即三等每户所納之數以四因之得八石四斗即二等每戸所納之數以五因之得十石五斗即一等每戸所納之數也超位加減差分設如甲丙丁三人買房一所共價八百一十兩丙比甲出銀加一倍丁比甲丙共出銀又加一倍問每人各出幾何法以一分為甲衰數加一倍得二分為丙衰數又以甲一分丙二分相併為三分復加一倍得六分為丁衰數相併得九分為一率總銀八百一十兩為二率以甲一分為三率得四率九十兩即甲所出銀數加一倍得一百八十兩即丙所出銀數將甲丙共銀復加一倍得五百四十兩即丁所出銀數也此法以一分為甲數加一倍為丙數者因丙比甲銀多一倍也又共甲丙兩數加一倍為丁數者因丁比甲丙共銀又多一倍也故以所命各人分數相併得共分數以此共分數比共銀數即如各人分數比各人所出銀數也設如有銀五千兩買馬四匹園一區宅一所其園價比馬價多三倍而宅價比園價又多四倍問各價幾何法以一分為馬衰數加三倍為三分得四分為園衰數又將園四分加四倍為十六分得二十分為宅衰數相併得二十五分為一率總價五千兩為二率馬一分為三率推得四率二百兩即馬四匹之價馬每匹價五十兩加三分六百兩得八百兩即園一區之價再將園價加四分三千二百兩得四千兩即宅一所之價也此法將馬為一分而加三分為園價者因園價比馬價多三倍也又將園價為一分而加四分為宅價者因宅價比園價又多四倍也是以共分之比共價即如馬四匹之一分比各色每一分之價也設如有糧七百六十石以船三次運之第一次運十分二次運七分三次運二分問每次運糧幾何法以十分七分二分相併得十九分為一率共糧七百六十石為二率十分為三率得四率四百石即第一次所運之數如以七分為三率得四率二百八十石即第二次所運之數如以二分為三率得四率八十石即第三次所運之數也此法第一次之十分二次之七分三次之二分即三次之衰數分數已明故即以運分作衰分也設如有銅一百八十兩依次遞減造三等儀器上等比中等加二倍中等比下等加一倍問三等儀器各得銅幾何法以一分為下等衰數二分為中等衰數二分加二倍得六分為上等衰數併之得九分為一率共銅一百八十兩為二率下等之一分為三率推得四率二十兩即下等儀器之重加一倍得四十兩即中等儀器之重又加二倍得一百二十兩即上等儀器之重也此法命一分為下等數故加倍為中等數而得二分復以二分加二倍為上等數故上等數又為六分也設如有銀七十兩買駱駝馬驢各一匹而價之多少不等但知馬比駝價為九分之四驢比駝價為九分之一問各價幾何法以一分為驢衰數四分為馬衰數九分為駝衰數併之得十四分為一率銀七十兩為二率驢一分為三率推得四率五兩即驢一匹之價以四分因之得二十兩即馬一匹之價以九分因之得四十五兩即駝一匹之價此法因駝價為九分故即以九為衰數且兩分母俱同為九分而馬居九分之四故即以四為馬分驢居九分之一故即以一為驢分也既得驢價取其四分即馬價取其九分即駝價也設如一人為商三次初次獲利比原銀多二倍二次獲利比初次本利共銀多四倍三次獲利比二次本利共銀又多三倍共計獲利併原銀得九百兩問原銀幾何法以一分為初商原銀衰數加二倍得三分為初次本利共分又比三分加四倍得十五分為二次本利共分又比十五分加三倍得六十分為三次本利共分即以此六十分為一率三次本利共銀九百兩為二率一分為三率推得四率一十五兩即原銀數也此法初次加二倍是原銀之外加二倍也又加四倍是比初次本利共銀之外又加四倍也又加三倍是比二次本利共銀之外又加三倍也故以總分比總銀即如一分之比原銀也設如有米二十四石分與四人甲四分乙五分丙七分丁九分問各該幾何法以甲之四分乙之五分丙之七分丁之九分相併得二十五分為一率共米二十四石為二率一分為三率推得四率九斗六升乃每一分之數以甲四分因之即得甲之三石八斗四升以乙五分因之即得乙之四石八斗以丙七分因之即得丙之六石七斗二升以丁九分因之即得丁之八石六斗四升也此法以一分為三率故得每人一分之數如以各人分數各為三率即得各人之全分矣設如有銀九十二兩賞二十人分上中下三等上等四人中等六人下等十人其中等比下等賞加一倍上等比中等賞加二倍問各等每人得賞幾何法以一分為下等衰數乗下等十人得十分又將一分加一倍得二分為中等衰數乗中等六人得十二分又將二分加二倍得六分為上等衰數乗上等四人得二十四分乃以十分十二分二十四分相併得四十六分為一率總銀九十二兩為二率下等一分為三率推得四率二兩即下等每人應得之數將二兩加一倍得四兩即中等每人應得之數將四兩再加二倍得十二兩即上等每人應得之數復以各等人數乗各等每人應得之數即得上等四人共得四十八兩中等六人共得二十四兩下等十人共得二十兩也此法以下等一分為三率故得下等每人一分之數按分倍加而得中等上等如以各等衆人分數各為三率即得各等之共數矣設如有米五百三十五石賞與三等人第一等二十名第二等五十名第三等一百一十名一等比二等每名加七斗二等比三等每名加五斗問三等每名各得幾何法以二等比三等每名多五斗與二等五十名相乗得二百五十斗又以一等比二等每名多七斗與二等比三等每名多五斗相加得十二斗與一等二十名相乗得二百四十斗兩數相併得四百九十斗乃於總米五百三十五石内減之餘四百八十六石乃以一等二十人二等五十人三等一百一十人相併得一百八十人為一率四百八十六石為二率一人為三率推得四率二石七斗即三等毎一人應得之數加五斗得三石二斗即二等毎一人應得之數再加七斗得三石九斗即一等每一人應得之數也此法以二等比三等毎名多五斗與二等五十人相乗者是求二等比三等共多之數又以一等比二等毎名多七斗併二等比三等毎名多五斗與一等二十人相乗者是求一等比三等共多之數也既得一等二等共多於三等之數於總數内減之所餘即三等相併共一百八十人均分之數故以一百八十人比總米四百八十六石即第三等每一人之比二石七斗也由此加五斗即得第二等每一人所得之數於第二等每一人數内再加七斗即得第一等每一人所得之數矣互和折半差分設如有米一百八十石令甲乙丙三人互和折半分之但知甲多丙三十六石問各該若干法以三人為一率總米一百八十石為二率一人為三率推得四率六十石即乙應得之數次以甲多丙三十六石二分之毎分得一十八石於乙數内加之得七十八石即甲應得之數於乙數内減之得四十二石即丙應得之數也此法蓋以三人共得之數比一人所得之數其一人所得之數即中一人應得之數甲多乙幾何即乙多丙幾何而甲多丙之數又為甲多乙之倍數故以甲多丙之數分為二分於中數内一加一減則彼此相較之數自得均平故謂之互和折半也設如有銀二百四十兩令趙錢孫李四人互和折半分之但知趙多李一十八兩問各該若干法以四人為一率總銀二百四十兩為二率一人為三率推得四率六十兩即錢孫中二人相和折半之數次取趙多李十八兩之數以三歸之以三立法者用二歸以四立法者用三歸蓋以之相比而得較也得六兩即四人遞加之數折半得三兩乃中二人相和折半數與中二人應得數之較以此三兩加於六十兩得六十三兩即錢銀數減於六十兩餘五十七兩即孫銀數錢銀數内再加六兩得六十九兩即趙銀數孫銀數内再減六兩餘五十一兩即李銀數也此法蓋以四人共得之數比一人應得之數其一人應得之數固非四人平分之數故比例所得六十兩為錢孫二人之中數較之錢數少三兩較之孫數多三兩故於六十兩中加三兩即錢數減三兩即孫數既得錢孫中二人數則首末二人祇按分數加之而已設如有兵二萬三千八百令甲乙丙丁戊五將互和折半領之只云戊少甲三千三百六十問各將所領若干法以五分為一率兵數二萬三千八百為二率一分為三率推得四率四千七百六十即丙所領之數又取戊少甲之三千三千六十以四歸之此有五人而較為四故用四歸也得八百四十為平分加減之數自丙數而上遞加之得五千六百即乙所領之數得六千四百四十即甲所領之數由丙數而下遞減之得三千九百二十即丁所領之數得三千零八十即戊所領之數也設如有稻一百九十八畝令甲乙丙丁戊己六人收割但知甲比己多收三十畝問各該收稻幾何法以六人為一率總田一百九十八畝為二率一人為三率推得四率三十三畝即丙丁中二人相和折半之數次取甲多己三十畝以五歸之得六畝折半得三畝加於三十三畝得三十六畝即丙收數再加六畝得四十二畝即乙收數再加六畝得四十八畝即甲收數又以折半三畝減於三十三畝餘三十畝即丁收數再減六畝餘二十四畝即戊收數再減六畝餘十八畝即己收數此法因三十三畝為丙丁二人之中數較之丙少三畝較之丁多三畝故以丙與丁總差六畝折半加減之即得也首尾互準差分設如甲乙丙丁四人遞次分銀但知甲得六十九兩丁得五十一兩問乙丙各得銀幾何法以三分為甲多於丁之衰數有四人故用三分如或五人則用四分六人則用五分為一率甲六十九兩與丁五十一兩相減餘一十八兩為二率一分為三率推得四率六兩即四人所得遞加之數將丁銀五十一兩加六兩得五十七兩即丙應得之數再加六兩得六十三兩即乙應得之數也蓋甲數最多丁數最少相差一十八兩由丁至丙至乙至甲相隔三位則知有三差故用三分比一十八兩即如一分比六兩而為遞加數也若三色者以首尾兩數相加折半即中數其法易求故不設例設如五人遞次絡絲第一人絡絲四十兩第五人絡絲二十四兩問中三人各絡絲幾何法以四分為第一人多於第五人之衰數為一率第一第五兩數相減餘一十六兩為二率一分為三率推得四率四兩即五人絡絲遞加之數將第五人絡絲二十四兩加四兩得二十八兩即第四人所絡之數再加四兩得三十二兩即第三人所絡之數再加四兩得三十六兩即第二人所絡之數也此法用四為除法葢第五與第一相隔四位則知有四差故用四為比例也又捷法以第一第五兩數相加折半得三十二兩即第三人所絡之數又以第一第三兩數相加折半得三十六兩即第二人所絡之數復以第三第五兩數相加折半得二十八兩即第四人所絡之數此法即前互和折半之法凡位數竒者俱可用如三五七九是也設如七人運糧不言總數但知第一人第二人共運二十三石七斗第五人第六人第七人共運二十六石一斗其遞加之數俱相等問第三人第四人與前後五人各運幾何法以第一第二兩人共運二十三石七斗折半得十一石八斗五升為第一第二兩人相和折半之數第五第六第七三人共運二十六石一斗三歸之得八石七斗即第六人應運之數乃以第一分第二分之中數一分半與第六分相減餘四分半為一率第一第二兩人相和折半之十一石八斗五升内減第六人之八石七斗餘三石一斗五升為二率一分為三率推得四率七斗即每人遞加之數由第六人八石七斗而下減七斗得八石即第七人應運之數由第六人八石七斗而上遞加七斗得九石四斗即第五人應運之數得十石一斗即第四人應運之數得十石八斗即第三人應運之數得十一石五斗即第二人應運之數得十二石二斗即第一人應運之數也此法蓋因第一人第二人相和折半之數至第二人差半分至第三人差一分半至第四人差二分半至第五人差三分半至第六人則差四分半故先以第一第二之中數與第六相減得其四分半之差數而以四分半比前二人相和折半多於第六人之六石三斗即如一分比每人遞加之七斗也設如八人分銀不言總數但知第一第二第三三人共得四十五兩第七第八二人共得八十五兩其遞加之數俱相等問各人應得若干法以前三人共得銀數四十五兩用三歸之得十五兩即第二人應得之數後二人共得八十五兩折半得四十二兩五錢即第七第八兩人相和折半之數乃以第二分與第七分第八分之中數七分半相減餘五分半為一率第二人應得之十五兩與後二人相和折半之四十二兩五錢相減餘二十七兩五錢為二率一分為三率推得四率五兩即每人遞加之數於第二人十五兩内減五兩即得第一人十兩於第二人十五兩外遞加五兩即得第三人二十兩第四人二十五兩第五人三十兩第六人三十五兩第七人四十兩第八人四十五兩之數也此法葢因第二人至第三人差一分至第四人差二分至第五人差三分至第六人差四分至第七人差五分至第七第八兩人相和折半之數則差五分半故先以第二與第七第八之中數相減得其五分半之差數而以五分半比後二人相和折半多於第二人之數即如每一分比每人遞加之數也設如八人分米不言總數但知第一第二兩人共得一十一石九斗第七第八兩人共得八石三斗其遞加之數俱相等問每人應得若干法以第一第二兩人共數一十一石九斗折半得五石九斗五升即第一第二兩人相和折半之數再以第七第八兩人共數八石三斗折半得四石一斗五升即第七第八兩人相和折半之數乃以第一分第二分之中數一分半與第七分第八分之中數七分半相減餘六分為一率第一第二兩人相和折半之五石九斗五升内減第七第八兩人相和折半之四石一斗五升餘一石八斗為二率一分為三率推得四率三斗即每人遞加之數折半得一斗五升加於第一第二兩人相和折半之五石九斗五升得六石一斗即第一人之數以次遞減三斗即得第二人五石八斗第三人五石五斗第四人五石二斗第五人四石九斗第六人四石六斗第七人四石三斗第八人四石之數也此法蓋因第一第二兩人相和折半之數至第二人差半分至第三人差一分半至第四人差二分半至第五人差三分半至第六人差四分半至第七人差五分半至第七第八兩人相和折半之數則差六分故先以第一第二之中數與第七第八之中數相減得其六分之差數而以六分比第一第二相和折半多於第七第八相和折半之數即如每一分比每人遞加之數也又以第一第二之中數比第一人差半分故以一分之三斗折半得一斗五升加於第一第二兩人相和折半之數即得第一人之數也設如有竹九節截為九筩盛米遞次長短不均但知根底三節共盛米三升九合梢上四節共盛米三升問九節各盛米數幾何法以根底第一第二第三三節共盛米三升九合用三歸之得一升三合即第二節盛米之數梢上第六第七第八第九四節共盛米三升用四歸之得七合五勺即第七第八兩節相和折半之數乃以第二分與第七分第八分之中數七分半相減餘五分半為一率第二節盛米一升三合内減第七第八兩節相和折半之七合五勺餘五合五勺為二率一分為三率推得四率一合即每節遞加之數自第二節盛米一升三合而上加一合即得第一節盛米一升四合自第二節盛米一升三合而下遞減一合即得第三節盛一升二合第四節盛一升一合第五節盛一升第六節盛九合第七節盛八合第八節盛七合第九節盛六合也設如有竹九節截為九筩盛米但知根底二節盛米六升三合梢上二節盛米二升一合問各節所盛米數若干法以根底二節共盛米六升三合折半得三升一合五勺為第一第二兩節相和折半之數梢上二節共盛米二升一合折半得一升零五勺為第八第九兩節相和折半之數乃以第一分第二分之中數一分半與第八分第九分之中數八分半相減餘七分為一率第一第二兩節相和折半之三升一合五勺内減第八第九兩節相和折半之一升零五勺餘二升一合為二率一分為三率推得四率三合即毎節遞加之數折半得一合五勺加於第一第二兩節相和折半之三升一合五勺得三升三合即第一節盛米之數以次遞減三合即得第二節盛三升第三節盛二升七合第四節盛二升四合第五節盛二升一合第六節盛一升八合第七節盛一升五合第八節盛一升二合第九節盛九合也設如十人按數挨次納糧前三人共納一十三石八斗後四人共納一十三石二斗問十人各納糧數若干法以前三人共納一十三石八斗用三歸之得四石六斗為第二人所納之數後四人共納一十三石二斗用四歸之得三石三斗為第八第九兩人相和折半之數乃以第二分與第八分第九分之中數八分半相減餘六分半為一率第二人之四石六斗内減第八第九兩人相和折半之三石三斗餘一石三斗為二率一分為三率推得四率二斗即每人遞加之數自第二人四石六斗以上加二斗得四石八斗即第一人所納之數自第二人四石六斗以下遞減二斗得四石四斗即第三人所納之數得四石二斗即第四人所納之數得四石即第五人所納之數得三石八斗即第六人所納之數得三石六斗即第七人所納之數得三石四斗即第八人所納之數得三石二斗即第九人所納之數得三石即第十人所納之數也設如有米二百四十石令甲乙丙丁戊五人遞減納之定甲乙二人納數與丙丁戊三人納數相等問五人各納幾何法以四分為甲多於戊之衰數自甲至乙至丙至丁至戊隔四位故以四分為衰數三分為乙多於戊之衰數併之為七分以二分為丙多於戊之衰數一分為丁多於戊之衰數併之為三分乃以三分與七分相減餘四分為前二人多於後三人之較又以前二人與後三人相減餘一人為後三人多於前二人之較夫前多四分後多一人而其數相等則四分即為一人之數乃以一人為一率四分為二率戊一人為三率推得四率仍得四分即定為戊一人之分數各加毎人所多衰數則甲得八分乙得七分併之得十五分丙得六分丁得五分併戊之四分亦得十五分是前後分數已同矣乃以兩總分相併得三十分為一率總米二百四十石為二率一分為三率推得四率八石即每一分之數用甲之八分乗之得甲之六十四石用乙之七分乘之得乙之五十六石併之共得一百二十石用丙之六分乗之得丙之四十八石用丁之五分乗之得丁之四十石用戊之四分乗之得戊之三十二石併之亦共得一百二十石是甲乙二人納數與丙丁戊三人納數等也設如有銀六百兩令甲乙丙丁戊己六人遞加分之定甲乙丙丁四人與戊己二人分數相等問六人各分幾何法以一分為乙多於甲之衰數二分為丙多於甲之衰數三分為丁多於甲之衰數併之為六分四分為戊多於甲之衰數五分為己多於甲之衰數併之為九分乃以六分與九分相減餘三分為後二人多於前四人之較又以前四人與後二人相減餘二人為前四人多於後二人之較夫前多二人後多三分而其數相等則三分即為二人之數乃以二人為一率三分為二率甲一人為三率推得四率一分五即一分半也即定為甲一人之分數各加每人所多衰數則乙得二分半丙得三分半丁得四分半併甲乙丙丁四人數得十二分戊得五分半己得六分半併戊己二人數亦得十二分是前後分數已同矣乃以兩總分相併得二十四分為一率總銀六百兩為二率一分為三率推得四率二十五兩即每一分之數用甲一分半乗之得甲三十七兩五錢用乙二分半乗之得乙六十二兩五錢用丙三分半乗之得丙八十七兩五錢用丁四分半乗之得丁一百一十二兩五錢併四人數共得三百兩用戊五分半乗之得戊一百三十七兩五錢用己六分半乗之得己一百六十二兩五錢併二人數亦共得三百兩是甲乙丙丁四人銀數與戊己二人銀數等也設如有麥一千零八畝令七人遞減分收定前三人與後四人所得共數相同問七人各收麥幾何法以六分為第一人比第七人所多衰數自第一至第七隔六位故以六為衰數五分為第二人比第七人所多衰數四分為第三人比第七人所多衰數併之為十五分三分為第四人比第七人所多衰數二分為第五人比第七人所多衰數一分為第六人比第七人所多衰數併之為六分乃以六分與十五分相減餘九分為前三人多於後四人之較又以前三人與後四人相減餘一人為後四人多於前三人之較夫前多九分後多一人而其數相等則九分即為一人之數乃以一人為一率九分為二率末一人為三率推得四率仍為九分即定為第七人之分數各加每人所多分數則第一人得十五分第二人得十四分第三人得十三分併之為四十二分第四人得十二分第五人得十一分第六人得十分第七人得九分併之亦為四十二分是前後分數已同矣乃以兩總分相併得八十四分為一率麥一千零八畝為二率一分為三率推得四率十二畝即毎一分之數用十五分乗之即得第一人一百八十畝用十四分乗之即得第二人一百六十八畝用十三分乗之即得第三人一百五十六畝併三人數共得五百零四畝用十二分乗之即得第四人一百四十四畝用十一分乗之即得第五人一百三十二畝用十分乗之即得第六人一百二十畝用九分乗之即得第七人一百零八畝併四人數亦共得五百零四畝是前三人畝數與後四人畝數等也設如有糧一千零九十二石令七次遞減運送定前二次與後五次運送之數相等問每次運送幾何法以十八分為第一次比第七次所多之衰數自第一次至第七次相隔六位應以六分為衰數是為每次遞加一分今將六分用三因之為十八分是為每一次遞加三分故各衰五四三二一俱用三因其比例仍同也十五分為第二次比第七次所多之衰數併之為三十三分十二分為第三次比第七次所多之衰數九分為第四次比第七次所多之衰數六分為第五次比第七次所多之衰數三分為第六次比第七次所多之衰數併之爲三十分乃以三十分與三十三分相減餘三分為前兩次多於後五次之較又以後五次與前兩次相減餘三次為後五次多於前兩次之較夫前多三分後多三次而其數相等則三分即為三次之數乃以三次為一率三分為二率一次為三率推得四率一分即為第七次之分數各加每次所多衰數第一次得十九分第二次得十六分併之得三十五分第三次得十三分第四次得一十分第五次得七分第六次得四分併第七次之一分亦得三十五分是前後分數已同矣乃以兩總分相併得七十分為一率總糧一千零九十二石為二率一分為三率推得四率一十五石六斗即第七次一分所運之數用十九分乗之得二百九十六石四斗即第一次所運之數用十六分乗之得二百四十九石六斗即第二次所運之數併兩次共得五百四十六石用十三分乗之得二百零二石八斗即第三次所運之數用一十分乗之得一百五十六石即第四次所運之數用七分乗之得一百零九石二斗即第五次所運之數用四分乘之得六十二石四斗即第六次所運之數併第七次所運之一十五石六斗亦共得五百四十六石是前二次運送糧數與後五次運送糧數等也御製數理精藴下編卷五
