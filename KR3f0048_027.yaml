用面積相等邊線不同之定率比例以定率之九等邊形之每邊四二一九九六三為一率正方形之每邊一為二率今所設之九等邊形之每邊一尺二寸為三率求得四率二尺九寸八分三釐五豪九絲二忽有餘為與九等邊形面積相等之正方形每邊之數自乘得八尺九十寸一十八分二十一釐有餘即九等邊形之面積也蓋九等邊形之每邊為四二一九九六三正方形之每邊為一則兩面積相等故以子丑寅卯辰巳午未申九等邊形之辰巳一邊四二一九九六三與酉戌亥金正方形之戌亥一邊一之比即同於今所設甲乙丙丁戊己庚辛壬九等邊形之戊已一邊一尺二寸與今所得之癸乾坎艮正方形之乾坎一邊二尺九寸八分三釐五豪九絲二忽有餘之比既得乾坎一邊自乘得癸乾坎艮正方面積即與甲乙丙丁戊己庚辛壬九等邊形之面積為相等也如有九等邊形之面積八尺九十寸一十八分二十六釐求每邊之數則用邊線相等面積不同之定率比例以定率之九等邊形之面積六一八一八二四二為一率正方形之面積一為二率今所設之九等邊形之面積八尺九十寸一十八分二十六釐為三率求得四率一尺四十四寸開方得一尺二寸即九等邊形之每一邊也此法蓋因九等邊形之每邊與正方形之每邊相等九等邊形之面積與正方形之面積不同故先定為面與面之比例既得面積而後開方得線也又法用面積相等邊線不同之定率比例以定率之正方形之每邊一為一率九等邊形之每邊四二一九九六三為二率今所設之九等邊形之面積八尺九十寸一十八分二十六釐開方得二尺九寸八分三釐五豪九絲二忽有餘為三率求得四率一尺二寸即九等邊形之每一邊也此法蓋因九等邊形之面積與正方形之面積相等九等邊形之每邊與正方形之每邊不同故以九等邊形之面積先開方既得方邊而後為線與線之比例也形每邊一尺二寸問面積幾何法以全圜三百六十度十分之每分得三十六度折半得十八度爰以十八度之正弦三萬零九百零二為一率半徑十萬為二率今所設之十等邊形之每邊一尺二寸折半得六寸為三率求得四率一尺九寸四分一釐六豪二絲一忽有餘為十等邊形外切圜之半徑或用求圜內容十等邊形之一邊之定率比例以定率之圜內容十等邊形之每邊三九一六九九為一率圜徑一為二率今所設之十等邊形之每邊一尺二寸為三率求得四率三尺八寸八分三釐二豪八絲一忽有餘折半得一尺九寸四分一釐六豪四絲有餘為十等邊形外切圜之半徑乃以此半徑為弦十等邊形之每邊折半為勾求得股一尺八寸四分六釐六豪零九忽有餘為十等邊形之中心至每邊正中之垂線或以十八度之正弦三萬零九百零二為一率十八度之餘弦九萬五千一百零六為二率今所設之十等邊形之每邊之半六寸為三率求得四率一尺八寸四分六釐五豪九絲八忽有餘為十等邊形之中心至每邊正中之垂線既得此垂線乃與每邊折半之數相乘得一尺一十寸七十九分五十八釐有餘十因之得一十一尺零七寸九十五分八十釐有餘即十等邊形之面積也如圖甲乙丙丁戊己庚辛壬癸十等邊形試作一外切圜形則每邊之弧皆為三十六度將甲乙邊折半於子自圜心丑作丑子寅半徑線遂平分甲乙弧於寅則甲寅弧為十八度甲子即十八度之正弦丑子即十八度之餘弦是故十八度之正弦與半徑十萬之比即如今所設之每邊之半甲子與所得之半徑甲丑之比又十八度之正弦與十八度之餘弦之比即如今所設之每邊之半甲子與所得之垂線丑子之比也此即圜內容十等邊形之法而轉用之也又法以十八度之正切三萬二千四百九十二為一率半徑十萬為二率今所設之十等邊形之每邊之半六寸為三率求得四率一尺八寸四分六釐六豪零八忽有餘為十等邊形內容圜之半徑或用求圜外切十等邊形之一邊之定率比例以定率之圜外切十等邊形之每邊三二四九一九七為一率圜徑一為二率今所設之十等邊形之每邊一尺二寸為三率求得四率三尺六寸九分三釐二豪二絲有餘折半得一尺八寸四分六釐六豪一絲有餘為十等邊形內容圜之半徑即十等邊形之中心至每邊正中之垂線乃與每邊折半之數相乘十因之得一十一尺零七寸九十六分六十釐有餘為十等邊形之面積也如圖甲乙丙丁戊己庚辛壬癸十等邊形試作一內容圜形自中心子至每邊之正中作子丑垂線遂平分戊巳邊於丑則戊丑即十八度之正切故以十八度之正切與半徑十萬之比同於今所設之每邊之半戊丑與所得之內容圜半徑子丑之比也此即圜外切十等邊形之法而轉用之也又法用連比例三率有中率求末率之法以每邊一尺二寸為中率求得末率七寸四分一釐六豪四絲有餘中率求末率即如首率求中率也乃以末率與中率相加得一尺九寸四分一釐六豪四絲有餘為首率即十等邊形之分角線即十等邊形外切圜之半徑乃以分角線為弦每邊之半為勾求得股一尺八寸四分六釐六豪零九忽有餘為十等邊形自中心至每邊正中之垂線即十等邊形內容圜之半徑乃以此垂線與每邊之半相乘十因之得一十一尺零七寸九十六分五十四釐有餘即十等邊形之面積也如圖甲乙丙丁戊己庚辛壬癸十等邊形子為十等邊形之中心試自中心子至戊巳二角作子戊子巳二線成子戊已三角形又自已角至丙角作巳丙線截子戊線於丑則又成巳丑戊三角形與子戊巳三角形為同式形故子戊線為首率即理分中末線之全分戊已邊為中率即理分中末線之大分而所截之子丑一段與戊巳邊等亦為中率丑戊一段即為末率即理分中末線之小分其比例為子戊首率與戊巳中率之比即同於戊已中率與丑戊末率之比故按連比例三率有中率求末率之法求得丑戊末率與子丑中率相加即得子戊首率為分角線又為十等邊形外切圜之半徑以子戊為弦戊巳邊之半戊寅為勾求得子寅股即十等邊形中心子至每邊正中之垂線又為十等邊形內容圜之半徑既得子寅垂線與戊已邊之半戊寅相乘得子戊巳一三角形之面積十因之即十等邊形之面積也又法用邊線相等面積不同之定率比例以定率之正方面積一為一率十等邊形面積七六九四二八八三為二率今所設之十等邊形之每邊一尺二寸自乘得一尺四十四寸為三率求得四率一十一尺零七寸九十六分六十釐有餘即十等邊形之面積也蓋十等邊形之每一邊為一則其自乘之正方面積為一而十等邊形之每一邊一所得之十等邊形面積為七六九四二八八三故以子丑寅卯辰巳午未申酉十等邊形之辰巳一邊一自乘之辰巳戌亥正方面積一與子丑寅卯辰已午未申酉十等邊形面積七六九四二八八三之比即同於今所設之甲乙丙丁戊己庚辛壬癸十等邊形之每一邊一尺二寸自乘之戊己乾坎正方面積一尺四十四寸與今所得之甲乙丙丁戊己庚辛壬癸十等邊形面積一十一尺零七寸九十六分六十釐有餘之比也又法用面積相等邊線不同之定率比例以定率之十等邊形之每邊三六五一五八為一率正方形之每邊一為二率今所設之十等邊形之每邊一尺二寸為三率求得四率三尺三寸二分八釐六豪一絲二忽有餘為十等邊形面積相等之正方形每邊之數自乘得一十一尺零七寸九十六分五十七釐有餘即十等邊形之面積也蓋十等邊形之每邊為三六五一五八正方形之每邊為一則兩面積相等故以子丑寅卯辰巳午未申酉十等邊形之辰巳一邊三六五一五八與戌亥金木正方形之亥金一邊一之比即同於今所設之甲乙丙丁戊己庚辛壬癸十等邊形之戊巳一邊一尺二寸與今所得之乾坎艮震正方形之坎艮一邊三尺三寸二分八釐六豪一絲二忽有餘之比既得坎艮一邊自乘得乾坎艮震正方面積即與甲乙丙丁戊己庚辛壬癸十等邊形之面積為相等也如有十等邊形之面積一十一尺零七寸九十六分六十釐求每邊之數則用邊線相等面積不同之定率比例以定率之十等邊形之面積七六九四二八八三為一率正方形之面積一為二率今所設之十等邊形之面積一十一尺零七寸九十六分六十釐為三率求得四率一尺四十四寸開方得一尺二寸即十等邊形之每一邊也此法蓋因十等邊形之每邊與正方形之每邊相等十等邊形之面積與正方形之面積不同故先定為面與面之比例既得面積而後開方得線也又法用面積相等邊線不同之定率比例以定率之正方形之每邊一為一率十等邊形之每邊三六五一五八為二率今所設之十等邊形之面積一十一尺零七寸九十六分六十釐開方得三尺三寸二分八釐六豪一絲二忽有餘為三率求得四率一尺二寸即十等邊形之每一邊也此法蓋因十等邊形之面積與正方形之面積相等十等邊形之每邊與正方形之每邊不同故以十等邊形之面積先開方既得方邊而後為線與線之比例也更面形設如正方形每邊一尺二寸今欲作與正方形積相等之圜面積問徑幾何法用面積相等邊線不同之定率比例以定率之正方形之每邊一為一率圜徑一一二八三七九一六為二率今所設之正方形之每邊一尺二寸為三率求得四率一尺三寸五分四釐零五絲四忽有餘即所求之圜徑也蓋正方形之每邊為一圜徑為一一二八三七九一六則兩面積相等故以子丑寅卯正方形之每邊一與辰巳圜徑一一二八三七九一六之比即同於今所設之甲乙丙丁正方形之每邊一尺二寸與今所得之戊巳圜徑一尺三寸五分四釐零五絲四忽有餘之比而兩面積亦為相等也設如正方形面積一尺四十四寸今欲作與正方邊相等之圜徑問積幾何法用邊線相等面積不同之定率比例以定率之正方面積一為一率圜面積七八五三九八一六為二率今所設之正方面積一尺四十四寸為三率求得四率一尺一十三寸零九分七十三釐有餘即所求之圜面積也蓋正方面積為一圜面積為七八五三九八一六則正方形之每邊與圜徑相等故以子丑寅卯正方面積一與辰巳圜面積七八五三九八一六之比即同於今所設之甲乙丙丁正方面積一尺四十四寸與今所得之戊巳圜面積一尺一十三寸零九分七十三釐有餘之比而正方形之每邊與圜徑亦為相等也設如圜徑一尺二寸今欲作與圜面積相等之三等邊形問每一邊幾何法用面積相等邊線不同之定率比例以定率之圜徑一一二八三七九一六為一率三等邊形之每邊一五一九六七一三七為二率今所設之圜徑一尺二寸為三率求得四率一尺六寸一分六釐一豪二絲八忽有餘即三等邊形之每一邊也蓋圜徑為一一二八三七九一六三等邊形之每邊為一五一九六七一三七則兩面積相等故以子丑圜徑一一二八三七九一六與寅卯辰三等邊形之每邊一五一九六七一三七之比即同於今所設之甲乙圜徑一尺二寸與今所得之丙丁戊三等邊形之每邊一尺六寸一分六釐一豪二絲八忽有餘之比而兩面積亦為相等也設如圜面積一尺四十四寸今欲作與圜徑相等之五等邊形問積幾何法用邊線相等面積不同之定率比例以定率之圜面積七八五三九八一六為一率五等邊形面積一七二四七七四一為二率今所設之圜面積一尺四十四寸為三率求得四率三尺一十五寸四十四分三十五釐有餘即五等邊形之面積也蓋圜面積為七八五三九八一六五等邊形面積為一七二四七七四一則圜徑與五等邊形之每邊相等故以子丑圜面積七八五三九八一六與寅卯辰巳午五等邊形面積一七二四七七四一之比即同於今所設之甲乙圜面積一尺四十四寸與今所得之丙丁戊己庚五等邊形面積三尺一十五寸四十四分三十五釐有餘之比而圜徑與五等邊形之每邊亦為相等也設如六等邊形每邊一尺二寸今欲作與六等邊形面積相等之七等邊形問每一邊幾何法用面積相等邊線不同之定率比例以定率之六等邊形每邊六二四三二四為一率七等邊形之每邊五二四五八一二六為二率今所設之六等邊形每邊一尺二寸為三率求得四率一尺零一分四釐六豪五絲八忽有餘即七等邊形之每一邊也蓋六等邊形每邊為六二四三二四七等邊形每邊為五二四五八一二六則兩面積相等故以子丑寅卯辰巳六等邊形之每邊六二四三二四與午未申酉戌亥金七等邊形之每邊五二四五八一二六之比即同於今所設之甲乙丙丁戊己六等邊形之每邊一尺二寸與今所得之庚辛壬癸乾坎艮七等邊形之每邊一尺零一分四釐六豪五絲八忽有餘之比而兩面積亦為相等也設如五等邊形面積一尺四十四寸今欲作與五等邊形每邊相等之八等邊形問積幾何法用邊線相等面積不同之定率比例以定率之五等邊形面積一七二四七七四一為一率八等邊形面積四八二八四二七一二為二率今所設之五等邊形面積一尺四十四寸為三率求得四率四尺零四寸一十二分八十二釐有餘即八等邊形之面積也蓋五等邊形面積為一七二四七七四一八等邊形面積為四八二八四二七一二則五等邊形之每邊與八等邊形之每邊相等故以子丑寅卯辰五等邊形之面積一七二四七七四一與巳午未申酉戌亥金八等邊形之面積四八二八四二七一二之比即同於今所設之甲乙丙丁戊五等邊形之面積一尺四十四寸與今所得之己庚辛壬癸乾坎艮八等邊形之面積四尺零四寸一十二分八十二釐有餘之比而五等邊形之每邊與八等邊形之每邊亦為相等也御製數理精藴下編卷二十二
