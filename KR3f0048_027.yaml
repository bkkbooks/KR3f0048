body:
  text: 欽定四庫全書御製數理精藴卷二十二面部十二各等邊形更面形各等邊形設如五等邊形每邊一尺二寸問面積幾何法以全圜三百六十度五分之每分得七十二度折半得三十六度爰以三十六度之正弦五萬八千七百七十九為一率半徑十萬為二率今所設之五等邊形之每邊一尺二寸折半得六寸為三率求得四率一尺零二分零七豪七絲二忽有餘為五等邊形外切圜之半徑或用求圜內容五等邊形之一邊之定率比例以定率之圜內容五等邊形之每邊五八七七八五二五為一率圜徑一為二率今所設之五等邊形之每邊一尺二寸為三率求得四率二尺零四分一釐五豪六絲一忽有餘折半得一尺零二分零七豪八絲有餘為五等邊形外切圜之半徑乃以此半徑為弦五等邊形之每邊折半為勾求得股八寸二分五釐八豪二絲七忽有餘為五等邊形之中心至每邊正中之垂線或以三十六度之正弦五萬八千七百七十九為一率三十六度之餘弦八萬零九百零二為二率今所設之五等邊形之每邊之半六寸為三率求得四率八寸二分五釐八豪二絲五忽有餘為五等邊形之中心至每邊正中之垂線既得此垂線乃與每邊折半之數相乘得四十九寸五十四分九十釐有餘五因之得二尺四十七寸七十四分五十釐有餘即五等邊形之面積也如圖甲乙丙丁戊五等邊形試作一外切圜形則每邊之弧皆為七十二度將甲乙邊折半於己自圜心庚作庚己辛半徑線遂平分甲乙弧於辛則甲辛弧為三十六度甲己即三十六度之正弦庚己即三十六度之餘弦是故三十六度之正弦與半徑十萬之比即如今所設之每邊之半甲己與所得之半徑甲庚之比又三十六度之正弦與三十六度之餘弦之比即如今所設之每邊之半甲己與所得之垂線庚己之比也此即圜內容五等邊形之法而轉用之也又法以三十六度之正切七萬二千六百五十四為一率半徑十萬為二率今所設之五等邊形之每邊之半六寸為三率求得四率八寸二分五釐八豪三絲二忽有餘為五等邊形內容圜之半徑或用求圜外切五等邊形之一邊之定率比例以定率之圜外切五等邊形之每邊七二六五四二五二為一率圜徑一為二率今所設之五等邊形之每邊一尺二寸為三率求得四率一尺六寸五分一釐六豪五絲八忽有餘折半得八寸二分五釐八豪二絲九忽有餘為五等邊形內容圜之半徑即五等邊形之中心至每邊正中之垂線乃與每邊折半之數相乘五因之得二尺四十七寸七十四分八十七釐有餘為五等邊形之面積也如圖甲乙丙丁戊五等邊形試作一內容圜形自甲角過圜心己作甲己庚線遂平分丙丁邊於庚則丙庚即三十六度之正切故以三十六度之正切與半徑十萬之比同於今所設之每邊之半丙庚與所得之內容圜半徑己庚之比也此即圜外切五等邊形之法而轉用之也又法用連比例三率有中率求末率之法以每邊一尺二寸為中率求得末率七寸四分一釐六豪四絲有餘中率求末率即如首率求中率也乃以末率與中率相加得一尺九寸四分一釐六豪四絲有餘為首率即五等邊形兩角相對之斜線乃以此斜線為弦每邊之半為勾求得股一尺八寸四方六釐六豪零九忽有餘為五等邊形中心至每邊正中之垂線與分角線之和即五等邊形自一角至每邊正中之垂線復以此垂線為首率每邊之半為中率求得末率一寸九分四釐九豪五絲二忽為五等邊形中心至每邊正中之垂線與分角線之較乃以此較數與先所得和數相加得二尺零四分一釐五豪六絲一忽有餘折半得一尺零二分零七豪八絲有餘為五等邊形之分角線即五等邊形外切圜之半徑仍以此較數與先所得和數相減得一尺六寸五分一釐六豪五絲七忽有餘折半得八寸二分五釐八豪二絲八忽有餘為五等邊形中心至每邊正中之垂線即五等邊形內容圜之半徑乃以此垂線與每邊之半相乘五因之得二尺四十七寸七十四分八十四釐有餘即五等邊形之面積也如圖甲乙丙丁戊五等邊形巳為五等邊形之中心試自甲角至丙丁二角作甲丙甲丁二線成甲丙丁三角形又自丁角至乙角作丁乙線截甲丙線於庚則又成丁庚丙三角形此兩三角形為同式形故甲丙線為首率即理分中末線之全分丙丁邊為中率即理分中末線之大分而所截之甲庚一段與丙丁邊等亦為中率庚丙一段即為末率即理分中末線之小分其比例為甲丙首率與丙丁中率之比即同於丙丁中率與庚丙末率之比故按連比例三率有中率求末率之法求得庚丙末率與甲庚中率相加即得甲丙首率為兩角相對斜線爰用甲丙斜線為弦丙辛每邊之半為勾求得用辛股為己辛中心至邊之垂線與甲己分角線之和既得甲辛線則用連比例有首率中率求末率之法以甲辛為首率丙辛為中率求得辛壬末率即己辛中心至邊之垂線與甲己分角線之較既得辛壬與甲辛相加折半得甲己即分角線又為五等邊形外切圜之半徑以辛壬與甲辛相減折半得己辛即中心至每邊之垂線又為五等邊形內容圜之半徑既得己辛垂線與丙丁每邊之半丙辛相乘得己丙丁一三角形之面積五倍之即五等邊形之面積也又既得五等邊形兩角相對之斜線與自一角至每邊正中之垂線求面積捷法以所得末率七寸四分一釐六豪四絲有餘加每邊之半六寸得一尺三寸四分一釐六豪四絲有餘與自一角至每邊正中之垂線一尺八寸四分六釐六豪零九忽有餘相乘得二尺四十七寸七十四分八十四釐有餘即五等邊形之面積也如圖甲乙丙丁戊五等邊形自甲角至丙丁二角作甲丙甲丁二線遂成甲丙丁甲乙丙甲戊丁三三角形又自甲至己作甲己垂線則甲己垂線與丙己每邊之半相乘即得甲丙丁三角形面積又自乙角至甲丙線上作乙庚垂線則乙庚垂線與甲丙斜線相乘即得甲乙丙甲戊丁兩三角形之共面積然無乙庚之數今試自丁角至乙角作丁乙斜線截甲丙斜線於辛則甲辛與丁辛等俱為中率乙辛與辛丙等俱為末率又成乙辛庚勾股形與甲丙己勾股形為同式形丁辛丙三角形之辛角原與丙角等而與乙辛庚勾股形之辛角為對角其度亦等庚角與己角又同為直角其餘一角亦必等所以為同式形故甲丙為一率甲己為二率乙辛為三率乙庚為四率凡二率三率相乘與一率四率相乘之數等今以甲己垂線與乙辛末率相乘必與乙庚垂線與甲丙斜線相乘之積等是即甲乙丙甲戊丁兩三角形之共積矣故以乙辛末率與丙己每邊之半相加而與甲己垂線相乘即得甲乙丙丁戊五等邊形之面積也又法用邊線相等面積不同之定率比例以定率之正方面積一為一率五等邊形面積一七二四七七四一為二率今所設之五等邊形之每邊一尺二寸自乘得一尺四十四寸為三率求得四率二尺四十七寸七十四分八十七釐有餘即五等邊形之面積也蓋五等邊形之每一邊為一則其自乘之正方面積為一而五等邊形之每一邊一所得之五等邊形面積為一七二四七七四一故以子丑寅卯辰五等邊形之寅卯一邊一自乘之寅卯己午正方面積一與子丑寅卯辰五等邊形面積一七二四七七四一之比即同於今所設之甲乙丙丁戊五等邊形之每一邊一尺二寸自乘之丙丁己庚正方面積一尺四十四寸與今所得之甲乙丙丁戊五等邊形面積二尺四十七寸七十四分八十七釐有餘之比也又法用面積相等邊線不同之定率比例以定率之五等邊形之每邊七六二三八七五為一率正方形之每邊一為二率今所設之五等邊形之每邊一尺二寸為三率求得四率一尺五寸七分四釐零三忽有餘為與五等邊形面積相等之正方形每邊之數自乘得二尺四十七寸七十四分八十五釐有餘即五等邊形之面積也蓋五等邊形之每邊為七六二三八七五正方形之每邊為一則兩面積相等故以子丑寅卯辰五等邊形之寅卯一邊七六二三八七五與己午未申正方形之午未一邊一之比即同於今所設之甲乙丙丁戊五等邊形之丙丁一邊一尺二寸與今所得之己庚辛壬正方形之庚辛一邊一尺五寸七分四釐零三忽有餘之比既得庚辛一邊自乘得己庚辛壬正方面積即與甲乙丙丁戊五等邊形之面積為相等也如有五等邊形之面積二尺四十七寸七十四分八十七釐求每邊之數則用邊線相等面積不同之定率比例以定率之五等邊形之面積一七二四七七四一為一率正方形之面積一為二率今所設之五等邊形之面積二尺四十七寸七十四分八十七釐為三率求得四率一尺四十四寸開方得一尺二寸即五等邊形之每一邊也此法蓋因五等邊形之每邊與正方形之每邊相等五等邊形之面積與正方形之面積不同故先定為面與面之比例既得面積而後開方得線也又法用面積相等邊線不同之定率比例以定率之正方形之每邊一為一率五等邊形之每邊七六二三八七五為二率今所設之五等邊形之面積二尺四十七寸七十四分八十七釐開方得一尺五寸七分四釐零三忽有餘為三率求得四率一尺二寸即五等邊形之每一邊也此法蓋因五等邊形之面積與正方形之面積相等五等邊形之每邊與正方形之每邊不同故以五等邊形之面積先開方既得方邊而後為線與線之比例也設如六等邊形每邊一尺二寸問面積幾何法因六等邊形之每邊與分角線即六等邊形外切圜之半徑相等故即以每邊一尺二寸為弦每邊之半六寸為勾求得股一尺零三分九釐二豪三絲有餘為六等邊形中心至每邊正中之垂線即六等邊形內容圜之半徑乃以此垂線與每邊之半相乘六因之得三尺七十四寸一十二分二十八釐有餘即六等邊形之面積也如圖甲乙丙丁戊己六等邊形庚為六等邊形之中心其庚丙分角線與丙丁類每邊等故以庚丙為弦每邊之半丙辛為勾求得庚辛股即六等邊形中心至每邊正中之垂線既得垂線與丙丁之半丙辛相乘得庚丙丁一三角形面積六倍之即六等邊形之面積也又法用邊線相等面積不同之定率比例以定率之正方面積一為一率六等邊形面積二五九八七六二為二率今所設之六等邊形之每邊一尺二寸自乘得一尺四十四寸為三率求得四率三尺七十四寸一十二分二十九釐有餘即六等邊形之面積也蓋六等邊形之每一邊為一則其自乘之正方面積為一而六等邊形之每一邊一所得之六等邊形面積為二五九八七六二故以子丑寅卯辰己六等邊形之寅卯一邊一自乘之寅卯午未正方面積一與子丑寅卯辰己六等邊形面積二五九八七六二之比即同於今所設之甲乙丙丁戊己六等邊形之每一邊一尺二寸自乘之丙丁庚辛正方面積一尺四十四寸與今所得之甲乙丙丁戊己六等邊形面積三尺七十四寸一十二分二十九釐有餘之比也又法用面積相等邊線不同之定率比例以定率之六等邊形之每邊六二四三二四為一率正方形之每邊一為二率今所設之六等邊形之每邊一尺二寸為三率求得四率一尺九寸三分四釐二豪二絲五忽有餘為與六等邊形面積相等之正方形每邊之數自乘得三尺七十四寸一十二分二十六釐有餘即六等邊形之面積也蓋六等邊形之每邊為六二四三二四正方形之每邊為一則兩面積相等故以子丑寅卯辰己六等邊形之寅卯一邊六二四三二四與午未申酉正方形之未申一邊一之比即同於今所設之甲乙丙丁戊己六等邊形之丙丁一邊一尺二寸與今所得之庚辛壬癸正方形之辛壬一邊一尺九寸三分四釐二豪二絲五忽有