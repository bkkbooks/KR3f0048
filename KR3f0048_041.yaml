body:
  text: 欽定四庫全書御製數理精藴下編卷三十六末部六借根方比例體類體類設如有扁方體髙十八尺若將體積加六倍則髙與長闊皆相等問長闊之各一邊及體積幾何法借一根為長闊之各一邊數以一根自乘得一平方為扁方體之面積再以髙十八尺乘之得十八平方為扁方體之體積又以一根與一平方相乘得一立方為扁方體積之六倍乃以扁方體之體積十八平方六因之得一百零八平方是為一立方與一百零八平方相等兩邊各降二位得一根與一百零八尺相等即扁方體之長闊各一邊數也以一百零八尺自乘得一萬一千六百六十四尺再以十八尺乘之得二十萬零九千九百五十二尺為扁方體積六因之得一百二十五萬九千七百一十二尺與每邊一百零八尺自乘再乘之立方積相等此扁方體邊線比例法也蓋兩體之底面積既同則其體積之比例同於其髙之比例今扁方體之長闊各一邊既與正方體之每一邊等而正方體積為扁方體積之六倍則其髙亦必為六倍故以扁方體之髙數六因之即得長闊之各一邊數也設如有一長方體髙三尺五寸又有一正方體其每一面積與長方體之底面積等而長方體積為正方體積之五倍問正方體之一邊及體積各幾何法借一根為正方體每邊之數以一根自乘得一平方為正方體之面積亦即長方體之底面積以一平方與髙三十五寸相乘得三十五平方為長方體之體積又以一根自乘再乘得一立方為正方體之體積長方體積既為正方體之五倍乃以一立方五因之得五立方而與三十五平方為相等兩邊各降二位得五根與三十五寸相等五根既與三十五寸相等則一根必與七寸相等即正方體之每一邊之數也以七寸自乘再乘得三百四十三寸即正方體之體積又以七寸自乘得四十九寸再以三十五寸乘之得一千七百一十五寸即長方體之體積為正方體積之五倍此一長方體一正方體同底比例法也蓋兩體之底面積既同則其體積之比例同於其髙之比例今正方體之每一面積既與長方體之底面積等而長方體積為正方體積之五倍則其髙亦必為五倍故長方體之髙之五分之一即正方體之每一邊之數也設如有一正方面形又有一正方體形但知正方面每邊為正方體每邊之八倍而正方面積與正方體積相等問邊線積數各若干法借一根為正方體每邊之數則正方面每邊之數為八根以一根自乘再乘得一立方為正方體積以八根自乘得六十四平方為正方面積是為一立方與六十四平方相等兩邊各降二位得一根與六十四尺相等即正方體每邊之數八因之得五百一十二尺即正方面每邊之數以五百一十二尺自乘得二十六萬二千一百四十四尺為正方面積以六十四尺自乘再乘亦得二十六萬二千一百四十四尺為正方體積兩數相等也此一平方一立方邊數積數比例法設如有帶兩縱不同立方體其髙與闊之比例同於四與六闊與長之比例同於六與九其髙與闊相乘之數為長數之四倍問髙闊長各幾何法借四根為髙數六根為闊數九根為長數以髙四根與闊六根相乘得二十四平方為長數之四倍乃以長數九根四因之得三十六根是為二十四平方與三十六根相等兩邊各降一位得二十四根與三十六尺相等二十四根既與三十六尺相等則四根必與六尺相等即髙數六根必與九尺相等即闊數九根必與一十三尺五寸相等即長數以髙六尺與闊九尺相乘得五十四尺四歸之得一十三尺五寸與長數相等也此帶兩縱不同立方邊線面積比例法設如有帶兩縱不同立方體長二十四尺髙與闊和五十二尺其髙與闊相乘之積與長自乘之積等問髙闊各若干法借一根為髙數則闊數為五十二尺少一根以髙一根與闊五十二尺少一根相乘得五十二根少一平方又以長二十四尺自乘得五百七十六尺此二數為相等乃以五百七十六尺為長方積以五十二根作五十二尺為長闊和用帶縱和數開平方法算之得闊十六尺為一根之數即立方之髙數與髙闊和五十二尺相減餘三十六尺即立方之闊數以髙十六尺與闊三十六尺相乘得五百七十六尺與長二十四尺自乘之數相等也此帶兩縱不同立方邊線與面積比例法設如有帶兩縱不同立方體髙十二寸長比闊多十寸其長與闊相乘之積與髙自乘之積等問長闊各若干法借一根為闊數則長數為一根多十寸以闊一根與長一根多十寸相乘得一平方多十根以髙十二寸自乘得一百四十四寸此二數為相等乃以一百四十四寸為長方積以十根作十寸為長闊較用帶縱較數開平方法算之得闊八寸為一根之數即立方之闊數加長比闊多十寸得十八寸即立方之長數以闊八寸與長十八寸相乘得一百四十四寸與髙十二寸自乘之數相等也此帶兩縱不同立方邊較與面積比例法設如有帶兩縱不同立方體長比闊多四寸闊比髙多二寸其體積比髙自乘再乘之正方體多一百七十六寸問長闊髙各幾何法借一根為髙數則闊數為一根多二寸長數為一根多六寸以髙一根與闊一根多二寸相乘得一平方多二根再以長一根多六寸乘之得一立方多八平方多十二根內減髙數一根自乘再乘之一立方餘八平方多十二根與一百七十六寸相等八平方多十二根既與一百七十六寸相等則一平方多一根半必與二十二寸相等乃以二十二寸為長方積以一根半作一寸五分為長闊較用帶縱較數開平方法算之得闊四寸為一根之數即立方之髙數加闊比髙多二寸得六寸即立方之闊數再加長比闊多四寸得十寸即立方之長數以長闊相乘以髙再乘得二百四十寸為立方體積內減髙四寸自乘再乘之六十四寸餘一百七十六寸以合原數也此帶兩縱不同立方邊較與積較比例法設如一長方池深二十尺長闊和六十尺其體積一萬七千二百八十尺問長闊各若干法借一根為闊數則長數為六十尺少一根以闊一根與長六十尺少一根相乘得六十根少一平方以深二十尺再乘得一千二百根少二十平方與一萬七千二百八十尺相等一千二百根少二十平方既與一萬七千二百八十尺相等則六十根少一平方必與八百六十四尺相等乃以八百六十四尺為長方積以六十根作六十尺為長闊和用帶縱和數開平方法算之得闊二十四尺為一根之數即池之闊數與長闊和六十尺相減餘三十六尺即池之長數以長闊相乘以深再乘得一萬七千二百八十尺以合原數也此帶兩縱不同立方知一邊與兩邊和相求法設如一長方池深三十尺長比闊多十尺其體積七萬一千二百八十尺問長闊各若干法借一根為闊數則長數為一根多十尺以闊一根與長一根多十尺相乘得一平方多十根再以深三十尺乘之得三十平方多三百根與七萬一千二百八十尺相等三十平方多三百根既與七萬一千二百八十尺相等則一平方多十根必與二千三百七十六尺相等乃以二千三百七十六尺為長方積以十根作十尺為長闊較用帶縱較數開平方法算之得闊四十四尺為一根之數即池之闊數加長比闊多十尺得五十四尺即池之長數也以長闊相乘以深再乘得七萬一千二百八十尺以合原數也此帶兩縱不同立方知一邊與兩邊較相求法設如有帶兩縱不同立方體長闊髙共五十八尺長比闊多六尺其對角斜線自乘之數為一千一百五十六尺問長闊髙各幾何法借一根為闊數則長數為一根多六尺以長闊兩數相加得二根多六尺與長闊髙共五十八尺相減餘五十二尺少二根為髙數以闊一根自乘得一平方為闊自乘之數以長一根多六尺自乘得一平方多十二根多三十六尺為長自乘之數以髙五十二尺少二根自乘得二千七百零四尺少二百零八根多四平方為髙自乘之數三自乘數相加得二千七百四十尺少一百九十六根多六平方與對角線自乘之一千一百五十六尺相等兩邊各加一百九十六根得二千七百四十尺多六平方與一千一百五十六尺多一百九十六根相等兩邊各減一千一百五十六尺得一千五百八十四尺多六平方與一百九十六根相等一千五百八十四尺多六平方既與一百九十六根相等則二百六十四尺多一平方必與三十二根又六分根之四相等乃以二百六十四尺為長方積以三十二根六分根之四作三十二尺又六分尺之四為長闊和用帶縱和數開平方法算之得長十八尺為一根之數即立方之闊加長比闊多六尺得二十四尺即立方之長長闊相加得四十二尺與長闊髙共五十八尺相減餘十六尺即立方之髙也以髙十六尺自乘得二百五十六尺以闊十八尺自乘得三百二十四尺以長二十四尺自乘得五百七十六尺三自乘數相加得一千一百五十六尺與對角斜線自乘之數相等也此帶兩縱不同立方邊線面積和較相求法設如有帶兩縱不同立方體其長闊髙為相連比例三率長為首率闊為中率髙為末率共五十七寸其六面積共二千零五十二寸問長闊髙各幾何法借一根為長數則闊髙之共數為五十七寸少一根又以六面積共二千零五十二寸折半得一千零二十六寸為三面積共數以長闊髙共五十七寸除之得一十八寸為闊數因長為首率闊為中率髙為末率故其三面積一為首率乘中率一為末率乘中率一為首率乘末率而首率乘末率之數與中率自乘之數等則此三而積相合即為首率中率末率之共數乘中率之數矣故以長闊髙之共數除之即得中率為闊也以闊一十八尺與闊髙之共數五十七寸少一根相減餘三十九寸少一根為髙數乃以首率長一根與末率髙三十九寸少一根相乘得三十九根少一平方與中率闊十八寸自乘之三百二十四寸相等乃以三百二十四寸為長方積以三十九根作三十九寸為長闊和用帶縱和數開平方法算之得長二十七寸為一根之數即立方之長數與髙長和三十九寸相減餘一十二寸即立方之髙數以長二十七寸與闊十八寸之比同於闊十八寸與髙十二寸之比為相連比例三率也此帶兩縱不同立方邊線面積相和比例法設如有帶兩縱不同立方體其髙與闊之比例同於一與二闊與長之比例同於二與三以髙自乘再乘之數與闊自乘再乘之數相加比原體積多一千零二十九寸問長闊髙各幾何法借一根為髙數則闊數為二根長數為三根以闊二根與長三根相乘得六平方再以髙一根乘之得六立方為原體積又以髙一根自乘再乘得一立方以闊二根自乘再乘得八立方相併得九立方內減原體積六立方餘三立方與一千零二十九寸相等三立方既與一千零二十九寸相等則一立方必與三百四十三寸相等乃以三百四十三寸開立方得七寸為一根之數即立方之髙數倍之得十四寸即立方之闊數三因之得二十一寸即立方之長數以長二十一寸與闊十四寸相乘得二百九十四寸再以髙七寸乘之得二千零五十八寸為原體積又以髙七寸自乘再乘得三百四十三寸闊十四寸自乘再乘得二千七百四十四寸相併得三千零八十七寸與原體積相減餘一千零二十九寸以合原數也此帶兩縱不同立方邊線體積比例法設如有甲乙丙三正方體甲方邊與乙方邊之比例同於二與三乙方積比甲方積多一百五十二寸丙方積比乙方積多七百八十四寸問三正方體之邊數各若干法借二根為甲方每邊之數則乙方每邊之數為三根以二根自乘再乘得八立方為甲方之體積以三根自乘再乘得二十七立方為乙方之體積兩體積相減餘一十九立方與一百五十二寸相等十九立方既與一百五十二寸相等則一立方必與八寸相等乃以八寸開立方得二寸為一根之數倍之得四寸即甲方每邊之數三因之得六寸即乙方每邊之數自乘再乘得二百一十六寸加七百八十四寸得一千寸開立方得十寸即丙方每邊之數也此三正方體邊線體積比例法設如有帶兩縱不同立方體髙比闊為五分之一闊比長亦為五分之一體積六十一萬四千一百二十五尺問髙闊長各幾何法借一根為髙數則闊數為五根長數為二十五根以闊五根與長二十五根相乘得一百二十五平方再以髙一根乘之得一百二十五立方與六十一萬四千一百二十五尺相等一百二十五立方既與六十一萬四千一百二十五尺相等則一立方必與四千九百一十三尺相等乃以四千九百一十三尺開立方得十七尺為一根之數即立方之髙以五乘之得八十五尺即立方之闊以二十五乘之得四百二十五尺即立方之長也乃以長闊相乘得三萬六千一百二十五尺再以髙乘之得六十一萬四千一百二十五尺以合原數也此帶分比例開立方法設如有一大長方體其闊三倍於髙其長三倍於闊又有一小長方體比大長方體髙為二分之一闊為三分之二長為九分之七小長方體積二萬三千六百二十五寸問大小二長方體之長闊髙各幾何法借一根為大長方體之髙則大長方體之闊為三根大長方體之長為九根小長方體之髙為半根小長方體之闊為二根小長方體之長為七根乃以長七根與闊二根相乘得一十四平方再以髙半根乘之得七立方為小長方體積與二萬三千六百二十五寸相等七立方既與二萬三千六百二十五寸相等則一立方必與三千三百七十五寸相等乃以三千三百七十五寸開立方得十五寸為一根之數即大長方體之髙三因之得四十五寸即大長方體之闊又以三因之得一百三十五寸即大長方體之長以大長方體之髙折半得七寸五分即小長方體之髙以大長方體之闊三歸二因得三十寸即小長方體之闊以大長方體之長九歸七因得一百零五寸即小長方體之長以小長方體之長闊相乘再以髙乘之得二萬三千六百二十五寸以合原數也此帶分比例開立方法設如有人買馬三次第二次比第一次多一倍第三次比第二次多一倍以第三次馬數四分之一與第二次馬數之一半相乘又與第一次馬數三分之一相乘得六千五百六十一匹問三次所買馬數各若干法借三根為第一次買馬之數第一次分母數則第二次買馬之數為六根第三次買馬之數為十二根以第三次四分之一三根與第二次之一半三根相乘得九平方又與第一次三分之一一根相乘得九立方與六千五百六十一匹相等九立方既與六千五百六十一匹相等則一立方必與七百二十九匹相等乃以七百二十九匹開立方得九匹為一根之數三因之得二十七匹為第一次買馬之數倍之得五十四匹為第二次買馬之數又倍之得一百零八匹為第三次買馬之數以第三次四分之一二十七匹與第二次一半二十七匹相乘得七百二十九匹再以第一次三分之一九匹乘之得六千五百六十一匹以合原數也此帶分比例開立方法設如有馬牛羊各不知數但知牛數比馬數多四羊數與馬牛相乘之數等馬每匹之價與牛數等牛每頭之價與馬數等羊每隻之價比馬每匹價少十兩而羊之共價為一百九十二兩問馬牛羊及價銀各若干法借一根為馬數則牛數為一根多四以馬數一根與牛數一根多四相乘得一平方多四根為羊數馬價與牛數等為一根多四兩則羊價為一根少六兩以羊數一平方多四根與羊價一根少六兩相乘得一立方少二平方少二十四根為羊之共價與一百九十二兩相等乃以一百九十二兩為磬折扁方體積用帶縱開立方法算之得八為一根之數即馬數亦即牛每頭之價為八兩也加牛比馬多四得十二為牛數亦即馬每匹之價為十二兩也以馬數八與牛數十二相乘得九十六為羊數以羊數九十六歸除羊共價一百九十二兩得二兩為羊每隻價比馬一匹之價少十兩也此磬折扁方體求邊法設如有馬騾運重其共馬數比馬每匹所䭾之數多二十騾每匹所䭾之數比共馬數多三十其共騾數與馬所䭾之共數等但知騾共䭾一千一百萬斤問馬數騾數及所䭾之斤數各若干法借一根為共馬數則馬每匹所䭾之斤數為一根少二十斤騾每匹所䭾之數為一根多三十斤以共馬數一根與馬每匹䭾一根少二十斤相乘得一平方少二十根為馬所䭾之共數亦即共騾數再以騾每匹䭾一根多三十斤乘之得一立方多十平方少六百根為騾所䭾之共數與一千一百萬斤相等乃以一千一百萬斤為磬折長方體積用帶縱開立方法算之得二百二十為一根之數即共馬數減二十餘二百斤為馬每匹所䭾之數以共馬二百二十匹與馬每匹所䭾之二百斤相乘得四萬四千斤為馬所䭾之共數亦即共騾數以共騾四萬四千匹歸除一千一百萬斤得二百五十斤為騾每匹所䭾之數比共馬數二百二十多三十也此磬折長方體求邊法設如有大小二正方體邊數共二尺六寸體積共五千零九十六寸問二正方體邊數體積各幾何法借一根為小方每邊之數則大方每邊之數為二十六寸少一根以一根自乘再乘得一立方為小方之體積以二十六寸少一根自乘再乘得一萬七千五百七十六寸少二千零二十八根多七十八平方少一立方為大方之體積兩體積相加得一萬七千五百七十六寸少二千零二十八根多七十八平方與五千零九十六寸相等兩邊各加二千零二十八根得一萬七千五百七十六寸多七十八平方與五千零九十六寸多二千零二十八根相等兩邊各減五千零九十六寸得一萬二千四百八十寸多七十八平方與二千零二十八根相等一萬二千四百八十寸多七十八平方既與二千零二十八根相等則一百六十寸多一平方必與二十六根相等乃以一百六十寸為長方積以二十六根作二十六寸為長闊和用帶縱和數開平方法算之得闊十寸為一根之數即小方每邊之數與共邊二十六寸相減餘一十六寸即大方每邊之數以十寸自乘再乘得一千寸即小方之體積以十六寸自乘再乘得四千零九十六寸即大方之體積兩體積相加共五千零九十六寸以合原數也此二正方體有邊和積和求邊法設如有大小二正方體大方邊比小方邊多四尺大方積比小方積多一千二百一十六尺問二正方體邊數體積各幾何法借一根為小方每邊之數則大方每邊之數為一根多四尺以一根自乘再乘得一立方為小方之體積以一根多四尺自乘再乘得一立方多十二平方多四十八根多六十四尺為大方之體積兩體積相減得十二平方多四十八根多六十四尺與一千二百一十六尺相等兩邊各減六十四尺得十二平方多四十八根與一千一百五十二尺相等十二平方多四十八根既與一千一百五十二尺相等則一平方多四根必與九十六尺相等乃以九十六尺為長方積以四根作四尺為長闊較用帶縱較數開平方法算之得闊八尺為一根之數即小方每邊之數加四尺得一十二尺即大方每邊之數以八尺自乘再乘得五百一十二尺即小方之體積以一十二尺自乘再乘得一千七百二十八尺即大方之體積兩體積相減餘一千二百一十六尺以合原數也此二正方體有邊較積較求邊法設如有大小二正方體大方邊比小方邊多二尺體積共一千零七十二尺問二正方體邊數體積各幾何法借一根為小方每邊之數則大方每邊之數為一根多二尺以一根自乘再乘得一立方為小方之體積以一根多二尺自乘再乘得一立方多六平方多十二根多八尺為大方之體積兩體積相加得二立方多六平方多十二根多八尺與一千零七十二尺相等兩邊各減去八尺得二立方多六平方多十二根與一千零六十四尺相等二立方多六平方多十二根既與一千零六十四尺相等則一立方多三平方多六根必與五百三十二尺相等乃以五百三十二尺為磬折長方體積用帶縱開立方法算之得七尺為一根之數即小方每邊之數加二尺得九尺即大方每邊之數以七尺自乘再乘得三百四十三尺即小方之體積以九尺自乘再乘得七百二十九尺即大方之體積兩體積相加得一千零七十二尺以合原數也此二正方體有邊較積和求邊法設如有大小二正方體邊數共十四尺大方比積小方積多二百九十六尺問二正方體之邊數體積各幾何法借一根為小方每邊之數則大方每邊之數為十四尺少一根以一根自乘再乘得一立方為小方之體積以十四尺少一根自乘再乘得二千七百四十四尺少五百八十八根多四十二平方少一立方為大方之體積兩體積相減得二千七百四十四尺少五百八十八根多四十二平方少二立方與二百九十六尺相等兩邊各加二立方又加五百八十八根得二立方多五百八十八根多二百九十六尺與二千七百四十四尺多四十二平方相等兩邊各減去二百九十六尺又各減去四十二平方得二立方少四十二平方多五百八十八根與二千四百四十八尺相等二立方少四十二平方多五百八十八根既與二千四百四十八尺相等則一立方少二十一平方多二百九十四根必與一千二百二十四尺相等乃以一千二百二十四尺為磬折扁方體積用帶縱開立方法算之得六尺為一根之數即小方每邊之數與共邊數十四尺相減餘八尺即大方每邊之數以六尺自乘再乘得二百一十六尺為小方之體積以八尺自乘再乘得五百一十二尺為大方之體積兩體積相減餘二百九十六尺以合原數也此二正方體有邊和積較求邊法設如勾股積二百四十尺股弦較四尺問勾股弦各幾何法借一根為股數則弦為一根多四尺以一根自乘得一平方為股自乘之數以一根多四尺自乘得一平方多八根多十六尺為弦自乘之數內減去股自乘之一平方餘八根多十六尺為勾自乘之數凡勾自乘之數與勾股相乘之數及股自乘之數為相連比例三率乃以首率勾自乘之八根多十六尺與末率股自乘之一平方相乘得八立方多十六平方又以勾股積二百四十尺倍之得四百八十尺為中率自乘得二十三萬零四百尺是為八立方多十六平方與二十三萬零四百尺相等八立方多十六平方既與二十三萬零四百尺相等則一立方多二平方必與二萬八千八百尺相等乃以二萬八千八百尺為長方體積用帶縱開立方法算之得三十尺為一根之數即股數加股弦較四尺得三十四尺即弦數又以股三十尺除倍積四百八十尺得十六尺即勾數也此有勾股積有股弦較求勾股弦法設如勾股積二百四十尺勾弦和五十尺問勾股弦各幾何法借一根為勾數則弦為五十尺少一根以一根自乘得一平方為勾自乘之數以五十尺少一根自乘得二千五百尺少一百根多一平方為弦自乘之數內減去勾自乘之一平方餘二千五百尺少一百根為股自乘之數凡勾自乘之數與勾股相乘之數及股自乘之數為相連比例三率則以首率勾自乘之一平方與末率股自乘之二千五百尺少一百根相乘得二千五百平方少一百立方又以勾股積二百四十尺倍之得四百八十尺為中率自乘得二十三萬零四百尺是為二千五百平方少一百立方與二十三萬零四百尺相等二千五百平方少一百立方既與二十三萬零四百尺相等則一平方少二十五分立方之一必與九十二尺一十六寸相等乃以九十二尺一十六寸為扁方體積用帶縱開立方法算之得一十六尺為一根之數即勾數與勾弦和五十尺相減餘三十四尺即弦數又以勾十六尺除倍積四百八十尺得三十尺即股數也此有勾股積有勾弦和求勾股弦法設如有數十萬為一率作相連比例四率使一率與四率相加與二率三倍等問二率三率四率各幾何法借一根為二率以二率一根自乘得一平方以一率十萬除之得十萬分平方之一為三率又以二率一根與三率十萬分平方之一相乘得十萬分立方之一以一率十萬除之得一百億分立方之一為四率將四率俱以百億乘之則一率為一千兆二率為一百億根三率為一十萬平方四率為一立方因四率為百億分立方之一以百億乘之則得一整立方故將餘三率俱以百億乘之其比例始相當也乃以一率與四率相加得一千兆多一立方又以二率三倍之得三百億根是為三百億根與一千兆多一立方相等兩邊各減去一立方得三百億根少一立方與一千兆相等乃以一千兆為實以三百億根為法用割圜內新增益實歸除法算之得三萬四千七百二十九為一根之數即相連比例之第二率也以二率自乘一率除之得一萬二千零六十一為相連比例之第三率又以二率與三率相乘一率除之得四千一百八十七為相連比例之第四率乃以一率與四率相加得一十萬零四千一百八十七與二率之三倍相等也此即求圜內容十八邊法設如有數十萬為一率作相連比例四率使一率與四率相加與二率兩倍再加一三率之數等問二率三率四率各幾何法借一根為二率以二率一根自乘得一平方以一率十萬除之得十萬分平方之一為三率以二率一根與三率十萬分平方之一相乘得十萬分立方之一以一率十萬除之得一百億分立方之一為四率將四率俱以百億乘之則一率為一千兆二率為一百億根三率為一十萬平方四率為一立方乃以一率與四率相加得一千兆多一立方又以二率倍之得二百億根加一三率得二百億根多十萬平方是為二百億根多十萬平方與一千兆多一立方相等兩邊各減去一立方得二百億根多十萬平方少一立方與一千兆相等乃以一千兆為實以二百億根為法用割圜內益實兼減實歸除法算之得四萬四千五百零四為一根之數即相連比例之第二率也以二率自乘一率除之得一萬九千八百零六為相連比例之第三率又以二率與三率相乘一率除之得八千八百一十四為相連比例之第四率乃以一率與四率相加得一十萬零八千八百一十四與二率兩倍加一三率之數相等也此即求圜內容十四邊法設如有大小二正方面大方每邊為小方每邊之二倍若以兩面積相乘得五萬八千五百六十四尺問二方邊面積各幾何法借一根為小方每邊之數則大方每邊數為二根以一根自乘得一平方為小方之面積以二根自乘得四平方為大方之面積以一平方與四平方相乘得四三乘方為兩方面積相乘之數與五萬八千五百六十四尺相等四三乘方既與五萬八千五百六十四尺相等則一三乘方必與一萬四千六百四十一尺相等乃以一萬四千六百四十一尺為三乘方積用開三乘方法算之得十一尺為一根之數即小方每邊之數倍之得二十二尺即大方每邊之數以十一尺自乘得一百二十一尺即小方之面積以二十二尺自乘得四百八十四尺即大方之面積兩面積相乘得五萬八千五百六十四尺以合原數也此開三乘方法設如有解錢糧船不言數但知每船所載銀鞘之數比船數加一倍每鞘內銀數與共鞘數等其共銀數為五百三十四萬五千三百四十四兩問船數鞘數各若干法借一根為船數則每船所載鞘數為二根以一根與二根相乘得二平方為共鞘數亦為每鞘內銀數自乘得四三乘方與五百三十四萬五千三百四十四兩相等四三乘方既與五百三十四萬五千三百四十四兩相等則一三乘方必與一百三十三萬六千三百三十六兩相等乃以一百三十三萬六千三百三十六兩為三乘方積用開三乘方法算之得三十四為一根之數即船數倍之得六十八即每船之鞘數以船數三十四與每船所載鞘數六十八相乘得二千三百一十二為共鞘數亦即每鞘內之銀數自乘得五百三十四萬五千三百四十四兩以合原數也此開三乘方法設如有一正方又有一長方二方面積共二十三萬六千一百九十六尺長方之長比正方面積多二十四尺長方之闊比正方面積少二十尺問二方邊面積各幾何法借一根為正方每邊之數自乘得一平方為正方之面積則長方之長為一平方多二十四尺長方之闊為一平方少二十尺長闊相乘得一三乘方多四平方少四百八十尺為長方面積加正方面積之一平方得一三乘方多五平方少四百八十尺為二方之共面積與二十三萬六千一百九十六尺相等兩邊各加四百八十尺得一三乘方多五平方與二十三萬六千六百七十六尺相等乃以二十三萬六千六百七十六尺為帶縱三乘方積用帶縱開三乘方法算之得二十二為一根之數即正方每邊之數自乘得四百八十四尺為正方面積加二十四尺得五百零八尺為長方之長減二十尺得四百六十四尺為長方之闊長闊相乘得二十三萬五千七百一十二尺為長方面積兩面積相加得二十三萬六千一百九十六尺以合原數也此帶縱開三乘方法設如有一長方其面積五百二十七丈又有大小二正方其面積共一千二百五十丈大正方邊與長方之長等小正方邊與長方之闊等問長方之長闊各幾何法借一根為大方每邊之數自乘得一平方為大方之面積則小方之面積為一千二百五十丈少一平方此大方面積與長方面積及小方面積為相連比例三率乃以首率大方面積一平方與末率小方面積一千二百五十丈少一平方相乘得一千二百五十平方少一三乘方又以長方面積五百二十七丈為中率自乘得二十七萬七千七百二十九丈此兩數為相等乃以二十七萬七千七百二十九丈為帶縱三乘方積用帶縱開三乘方法算之得三十一為一根之數即大方每邊之數亦即長方之長以長三十一丈除長方面積五百二十七丈得十七丈即長方之闊亦即小正方每邊之數乃以三十一丈自乘得九百六十一丈為大方面積以十七丈自乘得二百八十九丈為小方面積兩面積相加得一千二百五十丈以合原數也此帶縱開三乘方法設如有一方臺俱係正方石砌成其用石之塊數與每一石之面積等其共石之體積為五十三萬七千八百二十四寸問用石之塊數及每一石之邊數若干法借一根為每一石之邊數自乘得一平方為每一石之面積亦即所用石之塊數再乘得一立方為每一石之體積與所用石之塊數一平方相乘得一四乘方為共石之體積與五十三萬七千八百二十四寸相等乃以五十三萬七千八百二十四寸為四乘方積用開四乘方法算之得一十四寸為一根之數即每一石之邊數自乘得一百九十六寸為每一石之面積亦即所用石之塊數再乘得二千七百四十四寸為每一石之體積與所用石之塊數相乘得五十三萬七千八百二十四寸以合原數也此開四乘方法設如有二十四正方體又有一扁方體共積八百二十九萬四千四百寸扁方體之髙與正方體之邊數等扁方體之長與闊俱與正方體之面積等問正方體扁方體之邊數各若干法借一根為正方體每邊之數亦即扁方體之髙數以一根自乘得一平方為正方體之面積亦即扁方體之長與闊再乘得一立方為正方體之積以二十四乘之得二十四立方為二十四正方體之共積又以扁方體之長闊一平方自乘得一三乘方再以髙一根乘之得一四乘方為扁方體之積兩積數相加得一四乘方多二十四立方與共體積八百二十九萬四千四百寸相等乃以八百二十九萬四千四百寸為帶縱四乘方積用帶縱開四乘方法算之得二十四寸為一根之數即正方體之每邊亦即扁方體之髙自乘得五百七十六寸為正方體之面積亦即扁方體之長與闊再乘得一萬三千八百二十四寸為一正方體之積以二十四乘之得三十三萬一千七百七十六寸為二十四正方體之共積又以扁方體之長闊五百七十六寸自乘再以髙二十四寸乘之得七百九十六萬二千六百二十四寸為一扁方體積兩積相加得八百二十九萬四千四百寸以合原數也此帶縱開四乘方法設如有商人貿易第一次之銀數比原本銀加一倍第二次之銀數與第一次銀自乘再乘之數等第三次之銀數與第一次銀自乘又乘第二次銀之數等將第三次之銀數與第二次之銀數相加得三萬三千二百八十兩問原本銀數及每次銀數各若干法借一根為原本銀數則第一次之銀數為二根自乘再乘得八立方為第二次之銀數以第一次自乘之四平方與第二次之八立方相乘得三十二四乘方為第三次之銀數與第二次之銀數八立方相加得三十二四乘方多八立方與三萬三千二百八十兩相等三十二四乘方多八立方既與三萬三千二百八十兩相等則一四乘方多四分立方之一必與一千零四十兩相等乃以一千零四十兩為帶縱四乘方積用帶縱開四乘方法算之得四兩為一根之數即原本銀數也倍之得八兩為第一次之銀數自乘再乘得五百一十二兩為第二次之銀數又以第一次銀數八兩自乘之六十四兩與第二次之銀數五百一十二兩相乘得三萬二千七百六十八兩為第三次之銀數與第二次之銀數相加得三萬三千二百八十兩以合原數也此帶縱開四乘方法設如有一小長方體闊為髙之二倍長為髙之三倍又有一大長方體其每邊之比例與小長方體同其髙數與小長方體長闊相乘之數等體積八萬二千九百四十四尺問二長方體長闊髙各幾何法借一根為小長方體之髙則闊為二根長為三根長闊相乘得六平方為大長方體之髙倍之得十二平方為大長方體之闊三因之得十八平方為大長方體之長長闊相乘再以髙乘之得一千二百九十六五乘方為大長方體積與八萬二千九百四十四尺相等一千二百九十六五乘方既與八萬二千九百四十四尺相等則一五乘方必與六十四尺相等乃以六十四尺為五乘方積用開五乘方法算之得二尺為一根之數即小長方體之髙倍之得四尺即小長方體之闊三因之得六尺即小長方體之長長闊相乘得二十四尺即大長方體之髙倍之得四十八尺即大長方體之闊三因之得七十二尺即大長方體之長長闊相乘再以髙乘之得八萬二千九百四十四尺以合原數也此開五乘方法設如有大小二正方體大方體積比小方體積多一千七百四十四寸以小方邊與大方邊相乘得一百四十寸問二正方體之邊數體積各幾何法借一根為小方體每邊之數以一根除一百四十寸得一根之一百四十寸為大方體每邊之數以一根自乘再乘得一立方為小方體積數以一根之一百四十寸自乘再乘得一立方之二百七十四萬四千寸為大方體積內減小方體積一立方餘一立方之二百七十四萬四千寸少一立方與一千七百四十四寸相等兩邊各以立方乘之得一千七百四十四立方與二百七十四萬四千寸少一五乘方相等兩邊各加一五乘方得一五乘方多一千七百四十四立方與二百七十四萬四千寸相等乃以二百七十四萬四千寸為帶縱五乘方積用帶縱開五乘方法算之得十寸為一根之數即小方體每邊之數以十寸除一百四十寸得一十四寸即大方體每邊之數以小方體每邊十寸自乘再乘得一千寸為小方體積以大方體每邊十四寸自乘再乘得二千七百四十四寸為大方體積兩體積相減餘一千七百四十四寸以合原數也此帶縱開五乘方法設如有大小二正方體共積四千一百二十三寸以小方邊與大方邊相乘得四十八寸問二正方體之邊數體積各幾何法借一根為小方體每邊之數以一根除四十八寸得一根之四十八寸為大方體每邊之數以一根自乘再乘得一立方為小方體積以一根之四十八寸自乘再乘得一立方之一十一萬零五百九十二寸為大方體積兩體積相加得一立方多一立方之一十一萬零五百九十二寸與四千一百二十三寸相等兩邊各以立方乘之得四千一百二十三立方與一五乘方多一十一萬零五百九十二寸相等兩邊各減一五乘方得四千一百二十三立方少一五乘方與一十一萬零五百九十二寸相等乃以一十一萬零五百九十二寸為帶縱五乘方積用帶縱開五乘方法算之得三寸為一根之數即小方體每邊之數以三寸除四十八寸得十六寸為大方體每邊之數以小方體每邊三寸自乘再乘得二十七寸為小方體積數以大方體每邊十六寸自乘再乘得四千零九十六寸為大方體積數兩體積相加得四千一百二十三寸以合原數也此帶縱開五乘方法設如有一長方體積二千一百八十七尺其髙數自乘與闊等闊數自乘與長數等問髙闊長各若干法借一根為髙自乘得一平方為闊以闊自乘得一三乘方為長長闊相乘得一五乘方再以髙乘之得一六乘方為長方體積與二千一百八十七尺相等乃以二千一百八十七尺為六乘方積用開六乘方法算之得三尺為一根之數即長方之髙自乘得九尺即長方之闊以闊自乘得八十一尺為長方之長乃以長闊相乘再以髙乘之得二千一百八十七尺以合原數也此開六乘方法設如甲丙正方花園二所園中各有正方水池一面甲池每邊為丙池每邊之三倍甲園每邊與甲池之面積等丙園每邊與丙池之面積等若以兩園之面積相乘得五百三十萬八千四百一十六尺問園池每邊各若干法借一根為丙池每邊之數則甲池每邊之數為三根以一根自乘得一平方為丙池之面積即丙園每邊之數自乘得一三乘方為丙園之面積以三根自乘得九平方為甲池之面積即甲園每邊之數自乘得八十一三乘方為甲園之面積兩園之面積相乘得八十一七乘方與五百三十萬八千四百一十六尺相等八十一七乘方既與五百三十萬八千四百一十六尺相等則一七乘方必與六萬五千五百三十六尺相等乃以六萬五千五百三十六尺為七乘方積用開七乘方法算之得四尺為一根之數即丙池每邊之數三因之得十二尺即甲池每邊之數以甲池每邊十二尺自乘得一百四十四尺為甲池之面積即甲園每邊之數以丙池每邊四尺自乘得一十六尺為丙池之面積即丙園每邊之數以甲園每邊一百四十四尺自乘得二萬零七百三十六尺即甲園之面積以丙園每邊十六尺自乘得二百五十六尺即丙園之面積乃以兩園面積相乘得五百三十萬八千四百一十六尺以合原數也此開七乘方法設如有甲乙丙三長方體甲方之髙為闊二分之一乙方之髙與闊為甲方之二倍丙方之髙與闊為甲方之三倍俱不知長甲方體積與面積自乘之數等乙方之體積與髙闊相併乘甲方面積之數等丙方之體積與乙方體積自乘再乘之數等今但知丙方體積八十八萬四千七百三十六丈問三方髙闊長各若干法借一根為甲方之髙則甲方之闊為二根乙方之髙亦為二根乙方之闊為四根丙方之髙為三根丙方之闊為六根以甲方髙一根與闊二根相乘得二平方即甲方之面積自乘得四三乘方即甲方之體積乙方髙二根與闊四根相併得六根與甲方面積二平方相乘得十二立方即乙方之體積自乘再乘得一千七百二十八八乘方即丙方之體積與八十八萬四千七百三十六丈相等一千七百二十八八乘方既與八十八萬四千七百三十六丈相等則一八乘方必與五百一十二丈相等乃以五百一十二丈為八乘方積用開八乘方法算之得二丈為一根之數即甲方之髙倍之得四丈即甲方之闊髙闊相乘得八丈即甲方之面積自乘得六十四丈即甲方之體積又將甲方髙二丈倍之得四丈即乙方之髙將甲方闊四丈倍之得八丈即乙方之闊髙闊相併得一十二丈與甲方面積八丈相乘得九十六丈即乙方之體積又以髙四丈闊八丈相乘得三十二丈以除體積九十六丈得三丈即乙方之長又將甲方髙二丈三因之得六丈即丙方之髙將甲方闊四丈三因之得一十二丈即丙方之闊以乙方體積九十六丈自乘再乘得八十八萬四千七百三十六丈即丙方之體積又髙六丈闊十二丈相乘得七十二丈以除體積八十八萬四千七百三十六丈得一萬二千二百八十八丈即丙方之長也此開八乘方法設如有客船不言數但云每船之人數與船數等每人之本銀數與船數自乘再乘之數等其共銀自乘之數為六千零四十六萬六千一百七十六兩問船數人數各若干法借一根為船數亦為每船之人數以一根自乘得一平方為共人數再乘得一立方為每人本銀數與一平方相乘得一四乘方為共銀數以一四乘方自乘得一九乘方為本銀自乘之數與六千零四十六萬六千一百七十六兩相等乃以六千零四十六萬六千一百七十六為九乘方積用開九乘方法算之得六為一根之數即船數亦即每船之人數自乘得三十六為共人數再乘得二百一十六為每人之銀數以三十六人乘之得七千七百七十六兩為共銀數自乘得六千零四十六萬六千一百七十六兩以合原數也此開九乘方法御製數理精藴下編卷三十六
