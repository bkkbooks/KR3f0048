body:
  text: 欽定四庫全書御製數理精藴下編卷三十二末部二借根方比例開諸乘方法諸乘方表開諸乘方法借根方比例法中開各乘方為最要其算線部借根算面部借平方算體部借立方以及多乘方雖各按其類然有法屬線類而仍須諸乘方算者故諸乘方之法宜審也蓋諸乘方之形體不同開法之難易迥别總以廉法之多少而分平方之廉最少故最易立方之廉較多故較難自三乘以至多乘其廉愈多則其法愈難今自平方以至九乘方俱専立一法在平方立方所省不多而三乘方以後則甚為簡捷至於諸乘方中亦有可以用平方立方之法代開者如三乘方與平方自乘之數等故可以平方兩次開之五乘方與平方自乘再乘之數等亦與立方自乘之數等故可以平方開之繼以立方開之七乘方與平方兩次自乘之數等故可以平方三次開之八乘方與立方自乘再乘之數等故可以立方兩次開之九乘方與四乘方自乘之數等故可以平方開之繼以四乘方開之惟四乘方及六乘方與平方立方之數皆不相合故不可以平方立方之法代開也又諸乘方次商之數最難定今自立方至九乘方俱為立根數兩位之表若根數兩位者以積數撿表即得更為便捷至於十乘方以後並可以此法御之但其數繁衍而無所用兹故不載焉平方設如有平方積一萬五千一百二十九尺開平方問每一根之數幾何法列方積一萬五千一百二十九尺自末位起算每方積二位定方根一位故隔一位作記乃於九尺上定單位一百尺上定十位一萬尺上定百位其一萬尺為初商積與一百自乘之數相合即定初商為一百尺書於方積一萬尺之上而以初商一百尺自乘之一萬尺書於初商積之下相減恰盡爰以方根第二位積五千一百尺續書於後為次商廉隅之共積而以初商之一百尺倍之得二百尺為次商廉法以除次商積足二十倍即定次商為二十尺書於方積一百尺之上合初商共一百二十尺自乘得一萬四千四百尺與原積相減餘七百尺爰以方根第三位積二十九尺續書於後共七百二十九尺為三商廉隅之共積而以初商次商之一百二十尺倍之得二百四十尺為三商廉法以除三商積足三倍即定三商為三尺書於方積九尺之上合初商次商共一百二十三尺自乘得一萬五千一百二十九尺與原積相減恰盡是開得一百二十三尺為平方每一根之數也此法止用廉法除餘積得次商即併初商數自乘得數復與原積相減與常法不同然自三乘方以至多乘方則廉法條例甚繁難於布算用此法甚為省便在平方立方不覺其省平方止省小隅一層立方止省長廉小隅二層而在多乘方所省實多蓋各設一例以備體也立方設如有立方積四千一百零六萬三千六百二十五尺開立方問每一根之數幾何法列方積四千一百零六萬三千六百二十五尺自末位起算每方積三位定方根一位故隔二位作記乃於五尺上定單位三千尺上定十位一百萬尺上定百位其四千一百萬尺為初商積與三百自乘再乘之數相準即定初商為三百尺書於方積一百萬尺之上而以三百尺自乘再乘之二千七百萬尺書於初商積之下相減餘一千四百萬尺爰以方根第二位餘積六萬三千尺續書於後共一千四百零六萬三千尺為次商廉隅之共積而以初商之三百尺自乘得九萬尺三因之得二十七萬尺為次商廉法以除次商積足四十倍即定次商為四十尺書於方積三千尺之上合初商共三百四十尺自乘再乘得三千九百三十萬四千尺與原積相減餘一百七十五萬九千尺爰以方邊第三位餘積六百二十五尺續書於後共一百七十五萬九千六百二十五尺為三商廉隅之共積而以初商次商之三百四十尺自乘得一十一萬五千六百尺三因之得三十四萬六千八百尺為三商廉法以除三商積足五倍即定三商為五尺書於方積五尺之上合初商次商共三百四十五尺自乘再乘得四千一百零六萬三千六百二十五尺與原積相減恰盡是開得三百四十五尺為立方每一根之數也又用表開法列積四千一百零六萬三千六百二十五尺自末位起算隔二位作記定位同前乃截方根第二位以前積四一六三為初商次商之積於表中取比此數相近略小之數為三九三四即初商次商自乘再乘之數其所對初商根為三次商根為四即將三四書於初商次商之位而以三九三四書於初商次商積之下相減餘一七五九乃以三九三四格內三商廉法三四六除餘積一七五九足五倍即定三商為五書於三商之位合初商次商共三百四十五自乘再乘得四千一百零六萬三千六百二十五尺與原積相減恰盡即定立方根為三百四十五尺也三乘方設如有三乘方積一千零三十三億五千五百一十七萬七千一百二十一尺開三乘方問每一根之數幾何法列方積一千零三十三億五千五百一十七萬七千一百二十一尺自末位起算每方積四位定方根一位故隔三位作記乃於一尺上定單位七萬尺上定十位三億尺上定百位其一千零三十三億尺為初商積與五百乘三次之數相準即定初商為五百尺書於方積三億尺之上而以五百尺乘三次之六百二十五億尺書於初商積之下相減餘四百零八億尺爰以方根第二位積五千五百一十七萬尺續書於後共四百零八億五千五百一十七萬尺為次商廉隅之共積而以初商之五百尺乘二次得一億二千五百萬尺四因之得五億尺為次商廉法以除次商積足八十倍因定次商為八十尺合初商共五百八十尺乘三次得一千一百三十一億六千四百九十六萬尺大於原積是次商不可商八也乃改商七為七十尺合初商共五百七十尺乘三次得一千零五十五億六千零一萬尺仍大於原積是次商不可商七也又改商六為六十尺合初商共五百六十尺乘三次得九百八十三億四千四百九十六萬尺小於原積可減也乃定次商為六十尺書於方積七萬尺之上而以五百六十尺乘三次之九百八十三億四千四百九十六尺與原積相減餘五十億一千零二十一萬尺爰以方根第三位積七千一百二十一尺續書於後共五十億一千零二十一萬七千一百二十一尺為三商廉隅之共積而以初商次商之五百六十尺乘二次得一億七千五百六十一萬六千尺四因之得七億零二百四十六萬四千尺為三商亷法以除三商積足七倍即定三商為七尺書於方積一尺之上合初商次商共五百六十七尺乘三次得一千零三十三億五千五百一十七萬七千一百二十一尺與原積相減恰盡是開得五百六十七尺為三乘方每一根之數也蓋三乘方之本法有四自乘再乘廉六自乘廉四長廉一小隅既得初商乃以初商自乘再乘四因之得四自乘再乘廉為法除餘積得次商以初商自乘與次商相乘六因之為六自乘廉以次商自乘與初商相乘四因之為四長廉以次商自乘再乘為一小隅合四自乘再乘廉六自乘廉四長廉一小隅以次商乘之為次商廉隅之共積今此法得次商之後合初商乘三次即得應減之積也又法用開平方法兩次開之初以原積一千零三十三億五千五百一十七萬七千一百二十一尺開平方得三十二萬一千四百八十九尺次以三十二萬一千四百八十九尺復開平方得五百六十七尺即三乘方每一根之數也又用表開法列積一千零三十三億五千五百一十七萬七千一百二十一尺自末位起算隔三位作記定位同前乃截方根第二位以前積一三三五五一七為初商次商之積於表中取比此數相近略小之數為九八三四四九六即初商次商乘三次之數其所對初商根為五次商根為六即將五六書於初商次商之位而以九八三四四九六書於初商次商積之下相減餘五一二一乃以九八三四四九六格內三商廉法七二四六除餘積五一二一足七倍即定三商為七書於三商之位合初商次商共五百六十七乘三次得一千零三十三億五千五百一十七萬七千一百二十一尺與原積相減恰盡即定三乘方根為五百六十七尺也四乘方設如有四乘方積二百六十二兆零三十五億四千九百九十七萬八千一百二十五尺開四乘方問每一根之數幾何法列方積二百六十二兆零三十五億四千九百九十七萬八千一百二十五尺自末位起算每方積五位定方根一位故隔四位作記乃於五尺上定單位九十萬尺上定十位空百億尺上定百位其二百六十二兆尺為初商積與七百乘四次之數相準即定初商為七百尺書於方積空百億尺之上而以七百尺乘四次之一百六十八兆零七百億尺書於初商積之下相減餘九十三兆九千三百億尺爰以方根第二位餘積三十五億四千九百九十萬尺續書於後共九十三兆九千三百三十五億四千九百九十萬尺為次商廉隅之共積而以初商之七百尺乘三次得二千四百零一億尺五因之得一兆二千零五億尺為次商廉法以除次商積足七十倍因定次商為七十尺合初商共七百七十尺乘四次得二百七十兆六千七百八十四億一千五百七十萬尺大於原積是次商不可商七也乃改商六為六十尺合初商共七百六十尺乘四次得二百五十三兆五千五百二十五億三千七百六十萬尺小於原積可減也乃定次商為六十尺書於方積九十萬尺之上而以七百六十尺乘四次之二百五十三兆五千五百二十五億三千七百六十萬尺與原積相減餘八兆四千五百一十億一千二百三十萬尺爰以方根第三位餘積七萬八千一百二十五尺續書於後共八兆四千五百一十億一千二百三十七萬八千一百二十五尺為三商廉隅之共積而以初商次商之七百六十尺乘三次得三千三百三十六億二千一百七十六萬尺五因之得一兆六千六百八十一億零八百八十萬尺為三商廉法以除三商積足五倍即定三商為五尺書於方積五尺之上合初商次商共七百六十五尺乘四次得二百六十二兆零三十五億四千九百九十七萬八千一百二十五尺與原積相減恰盡是開得七百六十五尺為四乘方每一根之數也蓋四乘方之本法有五三乘廉十自乘再乘廉十自乘廉五長廉一小隅既得初商乃以初商乘三次五因之得五三乘廉為法除餘積得次商以初商自乘再乘與次商相乘十因之為十自乘再乘廉以初商自乘次商自乘兩數相乘十因之為十自乘廉以次商自乘再乘與初商相乘五因之為五長廉以次商數乘三次為一小隅合五三乘廉十自乘再乘廉十自乘廉五長廉一小隅以次商乘之為次商廉隅之共積今此法得次商之後合初商乘四次即得應減之積也又用表開法列積二百六十二兆零三十五億四千九百九十七萬八千一百二十五尺自末位起算隔四位作記定位同前乃截方根第二位以前積二六二三五四九九為初商次商之積於表中取比此數相近略小之數為二五三五五二五三七六即初商次商乘四次之數其所對初商根為七次商根為六即將七六書於初商次商之位而以二五三五五二五三七六書於初商次商積之下相減餘八四五一一二三乃以二五三五五二五三七六格內三商廉法一六六八一八八除餘積八四五一一二三足五倍即定三商為五書於三商之位合初商次商共七百六十五乘四次得二百六十二兆零三十五億四千九百九十七萬八千一百二十五尺與原積相減恰盡即定四乘方根為七百六十五尺也五乘方設如有五乘方積八十五京九千零六十八兆三千零一十億二千五百三十九萬零六百二十五尺開五乘方問每一根之數幾何法列方積八十五京九千零六十八兆三千零一十億二千五百三十九萬零六百二十