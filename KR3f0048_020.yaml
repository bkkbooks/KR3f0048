body:
  text: 欽定四庫全書御製數理精蘊下編卷十五面部五割圜屢求勾股割圜周髀曰圓出於方方出於矩矩者所謂直角即勾股也蓋因方易度而圓難測方有盡而圓無盡故古人用割圜之法內弦外切屢求勾股為無數多邊形以切近圜界使弧線直線漸合為一而圓周始得是則推圜者以方推方者以矩矣劉宋祖冲之以圜容六邊起算元趙友欽以圜容四邊起算自明末西法入中國又有割圜八線六宗三要等說而圜度內外諸線相求之法始偹要之圜內六邊起算者圜徑折半即圜內六邊之一乃用屢求勾股之法自六邊而十二邊自十二邊而二十四邊自二十四邊而四十八邊如是纍至億萬邊設徑為一而周得三一四一五九二六五三有餘圜內四邊起算者則以圜徑為內容正方之斜弦自乘折半開方而得四邊之一亦用屢求勾股之法自四邊而八邊自八邊而十六邊自十六邊而三十二邊如是纍至億萬邊設徑為一而周亦得三一四一五九二六五三有餘圜外四邊起算者圜徑即四邊之一圜徑自乘倍之開方即圜外正方之斜弦減去圜徑即圜外兩角之餘又即圜外八邊之一以八邊之一折半為勾半徑為股求得弦與半徑相減即股弦較又即小同式形之勾乃以八邊之一折半之勾為一率半徑之股為二率小同式形之勾為三率推得四率為小同式形之股倍之即十六邊之一如是纍至億萬邊設徑為一而周亦得三一四一五九二六五三有餘圜外六邊起算者圜徑為弦半徑為勾求得股倍之即圜外三邊之一取其三分之一即圜外六邊之一以六邊之一折半為勾半徑為股求得弦與半徑相減即股弦較又即小同式形之勾乃以六邊之一折半之勾為一率半徑之股為二率小同式形之勾為三率推得四率為小同式形之股倍之即十二邊之一如是纍至億萬邊設徑為一而周亦得三一四一五九二六五三有餘此兩法者或自圜內容形之邊為勾股法使無數勾股小弦逼近圜周將與圜周合而為一或自圜外切形之邊為勾股法使無數勾股小股逼近圜周亦將與圜周合而為一二法既立故凡圜周圜徑諸法皆可以互相比例矣割圜八線則將圜周分為三百六十度先求弧度通弦折半為正弦既得正弦而圜內之正矢圜外之正切正割由之而生至於餘弦餘矢餘切餘割則又由正而得名三百六十度平分四象限每一象限九十度九十度之中得其正角為正餘角為餘是以正餘相對而割圜八線之表以立一象限中成勾股形者五千四百故凡勾股三角測量諸法皆可以互相比例矣自圜內容形屢求勾股而得無數多邊自圜外切形屢求勾股而得無數多邊內外湊集則圜周漸變為直線而設圜界為度分者內而正弦外而切線至於無數則圜周亦漸變為直線二者互相恭考俱為相符可見理之至者先後一揆法之精者中外一理然則勾股即割圜之體而割圜即勾股之用二者交相成而兩相得乎圜內容六邊起算設如圜徑二兆用內容六邊起算問得圜周幾何法以圜徑二兆折半得一兆為圜內所容六邊形之每一邊乃以半徑一兆為弦六邊之一邊一兆折半得五千億為勾求得股八千六百六十億二千五百四十萬三千七百八十四小餘四三八六四六七六三七二三一七七五二九三六一八三四七一與半徑相減餘一千三百三十九億七千四百五十九萬六千二百一十五小餘五六一三五三二三六二七六八二九二四七六三八一六五二九復為勾六邊之一邊折半之五千億為股求得弦五千一百七十六億三千八百零九萬零二百零五小餘四一五二四六九七七九七六七五二四八九六六五七六六四為圜內所容十二邊形之每一邊如是屢求得圜內二十四邊形之每一邊為二千六百一十億五千二百三十八萬四千四百四十零小餘一三一八三九六八一二四五五七九九七八二三八七圜內四十八邊形之每一邊為一千三百零八億零六百二十五萬八千四百六十零小餘二八六一三三六三六三一一一七五五三五八八二八七九圜內九十六邊形之每一邊為六百五十四億三千八百一十六萬五千六百四十三小餘五五二二八四一二七三一二二八八二四一六八六七八四三三圜內一百九十二邊形之每一邊為三百二十七億二千三百四十六萬三千二百五十二小餘九七三五六三二八五九二八五六五八九九一八九八三三二一三圜內三百八十四邊形之每一邊為一百六十三億六千二百二十七萬九千二百零七小餘八七四二五八五七三九八一四六五八九五二六六七九九六四圜內七百六十八邉形之每一邊為八十一億八千一百二十萬八千零五十二小餘四六九五七九一八九二四八二一九九一三六二五二三三七圜內一千五百三十六邊形之每一邊為四十億九千零六十一萬二千五百八十二小餘三二八一九二二八八二六一一七九六八五八五一九三九圜內三千零七十二邊形之每一邊為二十億四千五百三十萬七千三百六十零小餘六七六六九八二三八五九二二二九二一二七九二九圜內六千一百四十四邊形之每一邊為一十億二千二百六十五萬三千八百一十四小餘二七三九五二二二八五九八九五八八五二二四三九一七圜內一萬二千二百八十八邊形之每一邊為五億一千一百三十二萬六千九百二十三小餘七二四八三四六二八一二三二九九三一九八八四七六七九圜內二萬四千五百七十六邊形之每一邊為二億五千五百六十六萬三千四百六十三小餘九五一三九四八五二三四四九一一一四一六三一七六圜內四萬九千一百五十二邊形之每一邊為一億二千七百八十三萬一千七百三十二小餘二三六七六六二六一八六九四七六四六四四九二九九九七圜內九