body:
  text: 欽定四庫全書御製數理精藴下編卷九線部七借衰互徵疊借互徵借衰互徵借衰互徵者有總數而無分數或有分數而無總數或無總數分數之實率而但有其盈率則不得不别借一衰數以為比例然後可以得其真數故曰借衰然而所借之衰又各不同有借於本數之中者有借於本數之外者借彼徵此借虛徵實故曰互徵蓋先借各項衰數合而為總衰數以總衰數與總真數相比即若各項衰數與各項真數之比也或先借總衰數加減出各衰數之較以各衰數之較與真數之較相比即若總衰數與總真數之比也或以各衰數之較與真數之較相比即若各項衰數與各項真數之比也要之皆就比例之法而推廣之耳設如有銀一千八百兩命甲乙二人按分分之甲分比乙分有五倍問甲乙各得幾何法借一為乙衰五為甲衰併之得六為一率總銀一千八百兩為二率乙衰一為三率得四率三百兩即乙所分之數與一千八百兩相減餘一千五百兩即甲所分之數以三百兩與一千五百兩相較則甲有乙之五倍也此法既云甲有乙五倍則是甲有五分乙有一分故借一為乙衰五為甲衰並之得六為總衰以總衰與總銀之比即若乙一衰與乙銀一分之比也此法即和數比例因借衰之首故設一最易者以發明其理云設如有三官接任共歷一百年第二官比前官加一倍零六年第三官比二官加一倍少二年問每官各該幾年法借一衰為第一官年數借二衰多六年為第二官年數借四衰多十年為第三官年數並三官衰數得七為一率並後二官共多十六年於總年數內減之餘八十四年為二率第一官一衰為三率得四率十二年為第一官年數倍之加多六年得三十年為第二官年數又倍第二官年數減少二年得五十八年為第三官年數合三數而共為一百年也此法第一官既借一衰則第二官加一倍零六年者當借二衰多六年而第三官既比第二官又加一倍則當借四衰多十二年因少二年故借四衰多十年為第三官衰數也設如有甲乙丙三人共銀四十四兩乙比甲銀多一倍零四兩丙比甲乙二人共數又多六兩求各人銀數幾何法借一為甲衰借二多四兩為乙衰借三多十兩為丙衰並三衰得六為一率併乙丙二人多數為十四兩於總銀內減之餘三十兩為二率甲衰一為三率得四率五兩即甲銀倍之加多四兩得十四兩為乙銀併甲乙銀又加多六兩得二十五兩即丙銀也此法既以一為甲衰乙比甲加一倍零四兩故借二多四兩為乙衰也丙併甲乙共數多六兩故借三多十兩為丙衰也甲衰一乙衰二併之為三乙比甲多四兩丙比甲乙共數又多六兩併之為十兩也設如有甲乙二人入山採果共得三百枚但云甲數加六百枚乙數加二百枚則甲數比乙數多二倍問甲乙各得幾何法借三為甲衰借一為乙衰併之得四為一率以三百枚與六百枚二百枚相加得一千一百為二率乙衰一為三率得四率二百七十五即乙一分之數減加數二百餘七十五即乙數以七十五與三百枚相減餘二百二十五即甲數以乙七十五與甲二百二十五相較則甲多二倍也此法既云甲比乙多二倍則甲為三分乙為一分故借三為甲衰一為乙衰併之為總衰作一率又以原果與兩加數相併為總數作二率蓋總衰與總數之比即乙一衰與乙果一分之比也設如有銀一百九十六兩買駝四匹馬六匹驢十頭馬比驢價加一倍零二兩駝比馬價加一倍零四兩問各價銀若干法借一衰為驢價以驢十因之得十借二衰多二兩為馬價以馬六因之得十二衰多十二兩一馬多二兩六馬故多十二兩借四衰多八兩為駝價以駝四因之得十六衰多三十二兩一駝多八兩四駝故多三十二兩併三色衰數驢十馬十二駝十六共三十八為一率又併駝馬多價駝三十二兩馬十二兩共四十四兩於總銀內減之餘一百五十二兩為二率驢一衰為三率得四率四兩即驢一頭之價倍之加多二兩得十兩即馬一匹之價又倍之加多四兩得二十四兩即駝一匹之價也此法既借一衰為驢價馬比驢加一倍零二兩故借二衰多二兩為馬價也駝比馬又加一倍當借四衰多四兩再加多馬四兩則四衰多八兩為駝價也乃以各數因之驢十馬六駝四故得各項總衰數也設如問一人歲數答曰我比弟長二年父年倍我仍多兩歲伯父兼我三人歲數再加四年整百歲問四人各得年數幾何法借一衰為其弟歲數借一衰零二年為本人歲數倍之得二衰零四年再加多兩歲得二衰零六年為其父歲數總併之得四衰零八年為其伯之歲數即以四衰為一率八年四年相併得十二年與百歲相減餘八十八年為二率其弟一衰為三率得四率二十二即其弟之歲數加長二年得二十四即本人之歲數倍本人歲數再加多兩歲得五十即其父之歲數併三人歲數得九十六即其伯之歲數再加四年是為整百歲也此法既借一衰為其弟歲數本人較長二年故借一衰零二年為本人歲數也其父年比本人加倍又多兩嵗故借二衰零六年為其父歲數也加倍為二衰零四年又加多兩歲故為二衰零六年也將三人歲數相併得四衰零八年為其伯之歲數再加四年方整百嵗則減四年又減所零之八年餘八十八年即四衰相當之數也設如漏壺一具上有渴烏注水凡十二時而滿下有一孔通天池泄水凡十八時而盡若上注下泄問幾時可得水滿法以十二時與十八時相乘得二百一十六時即借二百一十六分為壺水衰數又以十二時與十八時相減餘六時即借六分為一時水滿分數乃以六分為一率一時為二率二百一十六分為三率得四率三十六即是水滿一壺之時也此法以十二時乘十八時者即借一壺水作二百一十六分算也十二時滿二百一十六分則一時滿十八分十八時盡二百一十六分則一時泄十二分一時滿十八分而泄十二分則壺中所存止得六分故以十二減十八餘六分為一時所滿之水也滿水六分既得一時則壺中滿二百一十六分而得三十六時矣設如漏壺一座注水於內下有三孔大孔流水二時而盡中孔流水三時而盡小孔流水六時而盡若三孔齊開問水幾時可盡法以大孔之二時乘中孔之三時得六時又以小孔之六時乘之得三十六時即借三十六分為壺水總衰數以大孔二時除之得十八分以中孔三時除之得十二分以小孔六時除之得六分併三數得三十六為一率一時為二率借衰三十六為三率得四率一時即一時水可盡也此法蓋以三色之數連乘為共分其大孔二時流盡則一時流十八分中孔三時流盡則一時流十二分小孔六時流盡則一時流六分故併三數而為一時所流者有三十六分今壺水止有三十六分故一時可以流盡也設如有人自鄉上城共一百二十里今行尚未到若以行過路六分之一與餘路三分之一相加便是到城里數問該若干法借十五衰為一率一百二十里為二率餘路三分即借三衰為三率得四率二十四里即到城里數也此法借十五衰為一率者因餘路取三分之一尚餘二分又取行過路六分之一補足餘路二分之數是行過路之一分即抵餘路之二分也今將餘路一分借一衰則行過路一分當借二衰六分則當借十二衰再加餘路三衰是共得十五衰故十五衰與一百二十里之比即餘路三分與二十四里之比也每分該八里設如有井深至底二丈六尺不知水深若干但云自水面向上取三分之一從水面往下取四分之一相併便是水深數問該幾何法借十三衰為一率二丈六尺為二率自水面往下四分即借四衰為三率得四率八尺即水之深也此法借十三衰為一率者因水面往下取四分之一尚餘三分又取水面向上三分之一補足水面下三分之數是水面上之一分即準水面下之三分也今將水面下一分借一衰則水面上一分當借三衰一分借三衰則三分必當借九衰再加水面下四衰是共得十三衰故十三衰與二丈六尺之比即水面下四分與八尺之比也設如有人問此時係何時刻答曰自子正到此時時刻折半與自此時到午正三分之一相加便是此時時刻法借二衰為自子正到此時衰數時折半者定為一衰今用全數故借二衰又借三衰為自此時到午正衰數三分故借三衰因三分之一與折半之數相等故亦將一分借一衰併之得五衰為子正到午正之分為一率又計子正到午正得十二小時因化為七百二十分為二率自子正到此時二衰為三率得四率二百八十八分收為四小時三刻三分即定為寅正三刻三分也此法因題言自子正到此時時刻折半故以折半數借為一衰今用全數為自子正起算故借二衰題又言到午正時刻三分之一與折半之數相加則是折半數即與三分之一之數相等故將三分亦借為三衰是子正到午正共為五衰矣計子正到午正時刻得七百二十分故五衰與七百二十分之比即二衰與二百八十八分之比既得二百八十八分收為四小時三刻三分即自子正到寅正三刻三分也設如有人問到日落得幾時答曰自日出到此時時刻取四分之一從此時到日落時刻折半兩數相加即是此時時分法借二衰為自此時到日落時衰數時折半者借一衰今用全數故借二衰又借四衰為自日出到此時衰數四分故借四衰因四分之一與折半之數相等故亦將一分借一衰併之得六衰為一率又察晝夜長短如自日出至日落止有十小時即化作六百分為二率自此時到日落二衰為三率得四率二百分收為三小時一刻五分即到日落之時分也此法因題言自此時到日落時刻折半故以折半數借為一衰今用全數則當借為二衰題又言自日出到此時四分之一與折半之數相加則是折半數即與四分之一之數相等故將四分亦借為四衰是日出到日落共為六衰矣如日出至日落時刻得六百分則六衰與六百分之比即二衰與二百分之比故以二百分收為三時一刻五分也設如有羊一羣不知數目但云賣去三分之一又分四分之一另為一羣下餘一千隻問原共數幾何法以兩分母相乘得十二為總衰內減三分之一餘八又減四分之一餘五為一率一千為二率總衰十二為三率得四率二千四百即共數也此法因題言三分之一四分之一兩分子同分母不同故以兩分母相乘為總衰分內減三分之一又減四分之一所餘五即如總數分十二分而一千為其五分也故五衰與一千之比即如十二衰與二千四百之比也設如有羊一羣不知數目但云賞人七分之五又將所餘者賣五分之三尚餘八百隻問原共數若干法以兩分母相乘得三十五為總羊衰數內去七分之五餘一十將三十五分為七分每分得五今去五分為二十五故仍餘一十也又將一十為所餘羊衰數內去五分之三餘四將一十分為五分每分得二今去三分為六故仍餘四也即以四為一率所餘羊八百隻為二率總衰三十五為三率得四率七千即原羊共數也此法蓋因共數為七千內去七分之五是去五千餘二千又將二千去五分之三是去一千二百仍餘八百故借總衰三十五內去七分之五所餘又去五分之三而得餘衰四以餘衰四與餘羊八百之比即若總衰三十五與總羊七千之比也此法與前法微異者前法雖有三分四分之不同是於總數中計分故其為分則一此法賞人七分之五者是去總數內七分之五而賣五分之三者乃賞人後所餘之五分之三也立法少異故借衰中總分餘分相減亦别至減餘歸四率其比例仍同也設如有田七百四十二畝內有耕者種者耘者種者比耕者得十分之七耘者比種者得五分之三問每項各幾何法以兩分母兩分子互相連乘共得一千零五十為耕者衰數此數十分之取其七分得七百三十五為種者衰數此數五分之取其三分得四百四十一為耘者衰數併三衰數得二千二百二十六為一率七百四十二畝為二率以耕者衰數一千零五十為三率得四率三百五十畝即所耕之田以種者衰數七百三十五為三率得四率二百四十五畝即所種之田以耘者衰數四百四十一為三率得四率一百四十七畝即所耘之田也此法因分母分子皆不同恐借數有竒零故即以本題分數連乘之得數後仍依各項分之則衰數無竒零而各分各數俱可比例而得矣設如逺望一塔上露三丈二尺中有林木遮去三分之二下尚露五分之一問共髙若干法先借一數可分為三分五分者乃借三十為總衰此數三分之二得二十又五分之一得六兩數相加得二十六與總衰三十相減餘四為一率上露三丈二尺為二率總衰三十為三率得四率二十四丈即塔之髙也此法以減餘四衰與上露三丈二尺之比即總衰三十與塔總髙二十四丈之比也二十四丈三分之二得十六丈五分之一得四丈八尺相加得二十丈零八尺又加上露三丈二尺則共二十四丈也又法於借衰三十內減去三分之二減去二十又減五分之一減去六餘四衰即以四衰除塔露三丈二尺得八尺是一衰為八尺也一衰為八尺則三十衰自得二百四十尺矣設如有木匠與瓦匠小工三項分工價瓦匠得木匠五分之二小工得木匠四分之一瓦匠比小工多一兩二錢問每項工價若干法以兩分母兩分子連乘共得四十為木匠衰數此數五分之二得十六為瓦匠衰數四分之一得十為小工衰數又將十六衰與十衰相減餘六為一率多一兩二錢為二率木匠衰數四十為三率得四率八兩即木匠價取五分之二得三兩二錢即瓦匠價取四分之一得二兩即小工價以二兩與三兩二錢相減餘一兩二錢即瓦匠多於小工之數也此法亦以題中分母分子連乘作衰數但用瓦匠比小工所多衰數銀數與木匠衰數銀數為比例何也蓋各項衰數與各項銀數之比皆同今瓦匠衰數與小工衰數之比即瓦匠銀數與小工銀數之比也又瓦匠衰數多於小工衰數之六與瓦匠銀數多於小工銀數一兩二錢之比即同於小工衰數與小工銀數之比又即同於木匠衰數與木匠銀數之比故直以六衰與多一兩二錢為一率二率也設如有金不足色欲煉成上等好金第一次入爐煅去三分之一第二次入爐煅去四分之一第三次入爐煅去五分之一第四次入爐煅去六分之一方淨剩上等好金二十七兩問原金幾何法借三分四分五分六分俱分得盡之六十為原金總衰此數三分之一得二十四分之一得十五五分之一得十二六分之一得十四數相併得五十七與原借數六十相減餘三為一率淨剩金二十七兩為二率總衰六十為三率得四率五百四十兩即原金數也此法因原金中鎔銷四次所餘二十七兩故借衰中亦減去四次之數所餘為三衰以三衰與二十七兩之比即六十衰與五百四十兩之比也設如有銅不知斤數但云取七分之三作上等儀器又取所餘之五分之二作中等儀器又取所餘之四分之一作三等儀器仍餘五十四斤問原銅共數幾何法以三分母連乘得一百四十為總銅衰數取其七分之三餘八十為二次餘銅衰數一百四十分為七分每分二十今去三分為六十仍餘八十也又將所餘八十取其五分之二餘四十八為三次餘銅衰數八十分為五分每分十六今去二分為三十二仍餘四十八也又將所餘四十八取其四分之一餘三十六為所餘衰數四十八分為四分每分十二今去一分十二仍餘三十六也即以三十六為一率餘銅五十四斤為二率總衰一百四十為三率得四率二百一十斤即原銅共數也蓋二百一十斤內去七分之三是去九十斤餘一百二十斤又將一百二十斤內去五分之二是去四十八斤餘七十二斤又將七十二斤內去四分之一是去十八斤餘五十四斤而與原剩數合也此法亦是按節次另定分數與均分者不同故立衰數亦按節次減去取其餘衰三十六與餘銅五十四斤之比即若總衰一百四十與總銅二百一十斤之比也設如問一老人嵗數但云加三分之二減四分之一得一百三十六歲求其嵗數幾何法借十二為總衰數此數三分之二為八四分之一為三於總衰十二內加八減三得十七為一率一百三十六嵗為二率總衰十二為三率得四率九十六嵗即老人嵗數也此法借十二衰即三分與四分相乘之數三分四分俱可以分盡也於總衰十二內加八即加三分之二也又減三即減四分之一也所得十七即加減衰數也以加減衰數與加減年數之比即若所借總衰與所得歲數之比也設如有一數但云其數二分之一三分之一四分之一五分之一六分之一共併為五百二十二問原數幾何法先借一數可分為二分三分四分五分六分者乃借六十為總衰數此數依法剖之其二分之一為三十其三分之一為二十其四分之一為十五其五分之一為十二其六分之一為十併之得八十七為一率共併數五百二十二為二率總衰六十為三率得四率三百六十即原數也此法借數六十與原數為比者因原數隱而未露故虛借一數作比例以互徵之蓋併數八十七者原數為六十併數五百二十二者原數為三百六十其比例同也設如有馬一羣但云加一倍又加二分之一又加三分之一又加四分之一又加一併原數共一百一十二匹問原數幾何法先借一數可分為二分三分四分者乃借十二為衰數此數加一倍得二十四又加二分之一為六又加三分之一為四又加四分之一為三共得三十七為一率共數一百一十二減一餘一百一十一為二率衰數十二為三率得四率三十六即原數也此法與前法同但題中又加一匹是真數也故於總數內減去一匹為比例蓋加分所得衰數三十七與加分所得共數一百一十一之比即若所借原衰十二與原數三十六之比也設如一人為商三次第一次得利比本為三分之二將利加入本銀第二次得利比本為四分之三又將此利加入本銀第三次得利比本為五分之三三次本利共銀一千四百兩問原本銀若干法借六十為本銀衰數取其三分之二得四十與六十相加得一百又將一百取其四分之三得七十五與一百相加得一百七十五又將一百七十五取其五分之三得一百零五與一百七十五相加得二百八十為一率本利共銀一千四百兩為二率原借衰數六十為三率得四率三百兩即原本銀數也蓋三百兩三分之二得二百與本銀相加得五百於五百內取四分之三得三百七十五仍與五百相加得八百七十五於八百七十五內取五分之三得五百二十五仍與八百七十五相加得一千四百以合原數其借六十為本銀衰數加三分之二得一百即第一次本利共衰也又加四分之三得一百七十五即第二次本利共衰也又加五分之三得二百八十即第三次本利共衰也以本利共衰與本利共銀之比即如本銀借衰與原有本銀之比也疊借互徵疊借互徵者因原問內設數隱伏一次借衰尚不能得其真數故不得不借兩數以比較之先借一數與原數相較復借一數與原數相較然後據兩較以立算而真數可得故曰疊借蓋以疊借之數比原問之數或多或少乃作盈朒法算之以求兩借數之較也故其較之一多一少者用加或兩較俱多兩較俱少者用減一如盈朒之例以兩差數之較與兩借數之較為比而得借數與真數之較或以兩借數互乘兩差數以兩差數之較與互乘所得兩差數之較為比而得所求之真數其法雖繁實有條理亦借數之巧也設如有銀一百兩命甲丙丁三人分之甲比丙多一倍丙比丁多二倍問每人應得幾何法先借十二兩為甲銀衰數則丙應得六兩比甲少一倍丁應得二兩比丙少二倍併三數得二十兩與原銀一百兩相較少八十兩再借二十四兩為甲銀衰數則丙應得十二兩比甲少一倍丁應得四兩比丙少二倍併三數得四十兩與原銀一百兩相較仍少六十兩乃以前借數十二兩少八十兩書於右後借數二十四兩少六十兩書於左作兩不足法算之於是兩少數相減餘二十兩為一率兩借數相減餘十二兩為二率前借數與原數相較之少八十兩為三率得四率四十八兩加入前借數十二兩共得六十兩即甲銀數或以後借數與原數相較之少六十兩為三率得四率三十六兩加入後借數二十四兩亦得六十兩為甲銀數既得甲銀數減一倍得三十兩即丙銀數再取丙銀三分之一得十兩即丁銀數也因丙銀比丁銀多二倍故於丙銀中取三分之一即丁銀此法先借一人銀數加減出三人銀數與原總銀相較得其差數又借一人銀數加減出三人銀數又與原總銀相較復得一差數爰將兩借數相減是得甲一人兩借數之較也又將兩差數相減因兩差俱少故相減如一多一少則相加是得三人兩差數之較也乃以比例求之以三人兩差數之較比一人兩借數之較即同於三人共數與原總銀之差比一人借數與本銀之差也故以二十兩與十二兩之比同於八十兩與四十八兩之比為借數十二兩少於甲本銀之差數或以二十兩與十二兩之比同於六十兩與三十六兩之比為借數二十四兩少於甲本銀之差數各與借數相加皆得甲本銀數也因其為少故與借數相加若差數為多則與借數相減此即盈朒先求適足之法蓋兩少數相差二十兩由於兩借數之相差十二兩如欲補足所少之八十兩則應加四十八兩或欲補足所少之六十兩則應加三十六兩也又如欲借兩數所得差數一多一少用相加立算則先借四十八兩為甲銀衰數丙應得二十四兩丁應得八兩併三數得八十兩與原銀一百兩相較少二十兩再借六十六兩為甲銀衰數丙應得三十三兩丁應得十一兩併三數得一百一十兩與原銀一百兩相較則多十兩乃以前借數四十八兩少二十兩書於右後借數六十六兩多十兩書於左作一盈一朒法算之於是一多數一少數相加得三十兩為一率兩借數相減餘十八兩為二率前借數與原數相較之少二十兩為三率得四率十二兩加入前借數四十八兩共得六十兩即甲銀數如以後借數與原數相較之多十兩為三率得四率六兩與後借數六十六兩相減亦得六十兩為甲銀數既得甲銀數其丙丁銀數按分遞減之即得矣又法既得兩借數之差用互乘以齊其分以前借數四十八兩互乘後多十兩為加四十八倍得多四百八十兩以後借數六十六兩互乘前少二十兩為加六十六倍得少一千三百二十兩乃以互乘所得一多一少兩數相加得一千八百兩為二率原一多一少兩數相加得三十兩為一率一人為三率得四率六十兩即甲銀數也蓋所加四十八倍與六十六倍相差為十八倍則互乘所得一多一少兩數相差之一千八百兩即十八倍總銀數也見盈朒法然甲銀為總銀之三十分之十八蓋兩差數之較為三十則兩借數之較為十八少數為二十則借數加一十二多數為一十則借數減六皆三十與十八之比例也必為十八倍總銀之三十分之一蓋三十分之十八者將總銀分為三十分而得其十八分也若十八倍總銀則其一分即十八也故以三十分與一千八百兩之比即同於一分與六十兩之比即甲銀數也設如有香爐二座不言重數但知爐蓋一個重一百五十斤如以蓋加甲爐則重於乙爐二倍以蓋加乙爐乃與甲爐相等求甲乙二爐各重幾何法先借三十斤為甲爐衰數加蓋一百五十斤共一百八十斤內取三分之一得六十斤為乙爐衰數因甲爐加蓋比乙爐重二倍故以乙爐衰數定為甲爐衰數加蓋之三分之一以乙爐衰數加蓋一百五十斤共二百一十斤比所借甲爐衰數三十斤多一百八十斤則是所借甲爐衰數三十斤少一百八十斤再借九十斤為甲爐衰數加蓋一百五十斤共二百四十斤內取三分之一得八十斤為乙爐衰數以乙爐衰數加蓋一百五十斤共二百三十斤比所借甲爐衰數九十斤多一百四十斤則是所借甲爐衰數九十斤少一百四十斤乃以前借甲爐衰數三十斤少一百八十斤書於右後借甲爐衰數九十斤少一百四十斤書於左作兩朒法算之於是兩少數相減餘四十斤為一率兩借數相減餘六十斤為二率前借數與原數相較之少一百八十斤為三率得四率二百七十斤加入前借數三十斤共三百斤即甲爐之重加蓋一百五十斤共四百五十斤內取三分之一得一百五十斤即乙爐之重加蓋一百五十斤共三百斤與甲爐相等也又法既得兩借數之差用互乘以齊其分以前借數三十斤互乘後少一百四十斤為加三十倍得少四千二百斤以後借數九十斤互乘前少一百八十斤為加九十倍得少一萬六千二百斤乃以互乘所得兩少數相減餘一萬二千斤為二率原兩少數相減餘四十斤為一率甲爐一為三率得四率三百斤即甲爐之重數也蓋所加三十倍與九十倍相差為六十倍則互乘所得兩少數相差之一萬二千斤即六十倍總差數也然甲爐重數為總差數之四十分之六十蓋兩差數之較為四十則兩借數之較為六十少數為一百八十則借數加二百七十皆四十與六十之比例也必為六十倍總差數之四十分之一蓋四十分之六十者將總差數分為四十分而得其六十分也若六十倍總差數則其一分即六十分也故以四十分與一萬二千斤之比即同於一分與三百斤之比也設如有銅鑄甲乙二鐘未稱斤數但云取乙鐘銅八十斤入甲鐘則所餘得甲鐘四分之一若取甲鐘銅八十斤入乙鐘則所餘得乙鐘三分之二問二鐘各得銅數若干法先借一百二十斤為甲鐘衰數取乙鐘銅八十斤加入甲鐘則甲鐘得二百斤此數四分之得五十斤因取乙鐘銅八十斤入甲鐘所餘得甲鐘之四分之一故四分之為乙鐘之一分加八十斤得一百三十斤為乙鐘衰數此乙鐘未取八十斤入甲鐘時得一百三十斤也若取甲鐘銅八十斤加入乙鐘則乙鐘得二百一十斤而甲鐘止餘四十斤甲鐘一百二十斤中去八十斤故餘四十斤加一半二十斤得六十斤為乙鐘數因取甲鐘銅八十斤入乙鐘所餘得乙鐘三分之二故四十斤為三分之二而加一分為二十斤共六十斤為乙鐘數而與乙鐘二百一十斤相較則少一百五十斤再借三百六十斤為甲鐘衰數取乙鐘銅八十斤加入甲鐘則甲鐘得四百四十斤此數四分之得一百一十斤因取乙鐘銅八十斤入甲鐘所餘得甲鐘之四分之一故四分之為乙鐘之一分加八十斤得一百九十斤為乙鐘衰數此乙鐘未取八十斤入甲鐘時得一百九十斤也若取甲鐘銅八十斤加入乙鐘則乙鐘得二百七十斤而甲鐘止餘二百八十斤甲鐘三百六十斤中去八十斤故餘二百八十斤加一半一百四十斤得四百二十斤為乙鐘數因取甲鐘銅八十斤入乙鐘所餘得乙鐘三分之二故二百八十斤為三分之二而加一分為一百四十斤共四百二十斤為乙鐘數而與乙鐘二百七十斤相較則多一百五十斤乃將前借數一百二十斤少一百五十斤書於右後借數三百六十斤多一百五十斤書於左用盈朒法算之於是以一多一少兩數相加得三百為一率兩借數相減餘二百四十為二率前借數與乙衰相較之少一百五十斤為三率得四率一百二十斤加前借數一百二十斤共二百四十斤為甲鐘斤數加入乙鐘銅八十斤為三百二十斤四分之得八十斤既取乙鐘銅八十斤入甲鐘故餘此數再加入甲鐘銅八十斤得一百六十斤為乙鐘斤數也又法既得兩借數之差用互乘以齊其分以前借數一百二十斤互乘後多一百五十斤為加一百二十倍得多一萬八千斤以後借數三百六十斤互乘前少一百五十斤為加三百六十倍得少五萬四千斤乃以互乘所得一多一少兩數相加得七萬二千斤為二率原一多一少兩數相加得三百斤為一率甲鐘一為三率得四率二百四十斤即甲鐘重數也蓋所加一百二十倍與三百六十倍相差為二百四十倍則互乘所得一多一少兩數相加之七萬二千斤即二百四十倍總差數也然甲鐘重數為總差數之三百分之二百四十必為二百四十倍總差數之三百分之一故以三百分與七萬二千斤之比即同於一分與二百四十斤之比也設如甲丙二人入山採礦皆不知所得之數但云甲與丙二十四兩則所餘得丙之四分之一若丙與甲三十兩則所餘得甲之六分之一問兩人各得之數若干法先借四十兩為丙之衰數加甲與二十四兩得六十四兩此數四分之得十六兩因甲得丙四分之一故將丙數四分也加二十四兩得四十兩為甲之衰數因甲與丙二十四兩所餘得丙四分之一故仍以二十四兩加入為甲衰數也若丙與甲三十兩則甲得七十兩而丙止餘十兩六因之得六十兩為甲數因丙與甲三十兩所餘得甲六分之一故將丙之十兩六因之為甲數而與甲七十兩相較則少十兩再借六十兩為丙之衰數加甲與二十四兩得八十四兩此數四分之得二十一兩加二十四兩得四十五兩為甲之衰數其所加所分之故同前若丙與甲三十兩則甲得七十五兩而丙止餘三十兩六因之得一百八十兩而與甲七十五兩相較又多一百零五兩乃將前借數四十兩少十兩書於右後借數六十兩多一百零五兩書於左用盈朒法算之於是以一多一少兩數相加得一百一十五為一率兩借數相減餘二十為二率前借數與甲相較之少十兩為三率得四率一兩七錢三分九釐一毫有餘加前借數四十兩共四十一兩七錢三分九釐一毫有餘為丙所得之數此數加二十四兩得六十五兩七錢三分九釐一毫有餘再四分之得一十六兩四錢三分四釐七毫有餘因甲得丙銀四分之一故四分之加入二十四兩得四十兩四錢三分四釐七毫有餘為甲所得之數甲既與丙二十四兩故止剩一十六兩有餘若未與丙二十四兩其全數則四十兩有餘也若將甲數加三十兩得七十兩四錢三分四釐七毫有餘將丙數減三十兩得十一兩七錢三分九釐一毫有餘此丙十一兩七錢三分九釐一毫有餘即為甲七十兩四錢三分四釐七毫有餘之六分之一也因丙與甲三十兩則丙數居甲數之六分之一故將四十兩有餘再加八丙三十兩得七十兩有餘則丙數內減去三十兩止得十一兩有餘故為甲數之六分之一也又法既得兩借數之差用互乘以齊其分以前借數四十兩互乘後多一百零五兩為加四十倍得多四千二百兩以後借數六十兩互乘前少十兩為加六十倍得少六百兩乃以互乘所得一多一少兩數相加得四千八百兩為二率原一多一少兩數相加得一百一十五兩為一率一人為三率得四率四十一兩七錢三分九釐一毫有餘即丙所得之數也蓋所加四十倍與六十倍相差為二十倍則互乘所得一多一少兩數相加之四千八百兩即二十倍總差數也然丙數為總差數之一百一十五分之二十必為二十倍總差數之一百一十五分之一故以一百一十五分與四千八百兩之比即同於一分與四十一兩七錢三分九釐一毫有餘之比也設如有銅缸磁缸二面若於銅缸內添水五十斤則比磁缸內水多二倍若於磁缸內添水五十斤則與銅缸內水數相等問二缸各得水數若干法先借十斤為銅缸水之衰數加五十斤得六十斤此數三分之得二十斤為磁缸水之衰數因銅缸加五十斤則比磁缸水多二倍故三分之為磁缸水衰數也以磁缸水衰數加五十斤得七十斤因磁缸加五十斤與銅缸水相等故亦加五十斤比所借銅缸水之衰數十斤多六十斤則是所借銅缸水之衰數十斤少六十斤再借二十二斤為銅缸水之衰數加五十斤得七十二斤此數三分之得二十四斤為磁缸水之衰數以磁缸水衰數加五十斤得七十四斤比所借銅缸水之衰數二十二斤多五十二斤則是所借銅缸水之衰數二十二斤少五十二斤乃以前借數十斤少六十斤書於右後借數二十二斤少五十二斤書於左作兩朒法算之於是兩少數相減餘八斤為一率兩借數相減餘十二斤為二率前借數與銅缸相較之少六十斤為三率得四率九十斤加入前借數十斤共一百斤即銅缸之水數加五十斤得一百五十斤三分之得五十斤即磁缸之水數以磁缸水數加五十斤亦得一百斤與銅缸水數相等也又法既得兩借數之差用互乘以齊其分以前借數十斤互乘後少五十二斤為加十倍得少五百二十斤以後借數二十二斤互乘前少六十斤為加二十二倍得少一千三百二十斤乃以互乘所得兩少數相減餘八百斤為二率原兩少數相減餘八斤為一率銅缸一為三率得四率一百斤即銅缸之水數也蓋所加十倍與二十二倍相差為十二倍則互乘所得兩少數相差之八百斤即十二倍總差數也然銅缸水數為總差數之八分之十二必為十二倍總差數之八分之一故以八分與八百斤之比即同於一分與一百斤之比也設如有羊三羣甲羣四百隻丙羣為甲丁兩羣二分之一丁羣為甲丙兩羣三分之一問丙丁兩羣羊數各若干法先借三百隻為丙羣衰數丙羣既為甲丁兩羣二分之一則甲丁兩羣當有六百隻內減甲羣四百隻餘二百隻為丁羣衰數又併甲丙二羣得七百隻丁羣既為甲丙兩羣三分之一則將丁羣二百隻三因之得六百隻與甲丙兩羣七百隻相較則少一百隻再借二百四十隻為丙羣衰數丙羣既為甲丁兩羣二分之一則甲丁兩羣當有四百八十隻內減甲羣四百隻餘八十隻為丁羣衰數又併甲丙二羣得六百四十隻丁羣既為甲丙兩羣三分之一則將丁羣八十隻三因之得二百四十隻與甲丙兩羣六百四十隻相較則少四百隻乃將前借數三百隻少一百隻書於右後借數二百四十隻少四百隻書於左用兩不足法算之於是以兩少數相減餘三百隻為一率兩借數相減餘六十隻為二率前借數與甲丙兩羣相較之少一百隻為三率得四率二十隻加前借數三百隻共三百二十隻即丙羣之羊數加入甲羣四百隻得七百二十隻三分之得二百四十隻即丁羣之羊數也若併甲丁兩羣得六百四十隻折半得三百二十隻即丙羣為甲丁兩羣二分之一也又法既得兩借數之差用互乘以齊其分以前借數三百隻互乘後少四百隻為加三百倍得少一十二萬隻以後借數二百四十隻互乘前少一百隻為加二百四十倍得少二萬四千隻乃以互乘所得兩少數相減餘九萬六千隻為二率原兩少數相減餘三百隻為一率丙一羣為三率得四率三百二十隻即丙羣之羊數也蓋所加三百倍與二百四十倍相差為六十倍則互乘所得兩少數相差之九萬六千隻即六十倍總差數也然丙羣為總差數之三百分之六十必為六十倍總差數之三百分之一故以三百分與九萬六千隻之比即同於一分與三百二十隻之比也設如有田一百畝令甲乙二人分耕若以甲田三分之一與乙以乙田五分之一與甲則各得五十畝問甲乙原田數各若干法先借三十畝為甲原田之衰數此數與一百畝相減餘七十畝為乙原田之衰數甲原田三十畝之三分之一為十畝乙原田七十畝之五分之一為十四畝若甲與乙十畝乙與甲十四畝則甲得田三十四畝甲三十畝與乙十畝餘二十畝又得乙所與十四畝故為三十四畝與各五十畝相比則甲少十六畝再借六十畝為甲原田之衰數此數與一百畝相減餘四十畝為乙原田之衰數甲原田六十畝之三分之一為二十畝乙原田四十畝之五分之一為八畝若甲與乙二十畝乙與甲八畝則甲得田四十八畝甲六十畝與乙二十畝餘四十畝又得乙所與八畝故為四十八畝與各五十畝相比則甲少二畝乃將前借數三十畝少十六畝書於右後借數六十畝少二畝書於左用兩不足法算之於是以兩少數相減得十四畝為一率兩借數相減餘三十畝為二率前借數與五十畝相較之少十六畝為三率得四率三十四畝二分八釐有餘加前借數三十畝共六十四畝二分八釐有餘即甲原田之數與一百畝相減餘三十五畝七分一釐有餘即乙原田之數也若甲以其三分之一二十一畝四分二釐有餘與乙而乙以其五分之一七畝一分四釐有餘與甲則兩人各得五十畝矣又法既得兩借數之差用互乘以齊其分以前借數三十畝互乘後少二畝為加三十倍得少六十畝以後借數六十畝互乘前少十六畝為加六十倍得少九百六十畝乃以互乘所得兩少數相減餘九百畝為二率原兩少數相減餘十四畝為一率甲一人為三率得四率六十四畝二分八釐有餘即甲原田之數也蓋所加三十倍與六十倍相差為三十倍則互乘所得兩少數相差之九百畝即三十倍總差數也然甲原田為總差數之十四分之三十必為三十倍總差數之十四分之一故以十四分與九百畝之比即同於一分與六十四畝二分八釐有餘之比也設如甲丙丁三人共有銀二百一十兩只云甲與丙四分之一丁與甲二分之一丙與丁三分之一則每人均得銀七十兩問各人原有之銀數若干法先借十兩為甲銀衰數此數減四分之一二兩五錢餘七兩五錢與七十兩相減餘六十二兩五錢為丁銀二分之一加一倍得一百二十五兩為丁銀衰數因甲與丙四分之一丁與甲二分之一成七十兩故於甲衰十兩內減四分之一餘七兩五錢再加六十二兩五錢方湊成七十兩故以六十二兩五錢即為丁銀二分之一加一倍得丁銀全數也又併甲丁兩衰數得一百三十五兩與總銀二百一十兩相減餘七十五兩為丙銀衰數因三人共銀二百一十兩減去甲銀十兩丁銀一百二十五兩所餘七十五兩即丙之銀數也又於丙衰七十五兩內減三分之一二十五兩餘五十兩加甲衰四分之一二兩五錢共得五十二兩五錢因丙與丁三分之一甲與丙四分之一成七十兩故於丙衰七十五兩內減與丁二十五兩又加甲所與二兩五錢共五十二兩五錢也此數與七十兩相較則少十七兩五錢再借二十八兩為甲銀衰數此數減四分之一七兩餘二十一兩與七十兩相減餘四十九兩為丁銀二分之一加一倍得九十八兩為丁銀衰數甲銀減四分之一餘四十九兩既為丁銀二分之一故加一倍即為丁銀全數也又併甲丁兩衰數得一百二十六兩與總銀二百一十兩相減餘八十四兩為丙銀衰數因三人共銀二百一十兩減去甲銀二十八兩丁銀九十八兩其餘八十四兩即丙之銀數也又於丙衰八十四兩內減三分之一二十八兩餘五十六兩加甲衰四分之一七兩共得六十三兩因丙與丁三分之一甲與丙四分之一成七十兩故於丙衰八十四兩內減與丁二十八兩又加甲所與七兩共得六十三兩也此數與七十兩相較則少七兩乃將前借數十兩少十七兩五錢書於右後借數二十八兩少七兩書於左用兩不足法算之於是以兩少數相減餘十兩五錢為一率兩借數相減餘十八兩為二率前借數與七十兩相較之少十七兩五錢為三率得四率三十兩加前借十兩共四十兩即甲之銀數減四分之一十兩餘三十兩因去一分與丙也與七十兩相減餘四十兩倍之得八十兩即丁之銀數併甲丁銀數得一百二十兩與總銀二百一十兩相減餘九十兩即丙之銀數也此疊借三色之法也借衰時加減甚繁然條理分明自能了然如此法前借數甲衰十兩丙衰七十五兩丁衰一百二十五兩若於丁衰減去二分之一減六十二兩五錢與甲加丙衰三分之一丙與丁二十五兩得八十七兩五錢與七十兩相較則多十七兩五錢丙差與丁差其數一也至再借二十八兩為甲衰其加減亦與前借數同惟甲成七十兩至丙則少七兩丁則多七兩其數相同故但取丙差數就其兩差之較數以比例之得甲之原銀數也又法既得兩借數之差用互乘以齊其分以前借數十兩互乘後少七兩為加十倍得少七十兩以後借數二十八兩互乘前少十七兩五錢為加二十八倍得少四百九十兩乃以互乘所得兩少數相減餘四百二十兩為二率原兩少數相減餘十兩五錢為一率甲一人為三率得四率四十兩即甲銀數也蓋所加十倍與二十八倍相差為十八倍則互乘所得兩少數相差之四百二十兩即十八倍之總差數也然甲銀為總差數之十分半之十八必為十八倍總差數之十分半之一故以十分半與四百二十兩之比即同於一分與四十兩之比也設如甲丙兩果園不知畝數將甲園擴出五十畝則比丙園大二倍若將丙園擴出五十畝則比甲園大一倍問兩園原有之畝數若干法借四十畝為甲園衰數加五十畝得九十畝此數三分之得三十畝為丙園衰數因甲加五十畝比丙園大二倍是丙園為甲園三分之一也故三分之將丙園三十畝加五十畝得八十畝與甲園四十畝相較適大一倍此數已合則不必再借故凡疊借法中一借即合原數者皆如此例不必再借也設如大小兩船雇夫小船每人出銀為大船每人五分之四若大船八人小船五人出銀則不足七兩若大船六人小船八人出銀則不足三兩問共銀及每人各出銀幾何法以五分為大船每人衰數四分為小船每人衰數因小船每人為大船每人五分之四也以五分與大船八人相乘得四十分為大船八人共衰數以四分與小船五人相乘得二十分為小船五人共衰數相加得六十分為大船八人小船五人共出銀共分數又將五分與大船六人相乘得三十分為大船六人共衰數以四分與小船八人相乘得三十二分為小船八人共衰數相加得六十二分為大船六人小船八人共出銀共分數乃將六十分少七兩書於右六十二分少三兩書於左用兩朒求總銀法算之於是以六十分與六十二分相減餘二分為一率以兩少數相減餘四兩為二率一分為三率得四率二兩為每分之銀數與六十分相乘得一百二十兩加少七兩得一百二十七兩為雇夫之總銀數如與六十二分相乘則得一百二十四兩加少三兩亦得一百二十七兩為雇夫之總銀數又以每分二兩與大船每人衰數五分相乘得十兩為大船每人所出銀數以每分二兩與小船每人衰數四分相乘得八兩為小船每人所出銀數也此盈朒內兩朒之正法但因有借分為衰數之故故附於此以備疊借之一體云設如有石二塊大小不等俱不知重數只有銅條一根重十二兩互換稱之而得二石之各重幾何法先將銅條分作十二分每分又作十分用一繩繫於第五分之上繫於五分者隨便取一數也乃以五分加一倍與十二分相較餘二分折半得一分與五分相加為六分乃以五分為一率六分為二率餘二分作二兩為三率因銅條重十二兩分為十二分今二分故為二兩也得四率二兩四錢此四率是先將銅條之五分處取均平之法蓋提繫在五分上必於五分之端加二兩四錢乃與七分相平也爰以銅條作稱杆將大石掛在銅條一頭離提繫五分而以小石作錘稱之今離提繫得六分始平記之如前圖又將小石掛在銅條一頭離提繫五分而以大石作錘稱之今離提繫得四分始平亦記之如後圖乃先借二十六兩四錢為大石衰數與前所得二兩四錢相減餘二十四兩內減二兩四錢者因銅條之五分一邊必加二兩四錢始平今於借衰中減去者所以補足均平之數然後較物之輕重也用六分為一率即小石在六分之數五分為二率即大石在五分之數二十四兩為三率即大石衰中減去二兩四錢所餘之數得四率二十兩為小石之衰數此四率是以大石衰數求小石衰數因以小石衰數二十兩與二兩四錢相減餘十七兩六錢此亦減去二兩四錢因小石移在五分之一邊補足均平之數也用四分為一率即大石在四分之數五分為二率即小石在五分之數十七兩六錢為三率即小石衰中減去二兩四錢所餘之數得四率二十二兩此第二四率又以小石衰數轉求大石衰數試其合否也與所借大石衰數二十六兩四錢相較則少四兩四錢再加三十二兩四錢為大石衰數與二兩四錢相減餘三十兩用六分為一率五分為二率三十兩為三率得四率二十五兩為小石之衰數因以小石衰數二十五兩與二兩四錢相減餘二十二兩六錢用四分為一率五分為二率二十二兩六錢為三率得四率二十八兩二錢五分與所借大石衰數三十二兩四錢相較則少四兩一錢五分乃將前借數二十六兩四錢少四兩四錢書於右後借數三十二兩四錢少四兩一錢五分書於左用兩不足法算之於是以兩少數相減餘二錢五分為一率兩借數相減餘六兩為二率前借數與大石衰數相較之少四兩四錢為三率得四率一百零五兩六錢加前借數二十六兩四錢共一百三十二兩即大石之重數又於大石重數內減去二兩四錢餘一百二十九兩六錢用六分為一率五分為二率即前以大石衰數求小石衰數之法既有大石真數故仍以前法求小石真數一百二十九兩六錢為三率得四率一百零八兩為小石之重數也如以四分為一率五分為二率即前以小石求大石之重法於小石重數一百零八兩內減去二兩四錢餘一百零五兩六錢為三率得四率一百三十二兩為大石之重數亦合前數也此法蓋因銅條重十二兩而分作十二分設如作一甲乙線為銅條分作十二分每分重一兩提繫在丙處甲丙與丙丁等則其重亦必等如以甲丁與甲乙相減則餘丁乙即丙乙多於甲丙之二分也既多二分必重二兩如以二兩重物掛於乙丁中間之戊處則丙乙自重於甲丙也今欲以物趂之使其兩平則以甲丙五分為一率丙戊六分為二率二兩為三率得四率二兩四錢是將二兩四錢之物加於甲處始得兩平其以丙戊六分為二率者何也蓋丙丁與甲丙等而重者止在丁乙一段而戊為丁乙之中戊去丙逺甲去丙近惟近故加重而後可以勝逺之輕若於甲接長二分則於二分之中施二兩之物即稱平矣故以二兩四錢加於甲處始能趂平丁乙之二分也此法數層加減幾用比例頗覺繁瑣而用方程算之微覺簡明但係疊借本法故兩收之收入疊借者所以存其理而收入方程者所以取其簡也御製數理精藴下編卷九
