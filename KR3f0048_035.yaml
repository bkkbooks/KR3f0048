body:
  text: 欽定四庫全書御製數理精藴下編卷三十體部八各體權度比例堆垜各體權度比例數學至體而備以其綜線面之全而盡度量衡之用也蓋線面存乎度體則存乎量求輕重則存乎衡是以又有權度之比例其法概以諸物製為正方其邊一寸其積千分較量豪釐俾有定率然後凡物知其體積即知其重輕知其重輕即知其體積而權度無遁情也且體之為質不一邊積等者輕重不同輕重等者邊積不同皆有互相比例之法而各體無混淆也赤金十六兩八錢紋銀九兩水銀十二兩二錢八分紅銅七兩五錢白銅六兩九錢八分黃銅六兩八錢綱六兩七錢三分生鐵六兩七錢熟鐵六兩七錢三分高錫六兩三錢六錫七兩六錢倭鉛六兩黑鉛九兩九錢三分白玉二兩六錢金珀八錢白瑪瑙二兩三錢紅瑪瑙二兩二錢硨磲一兩五錢二分青石二兩八錢八分白石二兩五錢紅石二兩五錢六分象牙一兩五錢四分牛角一兩九錢沉香八錢二分白檀八錢三分紫檀一兩零二分花梨八錢七分楠木四錢八分黃楊七錢五分烏木一兩一錢油八錢三分水九錢三分設如有金一方每邊三寸問重幾何法以一寸為一率金寸方重一十六兩八錢為二率今所設之金方每邊三寸自乘再乘得二十七寸為三率求得四率四百五十三兩六錢即金之重數也此法蓋因金方每邊三寸則體積為二十七寸以一寸與一十六兩八錢之比同於二十七寸與四百五十三兩六錢之比也設如有銀一方每邊二寸問重幾何法以一寸為一率銀寸方重九兩為二率今所設之銀方每邊二寸自乘再乘得八寸為三率求得四率七十二兩即銀之重數也此法蓋因銀方每邊二寸則體積為八寸以一寸與九兩之比同於八寸與七十二兩之比也設如黃銅一條重三百七十四兩問積幾何法以黃銅寸方重六兩八錢為一率一寸為二率今所設黃銅重三百七十四兩為三率求得四率五十五寸即黃銅之積也設如熟鐵一塊重十六兩欲鎔為正方體問每邊幾何法以熟鐵寸方重六兩七錢三分為一率一寸為二率今鐵重十六兩為三率求得四率二寸三百七十七分四百一十四釐有餘開立方得一寸三分三釐有餘即每邊之數也設如水銀一匣但知匣闊四寸長六寸高三寸五分問內水銀重數幾何法以匣闊四寸與長六寸相乘得二十四寸又以高三寸五分再乘得八十四寸為水銀一匣之積數爰以一寸為一率水銀寸方重一十二兩二錢八分為二率今所得之水銀一匣之積數八十四寸為三率求得四率一千零三十一兩五錢二分即水銀之重數也設如白玉一方重九十三兩六錢但知闊比高多一寸長比闊多三寸問高闊長各幾何法以玉寸方重二兩六錢為一率一寸為二率今所設玉重九十三兩六錢為三率求得四率三十六寸為長方體積乃以闊比高多一寸長比闊多三寸為帶兩縱之較用帶兩縱不同較數開立方法算之得高二寸加闊比高多一寸得三寸為闊再加長比闊多三寸得六寸為長也設如金與銀鎔於一處共得正方體積二十七寸重二百七十四兩二錢問金與銀各幾何法以共積二十七寸以銀寸方重九兩乘之得二百四十三兩與共重二百七十四兩二錢相減餘三十一兩二錢乃以銀寸方重九兩與金寸方重十六兩八錢相減餘七兩八錢為一率金一寸為二率今相減所餘之三十一兩二錢為三率求得四率四寸即金之寸數於共積二十七寸內減去四寸餘二十三寸即銀之寸數也以金四寸與金寸方重十六兩八錢相乘得六十七兩二錢以銀二十三寸與銀寸方重九兩相乘得二百零七兩兩數相併得二百七十四兩二錢仍與原數相合也此即和較比例之法蓋銀二十七寸則其重數應得二百四十三兩與共重二百七十四兩二錢相減餘三十一兩二錢即金重於銀之數而金每寸比銀每寸多七兩八錢故多七兩八錢則金有一寸今多三十一兩二錢則知金有四寸也若欲先得銀數則仍以七兩八錢為一率一寸為二率將共積二十七寸以金寸方重十六兩八錢乘之得四百五十三兩六錢內減共重二百七十四兩二錢餘一百七十九兩四錢為三率求得四率二十三寸即銀之寸數與共積二十七寸相減餘四寸即金之寸數蓋少七兩八錢則銀有一寸今少一百七十九兩四錢則知銀有二十三寸也設如金鑲玉爐一座共重四十六兩七錢問金玉各幾何法用盛水器皿一件置爐其中實之以水取出爐看水淺幾何設如盛水器皿係正方形每邊五寸取出爐水淺五分即以每邊五寸自乘得二十五寸以水淺五分為高再乘得一十二寸五百分為爐之體積即金玉之共積爰以共積一十二寸五百分以玉寸方重二兩六錢乘之得三十二兩五錢與共重四十六兩七錢相減餘一十四兩二錢乃以玉寸方重二兩六錢與金重一十六兩八錢相減餘一十四兩二錢為一率金一寸為二率今相減所餘一十四兩二錢為三率求得四率一寸為金之寸數於共積一十二寸五百分內減去一寸餘十一寸五百分為玉之寸數金一寸重得十六兩八錢玉十一寸五百分與玉寸方重二兩六錢相乘得二十九兩九錢為玉之重數兩數相併共得四十六兩七錢仍與原數相合也如欲先得玉數則仍以一十四兩二錢為一率一寸為二率將所得共積一十二寸五百分以金寸方重十六兩八錢乘之得二百一十兩內減共重四十六兩七錢餘一百六十三兩三錢為三率求得四率一十一寸五百分為玉之寸數與共積一十二寸五百分相減餘一寸即金之寸數也設如空心金球一個外徑一尺二寸厚三分問重幾何法以金球外徑一尺二寸自乘再乘得一尺七百二十八寸乃用方邊球徑相等方積球積不同之定率比例以方積一為一率球積五二三五九八七七五為二率今球徑自乘再乘之正方體積一尺七百二十八寸為三率求得四率九百零四寸七百七十八分六百八十三釐有餘為球之全體積又以厚三分倍之得六分與外徑一尺二寸相減餘一尺一寸四分為空心徑自乘再乘得一尺四百八十一寸五百四十四分仍以方積一為一率球積五二三五九八七七五為二率今空心徑自乘再乘之正方體積一尺四百八十一寸五百四十四分為三率求得四率七百七十五寸七百三十四分六百二十三釐有餘為球內空心虛積兩積相減餘一百二十九寸零四十四分零六十釐有餘為空心球體積乃以一寸為一率金寸方重十六兩八錢為二率空心球體積一百二十九寸零四十四分零六十釐有餘為三率求得四率二千一百六十七兩九錢四分有餘即空心金球體之重數也設如正方青石一塊紅石一塊紅石比青石每邊多二寸體積多五十六寸問二石之邊數及重數各幾何法以紅石比青石每邊多二寸為邊較體積多五十六寸為積較用大小二立方有邊較積較求邊法算之以邊較二寸自乘再乘得八寸與積較五十六寸相減餘四十八寸三歸之得一十六寸以邊較二寸除之得八寸為長方面積以邊較二寸為長闊之較用帶縱較數開平方法算之得闊二寸即青石之邊數加紅石比青石每邊多二寸得四寸即紅石之邊數乃以一寸為一率紅石寸方重二兩五錢六分為二率紅石每邊四寸自乘再乘得六十四寸為三率求得四率一百六十三兩八錢四分即紅石之重數也又以一寸為一率青石寸方重二兩八錢八分為二率青石每邊二寸自乘再乘得八寸為三率求得四率二十三兩零四分即青石之重數也此法因二石皆為正方體故用大小二立方有邊較積較求邊之法求得二石之邊自乘再乘即得二石之體積用寸方重數定率以比例之即得二石之重數也設如有正方水桶三個第一桶每邊一尺第三桶比第二桶每邊多二寸第三桶體積與第一桶第二桶兩桶之共積相等問三桶水之重數各幾何法以一寸為一率水寸方重九錢三分為二率第一桶正方每邊一尺自乘再乘得一千寸為三率求得四率九百三十兩為第一桶水之重數又以第三桶比第二桶每邊多二寸為邊較以第一桶體積一千寸為第三桶比第二桶所多之積較用大小二立方有邊較積較求邊法算之以邊較二寸自乘再乘得八寸與積較一千寸相減餘九百九十二寸三歸之得三百三十寸六百六十六分六百六十六釐有餘以邊較二寸除之得一尺六十五寸三十三分三十三釐有餘為長方面積以邊較二寸為長闊之較用帶縱較數開平方法算之得闊一尺一寸八分九釐有餘為第二桶之邊數加較二寸得一尺三寸八分九釐有餘為第三桶之邊數乃以一寸為一率水寸方重九錢三分為二率第二桶每邊一尺一寸八分九釐有餘自乘再乘得一尺六百八十寸九百二十四分有餘為三率求得四率一千五百七十兩九錢九分三釐有餘即第二桶水之重數又以一寸為一率水寸方重九錢三分為二率第三桶每邊一尺三寸八分九釐有餘自乘再乘得二尺六百七十九寸八百二十六分有餘為三率求得四率二千四百九十二兩二錢三分八釐有餘即第三桶水之重數也此法蓋因第三桶之體積與第一第二兩桶之共積相等則第一桶體積一千寸即第三桶體積比第二桶體積所多之較也而第三桶比第二桶每邊多二寸故用大小二立方有邊較積較求邊法求得二桶之邊數自乘再乘即得二桶之體積用寸方重數定率以比例之即得二桶水之重數也設如金球一個徑二寸二分六釐今欲作一銀球其重與金球等問徑幾何法以金方邊一寸為一率銀方邊一寸二分三釐為二率今所設之金球徑二寸二分六釐為三率求得四率二寸七分七釐有餘即銀球之徑數也此法蓋因各色俱為正方體其重數俱設為十六兩八錢與金寸方等故金方邊為一寸銀方邊為一寸二分三釐水銀方邊為一寸一分一釐鉛方邊為一寸一分九釐銅方邊為一寸三分一釐鐵方邊為一寸三分六釐錫方邊為一寸三分九釐石方邊為一寸八分九釐水方邊為二寸六分四釐油方邊為二寸七分四釐皆係邊與邊之比例故球徑與球徑之比同於方邊與方邊之比而為相當比例四率也設如青石一塊正方一尺二寸重四千九百七十六兩六錢四分今欲作與青石一樣大熟鐵一塊問重幾何法以青石寸方重二兩八錢八分為一率熟鐵寸方重六兩七錢三分為二率今所設之青石重四千九百七十六兩六錢四分為三率求得四率一萬一千六百二十九兩四錢四分即與青石一樣大熟鐵之重數也堆垜堆垜之法雖為體屬而一面平堆與方圓束形實與面同方者即平方法其餘則用梯形法以其每層皆遞加之數也束形亦與一面平堆同法蓋圓者以六包一方者以八包一三角者以九包一有邊求積有周求積其理皆相通也若夫以方面層纍者則為四角尖堆以三角面層纍者則為三角尖堆此二者每層之邊皆同為遞加一數每層之面積則三角為按位相加之數四角為按位自乘相加之數其傍皆崚嶒不平故與體亦微異也至於以長方面層纍者則為長方堆以全堆而減去上截者則為半堆總以尖堆之法御之分之以立其法合之以明其理一一按法解之於後設如一面直角尖堆底十二求積幾何法以底十二加尖上一得十三與層數十二相乘得一百五十六折半得七十八即一面直角尖堆之積也如圖甲乙丙一面直角尖堆乙丙為底十二其甲乙高亦即為十二層其每層皆加一為挨次遞加之數成直角三角形試另作一丁戊己直角三角形合於原形之側則成甲乙丁戊長方形其高即層數其底即首數與末數相加之數其積即總數加一倍之數見算法原本二卷第三十二節故以底十二與上尖一相加與層數十二相乘得長方積析半即得一面直角尖堆之積也此法與勾股求積之法異者蓋勾股之上尖為一點無數可紀此上尖一即其上之闊成斜方形故用斜方求積之法以上闊與下闊相加以高數乘之折半而得積也設如一面直角尖堆積二十八求底幾何法以一面直角尖堆積二十八倍之得五十六為長方積以一為長闊之較用帶縱較數開平方法算之得闊七即一面直角尖堆之底數也如圖甲乙丙一面直角尖堆積倍之則成甲乙丁戊長方形積其乙丁長比甲乙闊多一故用帶縱較數開平方法算之得甲乙與乙丙等為一面直角尖堆之底闊也設如一面三角尖堆底七求積幾何法以底七加上尖一得八與層數七相乘得五十六折半得二十八即一面三角尖堆之積也如圖甲乙丙一面三角尖堆乙丙為底七其甲乙高亦即為七層其每層皆加一為挨次遞加之數成等邊三角形試另作一丁戊巳等邊三角形合於原形之側則成甲乙丁戊斜方形其高即層數其底即首數與末數相加之數其積即總數加一倍之數故以底七與上尖一相加與層數七相乘得斜方積折半得一面三角尖堆之積也設如一面三角尖堆積三十六求每邊幾何法以一面三角尖堆積三十六倍之得七十二為長方積以一為長闊之較用帶縱較數開平方法算之得闊八即一面三角尖堆每一邊之數也如圖甲乙丙一面三角尖堆積倍之則成甲乙丁戊斜長方積若直排之即與直角長方積等故其求邊之法亦與前直角尖堆求邊之法同也設如一面梯形堆上五下九求積幾何法以上五與下九相加得十四又視上五以上至一虛四位即以所虛之四與下九相減餘五為層數與上下相加之十四相乘得七十折半得三十五即一面梯形堆之積也如圖甲乙丙丁一面梯形堆甲丁為上五乙丙為下九甲乙為層數五凡自一遞加之數其末數即位數今首數為五計自一己截去四位故於末數內減去所少之位即為今之所有之位見算法原本二卷第三十二節試另作一戊己庚辛梯形合於原形之側則成甲乙己庚斜方形其底即上數與下數相加之數其高即層數其積即總數加一倍之數故以上數與下數相加與層數相乘折半即得一面梯形堆之積也又法以底九用一面三角尖堆求積法求得總積四十五又以上五內減一餘四為上虛小一面三角尖堆之底亦用三角尖堆求積法求得上虛小一面三角尖堆積十兩積相減餘三十五即一面梯形堆之積也如圖甲乙丙丁一面梯形堆先求得戊乙丙三角尖堆總積又求得戊己庚上虛小三角尖堆積相減即得甲乙丙丁梯形堆之積也如有上闊或下闊與層數求積者則於層數內減一餘為上下闊之較與上闊相加則得下闊與下闊相減則得上闊皆用有上下闊之法算之而得積也設如一面梯形堆積三十五下九問上幾何法以下九用一面三角尖堆求積法求得總積四十五內減梯形積三十五餘十為上虛小一面三角尖堆積用一面三角尖堆有積求邊法求得每邊四加一得五即一面梯形堆之上闊也如圖甲乙丙丁一面梯形堆先以乙丙下九求得戊乙丙三角尖堆總積內減甲乙丙丁梯形堆積餘戊己庚上虛小一面三角尖堆積乃用有積求邊法求得己庚四因每層埃次遞加一故加一即得甲丁五為上闊也如有上闊求下闊者則以上闊內減一為上虛小三角尖堆之底求得上虛小三角尖堆積與梯形積相加為三角尖堆總積亦用有積求邊法算之即得下闊也設如一面梯形堆積三十五上闊比下闊少四問上下闊各幾何法以梯形堆積三十五倍之得七十又以上下闊之較四加一得五為層數以除倍積七十得十四為上下闊之和加較四得十八折半得九為下闊內減較四餘五為上闊也如圖甲乙丙丁一面梯形堆積每層挨次加一今甲丁上闊比乙丙下闊少四即知甲乙為五層矣故以甲乙丙丁梯形積倍之則成甲乙戊己斜方積以甲乙五層除之得乙戊為上下闊之和加上下闊之較折半即得下闊於下闊內減上下闊之較即得上闊也如有積與上下闊之和求上下闊者則將積數加一倍以上下闊之和除之即得層數內減一即得上下闊之較或有積與層數求上下闊者則於層數內減一即得上下闊之較以層數除倍積即得上下闊之和既有較有和即得上下闊矣設如一面六角堆每邊六求積幾何法以一面六角堆分作六三角尖堆算之以每邊六減一餘五為每一面三角尖堆之底與每邊六即底加一也相乘得三十折半得十五為每一面三角尖堆積六因之得九十加中心一得九十一即一面六角堆之積也如圖甲乙丙丁戊己一面六角堆六分之則成甲庚辛類六三角尖堆而餘中心一其每一三角尖堆之甲庚一邊比六角堆之甲己一邊少一故以六角堆之每一邊內減一即得三角尖堆之每一邊而求得一面三角尖堆積六因之再加中心一即得一面六角堆之總積也設如一面六角堆積九十一求每邊幾何法以一面六角堆積九十一減中心一餘九十六歸之得十五為一面三角尖堆積用一面三角尖堆有積求邊法算之得每邊五加一得六即六角堆之每一邊也如圖甲乙丙丁戊己一面六角堆積先減去中心一以六歸之則得甲庚辛一三角尖堆積其三角尖堆之甲庚一邊比六角堆之甲己一邊少一故用一面三角尖堆有積求邊法求得一邊再加一為一面六角堆之每一邊也此即算書所謂圓束也本以六包一不能成圓凡云圓者皆六邊也周四十求積幾何法以外周四十加四得四十四四歸之得十一為方束每一邊之數自乘得一百二十一即方束之積也如圖甲乙丙丁方束其四隅之四各為兩邊所同用故必以外周加四以四歸之始得甲乙每一邊之數以一邊自乘即為方束之積數也又法以外周四十加八得四十八與外周四十相乘得一千九百二十十六除之得一百二十加中心一得一百二十一為方束之積也蓋方束以八包一其外周所包之數亦必以八遞加為超位平加之數如甲乙丙丁方束除却中心之一最內一層為八第二層為十六第三層為二十四第四層為三十二第五層為四十每層皆加八為超位平加之數引而長之成戊己庚辛梯形外周四十即梯形之底內周八即梯形之上闊如以首數八與末數四十相加得四十八用層數五乘之折半即得總數見算法原本二卷第三十二節然其層數之五乃係外周四十用八歸所得之數今以內周八與外周四十相加即與外周四十栒乘是未用八歸故將相乘所得之數必以八歸又以二歸即折半始得總數夫先用八歸後用二歸即與用十六歸除等二與八相因得一十六合兩次除為一次除故以十六歸除得總數再加中心一即得方束之積也又按第一法以外周四十加四以四歸之得方束之每一邊是外周加四則得每邊之四倍若以外周加四自乘必得方束積之十六倍而以十六歸除亦即得方束之積今以外周加八與外周相乘成長方形則其長比每邊之四倍多四其闊比每邊之四倍少四其積必為方束積之十六倍而少十六以十六歸除則得方束積而少一故加一而得方束積也此方束每邊十一係奇數故有中心之一若方束每邊係偶數者則無中心之一詳見下法設如方束外周三十六求積幾何法以外周三十六加四得四十四歸之得一十為方束每一邊之數自乘得一百即方束之積也又法以外周三十六加八得四十四與外周三十六相乘得一千五百八十四十六除之得九十九加一得一百為方束之積也此方束每邊係偶數無中心一其最內一層為四其外周三十六用八歸之則得四層半然其立法亦與前法同乘除得數仍加一者蓋以外周加四則得每邊之四倍若以外周加四自乘必得方束積之十六倍而以十六歸除亦即得方束之積今以外周加八與外周相乘成長方形則其長比每邊之四倍多四其闊比每邊之四倍少四其積必為方束積之十六倍而少十六以十六歸除則得方束積而少一故加一而得方束積也設如方束積一百求外周幾何法以方束積一百開平方得一十四因之得四十內減四餘三十六即方束外周之數也如圖甲乙丙丁方束開方則得甲乙一邊前法以外周加四四歸之而得一邊此法以一邊四因之減四而即得外周也又法以方束積一百內減一餘九十九以十六乘之得一千五百八十四為長方積以八為長闊之較用帶縱較數開平方法算之得闊三十六即方束之外周數也此即方束有外周求積之法而轉用之前法以外周加八與外周相乘十六除之再加一而得積此法則以積數減一餘用十六乘之以八為長闊之較用帶縱開方得闊而為外周也設如三稜束外周二十七求積幾何法以外周二十七加三得三十三歸之得一十為三稜束每一邊之數用一面三角尖堆有邊求積法以每邊一十加一得一十一與每邊一十相乘得一百一十折半得五十五即三稜束之積也如圖甲乙丙三稜束其三角之三各為兩邊所同用故必以外周加三以三歸之始得甲乙每一邊之數即如一面三角尖堆之每一邊故用一面三角尖堆有邊求積法算之即得三稜束之積也又法以外周二十七加九得三十六與外周二十七相乘得九百七十二以十八歸除得五十四加中心一得五十五為三稜束之積也蓋三稜束以九包一其外周所包之數亦必以九遞加為超位平加之數如甲乙丙三稜束除却中心之一最內一層為九第二層為十八第三層為二十七每層皆加九為超位平加之數引而長之成丁戊己庚梯形外周二十七即梯形之底內周九即梯形之上闊如以首數九與末數二十七相加得三十六用層數三乘之折半即得總數見算法原本二卷第三十二節然其層數之三乃係外周二十七用九歸所得之數今以內周九與外周二十七相加即與外周二十七相乘是未用九歸故將相乘所得之數必以九歸又以二歸即折半始得總數夫先用九歸後用二歸即與十八歸除等二與九相乘得一十八合兩次除為一次除故以十八歸除得總數再加中心一即得三稜束之積也又按第一法以外周二十七加三以三歸之得一面三角尖堆之每一邊是外周加三則得每邊之三倍若以每邊之三倍再加三與每邊之三倍相乘必得一面三角尖堆積之十八倍蓋以一面三角尖堆之每一邊加一與每邊之數相乘則得一面三角尖堆積之二倍今以每邊之三倍加三與每邊之三倍相乘是邊加三倍則積加九倍彼既為一面三角尖堆積之二倍故此即為十八倍也而以十八歸除亦即得三稜束之積今以外周加九與外周相乘成長方形則其長比每邊之三倍加三者尚多三其闊比每邊之三倍少三其積必為一面三角尖堆積之十八倍而少十八以十八歸除則得一面三角尖堆積而少一故加一而得三稜束之積也此三稜束亦有無中心之一者蓋緣三稜束包中心一為一層者周圍九其底則四包中心一為二層者周圍十八其底則七凡如此類周遞加九邊遞加三者皆有中心之一其餘皆無中心之一詳見下法設如三稜束外周三十求積幾何法以外周三十加三得三十三三歸之得十一為三稜束每一邊之數用一面三角尖堆有邊求積法以每邊十一加一得十二與每邊十一相乘得一百三十二折半得六十六即三稜束之積也又法以外周三十加九得三十九與外周三十相乘得一千一百七十十八除之得六十五加一得六十六為三稜束之積也此三稜束無中心其最內一層為三其外周三十用九歸之則得三層又三分之一然其立法亦與前法同乘除得數仍加一者蓋以外周加三則得每邊之三倍若以每邊之三倍再加三與每邊之三倍相乘必得一面三角尖堆積之十八倍而以十八歸除亦即得三稜束之積今以外周加九與外周相乘成長方形則其長比每邊之三倍加三者尚多三其闊比每邊之三倍少三其積必為一面三角尖堆積之十八倍而少十八以十八歸除則得一面三角尖堆積而少一故加一而得三稜束之積也設如三稜束積六十六求外周幾何法以三稜束積六十六倍之得一百三十二為長方積以一為長闊之較用帶縱較數開平方法算之得闊十一為三稜束之每一邊三因之得三十三內減三餘三十即三稜束之外周數也如圖甲乙丙三稜束用一面三角尖堆有積求邊法求得甲乙一邊前法以外周加三三歸之而得一邊此法以一邊三因之減三而即得外周也又法以三稜束積六十六內減一餘六十五以十八乘之得一千一百七十為長方積以九為長闊之較用帶縱較數開平方法算之得闊三十即三稜束之外周數也此即三稜束有外周求積之法而轉用之前法以外周加九與外周相乘十八除之再加一而得積此法則以積數減一餘用十八乘之以九為長闊之較用帶縱開方得闊而為外周也設如圓束外周三十求積幾何法以外周三十六歸之得五為一面三角尖堆之每一邊用一面三角尖堆有邊求積法以每邊五加一得六與每邊五相乘得三十折半得十五為每一三角尖堆積六因之得九十加中心一得九十一即圓束之積也如圖甲乙丙丁戊己圓束六分之則成甲庚辛類六三角尖堆形而餘中心一故以外周六分之而得甲庚每一邊之數即如一面三角尖堆之每一邊而求得一三角尖堆積六因之得六三角尖堆積加中心一即為圓束之積數也又法以外周三十加六得三十六與外周三十相乘得一千零八十十二除之得九十加中心一得九十一為圓束之積也蓋圓束以六包一其外周所包之數亦必以六遞加為超位平加之數如甲乙丙丁戊己圓束除却中心之一最內一層為六第二層為十二第三層為十八第四層為二十四第五層為三十每層皆加六為超位平加之數引而長之成庚辛壬癸梯形外周三十即梯形之底內周六即梯形之上闊如以首數六與末數三十相加得三十六用層數五乘之折半即得總數見算法厚本二卷第三十二節然其層數之五乃係外周三十用六歸所得之數今以內周六與外周三十相加即與外周三十相乘是未用六歸故將相乘所得之數必以六歸又以二歸即析半始得總數夫先用六歸後用二歸即與十二歸除等二與六相因得一十二合兩次除為一次除故以十二歸除得總數再加中心一即得圓束之積也又按第一法以外周三十六歸之得一面三角尖堆之每一邊是圓束之外周為一面三角尖堆每邊之六倍若以外周加六與外周相乘則必得一面三角尖堆積之七十二倍蓋以一面三角尖堆之每一邊加一與每一邊之數相乘則得一面三角尖堆積之二倍今以每邊之六倍加六與每邊之六倍相乘是邊加六倍則積加三十六倍彼既為一面三角尖堆積之二倍故此即為七十二倍也以一面三角尖堆積六倍之加中心一則得圓束積今將七十二倍積以十二除之亦得一面三角尖堆積之六倍故加中心一而得圓束之積也凡圓束皆有中心設此解與前法相通耳設如圓束積九十一求外周幾何法以圓束積九十一減中心一餘九十六歸之得一十五倍之得三十或即以九十三歸之所得亦同蓋六歸二因與三歸所得之數同也為長方積以一為長闊之較用帶縱較數開平方法算之得闊五又以六因之得三十即圓束之外周數也如圖甲乙丙丁戊己圓束減去中心一以六歸之則得甲庚辛一面三角尖堆形故用一面三角尖堆有積求邊法求得甲庚一邊以六因之而得外周也又法以圓束積九十一減一餘九十以十二乘之得一千零八十為長方積以六為長闊之較用帶縱較數開平方法算之得闊三十即圓束之外周數也此即圓束有外周求積之法而轉用之前法以外周加六與外周相乘十二除之再加一而得積此法則將積數減一餘用十二乘之以六為長闊之較用帶縱開方得闊而為外周也設如塹堵堆底五求積幾何法以底五自乘得二十五為底面積又以位數五加一得六與底面積二十五相乘得一百五十折半得七十五即塹堵堆之積也如圖甲乙丙丁戊塹堵堆即一面直角尖堆纍積之體也兩直角面相合成長方面形比原位數多一行而兩塹堵體相合成長方體形比原位數亦必多一面故以位數加一與底面積相乘所以增其一面之數成長方體形為塹堵堆之二倍折半而得塹堵堆之積也設如三角尖堆每邊五求積幾何法以每邊五加一得六與每邊五相乘得三十折半得十五為底面積再以每邊五加二得七與底面積十五相乘得一百零五三歸之得三十五即三角尖堆之積也如圖甲乙丙丁三角尖堆每面皆一面三角尖堆纍積成等邊三角體形其每邊之數即位數也試按位作點排之第一層為一第二層為三第三層為六第四層為十第五層為十五為每次按位相加之數如以位數加二與末數相乘取其三分之一即得總數見算法原本二卷第三十四節今以每邊加一與每邊之數相乘折半即得底面積再以位數加二為高與底面積相乘成平行面之三稜體是為三角尖體之三倍故以三除之而得也然必以位數加二為高者蓋以三三角尖體相湊乃成上下相等之平行面體其高必比原有之位數多二層兩相角面相合比原位數多一行今三三角體相合故必比原位數多二面也又以一平行面三稜體分為三三角尖體其二面為兩體所同用今以位數加二為高與底數相乘所以增其二面之分也又法以每邊五加一得六與每邊五相乘得三十為倍底積再以位數加二得七與倍底積三十相乘得二百一十六歸之亦得三十五為三角尖堆之積也此法與前法同蓋以每邊加一與每邊之數相乘則得底面積之二倍前法以位數加二與底數相乘既為三角尖堆積之三倍此法以位數加二與倍底積相乘即為三角尖堆積之六倍矣故以六歸之得積也又法以每邊五自乘再乘得一百二十五為第一數再以每邊五自乘得二十五為第二數又以每邊五加一得六與每邊五相乘得三十倍之得六十為第三數三數相加共得二百一十六歸之得三十五即三角尖堆之積也此法與第二法同蓋以每邊自乘再乘為第一數是未以每邊加一相乘亦未以位數加二再乘也因未以每邊加一相乘則其所成之正方形必比前所得之長少一層之數故又以每邊自乘為第二數也因未以位數加二再乘則其高必比前所得之高少二層之數故又以每邊加一與每邊相乘即如前之倍底積又倍之為第三數也三數相加始為三角尖堆積之六倍故以六歸之而得積也設如三角尖堆積一百二十求每邊幾何法以三角尖堆積一百二十六因之得七百二十為長方體積以一為長與闊之較以二為高與闊之較用帶兩縱不同較數開立方法算之得闊八即三角尖堆之每一邊也此法即三角尖堆有邊求積之法而轉用之蓋有邊求積則以每邊加一與每邊相乘又以每邊加二再乘得長方體積為三角尖堆積之六倍是長比闊多一高比闊多二今以三角尖堆積六因之得長方體積故用帶兩縱不同較數開立方法算之得闊為每邊之數也設如四角尖堆每邊五求積幾何法以每邊五加半得五個半與每邊五相乘得二十七個半又以每邊五加一得六與二十七個半相乘得一百六十五三歸之得五十五即四角尖堆之積數也如圖甲乙丙丁四角尖堆底面為正方傍四面皆一面三角尖堆纍積成方底四角尖體形其每邊之數即位數也試按位作點排之第一層為一第二層為四第三層為九第四層為十六第五層為二十五為每次按位自乘相加之數如以每邊加半與每邊相乘復以位數加一乘之取其三分之一即得總數見算法原本二卷第三十五節今以每邊加半與每邊相乘是得長方面積復以位數加一為高乘之是得長方體積為四角尖體之三倍故以三除之即得也然以邊數加半為長以位數加一為高者蓋以三四角尖體相湊乃成上下相等之長方體其底必比正方面多半行其高必比原有之位數多一層三角體以邊數加一與邊數相乘四角體以邊數加半與邊數相乘三角體以位數加二為高四角體以位數加一為高總以四角體比三角體底式大一倍故三角體為長方體六分之一四角體為長方體三分之一三角體加數幾何而此四角體皆用其半也又以一長方體分為三四角尖體其三面為兩體所同用而少一行之數試以甲乙丙丁四角尖體作為戊己庚辛陽馬尖體形為長方體三分之一所餘為三分之二其戊己庚戊庚辛兩面為兩體所同用而戊庚一行又為兩面所同用是此兩面為兩體所同用而少一行之數也又以其所餘三分之二平分之必有一面為兩體所同用是以長方體分為三四角尖體有三面為兩體所同用而少一行之數也今以每邊加半與每邊之數相乘又以位數加一乘之所以增其三面少一行之分也蓋其高既比原位數多一則其傍面一層宜為一面三角尖堆之倍數而其傍面只比每邊多半是傍面只為一面三角尖堆之數也又其高既比原位多一則其上面一層為每邊自乘之數即為一面三角尖堆之倍數而少一行共之為三面少一行之數也又法以每邊五自乘再乘得一百二十五為第一數再以每邊五自乘得二十五為第二數又以每邊五加一得六與每邊五相乘得三十折半得十五為第三數三數相加共得一百六十五三歸之得五十五即四角尖堆之積也此法與第一法同蓋以每邊自乘再乘為第一數是未以每邊加半與每邊相乘亦未以位數加一再乘也因未以位數加一再乘則其上層即少一每邊自乘之數故以每邊自乘為第二數也因未以每邊加半相乘則其傍面即少一面三角尖堆之數故以每邊加一與每邊相乘折半為第三數也三數相加始為四角尖堆積之三倍故以三歸之而得積也又法以每邊五加一得六與每邊五相乘得三十又以每邊五加二得七乘之得二百一十三歸之得七十為三角尖堆之倍積又以每邊五求得一面三角尖堆積十五與倍三角尖堆積七十相減亦得五十五為四角尖堆之積也如圖甲乙丙丁四角尖堆為戊己庚辛三角尖堆積之一倍而少一面之數蓋四角尖堆底面積為三角尖堆底面積之一倍而少一行故四角尖堆體積為三角尖堆體積之一倍而少一面是以求得倍三角尖堆積內減一面三角尖堆積即得四角尖堆積也又法以每邊五用塹堵堆求積法求得塹堵堆積七十五又以每邊五用三角尖堆求積法求得三角尖堆積三十五兩數相加得一百一十折半得五十五即四角尖堆之積也如圖甲乙丙丁四角尖堆先以乙丙一邊求得戊己庚辛壬塹堵堆積四角尖體為塹堵體三分之二三角尖體為塹堵體三分之一故又求得癸子丑寅三角尖堆積與塹堵堆積相加即與二方底四角尖堆之積等故折半而得四角尖堆之積也設如四角尖堆積二百零四求每邊幾何法以四角尖堆積二百零四三因之得六百一十二為長方體積以半為長與闊之較以一為高與闊之較用帶兩縱不同較數開立方法算之得闊八即四角尖堆之每一邊也此法即四角尖堆有邊求積之法而轉用之蓋四角尖堆有邊求積則以每邊加半與每邊相乘又以每邊加一再乘得長方體積為四角尖堆積之三倍是長比闊多半高比闊多一今以四角尖堆積三因之得長方體積故用帶兩縱不同較數開立方法算之得闊為每邊之數也設如長方堆底長九闊七上一行收頂求積幾何法以底闊七為方堆之底用四角尖堆有邊求積法求得四角尖堆積一百四十又以底闊七與長九相減餘二為兩一面三角尖堆即以底闊七用一面三角尖堆有邊求積法求得一面三角尖堆積二十八二因之得五十六為兩一面三角尖堆積與前所得四角尖堆積一百四十相加得一百九十六即長方堆之積也如圖甲乙丙丁戊長方堆丙丁長比乙丙闊多庚丁二試自己至庚截去二面則成甲乙丙庚一四角尖堆形己庚丁戊兩一面三角尖堆形其乙丙闊與丙庚等即四角尖堆之每一邊亦即一面三角尖堆之每一邊故以一邊求得四角尖堆積又求得兩一面三角尖堆積相加即得長方堆之積也又法以闊七與長九相減餘二折半得一又加半得一個半與長九相加得十個半與底闊七相乘得七十三個半又以底闊七即層數加一得八再乘得五百八十八三歸之得一百九十六即長方堆之積也此法與前法之理同如甲乙丙丁戊長方堆既分為一四角尖堆兩一面三角尖堆其甲乙丙庚四角尖堆固當以丙庚加半與乙丙相乘以甲乙加一再乘得一長方體形為一四角尖堆之三倍其己庚丁戊兩一面三角尖堆當以庚丁與乙丙相乘以戊丁同甲乙加一再乘得二長方面形為兩一面三角尖堆之二倍因一為三倍一為二倍其倍數不同故又以庚丁折半與庚丁相加即增其一長方面之分得三長方面形亦為兩一面三角尖堆之三倍故以三歸之得一四角尖堆兩一面三角尖堆合之與甲乙丙丁戊一長方堆之積相等也又法以底闊七與長九相減餘二再加一得三為頂上之長乃以底長九倍之得十八加頂長三得二十一與底闊七相乘得一百四十七再以高數七加一得八再乘闊數即高數也得一千一百七十六六歸之得一百九十六即長方堆之積也此法與第二法同蓋前法以長闊相減折半加半與長相加此法以長闊相減不折半加一與倍長相加則其長比前法多一倍闊與高皆與前數同而體積亦必比前數大一倍故前法用三歸此法用六歸也設如長方堆積二百七十六長比闊多二求每邊幾何法以長方堆積二百七十六三因之得八百二十八為長方體積以長比闊多二折半又加半得一個半與二相加得三個半為長與闊之較以一為高與闊之較用帶兩縱不同較數開立方法算之得闊八為底闊加長比闊多二得十為長也此法即長方堆有邊求積之法而轉用之蓋長方堆有邊求積則以原長闊之較折半又加半與原長相加乃與闊相乘又以闊加一再乘得長方體積為長方堆之三倍是長比闊多原長闊之較又多半較仍多半高比闊多一今以長方堆積三因之得長方體積故用帶兩縱不同較數開立方法算之得闊為底邊之闊加長闊之較得數為長也設如三角半堆底邊八上邊五求積幾何法以底邊八用三角尖堆有邊求積法求得三角尖堆全積一百二十又以上邊五減一得四為上虛三角尖堆之每邊亦用三角尖堆有邊求積法求得上虛三角尖堆積二十與先所得三角尖堆全積一百二十相減餘一百即三角半堆之積也如圖甲乙丙丁戊己三角半堆若於其上加一小三角尖堆則成一大三角尖堆形其上所加之小三角尖堆之每邊比三角半堆之上邊少一故先求得大三角尖堆全積又求得上虛小三角尖堆積相減即得三角半堆之積也又法以底邊八加一得九與底邊八相乘得七十二為第一數又以上邊五與底邊八相併得十三以上邊五加一得六乘之得七十八為第二數兩數相併得一百五十又以上邊五與下邊八相減餘三加一得四為層數與兩數相加之一百五十相乘得六百六歸之得一百為三角半堆之積也此法與等邊三角尖堆求積之法同蓋等邊三角尖堆其上尖一即上邊其每邊之數即底邊亦即層數其法以每邊加一與每邊相乘又以每邊加二再乘得長方體積為三角尖堆積之六倍分之則得長比高闊多一之一長方體形又得長比闊多一之二長方面形即上多二層若依此法以底邊加一與底邊相乘即長比闊多一之長方體之一面數也以上邊一與下邊相加又以上邊一加一得二乘之則得長比闊多一之二長方面之兩行數也此兩數相併以層數乘之則亦得長比高闊多一之一長方體形又得長比闊多一之二長方面形共成一長方體形為三角尖堆之六倍矣設如三角半堆積一百上邊五求底邊幾何法以上邊五減一餘四為上虛小三角尖堆之底用三角尖堆有邊求積法求得上虛三角尖堆積二十與半堆積一百相加得一百二十為等邊三角尖堆全積用三角尖堆有積求邊法求得每邊八即三角半堆之底邊也如有底邊求上邊者則以底邊求得三角尖堆全積與半堆積相減餘為上虛三角尖堆積求得上虛小三角尖堆之每邊加一即上邊也設如四角半堆底邊十二上邊五求積幾何法以底邊十二用四角尖堆有邊求積法求得四角尖堆全積六百五十又以上邊五減一得四為上虛四角尖堆之每邊亦用四角尖堆有邊求積法求得上虛四角尖堆積三十與先所得四角尖堆全積六百五十相減餘六百二十即四角半堆之積也如圖甲乙丙丁戊己庚四角半堆若於其上加一小四角尖堆則成一大四角尖堆形其上所加之小四角尖堆之每邊比四角半堆之上邊少一故求得大四角尖堆全積又求得上虛小四角尖堆積相減即得四角半堆之積也又法以上邊五自乘得二十五為第一數以底邊十二自乘得一百四十四為第二數以上邊五與底邊十二相乘得六十為第三數又以上邊五與底邊十二相減餘七折半得三個半為第四數四數相併得二百三十二個半又以上下邊相減所餘之七加一得八為層數與四數相併之二百三十二個半相乘得一千八百六十三歸之得六百二十即四角半堆之積也此法與等邊四角尖堆求積之法同蓋等邊四角尖堆其上尖一即上邊其每邊之數即底邊亦即層數其法以每邊加半與每邊相乘又以每邊加一再乘得長方體積為四角尖堆積之三倍分之則得每邊自乘再乘之一正方體形每邊自乘之一正方面形又得長比闊多一之半層長方面形若以底邊自乘即正方體之一面數也以上邊一與底邊相乘則得每邊自乘正方面之一行數也以上邊一自乘又以上邊一與底邊相減折半此兩數相併即得長比闊多一之半層長方面之一行數也四數相併再以層數乘之則亦得一正方體形一正方面形又得長比闊多一之半層長方面形共成一長方體形為四角尖堆之六倍矣又此法與上下不等正方體之法異者在多上下邊相減折半之一數因堆垜之傍面有餘分故也設如四角半堆積六百二十上邊五求底邊幾何法以上邊五減一餘四為上虛小四角尖堆之底用四角尖堆有邊求積法求得上虛四角尖堆積三十與半堆積六百二十相加得六百五十為等邊四角尖堆全積用四角尖堆有積求邊法求得每邊十二即四角半堆之底邊也如有底邊求上邊者則以底邊求得四角尖堆全積與半堆積相減餘為上虛四角尖堆積求得上虛小四角尖堆之每邊加一即上邊也設如長方半堆底長十二闊十上長八闊六求積幾何法以底長十二闊十用長方堆求積法求得長方堆全積四百九十五又以上長八闊六各減一得長七闊五為上虛長方堆之長闊亦用長方堆求積法求得上虛長方堆積八十五與先所得長方堆全積相減餘四百一十即長方半堆之積也如圖甲乙丙丁戊己庚長方半堆若於其上加一小長方堆則成上一行收頂之長方堆形其上所加之小長方堆之每邊比長方半堆之上邊少一故先求得長方堆全積又求得上虛小長方堆積相減即得長方半堆之積也又法以上長八與上闊六相乘得四十八為第一數以底長十二與底闊十相乘得一百二十為第二數以上長八與底闊十相乘得八十以上闊六與底長十二相乘得七十二兩數相併折半得七十六為第三數又以上下長相減餘四折半得二為第四數以此四數相加得二百四十六又以上長與底長相減所餘之四加一得五為層數與四數相加之二百四十六相乘得一千二百三十三歸之得四百一十即長方半堆之積也此法與四角半堆求積之法同蓋四角半堆長闊皆相等此則有長闊之不同故四角半堆以上邊自乘為第一數者此則以上長闊相乘為第一數四角半堆以下邊自乘為第二數者此則以下長闊相乘為第二數四角半堆以上下相乘為第三數者此則以上長與下闊相乘上闊與下長相乘相併折半為第三數四角半堆以上下相減折半為第四數者此則以上下長相減折半為第四數如以上下闊相減折半亦同其理皆相通也又法以上長八倍之得十六加下長十二得二十八以上闊六乘之得一百六十八又以下長十二倍之得二十四加上長八得三十二以下闊十乘之得三百二十又以下長十二與上長八相減餘四三數相加得四百九十二又以上下長相減所餘之四加一得五為層數與三數相加之四百九十二相乘得二千四百六十六歸之得四百一十即長方半堆之積也此法與第二法同蓋此法用數比前法大一倍故前法用三歸此法用六歸也又此法與上下不等長方體之法異者在多上下長相減之一數因堆垜之傍面有餘分故也又法以底闊十與長十二相乘得一百二十又以長十二闊十各減一得長十一闊九相乘得九十九又以長十一闊九各減一得長十闊八相乘得八十又以長十闊八各減一得長九闊七相乘得六十三再以長九闊七各減一得長八闊六即上長闊相乘得四十八以此五數相加共得四百一十即長方半堆之積也此法將每層長闊相乘得每層之積故總加之即五層之共積也法雖層纍相加實為顯而易見凡堆垜諸法皆可以此法御之若層數太多者用本法為簡易也設如長方半堆積四百一十上長八闊六求底長闊各幾何法以上長八闊六各減一得長七闊五為上虛小長方堆之長闊用長方堆有邊求積法求得上虛小長方堆積八十五與半堆積四百一十相加得四百九十五為長方堆全積用長方堆有積求邊法求得闊十長十二即長方半堆之底邊數也如有底邊長闊求上邊長闊者則以底邊求得長方堆全積與半堆積相減餘為上虛小長方堆積求得上虛小長方堆之長闊兩邊各加一即長方半堆上邊長闊之數也御製數理精藴下編卷三十
