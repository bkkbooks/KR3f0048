距之分故壬目與戊己即庚辛之比即同於戊庚即辛己與甲癸之比也三角度數測量度數測量必取資於儀器全圜儀半圜儀象限儀雖為體不同其為用則一以九十度為準以定表遊表為二視線其相距之度即為所測之角設如一塔不知其髙但知距塔之逺為三十丈欲測其高幾何法以儀器定凖墜線以定表看地平遊表看塔尖得兩表相距二十四度乃以二十四度與九十度相減餘六十六度為對所知之角其正弦九萬一千三百五十五為一率儀器上二十四度為對所求之角其正弦四萬零六百七十四為二率距塔之逺三十丈為所知之邊為三率求得四率十三丈三尺五寸七分加儀器之高即所求之塔之高也如圖甲乙為塔之高丙乙為距塔之逺儀器中心為丁丁丙為儀器中心距地之高丁戊為定表所對地平為庚丁己為遊表看塔尖甲得兩表距弧二十四度為己戊其正弦為己辛其餘弦為壬己與丁辛等象限九十度内減二十四度餘六十六度為癸己即甲角之正弧其正弦即壬己是以與壬己相等之丁辛與己辛之比同於丁庚與甲庚之比為相當比例四率既得甲庚加同丁丙高之庚乙得甲乙即塔之高也又法以半徑十萬為一率二十四度之切線四萬四千五百二十三為二率距塔之逺三十丈為三率求得四率十三丈三尺五寸七分加儀器之高即塔之高也如圖己戊弧為二十四度丁戊為半徑壬戊為二十四度之正切故丁戊與壬戊之比同於丁庚與甲庚之比為相當比例四率也設如一樹欲知其逺取一直角横量十五丈測之問得幾何法以儀器定遊表於九十度定表看樹對遊表立兩表竿取直橫量十五丈復安儀器於此以定表看原處遊表看樹得兩表相距六十度乃以六十度與九十度相減餘三十度為對所知之角其正弦五萬為一率儀器上六十度為對所求之角其正弦八萬六千六百零三為二率横量十五丈為所知之邊為三率求得四率二十五丈九尺八寸即所測之樹之逺也如圖甲為樹甲乙為距樹之逺乙為所定直角丙乙為横量十五丈丙為儀器中心丙丁為定表看原處乙丙戊為遊表看甲得兩表距弧六十度為戊丁其正弦為戊己餘弦為庚戊與丙己等象限九十度内減六十度餘三十度為辛戊即甲角之正弧其正弦即庚戊是以與庚戊相等之丙己與戊己之比同於丙乙與甲乙之比為相當比例四率也又法以半徑十萬為一率丙角六十度之正切十七萬三千二百零五為二率横量十五丈為三率求得四率二十五丈九尺八寸即所測之樹之逺也若求甲丙斜距則以半徑十萬為一率丙角六十度之正割二十萬為二率横量十五丈為三率求得四率三十丈即甲丙斜距之逺也如圖戊丁弧為六十度丙丁為半徑己丁為六十度之正切己丙為六十度之正割故丙丁與己丁之比同於丙乙與甲乙之比又丙丁與己丙之比同於丙乙與甲丙之比俱各為相當比例四率也設如一山欲知其高用重測之法測之退步十丈問山之高得幾何法先安儀器定準墜線以定表看地平遊表看山頂得兩表相距五十度又退行十丈復安儀器定準墜線以定表仍看前儀器定表所看地平原處仍以遊表看山頂得兩表相距四十度乃以前儀器所得五十度内減後儀器所得四十度餘十度為對所知之角其正弦一萬七千三百六十五為一率後儀器所得四十度為對所求之角其正弦六萬四千二百七十九為二率退行十丈為所知之邊為三率求得四率三十七丈零一寸為前儀器中心至山頂之斜距次以山頂垂線與地平所成直角為對所知之角其正弦即半徑十萬為一率前儀器所得五十度為對所求之角其正弦七萬六千六百零四為二率前儀器中心至山頂之斜距三十七丈零一寸為所知之邊為三率求得四率二十八丈三尺五寸即所測之山之高也如圖甲乙為山之高丙丁為退行十丈前測得丙角五十度後測得丁角四十度而丙角為甲丙丁三角形之外角與丁甲二内角相併之度等解見三角形邊線角度相求巻中故丙角五十度内減丁角四十度餘十度即甲丙丁三角形之甲角故先用甲丙丁鈍角三角形求甲丙邊既得甲丙邊然後用甲乙丙直角三角形求甲乙邊為山之高也又法以前測所得五十度之餘切八萬三千九百一十與後測所得四十度之餘切十一萬九千一百七十五相減餘三萬五千二百六十五為一率半徑十萬為二率退行十丈為三率求得四率二十八丈三尺五寸即所求之山之高也如圖戊己為丙角之餘切即丙甲乙角之正切與壬癸等庚辛為丁角之餘切即丁甲乙角之正切與子癸等子壬即兩餘切之較甲癸與戊丙及庚丁俱同為半徑甲癸壬三角形與甲乙丙三角形為同式形而甲癸子三角形與甲乙丁三角形為同式形故甲壬子三角形與甲丙丁三角形亦為同式形是以子壬與甲癸之比同於丁丙與甲乙之比而為相當比例四率也設如人在山上欲測山之高但知山前有二樹與山參直二樹相距十八丈問山之高得幾何法於山頂安儀器定準墜線以定表向空中取一平線先以遊表看逺樹得遊表距垂線四十九度次以遊表看近樹得遊表距垂線三十八度乃以所得兩數相減餘十一度為對所知之角其正弦一萬九千零八十一為一率以看逺樹所得之四十九度與九十度相減餘四十一度為對所求之角其正弦六萬五千六百零六為二率二樹相距十八丈為三率求得四率六十一丈八尺九寸為近樹距山頂之斜距次以山頂垂線與地平所成直角為對所知之角其正弦即半徑十萬為一率以看近樹所得之三十八度與九十度相減餘五十二度為對所求之角其正弦七萬八千八百零一為二率近樹距山頂之斜距六十一丈八尺九寸為所知之邊為三率求得四率四十八丈七尺七寸即所測之山之高也如圖甲