body:
  text: 欽定四庫全書御製數理精藴下編卷十八面部八測量勾股測量三角測量測量周髀曰偃矩以窺髙覆矩以測深卧矩以知逺蓋以矩度或表杆相度窺測立者則取其直平者則取其方必使成直角以大小勾股為比例以在器之勾股比所測之勾股彼此相形而得之者也然勾股必為直角而三角形則惟變所適而無定形要以角度為準而用割圜八線以為比例凡求角求邊皆以三角形之法為本總以對所知為一率對所求為二率所知為三率得四率即所求也或一測或屢測惟在隨時而致用或用正或用餘惟在比例之相當不特凡物之髙深廣逺可得而推即七政之躔度天地之形體俱可得而測也勾股測量凡用矩度或立表杆必用垂線取其與地平成直角以為準則若地不平須記取某處與人目所看相平為記設如有一旗杆欲測其髙但知距旗杆之逺為三丈問得髙幾何法用矩度矩度之制必用正方每邊定一百分或二百分横𥪡俱界線畫成小方分自中心所出線俱平分每邊一半對中心所出線兩邉安定表取中心安遊表看分數必以其自中心所出線為準見幾何原本十二卷定準墜線以定表看地平遊表看旗杆頂得距地平分四十分此矩度前邊為百分自中心平分半邊為五十分乃以中心平分距分五十分為一率所得距分四十分為二率距旗杆之逺三丈為三率求得四率二丈四尺即矩度中心定表所對地平至旗杆頂之髙加矩度中心距地之髙四尺共得二丈八尺即所求旗杆之髙也如圖甲乙為旗杆之髙丙乙為距旗杆之逺丁為矩度中心丁丙為矩度中心距地之高己庚為定表所對地平為戊辛壬為遊表看旗杆頂甲其丁庚為矩度中心平分距分五十分壬庚為遊表距地平分四十分其丁庚與壬庚之比同於丁戊與甲戊之比故丁庚五十分為一率壬庚四十分為二率丁戊距旗杆之逺三丈為三率得四率甲戊二丈四尺加同丁丙高之戊乙四尺即得甲乙二丈八尺為旗杆之高也又用表杆測法於距旗杆三丈處立一表高四尺向前又立一表高八尺看二表端與旗杆頂齊量二表間相距得五尺乃以五尺為一率前表八尺内減後表四尺餘四尺為二率距旗杆之逺三丈為三率求得四率二丈四尺加入後表高四尺得二丈八尺即旗杆之高也如圖甲乙為旗杆之高乙丙為距旗杆之逺三丈丁丙為後表之髙四尺戊己為前表之高八尺丙己為二表之距五尺戊庚為二表之較四尺丁戊甲為人目視線試與乙丙平行作辛丁線遂成甲辛丁戊庚丁兩勾股形為同式形故丁庚與戊庚之比同於丁辛與甲辛之比既得甲辛加與丁丙相等之辛乙即得甲乙為旗杆之高也設如一樹欲測其逺爰取一直角横量十五丈問得逺幾何法以矩度定表與遊表定準直角以定表對樹遊表隨直角立表杆二三處横量十五丈於此處復安矩度以定表對所立表杆取直看原處以遊表看樹得距矩度中心平分線距分三十分乃以所得距分三十分為一率矩度中心平分距分五十分為二率横量十五丈為三率求得四率二十五丈即離樹之逺也如圖甲為樹甲乙為離樹之逺乙為直角乙丙為横量十五丈丁戊為所立二表杆丙為矩度中心丙己為矩度中心平分距分五十分己庚為所得距分三十分丙己庚勾股形與甲乙丙勾股形為同式形故己庚與己丙之比即同於丙乙與甲乙之比也又用表杆測法先立一表於乙取直角横量十五丈至丙次立一表於丙自丙對甲相直復立一表於丁次依丁丙度引至乙丙線上截乙丙於戊乃以丙戊折半於己遂得丁己丙勾股形與甲乙丙勾股形為同式形因量丙己得三丈為一率丁己得五丈為二率丙乙十五丈為三率求得四率二十五丈即甲乙之逺也設如有山一座欲知其高用重矩之法測之問山之高得幾何法用矩度定準墜線以定表看地平遊表看山頂得距地平分四十分又向後量九丈復安矩度定準墜線以定表仍看前矩度定表所看地平原處遊表看山頂得距地平分三十二分乃以前矩度距地平分四十分為一率中心平分距分五十分為二率後矩度距地平分三十二分為三率求得四率四十分為前矩度遊表與後矩度遊表同距地平分所得之中心距分乃以所得四十分與後矩度中心平分距分五十分相減餘十分為一率後矩度距地平分三十二分為二率向後量九丈為三率求得四率二十八丈八尺即矩度中心定表所對地平至山頂之高加矩度中心距地之高四尺共得二十九丈二尺即所求之山之髙也如圖甲乙為山之高丙為前矩度中心丙庚為定表所對地平為戊丙己為遊表看山頂甲其己庚為遊表距地平分四十分丙庚為中心平分距分五十分丙丁為向後量九丈丁為後矩度中心丁壬為定表所對地平亦為戊丁辛為遊表看山頂甲其辛壬為遊表距地平分三十二分丁壬為中心平分距分五十分試依後矩度遊表距地平分辛壬度於前矩度作癸子線則丙子中心距分必小於丙庚故己庚與丙庚之比同於癸子與丙子之比而得丙子之分既得丙子則以丙子與丁壬相減餘丁丑與前矩度子庚等即前後兩矩度遊表同距地平分所得中心距分之較乃自辛至丑作辛丑線遂成辛壬丑勾股形與癸子丙同度俱與甲戊丙勾股形為同式形而辛壬丁勾股形又與甲戊丁勾股形為同式形且丁丙與丁丑皆為兩勾股形之各股之較故辛丑丁三角形與甲丙丁三角形亦為同式形是以丁丑與辛壬之比同於丁丙與甲戊之比而為相當比例四率也又法用矩度定準墜線以定表看地平遊表看山頂向後量九丈復安矩度定準墜線以定表仍看前矩度定表所看地平原處遊表看山頂得距地平分三十二分其中心平分距分為五十分爰察前矩度距地平分三十二分處得距中心距分為四十分乃以所得四十分與後矩度中心平分距分五十分相減餘十分為一率距地平分三十二分為二率向後量九丈為三率求得四率二十八丈八尺即矩度中心定表所對地平至山頂之高加矩度中心距地之高四尺共得二十九丈二尺即所求之山之高也如圖甲乙為山之高丙為前矩度中心定表所對地平為戊遊表看山頂甲丙丁為向後量九丈丁為後矩度中心其辛壬為遊表距地平分三十二分丁壬為中心平分距分五十分試依後矩度距地平分三十二分辛壬度於前矩度三十二分處作己庚線其丙庚距中心距分得四十分乃以丙庚四十分截後矩度丁壬中心平分距分於癸則丁癸為減餘十分其丁癸與辛壬之比即同於丁丙與甲戊之比也前法兩矩度遊表距地平分不同故用比例四率而得其距地平相等之中心距分以取其兩中心距分之較此法因取其距地平相等之分故其兩中心距分不同相減即得其兩中心距分之較也設如一牆欲知其逺用重矩之法測之問牆之逺得幾何法用矩度定凖墜線以定表看地平遊表看牆頂得距地平分四十分又向後量一丈復安矩度定凖墜線以定表仍看前矩度定表所看地平原處遊表看牆頂得距地平分二十四分乃以前矩度距地平分四十分為一率中心平分距分五十分為二率後矩度距地平分二十四分為三率求得四率三十分為前矩度遊表與後矩度遊表同距地平分所得之中心距分乃以所得三十分與後矩度中心平分距分五十分相減餘二十分為一率前矩度所得中心距分三十分為二率向後量一丈為三率求得四率一丈五尺即前矩度距牆之逺若求後矩度距牆之逺則以後矩度中心平分距分五十分為二率所得四率二丈五尺即後矩度距牆之逺也如圖甲乙為牆之高丙為前矩度中心丙庚為定表所對地平為戊丙己為遊表看牆頂甲其己庚為遊表距地平分四十分丙庚為中心平分距分五十分丙丁為向後量一丈丁為後矩度中心丁壬為定表所對地平亦為戊丁辛為遊表看牆頂甲其辛壬為遊表距地平分二十四分丁壬為中心平分距分五十分試依後矩度遊表距地平分辛壬度於前矩度作癸子線則丙子中心距分必小於丙庚故己庚與丙庚之比同於癸子與丙子之比而得丙子之分既得丙子則以丙子與丁壬相減餘丁丑與前矩度子庚等即前後兩矩度遊表同距地平分所得中心距分之較乃自辛至丑作辛丑線遂成辛壬丑勾股形與癸子丙同度俱與甲戊丙勾股形為同式形而辛壬丁勾股形又與甲戊丁勾股形為同式形且丁丙與丁丑皆為兩勾股形之各股之較故辛丑丁三角形與甲丙丁三角形亦為同式形是以丁丑與丑壬之比同於丁丙與丙戊之比又丁丑與丁壬之比亦同於丁丙與丁戊之比也又法用矩度定凖墜線以定表看地平遊表看牆頂向後量一丈復安矩度定凖墜線以定表對前矩度中心遊表看牆頂得距地平分二十四分其中心平分距分為五十分爰察前矩度距地平分二十四分處得距中心距分為三十分乃以所得三十分與後矩度中心平分距分五十分相減餘二十分為一率前矩度中心距分三十分為二率向後量一丈為三率求得四率一丈五尺即前矩度距牆之逺若求後矩度距牆之逺則以後矩度中心平分距分五十分為二率所得四率二丈五尺即後矩度距牆之逺也如圖甲乙為牆之高丙為前矩度中心定表所對地平為戊遊表看牆頂甲丙丁為向後量一丈丁為後矩度中心其辛壬為遊表距地平分二十四分丁壬為中心平分距分五十分試依後矩度距地平分二十四分辛壬度於前矩度二十四分處作己庚線其丙庚距中心距分得三十分乃以丙庚三十分截後矩度丁壬中心平分距分於癸則丁癸為減餘二十分其丁癸與癸壬之比同於丁丙與丙戊之比又丁癸與丁壬之比亦同於丁丙與丁戊之比也設如一石欲知其逺不取直角於左右兩處横量三十九丈測之問兩處各距石幾何法先平安矩度於右以定表看左矩度之中心遊表看石得距矩度中心距分三十七分五釐其遊表之斜距分為六十二分五釐次平安矩度於左以定表看右矩度之中心遊表看石得距矩度中心距分十一分二釐五豪其遊表之斜距分為五十一分二釐五豪乃以所得兩距分相併得四十八分七釐五豪為一率右矩度所得之遊表斜距分六十二分五釐為二率横量三十九丈為三率求得四率五十丈為右矩度距石之逺若求左矩度距石之逺則仍以兩距分相併為一率左矩度所得之遊表斜距分五十一分二釐五豪為二率橫量三十九丈為三率求得四率四十一丈為左矩度距石之逺也如圖甲為石乙為右矩度中心其丁戊為距分三十七分五釐戊乙為遊表斜距分六十二分五釐乙丙為横量三十九丈丙為左矩度中心其己庚為距分十一分二釐五豪己丙為遊表斜距分五十一分二釐五豪試自甲角至乙丙線作甲辛垂線分為兩勾股形則丁戊乙勾股形與甲辛乙勾股形為同式形已庚丙勾股形與甲辛丙勾股形為同式形而乙丙即為兩勾之和故以丁戊與己庚兩勾相併與戊乙之比同於乙丙與甲乙之比又丁戊與己庚兩勾相併與己丙之比同於乙丙與甲丙之比俱為相當比例四率也設如隔河一樹欲測其逺不能定直角爰取兩處俱斜對樹横量十七丈測之問離樹之逺得幾何法先平安矩度於一處隨定表横量十七丈復安一矩度若止用一矩度則記凖一處亦可以先安矩度定表看後安矩度中心遊表看樹得距矩度中心距分四十九分其遊表之斜距分為七十分次以後安矩度定表看先安矩度中心遊表看樹得距矩度中心距分十五分其遊表之斜距分為五十二分二釐乃以先安矩度之中心距分四十九分與後安矩度之中心距分十五分相減餘三十四分