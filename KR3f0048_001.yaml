body:
  text: 欽定四庫全書御製數理精蘊上編卷一數理本原河圖洛書周髀經解數理本原粵稽上古河出圖洛出書八卦是生九疇是敘數學亦於是乎肇焉蓋圖書應天地之瑞因聖人而始出數學窮萬物之理自聖人而得明也昔黃帝命𨽻首作算九章之義已啓堯命羲和治厯敬授人時而歲功已成周官以六藝教士數居其一周髀商高之説可考也秦漢而後代不乏人如洛下閎張衡劉焯祖沖之之徒各有著述唐宋設明經算學科其書頒在學宮令博士弟子肄習是知算數之學實格物致知之要務也故論其數設為幾何之分而立相求之法加減乘除凡多寡輕重貴賤盈朒無遺數也論其理設為幾何之形而明所以立算之故比例分合凡方圓大小逺近高深無遺理也溯其本原加減實出於河圖乘除殆出於洛書一奇一偶對待相資遞加遞減而繁衍不窮焉奇偶各分縱橫相配互乘互除而變通不滯焉徵其實用測天地之高深審日月之交會察四時之節候較晝夜之短長以至協律度同量衡通食貨便營作皆賴之以為統紀焉今匯集成編以類相從提點線面體以為綱分和較順逆以為目法無論巨細惟擇其善者由淺以及深執簡以御繁使理與數協務有裨於天下國家以傳於億萬世云爾易繫辭曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合朱子曰河圖以五生數統五成數而同處其方蓋揭其全以示人而道其常數之體也考其數始於一中於五終於十陽奇隂偶而數之加減由是生焉自一而二自二而三自三而四自四而五皆遞加一以相生自五復加一而成六六加一而七七加一而八八加一而九九加一而十十則仍歸於一故至十而天地之數全矣天數陽也地數陰也言天地即所以言陰陽也五位相得而各有合以五行之序而定位也邵子曰天之陽在南而陰在北地之陰在南而陽在北故河圖之數一陽位於北二陰位於南其即五行質具於地之義而言之歟今以陰陽相生之數論之一為陽天一生水而位北一加一為二為陰地二生火而位南二加一為三為陽天三生木而位東三加一為四為陰地四生金而位西四加一為五為陽天五生土而位中至五而五行之數已周此生數之極也自一至五則五又為一體矣於是以五為中數而復加一則為六六陰也因五中數與一相加故與一同位而屬之水焉六加一為七以中數五計之實加二故與二同位而屬之火焉七加一為八以中數五計之實加三故與三同位而屬之木焉八加一為九以中數五計之實加四故與四同位而屬之金焉九加一為十以中數五計之復加五故與五同位而屬之土焉至十而五行之數再周天地之數已備此成數之極也以陰陽運行之序論之以五生數統十成數位居於中而奇數則始於北一次東三次南七次西九偶數則始於南二次西四次北六次東八此數之陰與陰陽與陽各從其類者也以奇偶相得之數論之一與六合二與七合三與八合四與九合五與十合此又奇偶相得而各有合者也邵子謂圓者河圖之數又曰厯紀之數其肇於此然則所謂數者即一陰一陽一奇一偶循環無間表裡相維百千萬億總由此推之以成其變化河圖者豈非天地自然生成之數也哉洛書之數戴九履一左三右七二四為肩八六為足五居其中朱子謂以五奇數統四偶數而各居其所蓋主於陽以統陰而肇其變數之用也邵子曰數學雖多乘除盡之矣夫洛書者數之源也乘除之所以生也易説卦傳曰參天兩地而倚數三天數也二地數也天地相合而萬物育焉一者太極之體其數不行故數行於二三起於三以三參之則三九七一之數生焉起於二以二兩之則二四八六之數生焉其序列之位則天居四正取以陽統陰之義地居四維取以陰從陽之義其三九七一乘數則旋而左除數則返而右也其二四八六乘數則旋而右除數則返而左也二三相合而為五五則無對居中者立其體也二五相合而為十十仍歸一洛書不用者藏其用也是故三始於東方發生之地而位於左自東而南三而三之是為九故戴九自南而西九而三之為二十七去成數餘七故右七自西而北七而三之為二十一去成數餘一故履一奇數左旋以三參之即天道左行之説也如轉而右行以三除之仍復其原數焉二立於西南二陰始生之地而位於右肩自西南而東南二而二之是為四位於左肩自東南而東北四而二之為八位於左足自東北而西北八而二之為十六去十餘六位於右足偶數右旋以二兩之即地道右行之説也如轉而左行以二除之仍復其原數焉此乘除之數見於運行者如此若以對待者觀之一與九對一為數之始九為數之終互乘互除其數不變也二與八對二八互乘俱得十六二除十六得八八除十六仍得二此二與八之相倚也三與七對三七互乘皆二十一三除二十一得七七除二十一仍得三此三與七之相倚也四與六對四六互乘皆二十四四除二十四得六六除二十四仍得四此四與六之相倚也至五為二三之合天地之交陰陽之會位於洛書之中以建人極配上下而為三才故斜直四圍皆得十五合之得四十有五為九五之數要之運行者其序也對待者其位也進退循環縱橫交錯總不外於乘除故曰乘除之本原自洛書生也周髀經解數學之失傳久矣漢晉以來所存幾如一線其後祖沖之郭守敬輩殫心象數立密率消長之法以為習算入門之規然其法以有盡度無盡止言天行未及地體是以測之有變更度之多盈縮蓋有未盡之餘蘊也明萬厯間西洋人始入中土其中一二習算數者如利瑪竇穆尼閣等著為幾何原本同文算指諸書大體雖具實未闡明理數之精微及我朝定鼎以來遠人慕化至者漸多有湯若望南懷仁安多閔明我相繼治理厯法間明算學而度數之理漸加詳備然詢其所自皆云本中土所流傳粵稽古聖堯之欽明舜之濬哲厯象授時閏餘定歲璿璣玉衡以齊七政推步之學孰大於是至於三代盛時聲教四訖重譯向風則書籍流傳於海外者殆不一矣周末疇人子弟失官分散嗣經秦火中原之典章既多缺佚而海外之支流反得真傳此西學之所以有本也古算書存者獨有周髀周公商高問答其本文也榮方陳子以下所推衍也而漢張衡蔡雍以為術數雖存考驗天狀多所違失按榮方陳子始言晷度衡雍所疑或在於是若周髀本文辭簡而意該理精而用博實言數者所不能外其圓方矩度之規推測分合之用莫不與西法相為表裏然則商高一篇誠成周六藝之遺文而非後人所能假託也舊注義多舛訛今悉詳正辨於算書之首以明數學之宗使學者知中外本無二理焉爾昔者周公問於商高曰竊聞乎大夫善數也請問古者包犧立周天厯度周天厯度者分周天三百六十度為推求厯日之用也按通鑑載包犧作甲厯天干地支相配六甲一轉天度一周年以是紀而歲功成月以是紀而朔望定晝夜以是紀而時日分易大傳言包犧仰以觀於天文俯以察於地理其觀察之時必有度數以紀其法象則厯度始於包犧無疑矣夫天不可階而升地不可將尺寸而度請問數從安出天之高明地之博厚非人力所能及其厯度之數不知從何而得也商高曰數之法出於圓方萬物之象不出圓方萬象之數不離圓方河圖者方之象也洛書者圓之象也太極者圓之體奇也四象者方之體偶也奇數天也偶數地也有天地而萬物於是乎生有圓方而萬象於是乎定有奇偶而萬數於是乎立矣圓出於方以數而論出於圓方以圓方而論則圓出於方蓋方易度而圓難測方有盡而圓無盡故推圓者以方度之以有盡而度無盡也是以圓周內弦外切屢求勾股為無數多邊形以切近圓界將合而為一而圓周始得故曰圓出於方也方出於矩孟子曰不以規矩不能成方圓夫規所以成圓而矩所以成方也故凡方形必出於二矩相合如矩之二股均者合之即為正方矩之二股一大一小者合之則為長方蓋因矩之為形其角直其線正所以能成方體此又直內方外之理故曰方出於矩也矩出於九九八十一度圓方者遞歸於矩而矩之形總不外乎二數相乘九九者數之終而一一乃數之始言九九而不及他數者以九九之內他數俱該也是以一一為一二二為四三三為九四四為一十六五五為二十五六六為三十六七七為四十九八八為六十四九九為八十一乃矩之二股均平所成之正方也一二為二一三為三一四為四一五為五一六為六一七為七一八為八一九為九形雖未方而其理猶存也二三為六二四為八二五一十二六一十二二七一十四二八一十六二九一十八三四一十二三五一十五三六一十八三七二十一三八二十四三九二十七四五二十四六二十四四七二十八四八三十二四九三十六五六三十五七三十五五八四十五九四十五六七四十二六八四十八六九五十四七八五十六七九六十三八九七十二乃矩之一股小一股大所成之長方也至於一百之類雖為正方乃十之相乘十則仍歸於一也又如八十四九十六之類乃六七四十二六八四十八之倍不得自立為數之本又或十一十三十七十九之類十一為二五一十之奇十三為二六一十二之奇十七為四四一十六之奇不得成正方亦不得成長方故不入九九之數也是以九九之數為方之本而方之形必合以矩故曰矩出於九九八十一也故折矩以為勾廣三股修四徑隅五前言圓方之形此言勾股生成之正數也以二矩合之既為方形今以一矩折之則為一方之兩邊是以折矩之橫者為勾之廣折矩之縱者為股之長於勾股之末以科弦連之是為徑隅徑直也隅角也言自兩角相對直連之也勾之廣必三股之修必四而徑隅始得五此乃自然生成之正分也易曰參天兩地而倚數天數一參之則為三地數二兩之則為四三二合之則為五此又勾三股四弦五之正義也既方其外半其一矩此言勾股之面積也勾股以弦連之不得為方形必再合一矩乃為一長方所謂方其外者言弦之外復加一矩以成方也勾三股四相乘得一十有二即為兩矩合成之數半之得六乃勾股之面積所謂半其一矩者也環而共盤得成三四五此言勾股弦相和之數也環而共盤者環繞盤旋於勾股弦之周圍得成三四五共之為一十有二乃三數相和之總數也兩矩共長二十有五是為積矩此言勾股相求之法也兩矩者勾與股也其所以相求者以勾股弦各面積彼此加減以立法也勾三自乘為九股四自乘為一十有六合而計之為二十有五是勾股各自乘之積相併而與弦自乘之積等故曰積矩也弦之自乘積內減勾自乘之積得股自乘之積弦之自乘積內減股自乘之積得勾自乘之積故為勾股弦相求之法也故禹之所以治天下者此數之所由生也言禹之平成之功昭垂萬古揆厥所以奏績者必藉勾股以審高下始得順水之性而告厥成功也然則禹之所以治水者非此勾股之數所由生乎周公曰大哉言數請問用矩之道商高曰平矩以正繩此言用矩立法必以正且直也平矩以正繩有兩義平置其矩使矩之角直以此直角之一股或橫或平橫以度遠平以度高復自一股引繩以度其分則此分為我所知故以所知推所不知此繩引長時必使與直角對正不論其分之幾何引之亦必令直方能得測度之準故為平矩以正繩又平者均平整齊之謂用矩之道矩之角正即直角之説也然後二股得直以之測高測遠乃得度其大小之分此矩既正而所測之度亦正矣孟子曰規矩準繩以為方圓平直繩者即準之之意規矩所以度圓方而準繩所以考平直故準之以平繩之以直始得立法之精微故曰平矩以正繩也偃矩以望高此用矩測高之法也偃者仰也仰矩方可測高矩之一股植立在前一股定平在下然後比例推之蓋平股與立股之比即所知之遠與所測之高之比也故仰測之而得高覆矩以測深此用矩測深之法也覆者俯也俯矩方可測深矩之一股立者在前一股平者在上平股與立股之比即所知之遠與所測之深之比也故俯測之而得深臥矩以知遠此用矩測遠之法也臥者平也平矩方可測逺以矩之一股為橫向內一股為縱向前是以橫與縱之比即所知之度與所求之遠之比也故平測之而得遠環矩以為圓此用矩為圓之法也以矩之一端為樞一端旋轉為圓則成一圜環矩者即旋規之説也合矩以為方此用矩為方之法也矩二股也兩矩相合乃成一方即前方出於矩之説也方屬地圓屬天天圓地方前言用矩以測高深廣遠復用矩以為圓方此以圓方屬之天地者非以形體言蓋以陰陽動靜之理言也樂記云著不息者天也著不動者地也不息故運而不積圓之象也不動故靜而有常方之理也且圓之數無盡而方之數有盡天不可階而升測天者恆於地上度之是仍以方度圓也凡數之不盡者必奇數之可盡者必偶是以陽為奇陰為偶此方圓之理數所以屬乎天地也方數為典以方出圓典則也言圓之數奇零不盡不可為則故惟方數可為典則以方出圓者以方之形度圓之分從方數中生出圓數即前圓出於方之説也如圓徑求積則以徑自乘之為正方形而以方率圓率比例推之即得圓積是皆以方出圓之理也笠以寫天天青黑地黃赤天數之為笠也青黑為表丹黃為裏以象天地之位此即儀象以表天地之形色也笠形圓故以象天寫象也青黑天之色黃赤地之色天數之為笠形則以青黑為表丹黃為裏以象天地之位蓋取天包地之象也是故知地者智知天者聖智出於勾勾出於矩夫矩之於數其裁制萬物惟所為耳天地之高深廣遠非聖智不能知然聖智非由理之自然亦不能無所憑藉而知也故明勾股之數即可以知地而為智知地之數即可因地以知天而為聖矣故曰智出於勾也然勾股之形又賴矩以成故矩為勾股之本而天地之高深廣遠皆賴矩以測况萬物之大小巨細豈能外於矩之度分乎故矩之於數其裁制萬物惟其所為而無不可也周公曰善哉以周公之聖而與之曰善哉則其得數之本立法之妙可謂至矣至是而周髀之義盡矣御製數理精蘊上編卷一
