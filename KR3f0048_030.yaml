body:
  text: 欽定四庫全書御製數理精藴下編卷二十五體部三各體形總論直線體各體形總論體之為形成於面面之相合為厚角故凡體形皆自厚角所合而生面之所合不能成厚角則體亦不能成形惟渾圓則無角然求積之法亦合衆尖體而成渾圓是雖無角而實賴於角也方體有正方斜方尖方方環陽馬塹堵之異圓體則有渾圓長圓尖圓之殊至於各等面體惟成於三角四角五角之面而兼盡乎方圓之理函於圓者其角切於球之外面函圓者球之外面切於各面之中心而各體又有互相容之妙因其各面皆等故其中心至每邊之線皆同就其各形而分視之則成各等邊面形因其各形而細剖之則成各同底尖體形然求積總以勾股為準則蓋體成於面面生於線理固然也有積求邊則必以方圓為比例是以邊線等者體積不等如圓球徑與各等面體之一邊俱設為一則正方體積為一圓球體積為五二三五九八七七五四面體積為一一七八五一一二九八面體積為四七一四四五二一十二面體積為七六六三一一八九三二十面體積為二一八一六九四九六九此各形之體積皆以方積比例者也或以圓球體積設為一則圓球徑得一二四小餘七九八如圓球徑與各等面體之一邊俱設為一二四小餘七九八則圓球體積為一正方體積為一九九八五九三一七四面體積為二二五七九七七八面體積為九三一六三一七十二面體積為一四六三五四七九五一二十面體積為四一六六七三四六三此各形之體積皆以球積比例者也蓋因各形之邊線相等體積不同故皆定為體與體之比例也體積等者邊線不等如圓球體積與各等面體積俱設為一則正方體之每邊為一而圓球徑為一二四七九八四面體之每邊為二三九六四八九八面體之每邊為一二八四八九八二九十二面體之每邊為五七二二二七二十面體之每邊為七七一二五三四此各形之邊線皆以方邊比例者也或以圓球徑設為一則圓球體積為五二三五九八七七五五九八二九八八七三七一九二三如圓球體積與各等面體積俱設為五二三五九八七七五五九八二九八八七三七一九二三則圓球徑為一正方體之每邊為八五九九五九七四面體之每邊為一六四三九四八八一八面體之每邊為一三五六二二八五十二面體之每邊為四八八一八九五二十面體之每邊為六二一四四三三二此各形之邊線皆以球徑比例者也蓋因各形之體積相等邊線不同故皆定為線與線之比例也要之邊求積者亦皆本於勾股而積求邊者一皆歸之正方此方所以為立法之原入算之本也直線體設如正方體每邊二尺今將其積倍之問得方邊幾何法以每邊二尺自乘再乘得八尺倍之得一十六尺開立方得二尺五寸一分有餘即所求之方邊數也如圖甲乙丙丁正方體每邊二尺其體積八尺倍之得一十六尺即如戊己庚辛正方體積每邊得二尺五寸一分有餘試於戊己庚辛正方體形內作甲乙丙丁正方體形則其外之戊己乙甲壬丁丙庚辛癸磬折體形即與甲乙丙丁正方體積相等也設如正方體每邊二尺今將其積八倍之問得方邊幾何法以每邊二尺倍之得四尺即所求之方邊數也如圖甲乙丙丁正方體每邊二尺其體積八尺八倍之得六十四尺即如戊己庚辛正方體積其每邊得甲乙丙丁正方形每邊之二倍是故不用八倍其積開立方止以每邊二尺倍之而即得也此法蓋因兩體積之比例比之兩界之比例為連比例隔二位相加之比例見幾何原本十卷第四節故戊己庚辛正方體積六十四尺與甲乙丙丁正方體積之八尺相比為八分之一而戊己庚辛正方邊之四尺與甲乙丙丁正方邊之二尺之比為二分之一夫六十四與三十二三十二與十六十六與八八與四四與二皆為二分之一之連比例而六十四與八之比其間隔三十二與十六之兩位故為連比例隔二位相加之比例也設如長方體長一尺二寸闊八寸高四寸今將其積倍之仍與原形為同式形問得長闊高各幾何法以長一尺二寸自乘再乘得一尺七百二十八寸倍之得三尺四百五十六寸開立方得一尺五寸一分一釐有餘即所求之長既得長乃以原長一尺二寸為一率原闊八寸為二率今所得之長一尺五寸一分一釐有餘為三率求得四率一尺零七釐有餘即所求之闊也又以原長一尺二寸為一率原高四寸為二率今所得之長一尺五寸一分一釐有餘為三率求得四率五寸零三釐有餘即所求之高也或以闊八寸自乘再乘倍之開立方亦得一尺零七釐有餘為所求之闊以高四寸自乘再乘倍之開立方亦得五寸零三釐有餘為所求之高也如圖甲乙丙丁長方體甲乙高四寸丁戊闊八寸甲戊長一尺二寸將其積倍之即如己庚辛壬長方體此兩長方體積之比例即同於其相當二界各作兩正方體積之比例見幾何原本十卷第五節故依甲乙丙丁長方體之甲戊長界作甲戊丑子正方體將其積倍之即如己庚辛壬長方體之己癸長界所作之己癸卯寅正方體故開立方得己癸為所求之長也既得己癸之長則以甲戊與丁戊之比即同於己癸與壬癸之比得壬癸為所求之闊又甲戊與甲乙之比同於己癸與己庚之比得己庚為所求之高也若以原闊自乘再乘倍之開立方亦得一尺零七釐有餘為今所求之闊原高自乘再乘倍之開立方亦得五寸零三釐有餘為今所求之高皆如以其相當二界各作正方體互相為比之理也設如長方體長一尺二寸闊八寸高四寸今將其積八倍之仍與原形為同式形問得長闊高各幾何法以長一尺二寸倍之得二尺四寸即所求之長又以原闊八寸倍之得一尺六寸即所求之闊又以原高四寸倍之得八寸即所求之高也如圖甲乙丙丁長方體甲乙高四寸丁戊闊八寸甲戊長一尺二寸將其積八倍之即如巳庚辛壬長方體其每邊得甲乙丙丁長方體每邊之二倍是故不用八倍其積開立方止以各邊之數倍之而即得也此法蓋因兩長方體之比例既同於其相當二界各作正方體之比例而兩正方體之比例比之二界之比例為連比例隔二位相加之比例故兩長方體積之比例較之兩體各界之比例亦為連比例隔二位相加之比例也設如塹堵體形闊五尺長十二尺高七尺問積幾何法以闊五尺與長十二尺相乘得六十尺又以高七尺再乘得四百二十尺折半得二百一十尺即塹堵體形之積也蓋塹堵體形即平行二勾股面之三稜長體如甲乙丙丁戊己塹堵體形其兩端之二面皆為勾股形一為甲乙丙一為丁戊己俱平行以乙丙闊與丙丁長相乘成乙丙丁己長方面形又以甲乙高再乘成甲乙丙丁庚戊長方體形凡平行面之長方體自其一面之對角線平分為兩三稜體此兩三稜體之積相等見幾何原本五卷第十七節夫一長方體所分兩三稜體之積既相等則三稜體積必為長方體積之一半故將所得之甲乙丙丁庚戊長方體積折半即得甲乙丙丁戊己塹堵體形之積也又法以闊五尺與高七尺相乘得三十五尺折半得一十七尺五寸與長十二尺相乘得二百一十尺即塹堵體形之積也如甲乙丙丁戊己塹堵體形以甲乙高與乙丙闊相乘折半得甲乙丙一勾股面積又與丙丁長相乘即得甲乙丙丁戊己塹堵體形之積也設如芻蕘體形闊四尺長十二尺高四尺問積幾何法以闊四尺與長十二尺相乘得四十八尺又與高四尺相乘得一百九十二尺折半得九十六尺即芻蕘體形之積也蓋芻蕘體形即平行兩三角面之三稜長體有直角為塹堵體無直角為芻蕘體如甲乙丙丁戊己芻蕘體形其兩端之二面皆為三角形一為甲乙丙一為丁戊巳俱平行以乙丙闊與丙丁長相乘成乙丙丁已長方面形又以甲庚高再乘成辛乙丙丁壬癸長方體形凡平行面之三稜體積為平行面方體積之一半見幾何原本五卷第二十節故將所得之辛乙丙丁壬癸長方體積折半即得甲乙丙丁戊己芻蕘體形之積也又法以闊四尺與高四尺相乘得一十六尺折半得八尺與長十二尺相乘得九十六尺即芻蕘體形之積也如甲乙丙丁戊己芻蕘體形以乙丙闊與甲庚高相乘折半得甲乙丙三角形面積又與丙丁長相乘即得甲乙丙丁戊己芻蕘體形之積也設如方底尖體形底方每邊五尺自尖至四角之斜線皆六尺問自尖至底中立垂線之高幾何法以底方每邊五尺求對角斜線法求得底方對角斜線七尺零七分一釐零六絲有餘折半得三尺五寸三分五釐五豪三絲有餘為勾以自尖至四角之斜線六尺為弦用勾弦求股法求得股四尺八寸四分七釐六豪八絲有餘即自尖至底中立垂線之高數也如圖甲乙丙丁戊方底尖體形先求得乙丙丁戊底方面之乙丁對角斜線折半於己得乙巳為勾以自尖至角之甲乙斜線為弦求得甲己股即自尖至底中立垂線之高也又法以底方每邊五尺為平面三角形之底以自尖至四角之斜線六尺為兩腰用平面三角形求中垂線法求得一面中垂線五尺四寸五分四釐三豪五絲為弦以底方每邊五尺折半得二尺五寸為勾求得股四尺八寸四分七釐六豪七絲有餘即自尖至底中立垂線之高數也如圖甲乙丙丁戊尖方體其四面皆為平面三角形一為甲乙丙一為甲丙丁一為甲丁戊一為甲戊乙任以甲乙丙三角形之乙丙為底以甲乙甲丙為兩腰求得甲庚中垂線而以此甲庚為弦底邉折半得庚己為勾求得甲己股即自尖至底中立垂線之高也設如方底尖體形底方每邊六尺高三尺問積幾何法以下方每邊六尺自乘得三十六尺又以高三尺再乘得一百零八尺三歸之得三十六尺即方底尖體形之積也如甲乙丙丁戊方底尖體形以乙丙一邊自乘得乙丙丁戊正方面形又以甲己高再乘得庚乙丁辛扁方體形此扁方體與尖方體之底面積等其高又等故庚乙丁辛一扁方體之積與甲乙丙丁戊尖方體三形之積等見幾何原本五卷第二十三節試將甲己高倍之得壬己與乙丙丁戊底面積相乘得癸乙丁子正方體形此正方體之乙丙丁戊子寅癸丑癸乙丙丑戊丁子寅乙戊寅癸丙丁子丑六方面皆與尖方體之底面積等又自甲心依各稜至各角剖之則成甲乙丙丁戊甲子寅癸丑甲癸乙丙丑甲戊丁子寅甲乙戊寅癸甲丙丁子丑六尖方體此每一尖方體俱為倍高正方體之六分之一既為倍高正方體之六分之一則必為同高扁方體之三分之一故將所得庚乙丁辛之同高方體積三分之而得甲乙丙丁戊尖方體之積也設如陽馬體形底方每邊六尺高亦六尺問積幾何法以底方每邊六尺自乘得三十六尺又以高六尺再乘得二百一十六尺三歸之得七十二尺即陽馬體形之積也如甲乙丙丁戊陽馬體形以乙丙一邊自乘得乙丙丁戊正方面形又以甲丁高再乘得己乙丁甲正方體形此己乙丁甲一正方體之積與甲乙丙丁戊陽馬體三形之積等故三分之即得陽馬體之積也此陽馬體與尖方體形雖不同而法則一蓋尖方體形尖在正中陽馬體形尖在一隅然大凡體形其底面積等高度又等則其體積亦必相等見幾何原本二卷第二十二節故今陽馬體之乙丙丁戊底面積即如尖方體之底其甲丁高度即如尖方體之高度故形雖不同而積則一也設如鱉臑體形長與闊俱四尺高九尺問積幾何法以長與闊四尺自乘得十六尺以高九尺再乘得一百四十四尺六歸之得二十四尺即鱉臑體形之積也蓋鱉臑體即勾股面之尖體如甲乙丙丁鱉臑體形以丁丙長與乙丙闊相乘成乙丙丁戊正方面形以甲丁高再乘成甲庚戊乙丙己長方體形此一長方體之積與甲戊乙丙丁陽馬體三形之積等而甲乙丙丁鱉臑體之積又為甲戊乙丙丁陽馬體積之一半蓋各類尖體其底面積等其高又等則其體積亦等見幾何原本二卷第二十二節今甲乙丙丁鱉臑體之乙丙丁底積為甲戊乙丙丁陽馬體之乙丙丁戊底面積之一半則甲乙丙丁鱉臑體積亦必為甲戊乙丙丁陽馬體積之一半鱉臑體既為陽馬體之一半而陽馬體又為長方體之三分之一則鱉臑體必為長方體之六分之一故將所得甲庚戊乙丙己長方體積六分之即得甲乙丙丁鱉臑體之積也又凡正方體或長方體按法剖之即成塹堵陽馬鱉臑各體而自得其相比之率也如圖甲乙丙丁戊己正方體自其庚乙一面對角線至對面戊辛對角斜線平分之即得甲乙辛戊己與庚乙丙丁戊二塹堵體又將庚乙丙丁戊塹堵體自其上稜戊角至乙對角依乙丙下稜斜剖之則得戊乙丙丁辛一陽馬體乙丙戊庚一鱉臑體又將戊乙丙丁辛陽馬體自其戊乙相對斜稜平分之則得戊乙丁辛與戊乙丙丁二鱉臑體夫一正方體剖之得二塹堵體是塹堵體為正方體二分之一也一塹堵體剖之得一陽馬體一鱉臑體而一陽馬體剖之又得二鱉臑體是陽馬體為塹堵體之三分之二即為正方體之三分之一而鱉臑體為塹堵體之三分之一即為正方體之六分之一也設如上下不等正方體形上方每邊四尺下方每邊六尺高八尺問積幾何法以上方每邊四尺自乘得一十六尺下方每邊六尺自乘得三十六尺又以上方每邊四尺與下方每邊六尺相乘得二十四尺三數相併得七十六尺與高八尺相乘得六百零八尺三歸之得二百零二尺六百六十六寸有餘即上下不等正方體形之積也如甲乙丙丁上下不等正方體形戊丁上方邊自乘得甲戊丁己正方面形庚丙下方邊自乘得乙庚丙辛正方面形戊丁上方邊與庚丙下方邊相乘得壬癸子丑長方面形將此三方面形相併與高八尺相乘得三長方體形其一上下方面俱如甲戊丁己其一上下方面俱如乙庚丙辛其一上下方面俱如壬癸子丑蓋乙庚丙辛長方體比甲戊丁己長方體多壬癸戊甲戊寅卯丁己丁子丑辰甲已巳四方廉體又多乙壬甲辰癸庚寅戊丁卯丙子已已丑辛四長廉體而壬癸子丑長方體比甲戊丁巳長方體多壬癸戊甲巳丁子丑二方廉體若將共多之六方廉體四長廉體俱截去則此三長方體之上下方面必皆如甲戊丁己乃以每一方廉體變為二塹堵體每一長廉體變為三陽馬體共得十二塹堵體十二陽馬體將甲戊丁已類三長方體各加四塹堵體四陽馬體則皆成上下不等三正方體故三歸之而得甲乙丙丁上下不等一正方體形之積也又法以上方邊四尺與下方邊六尺相減餘二尺折半得一尺為一率高八尺為二率下方邊六尺折半得三尺為三率求得四率二十四尺為上下不等正方體形上補成一尖方體之共高乃以下方邊六尺自乘得三十六尺與所得共高二十四尺相乘得八百六十四尺三歸之得二百八十八尺為大尖方體之積又以高八尺與共高二十四尺相減餘十六尺為上小尖方體之高以上方邊四尺自乘得十六尺與上高十六尺相乘得二百五十六尺三歸之得八十五尺三百三十三寸有餘為上小尖方體之積與大尖方體積二百八十八尺相減餘二百零二尺六百六十六寸有餘即上下不等正方體形之積也如甲乙丙丁上下不等正方體形加戊甲丁小尖方體形遂成戊乙丙大尖方體形先以上方邊與丁方邊相減折半如巳庚下方邊折半如己辛依勾股比例巳庚與壬庚之比即同於己辛與戊辛之比以戊辛與乙丙下方面相乘三歸之得戊乙丙大尖方體積以戊癸與甲丁上方面相乘三歸之得戊甲丁小尖方體積於戊乙丙大尖方體積內減去戊甲丁小尖方體積所餘必甲乙丙丁上下不等正方體形之積也設如上下不等長方體形上方長四尺闊三尺下方長八尺闊六尺高十尺問積幾何法以上長四尺與上闊三尺相乘得十二尺倍之得二十四尺下長八尺與下闊六尺相乘得四十八尺倍之得九十六尺又以上闊三尺與下長八尺相乘得二十四尺以下闊六尺與上長四尺相乘得二十四尺四數相併得一百六十八尺與高十尺相乘得一千六百八十尺六歸之得二百八十尺即上下不等長方體形之積也如甲乙丙丁上下不等長方體形戊丁上長與甲戊上闊相乘得一甲戊丁庚長方面形倍之得二甲戊丁庚長方面形已丙下長與乙己下闊相乘得一乙己丙辛長方面形倍之得二乙己丙辛長方面形甲戊上闊與已丙下長相乘得一壬癸子丑長方面形乙己下闊與戊丁上長相乘得一寅卯辰巳長方面形將此六長方面形相併與高十尺相乘得六長方體形其二上下方面俱如甲戊丁庚其二上下方面俱如乙己丙辛其一上下方面俱如壬癸子丑其一上下方面俱如寅卯辰巳蓋二乙己丙辛長方體比二甲戊丁庚長方體為多二壬癸戊甲二戊卯辰丁二庚丁子丑二寅甲庚己八方廉體又多二乙壬甲寅二癸巳卯戊二丁辰丙子二巳庚丑辛八長廉體而一壬癸子丑長方體比一甲戊丁庚長方體多一壬癸戊甲一庚丁子丑二方廉體而一寅卯辰巳長方體比一甲戊丁庚長方體多一寅甲庚巳一戊卯辰丁二方廉體若將共多之十二方廉體八長廉體俱截去則此六長方體之上下方面必皆如甲戊丁庚乃以每一方廉體變為二塹堵體每一長廉體變為三陽馬體共得二十四塹堵體二十四陽馬體將六長方體各加四塹堵體四陽馬體則皆成上下不等六長方體故六歸之而得甲乙丙丁上下不等長方體形之積也又法以上長四尺倍之得八尺加下長八尺共十六尺與上闊三尺相乘得四十八尺又以下長八尺倍之得十六尺加上長四尺得二十尺與下闊六尺相乘得一百二十尺兩數相併得一百六十八尺與高十尺相乘得一千六百八十尺六歸之得二百八十尺即上下不等長方體形之積也此法與前法同此法之以上長倍之加下長與上闊相乘之數即前法之上長上闊相乘倍之又加上闊與下長相乘之數也又此法之以下長倍之加上長與下闊相乘之數即前法之下長下闊相乘倍之又加下闊與上長相乘之數也圖解並同又法以上長四尺與上闊三尺相乘得十二尺下長八尺與下闊六尺相乘得四十八尺又以上長四尺與下闊六尺相乘下長八尺與上闊三尺相乘共得四十八尺折半得二十四尺三數相併得八十四尺與高十尺相乘得八百四十尺三歸之得二百八十尺亦即上下不等長方體形之積也蓋此法與上下不等正方體求積之法同但正方體上下俱係正方面故止用上下方邊各自乘上方邊與下方邊相乘此則上下方面各有長闊既用上方長闊相乘下方長闊相乘又必以上長乘下闊下長乘上闊相加折半以取中數乃可相併而與高數相乘三歸之而得體積也又法以上長四尺與下長八尺相減餘四尺折半得二尺為一率高十尺為二率下長八尺折半得四尺為三率求得四率二十尺為上下不等長方體形上補成一尖長方體之共高乃以下長八尺與下闊六尺相乘得四十八尺與所得共高二十尺相乘得九百六十尺三歸之得三百二十尺為大尖長方體之積又以高十尺與共高二十尺相減餘十尺為上小尖長方體之高以上長四尺與上闊三尺相乘得十二尺與上高十尺相乘得一百二十尺三歸之得四十尺為上小尖長方體之積與大尖長方體積三百二十尺相減餘二百八十尺即上下不等長方體形之積也如甲乙丙丁上下不等長方體形加戊甲丁小尖長方體形遂成戊乙丙大尖長方體形先以上長與下長相減折半如己庚以下長折半如己辛依勾股比例己庚與壬庚之比即同於己辛與戊辛之比以戊辛與乙丙下長方面相乘三歸之得戊乙丙大尖長方體積以戊癸與甲丁上長方面相乘三歸之得戊甲丁小尖長方體積於戊乙丙大尖體積內減去戊甲丁小尖體積所餘必甲乙丙丁上下不等長方體形之積也設如上下不等芻蕘體形上長十尺下長十四尺下闊五尺高十二尺問積幾何法以上長十尺與下闊五尺相乘得五十尺以高十二尺再乘得六百尺折半得三百尺為上下相等芻蕘體積又以上長十尺與下長十四尺相減餘四尺與下闊五尺相乘得二十尺以高十二尺再乘得二百四十尺三歸之得八十尺與先所得上下相等芻蕘體積三百尺相併得三百八十尺即上下不等芻蕘體之積也如甲乙丙丁戊上下不等芻蕘體形自其上稜之甲戊兩端直剖之則分為甲己辛壬戊一芻蕘體甲乙丙辛與戊庚壬丁二尖方體故以與上長相等之己庚與己辛闊與乙丙等相乘即得己辛壬庚芻蕘體之底面積與甲癸高相乘折半得甲己辛壬戊芻蕘體積又以甲戊上長與丙丁下長相減所餘丙辛壬丁二假即二尖方體之共長與乙丙闊相乘得乙辛與庚丁二尖方體之底面積與高相乘三歸之即得甲乙丙辛與戊庚壬丁二尖方體積與甲己辛壬戊一芻蕘積相加即得甲乙丙丁戊一上下不等芻蕘體之總積也設如兩兩平行邊斜長方體形長二尺四寸闊八寸高三尺七寸問積幾何法以長二尺四寸與闊八寸相乘得一尺九十二寸又以高三尺七寸再乘得七尺一百零四寸即兩兩平行邊斜長方體形之積也如圖甲乙丙丁戊己斜長方體形以乙丙闊與丙丁長相乘得乙丙丁庚長方面積以戊丙高再乘成己乙丙丁辛壬長方體凡平行平面之間所有立於等積底之各平行體其積必俱相等見幾何原本五卷第十九節故甲乙丙丁戊己斜倚之長方體必與己乙丙丁辛壬正立之長方體為相等也設如空心正方體積一千二百一十六寸厚二寸問內外方邊各幾何法以厚二寸自乘再乘得八寸八因之得六十四寸與共積一千二百一十六寸相減餘一千一百五十二寸六歸之得一百九十二寸用厚二寸除之得九十六寸為內方邊與外方邊相乘長方面積乃以厚二寸倍之得四寸為長闊之較用帶縱較數開平方法算之得闊八寸即內方邊得長一尺二寸即外方邊也如圖甲乙丙丁戊己庚辛空心正方體其甲丑即空心正方體之厚以之自乘再乘八因之得壬辛子癸類八小隅體與空心正方體相減則餘空心正方體之六面丑寅巳子類六長方扁體六歸之得丑寅巳子一長方扁體用厚二寸除之得丑寅卯辰一長方面積其丑寅闊與戊己等即內方邊其丑辰長與甲乙等即外方邊其丑戊辛辰皆與甲丑厚度等丑戊辛辰並之即長闊之較故以厚二寸倍之為帶縱求得闊為內方邊長為外方邊也又法以厚二寸倍之得四寸為內方邊與外方邊之較自乘再乘得六十四寸與空心正方體積一千二百一十六寸相減餘一千一百五十二寸三歸之得三百八十四寸以內外方邊之較四寸除之得九十六寸為長方面積以內外方邊之較四寸為長闊之較用帶縱較數開平方法算之得闊八寸即內方邊加較四寸得一尺二寸即外方邊也如圖甲乙丙丁戊己庚辛空心正方體以戊己庚辛空心小正方形移置乙角之一隅則空心正方體變為甲戊辛庚丙丁壬磬折體形其甲戊即磬折體之厚為甲乙外方邊與戊己內方邊之較依開立方次商法分之得癸子丑三方廉體寅卯辰三長廉體巳一小隅體以甲戊厚度自乘再乘得巳一小隅體與共積相減餘三方廉體三長廉體三歸之則餘癸一方廉體寅一長廉體共成午甲乙庚未申一扁方體其午甲厚與甲戊等以午甲厚除午甲乙庚未申扁方體則得甲乙庚未之長方面形甲戊即長闊之較故用帶縱較數開平方法算之得乙庚闊與戊乙等即空心方體之內方邊以甲戊與戊乙相加得甲乙即空心方體之外方邊也設如大小兩正方體大正方體比小正方體每邊多四寸積多二千三百六十八寸問大小兩正方邊各幾何法以大正方邊比小正方邊所多之較四寸自乘再乘得六十四寸與大正方體比小正方體所多之積二千三百六十八寸相減餘二千三百零四寸三歸之得七百六十八寸以邊較四寸除之得一百九十二寸為長方面積乃以邊較四尺為長闊之較用帶縱較數開平方法算之得闊十二尺即小正方之邊數加較四尺得十六尺即大正方之邊數也如圖甲乙丙丁一大正方體戊己庚辛一小正方體試於甲乙丙丁大正方體減去戊己庚辛小正方體餘壬甲戊辛庚丙丁三面磬折體形即大正方積比小正方積所多之較甲戊為磬折體之厚即大正方邊比小正方邊所多之較此三面磬折體形依開立方次商法分之則得癸子丑三方廉體寅卯辰三長廉體巳一小隅體以甲戊邊較自乘再乘得巳一小隅體與磬折體積相減餘三方廉體三長廉體三歸之則得癸一方廉體寅一長廉體共成午甲乙庚未申一扁方體其午甲厚與甲戊等以午甲厚除之則得甲乙庚未之長方面形甲戊即長闊之較故用帶縱開平方法算之得乙庚闊與戊乙等即小正方之邊數以甲戊與戊乙相加得甲乙即大正方之邊數也設如大小二正方體共邊二十四尺共積四千六百零八尺問兩體之每邊及體積各幾何法以共邊二十四尺自乘再乘得一萬三千八百二十四尺內減共積四千六百零八尺餘九千二百一十六尺三歸之得三千零七十二尺以共邊二十四尺除之得一百二十八尺為長方面積乃以共邊二十四尺為長闊和用帶縱和數開平方法算之得闊八尺即小正方之邊數與共邊二十四尺相減餘十六尺即大正方之邊數也如圖甲乙丙丁一大正方體戊己庚辛一小正方體以共邊二十四尺自乘再乘則成壬乙癸子一總正方體內減甲乙丙丁與戊己庚辛大小兩正方體之共積餘丑寅卯三方廉體辰巳午三長廉體三歸之則得丑一方廉體辰一長廉體共成未壬乙丙戊申一扁方體用壬乙共邊除之則得未壬戊申之長方面形其未壬闊與壬甲等其壬戊長與甲乙等故以壬乙共邊為長闊和用帶縱和數開平方法算之得未壬闊即小正方之邊數與長闊和相減餘壬戊長即大正方之邊數也御製數理精蘊下編卷二十五
