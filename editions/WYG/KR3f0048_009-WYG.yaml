body:
  text: 欽定四庫全書御製數理精藴下編卷四線部二按分遞折比例二八差分遞折差分三七差分差分四六差分加倍減半按分遞折比例差分之欵項雖多而按分遞折者皆為相連比例故約之而歸一類如二八三七四六差分俱以十分為總率而按各分以分之者也如遞折差分亦以十分為率而按十分之幾以遞折之者也如加倍減半差分則以倍半為率按一定之分而加減之者也今細分其目如左二八差分者以總物平分十分一得十分之二一得十分之八有三色者則以二與八與三十二為衰數葢八與三十二之比即如二與八之比也有四色者則以二與八與三十二與一百二十八為衰數葢三十二與一百二十八之比亦如二與八之比也至於五色以上者皆以相連比例求各衰數總不越乎二八之比例故曰二八差分三七差分者以總物平分十分一得十分之三一得十分之七有三色者則以九與二十一及四十九為衰數以九為第一衰數者因三與七非彼此度盡之數七作三分必至竒零不盡故以三因三得九為三分則以三因七得二十一為七分如二十一轉為三分則四十九又為七分矣葢九與二十一即如三與七之比而二十一與四十九亦如三與七之比也有四色者則以二十七與六十三及一百四十七與三百四十三為衰數以三因九得二十七為三分故以七因九得六十三為七分若六十三轉為三分則一百四十七為七分一百四十七轉為三分則三百四十三又為七分矣葢二十七與六十三六十三與一百四十七一百四十七與三百四十三皆如三與七之比也五色以上者皆以相連比例求各衰數總不越乎三七之比例故曰三七差分四六差分者以總物平分十分一得十分之四一得十分之六有三色者則以四與六與九為衰數葢六與九之比即如四與六之比也有四色者則以四與六與九與一三五為衰數葢九與一三五之比亦如四與六之比也五色以上者亦以相連比例求各衰數總不越乎四六之比例故曰四六差分遞折差分者十分之中得其幾分即為幾折如得其六分即為六折得其四分即為四折若夫五折則為十分之半故載於倍半法中而别為一類加倍差分其數自少而多皆以倍而加減半差分則數自多而少皆以半而減因加減有定分故立衰有定例總以加倍減半之數為相連比例設為借數以求正數也二八差分設如有銀三千兩令二等人户二八納之問各該若干法以二分八分相併得十分為一率銀三千兩為二率二分為三率推得四率六百兩為下等人户所納之數仍以二分八分相併之十分為一率銀三千兩為二率以八分為三率推得四率二千四百兩即為上等人户所納之數也此法兩用四率者正為明比例之理葢二分八分相併之十分與總銀三千之比即如二分之與六百之比八分之與二千四百之比也又捷法以二八所併之十分歸除總銀三千兩得每分三百兩以二分乘之得六百以八分乘之得二千四百葢每一分得三百而二分得六百八分得二千四百也又或先得二分所納之數於總銀内減之即八分所納之數此又正法外之變法也設如有人一千六百名二分賞銀八分賞米問賞銀人若干賞米人若干法以二分八分相併得十分為一率人一千六百名為二率二分為三率推得四率三百二十名為應賞銀之人如以八分為三率推得四率一千二百八十名即應賞米之人也葢二分八分相併之十分與總人一千六百之比即如二分之與三百二十名之比八分之與一千二百八十名之比也又捷法以二八所併之十分歸除總人數一千六百名得每分一百六十名以二分乘之得賞銀人三百二十名以八分乘之得賞米人一千二百八十名葢每一分得一百六十名而二分得三百二十名八分得一千二百八十名也設如有米五百八十八石令甲乙丙三人二八分之問每人應得幾何法以二分為甲衰八分為乙衰三十二分為丙衰相併得四十二分為一率總米五百八十八石為二率以甲二分為三率推得四率二十八石即甲分米數以乙八分為三率得四率一百一十二石即乙分米數以丙三十二分為三率得四率四百四十八石即丙分米數也此法用二與八八與三十二者即二八相連比例分葢總分數四十二分與總米五百八十八石之比即二分與二十八石之比八分與一百一十二石之比即三十二分與四百四十八石之比也又捷法以總數四十二分歸除總米五百八十八石得每分一十四石以二分乘之得甲米二十八石以八分乘之得乙米一百一十二石以三十二分乘之得丙米四百四十八石也設如有銅五百二十斤錬成精銅每十分中去渣二分餘精銅八分問精銅與渣各得若干法以十分為一率銅五百二十斤為二率八分為三率推得四率四百一十六斤為精銅之數如以二分為三率推得四率一百零四斤即銅渣之數也葢十分與五百二十斤之比即如八分之與四百一十六斤之比二分之與一百零四斤之比也又捷法以十分歸除總銅五百二十斤得每分五十二斤以八分乘之得四百一十六斤以二分乘之得一百零四斤葢每一分五十二斤而二分得一百零四斤八分得四百一十六斤也又或先得精銅八分數減總銅餘即銅渣二分數也設如有田二千六百三十五畝以麥穀豆麻四色遞次二八分種問各田應得幾何法以二分為麻衰八分為豆衰三十二分為穀衰一百二十八分為麥衰併之得一百七十分為一率總田二千六百三十五畝為二率以麥一百二十八分為三率得四率一千九百八十四畝即麥田數如以穀三十二分為三率得四率四百九十六畝即穀田數如以豆八分或麻二分為三率所得四率即豆一百二十四畝與麻三十一畝之田數也又捷法以總數一百七十分除總田數二千六百三十五畝得每分一十五畝五分乃以每色分數乘之即得每色應種數也設如有銀三千四百一十兩令五商遞次二八分出問各出幾何法以一商為二分一商為八分一商為三十二分一商為一百二十八分一商為五百一十二分併之得六百八十二分為一率總銀三千四百一十兩為二率以五百一十二分為三率得四率二千五百六十兩即五百一十二分應出之數如以一百二十八分為三率得四率六百四十兩即一百二十八分應出之數如以三十二分為三率得四率一百六十兩即三十二分應出之數如以八分或二分為三率所得四率四十兩即八分應出之數一十兩即二分應出之數也又捷法以總數六百八十二分除總銀三千四百一十兩得每分五兩再以每人分數乘之即得每人應出銀數也設如有糧二千六百五十五石九斗令甲乙丙丁戊五等人户照二八遞減納之甲三十户乙四十户丙五十户丁六十户戊七十户問各户所納幾何各等户共納幾何法以五百一十二為甲一户分數再以甲三十户乘之得一萬五千三百六十為甲三十户共分數以一百二十八為乙一户分數再以乙四十户乘之得五千一百二十為乙四十户共分數又以三十二為丙一户分數再以丙五十户乘之得一千六百為丙五十户共分數又以八為丁一户分數再以丁六十户乘之得四百八十為丁六十户共分數又以二為戊一户分數再以戊七十户乘之得一百四十為戊七十户共分數以所得五等共分數併之得二萬二千七百為總分數為一率總糧二千六百五十五石九斗為二率以甲五百一十二分為三率得甲一户納五十九石九斗零四合又以甲三十户乘之得甲共納一千七百九十七石一斗二升以乙一百二十八分為三率得乙一户納十四石九斗七升六合又以乙四十户乘之得乙共納五百九十九石零四升以丙三十二分為三率得丙一户納三石七斗四升四合又以丙五十户乘之得丙共納一百八十七石二斗以丁八分為三率得丁一户納九斗三升六合又以丁六十户乘之得丁共納五十六石一斗六升以戊二分為三率得戊一户納二斗三升四合又以戊七十户乘之得戊共納十六石三斗八升也又捷法以總分數除總糧數得每一分一斗一升七合以各等一户分數乘之得各等一户納糧之數以各等共户分數乘之得各等共户納糧之數葢前法有各等户而各等之中又有衆户故以定分數二八三十二一百二十八五百一十二之數為各等分數又以衆户乘之為各等共户之分數此捷法以總分數除總糧是得各等每一户中之一分故以每一户分數乘之得每一户之數以每一等共分數乘之得每一等之全數也三七差分設如有銀五千兩令東西二縣三七支銷問各該幾何法以七分為東縣衰數三分為西縣衰數併之得十分為一率總銀五千兩為二率以七分為三率得四率三千五百兩即東縣應支之數如以三分為三率得四率一千五百兩即西縣應支之數也葢三七比例亦以總衰數與總銀數之比即若每縣衰數與每縣銀數之比故十分與五千之比即若三分與一千五百之比七分與三千五百之比也又捷法先以總衰十分除總銀五千兩得每分五百兩以七分乘之即東縣之數以三分乘之即西縣之數或得東縣數於總銀内減之餘即西縣數也此法以總衰除總銀得每分五百兩以七乘之即得七分以三乘之即得三分也前法先乘而後除後法先除而後乘其理一也設如有田二千五百畝令上等户七分種之下等户三分種之問各該幾何法以七分三分相併得十分為一率二千五百畝為二率上户七分為三率得四率一千七百五十畝即上户應種田數如以三分為三率得四率七百五十畝即下户應種田數葢十分與二千五百畝之比即七分與一千七百五十畝之比三分與七百五十畝之比也又捷法以三七相併之十分歸除總田二千五百畝得每分二百五十畝以三分乘之得下户七百五十畝以七分乘之得上户一千七百五十畝葢一分為二百五十畝而三分得七百五十畝七分得一千七百五十畝也設如以車運物行十里二十刻到今已行七里問尚得幾刻到法以十里為一率二十刻為二率以七里與十里相減餘三里為三率推得四率六刻即運到刻數也如以七里為三率推得四率十四刻與總二十刻相減餘六刻亦即運到刻數也葢十里與二十刻之比即三里與六刻之比七里與十四刻之比也又捷法以十里歸除二十刻得每里二刻以三里乘之得六刻以七里乘之得十四刻葢每一里為二刻則三里得六刻七里得十四刻也設如種樹一千一百六十株按松柏桃栁四色遞次三七分種問各該幾何法以三百四十三分為松衰一百四十七分為柏衰六十三分為桃衰二十七分為栁衰併之得五百八十分為一率一千一百六十株為二率以三百四十三分為三率得四率六百八十六株即種松之數以一百四十七分為三率得四率二百九十四株即種柏之數以六十三分為三率得四率一百二十六株即種桃之數以二十七分為三率得四率五十四株即種栁之數也又捷法以總衰數五百八十歸除總樹一千一百六十得每分二株以三百四十三分乘之得種松之數以一百四十七分乘之得種柏之數以六十三分乘之得種桃之數以二十七分乘之得種栁之數也此法有四位故以三因九得二十七為栁衰數又遞用七因三歸為桃柏松之衰數也設如有熟絲四百九十七兩七錢按絹綾緞遞次三七分織問各該絲幾何法以九分為絹衰二十一分為綾衰四十九分為緞衰併之得七十九分為一率絲四百九十七兩七錢為二率以緞四十九分為三率得四率三百零八兩七錢即緞絲數如以綾二十一分為三率得四率一百三十二兩三錢即綾絲數如以絹九分為三率得四率五十六兩七錢即絹絲數也又捷法以總衰數七十九分除總絲四百九十七兩七錢得每分六兩三錢以緞四十九分乘之得緞絲之數以綾二十一分乘之得綾絲之數以絹九分乘之得絹絲之數也此法有三位故以三因三得九為絹之衰數又遞用七因三歸為綾與緞之衰數葢九與二十一二十一與四十九為相連比例三率而九與二十一之比即二十一與四十九之比也設如編銀八百二十八兩二錢令甲乙丙丁戊五等户三七徴納問各户所納幾何法以八十一分為甲衰一百八十九分為乙衰四百四十一分為丙衰一千零二十九分為丁衰二千四百零一分為戊衰併之得四千一百四十一分為一率總銀八百二十八兩二錢為二率以每人分數各為三率得四率之一十六兩二錢即甲所納銀數得四率之三十七兩八錢即乙所納銀數得四率之八十八兩二錢即丙所納銀數得四率之二百零五兩八錢即丁所納銀數得四率之四百八十兩二錢即戊所納銀數也又捷法以總衰數四千一百四十一分歸除總銀八百二十八兩二錢得每分二錢以甲乙丙丁戊各人分數乘之即得各人所納銀數也此法有五位故以三因二十七得八十一分為甲之衰數又遞用七因三歸即得乙丙丁戊各衰數矣設如有田一百三十八畝每畝徴米二斗今七分徴米三分折絲每米一石折絲一斤問各該幾何法以七分為米衰三分為絲衰併之得十分為一率又以徴米二斗乘田一百三十八畝得總米二十七石六斗為二率以米七分為三率得四率一十九石三斗二升即徴米七分之數與總米相減餘八石二斗八升為三分折絲之數按米每石折絲一斤則以八石二斗八升用十六兩乘之得一百三十二兩四錢八分為八斤四兩四錢八分即折絲三分之數也此法以徴米二斗乘總田是得總徴米數而三七分之也總米分去七分即本色米數餘者折為絲即三分絲數也折絲之法每石既為一斤則八石二斗四升自得八斤四兩四錢八分也又捷法以總衰十分歸除總米二十七石六斗得每分二石七斗六升以米七分乘之得米數以絲三分乘之得折絲之米數既得折絲之米數而絲之斤兩亦得矣四六差分設如有金四千兩令上下二等金户六四傾銷問各該幾何法以六分為上等衰數四分為下等衰數併之得十分為一率共金四千兩為二率以六分為三率得四率二千四百兩即上等金户傾銷之數如以四分為三率得四率一千六百兩即下等金户傾銷之數此法以四分六分相併之十分與共金四千兩之比即如六分與二千四百兩之比四分與一千六百兩之比也又捷法以總衰十分歸除共金四千兩得每分四百兩以六分乘之得二千四百兩為上等金户傾銷之數以四分乘之得一千六百兩為下等金户傾銷之數如先得上等六分金數於共金數内減之其餘即下等四分金數也設如有水田三百畝令上下二户四六分灌問各灌若干法以四分六分相併得十分為一率三百畝為二率六分為三率推得四率一百八十畝即上户所灌之田以四分為三率推得四率一百二十畝即下户所灌之田也葢四六相併之十分與三百畝之比即六分與一百八十畝之比四分與一百二十畝之比也又捷法以相併之十分歸除總田三百畝得每分三十畝以六分乘之即上户田數以四分乘之即下户田數葢每一分得三十畝而六分得一百八十畝四分得一百二十畝也如或先得六分田數減總田餘即四分田數也設如有絲二百五十斤換米每絲一斤換米一石今已換過六分尚餘絲四分問已換未換各若干法以四分六分相併得十分為一率将二百五十斤絲變作二百五十石米為二率每絲一斤換米一石故也以六分為三率推得四率一百五十石為已換之米數以四分為三率推得四率一百石為未換之米數葢四六相併之十分與二百五十石之比即六分與一百五十石之比四分與一百石之比也又捷法以相併之十分歸除總米二百五十石得每分二十五石以六分乘之得已換之一百五十石以四分乘之得未換之一百石葢每一分得二十五石而四分得一百石六分得一百五十石也設如有絲一千五百五十八斤令甲乙丙三家四六分織問各該幾何法以四為甲衰數六為乙衰數九為丙衰數併之得十九為一率總絲一千五百五十八斤為二率以甲四分為三率即得甲絲三百二十八斤以乙六分為三率即得乙絲四百九十二斤以丙九分為三率即得丙絲七百三十八斤此法以總衰十九分與總絲一千五百五十八斤之比即甲四分與三百二十八斤之比乙六分與四百九十二斤之比丙九分與七百三十八斤之比也又捷法以總衰數十九分除總絲一千五百五十八斤得每分八十二斤以甲四分乘之得甲絲三百二十八斤以乙六分乘之得乙絲四百九十二斤以丙九分乘之得丙絲七百三十八斤也設如有田九百七十五畝令甲乙丙丁四人四六分種問每人各得幾何法以四分為甲衰六分為乙衰九分為丙衰一十三分半為丁衰併之得三十二分半為一率總田九百七十五畝為二率以甲四分為三率即得甲田一百二十畝以乙六分為三率即得乙田一百八十畝以丙九分丁一十三分半各為三率即得二百七十畝為丙田得四百零五畝為丁田也葢三十二分半與九百七十五畝之比即甲四分與一百二十畝之比乙六分與一百八十畝之比亦即丙九分與二百七十畝之比丁十三分半與四百零五畝之比也又捷法以總衰數三十二分半歸除總田九百七十五畝得每分三十畝以甲乙丙丁各衰數乘之即得每人田數也設如有糧一千二百六十六石令甲乙丙丁戊五舟按六分四分遞次運載問各該幾何法以四分為戊衰六分為丁衰九分為丙衰一十三分半為乙衰二十分二五為甲衰併之得五十二分七五為一率總糧一千二百六十六石為二率以甲二十分二五為三率得甲運四百八十六石以乙一十三分半為三率得乙運三百二十四石以丙九分為三率得丙運二百一十六石以丁六分為三率得丁運一百四十四石以戊四分為三率得戊運九十六石此法總衰數與總糧之比即各人分數與各人糧數之比也葢六與九九與一三五一三五與二二五皆同為四六之比例也又捷法以總衰五十二分七五歸除總糧一千二百六十六石得每分二十四石以甲乙丙丁戊各舟衰數乘之即得各舟運糧之數也設如有米三百八十五石五斗二升令上等人户六分下等人户四分交納上等二十六户下等四十户問各等每户各該幾何法以六為上等衰數以上户二十六户乘之得一百五十六為上等二十六户共衰數以四為下等衰數以下户四十乘之得一百六十為下等四十户共衰數併之得三百一十六為一率總米三百八十五石五斗二升為二率以上等六分為三率得四率七石三斗二升為上等一户米數以上等共分數一百五十六為三率得一百九十石三斗二升為上等二十六户共米數如以下等四分為三率得四率四石八斗八升為下等一户米數以下等共分數一百六十為三率得一百九十五石二斗即下等四十户共米數也又捷法以總衰三百一十六分歸除總米三百八十五石五斗二升得每分一石二斗二升以六分乘之得上等一户米數以上等共分數乘之得上等共米數以四分乘之得下等一户米數以下等共分數乘之得下等共米數也遞折差分設如有熟稻七百九十九畝六分八釐令三人以十分之六收割問每人得幾何法以一百為第一人分數六十為第二人分數三十六為第三人分數三分數相併得一百九十六分為一率總稻七百九十九畝六分八釐為二率第一人分數一百為三率得四率四百零八畝即第一人收割田數如以第二人分數六十為三率得四率二百四十四畝八分即第二人收割田數如以第三人分數三十六為三率得四率一百四十六畝八分八釐即第三人收割田數葢十分之六如彼得十分此得六分也第二人得第一人十分之六第三人又得第二人十分之六故一百與六十之比即六十與三十六之比遞次比例皆十分之六也其得數四百零八畝與二百四十四畝八分之比即二百四十四畝八分與一百四十六畝八分八釐之比亦皆為十分之六也又捷法以總分一百九十六除總田七百九十九畝六分八釐得每一分四畝零八釐以一百分乘之得第一人四百零八畝以六十分乘之得第二人二百四十四畝八分以三十六分乘之得第三人一百四十六畝八分八釐也設如有銀一千二百六十六兩五錢令四商以十分之七遞次販貨出賣問每人該銀幾何法以一千為第一人分數七百為第二人分數四百九十為第三人分數三百四十三為第四人分數相併得二千五百三十三分為一率總銀一千二百六十六兩五錢為二率以一千分為三率得四率五百兩即第一人銀數以七百分為三率得四率三百五十兩即第二人銀數以四百九十分為三率得四率二百四十五兩即第三人銀數以三百四十三分為三率得四率一百七十一兩五錢即第四人銀數葢十分之七遞折而下第二人得第一人十分之七則第三人亦得第二人十分之七而第四人又得第三人之十分之七其先立衰數一千分七百分四百九十分三百四十三分皆十與七之比例也又捷法以總分二千五百三十三除總銀一千二百六十六兩五錢得每一分五錢以一千分乘之得第一人五百兩以七百分乘之得第二人三百五十兩以四百九十分乘之得第三人二百四十五兩以三百四十三分乘之得第四人一百七十一兩五錢也設如生銅入爐鎔化三次每一次去渣十分之二淨得上好熟銅二百四十八兩問原銅幾何法即以十分之八為分數十分之中去渣二分得淨銅八分故以十分之八為比例以八分為一率十分為二率熟銅二百四十八兩為三率得四率三百一十兩為第三次入爐銅數又以八分為一率十分為二率三百一十兩為三率得四率三百八十七兩五錢為第二次入爐銅數再以八分為一率十分為二率三百八十七兩五錢為三率得四率四百八十四兩三錢七分五釐即第一次入爐生銅數也此法因八折三次而轉求原數故以八分為一率十分為二率轉求三次而始得也又法以八分自乘再乘得五百一十二分為一率十分自乘再乘得一千分為二率熟銅二百四十八兩為三率得四率四百八十四兩三錢七分五釐即第一次入爐生銅數也前法以三次三率各求四率故必乘除三次此法則以一率二率俱各自乘再乘止以第三次熟銅數為三率即得第一次生銅數是合三次乘除而為一次乘除也設如有絲三百六十九斤令甲乙丙丁四人照十分之八折分問各得幾何法以一千為甲分數八百為乙分數六百四十為丙分數五百一十二為丁分數相併得二千九百五十二分為一率總絲三百六十九斤為二率以每人分數各為三率所得各四率一百二十五斤為甲數一百斤為乙數八十斤為丙數六十四斤為丁數葢十分之八遞折而下乙得甲十分之八丙得乙亦十分之八而丁得丙亦十分之八其先立衰數一千分八百分六百四十分五百一十二分皆十與八之比例也如捷法先除後乘須用通分不然則斤數有竒零矣設如有絹四百七十丈一尺八寸四分令三等人户照十分之六出之上等户二十五中等户三十下等户四十八問每户該出幾何法以一百為上等分數用二十五乘之得二千五百為上等户共分數以六十為中等分數用三十乘之得一千八百為中等户共分數以三十六為下等分數用四十八乘之得一千七百二十八為下等户共分數併之共六千零二十八分為一率絹四百七十丈一尺八寸四分為二率以三等各分數各為三率所得各四率上等每户出七丈八尺中等每户出四丈六尺八寸下等每户出二丈八尺零八分又以各等户數乘各等每户絹數得上等二十五户共出絹一百九十五丈中等三十户共出絹一百四十丈零四尺下等四十八户共出絹一百三十四丈七尺八寸四分也又捷法以總分數六千零二十八分除總絹四百七十丈一尺八寸四分得每一分為七寸八分以各等分數乘之得各等每一户絹數再以各等户數乘之即得各等衆户共出絹數也設如有官糧一百六十八石四斗八升八合令四等人户以十分之七依次遞折交納一等二十二户二等三十六户三等四十二户四等四十八户問每等每户各納幾何法以一千為一等分數用二十二户乘之得二萬二千即一等户共分數以七百為二等分數用三十六户乘之得二萬五千二百即二等户共分數以四百九十為三等分數用四十二户乘之得二萬零五百八十為三等户共分數以三百四十三為四等分數用四十八户乘之得一萬六千四百六十四為四等户共分數併之共八萬四千二百四十四分為一率總糧一百六十八石四斗八升八合為二率以一千分為三率得四率一等每户二石以共户數乘之得共納四十四石以七百分為三率得四率二等每户一石四斗以共户數乘之得共納五十石零四斗以四百九十分為三率得四率三等每户九斗八升以共户數乘之得共納四十一石一斗六升以三百四十三分為三率得四率四等每户六斗八升六合以共户數乘之得共納三十二石九斗二升八合也又捷法以總分數八萬四千二百四十四除總糧一百六十八石四斗八升八合得每一分為二合以各等分數乘之得各等每一户糧數再以各等户數乘之即得各等衆户共納糧數也加倍減半差分設如一人讀書日加一倍三日共讀三千四百六十五字問每日所讀幾何法以一為第一日分數二為第二日分數四為第三日分數併之得七分為一率總字三千四百六十五為二率一分為三率得四率四百九十五字即第一日所讀之數倍之得九百九十字即第二日所讀之數又倍之得一千九百八十字即第三日所讀之數也葢加倍者是第二日增於第一日一倍第三日又增於第二日一倍倍數多者由此遞加如二與四四與八八與十六之類皆為加一倍之比例也設如一人織絹日加一倍至第四日織成六丈七尺五寸問每日織幾何法以一為第一日分數二為第二日分數四為第三日分數八為第四日分數併之得十五分為一率總絹六丈七尺五寸為二率一分為三率得四率四尺五寸即第一日之數倍之得九尺為第二日之數又倍之得一丈八尺為第三日之數又倍之得三丈六尺為第四日之數四數相加共得六丈七尺五寸以合原數也設如一人借銀為商三次每次得利銀比本銀加一倍每次還人二百兩三次之後本利還盡問原本銀若干法以一為本銀分數二為第一次本利共分四為第二次本利共分八為第三次本利共分即以八分為一率原本銀一分為二率又以一為第三次還銀分二為第二次還銀分四為第一次還銀分併之得七分與每次還人二百兩相乘得一千四百兩為三率得四率一百七十五兩即原本銀數也葢每次得利銀比本銀加一倍則原本銀為一分第一次必得二分第二次必得四分至第三次必得八分此以未還人計也然每次還人二百兩三次之後本利還盡若第三次不還則得二百兩者一分第二次不還則至第三次必得二百兩者二分第一次不還則至第三次必得二百兩者四分以第一次之一分第二次加倍得二分第三次加倍得四分是第三次應得二百兩者七分而為一千四百兩矣故以八分與一分之比同於一千四百兩與一百七十五兩之比也又法以二百兩用三次還銀共分七乘之得一千四百兩折半三次亦得本銀之數葢折半三次即以八除也設如一人賣酒每日比原數加一倍一日賣一斤六日賣盡問原酒若干法以一為原酒分數按六日加倍六次得六十四分為一率原酒一分為二率又以一為第六次賣酒分二為第五次賣酒分四為第四次賣酒分八為第三次賣酒分十六為第二次賣酒分三十二為第一次賣酒分併之得六十三分與每斤十六兩相乘得一千零八兩為三率得四率十五兩七錢五分即原酒數也又法以每斤十六兩用六次賣酒共分六十三乘之得一千零八兩折半六次亦得原酒之數葢折半六次即以六十四除也設如有田一千二百畝分與甲乙丙丁四人種之自上以下遞減一半問各該若干法以八為甲分四為乙分二為丙分一為丁分併之得十五分為一率田一千二百畝為二率以甲八分為三率得四率六百四十畝即甲田數以乙四分為三率得四率三百二十畝即乙田數以丙二分為三率得四率一百六十畝即丙田數以丁一分為三率得四率八十畝即丁田數如以甲田六百四十畝折半即乙田數以乙田三百二十畝折半即丙田數以丙田一百六十畝折半即丁田數也設如有銀一萬八千零八十八兩令甲乙丙三人減半分之問各該幾何法以四為甲分數二為乙分數一為丙分數併之得七分為一率總銀一萬八千零八十八兩為二率以甲四分為三率得四率一萬零三百三十六兩即甲所得銀數以乙二分為三率得四率五千一百六十八兩即乙所得銀數以丙一分為三率得四率二千五百八十四兩即丙所得銀數也葢減半者即自上而下折半減之也如四折半為二二折半為一是也今以甲銀一萬零三百三十六兩折半即得乙銀五千一百六十八兩将乙銀再折半即得丙銀二千五百八十四兩也設如有銀三千一百六十兩分與三等人第一等人二十名第二等人二十四名第三等人三十名第二等比一等之銀減一倍第三等比二等之銀減一倍問各等每人分銀幾何法以四為一等分數二為二等分數一為三等分數以一分乘三等三十名仍得三十分以二分乘二等二十四名得四十八分以四分乘一等二十名得八十分三數相併共得一百五十八分為一率總銀三千一百六十兩為二率四分為三率得四率八十兩為第一等每人所得銀數減半得四十兩為二等每人所得銀數又減半得二十兩為三等每人所得銀數以各等人數乘各等每人所得銀數即各等共人所得共銀數併之以合原銀數也御製數理精蘊下編卷四
