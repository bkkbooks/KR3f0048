body:
  text: 欽定四庫全書御製數理精藴上編卷五算法原本一算法原本二算法原本一第一一者數之原也衆一相合而數繁焉不能無大小多寡之不齊而欲知其所以分合之故必有一定之法始可以得其準若夫累積小數與大數等者此小數即度盡大數之準也如大數有八小數有二四倍其二與八必等則二即為度盡八之準苟累積小數不能與大數等者此小數即非度盡大數之準也如大數有八小數有三二倍其三為六小於八矣二倍其三為九又大於八矣若此者即為非度盡大數之準要之小數為大數之平分者即能度盡大數而小數非大數之平分者即不能度盡大數是故以小度大以寡御多求其恰符而毫無舛者惟在得其平分之法而已第二數之目雖廣總不出奇偶二端何謂偶兩整平分數是也何謂奇不能兩整平分數是也如二四六八十之類平分之俱為整數斯謂之偶數矣若三五七九十一之類平分之俱不能為整數斯謂之奇數矣又如小偶數分大偶數得偶分則謂之偶分之偶數如小偶數四分大偶數三十二得八平分是為偶分其三十二即為偶分之偶數小偶數分大偶數得奇分則謂之奇分之偶數如小偶數六分大偶數三十得五平分是為奇分其三十即為奇分之偶數又如小奇數分大奇數得奇分則謂之奇分之奇數矣如小奇數五分大奇數十五得三平分是為奇分其十五即為奇分之奇數第三乘者兩數相因而成也葢有兩數視此一數有幾何彼一數有幾何將此一數照彼一數加幾倍則兩數積而復成一數故謂之相因而成然不用加而用乘者何也葢加湏層累而得乘則一因即得此立法之精而理則實相通也如有六與十兩數以十為主而加六次得六十以六為主而加十次亦得六十今以十為主而以六乘之或以六為主而以十乘之皆得六十其數無異而比加捷矣第四凡兩數相乘為平方數如四與六相乘得二十四是也試將四六兩數作㸃排之縱立四㸃為甲乙橫列六㸃為甲丁將此六㸃累四次即成甲乙丙丁平方數矣又若相等兩數相乘得數則為正方數如五與五乘得二十五是也苟將五數縱橫各列五㸃或依縱數或依横數累五次即成戊已庚辛正方數矣第五凡數之相乘可用線以表之然線雖無廣分如依一線之長分廣為小方面看此線所有方面若干將彼線所有方面加作幾倍或看彼線所有方面若干將此線所有方面加作幾倍則二線相積而成面矣設如有甲乙二線甲線之分為三乙線之分為四將此二線相乘則依甲線三分之一分作廣分為甲丙依乙線四分之一分作廣分為乙丁其甲丙有三小方形乙丁有四小方形若依甲丙所有之數將乙丁加為三倍或依乙丁所有之數將甲丙加為四倍俱成函十二小方形之乙丙甲丁之二直角形矣葢面為線之積以一線為横一線為縱縱横相因而成故測面者必於線知線即可以知面也第六凡二線彼此各分不均而有零分者其相乘所成方面亦有零分也設有甲乙二線甲線為三分今將甲線依三分之一分作廣分為三小方形並無餘積而乙線照甲線分則為四分有零亦將乙線依甲線一分作廣分則為四小方形而餘戊一小形以所作甲丙為横乙丁為縱則成一丁甲四方形而此形之内必有十二小方形仍有三小戊形附於十二方形乃為二線相乘之總積也又如此類一線有零分者其餘分在一邊若二線俱有零分者則其餘分亦在二邊矣第七凡三數遞乘為立方數如二與三相乘得六又以四乘之得二十四是也試將二三四之三數作㸃排之縱列二㸃為甲丁横列三㸃為甲乙將此三㸃累二次成丁乙平方數又直立四㸃為丙丁依丙丁數將丁乙平方數累四次即成丙乙立方數矣又若相等三數遞乘得數則為正立方數如三與三乘得九再以三乘得二十七是也試將三數縱橫各排三㸃平列三次成庚已平方數又直立三㸃將庚己平方數累三次即成戊已正立方數矣第八凡數之遞乘為體可用面以表之葢面雖無厚分如依一面之積分廣爲小方體看面所有積分得線之長分若干將面所有小方體加作幾倍則線面因之而成體矣設如有甲乙面之分為四丙丁線之分為三將此面線相乘則依甲乙面四分之一作厚分為四小方體乃依丙丁線分數將甲乙加為三倍即成函十二小方體之丙乙直角立方體矣葢體為面之積而面為線之積故線可以測面并可以測體也第九除者兩數相較而分也葢視大數内有小數之幾倍將大數照小數減幾次則大數分而復為一小數故謂之相較而分然不用減而用除者何也葢減必遞消其分除則一歸而即得除之與減即猶乘之與加正相對待者也如有大數十二小數四若用十二以四減之三次而盡即知十二為四之三倍若用除法則三倍其四與十二較其數適等即知十二為四之三倍矣此除之與減理相通而用較捷也第十凡兩數相乗之平方數以一數除之必得其又一數也設如甲乙五乙丙六兩數相乘之甲乙丙丁平方數三十若以甲乙五除之即得乙丙六或以乙丙六除之即得甲乙五葢此三十中有五之六倍六之五倍如作㸃排之五㸃為横則縱排六次六㸃為橫則縱排五次皆成方數故兩數不等平方面知其一數或知兩數相差之較始能得其兩邊線也又若正方數則其縱横皆同如戊己庚辛之正方數二十五其縱橫皆五是巳故凡正方面有積數即可得其每邊者葢因其縱橫兩邊皆等故也第十一凡以線乘線即成面而以線除面亦復得線故數之乘者可用線以表之而除者亦可用線以表之也設如有甲乙丙丁一方面積一十二以甲乙線四分除之得乙丙線之三分或以乙丙線三分除之亦得甲乙線之四分試將甲乙乙丙二線作廣分則甲乙線成四小方形乙丙線成三小方形若依甲乙線所有數以分甲乙丙丁面即每分得三小方形如乙丙線依乙丙線所有數以分甲乙丙丁面即每分得四小方形如甲乙線葢除之與乘猶分合之相對以線合者仍以線而分返本還原之義有不爽矣第十二凡有零分不均二線相乘之方面以整分線除之必得零分線以零分線除之必得整分線也設如甲線三分乙線四分有零相乘成丁甲面若以甲線三分除之即得乙線四分有零或以乙線四分有零除之亦得甲線三分試將甲線作廣分成三小方形為甲丙乙線作廣分則成四小方形為乙丁餘戊一小形若依甲丙線所有數以分丁甲面即每分得四小方形一戊小形如乙丁線或依乙丁線所有數以分丁甲面即每分得三小方形如甲丙線矣此為二線一整一零相乘之總積故以整線除之得零以零線除之得整若二線俱有零分者彼此除之必俱得零分也第十三凡三數遞乘之立方數以兩數遞除之始得其又一數也設如甲乙四乙丙二丙丁三遞乘得甲丁立方數二十四若以甲乙四除之得乙丁平方數六再以乙丙二除之始得丙丁三葢乙丁平方中有三之二倍而甲丁立方中有六之四倍如作㸃排之二㸃為縱橫排三次直累四次即成方體故三數不等立方體知其兩數或知其三數相差之較始能得各邊也又若正立方體其縱橫厚度皆為一數即以一數遞除二次則其原數自得如戊己正立方數二十七其縱横厚皆三是巳故凡正立方體有積數即可得其每邊者正為其縱横厚度皆等故也第十四凡以線除體即得面而以面除體亦復得線故線可以除面而面亦可以除體也設如有丙乙體積一十二以丙丁線三分除之得甲乙面之四分或以甲乙面四分除之亦得丙丁線之三分試將甲乙面作厚分則成四小方體若依丙丁線所有數以分丙乙體即每分得四小方體如甲乙面依甲乙面所有數以分丙乙體即每分得三分如丙丁線葢體本以線面相乗而得故可以線面相除也第十五凡大數用小數可以度盡者此大數必為此小數之所積也然所謂小數可以度盡大數者復有幾種有大數惟一數可以度盡者如四九二十五四十九之類惟用二可以度四三可以度九五可以度二十五七可以度四十九是也有大數用兩數三數俱可以度盡者如八與十二之兩數用二用四俱可以度盡八用二用三用四俱可以度盡十二是也有兩大數或三大數用一小數俱可以度盡者如十二十六之兩數或一十十五二十之三數用四可以度盡十二十六之兩數用五可以度盡一十十五二十之三數是也又有一小數可以度盡幾大數將此幾大數相加為一總數此小數亦可以度盡此總數如四可以度盡十二十六兩數若將十二十六相加為二十八則此四亦可以度盡此二十八也又或一小數可以度盡幾大數將此大數不拘幾分分之此小數可以度盡一分亦必可以度盡其餘幾分也如三可以度盡十五將十五分為六九兩數此三可以度盡六亦必可以度盡九也又如六與九兩數用三俱可以度盡若將六與九相乘得五十四此小數三仍可以度盡此五十四也凡此類者皆為彼此有度盡之數也第十六凡大數用小數不可以度盡者此大數必非此小數之所積也然用一以度之無不可以度盡者葢一為數之根諸數皆自一而積之故也所謂度不盡者亦復有幾種有大數無小數可以度盡者如五七十一十三之類任用二用三用四俱不能度盡也有兩大數或三大數用小數彼此不可以度盡者如十五與八之兩數用二用四可以度盡八而不能度盡十五用三用五可以度盡十五而不能度盡八又如四六九之三數用二可以度盡四六而不能度盡九用三可以度盡六九而不能度盡四也又有彼此不能度盡之數或將一數自乘或將兩數俱自乘彼此仍俱不可以度盡也如五與六之兩數彼此不能度盡亦無一小數可以度盡此兩數即將五自乘為二十五或將六自乘為三十六則六仍不能度盡二十五而五仍不能度盡三十六即二十五亦不能度盡三十六也又如三七兩數與二五兩數俱為彼此不能度盡之數或將三與七相乘得二十一將二與五相乘得一十此一十與二十一之兩數仍為彼此不能度盡之數也凡此類者皆為彼此無度盡之數也第十七凡兩數互轉相減未至於一而即可以減盡者此減盡之最小數即可以度盡此兩數也設如有甲乙十六丙丁六之兩數將丙丁六與甲乙十六減二次餘戊乙四將此戊乙四轉與丙丁六相減餘己丁二又將此已丁二轉與戊乙四相減二次即無餘則此已丁二即可以度盡甲乙十六及丙丁六矣葢八倍其二與十六等三倍其二與六等也又如十六與十二與八此三數亦為彼此有度盡之數何也葢十六與十二相減餘四以四轉與十二相減三次而盡則四可以度盡十六與十二矣又二倍其四即與八等則四又可以度盡八然則十六十二與八之三數為彼此有度盡之數可知矣第十八凡兩數互轉相減至於一始可以減盡者一之外别無他小數可以度盡此兩數也設如有甲乙十二丙丁七之兩數將丙丁七與甲乙十二相減餘戊乙五將此戊乙五轉與丙丁七相減餘已丁二將此已丁二又轉與戊乙五相減餘庚乙三又將庚乙三轉與己丁二相減餘辛乙一既至於一始可以度盡甲乙丙丁兩數而一之外如二三四雖可以度盡十二而不能度盡七也又如九與十三及二十之三數亦為彼此無度盡之數何也葢將九與十三互轉相減必至於一即用十三與二十轉減或用九與二十轉減亦皆至於一則除此一之外皆無可以彼此度盡此三數之小數矣第十九凡有大數約為相當比例之最小數以從簡易則為約分法也然數有可約不可約之分可約者度盡之數不可約者度不盡之數也設如有九與十二之兩數欲約為相當比例之最小數乃用求小數度盡大數法以九與十二互轉相減得減盡之數為三則三為度盡九與十二之數矣以三除九得三以三除十二得四此三四兩數即為九與十二相當比例之最小數也又如有六四八之三數欲約為相當比例之最小數乃以六與四互轉相減得減盡之數為二又以二與八相減四次而盡則二為度盡六四八之小數矣以二除六得三以二除四得二以二除八得四此三二四三數即六四八相當比例之最小數也此皆數之可約者也若夫數之不可約者互轉相減必至於一而不可以度盡也如有五七兩數以五減七餘二復以二減五二次餘一既餘一則自一之外必無可以度盡之數而不可約矣第二十凡有大分以分母乘之通為小分則為通分法也然不曰乘而曰通者何也葢乘則積少成多其得數溢於原數之外通則變大為小其得數仍函於原數之中也如有大分十二其分母為四欲得其小分則以分母四乘大分十二得小分四十八是已試作甲乙方形以明之其中所函方形十二即大分也若將中函之方形每分俱分為四小方則十二方形共分為四十八小方形矣其數雖比原大數加四倍然其每分之分只得原數之四分之一故仍函於甲乙方形之内而未嘗溢出原數之外也又如有大分九其分母為九欲得其小分則以分母九乘大分九得小分八十一是已試作丙丁方形以明之其中所函方形九即大分也若將其中函之方形每分俱分為九小方則九方形共分為八十一小方形矣其數雖比原大數加九倍而仍函於丙丁方形之内者以其每分之分只得原數之九分之一也由此推之其每分之母或為八或為十二或為數十亦皆倣此通之其所通之數雖至千萬而要皆未有溢於所通原分之外者矣第二十一凡有幾小數欲求俱可以度盡之大數則以此幾小數連乘之得數始為此幾小數度盡之一大數也設如有四五兩小數欲求用四用五俱可以度盡之一數則以四與五相乘得二十即為四五兩數俱可度盡之一大數矣又如有三四五之三小數欲求用三用四用五俱可以度盡之一數則以三與四相乘得十二又以五乘十二得六十即為三四五俱可度盡之一大數矣葢小數為大數之根始能度盡大數如四五可以度盡二十者二十乃四之五倍亦即五之四倍也三四五可以度盡六十者六十乃十二之五倍而十二乃三之四倍也第二十二凡有兩數彼此互乘所得之數與原數比例必同也葢數有多寡而分又有大小則紛紜難御故必依此數之分將彼數加為幾倍又依彼數之分將此數加為幾倍則兩分數既同而比例亦同矣如甲乙二數甲為三分之二乙為四分之三欲辨其孰大則依甲數將乙數加三倍為十二分之九依乙數將甲數加四倍為十二分之八如是則所加之兩大分同為十二而所生之兩小分相比即同於原甲數與乙數之相比矣何也甲數本三分之二而為十二分之八者乃加四倍之比例十二為三之四倍八為二之四倍而十二分之八之比例仍同於三分之二之比例也乙數本四分之三而為十二分之九者乃加三倍之比例十二為四之三倍九為三之三倍而十二分之九之比例仍同於四分之三之比例也此即互乘同母之法如甲為三分之二者三即母數二即子數也乙為四分之三者四即母數三即子數也因兩母數不同故用互乘以同之第二十三凡子母分有幾數而子數同為一者先以各母求俱能度盡之一數次以各母除之則爲各子數也如甲乙丙三數甲為二分之一乙為三分之一丙為四分之一則先以三母數連乘得二十四為甲乙丙之共母數又以二除共母數得十二為甲之子數以三除共母數得八為乙之子數以四除共母數得六為丙之子數葢甲本二分之一子母各加十二倍即為二十四分之十二而二十四與十二之比例仍同於二與一之比例也乙本三分之一子母各加八倍即為二十四分之八而二十四與八之比例仍同於三與一之比例也丙本四分之一子母各加六倍即為二十四分之六而二十四與六之比例仍同於四與一之比例也第二十四凡子母分有幾數而子母數俱不等者亦先以各母求俱能度盡之一數次以各母除之得數復以各子數乘之即為各子數也如有甲乙丙三數甲為三分之二乙為四分之三丙為五分之四則先以三母數連乘得六十為甲乙丙之共母數次以三除共母數得二十以乘子數二得四十為甲之子數又以四除共母數得十五以乘子數三得四十五為乙之子數又以五除共母數得十二以乘子數四得四十八為丙之子數葢甲本三分之二子母各加二十倍即為六十分之四十而六十與四十之比例仍同於三與二之比例也乙本四分之三子母各加十五倍即為六十分之四十五而六十與四十五之比例仍同於四與三之比例也丙本五分之四子母各加十二倍即為六十分之四十八而六十與四十八之比例仍同於五與四之比例也算法原本二第一凡有幾小數與幾大數相比其比例若同則小數相加所得之總數與大數相加所得之總數相比仍同於原數之比例也設如有一小數六一小數四一大數十八一大數十二其小數六為大數十八之三分之一而小數四亦為大數十二之三分之一將兩小數六四相加得一十將兩大數十八十二相加得三十此一十與三十之比即如六與十八四與十二之比皆為三分之一之比例也又如三小數二三四與三大數六九十二相比皆為三分之一將二三四相加得九將六九十二相加得二十七其比例亦為三分之一也又或四小數四大數相加其總數之比例亦皆同如三與十二四與十六五與二十六與二十四俱為四分之一將三四五六四小數相加得十八將十二十六二十二十四四大數相加得七十二其比例仍為四分之一矣第二凡有幾小數與幾大數之比例若同則小數相減所得之餘數與大數相減所得之餘數相比仍同於原數之比例也設如有一小數十一小數六一大數三十一大數十八其小數十為大數三十之三分之一而小數六亦為大數十八之三分之一將兩小數十與六相減餘四將兩大數三十與十八相減餘十二此四與十二之比即如十與三十六與十八之比皆為三分之一之比例也又如三小數八四三與三大數二十四十二九相比皆為三分之一將四三與八遞相減餘一將十二九與二十四遞相減餘三其比例亦為三分之一也又或四小數四大數相減其餘數之比例亦皆同如十八與七十二為四分之一而三與十二四與十六五與二十俱為四分之一將小數三四五與十八遞相減餘六將大數十二十六二十與七十二遞相減餘二十四其比例仍為四分之一矣第三凡有一數乘兩數其所得兩數相比仍同於原兩數之相比也設如一數六與八與一十兩數相乘以六乘八得四十八以六乘一十得六十此四十八與六十相比即同於原數八與一十之相比矣夫八與四十八一十與六十皆為六分之一故一與六之比同於八與四十八之比而一與六之比亦同於十與六十之比也然則八與四十八之比例必同於十與六十之比例而四十八與六十之比例亦必同於八與一十之比例可知矣第四凡有一數除兩數其所得兩數相比仍同於原兩數之相比也設如一數三除十二與十五之兩數以三除十二得四以三除十五得五則此四與五相比即同於原數十二與十五之相比矣夫十二與四十五與五皆為三分之一故一與三之比同於四與十二之比而一與三之比亦同於五與十五之比也然則四與十二之比例必同於五與十五之比例而四與五之比例亦必同於十二與十五之比例可知矣第五凡相當比例四數其第一數與第四數相乘第二數與第三數相乘所得之數等者何也葢兩方面以其縱横界互相為比之比例若等則兩方積必等見幾何原本七卷第三節今以第一數與第四數相乘即如以第一數為縱第四數為横成一方數而第二數與第二數相乘即如以第二數為縱第三數為横成一方數其積必相等也設如有二與六三與九相當比例四數將第一數二為縱第四數九為横相乘得十八為甲丙一方數將第二數六為縱第三數三為横相乘亦得十八為戊庚一方數夫甲丙方之甲丁横界比戊庚方之戊辛横界大三分之二而戊庚方之戊己縱界比甲丙方之甲乙縱界亦大三分之二其比例相等故兩方數亦等此兩方數既等則相當比例四數其第一數與第四數相乘第二數與第三數相乘所得之數相等無疑矣第六凡相連比例三數其首數與末數相乘與中一數自乘所得之數等者何也葢兩方面相等者其縱横界之互相比例必等見幾何原本七卷第三節今將首數與末數相乘即如以首數為縱末數為横成一方數而中數自乘即是以中數為縱復以中數為横成一方數其積必相等也設如有四六九相連比例三數將首數四為縱末數九為横相乘得三十六為甲丙一方數將中數六為縱仍復為横相乘即是自乘亦得三十六為戊庚一方數夫甲丙方之甲丁横界比戊庚方之戊辛横界大三分之一而戊庚方之戊己縱界比甲丙方之甲乙縱界亦大三分之一其比例相等故兩方數亦等此兩方數既等則相連比例三數其首末兩數相乘與中數自乘所得之數相等無疑矣第七凡有兩數除一數其所得兩數之比例即同於原兩數之轉相比例也設如有一數十八以二三兩數除之二除十八得九三除十八得六以此九與六兩數相比即同於原兩數三與二之相比也葢二與三六與九為相當比例之四數以第一數二與第四數九相乘第二數三與第三數六相乘皆得十八故二除十八得九即如以第一數除第二數與第三數相乘之數而得第四數也以三除十八得六即如以第二數除第一數與第四數相乘之數而得第三數也夫相當比例數其第二數與第四數之比原同於第一數與第三數之比故第一數二除十八所得之九與第二數三除十八所得之六相比即同於第二數三與第一數二之相比也第八凡有兩數除一數其所得之兩數内有一數與原兩數内一數相等者則所得之兩數與原兩數互轉相比即成相連比例之數也設如有一數三十六以四六兩數除之四除三十六得九六除三十六仍得六與原數六相等則此九與六兩數之比即同於原數六與四之比也葢四與六六與九為相連比例之四數以四為首數九為末數相乗以六為中數自乘皆得三十六今以四除三十六得九即如以首數除中數自乘之數而得末數也以六除三十六復得六即如以中數除首末兩數相乘之數而仍得中數也夫相連比例數其末數與中數之比原同於中數與首數之比則首數四除三十六所得九與中數六除三十六所得六相比即同於中數六與首數四之相比也第九凡相當比例四數其第一數度盡第二數則第三數亦必度盡第四數也如有二六三九相當比例四數其第一數二可以度盡第二數六則第三數三亦可以度盡第四數九矣夫相當比例四數第一與第二之比必同於第三與第四之比今第一為二第二為六乃加三倍之比例則第四與第三亦必為加三倍之比例故三倍其二可以度盡六者三倍其三即可以度盡九也第十凡相連比例三數其第一數度盡第二數亦必度盡第三數也如有二四八相連比例三數其第一數二可以度盡第二數四亦必可以度盡第三數八矣夫相連比例三數第一與第二之比同於第二與第三之比今第一數為二第二數為四乃加倍之比例則第二與第三亦必為加倍之比例而第一與第三則為再加一倍之比例故一倍其二可以度盡四者再倍其二即可以度盡八也第十一凡依次遞加取四數其第一第四兩數相加與第二第三兩數相加之數等也如一二三四遞加之四數將第一數一與第四數四相加得五以第二數二與第三數三相加亦得五又如一三五七遞加之四數一三五七為隔一數以遞加者也將第一數一與第四數七相加得八以第二數三與第三數五相加亦得八也又如二五八十一遞加之四數二五八十一為隔二數以遞加者也將第一數一與第四數十一相加得十三以第二數五與第三數八相加亦得十三由此推之或隔三數或隔四數或隔五六數以至極多數但依次遞加取四數無有不如此也第十二凡依次遞加取三數其首末兩數相加與中數加倍之數等也如二三四遞加之三數將首末二四相加得六以中數三倍之亦得六又如二四六遞加之三數二四六隔一數以遞加者也將首末二六相加得八以中數四倍之亦得八也又如三六九遞加之三數三六九隔二數以遞加者也將首末三九相加得十二以中數六倍之亦得十二由此推之或隔三數或隔四數或隔五六數以至極多數但依次遞加取三數無有不合者也第十三凡依次遞加三數以第二第三兩數相加減去第一數即得挨次之第四數也如二三四之三數以第二數三第三數四相加得七内減去第一數二得五即是第四數又如二四六隔一數遞加之三數以第二數四第三數六相加得一十内減去第一數二得八即是第四數亦為隔一數又如三六九隔二數遞加之三數以第二數六第三數九相加得十五内減去第一數三得十二即是第四數亦為隔二數矣葢此即四率相當比例之理四率中兩率相乘與首末兩率相乘之數等故中兩率相乘以首率除之即得末率而此則中兩數相加與首末兩數相加之數等故以首一數減之即得末一數其義一也第十四凡依次遞加兩數以第二數倍之減去第一數即得挨次之第三數也如二三兩數將第二數三倍之得六内減去第一數二餘四即是第三數又如二四隔一數之兩數將第二數四倍之得八内減去第一數二餘六即是第三數四與六亦為隔一數也又如三六隔二數之兩數將第二數六倍之得十二内減去第一數三餘九即是第三數九與六亦為隔二數也葢此即三率相連比例之理三率以中率自乘與首末兩率相乘之數等故中率自乘以首率除之即得末率而此則中數倍之與首末兩數相加之數等故以首數減之即得末數於此見加減乘除之相對待而加減可以代乘除之理亦可從此推矣第十五凡有彼此可以度盡兩數欲求相連比例之數則以一數自乘以一數除之即得相連比例之第三數也如有四八兩數欲求第三數如四與八之相連比例乃以八自乘得六十四以四除之得十六此十六即為四與八相連比例之第三數葢八者四之二倍而十六又為八之二倍則八與十六之比例必同於四與八之比例矣如有三數求第四數仍如四與八之比例則以第三數十六自乗得二百五十六以第二數八除之得三十二即為四八十六相連比例之第四數葢十六者四之四倍而三十二者八之四倍則十六與三十二之比例必同於四與八八與十六之比例矣如欲求連比例之第五數或第六數即以相近兩數依前法算之由此遞生可至於無窮焉然此皆四與八之比例或四與十六或三與六五與十之類凡有彼此度盡之數欲求相連比例幾數者亦皆如此求之無不可得矣第十六凡有彼此不可以度盡之兩數欲依此兩數比例求相連比例之數則以一數自乘為第一率而以又一數自乘為第三率以兩數互乘為第二率即為相連比例之三數也如有三五兩數欲求相連比例三數皆如三與五之比例乃以三自乘得九以五自乘得二十五以三與五相乘得十五此九與十五十五與二十五之三數即如三與五之相連比例三數葢九為三之三倍而十五為五之三倍則九與十五為三與五之比例矣而十五為三之五倍二十五為五之五倍則十五與二十五亦為三與五之比例矣又或已有三數欲求第四數皆如三與五之連比例則以三乘九得二十七以三乘十五得四十五以三乘二十五得七十五復以五乘九得四十五五乘十五得七十五五乘二十五得一百二十五此所得六數内四十五七十五各得二今止用其一故二十七四十五七十五一百二十五之四數即如三與五之相連比例數也葢二十七者三之九倍而四十五者五之九倍則二十七與四十五之比例同於三與五之比例矣又四十五者三之十五倍而七十五者五之十五倍則四十五與七十五之比例同於三與五之比例矣又七十五者三之二十五倍而一百二十五者五之二十五倍則七十五與一百二十五之比例亦同於三與五之比例矣如欲求連比例之第五數或第六數以原一數遞乘先得之幾數復以又一數遞乘先得之幾數去其相同者所餘即成相連比例之數由此求之亦可至於無窮也然此皆三與五之比例或三與七四與九五與八之類凡彼此不可以度盡之數欲求相連比例幾數者亦皆倣此求之而即得矣第十七凡相當比例四數其前兩數之間有相連比例二數其後兩數之間亦必有相連比例二數也設如有甲二十四乙八十一丙三十二丁一百零八相當比例之四數甲數二十四與乙數八十一之間有戊三十六己五十四之相連比例兩數則丙數三十二與丁數一百零八之間亦必有庚四十八辛七十二之相連比例兩數也試將甲戊己乙四數求其相當比例之至小數則得壬八癸十二子十八丑二十七之四數其甲與乙之比即同於壬與丑之比而丙與丁之比原同於甲與乙之比則丙與丁之比亦必同於壬與丑之比矣其比例既同則壬可以度盡丙丑亦可以度盡丁而癸與子亦必可以度盡庚與辛壬癸子丑各四倍之即與丙庚辛丁等是四次可以度盡也是丙庚辛丁四數之比皆與壬癸子丑四數之比相同也夫壬癸子丑原為甲戊己乙連比例相當之小數今丙庚辛丁之比既與之相同則丙庚辛丁亦為相連比例之四數矣既俱為相連比例數則戊己為甲乙兩數間之連比例數庚辛為丙丁兩數間之連比例數無疑矣第十八凡相連比例三數其第一數與第二數之間有相連比例一數則第二數與第三數之間亦必有相連比例一數也設如有甲二乙十八丙一百六十二相連比例之三數其甲數二與乙數十八之間有相連比例之丁數六則乙數十八與丙數一百六十二之間亦必有相連比例之戊數五十四也葢甲與乙之比同於乙與丙之比今丁六為甲二之三倍戊五十四亦為乙十八之三倍則甲與丁之比同於乙與戊之比而丁六為乙十八之三分之一戊五十四亦為丙一百六十二之三分之一則丁與乙之比亦同於戊與丙之比因其比例皆同故甲丁乙戊丙為相連比例之五數而丁戊兩數為甲與乙乙與丙三數間之相連比例數可知矣第十九凡相連比例三數其首數與末數有用一數可以度盡者有用一數不可以度盡者如四八十六相連比例之三數其首數四與末數十六為彼此有一數可以度盡之數也如四六九相連比例之三數其首數四與末數九為彼此無一數可以度盡之數也然此兩種相連比例雖有度盡度不盡之分因其首數與中數之比同於中數與末數之比故總謂之相連比例之數焉葢末數可用首數平分即為有度盡之連比例數末數不可用首數平分即為無度盡之連比例數也且首末兩數彼此有一數可以度盡者此三數非相當比例之至小數若首末兩數彼此無一數可以度盡者此三數即為相當比例之至小數也如四八十六之三數其首末兩數為彼此有一數可以度盡之數而中數亦必為此一數可以度盡之數試用二以度之則得二四八之連比例三數或用四以度之則得一二四之連比例三數皆與四八十六之比例相同而比四八十六之數為小故四八十六非相當比例之至小數也如四六九之三數其首末兩數為彼此無一數可以度盡之數故中數亦為無一數可以度盡之數既無一數可以彼此度盡則為相當比例數内之至小數也明矣第二十凡同式兩平方數其間必有相連比例一數也如有甲乙丙丁六戊己庚辛二十四同式兩平方數此兩數之間必有壬十二為相連比例之一數焉葢甲乙丙丁戊己庚辛既為同式平方數則其每邊皆可為比例如甲乙二與甲丁三之比同於戊己四與戊辛六之比而甲乙二與戊己四之比亦同於甲丁三與戊辛六之比也今以甲丁三與甲乙二相因得六甲丁三與戊己四相因得十二則六與十二之比同於甲乙二與戊己四之比矣又戊己四與甲丁三相因得十二戊辛六與戊己四相因得二十四則十二與二十四之比同於甲丁三與戊辛六之比矣夫甲丁三與戊辛六之比原同於甲乙二與戊己四之比則六與十二之比亦必同於十二與二十四之比矣又若兩正方數之間亦必有相連比例之一數也如有甲四丙九兩正方數此四與九兩數之間必有乙六為相連比例之一數焉葢兩正方數其式既同故必有相連比例一數且兩正方數之比例同於其兩邊所作連比例隔一位之比例見幾何原本七卷第五節今甲方邊為二丙方邊為三求其與二三相當連比例之第三數則以二自乘得四以三自乘得九以二乘三得六此四與六六與九之三數即為與二三相當之連比例數而其首數四與末數九既與甲丙兩方數等則中數六亦必為甲丙兩方數間之連比例數矣第二十一凡同式兩平方數相乘得數為正方數也如有甲乙丙丁六戊己庚辛二十四為同式兩平方數相乘得一百四十四即為正方數矣葢同式兩平方數之間原有相連比例一數今此六與二十四之間必有十二之一數且連比例三率以首末兩率相乘與中率自乘之數等則此六與二十四兩平方數相乘所得之一百四十四即為中率十二自乘之數矣又若兩正方數相乘得數亦仍為正方數其方根即原兩方根相乘之數也如有甲四丙九兩正方數此兩數相乘得三十六仍為正方數其方根為六亦即甲方根二與丙方根三相乘之數也葢此兩方數俱為正方即為同式兩平方數矣因其式同故相乘亦仍得正方數也凡數有先各自乘而後相乘者有先相乘而後自乘者其理無異故其得數皆等今以二自乘得四以三自乘得九復以四九相乘得三十六此先各自乘而後相乘也以二與三相乘得六復以六自乘得三十六此先相乘而後自乘也且四與九積也積與積乘仍得積二與三根也根與根乘仍得根此亦理之必然者也第二十二凡兩正立方數之間必有相連比例之兩數也如有甲八丁二十七兩正立方數此八與二十七之間必有乙十二丙十八為相連比例之兩數焉葢兩正立方之比例同於其兩邊所作連比例隔二位之比例見幾何原本十卷第四節今甲方邊為二丁方邊為三求其與二三相當連比例之第三第四數則以二自乘得四以三自乘得九以二與三相乘得六此四六九為連比例三數又以二遞乘此四六九三數得八十二十八之三連比例數復以三遞乘四六九三數得十二十八二十七之三連比例數除相同者不計其二十七即連比例之第四數則八與十二十二與十八十八與二十七皆為與二三相當之連比例數而其首數八與末數二十七既與甲丁兩立方數等則其中數之十二十八為甲丁兩立方數間連比例之兩數可知矣第二十三凡兩正立方數相乘得數仍為正方數而其方根即原兩立方根相乘之數也如有甲八丁二十七兩正立方數此兩數相乘得二百一十六仍為正立方數而其方根為六亦即甲立方根二與丁立方根三相乘之數也葢此兩立方數俱為正方即為同式兩立方數矣因其式同故相乘亦仍得正立方也凡數有先自乘再乘而後以所得之數相乘者有先以兩數相乘而後以所得之數自乘再乘者其得數皆等故二自乘再乘得八三自乘再乘得二十七復以八與二十七相乘得二百一十六此先各自乘再乘而後以所得之數相乘也以二與三相乘得六復以六自乘再乘亦得二百一十六此先以兩數相乘而後以所得之數自乘再乘也且八與二十七積也以積乘積仍得積二與三根也以根乘根仍得根此又理之自然者也第二十四凡兩平方數若一邊相等則此兩平方之比例同於其不等邊之比例也如有甲丙戊庚兩平方數其甲丙平方之甲乙邊為四而戊庚平方之戊已邊亦為四甲丙平方之乙丙邊為六而戊庚平方之己庚邊為八則此兩平方數二十四與三十二之比即同於其不等邊六與八之比也葢甲乙平方數二十四者四之六倍而戊庚平方數三十二者四之八倍也然則二十四與三十二之比即同於六與八之比矣二十四與三十二之比既同於六與八之比則兩平方數之比例同於其不等邊之比例可知矣第二十五凡兩立方數其底積相等則此兩立方之比例同於其髙之比例也如有甲乙丙丁兩立方數其甲乙立方之戊乙底為六而丙丁立方之己丁底亦為六甲乙立方之甲戊髙為四而丙丁立方之丙己髙為五則此兩立方數二十四與三十之比即同於其兩立方之高四與五之比也葢甲乙立方數二十四者六之四倍而丙丁立方數三十者六之五倍也然則二十四與三十之比即同於四與五之比矣二十四與三十之比既同於四與五之比則兩立方數之比例同於其髙之比例可知矣第二十六凡兩線兩面兩體用一度如尺寸之屬可以度盡者此類之線面體皆為有整分可以度盡者也設如有甲乙兩線甲線分為五分乙線如甲線度分之得七分無餘則此二線即為一度彼此可以度盡者矣若將此二線各為正方面各為正方體則其兩面兩體亦皆為整分彼此可以度盡者也至如兩線兩面兩體不可以一度度盡者此類之線面體皆為無整分可以度盡者也如丙丁戊己方面其丙丁邊線為五分而丙戊對角線則為七分有餘乃為彼此無度盡之數矣葢以丙丁邊之五分為度則丙戊線得七分有餘或將丙戊線為七分整而以其分為度則丙丁線得五分不足凡此類之線面體皆為無整分彼此可以度盡之數也第二十七凡正方一邊線與對角線無一度可以彼此度盡者葢以本方積與對角線所成方積比之必有一數非正方數也夫對角線自乘所作之方數為本方積之二倍如本方積一則對角線所作之方為二本方積四則對角線所作之方為八此一與二四與八之間無相連比例之整數故一為正方數則二非正方數四為正方數而八亦非正方數二與八既非正方數則邊必有零餘而不能盡矣或對角線所作方積為四則本方積為二對角線所作方積為十六則本方積為八此四與二十六與八之間亦無相連比例之整數故四為正方數而二非正方數十六為正方數而八又非正方數然則對角線所作方積固為正方數而本方積復不能成正方數其邊必有零餘而不能盡矣故凡正方邊線與對角線斷無一度可以彼此度盡之理也第二十八凡正方面與平圓面同徑者其積之比例同於其周圍邊線之比例也如甲乙丙丁正方面戊己庚辛平圓面其戊壬庚之徑相等則此方積與圓積之比例同於方周於圓周之比例也何以見之以正方面之壬庚半徑為髙甲乙乙丙丙丁丁甲之全周為底作一子甲直角長形方則此長方形之積比正方形之積必大一倍又以壬庚半徑為髙庚己己戊戊辛辛庚全周為底作一壬庚直角長方形則此長方形之積比平圓形之積亦必大一倍凡直角三角形之小邊與圓形之半徑等而三角形之大邊與圓形之全周等者三角形之積與圓形之積等也今此長方形與三角形同底同髙其積比三角形必大一倍然則壬庚長方形比圓形大一倍可知也夫壬庚子甲兩長方形既同以壬庚為髙則一邊數等一邊相等則其積之比例必同於其不等邊之比例而全與全之比例原同於半與半之比例故兩長方形之比例必同於庚庚與甲甲之比例而方與圓之比例亦必同於庚庚與甲甲之比例矣甲甲即方周而庚庚即圓周然則方周與圓周之比例豈非方積與圓積之比例乎第二十九凡有不知之一大數用兩小數度之不盡而一有餘一不足者其一多一少之數相併以兩小數之較度之即得其度幾次之分與大數之幾何也如有一大數用小數五度之多一數用小數六度之又少四數則以多一與少四相加得五以六與五兩小數相減餘一為較數除之仍得五即知兩小數各度五次也試排㸃以明之其甲乙五即小數五丙丁六即小數六以甲乙五累五次則為甲乙己丙正方二十五多一為丁以丙丁六累五次則為甲戊丁丙長方三十少四為戊庚於甲戊丁丙長方三十内減去少數戊庚四為二十六於甲乙己丙正方二十五加入多數丁一亦為二十六是知大數有二十六用此五六兩小數各度五次之分也以丁一與戊庚四相加為丁戊五以小數甲乙五與丙丁六相減餘一以一除丁戊五仍得五與甲丙相等故甲丙為庚大數二十六之五次數也若以比例言之其小數五與六相減所餘一者乃度一次之較而一多一少相併之戊丁五者又為度五次之較故以所餘一與度一次之比即同於戊丁五與度五次之比其比例既同故其數亦相等也第三十凡有不知之一大數用兩小數度之不盡而俱有餘或俱不足者其兩有餘或兩不足之數俱相減以兩小數之較度之即得其度幾次之分與大數之幾何也如有一大數用小數六度之多五數用小數七度之仍多一數則以兩多數相減餘四以六與七兩小數相減餘一為較數除之仍得四即知兩小數各度四次也試排㸃以明之其甲乙六即小數六丙丁七即小數七以甲乙六累四次則為甲乙庚丙方二十四多五為戊丁己以丙丁七累四次則為甲戊丁丙方二十八多一為己於甲乙庚丙方二十四加入多數戊丁己五得二十九於甲戊丁丙方二十八加入多數己一亦得二十九是知大數有二十九用此六七兩小數各度四次之分也以己一與戊丁己五相減餘戊丁四以小數甲乙六與丙丁七相減餘一以一除戊丁四仍得四與甲丙相等故甲丙為度大數二十九之四次數也若以比例言之其兩小數相減所餘之一乃度一次之較兩多數相減所餘之戊丁四乃度四次之較故以一與度一次之比即同於戊丁四與度四次之比也又如有不知之一大數用小數八度之少二數用小數九度之少六數則以兩少數相減餘四以八與九兩小數相減餘一為較數除之仍得四即知兩小數各度四次也今作㸃排之其甲乙八即小數八丙丁九即小數九以甲乙八累四次則為甲乙己丙方三十二内少二數為乙庚以丙丁九累四次為甲戊丁丙方三十六丙少六數為乙庚丁戊於甲乙己丙方三十二内減去少數乙庚二為三十於甲戊丁丙方三十六内減去少數乙庚丁戊六亦為三十是知大數有三十用此八九兩小數各度四次之分也以乙庚二與乙庚丁戊六相減餘戊丁四以小數甲乙八與丙丁九相減餘一以一除戊丁四仍得四與甲丙為相等故甲丙為度大數三十之四次數也其比例亦以兩小數相減所餘之較比度一次之分即同於兩少數相減所餘之較比度幾次之分也復有不知之一大數用兩小數度之一小數度之而盡一小數度之而不盡或有餘或不足即以不盡之數或有餘之數或不足之數用兩小數之較度之即得其度幾次之分與大數之幾何其理皆相同也第三十一凡數自少至多遞加之而各有定率者謂之平加比例數也夫平加之數有毎次遞加一者為挨次遞加之數如一二三四之類是也有每次遞加二者為超位平加之數如一三五七之類是也或遞加三或遞加四或遞加五六皆是一理有每次増一加者為按位相加之數如一三六十之類其第二次加二第三次加三第四次加四是也有每次増二加者為按位自乘之數如一四九十六之類其第二次加三第三次加五第四次加七是也復有一種倍加者為挨次倍加之數如一二四八之類每次皆加二倍又如一三九二十七之類每次皆加三倍是也遞加之數雖多按其條理求之大抵不出此數端今各列數分析於後第三十二凡挨次遞加之數將首數與末數相加以位數乘之所得之數折半即為總數也如一二三四五六七八九之九數其毎次所加之數為一將首數一與末數九相加得十以位數九乘之得九十折半得四十五即是此九數之總數也何也夫挨次遞加之數為等邊三角平面形而兩數相乘即成四方形今以位數九為髙末數九為底相乘所得之正方形其數八十一較之總數則多較之總數加倍之數又少此所少即一行之數爰知位數與底數相乘所得之數比總數加倍之數少一行之數矣既知挨次遞加之數為三角形而位數與底數相乘之數為正方形又知位數與底數相乘之數幾等於總積加一倍之數則合兩三角形之數適當總積加一倍之方數矣兩三角形所合其底數必比高數大一數故末數九為底數者加首數一與髙相乘始成兩三角形所合之一方形焉試將此九數作㸃排之自上而下上一下九作為直角三角形復將此九數另作一直角三角形合於原三角形之側則成一長方形其高即位數其底即末數與首數相加之數其積即為總數加一倍之數也然則首數末數相加與位數相乘為總數之倍數可知矣又如四五六七八九之六數欲知其總數亦以首數四與末數九相加得十三為底以位數六乘之得七十八為長方形折半得三十九為總數其理與前同若但知首數為四末數為九不知位數則視首數四以上至一虛幾位今虚三位故以三與末數九相減餘六即位數也何也凡自一遞加之數其末數即位數今首數為四計自一是少三位矣故用三即為所少之位數於末數内減去所少之位即為今之所有之位數也第三十三凡超位平加之數亦將首數與末數相加以位數乘之得數折半為總數也如一三五七九十一之六數每次皆加二數將首數一與末數十一相加得十二以位數六乘之得七十二折半得三十六為此六位之總數也葢此超位平加之數與挨次平加之理無異其以首末兩數相加與位數相乘者總欲得此總數之倍數以便折半取之也試將此六位之數作六層排之上一下十一以首末數相加得十二而以位數乘之則六層皆為十二矣上層本首數一加末數十一而成十二下層本末數十一加首數一而成十二是首數末數俱加倍矣二層本第二數三加第五數九而成十二五層本第五數九加第二數三而成十二是第二數第五數俱加倍矣三層本第三數五加第四數七而成十二四層本第四數七加第三數五而成十二是第三數第四數亦俱加倍矣其每位之數皆倍則相乘所得之數豈非此總數之倍數乎由此推之毎次加三加四或加五加六以至加七加八加九之類凡係超位平加之數其理無不相同也第三十四凡毎次按位相加之數將位數加二與末數相乘取其三分之一即為總數也如一三六一十十五之五數其每次皆按位加之如第二位於第一位一上加二為三第三位於第二位三上加三為六是也將位數五加二與末數十五相乘得一百零五以三除之得三十五即是此五數之總數也如或止有位數或止有每一邊數求總數則以位數加一與位數相乘得數復以位數加二乘之取其六分之一即得總數也若止有每一邊數即以每一邊數加一與每邊數相乘得數復以邊數加二乘之取其六分之一得數亦同葢毎次按位相加之數層疊排之其式成等邊三角體其末一數即三角體底面數而位數即毎一邊之數今以位數加二為髙末數為底相乘即成平行面之三稜體凡同底同髙之平行面體為尖體之三倍則此平行面三稜體内必有等邊三角體之三倍故以三除之即得也然必以位數加二為髙者何也以三三角體相湊乃成上下相等之平行面體其髙必比原有之位數多二層兩三角面相合比原位數多一層今三三角體相合故必比原位數多二層也如止以位數為高即少二層之數而不足三三角體之分故必以位數加二乘之也其止有位數或每一邊數求總數以位數加一與位數相乘復以位數加二乘之而用六除者何也葢位數即底面之每邊數而底面又為等邊之三角面今以邊數加一與邊數相乘成長方面為三角體底面之倍數即如前挨次遞加數之兩三角面相合所成之長方形也凡等髙之體底數倍者積數亦倍彼以位數加二乘三角體之底所成之平行面三稜體既為等邊三角體之三倍矣今以位數加二乘三角體之倍底所成之平行面長方體又必為等邊三角體之六倍矣以兩三稜體相合即成長方體一三稜體為三角體之三倍則兩三稜體必為三角體之六倍矣故以六除平行面長方體之數而得等邊三角體之數也又或但知首數末數而不知位數則以末數倍之用一為較數開𢃄縱平方即得位數焉葢末數倍之者即兩三角面所合之長方也其闊即三角每邊數其長比闊多一數故用一為較開帶縱平方則得三角毎邊之數既得每邊數即得位數矣第三十五凡每次按位自乘相加之數將位數折半與末數相加復以位數加一乘之取其三分之一即為總數也如一四九十六二十五之五數其每位之數皆按位自乘之數如第二位之四即二自乘數第三位之九即三自乘數也將位數五折半為兩個半與末數二十五相加得二十七個半復以位數五加一為六乘之得一百六十五以三除之得五十五即為此五數之總數也如止有位數或止有每一邊數求總數則以位數加半個與位數相乘得數復以位數加一乘之取其三分之一即得總數也若只有每一邊數即以每一邊數加半個與每一邊數相乘得數復以每邊數加一乘之取其三分之一得數亦同葢按位自乘相加之數層疊排之其式成方底四角尖體其末一數即四角尖體底面數而位數即毎一邊之數今以位數折半與末數相加則成長方面為底再以位數加一為髙乘之即成平行面之長方體凡同底同髙之平行靣體為尖體之三倍則此平行面長方體内必有四角尖體之三倍故以三除之即得也然必以位數折半與末數相加為底復以位數加一為髙者何也葢三四角尖體相湊乃成上下相等之長方體其底比正方面必多半行其髙必比原有之位數多一層三等邊三角體相合比三角體原位數多二層今三方底四角尖體相合比原位數止多一層葢因方底比三角底式大一倍故四角體髙比三角體髙所加之數减一半也如止以末數為底則底必少半行之數止以位數為髙則髙復少一層之數必不足三四角尖體之分故以末數加位數之半而以位數加一乘之適足三四角尖體之分也其止有位數或每一邊求總數以位數加半個與位數相乘復以位數加一乘之而用三除之者何也葢位數即底靣之毎邊數而底面又為正方面今以邊數加半個與邊數相乘成長方面比正方止多半行之分其理即如求三角體總數以邊數加一與邊數相乘為三角體底之倍數也以位數加一與底面相乘成長方體比方底四角尖體大三倍即如求三角體總數以位數加二與倍底相乘為三角體之六倍也彼三角體底倍之為長方此四角體底數加半行即為長方彼三角體總數六倍爲同邊長方體此四角體總數三倍為同邊長方體故三角體以邊數加一與邊數相乘者今四角體以邊數加半與邊數相乘而三角體以位數加二為髙與倍底相乘者今四角體以位數加一與本底加半行相乘總之四角體底式比三角體底式大一倍故立法時三角體加數幾何而此四角體皆用其半也又或但知首數末數而不知位數則以末數開平方即得位數焉葢末數本為正方數故開方即得毎邊數既得毎邊數則得位數矣第三十六凡每次倍加之數將末數與加倍之數相乘減去首數復以所加之分數除之即得總數也如二四八十六四數為毎次以二倍之之數欲求其總數則以末數十六用二乘之因以二倍之故用二乘得三十二減去首數二為三十復以其所加分數一除之仍得三十即此四數之總數也葢以二加倍之數其末一數比前幾位之總數止多一首數故二乘末數則比末數多一分仍多一首數故減去首數二而以一除之即得總數也又如三九二十七八十一四數為毎次以三倍之之數欲求其總數則以末數八十一用三乘之以三倍之故用三得二百四十二減去首數三為二百四十復以其所加分數二除之得一百二十即為此四數之總數也葢以三加倍之數其末一數為前幾數之倍數而仍多一首數今三乘末數則比末數多二分仍多一首數三乘末數八十一則為八十一者有三除本數八十一仍為多二分也故必減去首數三而以二除之即得總數也又如四十六六十四二百五十六四數為毎次以四倍之之數欲求總數則以末數二百五十六用四乘之以四倍之故用四得一千零二十四減去首數四為一千零二十復以其所加分數三除之得三百四十為此四數之總數也葢以四加倍之數其末一數為前幾數之三倍而仍多一首數今四乘末數則比末數多三分仍多一首數四乘末數二百五十六則為二百五十六者有四除本數二百五十六仍為多三分也故必減去首數四而以三除之即得總數也凡此倍加之數不論加倍幾何皆為相連比例之數故其比例皆同如遞加二倍之數其四與八之比同於二與四之比即八與十六之比亦皆同於二與四之比也又如遞加三倍之數其九與二十七之比同於三與九之比即二十七與八十一之比亦皆同於三與九之比也即遞加四倍之數其十六與六十四之比同於四與十六之比即六十四與二百五十六之比亦皆同於一與四之比也總之以二倍加者皆一與二之連比例以三倍加者皆一與三之連比例以四倍加者皆一與四之連比例即推之以五倍加六倍加者其理亦無不相同也御製數理精藴上編卷五
