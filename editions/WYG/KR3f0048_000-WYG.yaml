body:
  text: 欽定四庫全書子部六御製數理精藴天文算法類二算書之屬提要臣等謹案御製數理精藴五十三卷康熈五十二年聖祖仁皇帝御定律厯淵源之第二部也上編五卷曰立綱明體其别有五曰數理本源曰河圖曰洛書曰周髀經解曰㡬何原本曰算法原本下編四十卷曰分條致用其别亦有五曰首部曰線部曰靣部曰體部曰末部又表八卷其别有四曰八線表曰對數闡㣲表曰對數表曰八線對數表皆通貫中西之異同而辨訂古今之長短如舊傳方程分二色為一法三色為一法四色五色以上為一法頭緒紛然所立假如僅可施之本例而不可移之他處至于正負加減法實並分母諸例率皆謬誤今則約之為和數較數和較兼用和較交變四例而和數不分正負較數任以一色為正即以相當之一色為負皆以異名相併同名相減實足正舊法之訛誤又割圓術古以徑一圍三為周徑之率宋祖沖之用圓容六邊起算元趙友欽用圓容四邉起算皆屢求勾股得徑一者周三一四一五九六二五泰西法亦同其率古今周率之宻無逾于此而舊所傳弧矢諸術周徑皆用古率又弧弦弦背互求諸術立法極為疏舛今則以六宗三要二簡法求得一象限内弦矢割切正餘八線立為一表洵極勾股弧矢之變又㡬何原本止于測面七卷以下徐光啟李之藻後無譯之者新法算書往往有雜引之處讀者未之能詳且理分中末線但有求作之法而莫知所用今則求得各等靣體及球内容外切各等靣體之積至十二等靣及二十等靣之體皆以理分中末線為之比例足以補測量全義量體諸率之簡畧至末部借根方法即古人天元一之術唐宋諸算家咸用之至眀而失傳是以顧應祥唐順之于元李冶測圓海鏡一書所立天元一皆茫然不觧今則具明其加減乗除之例而後根與平方以下諸乗方之多少者咸得其開法與古所云𢃄縱立方三乗方諸變同歸一揆且線靣體一以貫之而本法所不能求者皆可以借根而得至為精妙他若對數表以假數求真數比例規解以量代算皆西法之迥異於中法者咸為疏通證明繪圖立表粲然畢備寔為從古未有之書雖専門名家未能窺髙深于萬一也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
