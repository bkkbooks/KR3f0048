body:
  text: 欽定四庫全書御製數理精蘊下編卷二十九體部七各等面體互容更體形各等面體互容設如正方體每邊一尺二寸求内容四面體之每一邊幾何法以正方體每邊一尺二寸自乗得一尺四十四寸倍之得二尺八十八寸開平方得一尺六寸九分七釐零五絲六忽二微有餘即正方體内容四面體之每一邊也如圖甲乙丙丁正方體内容丁甲戊己四面體以四面體之六稜切於正方體之六面則四面體之每一邊即為正方體之每一面之對角斜線故用方邊求斜弦之法以一邊自乗倍之開平方即得内容四面體之每一邊也如有四面體之一邊求外切正方體之一邊則用斜弦求方邊法以四面體之一邊自乗折半開平方即得外切正方體之每一邊也設如正方體每邊一尺二寸求内容八面體之每一邊幾何法以正方體每邊一尺二寸自乗得一尺四十四寸折半得七十二寸開平方得八寸四分八釐五豪二絲八忽一微有餘即正方體内容八面體之每一邊也如圖甲乙丙丁正方體内容戊己庚辛壬癸八面體以八面體之六角切於正方體之六面則正方體之每一邊即與内容八面體之對角斜線等甲乙與戊庚等故用斜弦求方邊之法以一邊自乗折半開平方即得内容八面體之每一邊也如有八面體之一邊求外切正方體之一邊則用方邊求斜弦法以八面體之一邊自乗加倍開平方即得外切正方體之每一邊也設如正方體每邊一尺二寸求内容十二面體之每一邊幾何法以理分中末線之全分一為一率小分三八一九六六一為二率今所設之正方體每邊一尺二寸為三率求得四率四寸五分八釐三豪五絲九忽二微有餘即正方體内容十二面體之每一邊也如圖甲乙丙丁正方體内容戊己庚辛壬癸十二面體以十二面體之六稜切於正方體之六面則方正體之每邊與十二面體之兩邊相對之線等即十二面體中心至每邊正中之斜線之倍而正方體之每邊之半即為十二面體中心至每邊正中之斜線試將十二面體之正中截之則成十等邊之面形而其所截之處皆正當每邊之一半故其所截之子丑等線亦為戊己兩角相對斜線之一半而為十等邊形之一邊其子寅外切圜之半徑為中心至每邊正中之斜線即正方體每邊之一半子寅即如理分中末線之全分子丑即如理分中末線之大分而戊子每邊之半即如理分中末線之小分見球内容十二面體法故全分與小分之比同於今所設之正方體每邊之半與内容十二面體每邊之半之比即同於今所設之正方體之一邊與内容十二面體之一邊之比也如有十二面體之一邊求外切正方體之一邊則以十二面體之一邊為理分中末線之小分比例得全分即外切正方體之每一邊也設如正方體每邊一尺二寸求内容二十面體之每一邊幾何法以理分中末線之全分一為一率大分六一八三三九九為二率今所設之正方體每邊一尺二寸為三率求得四率七寸四分一釐六豪四絲零七微有餘即正方體内容二十面體之每一邊也如圖甲乙丙丁正方體内容戊己庚辛壬癸二十面體以二十面體之六稜切於正方體之六面則正方體之每邊與二十面體之兩邊相對之線等即二十面體戊庚兩角相對之斜線試自二十面體之戊庚二角類對角平截之則所截之面成戊己庚子丑五等邊之面形戊庚兩角相對斜線即如理分中末線之全分庚子與己庚等一邊即如理分中末線之大分見球内容二十面體法故全分與大分之比即同於今所設之正方體之毎一邊與内容二十面體之每一邊之比也如有二十面體之一邊求外切正方體之一邊則以二十面體之一邊為理分中末線之大分比例得全分即外切正方體之每一邊也設如四面體毎邊一尺二寸求内容正方體之每一邊幾何法以四面體每邊一尺二寸自乗得一尺四十四寸三歸二因得九十六寸開平方得九寸七分九釐七豪九絲五忽八微有餘為四面體自尖至底中心之立垂線折半得四寸八分九釐八豪九絲七忽九微有餘為四面體内容圓球全徑乃用求球内容正方體之每一邊法以球徑自乗三歸開平方得二寸八分二釐八豪四絲二忽七微有餘即四面體内容正方體之每一邊也如圖甲乙丙四面體内容丁戊己庚辛壬正方體以正方體之丁己辛癸四角切於四面體各面之中心則四面體中心至每一面中心之立垂線即正方體中心至角之斜線四面體内容圓球徑即正方體外切圓球徑故先求得四面體内容圓球徑又求得球内容正方體之一邊即四面體内容正方體之一邊也又法以四面體每邊一尺二寸自乗得一百四十四寸以十八歸除之得八寸開平方得二寸八分二釐八豪四絲二忽七微有餘即四面體内容正方體之每一邊也此法與前法同蓋四面體之自尖至底中心之立垂線自乗方為每邊自乗方之三分之二即六分之四内容圓球徑為立垂線之一半見球外切四面體法則内容圓球徑自乗方為立垂線自乗方之四分之一即為毎邊自乗方之六分之一而圓球内容正方體之每邊自乗方又為圓球徑自乗方之三分之一故内容正方體之每邊自乗方為四面體之每邊自乗方之十八分之一也如有正方體之一邊求外切四面體之一邊則以正方體之毎邊自乗以十八乗之開平方即得外切四面體之每一邊也設如四面體每邊一尺二寸求内容八面體之每一邊幾何法以四面體每邊一尺二寸折半得六寸即四面體内容八面體之每一邊也如圖甲乙丙四面體内容丁戊己庚辛壬八面體以八面體之四面切於四面體之各面以八面體之六角切於四面體之六稜其各角皆當各稜之一半故内容八面體之毎邊亦為四面體每邊之一半也如有八面體之一邊求外切四面體之一邊則以八面體之一邊倍之即得外切四面體之每一邊也設如四面體每邊一尺二寸求内容十二面體之每一邊幾何法以四面體每邊一尺二寸自乗得一尺四十四寸三歸二因得九十六寸開平方得九寸七分九釐七豪九絲五忽八微有餘為四面體自尖至底中心之立垂線折半得四寸八分九釐八毫九絲七忽九微有餘為四面體内容圓球全徑乃用求球内容十二面體之一邊法以理分中末線之全分一為股小分三八一九六六一為勾求得弦一七四六六二六為一率小分三八一九六六一為二率今所得之圓球徑四寸八分九釐八豪九絲七忽九微為三率求得四率一寸七分四釐八豪零三忽九微有餘即四面體内容十二面體之每一邊也如圖甲乙丙四面體内容丁戊己庚辛壬十二面體以十二面體之戊庚壬癸四角切於四面體各面之中心則四面體中心至毎一面中心之立垂線即十二面中心至各角之斜線四面體内容圓球徑即十二面體外切圓球徑故先求得四面體内容圓球徑又求得球内容十二面體之每一邊即四面體内容十二面體之每一邊也如有十二面體之一邊求外切四面體之每一邊則先求得十二面體外切圓球徑又求得球外切四面體之每一邊即十二面體外切四面體之每一邊也設如四面體每邊一尺二寸求内容二十面體之每一邊幾何法以四面體毎邊一尺二寸求得内容圓球全徑四寸八分九釐八豪九絲七忽九微有餘法見前題乃用求球外切二十面體之一邊法以理分中末線之全分一為一率小分三八一九六六一為二率今所得之圓球全徑折半得半徑二寸四分四釐九豪四絲八忽有微有餘為三率求得四率九分三釐五豪六絲二忽一微有餘為二十面體毎一面中心至邊之垂線三因之得二寸八分零六豪八絲六忽三微有餘為二十面體每一面自角至對邊之垂線自乘三歸四因開平方得三寸二分五釐二豪六絲三忽三微有餘即四面體内容二十面體之每一邊也如圖甲乙丙四面體内容丁戊己庚辛壬二十面體以二十面體之丁戊癸己庚子丑丑辛寅卯辰之四面切於四面體各面之中心則四面體中心至每一面中心之立垂線即二十面體中心至每一面中心之立垂線四面體内容圓球徑即二十面體内容圓球徑故先求得四面體内容圓球徑又求得球外切二十面體之一邊即四面體内容二十面體之一邊也如有二十面體之一邊求外切四面體之一邊則求得二十面體内容圓球徑又求得球外切四面體之一邊即二十面體外切四面體之一邊也設如八面體每邊一尺二寸求内容正方體之每一邊幾何法以每邊一尺二寸三歸之得四寸自乘得一十六寸倍之得三十二寸開平方得五寸六分五釐六豪八絲六忽四微有餘即八面體内容正方體之每一邊也如圖甲乙丙丁八面體内容戊己庚辛正方體以正方體之八角切於八面體各面之中心試自八面體之壬角至對邊作壬癸一面中垂線又自一面中心辛與甲丁邊平行作子丑線則壬辛為壬癸三分之二子丑亦為甲丁三分之二辛丑即為甲丁三分之一與丑庚等辛丑丑庚與内容正方體之辛庚一邊遂成辛丑庚勾股形辛丑既與丑庚等故以辛丑自乘倍之開平方即得辛庚為八面體内容正方體之每一邊也如有正方體之一邊求外切八面體之一邊則以正方體之一邊自乘折半開平方得數三因之即外切八面體之一邊也設如八面體每邊一尺二寸求内容四面體之每一邊幾何八面體之每邊即内容四面體之每一邊也何以知之蓋甲乙丙丁八面體内容戊乙丙己四面體以乙丙己底面合於八面體之一面則上尖戊切於八面體甲庚丁一面之中心其戊乙邊恰與乙丙邊等故八面體之每一邊即内容四面體之每一邊也設如八面體每邊一尺二寸求内容十二面體之每一邊幾何法以八面體每邊一尺二寸自乘得一尺四十四寸三歸二因得九十六寸開平方得九寸七分九厘七豪九絲五忽八微有餘為八面體内容圓球全徑乃用求球内容十二面體之一邊法以全徑自乘三歸開平方得五寸六分五釐六豪八絲五忽四微有餘為十二面體每一面兩角相對斜線又以理分中末線之全分一為一率大分六一八三三九九為二率今所得之每一面兩角相對斜線為三率求得四率三寸四分九釐六豪一絲二忽八微有餘即八面體内容十二面體之每一邊也如圖甲乙丙丁八面體内容戊己庚辛十二面體以十二面體之戊己庚辛壬癸子丑八角切於八面體各面之中心則八面體中心至每面中心之立垂線即内容十二面體中心至各角之斜線八面體内容圓球徑即十二面體外切圓球徑故先求得八面體内容圓球徑又求得球内容十二面體之一邊即八面體内容十二面體之一邊也如有十二面體之一邊求外切八面體之一邊則先求得十二面體外切圓球徑又求得球外切八面體之一邊即十二面體外切八面體之一邊也設如八面體每邊一尺二寸求内容二十面體之每一邊幾何法以八面體毎邊一尺二寸自乘得一尺四十四寸六歸之得二十四寸開平方得四寸八分九釐八豪九絲七忽九微有餘為八面體内容圓球半徑乃用求球外切二十面體之一邊法以理分中末線之全分一為一率小分三八一九六六一為二率今所得之圓球半徑四寸八分九釐八豪九絲七忽九微為三率求得四率一寸八分七釐一豪二絲四忽三微有餘為二十面體毎一面中心至邊之垂線三因之得五寸六分一釐三豪七絲二忽九微有餘為毎一面自角至對邊之垂線自乗三歸四因開平方得六寸四分八釐二豪一絲七忽五微有餘即八面體内容二十面體之每一邊也如圖甲乙丙丁八面體内容戊己庚辛壬癸二十面體以二十面體之戊丑子丑庚寅寅辛壬子壬癸戊己卯己庚辰己辰辛卯