body:
  text: 欽定四庫全書御製數理精藴下編卷二十四體部二帶縱較數立方帶縱和數立方勾股法四條附帶縱較數立方帶縱立方者兩兩等邊長方體積也高與闊相等惟長不同者為帶一縱立方長與闊相等而皆比高多者則為帶兩縱相同之立方至於長與闊與髙皆不等者則為帶兩縱不同之立方開之之法大㮣與立方同祗有帶縱之異耳其帶一縱之法如以髙與闊相等惟長不同為問者則以初商為髙與闊以之自乘又以初商加縱數為長以之再乘得初商積至次商以後亦有三方亷三長亷一小隅但其一方亷附於初商積之方面者即初商數其二方亷附於初商積之長面者則帶縱也其二長亷附於初商積之方邊者即初商數其一長亷附於初商積之長邊者則帶縱也其帶兩縱相同之法如以長與闊相等皆比髙多為問者則以初商加縱數為長與闊以之自乘又以初商為髙以之再乘得初商積至次商以後其一方亷附於初商積之正面者則帶兩縱其二方亷附於初商積之旁面者則各帶一縱也其一長亷附於初商積之髙邉者即初商數其二長亷附於初商積之長闊兩邊者則各帶一縱也其𢃄兩縱不同之法如以闊比髙多長比闊又多為問者則以初商為髙又以初商加闊縱為闊與髙相乘又加長縱為長以之再乘得初商積至次商以後其一方亷附於初商積之正面者則𢃄兩縱其二方亷附於初商積之旁面者則一𢃄闊縱一𢃄長縱也其一長亷附於初商積之髙邊者即初商數其二長亷附於初商積之長闊兩邊者則各𢃄一縱也惟小隅則無論𢃄一縱兩縱皆各以所商之數自乘再乘成一小正方其每邊之數即三方亷之厚亦即三長亷之闊與厚焉凡有幾層亷隅皆依次商之例遞析推之法雖不一要皆本於正方而後加𢃄縱故凡商出之數皆為小邊方體共十二邊若𢃄一縱或𢃄兩縱相同者則八邊相等四邊相等若𢃄兩縱不同者則每四邊各相等是故得其一邊加入縱多即得各邊也設如𢃄一縱立方積一百一十二尺其髙與闊相等長比髙闊多三尺問髙闊長各幾何法列積如開立方法商之其積一百一十二尺止可商四尺乃以四尺書於原積二尺之上而以所商四尺為髙與闊因髙與闊等故四尺即方之髙與闊也加縱多三尺得七尺為長即以髙與闊四尺自乗得一十六尺又以長七尺再乗得一百一十二尺書於原積之下相減恰盡是知立方之髙與闊俱四尺加縱多三尺得七尺即立方之長也如圖甲乙丙丁戊己長方體形容積一百一十二尺其甲乙為髙甲已為闊己戊為長甲乙甲已俱四尺己戊為七尺己戊比己庚多三尺即所𢃄之縱甲乙壬辛庚己正方形即初商之正方積庚辛壬丙丁戊扁方形即帶縱所多之扁方積也葢因此法髙與闊俱止一位其積止一位之積故初商所得即髙與闊之邊加入縱多即為長邊也凡有帶一縱無次商者依此法開之設如𢃄一縱立方積二千四百四十八尺其髙與闊相等長比髙闊多五尺問髙闊長各幾何法列積如開立方法商之其二千尺為初商積可商十尺乃以十尺書於原積二千尺之上而以所商十尺為初商之髙與闊加縱多五尺得十五尺為初商之長即以初商之髙與闊十尺自乗得一百尺又以初商之長十五尺再乗得一千五百尺書於原積之下相減餘九百四十八尺為次商亷隅之共積乃以初商之髙與闊十尺自乗得一百尺此一方亷初商數也又以初商之髙與闊十尺與初商之長十五尺相乗得一百五十尺倍之得三百尺加倍為𢃄縱兩方亷即初商加縱多也兩數相併得四百尺為次商三方亷面積以除次商亷隅之共積九百四十八尺足二尺則以二尺書於原積八尺之上而以初商之髙與闊十尺倍之得二十尺此兩長亷初商數也與初商之長十五尺相併此𢃄縱一長亷也得三十五尺以次商之二尺乘之得七十尺為次商三長亷面積又以次商之二尺自乘得四尺為次商一小隅面積合三方亷三長亷一小隅面積共得四百七十四尺為亷隅共法以次商之二尺乘之得九百四十八尺書於餘積之下相減恰盡是知立方之髙與闊俱一十二尺加縱多五尺得一十七尺即立方之長也如圖甲乙丙丁長方體形容積二千四百四十八尺其甲乙髙甲戊闊皆十二尺甲己長十七尺甲已比庚已所多甲庚五尺即縱多之數其從一角所分辛乙癸壬長方體形壬癸與辛乙皆十尺即初商數壬辛十五尺即初商加縱多之數辛乙癸壬長方積一千五百尺即初商自乗又以初商加縱多再乘之數所餘子形丑形寅形為三方廉其中寅形為一正方廉每邊十尺即初商數子形丑形為二長方廉每闊十尺長十五尺其長比闊多五尺即縱多之數其厚皆二尺即次商數卯形辰形巳形為三長廉其辰形巳形皆長十尺即初商數夘形比辰形巳形皆長五尺即縱多之數其闊與厚皆二尺亦即次商數其巳形一小正方體為隅其長闊與高皆二尺亦即次商數合子丑寅三方廉夘辰巳三長廉巳一小方隅共成一磬折體形附於初商長方體之三面而成甲乙丙丁之總長方體積也三商以後皆倣此遞析開之又法以初商積二千尺商十尺書於原積二千尺之上而以所商十尺為初商之高與闊加縱多五尺得十五尺為初商之長即以初商之高與闊十尺自乘得一百尺又以初商之長十五尺再乘得一千五百尺書於原積之下相減餘九百四十八尺為次商積乃以初商之髙與闊十尺自乘得一百尺又以初商之髙與闊十尺與初商之長十五尺相乘得一百五十尺倍之得三百尺兩數相併得四百尺為次商三方亷面積以除次商積九百四十八尺足二尺則以二尺書於原積八尺之上合初商次商共一十二尺為初商次商之髙與闊加縱多五尺得十七尺為初商次商之長乃以初商次商之髙與闊十二尺自乘得一百四十四尺又以初商次商之長十七尺再乗得二千四百四十八尺與原積相減恰盡即知立方之髙與闊俱十二尺其長為十七尺也設如帶一縱立方積一萬九千零八寸其髙與闊相等長比髙闊多一百二十寸問髙闊長各幾何法列積如開立方法商之其一萬九千寸為初商積可商二十寸則以二十寸為髙與闊加縱多一百二十寸得一百四十寸為長即以髙與闊二十寸自乗得四百寸又以長一百四十寸再乘得五萬六千寸大於原積二倍有餘乃退商十寸書於原積九千寸之上而以所商十寸為初商之高與闊加縱多一百二十寸得一百三十寸為初商之長乃以初商之髙與闊十寸自乘得一百寸又以初商之長一百三十寸再乘得一萬三千寸書於原積之下相減餘六千零八寸為次商廉隅之共積乃以初商之髙與闊十寸自乘得一百寸又以初商之髙與闊十寸與初商之長一百三十寸相乘得一千三百寸倍之得二千六百寸兩數相併得二千七百寸為次商三方廉面積以除次商廉隅之共積六千零八寸足二寸則以二寸書於原積八寸之上而以初商之髙與闊十寸倍之得二十寸又與初商之長一百三十寸相併得一百五十寸以次商之二寸乘之得三百寸為次商三長廉面積又以次商之二寸自乘得四寸為次商一小隅面積合三方廉三長廉一小隅面積共得三千零四寸為廉隅共法以次商之二寸乘之得六千零八寸書於餘積之下相減恰盡是知立方之髙與闊俱十二寸加縱多一百二十寸得一百三十二寸即立方之長也此法因帶縱甚大按立方例所得初商數並加縱多所得初商積必大於原積㡬倍依次漸取小數開之又至甚煩故約略其分退商之至商出之積比原積微小而後可是則帶縱立方立法之最難者也設如帶一縱立方積二丈零四十二尺四百一十五寸其髙與闊相等長比髙闊多一尺二寸問髙闊長各㡬何法列積如開立方法商之其二丈為初商積可商一丈乃以一丈書於原積二丈之上而以所商一丈為初商之高與闊加縱多一尺二寸得一丈一尺二寸為初商之長即以初商之高與闊一丈自乘仍得一丈又以初商之長一丈一尺二寸再乘得一丈一百二十尺書於原積之下相減餘九百二十二尺四百一十五寸為次商廉隅之共積乃以初商之高與闊一丈作一十尺自乘得一百尺又以初商之長一丈一尺二寸作一十一尺二寸與初商之高與闊一十尺相乘得一百一十二尺倍之得二百二十四尺兩數相併得三百二十四尺為次商三方廉面積以除次商廉隅之共積九百二十二尺足二尺則以二尺書於原積二尺之上而以初商之高與闊一十尺倍之得二十尺與初商之長一十一尺二寸相併得三十一尺二寸以次商之二尺乘之得六十二尺四十寸為次商三長廉面積又以次商之二尺自乘得四尺為次商一小隅面積合三方廉三長廉一小隅面積共得三百九十尺四十寸為廉隅共法以次商之二尺乘之得七百八十尺八百寸書於餘積之下相減仍餘一百四十一尺六百一十五寸即一十四萬一千六百一十五寸為三商廉隅之共積其初商次商所得之一丈二尺為高與闊加縱多一尺二寸得一丈三尺二寸為長乃以初商次商之高與闊一丈二尺作一百二十寸自乘得一萬四千四百寸又以初商次商之長一丈三尺二寸作一百三十二寸與初商次商之高與闊一百二十寸相乘得一萬五千八百四十寸倍之得三萬一千六百八十寸兩數相併得四萬六千零八十寸為三商三方廉面積以除三商廉隅之共積一十四萬一千六百一十五寸足三寸則以三寸書於原積五寸之上而以初商次商之髙與闊一百二十寸倍之得二百四十寸與長一百三十二寸相併得三百七十二寸以三商之三寸乘之得一千一百一十六寸為三商三長廉面積又以三商之三寸自乘得九寸為三商一小隅面積合三方廉三長廉一小隅面積共得四萬七千二百零五寸為㢘隅共法以三商之三寸乘之得一十四萬一千六百一十五寸書於餘積之下相減恰盡是知立方之高與闊俱一丈二尺三寸加縱多一尺二寸俱一丈三尺五寸即立方之長也又法以初商積二丈商一丈書於原積二丈之上而以所商一丈為初商之高與闊加縱多一尺二寸得一丈一尺二寸為初商之長即以初商之高與闊一丈自乘仍得一丈又以初商之長一丈一尺二寸再乘得一丈一百二十尺書於原積之下相減餘九百二十二尺四百一十五寸為次商積乃以初商之高與闊一丈作一十尺自乘得一百尺又以初商之長一丈一尺二寸作一十一尺二寸與初商之高與闊一十尺相乘得一百一十二尺倍之得二百二十四尺兩數相併得三百二十四尺為次商三方廉面積以除次商積九百二十二尺四百一十五寸足二尺則以二尺書於原積二尺之上合初商次商共一丈二尺為初商次商之高與闊加縱多一尺二寸得一丈三尺二寸為初商次商之長乃以初商次商之髙與闊一丈二尺自乘得一丈四十四尺又以初商次商之長一丈三尺二寸再乘得一丈九百尺零八百寸與原積相減餘一百四十一尺六百一十五寸即一十四萬一千六百一十五寸為三商積乃以初商次商之高與闊一丈二尺作一百二十寸自乘得一萬四千四百寸又以初商次商之長一丈三尺二寸作一百三十二寸與初商次商之高與闊一百二十寸相乘得一萬五千八百四十寸倍之得三萬一千六百八十寸兩數相併得四萬六千零八十寸為三商三方㢘面積以除三商積一十四萬一千六百一十五寸足三寸則以三寸書於原積五寸之上合初商次商三商共一丈二尺三寸為初商次商三商之髙與闊加縱多一尺二寸得一丈三尺五寸為初商次商三商之長乃以初商次商三商之髙與闊一丈二尺三寸自乘得一丈五十一尺二十九寸又以初商次商三商之長一丈三尺五寸再乘得二丈零四十二尺四百一十五寸與原積相減恰盡即知立方之高與闊俱一丈二尺三寸其長為一丈三尺五寸也設如帶兩縱相同立方積五百六十七尺其長與闊俱比髙多二尺問長闊髙各㡬何法列積如開立方法商之共積五百六十七尺可商八尺因留兩縱積故取略小之數商七尺乃以七尺書於原積七尺之上而以所商七尺為高加縱多二尺得九尺為長與闊即以長與闊九尺自乘得八十一尺又以髙七尺再乘得五百六十七尺書於原積之下相減恰盡是知立方之高為七尺加縱多二尺得九尺即立方之長與闊也如圖甲乙丙丁戊己扁方體形容積五百六十七尺其甲乙為高甲子為闊甲巳為長甲乙七尺甲子甲己皆比甲乙多二尺即所帶之縱其甲乙癸壬辛庚正方形即初商之積庚辛壬癸丙丁戊已磬折體形即所帶之縱積也此法因長闊俱比高多故初商所得為髙於高加縱多即長與闊也設如帶兩縱相同立方積三千四百六十八尺其長與闊俱比高多五尺問長闊高各㡬何法列積如開立方法商之其三千尺為初商積可商十尺乃以十尺書於原積三千尺之上而以初商十尺為初商之髙加縱多五尺得十五尺為初商之長與闊即以初商之長與闊十五尺自乘得二百二十五尺又以初商之髙十尺再乘得二千二百五十尺書於原積之下相減餘一千二百一十八尺為次商廉隅之共積乃以初商之長與闊十五尺自乘得二百二十五尺此一方廉長闊皆帶一縱也又以初商之髙十尺與初商之長與闊十五尺相乘得一百五十尺倍之得三百尺加倍為帶縱兩方廉即初商加縱多也兩數相併得五百二十五尺為次商三方廉面積以除次商廉隅之共積一千二百一十八尺足二尺則以二尺書於原積八尺之上而以初商之長與闊十五尺倍之得三十尺此兩長廉即長闊各帶一縱也與初商之髙十尺相併此一長廉初商數也得四十尺以次商之二尺乘之得八十尺為次商三長廉面積又以次商之二尺自乘得四尺為次商一小隅面積合三方廉三長廉一小隅面積共得六百零九尺為廉隅共法以次商之二尺乘之得一千二百一十八尺書於餘積之下相減恰盡是知立方之高為十二尺加縱多五尺得十七尺為立方之長與闊也如圖甲乙丙丁扁方體形容積三千四百六十八尺其甲乙髙十二尺甲戊長甲已闊俱十七尺甲戊比甲辛所多辛戊甲已比庚己所多甲庚俱五尺即縱多之數其從一角所分壬乙子癸扁方體形癸子與壬乙皆十尺即初商數壬癸與癸申皆十五尺即初商加縱多之數壬乙子癸扁方積二千二百五十尺即初商加縱多自乘又以初商再乘之數所餘丑形寅形夘形為三方廉其中寅形為一正方廉每邊十五尺即初商加縱多之數丑形夘形為二長方廉每高十尺長十五尺其長比髙多五尺即縱多之數其厚皆二尺即次商數辰形巳形午形為三長廉巳形長十尺即初商數辰形午形比巳形俱長五尺即縱多之數其闊與厚皆一尺亦即次商數其巳形一小正方體為隅其長闊高皆二尺亦即次商數合丑寅夘三方廉辰巳午三長廉巳一小方隅共成一磬折體形附於初商長方體之三面而成甲乙丙丁之總扁方體積也三商以後皆倣此遞析開之又法以初商積三千尺商十尺書於原積三千尺之上而以所商十尺為初商之髙加縱多五尺得十五尺為初商之長與闊即以初商之長與闊十五尺自乘得二百二十五尺又以初商之髙十尺再乘得二千二百五十尺書於原積之下相減餘一千二百一十八尺為次商積乃以初商之長與闊十五尺自乘得二百二十五尺又以初商之高十尺與初商之長與闊十五尺相乘得一百五十尺倍之得三百尺兩數相併得五百二十五尺為次商三方廉面積以除次商積一千二百一十八尺足二尺則以二尺書於原積八尺之上合初商次商共十二尺為初商次商之髙加縱多五尺得十七尺為初商次商之長與闊乃以初商次商之長與闊十七尺自乘得二百八十九尺又以初商次商之高十二尺再乘得三千四百六十八尺與原積相減恰盡即知立方之高為十二尺其長與闊得十七尺也設如帶兩縱相同立方積一百零三萬四千二百八十九寸其長與闊俱比高多三百三十寸問長闊髙各㡬何法列積如開立方法商之其一百萬寸為初商積可商一百寸乃以所商一百寸為高加縱多三百三十寸得四百三十寸為長與闊即以長與闊四百三十寸自乘得一十八萬四千九百寸又以高一百寸再乘得一千八百四十九萬寸大於原積十倍有餘是初商不可商一百寸也乃改商十寸為高既大於原積十倍有餘故取十分之一商之為十寸加縱多三百三十寸得三百四十寸為長與闊即以長與闊三百四十寸自乘得一十一萬五千六百寸又以髙十寸再乘得一百一十五萬六千寸仍大於原積是亦不可商一十寸也乃改商九寸書於原積九寸之上而以所商九寸為髙加縱多三百三十寸得三百三十九寸為長與闊即以長與闊三百三十九寸自乘得一十一萬四千九百二十一寸又以髙九寸再乘得一百零三萬四千二百八十九寸書於原積之下相減恰盡是知立方之髙為九寸加縱多三百三十寸得三百三十九寸為立方之長與闊也設如帶兩縱相同立方積一十一丈五百零九尺二百六十八寸其長與闊俱比高多二尺一寸問長闊髙各㡬何法列積如開立方法商之其一十一丈為初商積可商二丈乃以二丈書於原積一丈之上而以所商二丈為初商之髙加縱多二尺一寸得二丈二尺一寸為初商之長與闊乃以初商之長與闊二丈二尺一寸自乘得四丈八十八尺四十一寸又以初商之髙二丈再乘得九丈七百六十八尺二百寸書於原積之下相減餘一丈