百三十尺為次商亷隅之共積乃以初商之深十尺與初商之寬十三尺相乘得一百三十尺又以初商之寬十三尺與初商之長二百七十七尺相乘得三千六百零一尺又以初商之深十尺與初商之長二百七十七尺相乘得二千七百七十尺三數相併得六千五百零一尺為次商三方廉面積以除次商廉隅之共積四萬零一百三十尺足五尺則以五尺書於原積空尺之上而以初商之深十尺與初商之寬十三尺初商之長二百七十七尺相併得三百尺以次商之五尺乘之得一千五百尺為次商三長亷面積又以次商之五尺自乘得二十五尺為次商一小隅面積合三方廉三長廉一小隅面積共得八千零二十六尺為廉隅共法以次商之五尺乘之得四萬零一百三十尺書於餘積之下相減恰盡是知挑河之深為十五尺加寬比深多三尺得十八尺為寬再加長比寛多二百六十四尺得二百八十二尺為河一段之長也𢃄縱和數立方𢃄縱較數立方其法已難而𢃄縱和數立方立法尤難故古無傳而以理推之則法有與較數相對待者其𢃄一縱立方高與闊相等惟長不同如以長與高和或長與闊和為問者則以初商為高與闊而與和數相減餘為長乃以高與闊自乗以長再乗為初商積其或和數甚多而積甚少按立方法商之必至大於原積者則以和數除原積得數約開平方可得幾數取略大數以定初商初商減積有餘實者其初商方積外有二方亷一長亷成兩面磬折體形而初商之高與闊少一次商初商之長多一次商故内少一方亷積商除之法則以初商之高與闊與初商之長相乗倍之為二方亷面積視餘實足方亷面積幾倍取略大數以定次商而以初商自乗次商再乗得一方亷積與餘實相加始足次商二方亷一長亷之共積故以次商與初商之長相減餘為初商次商之共長與初商相乗倍之為二方亷面積又以初商次商之共長與次商相乗為一長亷面積合二方亷一長亷面積以次商乗之為二方亷一長亷之共積所謂初商方積外成兩面磬折體形是也其𢃄兩縱相同立方長與闊相等惟高不同如以高與闊和或高與長和為問者則以初商為高與和數相減餘為長與闊乃以長與闊自乗以高再乗為初商積其或和數甚多而積甚少按立方法商之必至大於原積者則以和數自乗除原積約足幾倍取略大數以定初商初商減積有餘實者初商方積外止一方亷成一扁方體形而初商之高少一次商初商之長與闊各多一次商故内少二方亷一長亷積商除之法則以初商之長與闊自乗為一方亷面積視餘實足方亷面積幾倍取略大數以定次商以次商與初商之長與闊相減餘為初商次商之長與闊而與初商相乗次商再乗倍之為二方亷積又以次商自乗初商再乗為一長亷積合二方亷一長亷積與餘實相加始足次商一方亷積故以初商次商之長與闊自乗次商再乗為一方亷積所謂初商方積外成一扁方體形是也其𢃄兩縱不同立方與𢃄兩縱相同立方同但帶兩縱相同者其次商積為一正方廉帶兩縱不同者其次商積為一長方廉耳要之定商皆以小於半和為準有時退商而反不足進商而反有餘須合初商次商以斟酌之至次商以後因有益積之法故廉法亦不足憑則又須較量而増損之可也設如帶一縱立方積七百六十八尺其高與闊等長與闊和二十尺問高闊長各㡬何法列積如開立方法商之其積七百六十八尺可商九尺則以九尺為高與闊與長闊和二十尺相減餘十一尺為長即以高與闊九尺自乘得八十一尺又以長十一尺再乘得八百九十一尺大於原積乃退商八尺書於原積八尺之上而以所商八尺為高與闊與長闊和二十尺相減餘十二尺為長即以髙與闊八尺自乘得六十四尺又以長十二尺再乘得七百六十八尺書於原積之下相減恰盡是知立方之高與闊俱八尺長十二尺也如圖甲乙丙丁戊己長方體形容積七百六十八尺其甲乙為高乙丙為闊丙丁為長甲乙乙丙俱八尺丙丁為十二尺乙丙與丙丁共二十尺即長闊之和初商所得即高與闊於長闊和内減去初商所餘即長也此法與較數帶縱立方有加減之異彼以所商之數與較數相加此則以所商之數與和數相減也設如帶一縱立方積二千四百四十八尺其高與闊相等長與闊和二十九尺問髙闊長各㡬何法列積如開立方法商之其二千尺為初商積可商十尺乃以十尺書於原積二千尺之上而以所商十尺為初商之高與闊與長闊和二十九尺相減餘十九尺為初商之長即以初商之高與闊十尺自乘得一百尺又以初商之長十九尺再乘得一千九百尺書於原積之下相減餘五百四十八尺乃以初商之髙與闊十尺與初商之長十九尺相乘得一百九十尺倍之得三百八十尺以除餘積五百四十八尺足一尺因仍益積且初商之長尚減去次商數故取大數為二尺則以二尺書於原積八尺之上而以初商十尺自乘又以次商二尺再乘得二百尺與餘積五百四十八尺相加得七百四十八尺為次商二方廉一長廉之共積乃以次商二尺與初高之長十九尺相減餘十七尺為初商次商之長與初商之高與闊十尺相乘得一百七十尺倍之得三百四十尺為二方廉面積又以次商二尺與初商次商之長十七尺相乘得三十四尺為一長廉面積合二方廉一長廉面積共三百七十四尺以次商二尺乘之得七百四十八尺書於餘積之下相減恰盡是知立方之高與闊俱十二尺長十七尺也如圖甲乙丙丁長方體形甲乙高乙戊闊皆十二尺戊丙長十七尺乙戊與戊丙共二十九尺即長闊之和其從一角所分己乙壬癸長方體形己乙與乙庚皆十尺即初商數壬庚十九尺即長闊和内減初商所餘之數比戊丙多子壬一段即次商數己乙壬癸長方積一千九百尺即初商自乘又以初商與長闊和相減之餘再乘之數比初商原體積多丑寅壬癸一扁方體形因初商積内多減去此積故以初商自乗次商再乗而得丑寅壬癸扁方體積與餘積相加即得甲己辛庚丙丁兩面磬折體形其辰形巳形為兩方廉其闊十尺即初商數其長十七尺即長闊和内減初商次商之數其厚皆二尺即次商數午形為一長廉其長十七尺與方廉同其闊與厚皆二尺亦即次商數合二方廉一長廉共成一磬折體形附於長方體之兩面而成甲乙丙丁之總長方體積也設如帶一縱立方積九萬九千九百五十四尺其高與闊相等長與闊和一千二百四十三尺問高闊長各㡬何法列積如開立方法商之其九萬九千尺為初商積可商四十尺而長闊和為一千二百四十三尺按法相乘過大於原積爰以長闊和一千二百四十三尺除原積九萬九千九百五十四尺足八十尺有餘以八十尺開平方約足九尺乃以九尺書於原積四尺之上而以所商九尺為髙與闊與長闊和一千二百四十三尺相減餘一千二百三十四尺為長即以髙與闊九尺自乘得八十一尺又以長一千二百三十四尺再乘得九萬九千九百五十四尺書於原積之下相減恰盡是知立方之髙與闊俱九尺長一千二百三十四尺也此法葢因帶一縱甚多高與闊甚少其長闊和比長所多無㡬故以長闊和除原積即得髙與闊自乘之一面積而開平方所得即髙與闊與長闊和相減所餘即長也設如帶兩縱相同立方積三百八十四尺其長與闊相等高與闊和十四尺問髙闊長各㡬何法列積如開立方法商之其積三百八十四尺可商七尺因欲得小於半和之數乃退商六尺書於原積四尺之上而以所商六尺為高與高闊和十四尺相減餘八尺為長與闊即以長與闊八尺自乘得六十四尺又以高六尺再乘得三百八十四尺書於原積之下相減恰盡是知立方之高為六尺長與闊皆八尺也如圖甲乙丙丁戊己扁方體形容積三百八十四尺其甲乙為高乙丙為闊丙丁為長甲乙六尺乙丙與丙丁皆八尺甲乙與乙丙共十四尺即高與闊之和初商所得為高於高闊和内減去初商所餘為闊亦即長也設如帶兩縱相同立方積六千九百一十二尺其長與闊相等高與闊和三十六尺問高闊長各㡬何法列積如開立方法商之其六千尺為初商積可商十尺乃以十尺書於原積六千尺之上而以所商十尺為初商之高與高闊和三十六尺相減餘二十六尺為初商之長與闊即以初商之長與闊二十六尺自乘得六百七十六尺又以初商之高十尺再乘得六千七百六十尺書於原積之下相減餘一百五十二尺乃以初商之長與闊二十六尺自乘得六百七十六尺以除餘積一百五十二尺不足一尺因仍益積且初商之長與闊内尚減去次商數故取大數為二尺書於原積二尺之上而以次商二尺與初商之長與闊二十六尺相減餘二十四尺為初商次商之長與闊與初商十尺相乘得二百四十尺以次商二尺再乘得四百八十尺倍之得九百六十尺為二方廉積又以次商二尺自乘以初商十尺再乘得四十尺為一長廉積合二方廉一長廉積共一千尺與餘積一百五十二尺相加得一千一百五十二尺為次商一方廉積乃以初商次商之長二十四尺自乘得五百七十六尺以次商二尺再乘得一千一百五十二尺書於餘積之下相減恰盡是知立方之高十二尺長與闊皆二十四尺也如圖甲乙丙丁扁方體形容積六千九百一十二尺甲乙高十二尺甲戊長甲己闊俱二十四尺甲己與甲乙共三十六尺即高與闊之和其從一面所分庚乙癸子扁方體形庚乙十尺即初商數庚丑與庚寅皆二十六尺即高闊和内減初商之數庚丑比甲戊多庚夘一段庚寅比甲己多辰寅一段即次商數庚乙癸子長方積六千七百六十尺即初商與高闊和相減之餘數自乘又以初商再乘之數比初商原體積多巳午二方廉積未一長廉積因初商積内多減去此積故以初商次商之長與闊與初商相乘以次商再乘倍之即得巳午二方廉積又以次商自乘以初商再乘即得未一長廉積與餘積相加即得甲庚辛壬丁戊扁方體形其甲戊長甲己闊皆二十四尺即高闊和内減初商次商之數甲庚厚二尺即次商數附於初商扁方體之一面而成甲乙丙丁之總扁方體積也三商以後皆倣此遞析推之設如帶兩縱相同立方積三百九十六萬八千零六十四尺其長與闊相等高與闊和一千尺問高闊長各㡬何法列積如開立方法商之其三百萬尺為初商積可商一百尺而高闊和為一千尺按法相乘過大於原積爰以髙闊和一千尺自乘得一百萬尺以除原積三百九十六萬八千零六十四尺足三尺取略大數為四尺乃以四尺書於原積四尺之上而以所商四尺為髙與高闊和一千尺相減餘九百九十六尺為長與闊即以長與闊九百九十六尺自乘得九十九萬二千零一十六尺又以髙四尺再乘得三百九十六萬八千零六十四尺書於原積之下相減恰盡是知立方之髙為四尺長與闊俱九百九十六尺也此法葢因帶兩縱甚多而高數甚少其高闊和比原長原闊所多無㡬故以高闊和自乘得一面積以除原積即得高與高闊和相減所餘為闊亦即長邊也設如帶兩縱不同立方積四百八十尺高與闊和十四尺高與長和十六尺問高闊長各㡬何法列積如開立方法商之其積四百八十尺可商七尺因欲得小於半和之數乃退商六尺書於原積空尺之上而以所商六尺為高與高與闊和十四尺相減餘八尺為闊又以高六尺與高與長和十六尺相減餘十尺為長即以高六尺與闊八尺相乘得四十八尺又以長十尺再乘得四百八十尺書於原積之下相減恰盡是知立方之高為六尺其闊為八尺其長為十尺也如圖甲乙丙丁戊己長方體形容積四百八十尺其甲乙為高六尺乙丙為闊八尺甲己為長十尺甲己與甲乙共十六尺即高與長之和甲乙與乙丙共十四尺即高與闊之和初商所得為高與高闊和相減所餘為闊以高與高長和相減所餘即長也設如帶兩縱不同立方積八千零六十四尺高與闊和三十六尺高與長和四十尺問高闊長各㡬何法列積如開立方法商之其八千尺為初商積可商二十尺因欲得小於半和之數乃退商十尺書於原積八千尺之上而以所商十尺為初商之高與高闊和三十六尺相減餘二十六尺為初商之闊又以初商之高十尺與高長和四十尺相減餘三十尺為初商之長即以初商之高十尺與初商之闊二十六尺相乘得二百六十尺以初商之長三十尺再乘得七千八百尺書於原積之下相減餘二百六十四尺為一長方廉積其厚即次商之數其長與闊比初商之長與闊各少一次商之數乃以初商之長三十尺與初商之闊二十六尺相乘得七百八十尺以除餘積二百六十四尺不足一尺因仍益積且初商之長闊尚減去次商數故取大數為二尺書於原積四尺之上而以所商二尺與初商之闊二十六尺相減餘二十四尺為初商次商之闊以所商二尺與初商之長三十尺相減餘二十八尺為初商次商之長即以初商次商之闊二十四尺與初商之高十尺相乘得二百四十尺又以初商次商之長二十八尺與初商之高十尺相乘得二百八十尺兩數相併得五百二十尺以次商二尺乘之得一十零四十尺為二方廉積又以次商二尺自乘得四尺以初商十尺再乘得四十尺為一長廉積合二方廉一長廉積共一千零八十尺與餘積二百六十四尺相加得一千三百四十四尺為次商一方廉積乃以初商次商之闊二十四尺與長二十八尺相乘得六百七十二尺以次商二尺再乘得一千三百四十四尺書於餘積之下相減恰盡是知立方之高十二尺闊二十四尺長二十八尺也如圗甲乙丙丁扁長方體形容積八千零六十四尺甲乙高十二尺甲戊長二十八尺甲己闊二十四尺甲乙與甲己共三十六尺即高與闊之和甲乙與甲戊共四十尺即高與長之和其從一面所分庚乙癸子扁長方體形庚乙十尺即初商數庚丑三十尺即高與長和内減初商之數庚寅二十六尺即高與闊和内減初商之數庚丑比甲戊多庚夘一段庚寅比甲己多辰寅一段即次商數庚乙癸子長方積七千八百尺即初商之長與初商之闊相乘又以初商之高再乘之數比原長原闊多巳午二方廉積未一長廉積因初商積内多減去此積故以初商次商之長與初商之髙相乘以初商次商之闊與初商之髙相乘兩數相併以次商再乘即得巳午二方廉積又以次商自乘以初商之髙再乘即得未一長廉積與餘積相加即得甲庚辛壬丁戊一扁長方體形其甲巳闊二十四尺即髙闊和内減初商次商之數甲戊長二十八尺即髙長和内減初商次啇之數甲庚厚二尺即次啇數附於初啇扁長方體之一面而成甲乙丙丁之總扁長方體積也三商以後皆倣此逓折推之設如帶兩縱不同立方積一十七萬二千六百九十二尺髙與闊和一百二十九尺髙與長和二百四十尺問髙闊長各幾何法列積如開立方法商之其一十七萬二千尺為初商積可啇五十尺而長即為一百九十尺闊即為七十九尺按法相乘過大於原積爰以髙與闊和一百二十九尺與髙與長和二百四十尺相乘得三萬零八百六十尺以除原積一十七萬二千六百九十二尺足五尺取略大之數為六尺乃以六尺書於原積二尺之上而以所商六尺為髙與髙與闊和一百二十九尺相減餘一百二十三尺為闊又以髙六尺與髙與長和二百四十尺相減餘二百三十四尺為長即以闊一百二十三尺與長二百三十四尺相乘得二萬八千七百八十二尺又以髙六尺再乘得一十七萬二千六百九十二尺書於原積之下相減恰盡是知立方之髙為六尺闊為一百二十三尺長為二百三十四尺也此法蓋因帶兩縱甚多而髙數甚少其髙與闊和比原闊所多無幾髙與長和比原長所多亦無㡬故以高與闊和與高與長和相乘得一面積以除原積即得高與高闊和相減所餘為闊與高與長和相減所餘即長也附勾股法四條設如勾股積六尺勾弦較二尺求勾股弦各㡬何法以勾股積六尺倍之得十二尺自乘得一百四十四尺以勾弦較二尺除之得七十二尺折半得三十六尺為長方體積乃以勾弦較二尺折半得一尺為長方體之長比髙闊所多之較用帶一縱較數開立方法算之得髙與闊三尺為勾加勾弦較二尺得五尺為弦以勾三尺除倍積十二尺得四尺為股也此法有勾股積勾弦較必得股自乘積以勾弦較除之始得勾弦和而勾弦和為二勾一勾弦較之共數將勾弦和半之為一勾半勾弦較之共數今作為帶縱立方體算者即如以勾為帶縱立方之髙與闊勾與半勾弦較之共數為帶縱立方之長半勾弦較為帶縱之較用帶縱較數立方法開之得髙與闊即勾也如甲乙丙勾股積倍之成甲丁乙丙勾股相乘之長方面積自乘得戊己庚辛正方面積即如勾自乘股自乘兩自乘數再相乘之壬癸子丑長方面積試將此長方面積變為長方體積其底為勾自乘之數其長為股自乘之數其勾自乘之底邊即勾而股自乘之長又為勾弦較與勾弦和相乘之數是暗中已得股自乘之一數矣其長方體即如寅卯辰巳長方體形然又試作一申甲乙酉弦自乘之正方内申戌乙丙為勾自乘之正方則戌甲乙酉丙乙磬折形與股自乘之正方等引而長之成戌甲丙亥之長方其戌甲闊即勾弦較甲乙丙長即勾弦和今以股自乘之數用勾弦較除之得勾弦和即如寅卯辰巳之長方體積用勾弦較除之而得乾坎辰巳之長方體積其午未辰巳之髙闊相乘之面積未減而坎未之長即為勾弦和矣勾弦和既為二勾一勾弦較之共數折半則得一勾半勾弦較之共數故將所得之乾坎辰巳長方體積折半為艮震辰巳長方體積其巳辰髙未辰闊仍皆為勾與巽未等其震未長為勾與半勾弦較之共數震巽為半勾弦較即長比髙闊所多之數故以勾弦較折半用帶一縱較數開立方法算之得髙與闊為勾也設如勾股積六尺勾弦和八尺求勾股弦各㡬何法以勾股積六尺倍之得十二尺自乘得一百四十四尺以勾弦和八尺除之得十八尺折半得九尺為扁方體積乃以勾弦和八尺折半得四尺為扁方體之髙與長闊之和用帶兩縱相同和數開立方法算之得長與闊三尺為勾於勾弦和八尺内減勾三尺餘五尺為弦以勾三尺除倍積十二尺得四尺為股也此法有勾股積勾弦和必得股自乘積以勾弦和除之始得勾弦較半之為半勾弦較今作為帶縱立方體算者即如以勾為帶縱立方之長與闊半勾弦較為帶縱立方之髙一勾半勾弦較之共數為帶縱立方之髙與長闊之和用帶兩縱相同和數立方法開之得長與闊即勾也如甲乙丙勾股積倍之成甲丁乙丙勾股相乘之長方面積自乘得戊己庚辛正方面積即如勾自乘股自乘兩自乘數再相乘之壬癸子丑長方面積試將此長方面積變為長方體積其底為勾自乘之數其髙為股自乘之數其勾自乘之底邊即勾而股自乘之髙又為勾弦較與勾弦和相乘之數是暗中已得股自乘之一數矣其長方體即如寅卯辰巳長方體形然又試作一申甲乙酉弦自乘之正方内申戊乙丙為勾自乘之正方則戌甲乙酉丙乙磬折形與股自乘之正方等引而長之成戌甲丙亥之長方其戌甲闊即勾弦較甲乙丙長即勾弦和今以股自乘之數用勾弦和除之則得勾弦較即如寅卯辰巳之長方體積用勾弦和除之而得乾卯辰坎扁方體積其卯午辰未之長闊相乘之面積未減而乾卯之髙即為勾弦較矣折半則得艮卯辰震扁方體積其卯午長午辰闊仍皆為勾而艮卯之髙為半勾弦較其艮卯與卯午即髙與長闊之和為一勾半勾弦較之共數而勾弦和乃二勾一勾弦較之共數故以勾弦和折半得一勾半勾弦較用帶兩縱相同和數開立方法算之得長與闊為勾也設如勾股積六尺股弦較一尺求勾股弦各㡬何法以勾股積六尺倍之得十二尺自乘得一百四十四尺以股弦較一尺除之仍得一百四十四尺折半得七十二尺為長方體積乃以股弦較一尺折半得五寸為長方體之長比髙闊所多之較用帶一縱較數開立方法算之得髙與闊四尺為股加股弦較一尺得五尺為弦以股四尺除倍積十二尺得三尺為勾也此法有勾股積有股弦較必得勾自乘積以股弦較除之始得股弦和而股弦和為二股一股弦較之共數將股弦和半之為一股半股弦較之共數今作為帶縱立方體算者即如以股為帶縱立方之髙與闊股與半股弦較之共數為帶縱立方之長半股弦較為帶縱之較用帶縱較數立方法開之得髙與闊即股也如甲乙丙勾股積倍之則成甲丁乙丙勾股相乘之長方面積自乘得戊己庚辛正方面積即如股自乘勾自乘兩自乘數再相乘之壬癸子丑長方面積試將此長方面積變為長方體積其底為股自乘之數其長為勾自乘之數其股自乘之底邊即股而勾自乘之長又為股弦較與股弦和相乘之數是暗中已得勾自乘之一數矣其長方體即如寅卯辰巳之長方體形然又試作一申乙甲酉弦自乘之正方内申戌丙甲為股自乘之正方則戌乙甲酉甲丙磬折形與勾自乘之正方等引而長之成戌乙丙亥之長方其戌乙闊即股弦較乙甲丙長即股弦和今以勾自乘之數用股弦較除之得股弦和即如寅卯辰巳之長方體積用股弦較除之仍得寅卯辰巳之長方體積其午未辰巳髙闊相乘之面積與卯未之長俱未減而卯未之長即命為股弦和矣股弦和既為二股一股弦較之共數折半則得一股半股弦較之共數故將所得之寅卯辰已長方體積折半為乾坎辰已長方體積其未辰闊已辰髙仍皆為股與艮未等其坎未長為股與半股弦較之共數坎艮為半股弦較即長比髙闊所多之數故以股弦較折半用帶一縱較數開立方法算之得髙與闊為股也設如勾股積六尺股弦和九尺求勾股弦各幾何法以勾股積六尺倍之得十二尺自乘得一百四十四尺以股弦和九尺除之得十六尺折半得八尺為扁方體積乃以股弦和九尺折半得四尺五寸為扁方體之髙與長闊之和用帶兩縱相同和數開立方法算之得長與闊四尺為股於股弦和九尺内減股四尺餘五尺為弦以股四尺除倍積十二尺得三尺為勾也此法有勾股積股弦和必得勾自乘積以股弦和除之始得股弦較半之為半股弦較今作為帶縱立方體算者即如以股為帶縱立方之長與闊半股弦較為帶縱立方之髙一股半股弦較之共數為帶縱立方之髙與長闊之和用帶兩縱相同和數立方法開之得長與闊即股也如甲乙丙勾股積倍之成甲丁乙丙勾股相乘之長方面積自乘得戊己庚辛正方面積即如股自乘勾自乘兩自乘數再相乘之壬癸子丑長方面積試將此長方面積變為長方體積其底為股自乘之數其髙為勾自乘之數其股自乘之底邊即股而勾自乘之髙又為股弦和與股弦較相乘之數是暗中已得勾自乘之一數矣其長方體即如寅卯辰巳長方體形然又試作一申乙甲酉弦自乘之正方内申戌丙甲為股自乘之正方則戌乙甲酉甲丙磬折形與勾自乘之正方等引而長之成戌乙丙亥之長方其戌乙闊即股弦較乙甲丙長即股弦和今以勾自乘之數用股弦和除之則得股弦較即如寅夘辰巳之長方體積用股弦和除之而得乾夘辰坎扁方體積其夘午辰未長闊相乘之面積未減而乾夘之高即為股弦較矣折半則得艮夘辰震扁方體積其夘午長午辰闊仍皆為股而艮夘之高為半股弦較其艮夘與夘午即高與長闊之和為一股半股弦較之共數而股弦和乃二股一股弦較之共數故以股弦和折半得一股半股弦較用帶兩縱相同和數開立方法算之得長與闊為股也御製數理精藴下編卷二十四
