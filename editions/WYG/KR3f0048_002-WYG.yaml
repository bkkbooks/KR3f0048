body:
  text: 欽定四庫全書御製數理精蘊上編卷二幾何原本一幾何原本二幾何原本三幾何原本四幾何原本五幾何原本一第一凡論數度必始於一點自點引之而為線自線廣之而為面自而積之而為體是名三大綱是以有長而無闊者謂之線有長與闊而無厚者謂之面長與闊厚俱全者謂之體惟點無長闊厚薄其間不能容分不可以數度然線之兩端即點而線面體皆由此生點雖不入於數實為衆數之本第二線有直曲兩種其二線之一端相合一端漸離必成一角二線若俱直者謂之直線角一線直一線曲者謂之不等線角二線俱曲者謂之曲線角第三凡角之大小皆在於角空之寛狹出角之二線即如規之兩股漸漸張去自然開寛是以命角不論線之長短止看角之大小如丙角兩線雖長其開股之空狹遂為小角若丁角兩線雖短其開股之空寛遂成大角矣第四凡命角必用三字為記如甲乙丙三角形指甲角則云乙甲丙角指乙角則云甲乙丙角指丙角則云甲丙乙角是也亦有單舉一字者則其所舉之一字即是所指之角也如單言甲角乙角丙角之類第五凡有一線以此線之一端為樞復以此線之一端為界旋轉一周即成一圜如甲乙一線以甲端為樞乙端為界旋轉復至乙處即成乙丙丁戊之圜此圜線謂之圜界圜界内所積之面度謂之圜面第六凡圜界不拘長短其分界之所即為弧線如乙丙丁戊之圜丙至丁丁至戊俱為弧線因其形似弧故名之第七凡圜自一界過圜心至相對之界畫一直線將一圜為兩平分則為圜徑如乙丙丁戊之圜以甲為心自圜界乙處過甲心至丁或自圜界丙處過甲心至戊畫乙甲丁及丙甲戊線皆為圜徑也第八凡自圜心至圜界作幾何線皆謂之輻線其度俱相等因平分全徑之半故又謂之半徑線第九凡圜界皆以所對之角而命其弧而角又以所對之弧而命其度葢角度俱在圜界而圜界為角度之規也如乙角為心甲丙為界則乙角相對之界即甲丙弧而甲丙弧即乙角之度也第十凡角相對之弧得圜界四分之一者此角必直故謂之直角如甲丁丙戊之圜甲乙丙之徑自中心乙至圜界丁畫一半徑將半圜界又分為兩平分則成甲乙丁丙乙丁之二角此二角各得圜界四分之一則此二角為直角也若自丁界過乙心至圜界戊處畫一直線又成丁乙戊之徑復得甲乙戊丙乙戊兩相等之直角矣故凡畫一直線交於别線其所成之角若直此線謂之垂線葢因平分圜界為四其四弧相對之四角必相等而皆為直角則其二徑相交必互為垂線可知矣第十一凡角相對之弧不足圜界四分之一者謂之鋭角若過四分之一者謂之鈍角故自圜徑中心復畫一輻線而不平分半圜之界則成一鋭角一鈍角如甲己丙庚之圜於甲乙丙之徑自乙心至甲己丙之半圜界不兩平分於丁處畫一輻線遂成丙乙丁一鋭角甲乙丁一鈍角再將丁乙線引於相對圜界戊處畫一丁乙戊徑線復成甲乙戊一鋭角丙乙戊一鈍角合前二角總為四角矣故凡二角兩尖相對謂之對角二角兩尖相並謂之並角如甲乙戊丙乙丁二角之兩尖相對即謂之對角丙乙戊甲乙丁二角之兩尖亦相對故亦謂之對角也如丙乙戊甲乙戊之二角兩尖相並而同出一線則謂之並角矣第十二凡一圜内設兩角此一角相對之弧與彼一角相對之弧其限若等則此二角之度亦必相等如甲丁丙戊之圜丙乙丁角相對之丙丁弧甲乙戊角相對之甲戊弧其限相等故丙乙丁角甲乙戊角其度亦相等也第十三凡有一圜其徑線之中心作相並之二角此二角之度必與二直角等如甲丙丁之圜自丁乙丙徑線之中心作甲乙丙甲乙丁之相並二角此二角之度必與二直角相等也第十四凡一直線交於他直線其所成之二角或為二直角或與二直角等如丙乙丁直線上畫一甲乙直線至於乙處即成甲乙丙甲乙丁之二直角也又或於丙乙丁直線上畫一戊乙直線亦至乙處復成丙乙戊一鋭角丁乙戊一鈍角此二角必與二直角相等也再申明之以乙為心丙為界旋轉畫一圜則丙乙丁線為圜之徑線必將圜界平分為兩平分矣此丙乙丁徑線之中心所畫之甲乙線又將半圜界平分為兩平分則此二角各相對之弧皆為一圜界四分之一而各為一直角可知矣又如戊乙線將半圜界雖不兩平分而成一鋭角一鈍角然所成二角仍在丙乙丁徑線所限半圜界度為全圜界四分之二故與二直角相等也第十五凡自一心畫為衆線其所成之角雖多止與四直角相等如自甲心至乙至丙至丁至戊至已畫衆輻線雖成衆角其各角所函之度必與四直角等葢因甲㸃為心衆輻線皆立一圜之界故衆角所對之弧總不越一圜之全度前言一圜之界僅有四直角之弧線兹角雖多亦未嘗出一圜之界故曰衆角雖多止與四直角等也第十六凡兩直線相交所成二對角之度必俱相等如甲乙丙丁二線交於戊處成甲戊丁丙戊乙之二對角斯二角之度必俱相等今以二線相交之處為心旋轉畫一全圜則甲乙丙丁二線俱為此圜之徑線矣惟其俱為徑線故將一圜為兩平分而甲戊乙之徑線為甲丙乙之半圜界丙戊丁之徑線為丙甲丁之半圜界因兩半圜界俱係全圜徑線故相交成對角其度必等兹將甲丙乙之半圜界減去甲丙弧即餘丙乙弧丙甲丁之半圜界亦減去丙甲弧又餘甲丁弧凡兩相等之弧減去一段相等之弧所餘之弧必相等今甲丙乙丙甲丁二半圜之界内減去甲丙丙甲同體之弧則所餘丙乙甲丁相對之弧亦必相等矣此二弧之度既俱相等則所對之甲戊丁丙戊乙二角之度亦必相等可知矣其餘甲戊丙丁戊乙亦與甲戊丁丙戊乙同理故其所對之角度亦必相等也第十七凡大小圜界俱定為三百六十度而一度定為六十分一分定為六十秒一秒定為六十㣲一㣲定為六十纖夫圜界定為三百六十度者取其數無竒零便於布算即徴之經傳亦皆符合也易曰凡三百有六十當期之日邵子曰三百六十中分之得一百八十為二至二分相去之數度下皆以六十起數者以三百六十乃六六所成以六十度之可得整數也凡有度之圜界可度角分之大小如甲乙丙角欲求其度則以有度之圜心置於乙角察乙丙乙甲之相離可以容圜界之幾度如容九十度即是甲乙丙直角何以知為直角因九十度為全圜三百六十度之四分之一前言凡角得圜界四分之一者為直角故知其為直角也若過九十度者為丁乙丙鈍角不足九十度者為丙乙戊鋭角觀此三角之度其餘可類推矣第十八凡二線之間寛狹相離之分俱等則此二線謂之平行線也第十九欲求平行線之間相距幾何則自上一線不拘何處至下一線畫二縱線則此二線為相距度分也如甲乙丙丁二線平行自上線甲乙二處至下線丙丁二處畫二縱線則此二線為相等線其度必等然則甲乙丙丁相對之間其相距之遠近不已見耶第二十平行二線雖引至於無窮其端必不能相合葢二線相離之度各處逺近俱為相等故也如甲乙丙丁平行二線隨意引於戊己又自戊至己畫一縱線其度亦等於甲丙乙丁二縱線故曰平行線雖引至於無窮其端終不能相合也第二十一凡平行二線或縱或斜畫一直線交加於上則平行線上所成之二角必俱相等如甲乙丙丁二平行線上畫一庚辛斜線其甲乙線之庚戊乙角丙丁線之戊己丁角皆相等假使庚戊乙角大於戊己丁角則戊乙線必離於庚戊線而向丙丁線甲乙丙丁二線不平行矣若甲乙丙丁二線毫無偏斜又得庚辛直線相交成二角則此二角必然相等矣第二十二凡平行二線上畫一斜線則成八角此八角度有相等者必是對角或内外角如庚戊乙甲戊己一角其度相等因其兩尖相對謂之對角庚戊乙戊己丁二角其度亦相等因其在平行二線之内外故謂之内外角甲戊己戊己丁二角其度亦相等因其俱在平行二線之内而立斜線之左右故又謂之相對錯角又如甲戊庚度戊乙二角其度不等因其立一線之界謂之並角庚戊甲丁己辛二角其度亦相等因其俱在平行二線之外故謂之外角乙戊己丙己戊二角其度亦相等因其又俱在平行二線之内故又謂之内角總之二平行線上交以斜線所成八角必兩兩相等也第二十三平行線上一邊之二内角或一邊之二外角與二直角相等如丁己戊角與丙己戊角為並角則此二並角與二直角等前第十四節云凡一直線交於他直線所成二角必與二直角相等則此二角同出於一直線為並角故亦與二直角等矣又如甲戊庚庚戊乙雖為外角而亦為並角此二並角亦與二直角等也他如甲戊己乙戊己二並角丙己辛丁己辛二並角亦與二直角等也第二十四有平行二線復與一線相平行者此三線互相為平行線也如甲乙丙丁二線之間有戊己線與之平行則甲乙丙丁戊己三線互相為平行線也照前第二十一節在此三線上畫一庚辛壬斜線則所成之庚辛二角必相等而辛壬二角亦必等也三線之與斜線相交所成之角既各相等則三線互為平行可知矣幾何原本二第一凡各種界所成俱謂之形其直界所成者為直界形曲界所成者為曲界形凡直界所成各形未有少於三角形界者故三角形為諸形之首第二凡三角形一角直者為直角三角形一角鈍者為鈍角三角形三角俱鋭者為鋭角三角形第三凡三角形其三邊線度等者為等邊三角形兩邊線度等者為兩等邊三角形三邊線度俱不等者為不等邊三角形第四凡三角形之三角度相併必與二直角度等如甲乙丙三角形自乙角與甲丙線平行畫一乙丁線則成丙乙丁角與丙角為二尖交錯之二角其度必相等見首卷第二十二節而甲角與甲乙丁角為甲丙乙丁二平行線内一邊之二内角與二直角等見首卷第二十三節今於甲乙丁直角内減丙乙丁角所餘為甲乙丙角丙乙丁角既與丙角度等則甲乙丙丙乙丁合成之一直角與甲角之一直角非二直角之度耶第五凡三角形自一界線引長成一外角此外角度與三角形内所有之二鋭角等如甲乙丙三角形自甲乙線引長至丁所成之丙乙丁角即為外角其度與三角形内甲丙二鋭角之度等葢甲乙丙三角形之三角度併之原與二直角等如本卷第四節云而甲丁直線與丙乙直線相交所成之甲乙丙丁乙丙内外角亦與二直角等如首卷第十四節云則此内外二角所併之度與三形内三角所併之度亦必相等今於内外角所併之二直角内減去甲乙丙角則所餘之丙乙丁一外角度與甲角丙角所併之度為相等可知矣第六凡兩三角形其兩邊線之度相等二線所合之角又等則二形底線之度必等二形之式亦等其底線之二角亦皆等也如甲乙丙一三角形丁戊己一三角形此二形之甲角丁角若等甲丙丁戊二線甲乙丁己二線又互相等則乙丙戊己之二底線必等其二形之三角式亦必等而乙角己角相等丙角戊角亦相等若將二形之甲角丁角相合則甲丙丁戊二線甲乙丁己二線各度必等因其俱等故丙乙線之二角與戊己線之二角俱恰相符而無偏側矣若謂乙丙底與戊己底不符必是戊己線上斜於庚或下斜於辛不成直線形矣第七兩三角形其三邊線之度若等則三角之度亦必相等而此形内所函之分亦俱等也如甲乙丙丁戊己兩三角形之甲乙線丁戊線甲丙線丁己線乙丙線戊己線兩兩相等則甲角與丁角乙角與戊角丙角與己角必各相等而甲乙丙三界所函之分丁戊己三界所函之分亦俱相等葢因此兩三角形之各線俱恰相符故所函之分亦俱恰相符也第八凡兩三角形有一線相等其相等線左右所生之二角又相等則其他線他角俱相等而二形之分亦相等也如甲乙丙丁戊己兩三角形之甲乙線丁戊線若等而此二線左邊所成之甲角丁角右邊所成之乙角戊角亦相等則甲丙線度與丁己線度等丙乙線度與己戊線度等而丙角與己角亦等甲丙乙形所函之分與丁己戊形所函之分自然相等矣若將甲乙線與丁戊線相較再將甲角與丁角乙角與戊角相較此二線二角之度必俱相符此二線二角既俱相符其他線他角亦必各相符矣若謂一線不符則相等之角亦必不符必其一線斜出或一線偏入以致各角俱不相等角既不相等而形式亦必不同矣第九三角形之兩邊線若等其底線之兩角度亦必等如甲乙丙三角形其甲乙丙乙兩邊線之度等則其甲丙底線之甲角丙角之度亦俱等也若以甲丙底平分於丁處自丁至乙角畫一直線遂成甲乙丁丙乙丁兩三角形此兩形之甲乙線與丙乙線既相等而甲丙底線平分之甲丁丙丁線度亦等則乙丁為兩三角形所共用之各一邊線然則此兩三角形之各三邊線度必俱相等可知矣三角形之三線既各相等則其各角之度亦必相等因其各角之度相等故甲角丙角之度亦必等也第十有兩邊相等之三角形自上角至底線畫一直線將底線為兩平分則此線為上角之平分線又為底線之垂線也如甲乙丙乙兩邊線度相等之甲乙丙三角形自上角乙至底線丁畫一直線將甲丙底線為兩平分則為乙角之平分線又為甲丙底線之垂線也葢乙丁線將乙甲丙三角形平分為甲乙丁丙乙丁兩三角形此兩三角形之各界線度必各相等而各角之度又俱相等則甲乙丁角丙乙丁角將乙角為兩平分矣而甲丁乙角丙丁乙角又為相等之兩直角因其為兩直角故乙丁線為平分甲丙底線之垂線也第十一凡三角形内長界所對之角必大短界所對之角必小如甲乙丙三角形之乙丙界長於甲丙界故其相對之甲角大於乙角而甲乙界短於甲丙界故其所對之丙角小於乙角也試依甲丙界度截乙丙於丁復自甲至丁作甲丁線即成甲丙丁兩界相等之三角形夫甲丙丁丙兩界度既相等則甲丁丙丁甲丙兩角亦相等今甲丁丙角相等之丁甲丙角原自乙甲丙角所分則乙甲丙角必大於甲丁丙角矣然此甲丁丙角為甲乙丁小三角形之外角與小三角形内之甲乙二角相併之度等見本卷第五節既與甲乙二角之度等則大於乙角可知矣夫甲丁丙角既大於乙角則乙甲丙角必更大於乙角矣丙角之小於乙角其理亦同第十二凡三角形内必有二鋭角葢三角形之三角併之與二直角等見本卷第四節如甲乙丙三角形之乙角為直角則所餘甲角丙角併之始與乙角相等二角併之僅與一直角等則此二角獨較之必小於直角矣故此甲丙二角為鋭角也又如丁戊己三角形之戊角為鈍角則所餘之丁角己角愈小於直角而為鋭角矣第十三凡自一㸃至一横線畫衆線而衆線内有一垂線必短於他線而他線與垂線相離愈逺則愈長也如自甲㸃至乙丙線畫甲乙甲丁甲戊幾線此内甲乙為垂線較之甲丁甲戊線則其度最短而甲戊線與甲乙線相離既遠於甲丁故更長於甲丁線也葢甲乙為垂線則乙角必為直角見首卷第十節而甲乙丁三角形内丁角甲角必俱為鋭角而小於乙角矣因乙角大於丁角故此乙角相對之甲丁線必長於丁角相對之甲乙線又甲丁戊外角原與甲乙丁乙甲丁二内角相併之度等見本卷第五節則此甲丁戊一外角必大於甲乙丁一内角矣甲丁戊之外角既大於甲乙丁之内角則甲丁戊角相對之甲戊線必長於甲乙丁角相對之甲丁線可知矣第十四凡三角形將二界線相併必長於所餘之一界線如甲乙丙三角形將甲乙甲丙二界線併之則長於所餘之乙丙界線也試以丙甲線引之至丁作丁甲線與甲乙等則丁丙線為甲丙甲乙二界線之共度矣復自丁至乙作丁乙線成乙甲丁兩界相等之三角形其丁乙甲角與丁角等見本卷第九節則丁乙丙角必大於丁角夫丁乙丙角既大於丁角則其所對之丁丙線必長於丁角相對之乙丙線可知矣見本卷第十一節幾何原本三第一凡四邊線函四角者其形有五四邊線度等而角度亦等者為正方形四角直而兩邊線短兩邊線長者為長方形四邊線度等而角度不等者為等邊斜方形兩邊線長兩邊線短而角度又不等者為兩等邊斜方形以上四形俱自平行線出如四邊線不等亦不平行而四角度又不等者為不等邊斜方形第二凡四平行線所成方形其所函之角成兩對角必兩兩相等如甲乙丙丁平行線方形其甲角度丙角度等而乙角度丁角度亦等若以丙丁線引長至戊作一線成一丁外角與甲角為二尖交錯之角其度相等見首卷第二十二節而丁外角與丙角又為一邊之内外角其度亦等見首卷第二十二節夫甲丁二角既等丁丙二角又等則甲角與丙角必自相等而丁乙兩對角之相等不言可知矣第三凡平行四邊形自一角至相對之角作一對角線必平分四邊形為兩三角形如甲丙乙丁四邊形作甲乙對角線即成丙甲乙丁甲乙兩相等三角形葢此四邊形之丙丁二角為對角其度必等見本卷第二節而對角線所分之丙甲乙丁乙甲二角丙乙甲丁甲乙二角俱為二尖交錯之角其度又兩兩相等見首卷第二十二節夫此兩三角形原自一四邊形而分各角又俱相等則其所函之分必等而四邊形平分為兩平分無疑矣第四凡平行線所成方形其兩兩平行線度俱相等如甲丙乙丁四邊形之丙甲線與乙丁線度等丙乙線與甲丁線度等此即如前節作一對角線成兩三角形而兩形之各角必俱相等則丙甲乙丁二線丙乙甲丁二線俱為各相等角所對之線其度亦必相等矣見二卷第八節第五平行線方形内兩對角線其相交處必平分二線之正中如甲乙丙丁二線相交於戊則所成甲戊戊乙二線丙戊戊丁二線俱等葢因丙戊乙甲戊丁兩三角形之丙乙甲丁二線為平行線其度等見本卷第四節而丙乙戊丁甲戊二角乙丙戊甲丁戊二角皆為平行線内相對之錯角其度俱等見首卷第二十二節夫丙乙甲丁二線既等各相對之錯角又等則丙乙戊丁甲戊二等角相對之戊丙戊丁二線度與甲丁戊乙丙戊二等角相對之戊甲戊乙二線度必皆相等可知矣見二卷第八節第六凡平行線方形内於對角線上或縱或横正中截開即將此形為兩平分如甲丙乙丁之方形其甲乙對角線上畫一戊己線於庚處截開則平分甲丙乙丁方形為丙戊己乙一段甲戊己丁一段此二段内之戊甲庚己乙庚兩三角形之甲庚乙庚二線相等而戊甲庚己乙庚之兩角又為平行線内二尖交錯之角其度相等而甲庚戊乙庚己二尖相對之角其度又等則此兩三角形度亦必相等又如甲乙對角線將甲丙乙丁方形為兩平分則其甲丙乙甲丁乙兩三角形度必等將此兩相等之三角形以戊己線截開於甲丙乙形内減甲戊庚於甲丁乙形内減乙己庚則所餘之甲庚己丁乙庚戊丙二形度必等今所分各形既俱兩兩相等則甲丙乙丁之方形為戊己線所截自為兩平分可知矣第七凡四邊形於對角線不拘何處復作相交二平行線即成四四邊形設如甲丙乙丁四邊形於對角線之戊處復作一壬戊己一辛戊庚相交之二平行線即成甲戊戊乙丙戊戊丁四四邊形此四形中之甲戊戊乙二形為對角線上所成之形丙戊戊丁二形為對角線旁所成之形此對角線旁所成兩形必俱相等如丙壬戊庚戊辛丁己兩形之分是己葢甲丙乙丁之全形因甲乙對角線平分為兩平分所成之甲丙乙甲丁乙兩大三角形之分必等其對角線上所成之一小方形復為甲戊對角線平分為兩平分成甲庚戊甲己戊兩小三角形此兩小三角形之分亦必等而對角線上所成之一大方形又為戊乙對角線平分為兩平分成戊壬乙戊辛乙兩中三角形此兩中三角形之分亦必等今將甲丙乙甲丁乙兩大三角形内減去甲庚戊甲己戊之兩相等小三角形再減去戊壬乙戊辛乙之兩相等中三角形所餘對角線旁所成之丙壬戊庚戊辛丁己兩四邊形此兩四邊形自然相等矣第八凡兩平行線内同底所成之四邊形其面積必等如甲己乙辛兩平行線内於乙丙底作甲乙丙丁一長方四邊形戊乙丙己一斜方四邉形此兩形雖不同而所容之分必相等何也試以兩三角形考之如甲乙戊一三角形丁丙己一三角形此兩三角形之甲乙丁丙二線等甲戊丁己二線亦等甲丁戊己二線俱與乙丙平行而度分相等若於甲丁戊己二線各加一丁戊線即成甲戊丁己線其度自然相等而戊甲乙己丁丙二角為甲乙丁丙平行線一邊之内外角其度又等則此兩三角形自然相等可知矣今於兩三角形内各減去丁戊庚則所餘之甲乙庚丁戊庚丙己二形之分必等復於此二形内毎加一庚乙丙形則成甲乙丙丁戊乙丙己之兩四邊形其面積必然相等也第九兩平行線内無論作幾四邊形其底度若等則面積必俱等如甲乙丙丁二平行線内作甲丙己戊庚辛丁乙兩平行線四邊形其丙己辛丁兩底度相等則其積亦等試自丙己底至庚乙畫二直線即成一庚丙己乙斜四邊形此斜四邊形既與甲丙己戊四邊形同出於丙己之底即同前節两形面積俱等矣至於庚辛丁乙與庚丙己乙又同出於庚乙之底故此两形面積亦俱等觀此兩兩相等則甲丙己戊庚辛丁乙兩形之面積相等明矣第十凡兩平行線内同底所成之各種三角形其面積俱等如甲乙丙丁兩平行線内於丙丁底作甲丙丁一三角形己丙丁一三角形此兩三角形之面積必等何也自丁至戊作一直線與甲丙平行再自丁至乙作一直線與己丙平行即成甲丙丁戊己丙丁乙兩四邊形此二形既同出於丙丁底其面積相等而甲丙丁己丙丁兩三角形為平分兩四邊形之一半其面積亦必相等矣第十一兩平行線内無論作幾三角形其底度若等其面積亦俱等如甲乙丙丁二平行線内作甲丙戊庚戊己兩三角形其丙戊戊己兩底度相等故其面積亦等今自戊至辛作一直線與甲丙平行又自己至乙作一直線與庚戊平行即同前節成面積相等之兩四邊形而此甲丙戊庚戊己兩三角形為面積相等兩四邉形之各一半則此两三角形之面積必等可知矣第十二凡有幾三角形其底若俱在一直線而各底相對之角又共遇於一處則其衆三角形必在二平行線之間如甲乙丙甲丙丁甲丁戊甲戊己四三角形其乙丙丙丁丁戊戊己各底俱在一庚辛直線上而各底相對之角又皆遇於甲處則此四三角形俱同在庚辛壬癸二平行線之間矣第十三凡等邊等角各形内五邊者為五角形六邊者為六角形邊愈多角愈多者俱隨其邊與角而名之焉第十四多邊多角形自角至心作線凡有幾界即成幾三角形設如辛七邊形自心至邉七角作七線即成七三角形而此各三角形之分俱相等也第十五欲知衆邊形各邊角之度將邊數加一倍得數減四其所餘之數即為各邊角度也如辛七邉形以七邊數加一倍共為十四十四内減四所餘之十即為十直角數為此七邊形之各邊角之總度也何也假如辛形自心至七角作七線成七三角形凡三角形之三角與二直角等見二卷第四節則此七三角形之各三角度共與十四直角等其七三角形之辛心所有之七角又與四直角等見首卷第十五節若將十四直角内減四直角乃餘十直角則此十直角與衆邊形之各邊角之總度相等可知矣幾何原本四第一凡有直線切於圜界而不與圜界相交者謂之切線如甲乙丙線切於丁圜乙界其線雖自甲過乙至丙而與圜界不出入相交此甲乙丙線即為圜之切線也又如一圜與一圜界相切而不相交則謂之切圜假如戊圜與己圜於庚界相切二界總未相交故又謂之切圜也第二凡一直線横分圜之兩界謂之弦線其所分圜界之一段謂之弧此弧與弦相交所成之二角謂之弧分角如甲丙線横分甲乙丙丁圜界於甲丙則甲丙線為弦其所分之甲丁丙一段甲乙丙一段皆謂之弧而甲丙弦與甲乙丙弧相交所成之甲丙乙丙甲乙二角即謂之弧分之角焉第三凡自一圜弦線之兩頭復作二直線相遇於圜界之一處其所成之角謂之圜分内角又謂之弧分相對之界角也如甲乙丁丙圜之甲乙丙一段自乙丙弦線之兩頭各作一直線於甲處相遇其所成之乙甲丙角即圜分内角然此甲角與乙丁丙弧相對故又為弧分相對之界角也第四凡一圜有二輻線截弧之一段所成之三角形謂之分圜面形如甲圜自甲心至圜界乙丙二處作甲乙甲丙二輻線所成之甲丙乙三角形即為分圜面形也第五凡自圜之輻線之末與圜界相切作一垂線則此垂線與輻線之末在圜界僅一㸃相切其他全在圜外即如甲圜之甲乙輻線於乙末作一丙乙垂線則此丙乙垂線與甲乙輻線俱在圜界乙處之一㸃相切而此垂線之丁等處俱在圜外也若自圜之甲心至丁作一甲戊丁線此線必長於甲乙輻線如二卷第十三節云因其長於輻線必出於圜界之外此甲戊丁線既出於圜界之外則丙乙線全在圜外可知矣第六圜弦線上自圜心作一垂線則將弦線為兩平分如乙丙弦自圜心甲至弦線丁作一垂線必將乙丙弦為兩平分成乙丁丁丙二段若自甲心至弦線乙丙二末作二輻線成一甲乙丙三角形此三角形之甲乙甲丙二線為一圜之輻線其度必等此二輻線既等則甲乙丙三角形内甲丁垂線所分之乙丁丁丙二段亦必等矣若將垂線引長至弧界戊作線則又將乙丙弧界為兩平分矣第七凡自圜外一處至圜界兩邊作二切線此二線之度必等如自圜外甲至圜界乙丙兩邊作甲乙甲丙二切線此二線之度相等今於圜心丁至圜界乙丙二切線之末作二輻線則此二輻線為甲乙甲丙之垂線矣如本卷第五節云因其為垂線則甲乙丁甲丙丁之二角必同為直角見首卷第十節再自丙至乙作一弦線即成丁乙丙甲乙丙兩三角形丁乙丙三角形之丁乙丁丙二線同為圜之輻線其度必等因其相等故丁乙丙丁丙乙二角亦必等夫甲乙丁甲丙丁二角原相等此二角内減去丁乙丙丁丙乙二角則所餘之甲乙丙甲丙乙二角亦自相等此二角既俱相等則甲乙甲丙二切線為等角傍之兩界線自然相等無疑矣第八凡圜内兩弦線若等其分圜弧面之積必等自心至兩弦所作垂線亦必等如甲圜之丙乙丁戊二弦之度若等則所分丙己乙辛丁庚戊壬二弧面積必等自此圜之甲心至丙乙丁戊二弦各作甲壬甲辛垂線其度亦必等何也如自甲心至丙乙丁戊二弦之末各作輻線即成甲丙乙甲丁戊兩三角形此兩三角形之各界線必兩兩相等則此兩三角形内相等線所對之角亦必相等見二卷第七節角既相等則等角相對弧界之丙己乙丁庚戊二段亦必相等見首卷第十二節丙己乙丁庚戊二弧線既等丙乙丁戊二弦線又等則丁庚戊壬之弧面積與丙己乙辛之弧面積自然相符矣又甲辛甲壬二垂線將丙乙丁戊二弦為兩平分則丙辛乙辛丁壬戊壬之四線亦俱等三角形之各界線既兩兩相等而三角形内各角又兩兩相等則平分丙乙丁戊二弦之甲辛甲壬之度自然相等矣第九凡弦線之所屬有三種一為弧之切線一為弧之割線一為弧之弦線欲取弧界各角之度用此三線求之必得也如甲圜之甲乙輻線于乙末作丙乙垂線復自圜心甲至圜界戊割出至丙乙垂線丁分作甲丁線又從圜界戊至甲乙輻線作戊己垂線則成三種線此三線内丁乙線為乙戊弧之切線甲丁線為乙戊弧之割線戊己線為乙戊弧之正弦凡欲得各角弧界之度必於此三種線取之如欲取乙甲戊角相對弧度則自與甲角相對乙戊弧之丁乙切線取之或自乙戊弧之甲丁割線取之或自乙戊弧之戊己正弦取之皆得乙戊弧之度數焉第十一圜界内任於圜界一段至圜心作二線至圜界作二線即成二角在圜心者為心角在圜界者為界角設如甲乙丁圜自甲乙一段至丙心作甲丙乙丙二線仍自甲乙至丁界作甲丁乙丁二線成甲丙乙甲丁乙二角其甲丙乙角為心角甲丁乙角為界角也第十一圜内之心角界角同立圜界之一段而各角之二線所成之式又分為三種有界角心角同用一線者有界角心角不同用一線者有界角二線跨心角二線者總之此三種心角皆大於界角一倍如有三圖圜心之甲丙乙角皆自圜界甲乙一段作甲丙乙丙二線圜界之甲丁乙角亦自圜界甲乙一段作甲丁乙丁二線則第一圗之甲丁乙界角之乙丁線同立於甲丙乙心角之乙丙線上而甲丙乙心角為甲丙丁三角形之外角與甲丁丙丙甲丁二内角等見二卷第五節其甲丙丙丁二線又為一圜之輻線其度亦等此二線既等則甲丁丙丙甲丁二角亦必等見二卷第九節今甲丙乙之外角既與甲丁丙丙甲丁二内角等則甲丙乙心角大于甲丁乙界角一倍可知矣如第二圖甲丁乙界角之乙丁線不同立于甲丙乙心角之乙丙線上而甲丙乙心角在甲丁乙界角甲丁丁乙二直線之外則自丁角過圜之丙心至對界作一丁丙戊全徑線即成甲丙戊一大心角乙丙戊一小心角甲丁戊一大界角乙丁戊一小界角其甲丙戊大心角即如第一圖必倍於甲丁戊大界角而乙丙戊小心角亦必倍於乙丁戊小界角於甲丙戊大心角内減去乙丙戊小心角甲丁戊大界角内減去乙丁戊小界角則所餘之甲丙乙心角必大於所餘之甲丁乙界角一倍矣如第三圖甲丁乙界角之二線正跨於甲丙乙心角二線之上而甲丙乙心角在甲丁乙界角甲丁丁乙二直線之間則自丁角過圜之丙心至對界作丁丙戊全徑線即成甲丙戊乙丙戊二心角甲丁戊乙丁戊二界角此甲丙戊心角必倍於甲丁戊界角乙丙戊心角亦必倍於乙丁戊界角以甲丙戊乙丙戊二心角併之乃甲丙乙一心角以甲丁戊乙丁戊二界角併之乃甲丁乙一界角今所分之二心角既各倍於所分之界角則此所併之甲丙乙心角必倍於所併之甲丁乙界角矣第十二凡自圜之弧線一段任作相切界角幾何其度必俱相等如甲乙丁丙之圜自甲乙弧線一段至圜界丙丁作相切之甲丙乙乙丁甲二界角此二角之度必俱相等試自圜之戊心至圜界甲乙作二輻線即成甲戊乙一心角此甲戊乙之心角與甲丙乙乙丁甲界角俱同一圜弧線之一段則心角必倍於界角然則甲丙乙乙丁甲二界角既俱為甲戊乙心角之一半則此二角之度必等可知矣第十三凡圜内心角所對弧線之度比界角所對弧線之度少一半則二角之度必等如甲丙戊丁圜内有甲乙丙一心角甲丁戊一界角而甲乙丙心角相對甲丙弧線之度比甲丁戊界角相對甲戊弧線之度少一半則甲乙丙心角之度必與甲丁戊界角之度相等試自丁角過圜之乙心至對界作丁乙己全徑線復自乙心至戊界作乙戊半徑線即成甲乙己己乙戊二心角甲丁己己丁戊二界角其甲乙己心角必倍於甲丁己界角而己乙戊心角亦必倍於己丁戊界角今以甲乙己己乙戊二心角相併甲丁己己丁戊二界角亦相併則甲乙己己乙戊二心角所併之度必倍於甲丁己己丁戊二界角所併之度矣是以甲丁戊一界角必得甲乙己己乙戊二心角所併之一半夫甲丙弧線既為甲戊弧線之一半而甲乙丙角又為甲乙己己乙戊二心角所併之一半則甲乙丙心角度必與甲丁戊界角之度相等矣第十四凡圜内界角立於圜界之半者必為直角如甲乙丙丁圜内之甲乙丙界角立於甲丁丙圜界之正一半則此甲乙丙角必然為直角也自甲丁丙之半圜於丁界為兩平分復自丁界至圜心戊作丁戊輻線即成甲戊丁角其相對之甲丁弧為圜界四分之一既為圜界四分之一則必為直角如首卷第十節云夫心角相對弧線若為界角相對弧線之一半其二角之度相等矣如本卷第十三節云今甲戊丁心角相對之甲丁弧線既為甲乙丙界角相對之甲丁丙弧線之一半則甲戊丁心角度必與甲乙丙界角度相等且甲丁弧線既為圜界四分之一而甲丁丙弧線又為圜界之正一半則甲戊丁心角為直角而甲乙丙界角亦必為直角矣第十五凡圜内界角其所對之弧過於圜界之半者必為鈍角如甲乙丙戊圜内之甲乙丙界角其相對之甲戊丙弧大於圜界之一半故其相對之甲乙丙角為鈍角也試將甲戊丙弧平分於戊為甲戊戊丙兩段復自圜心丁至甲戊作二輻線即成甲丁戊一心角其甲戊丙弧分既大於半圜則此甲戊弧線一段亦大於圜之四分之一矣故此甲戊弧線相對之甲丁戊心角必為鈍角見首卷第十一節夫心角相對之弧線比界角相對之弧線少一半則二角之度必相等如本卷第十三節云今甲丁戊心角相對之甲戊弧線正為甲乙丙界角相對甲戊丙弧線之一半則甲乙丙界角自然與甲丁戊心角等矣夫甲丁戊心角既為鈍角則甲乙丙界角亦必為鈍角矣第十六凡圜内界角其所對之弧不及圜界之半者必為鋭角如甲乙丙戊圜内之甲乙丙界角其相對之甲戊丙弧小於圜界之一半故其相對之甲乙丙角為鋭角也試將甲戊丙弧平分於戊為甲戊戊丙兩段復自圜心丁至甲戊作二輻線即成甲丁戊一心角此心角所對之甲戊弧線既不足圜界四分之一則此甲丁戊心角必為鋭角矣見首卷第十一節此甲丁戊心角所對之弧比之甲乙丙界角所對之弧為一半則此二角之度必等夫甲丁戊心角既為鋭角則甲乙丙界角亦必為鋭角矣第十七凡函圜各界形之各線與圜界相切而不相交則謂之函圜切界形如甲乙丙三角形之甲乙乙丙丙甲三界線俱在庚圜界之丁己戊三處相切而不相交故謂之函圜切界三角形又若甲乙丙丁四方形之甲乙乙丙丙丁丁甲四界線俱在戊圜界之己庚辛壬四處相切而不相交則謂之函圜切界四邊形觀此二圖則知函圜各界形必大於所函圜界形之分矣第十八凡圜内直界形之各角止抵圜界而不割出則謂之圜内所函各邊形如甲乙丙三角形之甲角乙角丙角俱與丁圜界相抵而不曾割出即謂之圜内所函三角形又如甲乙丙丁四方形之甲角乙角丙角丁角俱與戊圜界相抵而不割出則謂之圜内所函四邊形觀此二圖則知函於圜界各界形必小於圜界形之分矣第十九凡等邊衆界形或函圜或函於圜其界數愈多愈與圜界相近如甲圜形函乙丙丁等邉三角形又函乙己丙庚丁戊等邉六角形以三角形之三邊比之六角形之六邊則六角形之六邉與圜界相近矣設有十二角形之十二邊比此六角形之六邊則十二角之十二邊又與圜界為近若有二十四角之二十四邊則又更近於十二角之十二邊矣葢函衆界形之度必大於所函之衆界形度見本卷第十七十八兩節今甲圜既函等邊六角形自大於六角形而此六角形又函等邉三角形亦必大於三角形由此推之十二角函六角二十四角函十二角其邊愈多者其度愈大故與圜界愈近也又如復有一函圜等邊四角形内又作一函圜等邊八角形此四角形既函八角形必大於八角形可知矣若於八角形内復作十六角形十六角形内又作三十二角形其所函形愈小邉數愈多則與所函之圜界度愈近矣苟設一函於圜界之多邉形為幾十萬邉設函於圜界之多邉形一自六邉起算一自四邉起算復設一函圜界之多邉形亦為幾十萬邉設函圜界之多邉形亦一自六邉起算一自四邉起算使此函圜之多邉形自外與圜界相比而函於圜界之多邉形自内與圜界相比則此二多邊形之每邊直界線將與圜界曲線合而為一故圜界曲線可得直線之度而多邉形之直線亦可得為圜界度也第二十函圜切界等邊形其所函圜之輻線度與一直角三角形之小邊之度等而等邉形之衆界共度又與三角形之大邊之度等則三角形之面積與等邊形之面積等如丙丁戊己庚等邉五角形其所函甲圜之甲乙輻線與辛壬癸直角三角形之辛壬小邉線度等而五角形之丙丁戊己庚五邉線共度又與三角形之壬癸大邉線度等則此辛壬癸三角形面積必與丙丁戊己庚等邉五角形面積等也何以見之若自五邊形之甲心至丙丁戊己庚之五角作甲丙甲丁甲戊甲己甲庚五線即分成甲丙丁類五三角形夫辛壬癸三角形之壬癸線度既與五角形之五邉共度等今將壬癸線平分五分以所分之每分為底依前所分五三角形式作甲壬丙類五正式三角形復自所分丙丁戊己四處俱至三角形之辛角作丙辛丁辛戊辛己辛四線遂分辛壬癸一三角形為辛壬丙類五斜式三角形再自甲壬丙類五三角形之甲角至底各作一甲乙垂線俱與圜之輻線等則甲壬丙相等之五三角形之髙度亦自相等矣於是復自辛壬癸三角形之辛角與五甲角相切作一辛子線與壬癸為平行線則此平行線内同底所成之各種三角形之面積必俱相等矣見三卷第十節葢辛壬丙甲壬丙兩三角形為同底辛丙丁甲丙丁兩三角形為同底辛丁戊甲丁戊兩三角形為同底辛戊己甲戊己兩三角形為同底辛己癸甲己癸兩三角形為同底故其面積俱相等也且辛壬丙三角形與甲壬丙三角形既俱相等則辛壬丙之類五斜式三角形之面積即如甲壬丙之類五正式三角形之面積矣其所分各形之面積俱等則其全形之面積自然相等此所以辛壬癸直角三角形之面積與丙丁戊己庚等邉五角形之面積相等也第二十一圜界内函等邊衆界形其圜心至衆界所作中垂線與一直角三角形之小邉之度等而等邊衆界形之衆界共度又與直角三角形之大邊之度等則此三角形之面積與等邊衆界形之面積等如甲圜所函乙丙丁戊己庚等邉六角形其圜之甲心至衆界所作甲辛垂線與壬癸子直角三角形之壬癸小邉線度等而六角形之乙丙丁戊己庚六邉線共度又與三角形之癸子大邉線度等則此壬子癸三角形面積必與乙丙丁戊己庚等邉六角形面積等也若依前節法將六邉形分為六三角形復以三角形之癸子界照六邉形度分為六分又照六邊形所分六三角形作六正式三角形復自壬子癸三角形之壬角至乙丙丁戊己五處作五斜線成六斜式三角形此兩式三角形同底又同在二平行線内則其面積必兩兩相等此兩式六三角形之垂線既與壬癸子直角三角形之壬癸小邉線度等而兩式六三角形之底線共度又與壬子癸直角三角形之癸子大邉線度等則壬癸子直角三角形之面積必與乙丙丁戊己庚等邉六角形之面積相等矣第二十二凡圜形之輻線與一直角三角形之小邊線度等而圜之周界與三角形之大邉線度等則此直角三角形之面積與圜形之面積相等如有一甲圜形其甲乙輻線與丙丁戊直角三角形之丙丁小邉線度等而甲圜形之乙周界又與丙丁戊三角形之丁戊大邉線度等則此丙丁戊三角形之面積即與甲圜形之面積相等也何以見之甲圜之輻線與三角形之小邉等者即如等邉衆界形之中垂線與三角形之小邉等也甲圜之周界與三角形之大邉等者即如等邉衆界形之各界共度與三角形之大邉等也若夫函圜衆界形相等之三角形其小邊雖與圜之輻線等其大邉則長於圜之周線故其積分亦大於圜之積分而函於圜衆界形相等之三角形其小邉既短於圜之輻線而大邊亦短於圜之周線故其積分亦小於圜之積分今此甲圜形相等之丙丁戊三角形其小邊既與圜之輻線等面三角形之大邉又與圜之周線等則其積分與圜形之積分相等無疑矣然圜周界曲線也等邉衆界形之界度直線也觀之似難於相通者如以圜之内外各設多邉衆界形分為千萬邉如本卷第十九節云則逼圜界最近將合而為一乃依所分之段為千萬正式三角形此千萬正式三角形之中垂線亦將與圜之輻線合而為一而千萬邉共界度既與圜周合而為一則圜周之曲線亦變而為直線矣夫千萬邉正式三角形之中垂線既成圜之輻線則與丙丁戊三角形之小邊等而千萬邉正式三角形之底界共度又成圜之周度則又與丙丁戊三角形之大邊度等矣復自丙丁戊三角形之丙角至千萬正式三角形之底界各作千萬斜式三角形以比正式三角形因其㡳同其分自相等故千萬斜式三角形之共積比之千萬正式三角形之共積千萬正式三角形之共積比之丙丁戊一直角三角形之面積丙丁戊直角三角形之面積比之甲圜形之面積俱相等也第二十三有一圜形又一衆界形此圜界度若與彼衆界總度等則圜形之面積必大於衆界形之面積也如甲乙丙丁圜形之周界與戊己庚辛等邊四角形之四邉總度等則圜形之面積必大於等邉四角形之面積矣前言凡圜形之輻線與一直角三角形之小邉線度等而圜之周界與三角形之大邉線度等則三角形之面積與圜形之面積相等矣今試以甲乙丙丁圜形周界為三角形之大邉以甲乙丙丁圜形之甲壬輻線為三角形之小邉作一子丑寅直角三角形則三角形之丑寅大邉線度亦與戊己庚辛四角形之四邉總度等而三角形之子丑小邉線度雖與圜形甲壬輻線等却比四角形之自壬心至癸邉所作垂線為長若將三角形之子丑小邉線照四角形之壬癸垂線度截開則分子丑線於卯復自卯至寅作一斜弦即成卯丑寅一直角三角形而此卯丑寅三角形之分與戊己庚辛四角形相等也此卯丑寅三角形自子丑寅三角形分之則卯丑寅形必小於子丑寅形今甲乙丙丁圜形之面積既與子丑寅三角形之面積等而戊己庚辛四角形之面積又與卯丑寅三角形之面積等則戊己庚辛四角形之面積必小於甲乙丙丁圜形之面積可知矣觀此凡界度相等之形圜界所函之分比衆界所函之分必大而衆界所函之分與圜界所函之分同者則衆界之總度復比圜界度大也㡬何原本五第一平面之上所立直線無少偏倚其各邊所生之角必俱直則謂之平面上所立垂線也如甲乙之平面正立一丙丁線不偏不倚此即為平面上所立之垂線矣第二凡兩平面相對其所立衆垂線度俱各相等則此相對之平面謂之平行面也如甲乙丙丁二平面間所有戊己衆垂線之度俱相等此甲乙丙丁二平面即為平行面矣第三平面上復立一平面無少偏倚其兩邊所成之角必皆為直角則謂之平面上所立直面也如甲乙平面上所立之丙丁平面無偏無倚兩邊亦俱成直角此即為平面上所立之直面矣第四凡各面相合其每面之角所合處復成一種體角則謂之厚角夫厚角必自三面合之乃成其面多者為各瓣相併所成之厚角也如甲圖四面為四瓣相併所生之厚角乙圖五面為五瓣相併所生之厚角是己第五凡各面相併所成之厚角如將各面計之則其衆角所合之分必不足於四直角度也如甲圖五面合成之厚角若將其五面展開使平作乙丙丁戊己平面之五瓣復以甲為心作一甲圜其乙丙丁戊己之五瓣相離處不能滿甲圜之周界矣因其不滿於圜之周界故比四直角為不足也或以四直角分强欲作一厚角則其瓣過於大必不能成平面所合之厚角矣第六凡等邊三面所合厚角其三面内之兩面角倂之必大於一直角度也如甲丙乙丁之等邉三面所合之甲厚角將乙甲丙丙甲丁二面倂之必大於一直角度矣依前節法將甲厚角展開使平雖不足四直角之度而乙甲丙丙甲丁之二而併之則較之一直角度為大焉何以見之夫三面展開其所離之虛分仍有三面之分以三面之實分合三面之虛分則為六角之全形此六角之全形得四直角度矣六角而得四直角則三角必得二直角三角既得二直角則二角相倂必大於一直角可知矣第七凡平面二線交處作一垂線正立而無偏倚此線任在平面各處俱為垂線如甲乙丙丁平面上甲丙丁乙二線相交己處作一戊己垂線正立而不偏倚則此戊己線任在甲乙丙丁平面上某一處俱為垂線也假使戊己垂線不能正立而有所偏倚則如壬己線近於辛而離於庚矣壬己線既近於辛而離於庚則偏向於丁丙而逺於甲乙而壬己丁壬己丙之二角為鋭角壬己甲壬己乙之二角為鈍角矣戊己既如壬己則不得謂之甲丙丁乙二線相交處正立之垂線矣第八衆線交處立一垂線其各角若俱直此所交各線必在一平面也如甲丙乙丁庚辛之三線相交處立一戊己垂線其與衆線相接各角若俱直則此相交之三線必在一平面也夫衆線之相交固在平面而垂線之所立正所以考面或一角不直則不得謂之平面矣第九平面上若立二垂線必互為平行線如甲乙丙丁之平面上立戊己庚辛二垂線則此二線互為平行線也試自辛過己至壬作一辛壬線則戊己庚辛二垂線所立之分必正其在甲乙丙丁平面上任指何處所生之角俱是直角見本卷首節故戊己壬庚辛己二角俱為直角而相等也且此二角又為二線與一線相交所成之内外角其度既等則戊己庚辛二線必為平行線矣如首卷第二十一節第十有二線與一垂線平行雖不在平面之一界此三線亦互相為平行線也如甲乙丙丁二線俱與戊己一垂線平行不立於一直線上雖不居平面之一界此三線亦必互為平行線也試於甲乙丙丁戊己三線之末作一庚辛平面此平面上之戊己線為垂線其四圍平面所生之各角俱是直角矣復自乙過己自丁過己作相交二線則成甲乙己戊己壬二角丙丁己戊己癸二角此各二角俱為平行線一邉之内外角俱為相等角矣見首卷第二十一節而甲乙己丙丁己二角亦俱為直角夫甲乙丙丁二線在庚辛平面上所生之角皆直又皆與戊己垂線所生之角等則甲乙丙丁二線亦皆得為垂線其與戊己線為互相平行之三線可知矣第十一相對二平面之間横一直線此線在二平面上所生角若俱直則此相對二面互相為平行面也如甲辛乙庚丙癸丁壬二平面之間横一戊己直線此戊己線末所抵處其四圍俱成直角則此二平面互相為平行面矣試將此二平面之戊己横線所抵之處作甲乙庚辛相交二線丙丁壬癸相交二線則戊己横線於二平面各界所生之角俱為直角如甲乙丙丁二線與戊己横線相抵所生之甲戊己戊己癸二尖交錯之角相等故甲乙丙丁相當之二線為平行矣又如辛戊己戊己丙二尖交錯之角亦相等故庚辛壬癸相當二線亦為平行矣相對二平面之上所有之相當各二線既俱同為平行線則相對之二平面自然互為平行面矣第十二有二平行面橫交一面其相交處所生二線必平行如甲乙丙丁平行二面上横交一戊己平面其庚辛壬癸之相交處所生二線亦俱平行也何以言之庚辛壬癸平面相交處所生二縫既在甲乙丙丁二平面之上自然與甲乙丙丁二面之甲丑子乙丙卯寅丁之各線同為平行線且又在戊己一平面内其分自然相對故此二平面與一平面相交之縫線亦得為平行也第十三凡各種面内所積之實為體而皆因其面以名之焉如全體不成角度止現圓之圓面則謂之圓體甲乙圖是也全體各面俱平各邊相等所成各角又等則謂之平面正方體丙丁圖是也全體各面雖平體長而面成兩式其相對各面仍兩兩相等相對各邊則又平行角又相等此謂之平行長方體戊己圖是也體有曲平兩面相雜而不成等邊等面則謂之底平半圓體庚辛圖是也全體相對之各面不平行上下兩面平行則謂之上下面平行體壬癸圖是也體圓而上下面俱平則謂之長圓體子圖是也底為平面其各面俱合於一角而成厚角則謂之尖瓣體底三角者謂之三瓣尖體底四角者謂之四瓣尖體底衆角者謂之衆瓣尖體如丑寅卯三圖是也又或底面圓而漸鋭成形則謂之尖圓體辰圖是也第十四凡圓體長圓體尖圓體俱生於圜面故其外皮面積亦生於圜界一旋轉之度分耳如取甲乙丙丁之圓形則以甲乙徑線為樞心將甲丙乙半圓作轉式旋轉復還於原處即成甲丙乙丁一圓形體如取甲乙戊己平行面之長圓形則以甲乙中線為樞心將丙丁線界作轉式旋轉復還於原處即成甲乙戊己一長圓體如取甲丙丁平底尖圓形則以甲乙中線為樞心將甲丁邉線作轉式旋轉復還於原處即成甲乙丙丁一尖圓體矣第十五凡各體形其各面平行相當則相對兩邊面積俱相等如甲乙丙丁之正方體其甲戊庚丁甲己戊丙甲丙乙丁六面俱各平行故相對二面之積自兩兩相等也第十六凡體面式不一而積等者為積數相等之體面式既同而體積又等者爲面式體積全等之體如甲乙二體為積數相等之體也丙丁二體為面式體積全等之體也第十七凡平行面之長方體自一面之對角線平分為兩三稜體此兩三稜體必爲面式體積全等之體矣如甲乙平行面長方體自丙丁二角至相對戊己二角分為兩段成戊丙乙丁己甲兩三稜體為面式體積全等體也試以甲丙庚戊辛丁乙己兩平面形自戊丙丁己兩對角線均分為兩三角形面則所分之戊庚丙己乙丁丙甲戊丁辛己四三角形面積俱相等而丙乙甲己甲丁戊乙各面又互為平行必兩兩相等再對角線分成之丙丁己戊戊己丁丙二面原在一界所分必各相等今所分二形之各面既各相等則其積必等而為面式體積全等體無疑矣第十八凡平行二平面之間若同底立各平行體其積必相等設甲乙丙丁平行二平面之間於戊己庚辛底立壬庚癸己二平行體其積俱相等何也葢因壬戊己子丑寅平面三角形之壬戊己子面與卯辛庚辰癸午平面三角形之卯辛庚辰面平行而壬戊己子丑寅平面三角形之丑戊己寅面與卯辛庚辰癸午平面三角形之癸辛庚午面平行故其各面之度相等其壬子辰卯之面與丑寅午癸一面俱與戊己庚辛一面平行其度亦必相等此二面之度既等則壬子寅丑卯辰午癸二面之度亦必俱等其上下各面度既等而平面兩三角形之各面各邉度又俱等則此壬庚癸己二平行體之積必然相等也可知矣第十九凡平行平面之間所有立於等積底之各平行體其積必俱相等設如甲乙丙丁平行二平面之間有戊己庚辛壬癸子丑二等積之底立一寅庚正靣平行體一卯子斜面平行體此二體之積必相等試自寅庚正面平行體之戊己庚辛底至卯子斜面平行體之卯辰午未面復作一卯庚斜面平行體則寅庚卯庚二體立於戊己庚辛之一底其積相等矣如前節所云而卯子卯庚二體又同立於卯辰午未之面其積亦必相等是以寅庚正面平行體卯子斜面平行體俱與卯庚平行體相等故云凡平行平面之間所有立於等積底之各平行體其積必俱相等也第二十平行平面之間有立於等積三角底之各三面體其積必俱等如甲乙丙丁平行二平面之間有子庚丑寅癸卯等積三角底立戊庚己辛癸壬之兩三面體此二體積必相等何以見之若以此二體之上邊二面之戊辰辰己二界平行作戊未己未二線辛午壬午二界平行作辛申壬申二線又於此二體之下邊二面之子庚庚丑二界平行作子酉酉丑二線寅癸癸夘二界平行作寅戌戌卯二線則二體所生酉子庚丑戌寅癸卯四邊平行二底俱在子丑寅卯二對角線其度相等見三卷第三節其分比三角面各大一倍矣復於所作二底邊酉戌二處作酉未一縱線戌申一縱線即成未庚申癸平行面二方體矣其酉子庚丑戌寅癸卯二底既俱相等則所生之未庚申癸平行面之二方體亦自相等見本卷第十九節此未庚申癸平行面二方體既各相等則戊庚己辛癸壬之三面體為未庚申癸二方體之正一半其積必等無疑矣第二十一凡各種體形難以圖顯葢以圖止一面故也必用木石製之始能相肖况此各種形體又或有外實而内空者必按其形以求其理始可發明其精藴矣第二十二凡各面所成體形内其各面俱平行或上下面為平行而立於等積之底其體之髙又等則其體之積亦相等如甲乙體其各面俱平行又如丙丁體其上下面平行立於等積之底其髙又等或又如戊己體其上下面平行圓面積又等髙又等則其兩兩體積必相等矣又如庚辛壬癸之類尖體形苟立於等積之底其體之髙若等則其體之積亦相等何以見之若將衆尖體分為平行底之衆小體其所分衆小體之底度髙度必俱相等如子丑圖其所分小體之積俱等故其全體之積亦相等也第二十三凡上下面平行各體與平底尖體同底同髙者不論平面圓面其平底尖體皆得上下面平行體三分之一如甲乙上下面平行之長方體與丙丁四瓣尖體其乙丁兩底積等甲乙丙丁兩髙度又等則甲乙長方體與丙丁尖體三形等如戊己上下面平行之三稜體與庚辛三瓣尖體其己辛兩厎積等戊己庚辛兩髙度又等則戊己三稜體與庚辛尖體三形等又如壬癸上下面平行之長圓體與子丑尖圓體其癸丑兩底積等壬癸子丑兩高度又等則壬癸長圓體與子丑尖圓體三形等又如壬癸長圓體與甲乙戊己類體同底同髙則壬癸長圓體亦與丙丁庚辛類尖體三倍所合之數等又或子丑尖圓體與丙丁庚辛類尖體同底同髙則子丑尖圓體三倍之乃與甲乙一體戊己一體等也夫同底同髙上下面平行體既俱爲尖體之三倍則尖體為上下面平行體三分之一可知矣葢甲乙戊己壬癸各體其式雖不同苟底積高度相等其積必等而丙丁庚辛子丑各體式雖不同苟底積高度相等其積亦必等故知丙丁庚辛子丑平底尖體互爲甲乙戊己壬癸上下面平行各體三分之一也如將上下面平行各體以木石為之分作同底同髙之各平底尖體用權衡以較其分量則各體之積分自昭然可見矣第二十四凡長圓體外周面積與長方體底面積相等而長圓體半徑又與長方體高度相等則長圓體積必得長方體積之半也如甲乙丙丁長圓體其周圍外面積與戊己長方體之庚己底面積等而長圓體之壬丁半徑又與長方體之戊庚髙度等則此甲乙丙丁長圓體積必得戊己長方體積之一半也試將甲乙丙丁長圓體從壬癸中線至周圍外面分爲千萬分則成子丑己類千萬長尖體此千萬長尖體之髙與長圓體之壬子半徑等而千萬長尖體之共底即長圓體之周圍外面積則此千萬長尖體必爲戊己長方體之一半矣葢寅己辛三角面爲午己長方面之一半見三卷第三節而此子丑己類衆三角面與寅己辛三角面等見四卷第二十節子丑己類衆三角面既與寅己辛三角面等則子丑己類衆長尖體亦必與卯辰庚辛己寅三角體等此卯辰庚辛己寅三角體固爲戊己長方體之一半今長圓體所分之衆長尖體既與卯辰庚辛己寅三角體等則亦必爲戊己長方體之一半故甲乙丙丁長圓體爲戊己長方體之一半也第二十五凡球體外面積與尖圓體之底積等而球體之半徑與尖圓體之高度等則此球體之積與尖圓體之積等也如甲乙丙丁球體之外面積與己庚辛尖圓體之庚子辛癸底積等球體之甲戊半徑與尖圓體之己壬高度等則此球體之積爲與尖圓體之積等也試將球體從中心分爲千萬尖體復將尖圓體亦分爲千萬尖體則球體所分尖體毎一分必皆與尖圓體所分尖體一分等何也葢球體所分尖體皆以球體之外面爲底而以球體之甲戊半徑爲高其尖圓體所分尖體皆以尖圓體之底爲底而以尖圓體之己壬高爲高夫尖圓體之底積原與球體之外面積等而尖圓體之高度又與球體甲戊半徑等故此兩種千萬尖體皆爲同底同高其積相等無疑矣見本卷第十八節然此兩種千萬尖體即球體尖圓體之所分其所分之體既等則原體亦必相等可知故曰球體與尖圓體俱相等也第二十六凡各形外皮面積相等之體惟圓體所函之積數大於他種各體所函之積如甲乙丙丁外皮面積相等各形内甲圓體所函之積必大於乙丙丁直界體所函之積也何也大凡圓形其半圓周一旋轉間即成圓體此戊己庚半圓周一次旋轉即成甲圓體見本卷第十四節又凡平面圓界所函之積必大於等邉各形所函之積見四卷第二十三節平面圓界所函猶大於各等邉所函之積則圓體所函必大於各直界體所函之積可知矣第二十七厚角所成等面體形有五種各以面數而名之其一爲四面體每面有三角各三角之各三界度俱等如甲圖是也二爲六面體毎面俱爲正方其方面之四角俱爲直角而各界互等故又爲正方體如乙圖是也三爲八面體毎面有三角各三角之各三界度俱等如丙圖是也四爲十二面體每面有五角各五角之五界度俱等如丁圖是也五爲二十面體每面有三角各三角之各三界度俱等如戊圖是也第二十八前節發明五種厚角所成等面體形之外不能復生他形葢此五種厚角體俱是等邊三角四角五角之平面相合所成也凡平面自三界以下不能成面見二卷首節而厚角自三面以下亦不能成角故厚角自三面始如甲四面體其四厚角皆三平面三角形所合而成也乙八面體其六厚角皆四平面三角形所合而成也丙二十面體其十二厚角皆五平面三角形所合而成也然平面三角形所合過於五形則不能成厚角故平面六三角形合於一處即成庚形其甲乙丙丁戊己六角相合與四直角等見首卷第十五節既與四直角等則爲平面不成厚角矣如本卷第五節六形相合尚不能成厚角况多形乎是故平面三角形所生厚角體僅得四面八面二十面三種而已若夫平面正方四角形所成厚角如丁六面正方體其八厚角皆三平面四角形所合而成此外更無他形若將四平面四角形合於一處即成辛形其甲乙丙丁四角既俱爲直角必不能成厚角矣故四角形所生厚角僅有一六面正方體而已至於平面五角形所成厚角如戊十二面體其二十厚角皆三平面五角形所合而成此外更無他形也或將四平面五角形如癸子丑寅之四角合於壬此四角俱爲鈍角必大於四直角既大於四直角在平面尚不能相合厚角豈能成耶是以平面五角形所成之厚角僅有一十二面體而已或將平面六角形之三形合於一處爲癸其甲乙丙三角度與四直角等故不成厚角六角平面相合既不成厚角其七角八角等形愈不能成厚角矣故曰四面六面八面十二面二十面五種體只在三角四角五角三種平面形所生此外不能復成他形也御製數理精藴上編卷二
