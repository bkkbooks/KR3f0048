body:
  text: 欽定四庫全書御製數理精藴下編卷三十五末部五借根方比例面類面類設如大小兩正方面積共二百一十八尺其大方面積比小方面積多一百二十尺問大小方面積各幾何法借一根為小方面毎邊之數自乘得一平方為小方面積則大方面積為一平方多一百二十尺兩數相加得二平方多一百二十尺與共積二百一十八尺相等一百二十尺與二百一十八尺各減去一百二十尺餘二平方與九十八尺相等二平方旣與九十八尺相等則一平方必與四十九尺相等卽小方面積加一百二十尺得一百六十九尺卽大方面積也此卽減法因面類之首故設此最易者焉設如甲乙二長方面積共三百尺甲長八尺乙長二丈四尺其甲闊比乙闊為二倍問二長方闊數積數各幾何法借一根為乙之闊數則甲之闊為二根以一根與一丈四尺相乘得十四根為乙之面積以二根與八尺相乘得十六根為甲之面積相加得三十根與三百尺相等三十根旣與三百尺相等則一根必與十尺相等卽乙之闊數與長一丈四尺相乘得一百四十尺為乙之面積於共積三百尺内減之餘一百六十尺為甲之面積或倍乙之闊十尺得二十尺為甲之闊與長八尺相乘亦得一百六十尺為甲之面積也此歸除法設如有甲乙丙三長方甲方闊十尺不知長乙方闊十六尺長與甲等丙方闊四尺面積與甲之長相等又甲乙二方之共面積與丙方之長數相併為三千一百五十尺問三方各長若干法借一根為甲方之長數以闊十尺乘之得十根為甲方之面積乙方之長與甲等亦為一根以闊十六尺乘之得十六根為乙方之面積丙方之面積與甲之長相等亦為一根以闊四尺除之得四分根之一為丙方之長數以甲方之面積十根乙方之面積十六根丙方之長數四分根之一相併共得二十六根又四分根之一與三千一百五十尺相等二十六根又四分根之一旣與三千一百五十尺相等則一根必與一百二十尺相等卽甲方之長數亦卽乙方之長數亦卽丙方之面積以甲方闊十尺與長一百二十尺相乘得一千二百尺卽甲方之面積以乙方闊十六尺與長一百二十尺相乘得一千九百二十尺卽乙方之面積以丙方闊四尺除面積一百二十尺得三十尺卽丙方之長數也此歸除法設如有長方形其長闊和五百零四丈面積為闊自乘之七倍問長闊各幾何法借一根為闊數則長數為五百零四丈少一根以一根與五百零四丈少一根相乘得五百零四根少一平方為長方面積又以一根自乘得一平方七因之得七平方亦為長方面積而與五百零四根少一平方相等兩邊各加一平方得八平方與五百零四根相等八平方與五百零四根各降一位則為八根與五百零四丈相等八根旣與五百零四丈相等則一根必與六十三丈相等卽長方之闊數與五百零四丈相減餘四百四十一丈卽長數也以闊六十三丈自乘得三千九百六十九丈以闊六十三丈與長四百四十一丈相乘得二萬七千七百八十三丈為闊自乘之七倍也此比例法設如有樓一座不知髙數正方池一面不知邊數但云以六丈與樓之髙數相乘與池之邊數等以一百零八丈與樓之髙數相乘與池之面積等問樓髙及池邊數各幾何法借一根為樓之髙數以一根與六丈相乘得六根為池之邊數自乘得三十六平方為池之面積又以一根與一百零八丈相乘得一百零八根亦為池之面積是為三十六平方與一百零八根相等三十六平方與一百零八根各降一位則為三十六根與一百零八丈相等三十六根旣與一百零八丈相等則一根必與三丈相等卽樓之髙數以六丈乘之得一十八丈為池之邊數自乘得三百二十四丈為池之面積又以一百零八丈與樓髙三丈相乘亦得三百二十四丈與池之面積相等也此面積相除法設如甲乙二人有銀不言兩數但知其銀之比例同於八與五若以二人銀相併則與二人銀相乘之數等問二人銀各若干法借八根為甲銀數五根為乙銀數相乘得四十平方又以八根與五根相加得一十三根是為四十平方與十三根相等四十平方與十三根各降一位則為四十根與十三兩相等四十根旣與十三兩相等則八根必與二兩六錢相等卽甲銀數五根必與一兩六錢二分五釐相等卽乙銀數兩數相加得四兩二錢二分五釐若以兩數相乘亦得四兩二錢二分五釐也此比例法設如有大小二正方池小池毎邊為大池毎邊之三分之一二池共邊數為二池共面積之五十分之一問二池邊數面積各幾何法借一根為小池毎邊之數則大池毎池之數為三根兩邊數相加得四根又以一根自乘得一平方為小池面積以三根自乘得九平方為大池面積兩面積相加得十平方為二池共邊之五十倍乃以共邊四根以五十乘之得二百根是為十平方與二百根相等十平方與二百根各降一位則為十根與二百丈相等十根旣與二百丈相等則一根必與二十丈相等卽小池毎邊之數三因之得六十丈卽大池毎邊之數也兩邊數相加得八十丈又以小池毎邊二十丈自乘得四百丈為小池面積以大池毎邊六十丈自乘得三千六百丈為大池面積兩面積相加得四千丈為共邊之五十倍也此二正方邊線面積比例法設如有甲乙丙三正方乙方毎邊為甲方毎邊之四分之一丙方毎邊為甲方毎邊之八分之一而乙丙兩方之共面積為甲方毎邊之十倍問三方邊數面積各幾何法借八根為甲方毎邊之數則乙方毎邊之數為二根丙方毎邊之數為一根以二根自乘得四平方為乙方面積以一根自乘得一平方為丙方面積兩面積相加得五平方為甲方毎邊之十倍乃以甲方毎邊八根十因之得八十根是為五平方與八十根相等五平方與八十根各降一位則為五根與八十尺相等五根旣與八十尺相等則一根必與十六尺相等卽丙方毎邊之數倍之得三十二尺卽乙方毎邊之數八因之得一百二十八尺卽甲方毎邊之數也以乙方每邊三十二尺自乘得一千零二十四尺為乙方面積以丙方毎邊十六尺自乘得二百五十六尺為丙方面積兩面積相加得一千二百八十尺為甲方毎邊之十倍也此三正方邊線面積比例法設如有甲乙二正方甲方為乙方毎邊之三倍以甲方邊四分之一與乙方面積相乘則與甲方面積等問二方邊數面積各幾何法借十二根為甲方毎邊之數則乙方毎邊之數為四根以十二根自乘得一百四十四平方為甲方面積以四根自乘得一十六平方為乙方面積取甲方邊四分之一三根與乙方面積一十六平方相乘得四十八立方是為四十八立方與一百四十四平方相等四十八立方與一百四十四平方各降二位則為四十八根與一百四十四尺相等四十八根旣與一百四十四尺相等則十二根必與三十六尺相等卽甲方毎邊之數三歸之得十二尺卽乙方毎邊之數也以三十六尺自乘得一千二百九十六尺卽甲方之面積以十二尺自乘得一百四十四尺卽乙方之面積以甲方毎邊四分之一九尺與乙方面積相乘得一千二百九十六尺與甲方面積相等也此二正方邊線面積比例法設如有大小二正方大方邊與小方邊之比例同於五與三大方面積比小方面積多二千三百零四丈問大小二方邊各幾何法借三根為小方毎邊之數則大方毎邊之數為五根以三根自乘得九平方為小方之面積以五根自乘得二十五平方為大方之面積二面積相減餘一十六平方與二千三百零四丈相等一十六平方旣與二千三百零四丈相等則一平方必與一百四十四丈相等開平方得一十二丈為一根之數三因之得三十六丈卽小方毎邊之數五因之得六十丈卽大方毎邊之數以三十六丈自乘得一千二百九十六丈為小方面積以六十丈自乘得三千六百丈為大方面積兩面積相減餘二千三百零四丈以合原數也此二正方比例開平方法設如有甲乙二正方甲方毎邊為乙方毎邊之三倍又有丙一長方其長與甲方之毎邊等其闊與乙方之毎邊等三方面積共二萬零八百丈問三方邊數面積各若干法借一根為乙方毎邊之數則甲方毎邊之數為三根以一根自乘得一平方為乙方之面積以三根自乘得九平方為甲方之面積以一根與三根相乘得三平方為丙方之面積三面積相加得一十三平方與二萬零八百丈相等十三平方旣與二萬零八百丈相等則一平方必與一千六百丈相等卽乙方之面積開平方得四十丈為一根之數卽乙方毎邊之數三因之得一百二十丈卽甲方毎邊之數以一百二十丈自乘得一萬四千四百丈卽甲方之面積以四十丈與一百二十丈相乘得四千八百丈卽丙方之面積三面積相併共得二萬零八百丈以合原數也此二正方比例開平方法設如有兵二萬九千四百八十四名欲排作三軍俱為正方第二軍每邊比第一軍每邊為三倍第三軍每邊比第二軍每邊亦為三倍問三軍兵數各若干法借一根為第一軍每邊之數則第二軍每邊之數為三根第三軍毎邊之數為九根以一根自乘得一平方為第一軍之總數以三根自乘得九平方為第二軍之總數以九根自乘得八十一平方為第三軍之總數三總數相加得九十一平方與二萬九千四百八十四相等九十一平方旣與二萬九千四百八十四相等則一平方必與三百二十四相等卽第一軍之總數開平方得十八為一根之數卽第一軍每邊之數也以第一軍毎邊之數用三乘之得五十四卽第二軍毎邊之數以第一軍之總數用九乘之得二千九百一十六卽第二軍之總數又以第一軍毎邊之數用九乘之得一百六十二卽第三軍每邊之數以第一軍之總數用八十一乘之得二萬六千二百四十四卽第三軍之總數三總數相加共二萬九千四百八十四以合原數也此三正方比例開平方法設如一正方一長方俱不知其邊數但知長方之面積為八萬一千尺其長為正方邊之十五分之二其闊為正方邊之二十五分之三問二方邊各若干法借一根為正方每邊之數則長方之長為十五分根之二長方之闊為二十五分根之三以正方邊一根自乘得一平方為正方之面積以長方之長闊相乘得三百七十五分平方之六以兩分母十五與二十五相乘得三百七十五以兩分子二與三相乘得六故為三百七十五之六為長方面積是為三百七十五分平方之六與八萬一千尺相等乃以六分為一率八萬一千尺為二率三百七十五分為三率求得四率五百零六萬二千五百尺與一平方相等葢三百七十五分平方之六者將一平方分為三百七十五分而得其六分也六分旣為八萬一千尺則三百七十五分必為五百零六萬二千五百尺也開平方得二千二百五十尺為一根之數卽正方每邊之數其十五分之二為三百尺卽長方之長其二十五分之三為二百七十尺卽長方之闊相乘得八萬一千尺以合原數也此帶分比例開平方法設如有大小二正方大方比小方毎邊多六尺面積多一千七百一十六尺問二方邊數面積各幾何法借一根為小方每邊之數則大方每邊之數為一根多六尺以一根自乘得一平方為小方之面積以一根多六尺自乘得一平方多十二根多三十六尺為大方之面積大方旣比小方面積多一千七百一十六尺則以小方之面積一平方加一千七百一十六尺與大方之面積一平方多十二根多三十六尺相等兩邊各減去一平方又各減三十六尺得十二根與一千六百八十尺相等十二根旣與一千六百八十尺相等則一根必與一百四十尺相等卽小方毎邊之數加六尺得一百四十六尺卽大方每邊之數以一百四十尺自乘得一萬九千六百尺卽小方之面積以一百四十六尺自乘得二萬一千三百一十六尺卽大方之面積兩面積相減餘一千七百一十六尺以合原數也此二正方有邊較積較求邊法設如有大小二正方大方比小方每邊多二十四尺面積共七千二百五十尺問二方邊數面積各幾何法借一根為小方毎邊之數則大方毎邊之數為一根多二十四尺以一根自乘得一平方為小方之面積以一根多二十四尺自乘得一平方多四十八根又多五百七十六尺為大方之面積兩面積相加得二平方多四十八根又多五百七十六尺與七千二百五十尺相等兩邊各減五百七十六尺得二平方多四十八根與六千六百七十四尺相等二平方多四十八根旣與六千六百七十四尺相等則一平方多二十四根必與三千三百三十七尺相等乃以三千三百三十七尺為長方積以二十四根作二十四尺為長闊較用帶縱較數開平方法算之得闊四十七尺為一根之數卽小方每邊之數加二十四尺得七十一尺卽大方每邊之數以四十七尺自乘得二千二百零九尺卽小方之面積以七十一尺自乘得五千零四十一尺卽大方之面積兩面積相加共七千二百五十尺以合原數也此二正方有邊較積和求邊法設如有大小二正方邊數共三十六尺面積共六百六十六尺問二方邊數面積各幾何法借一根為小方毎邊之數則大方每邊之數為三十六尺少一根以一根自乘得一平方為小方之面積以三十六尺少一根自乘得一千二百九十六尺少七十二根多一平方為大方之面積兩面積相加得一千二百九十六尺少七十二根多二平方與六百六十六尺相等兩邊各加七十二根得一千二百九十六尺多二平方與六百六十六尺多七十二根相等兩邊各減六百六十六尺得六百三十尺多二平方與七十二根相等六百三十尺多二平方旣與七十二根相等則三百一十五尺多一平方必與三十六根相等乃以三百一十五尺為長方積以三十六根作三十六尺為長闊和用帶縱和數開平方法算之得闊一十五尺為一根之數卽小方每邊之數與共邊三十六尺相減餘二十一尺卽大方毎邊之數以小方每邊一十五尺自乘得二百二十五尺卽小方之面積以大方每邊二十一尺自乘得四百四十一尺卽大方之面積兩面積相加共六百六十六尺以合原數也此二正方有邊和積和求邊法設如有大小二正方邊數共一百一十尺大方比小方面積為五倍少四尺問二方邊數面積各幾何法借一根為小方毎邊之數則大方毎邊之數為一百一十尺少一根以一根自乘得一平方為小方之面積以一百一十尺少一根自乘得一萬二千一百尺少二百二十根多一平方為大方之面積大方旣比小方面積為五倍少四尺則將小方加五倍將大方加四尺是為五平方與一萬二千一百零四尺少二百二十根多一平方相等兩邊各減一平方得四平方與一萬二千一百零四尺少二百二十根相等四平方旣與一萬二千一百零四尺少二百二十根相等則一平方必與三千零二十六尺少五十五根相等乃以三千零二十六尺為長方積以五十五根作五十五尺為長闊較用帶縱較數開平方法算之得闊三十四尺為一根之數卽小方每邊之數與共邊一百一十尺相減餘七十六尺卽大方毎邊之數以三十四尺自乘得一千一百五十六尺卽小方之面積以七十六尺自乘得五千七百七十六尺卽大方之面積再加四尺得五千七百八十尺為小方面積一千一百五十六尺之五倍也此亦二正方有邊和積較法但積較有倍分耳設如有一長方又有大小二正方三面積共四百四十一丈大正方邊與長方之長等小正方邊與長方之闊等但知小正方邊為九丈問大正方邊若干法借一根為大方毎邊之數自乘得一平方為大方之面積以九丈自乘得八十一丈為小方之面積以九丈與一根相乘得九根為長方之面積三面積相加得一平方多九根又多八十一丈與四百四十一丈相等兩邊各減八十一丈得一平方多九根與三百六十丈相等乃以三百六十丈為長方積以九根作九丈為長闊較用帶縱較數開平方法算之得闊十五丈為一根之數卽大方毎邊之數以十五丈自乘得二百二十五丈卽大方之面積以十五丈與九丈相乘得一百三十五丈卽長方之面積三面積相併共得四百四十一丈以合原數也此帶縱較數開平方法設如有一長方又有大小二正方三面積共四百五十七丈長方之長與大正方邊等長方之闊與小正方邊等長闊共二十四丈問長闊各幾何法借一根為長方之闊則長方之長為二十四丈少一根以一根自乘得一平方為小正方之面積以二十四丈少一根自乘得五百七十六丈少四十八根多一平方為大正方之面積以一根與二十四丈少一根相乘得二十四根少一平方為長方之面積三面積相加得一平方多五百七十六丈少二十四根與四百五十七丈相等兩邊各加二十四根得一平方多五百七十六丈與二十四根多四百五十七丈相等兩邊各減四百五十七丈得一平方多一百一十九丈與二十四根相等乃以一百一十九丈為長方積以二十四根作二十四丈為長闊和用帶縱和數開平方法算之得闊七丈為一根之數卽長方之闊與二十四丈相減餘一十七丈卽長方之長以七丈自乘得四十九丈卽小正方之面積以一十七丈自乘得二百八十九丈卽大正方之面積以七丈與一十七丈相乘得一百一十九丈卽長方之面積三面積相併共得四百五十七丈以合原數也此帶縱和數開平方法設如有一長方其面積八萬三千二百三十二丈又有一正方其毎邊與長方之闊等若以正方面積自乘則與兩方之共面積等問二方邊數各若干法借一根為正方之面積自乘得一平方為正方面積自乘之數又以一根與八萬三千二百三十二丈相加得一根多八萬三千二百三十二丈與一平方相等乃以八萬三千二百三十二丈為長方積以一根作一丈為長闊較用帶縱較數開平方法算之得長二百八十九丈為一根之數卽正方之面積亦卽長方之長開平方得一十七丈卽正方之邊亦卽長方之闊以正方面積二百八十九丈與長方面積八萬三千二百三十二丈相併共得八萬三千五百二十一丈又以正方面積二百八十九丈自乘亦得八萬三千五百二十一丈是與兩方之共面積相等也此帶縱較數開平方法設如有銀買駝馬共六十一匹駝毎匹之價與共駝數等馬毎匹之價與共馬數等今賣馬一匹之價與共駝數等賣駝一匹之價為共馬數之二倍共得利銀七百一十九兩問駝數馬數及毎匹價各若干法借一根為共馬數則六十一匹少一根為共駝數以共馬數一根自乘得一平方為買馬之共價以共駝數六十一匹少一根自乘得三千七百二十一兩少一百二十二根多一平方為買駝之共價兩共價相加得三千七百二十一兩少一百二十二根多二平方為買駝馬之總銀數又以共馬數一根與共駝數六十一匹少一根相乘得六十一根少一平方為賣馬之共銀數以共駝數六十一匹少一根與二倍共馬數二根相乘得一百二十二根少二平方為賣駝之共銀數兩共銀數相加得一百八十三根少三平方為賣駝馬之總銀數内減買駝馬總銀數三千七百二十一兩少一百二十二根多一平方餘三百零五根少五平方又少三千七百二十一兩與利銀七百一十九兩相等兩邊各加三千七百二十一兩得三百零五根少五平方與四千四百四十兩相等三百零五根少五平方旣與四千四百四十兩相等則六十一根少一平方必與八百八十八兩相等乃以八百八十八兩為長方積以六十一根作六十一為長闊和用帶縱和數開平方法算之得闊二十四為一根之數卽共馬數亦卽馬毎匹之價為二十四兩也以二十四匹與六十一匹相減餘三十七匹卽共駝數亦卽駝毎匹之價為三十七兩也以二十四匹與二十四兩相乘得五百七十六兩為買馬之共銀數以三十七匹與三十七兩相乘得一千三百六十九兩為買駝之共銀數相加得一千九百四十五兩卽買駝馬之總銀數以二十四匹與三十七兩相乘得八百八十八兩為賣馬之共銀數以三十七匹與四十八兩相乘得一千七百七十六兩為賣駝之共銀數相加得二千六百六十四兩卽賣駝馬之總銀數比買駝馬之總銀數多七百一十九兩為利銀數也此帶縱和數開平方法設如有木匠瓦匠共三十名又有匠頭不知名數但知毎匠頭一人得銀三十六兩其木匠一人之銀數與瓦匠之人數等瓦匠一人之銀數與木匠之人數等而匠頭之人數與木匠瓦匠相差之數等匠頭之共銀數與木匠之共銀數等問匠頭與木匠瓦匠之人數及毎人所得之銀數各幾何法借一根為木匠之人數則瓦匠之人數為三十少一根以一根與三十少一根相乘得三十根少一平方為木匠之共銀數亦為瓦匠之共銀數又以木匠之人數一根與瓦匠之人數三十少一根相減得三十少二根為匠頭之人數與毎人三十六兩相乘得一千零八十兩少七十二根為匠頭之總銀數與木匠之共銀數三十根少一平方相等兩邊各加七十二根得一百零二根少一平方與一千零八十兩相等乃以一千零八十兩為長方積以一百零二根作一百零二為長闊和用帶縱和數開平方法算之得闊一十二為一根之數卽木匠之人數以一十二人與三十人相減餘一十八人卽瓦匠之人數以十二與十八相乘得二百一十六兩卽木匠之共銀數亦卽瓦匠之共銀數以十二與十八相減餘六卽匠頭之人數與三十六兩相乘亦得二十一十六兩卽匠頭之共銀數與木匠之共銀數等也此帶縱和數開平方法設如有馬騾䭾物不言馬騾共數亦不言馬騾各數但知馬比騾多十匹馬共䭾一萬二千斤騾亦共䭾一萬二千斤而騾一匹所䭾之數比馬一匹所䭾之數多四十斤問馬騾數及所䭾數各若干法借一根為騾數則馬數為一根多十匹以一根除一萬二千斤得一根之一萬二千斤為騾一匹所䭾之數以一根多十匹除一萬二千斤得一根多十匹之一萬二千斤為馬一匹所䭾之數因兩分母不同乃用互乘法以齊其分將馬分母一根多十匹與騾分子一萬二千斤相乘得一萬二千根多一十二萬斤以騾分母一根與馬分子一萬二千斤相乘得一萬二千根以互乘所得兩分子相減餘一十二萬斤為騾比馬多䭾之數又以馬分母一根多十匹與騾分母一根相乘得一平方多十根又以四十斤乘之得四十平方多四百根亦為騾比馬多䭾之數是為四十平方多四百根與一十二萬斤相等四十平方多四百根旣與一十二萬斤相等則一平方多十根必與三千斤相等乃以三千為長方積以十根作一十為長闊較用帶縱較數開平方法算之得闊五十為一根之數卽騾數加十匹得六十匹卽馬數以五十匹除一萬二千斤得二百四十斤卽騾一匹所䭾之數以六十匹除一萬二千斤得二百斤卽馬一匹所䭾之數也此帶縱較數開平方法設如有數一十萬欲分為大小兩分與全分為相連比例三率問大小兩分各幾何法借一根為大分則小分為十萬少一根是全分十萬為首率而一根為中率十萬少一根為末率矣乃以首率十萬與末率十萬少一根相乘得一百億少十萬根而與中率一根自乘之一平方相等乃以一百億為長方積十萬根作十萬為長闊數用帶縱較數開平方法算之得闊六萬一千八百零三為一根之數卽大分與全分十萬相減餘三萬八千一百九十七卽小分也葢十萬與六萬一千八百零三之比卽同於六萬一千八百零三與三萬八千一百九十七之比而為相連比例之三率也此即求圜内容十邊法設如有股二十尺勾弦較十尺問勾弦各幾何法借一根為勾數則一根多一十尺為弦數以一根自乘得一平方為勾自乘之數以一根多一十尺自乘得一平方多二十根又多一百尺為弦自乘之數兩自乘之數相減得二十根多一百尺為股自乘之數而與股二十尺自乘之四百尺為相等兩邊各減一百尺得二十根與三百尺相等二十根旣與三百尺相等則一根必與一十五尺相等卽勾數加勾弦較十尺得二十五尺卽弦數也如圗甲乙為弦甲丙為勾乙丁同丙乙為勾弦較甲丁為勾弦和甲己戊乙為弦自乘方庚己壬辛為勾自乘方甲乙戊壬辛庚磬折形為股自乘數與甲庚勾弦較甲庚與丙乙等乘甲丁勾弦和之甲庚癸丁長方積等借一根為勾數者卽庚己或庚辛也庚己庚辛皆與甲丙等一根多十尺為弦數者卽庚己加庚甲也一根自乘得一平方為勾自乘方者卽庚己壬辛之正方也一根多十尺自乘得一平方多二十根多一百尺為弦自乘方者卽庚己壬辛一平方多甲庚辛丙及辛壬戊子之二十根甲庚較十尺乘甲丙一根得十根為甲庚辛丙長方辛子較十尺乘子戊一根得十根為辛壬戊子長方是共為二十根又多丙辛子乙之一百尺共為甲己戊乙之正方也於甲己戊乙弦自乘方内減去庚己壬辛勾自乘之一平方餘二十根多一百尺卽甲乙戊壬辛庚之磬折形亦卽甲庚癸丁之長方形而與股自乘之四百尺相等也又甲庚癸丁長方内減去丙辛子乙一百尺餘甲庚辛丙及乙子癸丁卽二十根之數為三百尺也二十根之數為三百尺則一根之數必為十五尺也此勾股弦和較相求法設如有股二十四尺勾弦和三十二尺問勾弦各幾何法借一根為勾數則三十二尺少一根為弦數以一根自乘得一平方為勾自乘之數以三十二尺少一根自乘得一千零二十四尺少六十四根多一平方為弦自乘之數兩自乘之數相減得一千零二十四尺少六十四根為股自乘之數而與股二十四尺自乘之五百七十六尺為相等兩邊各加六十四根得一千零二十四尺與五百七十六尺多六十四根相等兩邊各減五百七十六尺得四百四十八尺與六十四根相等四百四十八尺旣與六十四根相等則七尺必與一根相等卽勾數以勾七尺與勾弦和三十二尺相減餘二十五尺卽弦數也此勾股弦和較相求法設如有弦五尺勾股和七尺問勾股各幾何法借一根為股數則七尺少一根為勾數以一根自乘得一平方為股自乘之數以七尺少一根自乘得四十九尺少一十四根多一平方為勾自乘之數兩自乘數相加得四十九尺少一十四根多二平方為弦自乘之數而與弦五尺自乘之二十五尺為相等兩邊各加一十四根得四十九尺多二平方與二十五尺多一十四根相等兩邊各減四十九尺得二平方與一十四根少二十四尺相等二平方旣與十四根少二十四尺相等則一平方必與七根少十二尺相等乃以十二尺為長方積七根作七尺為長闊和用帶縱和數開平方法算之得長四尺為一根之數卽股數以股四尺與勾股和七尺相減餘三尺卽勾數也如圗甲乙丙勾股形甲乙股四尺乙丙勾三尺甲丙弦五尺甲丁勾股和七尺甲丁戊己為勾股和自乘方辛丙庚己為股自乘方乙丁壬丙為勾自乘方借一根為股數者卽甲乙也壬戊己庚皆與甲乙等為一根數一根自乘得一平方為股自乘方者卽辛丙庚己也七尺少一根自乘得四十九尺少十四根多一平方為勾自乘方者卽甲丁戊己勾股和自乘方内減去甲乙庚己之七根及辛壬戊己之七根共為十四根甲乙一根乘甲己和七尺得七根為甲乙庚己長方辛己一根乘己戊和得七根為辛壬戊己長方共十四根又加辛丙庚己一平方始得乙丁壬丙勾自乘方也於甲丁戊己勾股和自乘方内減去甲乙丙壬戊己磬折形餘乙丁壬丙為勾自乘數今減去十四根乃減去甲乙庚己一長方又減去辛壬戊己一長方是比磬折形多減去辛丙庚己一平方故必加一平方以補多減之數始為乙丁壬丙勾自乘方也辛丙庚己股自乘數乙丁壬丙勾自乘數相加與弦自乘之數相等兩邊各加各減得一平方與七根少十二尺相等者卽辛丙庚己一平方與甲乙庚己七根數相較而少甲乙丙辛之長方十二尺也今不知七根之數又不知一平方之數但知一平方與七根相較之甲乙丙辛長方為十二尺故卽以十二尺為長方積以甲己為長闊和用帶縱和數開平方法算之得甲乙長而為股數也此勾股弦和較相求法設如有勾弦和五十尺股弦和八十一尺問勾股弦各幾何法借一根為勾數則五十尺少一根為弦數一根多三十一尺為股數以五十尺與八十一尺相減餘三十一尺為勾股較故一根多三十一尺為股數以一根自乘得一平方為勾自乘之數以五十尺少一根自乘得二千五百尺少一百根多一平方為弦自乘之數以一根多三十一尺自乘得一平方多六十二根又多九百六十一尺為股自乘之數以股自乘之數與弦自乘之數相減得一千五百三十九尺少一百六十二根亦為勾自乘之數而與勾數一根自乘之一平方為相等乃以一千五百三十九尺為長方積以一百六十二根作一百六十二尺為長闊較用帶縱較數開平方法算之得闊九尺為一根之數卽勾數以勾九尺與勾弦和五十尺相減餘四十一尺卽弦數以勾九尺與勾股較三十一尺相加得四十尺卽股數也此勾股弦和較相求法設如有勾股和二十三尺勾弦和二十五尺問勾股弦各幾何法借一根為勾數則二十三尺少一根為股數二十五尺少一根為弦數以一根自乘得一平方為勾自乘之數以二十三尺少一根自乘得五百二十九尺少四十六根多一平方為股自乘之數以二十五尺少一根自乘得六百二十五尺少五十根多一平方為弦自乘之數以股自乘之數與弦自乘之數相減得九十六尺少四根亦為勾自乘之數而與勾數一根自乘之一平方為相等乃以九十六尺為長方積四根作四尺為長闊較用帶縱較數開平方法算之得闊八尺為一根之數卽勾數以勾八尺與勾股和二十三尺相減餘十五尺卽股數以勾八尺與勾弦和二十五尺相減餘十七尺卽弦數也此勾股弦和較相求法設如有股弦和二十五尺勾弦較八尺問勾股弦各幾何法借一根為股數則二十五尺少一根為弦數十七尺少一根為勾數股弦和二十五尺内減勾弦較八尺得一十七尺為勾股和故勾為十七尺少一根以一根自乘得一平方為股自乘之數以一十七尺少一根自乘得二百八十九尺少三十四根多一平方為勾自乘之數以二十五尺少一根自乘得六百二十五尺少五十根多一平方為弦自乘之數以勾自乘之數與弦自乘之數相減得三百三十六尺少一十六根亦為股自乘之數而與股數一根自乘之一平方為相等乃以三百三十六尺為長方積十六根作十六尺為長闊較用帶縱較數開平方法算之得闊十二尺為一根之數卽股數以股十二尺與股弦和二十五尺相減餘一十三尺卽弦數内減勾弦較八尺餘五尺卽勾數也此勾股弦和較相求法設如有股弦較一尺勾弦較三十二尺問勾股弦各幾何法借一根為勾數則一根多三十二尺為弦數一根多三十一尺為股數股弦較與勾弦較相減餘三十一尺為勾股較故股為一根多三十一尺也以一根自乘得一平方為勾自乘之數以一根多三十二尺自乘得一平方多六十四根又多一千零二十四尺為弦自乘之數以一根多三十一尺自乘得一平方多六十二根又多九百六十一尺為股自乘之數以股自乘之數與弦自乘之數相減得二根多六十三尺亦為勾自乘之數而與勾數一根自乘之一平方為相等乃以六十三尺為長方積以二根作二尺為長闊較用帶縱較數開平方法算之得長九尺為一根之數卽勾數以勾九尺與勾弦較三十二尺相加得四十一尺卽弦數内減股弦較一尺餘四十尺卽股數也此勾股弦和較相求法設如有勾股和七十三尺勾弦較與股弦較之和三十三尺問勾股弦各幾何法借一根為勾數則七十三尺少一根為股數五十三尺為弦數以勾股和七十三尺加勾弦較與股弦較之和三十三尺得一百零六尺卽二弦數故半之得五十三尺為弦數也以一根自乘得一平方為勾自乘之數以七十三尺少一根自乘得五千三百二十九尺少一百四十六根多一平方為股自乘之數以五十三尺自乘得二千八百零九尺為弦自乘之數以股自乘之數與弦自乘之數相減得一百四十六根少二千五百二十尺又少一平方亦為勾自乘之數而與勾數一根自乘之一平方為相等兩邊各加一平方得一百四十六根少二千五百二十尺與二平方相等一百四十六根少二千五百二十尺旣與二平方相等則七十三根少一千二百六十尺必與一平方相等乃以一千二百六十尺為長方積七十三根作七十三尺為長闊和用帶縱和數開平方法算之得闊二十八尺為一根之數卽勾數以勾二十八尺與勾股和七十三尺相減餘四十五尺卽股數也此勾股弦和較相求法設如有勾股弦總和一百五十尺勾股較股弦較勾弦較共八十尺問勾股弦各幾何法借一根為勾數則一根多四十尺為弦數將三較共八十尺折半得四十尺卽勾弦較一百一十尺少二根為股數總和一百五十尺内減去勾數一根又減去弦數一根多四十尺得一百一十尺少二根為股數以一根自乘得一平方為勾自乘之數以一根多四十尺自乘得一平方多八十根又多一千六百尺為弦自乘之數以一百一十尺少二根自乘得一萬二千一百尺少四百四十根多四平方為股自乘之數以股自乘之數與弦自乘之數相減得五百二十根少三平方又少一萬零五百尺亦為勾自乘之數而與勾數一根自乘之一平方為相等兩邊各加三平方得五百二十根少一萬零五百尺與四平方相等五百二十根少一萬零五百尺旣與四平方相等則一百三十根少二千六百二十五尺必與一平方相等乃以二千六百二十五尺為長方積以一百三十根作一百三十尺為長闊和用帶縱和數開平方法算之得闊二十五尺為一根之數卽勾數以勾二十五尺與勾弦較四十尺相加得六十五尺卽弦數以勾弦和九十尺與勾股弦總和一百五十尺相減餘六十尺卽股數也此勾股弦和較相求法設如有勾股和二十三尺弦與勾股較之較十尺問勾股弦各幾何法借一根為勾股較數則一根多十尺為弦數以一根自乘得一平方為勾股較自乘之數以一根多十尺自乘得一平方多二十根又多一百尺為弦自乘之數倍之得二平方多四十根又多二百尺内減去勾股較自乘之一平方餘一平方多四十根多二百尺為勾股和自乘之數而與勾股和二十三尺自乘之五百二十九尺為相等兩邊各減去二百尺得一平方多四十根與三百二十九尺相等乃以三百二十九尺為長方積以多四十根作四十尺為長闊較用帶縱較數開平方法算之得闊七尺為一根之數卽勾股較與勾股和二十三尺相加得三十尺折半得十五尺為股内減較七尺餘八尺為勾又以勾股較七尺與弦與勾股較之較十尺相加得十七尺為弦也此勾股弦和較相求法設如有勾股積一千零八十尺勾股弦總和一百八十尺問勾股弦各幾何法借一根為弦數則一百八十尺少一根為勾股和數以一根自乘得一平方為弦自乘之數以一百八十尺少一根自乘得三萬二千四百尺少三百六十根多一平方為勾股和自乘之數又以勾股積一千零八十尺四因之得四千三百二十尺與弦自乘之一平方相加得一平方多四千三百二十尺亦為勾股和自乘之數而與勾股和自乘之三萬二千四百尺少三百六十根多一平方為相等勾股和自乘數内有一弦自乘方有四勾股積故四因勾股積與弦自乘之數相加卽與勾股和自乘之數相等也兩邊各減四千三百二十尺得二萬八千零八十尺少三百六十根多一平方與一平方相等兩邊各加三百六十根得二萬八千零八十尺多一平方與一平方多三百六十根相等兩邊再各減一平方得三百六十根與二萬八千零八十尺相等三百六十根旣與二萬八千零八十尺相等則一根必與七十八尺相等卽弦數以弦七十八尺與一百八十尺相減餘一百零二尺卽勾股和又以弦自乘得六千零八十四尺與四勾股積四千三百二十尺相減餘一千七百六十四尺平方開之得四十二尺卽勾股較與勾股和一百零二尺相減餘六十尺折半得三十尺卽勾數加勾股較四十二尺得七十二尺卽股數也此勾股積與勾股弦和較相求法設如有勾股積六十尺弦與勾股和之較六尺問勾股弦各幾何法借一根為弦數則一根多六尺為勾股和數以一根自乘得一平方為弦自乘之數以一根多六尺自乘得一平方多十二根多三十六尺為勾股和自乘之數又以勾股積六十尺四因之得二百四十尺與弦自乘之一平方相加得一平方多二百四十尺亦為勾股和自乘之數而與勾股和自乘之一平方多十二根多三十六尺為相等兩邊各減去一平方得十二根多三十六尺與二百四十尺相等兩邊又各減去三十六尺得十二根與二百零四尺相等十二根旣與二百零四尺相等則一根必與十七尺相等卽弦數加弦與勾股和之較六尺得二十三尺為勾股和用有弦有勾股和求勾股法算之得股十五尺勾八尺也此勾股積與勾股弦和較相求法設如有三角形大腰十七尺小腰十尺底二十一尺求中垂線幾何法借一根為中垂線之面積以小腰十尺自乘得一百尺内減去一根得一百尺少一根為小分底之面積中垂線為股小腰為弦小分底為勾於弦積内減去股積餘為勾積也又以大腰十七尺自乘得二百八十九尺内減去一根餘二百八十九尺少一根為大分底之面積中垂線為股大腰為弦大分底為勾於弦積内減去股積餘為勾積也又以底二十一尺自乘得四百四十一尺内減大小兩分底之共面積三百八十九尺少二根餘五十二尺多二根折半得二十六尺多一根為小分底乘大分底之面積底邊自乘内有大分底自乘之一正方小分底自乘之一正方小分底乘大分底之二長方故減去二正方餘數折半卽為小分底乘大分底之一長方也此數與小分底之面積及大分底之面積為相連比例三率葢大分底之面積為首率而小分底乘大分底之面積為中率小分底之面積為末率也乃以首率大分底之面積二百八十九尺少一根與末率小分底之面積一百尺少一根相乘得二萬八千九百尺少三百八十九根多一平方又以中率小分底乘大分底之面積二十六尺多一根自乘得六百七十六尺多五十二根多一平方此二數為相等兩邊各加三百八十九根得二萬八千九百尺多一平方與六百七十六尺多四百四十一根多一平方相等兩邊各減一平方得二萬八千九百尺與六百七十六尺多四百四十一根相等兩邊再各減去六百七十六尺得二萬八千二百二十四尺與四百四十一根相等二萬八千二百二十四尺旣與四百四十一根相等則六十四尺必與一根相等卽中垂線之面積開平方得八尺卽中垂線也此三角形求中垂線法設如有三角形底十四尺大腰與中垂線之較三尺小腰與中垂線之較一尺求中垂線及兩腰各幾何法借一根為中垂線則大腰為一根多三尺小腰為一根多一尺以一根自乘得一平方為中垂線之面積以一根多三尺自乘得一平方多六根多九尺為大腰之面積内減去中垂線之面積一平方餘六根多九尺為大分底之面積以一根多一尺自乘得一平方多二根多一尺為小腰之面積内減去中垂線之面積一平方餘二根多一尺為小分底之面積又以底十四尺自乘得一百九十六尺内減去大小兩分底之共面積八根多十尺餘一百八十六尺少八根折半得九十三尺少四根為小分底乘大分底之面積此數與大分底之面積及小分底之面積為相連比例三率葢大分底之面積為首率而小分底乘大分底之面積為中率小分底之面積為末率也乃以首率大分底之面積六根多九尺與末率小分底之面積二根多一尺相乘得十二平方多二十四根多九尺又以中率之小分底乘大分底之面積九十三尺少四根自乘得八千六百四十九尺少七百四十四根多十六平方此二數為相等兩邊各加七百四十四根得十二平方多七百六十八根多九尺與八千六百四十九尺多十六平方相等兩邊各減十二平方得七百六十八根多九尺與八千六百四十九尺多四平方相等兩邊再各減八千六百四十九尺得七百六十八根少八千六百四十尺與四平方相等七百六十八根少八千六百四十尺旣與四平方相等則一百九十二根少二千一百六十尺必與一平方相等乃以二千一百六十尺為長方積以一百九十二根作一百九十二尺為長闊和用帶縱和數開平方法算之得闊十二尺為一根之數卽中垂線加三尺得十五尺卽大腰加一尺得十三尺卽小腰也此三角形和較相求法御製數理精藴下編卷三十五
