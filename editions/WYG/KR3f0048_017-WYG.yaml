body:
  text: 欽定四庫全書御製數理精藴下編卷十二面部二勾股定勾股無零數法形内勾股弦相求法附勾股求積勾股求中垂線及容方圓等形相求勾股弦和較法勾股周髀曰折矩以為勾廣三股修四徑隅五既方其外半其一矩環而共盤得成三四五兩矩共長二十有五是為積矩此言勾股正數之所以立法也葢勾股得長方之半形故其一角必成矩所謂直角也而後可謂勾股如其一角不能成矩則為三角形而非勾股矣因勾股一角必直故立於圜界之正一半而自直角所作垂線遂成連比例三率是以直角相對界所作方形之積必與兩傍二界所作兩方形之積等見幾何原本九卷第四節而勾股弦彼此相求之法於此生焉其法所該有四一勾股弦三者知其二而得其一或知其二而得其積一勾股形自其直角對弦界求垂線一勾股形内容方圓等形一勾股弦三者知其一復知其餘二者之較或二者之和而得其二或知其兩較或兩和或一較一和而得其三勾股弦和較之法雖雜出多端然皆不出勾股弦方積相求之理較有勾股較勾弦較股弦較和有勾股和勾弦和股弦和和較相疉則又有弦與勾股和相和或名之曰弦和和有弦與勾股和相較或名之曰弦和較有弦與勾股較相和或名之曰弦較和有弦與勾股較相較或名之曰弦較較又有勾與股弦和相和者或名之曰勾和和股與勾弦和相和者或名之曰股和和即弦和和也勾與股弦和相較者或名之曰勾和較股與勾弦較相和者或名之曰股較和即弦較和也股與勾弦和相較者或名之曰股和較勾與股弦較相和者或名之曰勾較和即弦較較也勾與股弦較相較者或名之曰勾較較股與勾弦較相較者或名之曰股較較即弦和較也此四者皆勾股之正法理一定而數隨之者也至若勾三股四弦五之類倍之至於億兆而總不越此一定之分者名曰正勾股槩以比例推之則三者止有其一即可得其二或有積而即得其三界此為數一定而法隨之者也一一按類列題發明如左定勾股弦無零數法設如用二四八連比例三率定勾股弦無零數問各得幾何法以中率四命為四尺為股首率二尺與末率八尺相減餘六尺折半得三尺為勾首率二尺與末率八尺相加得十尺折半得五尺為弦也如圖甲乙為首率二尺丙乙為中率四尺乙丁為末率八尺今以甲乙與乙丁相和共為甲丁十尺而以丙乙立於甲丁線相和之乙處乃以甲丁折半於戊以戊為心甲丙丁為界作半圜復以丙至甲至丁作丙甲丙丁二線遂成甲丙丁勾股形其丙角立於圜界之半必為直角見幾何原本四卷第十四節而丙乙為垂線即將甲丙丁勾股形分為甲乙丙丙乙丁兩勾股形而與原形為同式三勾股形矣見幾何原本九卷第一節其甲乙與丙乙之比同於丙乙與乙丁之比為連比例三率故以中率丙乙為股而首率甲乙與己丁等與末率乙丁相減餘乙己折半得乙戊為勾又首率甲乙與末率乙丁相加之甲丁折半得甲戊戊丁二半徑與丙戊等為弦也此法原為定勾股弦三者俱無零數之法所設之數必彼此可以度盡始可立為準則否則勾股弦三者必有一不盡之數矣設如有四六可以度盡之兩數欲定勾股弦無零數問各得幾何法以四尺為首率六尺為中率將中率六尺自乗得三十六尺用首率四尺除之得九尺為末率乃以中率六尺為股首率四尺與末率九尺相減餘五尺折半得二尺五寸為勾首率四尺與末率九尺相加得十三尺折半得六尺五寸為弦也如圖甲乙為首率四尺丙乙為中率六尺今以中率六尺自乗用首率四尺除之乃得乙丁末率九尺爰以甲乙首率乙丁末率相和折半於戊以戊為心甲丙丁為界作半圜復自丙至甲至丁作二線則成甲丙丁直角三角形其丙乙中率即為丙直角之垂線故以中率丙乙為股而首率甲乙與末率乙丁相減餘乙己折半得乙戊為勾而首率甲乙與末率乙丁相加得甲丁折半得甲戊戊丁與丙戊等為弦也設如有四六九連比例三率以中率六倍之為股定勾弦無零數問各得幾何法以首率四尺與末率九尺相減餘五尺為勾首率四尺與末率九尺相加得十三尺為弦也如圖甲乙為首率四尺丙乙為中率六尺乙丁為末率九尺爰以甲乙首率與乙丁末率相和折半於戊以戊為心甲丙丁為界作一全圜復自丙至甲至丁作二線則成甲丙丁直角三角形其丙乙中率即為丙直角之垂線今將中率丙乙倍之即得丙庚為股故以首率甲乙與己丁等與末率乙丁相減餘乙己與庚辛等為勾又首率甲乙與末率乙丁相加得甲丁全徑與丙辛等為弦也葢前二法用中率為股故以首率末率相減折半為勾首率末率相加折半為弦此法則倍中率為股故以首率末率相減即為勾首率末率相加即為弦而皆不用折半也又圖甲乙為首率四尺乙丙為末率九尺甲丙為首率與末率相加之十三尺丁丙為首率與末率相減所餘之五尺如依甲丙線度作甲戊己丙正方形即為弦自乗之方如依丁丙線度作丁庚辛丙正方形即為勾自乗之方今以乙丙末率亦作一正方形將兩邊線引長至甲戊己丙正方形界則成甲癸丑乙與丑壬己子二長方形仍餘癸戊壬丑一小正方形又以丁庚辛丙正方形之丁庚界引長至乙丑子丙正方形之丑子界則又成乙丑寅丁一長方形與前一長方形等仍餘庚寅子辛一小長方形合前癸戊壬丑一小正方形則亦與前一長方形等是此四長方形皆為首率與末率相乗之長方而與中率自乗之正方形相等矣見算法原本二卷第三節如以此四長方形共計之則為甲戊己辛庚丁一磬折形今甲戊己丙既為弦自乗之一正方而丁庚辛丙又為勾自乗之一正方則兩方相減所餘之甲戊己辛庚丁磬折形之積與股自乗之一正方等見幾何原本九卷第四節甲戊己辛庚丁磬折形既為四長方之共積則四長方之共積亦必與股自乗之一正方等首率末率相乗之四長方既與股自乗之一正方等則中率自乗之四正方亦必與股自乗之一正方等是故中率自乗之四正方合之而為股自乗之一正方則其每邊必比中率各大一倍見幾何原本七卷第五節故倍中率而為股者必取首率末率之和而為弦首率末率之較而為勾葢首率末率相和自乗之一正方内減去首率末率相較自乗之一正方甫能得中率加倍自乗之一正方積也勾股弦相求法勾股求積附設如有股四尺勾三尺求弦幾何法以股四尺自乗得十六尺勾三尺自乗得九尺相加得二十五尺開方得五尺即為弦也如圖甲乙丙勾股形其甲乙股所作丁戊乙甲正方形積乙丙勾所作乙己庚丙正方形積相併必與甲丙弦所作甲丙壬辛正方形積等試自乙直角過甲丙弦作一乙癸子線則將甲丙壬辛正方形分為甲癸子辛癸丙壬子二長方形而甲乙丙勾股形分為甲乙癸乙丙癸同式兩勾股形矣其甲癸與甲乙之比同於甲乙與甲丙之比為連比例三率故甲乙中率所作丁戊乙甲正方形與甲癸首率甲丙末率相等之甲辛所作甲癸子辛長方形之積相等也又癸丙與乙丙之比同於乙丙與甲丙之比為連比例三率故乙丙中率所作乙己庚丙正方形與癸丙首率甲丙末率相等之丙壬所作癸丙壬子長方形之積相等也一正方所分之二長方既與二正方之積相等則此二正方之積相合與彼一正方之積相等可知矣設如有勾五尺弦十三尺求股幾何法以勾五尺自乗得二十五尺弦十三尺自乗得一百六十九尺相減餘一百四十四尺開方得十二尺即為股也如圖甲乙丙勾股形自乙直角過甲丙弦作一乙癸子線則將甲丙壬辛正方形分為甲癸子辛癸丙壬子二長方形其癸丙壬子長方形積與乙丙勾所作乙己庚丙正方形積等其甲癸子辛長方形積與甲乙股所作丁戊乙甲正方形積等故甲丙弦所作甲丙壬辛正方形内減去與乙己庚丙正方形相等之癸丙壬子長方形餘甲癸子辛長方形即與丁戊乙甲正方形之積相等故開方而得甲乙為股也設如有股二十一尺弦二十九尺求勾幾何法以股二十一尺自乗得四百四十一尺弦二十九尺自乗得八百四十一尺相減餘四百尺開方得二十尺即為勾也如圖甲乙丙勾股形自乙直角過甲丙弦作一乙癸子線則將甲丙壬辛正方形分為甲癸子辛癸丙壬子二長方形其甲癸子辛長方形積與甲乙股所作丁戊乙甲正方形積等其癸丙壬子長方形積與乙丙勾所作乙己庚丙正方形積等故甲丙弦所作甲丙壬辛正方形内減去與丁戊乙甲正方形相等之甲癸子辛長方形餘癸丙壬子長方形即與乙己庚丙正方形之積相等故開方而得乙丙為勾也設如有勾六尺股八尺求面積幾何法以勾六尺與股八尺相乗得四十八尺折半得二十四尺為面積也如圖甲乙丙勾股形其乙丙勾與甲乙股相乗則成甲乙丙丁長方形其積比甲乙丙勾股形正大一倍故折半得勾股積也若有勾弦求面積則用勾弦求股之法得股與勾相乗折半得面積或有股弦求面積則用股弦求勾之法得勾與股相乗折半得面積也又法將勾六尺折半得三尺與股八尺相乗亦得二十四尺為面積也如圖甲乙丙勾股形將乙丙勾折半為乙丁與甲乙股相乗成甲乙丁戊長方形其甲戊己小勾股形與己丁丙小勾股形之積等如以甲戊己小勾股形移於己丁丙適合甲乙丙勾股形積故甲乙丁戊長方形積與甲乙丙勾股形積相等也勾股形内求中垂線及容方圓等形設如有勾六尺股八尺弦十尺欲自直角對弦界作垂線問得幾何法以弦十尺為一率勾六尺為二率股八尺為三率推得四率四尺八寸即為自直角對弦界所作垂線也如圖甲乙丙勾股形作甲丁垂線則將甲乙丙勾股形分為甲丁乙甲丁丙兩勾股形皆與原形為同式故原甲乙丙勾股形之乙丙弦與甲乙勾之比同於今所分甲丁丙勾股形之甲丙弦與甲丁勾之比而為相當比例四率也設如有勾六尺股八尺弦十尺欲自直角對弦界作垂線分弦為二段問所分二段大小各幾何法以勾六尺自乗得三十六尺以弦十尺除之得三尺六寸為垂線所分之小界以股八尺自乗得六十四尺以弦十尺除之得六尺四寸為垂線所分之大界也如圖甲乙丙勾股形作甲丁垂線則分甲乙丙勾股形為甲丁乙甲丁丙兩勾股形皆與原形為同式故原甲乙丙勾股形之乙丙弦與甲乙勾之比同於今所分甲丁乙勾股形之甲乙弦與乙丁勾之比為連比例三率而原甲乙丙勾股形之乙丙弦與甲丙股之比又同於今所分甲丁丙勾股形之甲丙弦與丙丁股之比亦為連比例三率是以原甲乙丙勾股形之甲乙勾又為今所分甲丁乙勾股形之弦者為中率自乗而以原甲乙丙勾股形之乙丙弦為首率除之得末率乙丁為甲丁垂線所分之小界原甲乙丙勾股形之甲丙股又為今所分甲丁丙勾股形之弦者為中率自乗而以原甲乙丙勾股形之乙丙弦為首率除之得末率丁丙為甲丁垂線所分之大界也設如有勾五尺股十二尺問内容方邊幾何法以勾五尺與股十二尺相加得十七尺為一率勾五尺為二率股十二尺為三率推得四率三尺五寸二分九釐有餘為内容方邊也如圖甲乙丙勾股形甲乙為股十二尺乙丙為勾五尺試依乙丙勾數將甲乙股引長作甲戊線為勾股和十七尺自戊與乙丙勾平行作戊丁線又將甲丙弦引長作甲丁線則成甲戊丁同式勾股形復自丙角與甲戊線平行作丙壬線則成丙壬戊乙正方即為甲戊丁勾股形所容之方故甲戊丁勾股形之甲戊股與乙丙方邊之比同於甲乙丙勾股形之甲乙股與己辛方邊之比也設如有方城一座四正有門自南門直行八里有一塔自西門直行至二里切城