二十四尺内減勾九尺餘十五尺為弦也如圖甲乙線為勾弦和甲丁線為股弦和相乗得甲乙丙丁長方形内戊己庚丁為弦自乗之正方辛乙壬己為勾股相乗之長方甲辛巳戊為股弦相乘之長方己壬丙庚為勾弦相乗之長方倍之即為癸子丑寅一大正方其每一邊即勾股弦之總和其卯辰己寅為弦自乗之正方即如前圖之戊己庚丁然其午未申辰為股自乘之正方其酉子戌未為勾自乗之正方兩方相合又與前圖戊己庚丁弦自乗之正方相等其艮酉未午與未戌乾申為勾股相乗之二長方每一形即如前圖之辛乙壬己然其亥午辰卯與辰申坎巳為股弦相乗之二長方每一形即如前圖之甲辛己戊然其癸艮午亥與申乾丑坎為勾弦相乗之二長方每一形即如前圖之己壬丙庚然因癸子丑寅正方比甲乙丙丁長方每一形俱多一倍故甲乙勾弦和甲丁股弦和相乗所成之甲乙丙丁長方倍之而與癸子丑寅正方等開方得癸子類之每一邊皆為勾股弦之總和也設如有勾股和二十一尺股弦和二十七尺求勾股弦各幾何第八法以勾股和二十一尺自乗得四百四十一尺又以股弦和二十七尺自乗得七百二十九尺兩數相減餘二百八十八尺乃以勾股和二十一尺與勾弦和二十七尺相減餘六尺為勾弦較葢股與勾和股與弦和皆為一股所和故相減即勾弦較也自乗得三十六尺與兩和自乗相減之餘二百八十八尺相加得三百二十四尺開方得十八尺為股與勾弦較之和内減勾弦較六尺餘十二尺為股於勾股和二十一尺内減股十二尺餘九尺為勾加勾弦較六尺得十五尺為弦也如圖甲乙丙丁為勾股和自乗之一大正方内戊乙庚己為股自乘之一正方辛己壬丁為勾自乘之一正方甲戊已辛與己庚丙壬為勾股相乗之二長方又癸子丑寅為股弦和自乗之一大正方内卯子巳辰為股自乗之一正方午辰未寅為弦自乗之一正方癸卯辰午與辰巳丑未為股弦相乗之二長方今甲乙丙丁勾股和自乗之方與癸子丑寅股弦和自乗之方相減則於癸子丑寅股弦和自乗之方内去卯子己辰股自乗之一正方酉辰戌乾勾自乗之一正方又去申卯辰酉與辰巳亥戌勾股相乗之二長方所餘癸申酉午與戌亥丑未二長方為勾弦較與股相乗之二長方又午酉乾戌未寅一磬折形為弦自乗之一正方内減勾自乗之一正方所餘之股自乗之一正方如以此磬折形積作一股自乗之一正方再加癸申酉午與戌亥丑未之勾弦較與股相乗之二長方則惟缺午艮未震為勾弦較自乗之一小正方今以勾弦較自乗之數加於兩和自乗相減之餘甫成癸坎丑震一正方故開方而得癸坎類之每一邊為股與勾弦較相和之數也設如有勾股和二十一尺勾弦和二十四尺求勾股弦各幾何第九法以勾股和二十一尺自乗得四百四十一尺又以勾弦和二十四尺自乗得五百七十六尺兩數相減餘一百三十五尺乃以勾股和二十一尺與勾弦和二十四尺相減餘三尺為股弦較葢勾與股和勾與弦和皆為一勾所和故相減即股弦較也自乗得九尺與兩和自乗相減之餘一百三十五尺相加得一百四十四尺開方得十二尺為勾與股弦較之和内減股弦較三尺餘九尺為勾於勾股和二十一尺内減勾九尺餘十二尺為股加股弦較三尺得十五尺為弦也如圖甲乙丙丁為勾股和自乗之一大正方内戊乙庚己為勾自乗之一正方辛已壬丁為股自乗之一正方甲戊已辛與己庚丙壬為勾股相乘之二長方又癸子丑寅為勾弦和自乗之一大正方内卯子巳辰為勾自乗之一正方午辰未寅為弦自乗之一正方癸卯辰午與辰己丑未為勾弦相乗之二長方今甲乙丙丁勾股和自乗之方與癸子丑寅勾弦和自乗之方相減則於癸子丑寅勾弦和自乗之方内去卯子己辰勾自乘之一正方酉辰戌乾股自乘之一正方又去申卯辰酉與辰己亥戌勾股相乗之二長方所餘癸申酉午與戌亥丑未二長方為股弦較與勾相乗之二長方又午酉乾戌未寅一磬折形為弦自乗之一正方内減股自乗之一正方所餘之勾自乗之一正方如以此磬折形積作一勾自乗之一正方再加癸申酉午與戌亥丑未之股弦較與勾相乗之二長方則惟缺午艮未震為股弦較自乗之一小正方今以股弦較自乗之數加於兩和自乗相減之餘甫成癸坎丑震一正方故開方而得癸坎類之每一邊為勾與股弦較相和之數也設如有勾弦較九尺股弦較二尺求勾股弦各幾何第十法以勾弦較九尺與股弦較二尺相乗得十八尺倍之得三十六尺開方得六尺為弦比勾股和相差之較加股弦較二尺得八尺為勾加勾弦較九尺得十五尺為股於勾數加勾弦較九尺得十七尺為弦或於股數加股弦較二尺亦得十七尺為弦也如圖甲乙丙丁為弦自乗之一正方戊己丙庚為股自乗之一正方二方相減所餘甲乙己戊庚丁磬折形即與勾自乗之一正方等而乙己與庚丁皆為股弦較試作甲壬癸辛一正方為勾自乗之方則壬乙與辛丁皆為股弦較其壬丑與乙己等辛子與丁庚等亦皆為股弦較以壬乙之勾弦較與壬丑之股弦較相乗則成壬乙己丑之一長方形以辛丁之勾弦較與辛子之股弦較相乗則成辛子庚丁之一長方形此兩長方形必與戊丑癸子一正方形相等何也葢甲乙己戊庚丁與勾自乗之一正方相等之磬折形内減甲壬丑戊子辛一小磬折形則餘壬乙己丑與辛子庚丁二長方形若於甲壬癸辛勾自乗之一正方内減甲壬丑戊子辛磬折形則餘戊丑癸子一小正方形夫甲乙己戊庚丁磬折形既與甲壬癸辛之勾自乗之一正方相等今同減去甲壬丑戊子辛磬折形則彼所餘之二長方必與此所餘之一正方相等可知矣故勾弦較與股弦較相乗倍之開方而得弦比勾股和相差之較加股弦較得勾加勾弦較而得股也葢圖