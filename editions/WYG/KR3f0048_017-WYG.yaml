乙勾餘乙丁為股弦和也若有股弦和與勾股弦總和求勾股弦者則以股弦和與勾股弦總和相減餘即勾亦用有勾有股弦和求股弦法算之設如有勾八尺弦與勾股較之和二十四尺求股弦各幾何第十九法以勾八尺與弦與勾股較之和二十四尺相加得三十二尺為股弦和用有勾有股弦和求股弦法算之如甲乙為勾甲丙為股乙丙為勾股較丙丁為弦甲丁為股弦和乙丁為弦與勾股較之和故以甲乙勾與乙丁弦與勾股較之和相加得甲丁為股弦和也若有股弦和與弦與勾股較之和求勾股弦者則於股弦和内減弦與勾股較之和餘即勾亦用有勾有股弦和求股弦法算之設如有股十五尺弦與勾股和之較六尺求勾弦各幾何第二十法以股十五尺内減弦與勾股和之較六尺餘九尺為勾弦較用有股有勾弦較求勾弦法算之如甲乙為股乙丙為勾甲丙為勾股和丁丙為弦甲丁為弦與勾股和之較丁乙為勾弦較故甲乙股内減甲丁弦與勾股和之較餘丁乙即勾弦較也若有勾弦較與弦與勾股和之較求勾股弦者則以勾弦較與弦與勾股和之較相加即股亦用有股有勾弦較求勾弦法算之設如有股十五尺弦與勾股較之較十尺求勾弦各幾何第二十一法以股十五尺與弦與勾股較之較十尺相加得二十五尺為勾弦和用有股有勾弦和求勾弦法算之如甲乙為股甲丙為勾丙丁為弦甲丁為勾弦和丙乙為勾股較乙丁為弦與勾股較之較故以甲乙股與乙丁弦與勾股較之較相加得甲丁為勾弦和也若有勾弦和與弦與勾股較之較求勾股弦者則於勾弦和内減弦與勾股較之較餘即股亦用有股有勾弦和求勾弦法算之設如有股十五尺勾股弦總和四十尺求勾弦各幾何第二十二法以股十五尺與勾股弦總和四十尺相減餘二十五尺為勾弦和用有股有勾弦和求勾弦法算之如甲乙為股乙丙為勾丙丁為弦甲丁為勾股弦總和故甲丁勾股弦總和内減甲乙股餘乙丁為勾弦和也若有勾弦和與勾股弦總和求勾股弦者則以勾股和與勾股弦總和相減餘即股亦用有股有勾弦和求勾弦法算之設如有股十五尺弦與勾股較之和二十四尺求勾弦各幾何第二十三法以股十五尺與弦與勾股較之和二十四尺相減餘九尺為勾弦較用有股有勾弦較求勾弦法算之如甲乙為股丙乙為勾丙丁為弦甲丙為勾股較乙丁為勾弦較甲丁為弦與勾股較之和故甲丁弦與勾股較之和内減甲乙股餘乙丁為勾弦較也若有勾弦較與弦與勾股較之和求勾股弦者則以勾弦較與弦與勾股較之和相減餘即股亦用有股有勾弦較求勾弦法算之設如有弦十七尺弦與勾股和之較六尺求勾股各幾何第二十四法以弦十七尺與弦與勾股和之較六尺相加得二十三尺為勾股和用有弦有勾股和求勾股法算之如甲乙為弦甲丙為勾丙丁為股甲丁為勾股和乙丁為弦與勾股和之較故甲乙弦與乙丁弦與勾股和之較相加得甲丁為勾股和也若有勾股和與弦與勾股和之較求勾股弦者則於勾股和内減弦與勾股和之較餘即弦亦用有弦有勾股和求勾股法算之設如有弦十七尺弦與勾股較之較十尺求勾股各幾何第二十五法以弦十七尺内減弦與勾股較之較十尺餘七尺為勾股較用有弦有勾股較求勾股法算之如甲乙為弦丙丁為股乙丁為勾丙乙為勾股較甲丙為弦與勾股較之較故甲乙弦内減甲丙弦與勾股較之較餘丙乙為勾股較也若有勾股較與弦與勾股較之較求勾股弦者則以勾股較與弦與勾股較之較相加即弦亦用有弦有勾股較求勾股法算之設如有弦十七尺勾股弦總和四十尺求勾股各幾何第二十六法以弦十七尺與勾股弦總和四十尺相減餘二十三尺為勾股和用有弦有勾股和求勾股法算之如甲乙為弦乙丙為勾丙丁為股甲丁為勾股弦總和故甲丁勾股弦總和内減甲乙弦餘乙丁為勾股和也若有勾股和與勾股弦總和求勾股弦者則以勾股和與勾股弦總和相減餘即弦亦用有弦有勾股和求勾股法算之設如有弦十七尺弦與勾股較之和二十四尺求勾股各幾何第二十七法以弦十七尺與弦與勾股較之和二十四尺相減餘七尺為勾股較用有弦有勾股較求勾股法算之如甲乙為弦乙丙為股丁丙為勾乙丁為勾股較甲丁為弦與勾股較之和故甲丁弦與勾股較之和内減甲乙弦餘乙丁為勾股較也若有勾股較與弦與勾股較之和求勾股弦者則於弦與勾股較之和内減勾股較餘即弦亦用有弦有勾股較求勾股法算之設如有弦與勾股和之較六尺弦與勾股較之較十尺求勾股弦各幾何第二十八法以弦與勾股和之較六尺與弦與勾股較之較十尺相加得十六尺折半得八尺為勾於勾八尺内減弦與勾股和之較六尺餘二尺為股弦較用有勾有股弦較求股弦法算之如甲乙為股戊乙乙丙皆為勾甲丙為勾股和甲戊為勾股較甲丁為弦丁丙即弦與勾股和之較戊丁即弦與勾股較之較故丁丙弦與勾股和之較與戊丁弦與勾股較之較相加得戊丙為二勾之共數是以折半得勾也既得勾則於勾内減弦與勾股和之較即股弦較矣設如有弦與勾股和之較六尺弦與勾股較之和二十四尺求勾股弦各幾何第二十九法以弦與勾股和之較六尺與弦與勾股較之和二十四尺相加得三十尺折半得十五尺為股於股十五尺内減弦與勾股和之較六尺餘九尺為勾弦較用有股有勾弦較求勾弦法算之如甲乙乙丙皆為股丁乙為勾丁丙為勾股和甲丁為勾股較丁戊為弦戊丙即弦與勾股和之較甲戊即弦與勾股較之和故戊丙弦與勾股和之較與甲戊弦與勾股較之和相加得甲丙為二股之共數是以折半得股也既得股則於股内減弦與勾股和之較即勾弦較矣設如有勾股弦總和四十尺弦與勾股較之和二十四尺求勾股弦各幾何第三十法以勾股弦總和四十尺内減弦與勾股較之和二十四尺餘十六尺折半得八尺為勾於勾股弦總和四十尺内減勾八尺餘三十二尺為股弦和用有勾有股弦和求股弦法算之如甲乙為弦乙丙為股丙丁為勾乙戊為勾股較甲丁為勾股弦總和甲戊為弦與勾股較之和故甲丁勾股弦總和内減甲戊弦與勾股較之和餘戊丁即二勾之共數是以折半得勾也既得勾則於勾股弦總和内減勾即股弦和矣設如有勾股弦總和四十尺弦與勾股較之較十尺求勾股弦各幾何第三十一法以勾股弦總和四十尺内減弦與勾股較之較十尺餘三十尺折半得十五尺為股於勾股弦總和四十尺内減股十五尺餘二十五尺為勾弦和用有股有勾弦和求勾弦法算之如甲乙為弦乙丙為勾丙丁為股戊乙為勾股較甲丁為勾股弦總和甲戊為弦與勾股較之較故甲丁勾股弦總和内減甲戊弦與勾股較之較餘戊丁即二股之共數是以折半得股也既得股則於勾股弦總和内減股即勾弦和矣設如有弦與勾股較之和二十四尺弦與勾股較之較十尺求勾股弦各幾何第三十二法以弦與勾股較之和二十四尺與弦與勾股較之較十尺相加得三十四尺折半得十七尺為弦於弦與勾股較之和二十四尺内減弦十七尺餘七尺為勾股較用有弦有勾股較求勾股法算之如甲乙乙丙皆為弦乙丁為勾股較甲丁為弦與勾股較之和丁丙為弦與勾股較之較故甲丁弦與勾股較之和與丁丙弦與勾股較之較相加得甲丙為二弦之共數是以折半得弦也既得弦則於弦與勾股較之和内減弦即勾股較矣設如有勾股弦總和四十尺弦與勾股和之較六尺求勾股弦各幾何第三十三法以勾股弦總和四十尺内減弦與勾股和之較六尺餘三十四尺折半得十七尺為弦於勾股弦總和四十尺内減弦十七尺餘二十三尺為勾股和用有弦有勾股和求勾股法算之如甲乙為勾股和乙丙為弦甲丙為勾股弦總和甲丁為弦與勾股和之較故甲丙勾股弦總和内減甲丁弦與勾股和之較餘丁丙即二弦之共數是以折半得弦也既得弦則於勾股弦總和内減弦即勾股和矣御製數理精藴下編卷十二
