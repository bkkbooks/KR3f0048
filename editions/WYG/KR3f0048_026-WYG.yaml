body:
  text: 欽定四庫全書御製數理精蘊下編卷二十一面部十一圜内容各等邊形圜外切各等邊形圜内容各等邊形設如圜徑一尺二寸求内容三等邊形之每一邊及面積幾何法以圜徑一尺二寸為弦半徑六寸為勾求得股一尺零三分九釐二豪三絲有餘為圜内容三等邊形之每一邊爰以三等邊形之每一邊為弦每一邊折半為勾求得股九寸或以圜徑一尺二寸取其四分之三亦得九寸為圜内容三等邊形之中垂線乃以每一邊之一尺零三分九釐二豪三絲有餘與中垂線九寸相乘得九十三寸五十三分零七釐有餘折半得四十六寸七十六分五十三釐有餘即圜内容三等邊形之面積也如圖甲乙圜徑一尺二寸内容甲丙丁三等邊形試自丁至乙作丁乙線即圜内容六等邊形之每一邊與丁戊半徑等甲乙全徑丁乙半徑與甲丁邊遂成甲丁乙勾股形故以甲乙全徑為弦丁乙半徑為勾求得甲丁股即圜内容三等邊形之每一邊也其甲己中垂線即甲丁弦己丁勾所求之股又為圜徑四分之三既得一邊又得中垂線即如三角形求面積法算之而得圜内容三等邊形之面積也又法以全圜三百六十度三分之每分得一百二十度折半得六十度乃以半徑十萬為一率六十度之正弦八萬六千六百零三為二率今所設之半徑六寸為三率求得四率五寸一分九釐六豪一絲八忽倍之得一尺零三分九釐二豪三絲六忽為圜内容三等邊形之每一邊既得每一邊之數乃取圜徑四分之三為中垂線與每一邊之數相乘折半得四十六寸七十六分五十六釐有餘即圜内容三等邊形之面積也如圖甲乙圜徑一尺二寸内容甲丙丁三等邊形每一邊之弧皆一百二十度試將甲丙邊折半於戊自圜心己作己戊庚半徑線遂平分甲丙弧於庚則甲庚弧為六十度甲戊即六十度之正弦甲丙即一百二十度之通弦是故半徑十萬與六十度之正弦之比即如所設之半徑六寸與甲戊之半邊之比既得半邊倍之即全邊也又用求圜内各形之一邊之定率比例以定率之圜徑一為一率圜内容三等邊形之毎一邊八六六二五四為二率今所設之圜徑一尺二寸為三率求得四率一尺零三分九釐二豪三絲有餘即圜内容三等邊形之每一邊也又用求圜内各形之面積之定率比例以定率之圜徑自乘之正方面積一為一率圜内容三等邊形之面積三二四七五九五三為二率今所設之圜徑一尺二寸自乘得一尺四十四寸為三率求得四率四十六寸七十六分五十三釐有餘即圜内容三等邊形之面積也又用圜面積之定率比例以定率之圜面積一為一率圜内容三等邊形之面積四一三四九六六七為二率今所設之圜徑一尺二寸求得圜面積一尺一十三寸零九分七十三釐有餘為三率求得四率四十六寸七十六分五十三釐有餘即圜内容三等邊形之面積也設如圜徑一尺二寸求内容四等邊形之每一邊及面積幾何法以圜徑一尺二寸折半得半徑六寸自乘得三十六寸倍之得七十二寸開方得八寸四分八釐五豪二絲八忽有餘為圜内容四等邊形之每一邊其半徑自乘倍之所得七十二寸即圜内容四等邊形之面積也如圖甲乙圜徑一尺二寸内容甲丙乙丁四等邊形試自圜心戊至丁角作戊丁半徑線遂成甲戊丁勾股形因甲戊戊丁皆同為半徑一為勾一即為股故止以半徑自乘倍之開方而得甲丁弦即圜内容四等邊形之每一邊也每一邊自乘是仍為半徑自乘倍之之數即圜内容四等邊形之面積也又法以全圜三百六十度四分之每分得九十度折半得四十五度乃以半徑十萬為一率四十五度之正弦七萬零七百一十一為二率今所設之半徑六寸為三率求得四率四寸二分四釐二豪六絲六忽倍之得八寸四分八釐五豪三絲二忽為圜内容四等邊形之毎一邊既得每一邊之數即以毎一邊自乘得七十二寸即圜内容四等邊形之面積也如圖甲乙圜徑一尺二寸内容甲丙乙丁四等邊形每一邊之弧皆九十度試將甲丙邊折半於戊自圜心己作己戊庚半徑線遂平分甲丙弧於庚則甲庚弧為四十五度甲戊即四十五度之正弦甲丙即九十度之通弦是故半徑十萬與四十五度之正弦之比即如所設之半徑六寸與甲戊之半邊之比既得半邊倍之即全邊也又用求圜内各形之一邊之定率比例以定率之圜徑一為一率圜内容四等邊形之毎一邊七七一六七八為二率今所設之圜徑一尺二寸為三率求得四率八寸四分八釐五豪二絲八忽有餘即圜内容四等邊形之每一邊也又用求圜内各形之面積之定率比例以定率之圜徑自乘之正方面積一為一率圜内容四等邊形之面積五為二率今所設之圜徑一尺二寸自乘得一尺四十四寸為三率求得四率七十二寸即圜内容四等邊形之面積也又用圜面積之定率比例以定率之圜面積一為一率圜内容四等邊形之面積六三六六一九七七為二率今所設之圜徑一尺二寸求得圜面積一尺一十三寸零九分七十三釐有餘為三率求得四率七十二寸即圜内容四等邊形之面積也設如圜徑一尺二寸求内容五等邊形之每一邊及面積幾何法以圜徑一尺二寸折半得半徑六寸為首率用連比例三率有首率求中率末率使中率末率相加與首率等之法求得中率三寸七分零八豪二絲有餘即圜内容十等邊形之每一邊詳見割圜卷中乃以所得中率與半徑首率相減餘二寸二分九釐一豪八絲為末率折半得一寸一分四釐五豪九絲為半末率即以此半末率為勾中率為弦求得股三寸五分二釐六豪七絲一忽有餘倍之得七寸零五釐三豪四絲二忽有餘為圜内容五等邊形之每一邊又以中率與半末率相加得四寸八分五釐四豪一絲有餘為自圜心至每一邊之中垂線乃以每一邊折半之數與中垂線相乘得一十七寸一十一分九十釐有餘五因之得八十五寸五十九分五十釐有餘即圜内容五等邊形之面積也如圖甲乙圜徑一尺二寸内容甲丙丁戊己五等邊形試自圜心庚至每角各作一半徑線即分五等邊形為五三角形又自乙至戊作乙戊線即圜内容十等邊形之每一邊庚乙庚戊半徑與乙戊邊遂成庚乙戊三角形又依乙戊線度截庚乙半徑於辛作戊辛線則又成戊辛乙三角形與庚乙戊三角形為同式形故庚乙為首率乙戊戊辛俱為中率辛乙為末率辛壬與壬乙俱為半末率是以壬乙半末率為勾乙戊中率為弦求得戊壬股倍之得戊丁即圜内容五等邊形之毎一邊又以庚辛中率與辛壬半末率相加得庚壬中垂線用三角形求面積法算之得庚丁戊一三角形面積五倍之而得圜内容五等邊形之總面積也又法以全圜三百六十度五分之每分得七十二度折半得三十六度乃以半徑十萬為一率三十六度之正弦五萬八千七百七十九為二率今所設之半徑六寸為三率求得四率三寸五分二釐六豪七絲四忽倍之得七寸零五釐三豪四絲八忽為圜内容五等邊形之每一邊次以半徑十萬為一率三十六度之餘弦八萬零九百零二為二率今所設之半徑六寸為三率求得四率四寸八分五釐四豪一絲二忽為自圜心至每一邊之中垂線與毎一邊折半之數相乘五因之得八十五寸五十九分六十釐有餘為圜内容五等邊形之面積也如圖甲乙圜徑一尺二寸内容甲丙丁戊己五等邊形每一邊之弧皆七十二度試將甲丙邊折半於庚自圜心辛作辛庚壬半徑線遂平分甲丙弧於壬則甲壬弧為三十六度甲庚即三十六度之正弦甲丙即七十二度之通弦辛庚即三十六度之餘弦是故半徑十萬與三十六度之正弦之比即如所設之半徑六寸與甲庚之半邊之比既得半邊倍之即全邊又半徑十萬與三十六度之餘弦之比即如所設之半徑六寸與辛庚中垂線之比也又用求圜内各形之一邊之定率比例以定率之圜徑一為一率圜内容五等邊形之每一邊五八七七八五二五為二率今所設之圜徑一尺二寸為三率求得四率七寸零五釐三豪四絲二忽有餘即圜内容五等邊形之每一邊也又用求圜内各形之面積之定率比例以定率之圜徑自乘之正方面積一為一率圜内容五等邊形之面積五九四四一三一為二率今所設之圜徑一尺二寸自乘得一尺四十四寸為三率求得四率八十五寸五十九分五十釐有餘即圜内容五等邊形之面積也又用圜面積之定率比例以定率之圜面積一為一率圜内容五等邊形之面積七五六八二六七二為二率今所設之圜徑一尺二寸求得圜面積一尺一十三寸零九分七十三釐有餘為三率求得四率八十五寸五十九分五十釐有餘即圜内容五等邊形之面積也設如圜徑一尺二寸求内容六等邊形之每一邊及面積幾何法以圜徑一尺二寸折半得半徑六寸即圜内容六等邊形之每一邊爰以半徑六寸為弦毎一邊折半得三寸為勾求得股五寸一分九釐六豪一絲五忽有餘為自圜心至每一邊之中垂線乃以每一邊折半之數與中垂線相乘得一十五寸五十八分八十四釐有餘六因之得九十三寸五十三分零四釐有餘即圜内容六等邊形之面積也如圖甲乙圜徑一尺二寸内容甲丙丁乙戊己六等邊形其每一邊皆六寸與半徑等試自圜心庚至每角各作一半徑線即分六等邊形為六三角形以甲庚半徑為弦甲丙一邊折半得甲辛為勾求得股為庚辛中垂線用三角形求面積法算之得甲丙庚一三角形之面積六倍之而得圜内容六等邊形之總面積也又法以全圜三百六十度六分之每分得六十度折半得三十度乃以半徑十萬為一率三十度之正弦五萬為二率今所設之半徑六寸為三率求得四率三寸倍之得六寸為圜内容六等邊形之每一邊次以半徑十萬為一率三十度之餘弦八萬六千六百零三為二率今所設之半徑六寸為三率求得四率五寸一分九釐六豪一絲八忽為自圜心至每一邊之中垂線與每一邊折半之數相乘六因之得九十三寸五十三分一十二釐有餘為圜内容六等邊形之面積也如圖甲乙圜徑一尺二寸内容甲丙丁乙戊己六等邊形每一邊之弧皆六十度試將甲丙邊折半於庚自圜心辛作辛庚壬半徑線遂平分甲丙弧於壬則甲壬弧為三十度甲庚即三十度之正弦甲丙即六十度之通弦辛庚即三十度之餘弦是故半徑十萬與三十度之正弦之比即如所設之半徑六寸與甲庚之半邊之比既得半邊倍之即全邊又半徑十萬與三十度之餘弦之比即如所設之半徑六寸與辛庚中垂線之比也又用求圜内各形之一邊之定率比例以定率之圜徑一為一率圜内容六等邊形之每一邊五為二率今所設之圜徑一尺二寸為三率求得四率六寸即圜内容六等邊形之每一邊也又用求圜内各形之面積之定率比例以定率之圜徑自乘之正方面積一為一率圜内容六等邊形之面積六四九五一九五為二率今所設之圜徑一尺二寸自乘得一尺四十四寸為三率求得四率九十三寸五十三分零七釐有餘即圜内容六等邊形之面積也又用圜面積之定率比例以定率之圜面積一為一率圜内容六等邊形之面積八二六九九三三四為二率今所設之圜徑一尺二寸求得圜面積一尺一十三寸零九分七十三釐有餘為三率求得四率九十三寸五十三分零七釐有餘即圜内容六等邊形之面積也設如圜徑一尺二寸求内容七等邊形之每一邊及面積幾何法以圜徑一尺二寸折半得半徑六寸為一率用連比例四率有一率求二率三率四率使一率與四率相加與二率兩倍再加一三率等之法求得二率二寸六分七釐零二絲五忽有餘為圜内容十四等邊形之每一邊詳見割圜卷中乃以