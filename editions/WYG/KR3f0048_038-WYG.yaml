body:
  text: 欽定四庫全書御製數理精藴下編卷三十三末部三借根方比例帶縱平方乘方帶縱立方三乘方四五乘方附帶縱平方借根方比例開帶縱平方其以長方之積用長闊之較或和而求長闊之數皆與常法同但不立和縱較縱之名惟有多根少根之號而毎根之數或爲長方之闊或爲長方之長錯綜其名有十二種推究其實總不出和較之兩端如云一平方多㡬根與幾真數等或幾根多一平方與幾真數等或一平方與幾真數少幾根等或幾根與幾真數少一平方等此四者根皆較縱而其毎根之數皆長方之闊也如云一平方少幾根與幾真數等或一平方少幾眞數與幾根等或一平方與幾真數多幾根等或一平方與幾根多幾眞數等此四者根亦皆較縱而其每根之數則皆長方之長也如云一平方多幾真數與幾根等或幾眞數多一平方與幾根等或幾真數與幾根少一平方等或一平方與幾根少幾眞數等此四者根皆和縱而其毎根之數或爲長方之長或爲長方之闊也要之所謂一平方者即一正方而多幾根少幾根即變正方而爲長方其眞數比平方多根者其毎根爲闊眞數比平方少根者其每根爲長二者皆較縱惟眞數比根少平方者則爲和縱也至於開之之法皆以眞數爲長方積以根數爲縱即以根數作眞數用如三根即作三眞數五根即作五真數之類解見設如依面部帶縱平方法開之有較縱者先求和有和縱者先求較其根爲長方之闊者以和較相減折半而得每根之數用半和半較立法者則相減即得根數不用折半其根爲長方之長者以和較相加折半而得每根之數也用半和半較立法者則相加即得根數不用折半俱詳設如設如有一平方多二根與二十四尺相等問每一根之數幾何法以二十四尺爲長方積二根爲縱多二尺用帶縱較數開平方法算之將積數四因加縱多自乘之數得一百尺開平方得十尺爲和減較二尺餘八尺折半得四尺爲一根之數即長方之闊加較二尺得六尺即長方之長也如圖甲乙丙丁長方形共積二十四尺甲乙四尺爲一根爲闊甲丁六尺爲長戊丁二尺爲縱多甲乙己戊爲一平方戊己丙丁爲二根是甲乙丙丁二十四尺内有甲乙己戊之一平方又有戊己丙丁之二根故云一平方多二根與二十四尺相等也若以積計之則積之多於平方者爲戊己丙丁之二根若以邊計之則長多於闊者爲戊丁之二尺故以二根即作二尺爲縱多也此法錯綜其名則爲四種一平方多二根與二十四尺相等一也如二根多一平方亦必與二十四尺相等又一也若於一平方多二根與二十四尺各减去二根則爲一平方與二十四尺少二根相等此又其一也甲乙丙丁二十四尺内减去戊己丙丁二根餘甲乙己戊一平方故爲一平方與二十四尺少二根相等也又如一平方多二根與二十四尺各减去一平方則爲二根與二十四尺少一平方相等此又其一也甲乙丙丁二十四尺内減去甲乙己戊一平方餘戊己丙丁二根故爲二根與二十四尺少一平方相等也此四者名雖不同合而觀之總爲眞數比一正方多根數故知其爲較縱而每根之數爲闊也設如有一平方少四根與四十五尺相等問每一根之數幾何法以四十五尺爲長方積四根爲縱多四尺用帶縱較數開平方法算之將積數四因加縱多自乘之數得一百九十六尺開平方得十四尺爲和加較四尺得十八尺折半得九尺爲一根之數即長方之長減較四尺得五尺即長方之闊也如圖甲乙丙丁長方形共積四十五尺甲乙九尺爲一根爲長甲丁五尺爲闊甲戊與甲乙等丁戊四尺爲縱甲乙己戊爲一平方丁丙己戊爲四根於甲乙己戊平方内減去丁丙己戊之四根則餘甲乙丙丁四十五尺故云一平方少四根與四十五尺相等也若以積計之則積之少於平方者爲丁丙己戊之四根若以邊計之則闊少於長者爲丁戊之四尺故以四根作四尺爲縱多也此法錯綜其名亦爲四種一平方少四根與四十五尺相等一也如一平方少四十五尺亦必與四根相等又一也若於一平方少四根與四十五尺各加四根則爲一平方與四十五尺多四根相等此又其一也甲乙丙丁四十五尺加丁丙己戊四根成甲乙己戊一平方故爲一平方與四十五尺多四根相等也如一平方亦必與四根多四十五尺相等此又其一也此四者名雖不同合而觀之總爲真數比一正方少根數故知其爲較縱而其每根之數爲長也設如有一平方多三十六尺與十三根相等問每一根之數幾何法以三十六尺爲長方積十三根爲和十三尺用帶縱和數開平方法算之將積數四因與和自乘數相減餘二十五尺開平方得五尺爲較與和十三尺相减餘八尺折半得四尺爲一根之數即長方之闊加較五尺得九尺即長方之長也如圖甲乙丙丁長方形共積三十六尺甲乙四尺爲一根爲闊甲丁九尺爲長甲戊十三尺爲和甲乙己戊爲十三根丁丙己戊爲一平方是甲乙己戊十三根内有甲乙丙丁三十六尺又有丁丙己戊一平方故云一平方多三十六尺與十三根相等也若以積計之則積三十六尺與一平方相加共得甲乙己戊之十三根若以邊計之則長九尺與闊四尺相加得甲戊之十三尺故將十三根作十三尺爲和也此法錯綜其名亦爲四種一平方多三十六尺與十三根相等一也如三十六尺多一平方亦必與十三根相等又一也若於一平方多三十六尺與十三根各减去三十六尺則爲一平方與十三根少三十六尺相等此又其一也甲乙己戊十三根内减去甲乙丙丁三十六尺餘丁丙己戊一平方故云一平方與十三根少三十六尺相等也又如一平方多三十六尺與十三根各减去一平方則爲三十六尺與十三根少一平方相等此又其一也甲乙己戊十三根内減去丁丙己戊一平方餘甲乙丙丁三十六尺故爲三十六尺與十三根少一平方相等也此四者名雖不同合而觀之總爲眞數比根數少一正方故知其爲和而其毎根之數爲闊也設如有一平方多三十二尺與十二根相等問每一根之數幾何法以三十二尺爲長方積十二根爲和十二尺用帶縱和數開平方法算之將積數四因與和自乘數相減餘十六尺開平方得四尺爲較加和十二尺得十六尺折半得八尺爲一根之數即長方之長減較四尺餘四尺即長方之闊也如圖甲乙丙丁長方形共積三十二尺甲乙八尺爲一根爲長甲丁四尺爲闊甲戊十二尺爲和甲乙己戊爲十二根丁丙己戊爲一平方是甲乙己戊十二根内有甲乙丙丁三十二尺又有丁丙己戊一平方故云一平方多三十二尺與十二根相等也若以積計之則積三十二尺與一平方相加共得甲乙己戊十二根若以邊計之則長八尺與闊四尺相加得甲戊之十二尺故以十二根作十二尺爲和也此法亦眞數比根數少一正方故知其爲和而其每根之數爲長也帶縱立方三乘方四乘方五乘方附借根方比例開帶縱立方與常法不同常法先知各邊之和或較既開得一邊之數以和較加減之即得各邊之數此法止有根方多少之號而無和縱較縱之名惟求每根之數而不問餘邊其立法之本意葢欲借根方以求他數既得一根之數則所求之數已得而方之形體有所不計且其與根方相等之積數或爲長方體扁方體形或非長方體扁方體形或於長方扁方之内少幾數或於長方扁方之外多幾數則不能成長方扁方體形也皆不可知故不可以帶縱之常法求也其積數或原爲幾根幾方之總數而非一長方或一扁方之全數則止可以逐方逐根計之若作一長方或一扁方算則其各邊必有奇零不盡而轉與所設之根數不合矣今類其法分爲九種如一立方多幾根與幾真數等一也一立方少幾根與幾眞數等二也一立方多幾平方與幾真數等三也一立方少幾平方與幾眞數等四也一立方多幾平方多幾根與幾眞數等五也一立方少幾平方少幾根與幾真數等六也一立方多幾平方少幾根與幾眞數等七也一立方少幾平方多幾根與幾真數等八也又幾平方少一立方與幾眞數等九也其開之之法除第九種外餘俱依立方法定初商復視所帶根方爲多號者其商數須取略小於應得之數所帶根方數爲少號者其商數須取略大於應得之數俱以初商數自乘再乘爲立方積以初商自乘數與幾平方相乘爲所帶平方之共積以初商數與幾根相乘爲所帶根數之共積多號者與立方積相加少號者與立方積相減然後與原積相減不盡者爲次商積次商之法以初商自乘數三因之爲立方廉以初商數倍之與幾平方相乘爲所帶平方之共廉多號者與立方廉相加少號者與立方廉相減又加減所帶之根數多根者加少根者減爲次商廉法以廉法除次商積得次商即合初商自乘再乘爲立方積仍如所帶幾根幾平方加減之而後減原積並與初商同至於第九種之法則將立方與真數俱用平方數除之得一平方少幾分立方之一與幾眞數等依平方法定初商其商數須取略大於應得之數乃以初商數自乘爲平方積又以初商數再乘爲立方積以平方數除之得數爲少幾分立方之一以減平方積而後與原積相減不盡者爲次商積次商之法以初商數倍之爲平方廉又以初商自乘數三因之爲立方廉以平方數除之得數以減平方廉餘爲次商廉法以廉法除次商積得次商其減積之法與初商同以上九種如法開之即得每根之數也要之所謂一立方者即一正方體而多平方多根少平方少根即變正方體而爲長方體扁方體或爲磬折長方體扁方體其積數中有立方則用再乘有平方則用自乘有根則用商數多則相加少則相減九種之中無異術也即推之多乘方莫不皆然總以其累乘之數爲主而以所帶根方之積數加減之與立方無二理也爰將立方九種之法各設一例以明其理而三乘四乘五乘之法亦各設二例以附其後焉設如有一立方多八根與一千八百二十四尺相等問毎一根之數幾何法列原積一千八百二十四尺按立方法作記於四尺上定單位一千尺上定十位其一千尺爲初商積與十尺自乘再乘之數相合即定初商爲十尺書於原積一千尺之上而以初商十尺自乘再乘之一千尺爲一立方積又以初商十尺八因之得八十尺爲多八根之共積與一立方積相加得一千零八十尺書於原積之下相減餘七百四十四尺爲次商積而以初商之十尺自乘之一百尺三因之得三百尺爲一立方廉加根數八共三百零八尺爲次商廉法以除次商積足二倍即定次商爲二尺書於原積四尺之上合初商共一十二尺自乘再乘得一千七百二十八尺爲一立方積又以十二尺八因之得九十六尺爲八根之共積與立方積相加共得一千八百二十四尺書於原積之下相減恰盡是開得一十二尺爲每一根之數也此法以積計之爲一正方體及八根之共數以邊計之則所得毎根之數即正方體之毎一邊因正方體之外多八根故成一磬折體而非正方體亦非長方體也設如有一立方少九根與一千六百二十尺相等問毎一根之數幾何法列原積一千六百二十尺按立方法作記於空尺上定單位一千尺上定十位其一千尺爲初商積與十尺自乘再乘之數相合即定初商爲十尺書於原積一千尺之上而以初商十尺自乘再乘之一千尺爲一立方積又以初商十尺九因之得九十尺爲少九根之共積與立方積相減餘九百一十尺書於原積之下相減餘七百一十尺爲次商積而以初商之十尺自乘之一百尺三因之得三百尺爲一立方廉内減去根數九餘二百九十一尺爲次商廉法以除次商積足二倍即定次商爲二尺書於原積空尺之上合初商共十二尺自乘再乘得一千七百二十八尺爲一立方積又以十二尺九因之得一百零八尺爲少九根之共積與立方積相減餘一千六百二十尺書於原積之下相減恰盡是開得一十二尺爲毎一根之數也此法以積計之爲一正方體少九根之數以邊計之則所得每根之數即正方體之每一邊因正方體内少九根之數故成磬折體而非正方體亦非扁方體也設如有一立方多四平方與二千三百零四尺相等問每一根之數幾何法列原積二千三百零四尺按立方法作記於四尺上定單位二千尺上定十位其二千尺爲初商積與十尺自乘再乘之數相準即定初商爲十尺書於原積二千尺之上而以初商十尺自乘再乘之一千尺爲一立方積又以初商十尺自乘之一百尺四因之得四百尺爲多四平方之共積與立方積相加得一千四百尺書於原積之下相減餘九百零四尺爲次商積而以初商之十尺自乘三因之得三百尺爲一立方廉又以初商之十尺倍之得二十尺四因之得八十尺爲四平方廉與一立方廉相加得三百八十尺爲次商廉法以除次商積足二倍即定次商爲二尺書於原積四尺之上合初商共十二尺自乘再乘得一千七百二十八尺爲一立方積又以十二尺自乘之一百四十四尺四因之得五百七十六尺爲多四平方之共積與立方積相加共得二千三百零四尺書於原積之下相減恰盡是開得一十二尺爲每一根之數也此法以積計之爲一正方體及四平方之共數以邊計之則所得每根之數即正方體之每一邊亦即平方之每一邊因正方體之外多四平方故成長方體而非正方體也設如有一立方少八平方與七千九百三十五尺相等問每一根之數幾何法列原積七千九百三十五尺按立方法作記於五尺上定單位七千尺上定十位其七千尺爲初商積與十尺自乘再乘之數相凖應商十尺而所帶平方爲少號故取略大之數爲二十尺書於原積七千尺之上而以初商二十尺自乘再乘之八千尺爲一立方積又以初商二十尺自乘之四百尺八因之得三千二百尺爲少八平方之共積與立方積相減餘四千八百尺書於原積之下相減餘三千一百三十五尺爲次商積而以初商之二十尺自乘三因之得一千二百尺爲一立方廉又以初商之二十尺倍之得四十尺八因之得三百二十尺爲八平方廉與一立方廉相減餘八百八十尺爲次商廉法以除次商積足三倍即定次商爲三尺書於原積五尺之上合初商共二十三尺自乘再乘得一萬二千一百六十七尺爲一立方積又以二十三尺自乘之五百二十九尺八因之得四千二百三十二尺爲少八平方之共積與一立方積相減餘七千九百三十五尺書於原積之下相減恰盡是開得二十三尺爲每一根之數也此法以積計之爲一正方體少八平方之數以邊計之則所得每根之數即正方體之每一邊亦即平方之每一邊因正方體之内少八平方故成扁方體而非正方體也設如有一立方多十三平方多三十根與二萬七千一百四十四尺相等問毎一根之數幾何法列原積二萬七千一百四十四尺按立方法作記於四尺上定單位七千尺上定十位其二萬七千尺爲初商積與三十自乘再乘之數相合應商三十尺而所帶平方與根皆爲多號故取略小之數爲二十尺書於原積七千尺之上而以初商二十尺自乘再乘之八千尺爲一立方積又以初商二十尺自乘之四百尺十三乘之得五千二百尺爲多十三平方之共積又以初商之二十尺三十乘之得六百尺爲多三十根之共積三積立方平方與根之三數相加得一萬三千八百尺書於原積之下相減餘一萬三千三百四十四尺爲次商積而以初商之二十尺自乘三因之得一千二百尺爲一立方廉又以初商之二十尺倍之得四十尺以十三乘之得五百二十尺爲十三平方廉與立方廉相加得一千七百二十尺又加根數三十共一千七百五十尺爲次商廉法以除次商積足七倍因取略小之數爲六尺書於原積四尺之上合初商共二十六尺自乘再乘得一萬七千五百七十六尺爲一立方積又以二十六尺自乘之六百七十六尺十三乘之得八千七百八十八尺爲多十三平方之共積又以二十六尺三十乘之得七百八十尺爲多三十根之共積三積相加共二萬七千一百四十四尺書於原積之下相減恰盡是開得二十六尺爲毎一根之數也此法以積計之爲一正方體及十三平方與三十根之共數以邊計之則所得每根之數即正方體之每一邊亦即平方之每一邊因正方體之外多十三平方又多三十根恰成長方體而非正方體亦非磬折體也將所多之十三平方内十平方附於正方體之一面又以三平方加於正方體之又一面即成磬折體而缺三十根之數如以三十根補其缺即成長方體其寛即一根爲二十六尺其長即一根多十尺爲三十六尺其高即一根多三尺爲二十九尺也此因所多之平方及根數適足長方體形故爲長方體若平方與根數不能補足者仍爲磬折體也設如有一立方少七平方少八根與七千零八十四尺相等問每一根之數幾何法列原積七千零八十四尺按立方法作記於四尺上定單位七千尺上定十位其七千尺爲初商積與十尺自乘再乘之數相凖而所帶平方與根皆爲少號故取略大之數爲二十尺書於原積七千尺之上而以初商二十尺自乘再乘之八千尺爲一立方積又以初商二十尺自乘之四百尺七因之得二千八百尺爲少七平方之共積又以初商之二十尺八因之得一百六十尺爲少八根之共積與少七平方共積相加得二千九百六十尺以減立方積餘五千零四十尺書於原積之下相減餘二千零四十四尺爲次商積而以初商之二十尺自乘三因之得一千二百尺爲一立方廉又以初商之二十尺倍之得四十尺七因之得二百八十尺爲七平方廉與立方廉相減餘九百二十尺又減去根數八餘九百一十二尺爲次商廉法以除次商積足二倍即定次商爲二尺書於原積四尺之上合初商共二十二尺自乘再乘得一萬零六百四十八尺爲一立方積又以二十二尺自乘之四百八十四尺七因之得三千三百八十八尺爲少七平方之共積又以二十二尺八因之得一百七十六尺爲少八根之共積與少七平方共積相加得三千五百六十四尺以減立方積餘七千零八十四尺書於原積之下相減恰盡是開得二十二尺爲每一根之數也此法以積計之爲一正方體少七平方又少八根之數以邊計之則所得每根之數即正方體之毎一邊亦即平方之每一邊因正方體之内少七平方又少八根故成磬折體而非正方體也設如有一立方多一平方少二十根與三萬三千一百五十二尺相等問每一根之數幾何法列原積三萬三千一百五十二尺按立方法作記於二尺上定單位三千尺上定十位其三萬三千尺爲初商積與三十自乘再乘之數相準即定初商爲三十尺書於原積三千尺之上而以初商三十尺自乘再乘之二萬七千尺爲一立方積又以初商三十尺自乘之九百尺爲多一平方積又以初商之三十尺二十乘之得六百尺爲少二十根之共積於立方積内加多一平方積得二萬七千九百尺又減去少二十根之共積餘二萬七千三百尺書於原積之下相減餘五千八百五十二尺爲次商積而以初商之三十尺自乘三因之得二千七百尺爲一立方廉又以初商之三十尺倍之得六十尺爲一平方廉與立方廉相加得二千七百六十尺又減去根數二十餘二千七百四十尺爲次商廉法以除次商積足二倍即定次商爲二尺書於原積二尺之上合初商共三十二尺自乘再乘得三萬二千七百六十八尺爲一立方積又以三十二尺自乘之一千零二十四尺爲多一平方積又以三十二尺二十乘之得六百四十尺爲少二十根之共積於一立方積内加多一平方積得三萬三千七百九十二尺又減去少二十根之共積得三萬三千一百五十二尺書於原積之下相減恰盡是開得三十二尺爲每一根之數也此法以積計之爲一正方體多一平方復少二十根之數以邊計之則所得每根之數即正方體之每一邊亦即平方之每一邊因正方體之外多一平方又少二十根故成磬折體而非正方體也設如有一立方少三平方多二根與一萬二千一百四十四尺相等問每一根之數幾何法列原積一萬二千一百四十四尺按立方法作記於四尺上定單位二千尺上定十位其一萬二千尺爲初商積與二十自乘再乘之數相凖即定初商爲二十尺書於原積二千尺之上而以初商二十尺自乘再乘之八千尺爲一立方積又以初商二十尺自乘之四百尺三因之得一千二百尺爲少三平方之共積又以初商之二十尺二因之得四十尺爲多二根之共積於立方積内減去少三平方之共積餘六千八百尺又加入多二根之共積得六千八百四十尺書於原積之下相減餘五千三百零四尺爲次商積而以初商之二十尺自乘三因之得一千二百尺爲一立方廉又以初商之二十尺倍之得四十尺三因之得一百二十尺爲三平方廉與立方廉相減餘一千零八十尺又加入根數二得一千零八十二尺爲次商廉法以除次商積足四倍即定次商爲四尺書於原積四尺之上合初商共二十四尺自乘再乘得一萬三千八百二十四尺爲一立方積又以二十四尺自乘之五百七十六尺三因之得一千七百二十八尺爲少三平方之共積又以二十四尺二因之得四十八尺爲多二根之共積於立方積内減去三平方之共積餘一萬二千零九十六尺又加入多二根之共積得一萬二千一百四十四尺書於原積之下相減恰盡是開得二十四尺爲毎一根之數也此法以積計之爲一正方體少三平方復多二根之數以邊計之則所得每根之數即正方體之每一邊亦即平方之每一邊因正方體之内少三平方又多二根故成磬折體而非正方體也設如有四十平方少一立方與五千六百二十五尺相等問每一根之數幾何法以四十平方少一立方與五千六百二十五尺俱以四十除之得一平方少四十分立方之一與一百四十尺六十二寸五十分相等乃列一百四十尺六十二寸五十分爲歸除所得之積按平方法作記於空尺上定單位一百尺上定十位其一百尺爲初商積與十尺自乘之數相合即定初商爲十尺書於所得積一百尺之上而以初商十尺自乘之一百尺爲一平方積再乘得一千尺爲一立方積以四十除之得二十五尺爲少四十分立方之一之積與一平方積相減餘七十五尺書於所得積之下相減餘六十五尺六十二寸五十分爲次商積而以初商之一十尺倍之得二十尺爲一平方廉又以初商之十尺自乘三因之得三百尺爲一立方廉以四十除之得七尺五寸爲四十分立方之一之廉與平方廉相減餘十二尺五寸爲次商廉法以除次商積足五倍即定次商爲五尺書於所得積空尺之上合初商共十五尺自乘得二百二十五尺爲一平方積再乘得三千三百七十五尺爲一立方積以四十除之得八十四尺三十七寸五十分爲四十分立方之一之積與一平方積相減餘一百四十尺六十二寸五十分書於所得積之下相減恰盡乃以一平方積與四十相乘得九千尺爲四十平方積内減去一立方積餘五千六百二十五尺與原積相合是開得一十五尺爲每一根之數也此法以積計之爲四十平方少一正方體之數以邊計之則所得每根之數即平方之每一邊亦即正方體之每一邊因四十平方内少十五平方之一正方體每邊爲十五尺故十五平方爲一正方體也餘二十五平方爲長方體其寛即一根爲十五尺其高亦十五尺其長爲二十五尺也而非正方體也設如有五百平方少一立方與二十七萬四千一百七十六尺相等問每一根之數幾何法以五百平方少一立方與二十七萬四千一百七十六尺俱以五百除之得一平方少五百分立方之一與五百四十八尺三十五寸二十分相等乃列五百四十八尺三十五寸二十分爲歸除所得之積按平方法作記於八尺上定單位五百尺上定十位其五百尺爲初商積與二十自乘之數相準即定初商爲二十尺書於所得積五百尺之上而以初商二十尺自乘之四百尺爲一平方積再乘得八千尺爲一立方積以五百除之得十六尺爲少五百分立方之一之積與平方積相減餘三百八十四尺書於所得積之下相減餘一百六十四尺三十五寸二十分爲次商積而以初商之二十尺倍之得四十尺爲一平方廉又以初商之二十尺自乘三因之得一千二百尺爲一立方廉以五百除之得二尺四寸爲五百分立方之一之廉與平方廉相減得三十七尺六寸爲次商廉法以除次商積足四倍即定次商爲四尺書於所得積八尺之上合初商共二十四尺自乘得五百七十六尺爲一平方積再乘得一萬三千八百二十四尺爲一立方積以五百除之得二十七尺六十四寸八十分爲少五百分立方之一之積與平方積相減餘五百四十八尺三十五寸二十分書於所得積之下相減恰盡乃以一平方積與五百相乘得二十八萬八千尺爲五百平方積内減去一立方積餘二十七萬四千一百七十六尺與原積相合是開得二十四尺爲每一根之數也此法以積計之爲五百平方少一正方體以邊計之則所得每根之數即平方之每一邊亦即正方體之每一邊因五百平方内少二十四平方之一正方體每邊爲二十四尺故二十四平方即一正方體也餘四百七十六平方爲長方體其寛即一根爲二十四尺其高亦爲二十四尺其長爲四百七十六尺也而非正方體也設如有一三乘方多二平方與二萬一千零二十四尺相等問每一根之數幾何法列原積二萬一千零二十四尺按三乘方法作記於四尺上定單位二萬尺上定十位其二萬尺爲初商積與十尺乘三次之數相準即定初商爲十尺書於原積二萬尺之上而以初商十尺乘三次之一萬尺爲一三乘方積又以初商十尺自乘之一百尺二因之得二百尺爲多二平方之共積與三乘方積相加得一萬零二百尺書於原積之下相減餘一萬零八百二十四尺爲次商積而以初商之十尺再乘四因之得四千尺爲三乘方廉又以初商之十尺倍之得二十尺二因之得四十尺爲多二平方之廉與三乘方廉相加得四千零四十尺爲次商廉法以除次商積足二倍即定次商爲二尺書於原積四尺之上合初商共十二尺乘三次得二萬零七百三十六尺爲一三乘方積又以十二尺自乘之一百四十四尺二因之得二百八十八尺爲多二平方之共積與三乘方積相加得二萬一千零二十四尺書於原積之下相減恰盡是開得一十二尺爲每一根之數也又法用帶縱平方及平方兩次開之將原積二萬一千零二十四尺爲長方積以多二平方作二尺爲縱多折半得一尺爲半較自乘仍得一尺與積相加得二萬一千零二十五尺開平方得一百四十五尺爲半和内減半較一尺凡多平方者即減半較如少平方者則加半較餘一百四十四尺爲正方積復開平方得十二尺即每一根之數也葢三乘方多平方與方根自乘爲闊加多平方數爲長所作之長方積等故用帶縱較數開平方法開之得數復開平方即得每一根之數也設如有一千平方少一三乘方與一十二萬三千二百六十四尺相等問每一根之數幾何法以一千平方少一三乘方與一十二萬三千二百六十四尺俱以一千除之得一平方少一千分三乘方之一與一百二十三尺二十六寸四十分相等乃列一百二十三尺二十六寸四十分爲歸除所得之積按平方法作記於三尺上定單位一百尺上定十位其一百尺爲初商積與十尺自乘之數相合即定初商爲十尺書於所得積一百尺之上而以初商十尺自乘之一百尺爲一平方積又以初商之十尺乘三次得一萬尺爲一三乘方積以一千除之得一十尺爲千分三乘方之一之積與一平方積相減餘九十尺書於所得積之下相減餘三十三尺二十六寸四十分爲次商積而以初商之十尺倍之得二十尺爲一平方廉又以初商之十尺自乘再乘四因之得四千尺爲一三乘方廉以一千除之得四尺爲千分三乘方之一之廉與平方廉相減餘一十六尺爲次商廉法以除次商積足二倍即定次商爲二尺書於所得積三尺之上合初商共十二尺自乘得一百四十四尺爲一平方積又以十二尺乘三次得二萬零七百三十六尺爲一三乘方積以一千除之得二十尺零七十三寸六十分與一平方積相減餘一百二十三尺二十六寸四十分書於所得積之下相減恰盡乃以一平方積與一千相乘得一十四萬四千尺爲一千平方積内減去一三乘方積餘一十二萬三千二百六十四尺與原積相合是開得一十二尺爲每一根之數也又法用帶縱平方及平方兩次開之將原積一十二萬三千二百六十四尺爲長方積以一千平方作一千尺爲和折半得五百尺爲半和自乘得二十五萬尺與積相減餘十二萬六千七百三十六尺開平方得三百五十六尺爲半較與半和相減餘一百四十四尺爲正方積復開平方得一十二尺即每一根之數也葢平方少三乘方與方根自乘爲闊與平方數相減爲長所作之長方積等故用帶縱和數開平方法開之得數復開平方即得每一根之數也設如有一四乘方多二立方與七百九十九萬零二百七十二尺相等問每一根之數幾何法列原積七百九十九萬零二百七十二尺按四乘方法作記於二尺上定單位九十萬尺上定十位其七百九十萬尺爲初商積與二十乘四次之數相準即定初商爲二十尺書於原積九十萬尺之上而以初商二十尺乘四次之三百二十萬尺爲一四乘方積又以初商二十尺自乘再乘之八千尺二因之得一萬六千尺爲多二立方之共積與四乘方積相加得三百二十一萬六千尺書於原積之下相減餘四百七十七萬四千二百七十二尺爲次商積而以初商之二十尺乘三次五因之得八十萬尺爲一四乘方廉又以初商之二十尺自乘三因之得一千二百尺又二因之得二千四百尺爲多二立方之廉與四乘方廉相加得八十萬零二千四百尺爲次商廉法以除次商積足五倍因取略小之數爲四尺書於原積二尺之上合初商共二十四尺乘四次得七百九十六萬二千六百二十四尺爲一四乘方積又以二十四尺自乘再乘之一萬三千八百二十四尺二因之得二萬七千六百四十八尺爲多二立方之共積與四乘方積相加得七百九十九萬零二百七十二尺書於原積之下相減恰盡是開得二十四尺爲每一根之數也葢四乘方多立方之數不與平方立方之數相合故不能以平方立方之法開也設如有二千立方少一四乘方與一千九百六十八萬五千三百七十六尺相等問每一根之數幾何法以二千立方少一四乘方與一千九百六十八萬五千三百七十六尺俱以二千除之得一立方少二千分四乘方之一與九千八百四十二尺六百八十八寸相等乃列九千八百四十二尺六百八十八寸爲歸除所得之積按立方法作記於二尺上定單位九千尺上定十位其九千尺爲初商積與二十自乘再乘之數相準即定初商爲二十尺書於所得積九千尺之上而以初商二十尺自乘再乘之八千尺爲一立方積又以初商之二十尺乘四次得三百二十萬尺爲一四乘方積以二千除之得一千六百尺爲二千分四乘方之一之積與一立方積相減餘六千四百尺書於所得積之下相減餘三千四百四十二尺六百八十八寸爲次商積而以初商之二十尺自乘三因之得一千二百尺爲一立方廉又以初商之二十尺乘三次五因之得八十萬尺爲一四乘方廉以二千除之得四百尺爲二千分四乘方之一之廉與立方廉相減餘八百尺爲次商廉法以除次商積足四倍即定次商爲四尺書於所得積二尺之上合初商共二十四尺自乘再乘得一萬三千八百二十四尺爲一立方積又以二十四尺乘四次得七百九十六萬二千六百二十四尺爲一四乘方積以二千除之得三千九百八十一尺三百一十二寸與一立方積相減餘九千八百四十二尺六百八十八寸書於所得積之下相減恰盡乃以一立方積與二千相乘得二千七百六十四萬八千尺爲二千立方積内減去一四乘方積餘一千九百六十八萬五千三百七十六尺與原積相合是開得二十四尺爲每一根之數也葢立方少四乘方之數亦不與平方立方之數相合故不能以平方立方之法開也設如有一五乘方多四立方與一億一千三百四十二萬二千四百九十六尺相等問每一根之數幾何法列原積一億一千三百四十二萬二千四百九十六尺按五乘方法作記於六尺上定單位三百萬尺上定十位其一億一千三百萬尺爲初商積與二十乘五次之數相準即定初商爲二十尺書於原積三百萬尺之上而以初商二十尺乘五次之六千四百萬尺爲一五乘方積又以初商二十尺自乘再乘之八千尺四因之得三萬二千尺爲多四立方之共積與五乘方積相加得六千四百零三萬二千尺書於原積之下相減餘四千九百三十九萬零四百九十六尺爲次商積而以初商之二十尺乘四次六因之得一千九百二十萬尺爲一五乘方廉又以初商之二十尺自乘二因之得一千二百尺又四因之得四千八百尺爲四立方之廉與五乘方廉相加得一千九百二十萬零四千八百尺爲次商廉法以除次商積足二倍即定次商爲二尺書於原積六尺之上合初商共二十二尺乘五次得一億一千三百三十七萬九千九百零四尺爲一五乘方積又以二十二尺自乘再乘之一萬零六百四十八尺四因之得四萬二千五百九十二尺爲多四立方之共積與五乘方積相加得一億一千三百四十二萬二千四百九十六尺書於原積之下相減恰盡是開得二十二尺爲每一根之數也又法用帶縱平方及立方開之將原積一億一千三百四十二萬二千四百九十六尺爲長方積以多四立方作四尺爲縱多折半得二尺自乘得四尺與積相加得一億一千三百四十二萬二千五百尺開平方得一萬零六百五十尺爲半和内減半較二尺因立方爲多號故減半較若立方爲少號即加半較得一萬零六百四十八尺爲立方積開立方得二十二尺即每一根之數也葢五乘方多立方與方根自乘再乘爲闊加多立方數爲長所作之長方積等故用帶縱較數開平方法開之得數復開立方即得每一根之數也設如有一萬立方少一五乘方與一千一百五十三萬八千四百三十九尺相等問每一根之數幾何法以一萬立方少一五乘方與一千一百五十三萬八千四百三十九尺俱以一萬除之得一立方少一萬分五乘方之一與一千一百五十三尺八百四十三寸九百分相等乃列一千一百五十三尺八百四十三寸九百分爲歸除所得之積按立方法作記於三尺上定單位一千尺上定十位其一千尺爲初商積與十尺自乘再乘之數相合即定初商爲十尺書於所得積一千尺之上而以初商十尺自乘再乘之一千尺爲一立方積又以初商十尺乘五次得一百萬尺爲一五乘方積以一萬除之得一百尺爲一萬分五乘方之一之積與立方積相減餘九百尺書於所得積之下相減餘二百五十三尺八百四十三寸九百分爲次商積而以初商之十尺自乘三因之得三百尺爲一立方廉又以初商之十尺乘四次六因之得六十萬尺爲一五乘方廉以一萬除之得六十尺爲一萬分五乘方之一之廉與立方廉相減餘二百四十尺爲次商廉法以除次商積足一倍即定次商爲一尺書於所得積三尺之上合初商共十一尺自乘再乘得一千三百三十一尺爲一立方積又以十一尺乘五次得一百七十七萬一千五百六十一尺爲一五乘方積以一萬除之得一百七十七尺一百五十六寸一百分爲一萬分五乘方之一之積與立方積相減餘一千一百五十三尺八百四十三寸九百分書於所得積之下相減恰盡乃以一立方積與一萬相乘得一千三百三十一萬尺爲一萬立方積内減去一五乘方積餘一千一百五十三萬八千四百三十九尺與原積相合是開得一十一尺爲每一根之數也又法用帶縱平方及立方開之將原積一千一百五十三萬八千四百三十九尺爲長方積以一萬立方作一萬尺爲和折半得五千尺爲半和自乘得二千五百萬尺與積相減餘一千三百四十六萬一千五百六十一尺開平方得三千六百六十九尺爲半較與半和相減餘一千三百三十一尺爲立方積開立方得一十一尺即每一根之數也葢立方少五乘方與方根自乘再乘爲闊與立方數相減爲長所作之長方積等故用帶縱和數開平方法開之得數復開立方即得每一根之數也御製數理精藴下編卷三十三
