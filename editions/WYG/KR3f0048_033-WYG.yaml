面體每一面中心至邊之垂線又以全分一為一率倍小分七六三九三二二為二率今所設之圓球半徑六寸為三率求得四率四寸五分八釐三豪五絲九忽二㣲有餘為每一面中心至角之分角線乃以每一面之分角線為弦每一面中心至邊之垂線為股求得勾二寸六分九釐四豪一絲六忽八㣲有餘倍之得五寸三分八釐八豪三絲三忽六㣲有餘即圓球外切十二面體之每一邊也乃以十二面體之每一邊與每一面中心至邊之垂線相乘得數折半五因之得四十九寸九十五分二十六釐零九豪有餘為圓球外切十二面體之每一面之積與圓球半徑六寸相乘三歸之得九十九寸九百零五分二百一十八釐有餘為每一五角尖體積十二因之得一尺一百九十八寸八百六十二分六百一十六釐有餘即圓球外切十二面體之總積也蓋圓球外切十二面體其圓球之外面皆切於各面之中心圓球之半徑即外切十二面體中心至每一面中心之立垂線以圓球半徑為理分中末線之全分則外切十二面體之每一面中心至邊之垂線即五等邊形内容圜半徑為大分每一面中心至角之分角線即五等邊形外切圓半徑為倍小分如甲乙圓球徑一尺二寸外切丙丁戊己庚十二面體按其一面中垂線平分剖之則成丙辛壬癸子丑不等邊六角形丙辛與子癸皆十二面體之每一邊辛壬壬癸子丑丑丙皆為十二面體之每一面自一角至對邊之中垂線寅丑與寅卯皆為十二面體中心至每邊正中之垂線寅辰為十二面體中心至每面中心之立垂線即圓球半徑辰丑為每面中心至邊之垂線辰丙為每面中心至角之分角線今以寅辰為全分則辰丑為大分辰丙為倍小分何以知之寅卯既為十二面體中心至每邊正中之垂線平分丙辛邊於卯故丙卯為每邊之半寅卯為全分則丙卯為小分蓋十二面體中心至每邊正中之垂線為全分則其每一面兩角相對斜線之一半為大分而毎邊之半即為小分見球内容十二面體法試依寅卯全分度作丑巳卯寅正方形則丑巳與已卯亦皆為全分巳卯既為全分而丙卯又為小分則巳丙即為大分丑已丙勾股形與寅辰丑勾股形為同式形寅辰丑勾股形之丑角與寅角併之共九十度而寅長丑勾股形之丑角與丑已丙勾股形之丑角併之亦共九十度故此二勾股形之已丑丙角與丑寅辰角為相等辰角與巳角又同為直角其餘一角亦必等故為同式形丑已丙勾股形之丑巳股為全分則己丙勾為大分寅辰丑勾股形之寅辰股為全分則辰丑勾亦即為大分故以寅辰圓球半徑與辰丑每面中心至邊之垂線之比即同於理分中末線之全分與大分之比也又凡五等邊形自心至邊之垂線為大分則自心至角之分角線即為倍小分如丙午未申酉五等邊形其辰丑垂線為大分則辰申分角線為倍小分何以知之蓋丙未兩角相對斜線為全分則未甲一邊為大分而酉未與丙申兩兩角相對斜線相交所截戌申一段即為小分成連比例三率故丙戌與戌未亦皆為大分與未申等試自戌至亥作戌亥垂線平分丙未兩角相對斜線於亥則成丙亥戌勾股形與辰丑申勾股形為同式形辰丑申勾股形之辰角當丑申半邊所對之弧為未申邊所對之弧之一半故辰丑申勾股形之辰角與丙戌亥勾股形之丙角等丑角與亥角又同為直角其餘一角亦必等故為同式形夫丙未為全分則丙戌為大分丙未為大分則丙戌為小分若以丙未之半丙亥為大分則丙戌即為倍小分故以辰丑垂線為大分則辰申分角線亦即為倍小分今圓球半徑與每面中心至邊之垂線之比既同於全分與大分之比則圓球半徑與每面分角線之比亦即同於全分與倍小分之比也既得辰丑垂線又得辰申分角線則用股弦求勾法求得丑申勾倍之得未申即圓球外切十二面體之每一邊既得每一邊又得每面中心至邊之垂線則以辰丑每面中心至邊之垂線與未申一邊相乘折半五因之得丙午未申酉五等邊形面積與寅辰圓球半徑相乘三歸之得寅丙午未申酉一五角尖體積十二因之即得丙丁戊己庚十二面體之總積也如有十二面體之一邊求内容圓球徑則求得十二面體中心至每面中心之立垂線即内容圓球之半徑也又用求球外各形之一邊之定率比例以定率之圓球徑一為一率圓球外切十二面體之每一邊四四九二七九七為二率今所設之圓球徑一尺二寸為三率求得四率五寸三分八釐八豪三絲三忽五㣲有餘即圓球外切十二面體之一邊也又用求球外各形之體積之定率比例以定率之圓球徑自乘再乘之正方體積一為一率圓球外切十二面體積六九三七八六三六七為二率今所設之圓球徑一尺二寸自乘再乘得一尺七百二十八寸為三率求得四率一尺一百九十八寸八百六十二分八百四十釐有餘即圓球外切十二面禮之積也又用圓球積之定率比例以定率之圓球積一為一率圓球外切十二面體積一三二五三四三五八為二率今所設之圓球徑一尺二寸求得圓球積九百零四寸七百七十八分六百八十四釐有餘為三率求得四率一尺一百九十八寸八百六十二分八百四十二釐有餘即圓球外切十二面體之積也設如圓球徑一尺二寸求外切二十面體之每一邊及體積幾何法以理分中末線之全分一為一率小分三八一九六六一為二率今所設之圓球徑一尺二寸折半得六寸為三率求得四率二寸二分九釐一豪七絲九忽六㣲有餘為圓球外切二十面體每一面中心至邊之垂線三因之得六寸八分七釐五豪三絲八忽八㣲有餘為每一面自一角至對邊之中垂線自乘三歸四因開平方得七寸九分三釐九豪零一忽四㣲有餘即圓球外切二十面體之每一邊也乃以二十面體之每一邊用等邊三角形求面積法求得每一面積二十七寸二十九分一十九釐有餘與圓球半徑六寸相乘三歸之得五十四寸五百八十三分八百釐有餘為一三角尖體積二十因之得一尺九十一寸六百七十六分有餘即圓球外切二十面體之總積也蓋圓球外切二十面體其圓球之外面皆切於各面之中心圓球之半徑即外切二十面體中心至每一面中心之立垂線以圓球半徑為理分中末線之全分則外切二十面體之每一面中心至邊之垂線即三等邊形内容圜半徑為小分每一面中心至角之分角線即三等邊形外切圜半徑為倍小分其每一面自一角至對邊之中垂線為三小分如甲乙圓球徑一尺二寸外切丙丁戊己庚二十面體按其一面中垂線平分剖之則成丙辛壬癸子丑不等邊六角形丙辛與癸子皆二十面體之每一邊丑丙辛壬壬癸子丑皆為二十面體之每一面自一角至對邊之中垂線寅丑與寅卯皆為二十面體中心至每邊正中之垂線寅辰為二十面體中心至每面中心之立垂線即圓球半徑辰丑為每面中心至邊之垂線辰丙為每面中心至角之分角線今以寅辰為全分則辰丑為小分辰丙為倍小分丙丑即為三小分也何以知之寅卯既為二十面體中心至每邊正中之垂線平分丙辛邊於卯故丙卯為每邊之半寅卯為全分則丙卯為大分蓋二十面體中心至毎邊正中之垂線為全分則每邊之半為大分見球内容二十面體法試依寅卯全分度作已卯寅丑正方形則丑巳與已卯亦皆為全分已卯既為全分而丙卯又為大分則已丙即為小分丑巳丙勾股形與寅辰丑勾股形為同式形丑已丙勾股形之丑巳股為全分則巳丙勾為小分寅辰丑勾股形之寅辰股為全分則辰丑勾為小分故以寅辰圓球半徑與辰丑每面中心至邊之垂線之比即同於理分中末線之全分與小分之比也既得辰丑每面中心至邊之垂線則以三因之即得丙丑每面自一角至對邊之中垂線而每面自一角至對邊之中垂線自乘方為每邊自乘方之四分之三故以所得丙丑每面自一角至對邊之中垂線自乘三歸四因開平方即得午未為圓球外切二十面體之每一邊既得午未一邊與丙丑每面自一角至對邊之中垂線相乘折半得丙午未一三角形面積與寅辰圓球半徑相乘三歸之得寅丙午未一三角尖體積二十因之即得丙丁戊己庚二十面體之總積也如有二十面體之每一邊求内容圓球徑則求得二十面體中心至每面中心之立垂線即内容圓球之半徑也又用求球外各形之一邊之定率比例以定率之圓球徑為一率圓球外切二十面體之每一邊六六一五八四五三為二率今所設之圓球徑一尺二寸為三率求得四率七寸九分三釐九豪零一忽四㣲有餘即圓球外切二十面體之一邊也又用求球外各形之體積之定率比例以定率之圓球徑自乘再乘之正方體積一為一率圓球外切二十面體積六三一七五六九九九為二率今所設之圓球徑一尺二寸自乘再乘得一尺七百二十八寸為三率求得四率一尺九十一寸六百七十六分零九十四釐有餘即圓球外切二十面體之積也又用圓球積之定率比例以定率之圓球積一為一率圓球外切二十面體積一二六五六六九九一為二率今所設之圓球徑一尺二寸求得圓球積九百零四寸七百七十八分六百八十四釐有餘為三率求得四率一尺零九十一寸六百七十六分零九十四釐有餘即圓球外切二十面體之積也御製數理精藴下編卷二十八
