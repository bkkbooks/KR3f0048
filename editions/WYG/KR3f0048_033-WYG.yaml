body:
  text: 欽定四庫全書御製數理精蘊下編卷二十八體部六球内容各等面體球外切各等面體球内容各等面體設如圓球徑一尺二寸求内容四面體之每一邊及體積幾何法以圓球徑一尺二寸三歸二因得八寸為圓球内容四面體自尖至每面中心之立垂線自乘得六十四寸二歸三因得九十六寸開平方得九寸七分九釐七豪九絲五忽八㣲有餘即圓球内容四面體之每一邊也乃以四面體之每一邊用等邊三角形求面積法求得每一面積四十一寸五十六分九十二釐一十九豪有餘與自尖至每面中心之立垂線八寸相乘得三百三十二寸五百五十三分七百五十釐有餘三歸之得一百一十寸八百五十一分二百五十釐有餘即圓球内容四面體之積也如圖甲乙圓球徑一尺二寸内容甲丙丁戊四面體甲己與丙庚俱為自尖至每面中心之立垂線相交於辛為四面體之中心亦即圓球之中心甲辛與丙辛俱為圓球半徑甲己壬勾股形與甲庚辛勾股形為同式形甲己壬勾股形以甲己自尖至底中心立垂線為股己壬一面中垂線之三分之一為勾甲壬一面中垂線為弦甲庚辛勾股形以甲庚一面中垂線之三分之二為股庚辛四面體中心至每面中心之垂線為勾甲辛四面體自尖至中心立垂線為弦故兩勾股形同用一甲角而己角庚角同為直角其壬角與辛角亦必相等所以為同式形也己壬為丙壬一面中垂線之三分之一亦為甲壬一面中垂線之三分之一故庚辛亦必為甲辛四面體自尖至中心立垂線之三分之一而甲辛即圓球之半徑故庚辛亦為圓球半徑之三分之一庚辛與辛已等今命甲辛圓球半徑為三分則甲乙圓球全徑為六分以辛己一分與甲辛三分相加則得甲巳四分是甲巳立垂線為甲乙圓球全徑之六分之四即三分之二故以甲乙圓球徑三歸二因即得甲己為四面體自尖至每面中心之立垂線也又四面體之立垂線自乘方為每邊自乘方之三分之二見前四面體求積法故以甲己立垂線自乘二歸三因即得每一邊自乘方積開平方得甲丙為四面體之每一邊也既得一邊則用等邊三角形求面積法求得丙丁戊三角形面積與甲巳立垂線相乘三歸之即得甲丙丁戊四面體之積也又求邊捷法以圓球徑一尺二寸自乘三歸二因得九十六寸開平方亦得九寸七分九釐七豪九絲五忽八㣲有餘為内容四面體之每一邊也蓋四面體之甲巳立垂線既為甲乙圓球徑之三分之二則甲己自乘方必為甲乙自乘方之九分之四而甲己自乘方又為甲丙每邊自乘方之三分之二即六分之四則甲丙每一邊自乘方必為甲乙圓球徑自乘方之九分之六即三分之二故以圓球徑自乘三歸二因開平方亦得四面體之每一邊也如有四面體之一邊求外切圓球徑則先求得自尖至每面中心之立垂線二歸三因即圓球徑或以一邊自乘二歸三因開平方亦即得圓球徑也又用求球内各形之一邊之定率比例以定率之圓球徑一為一率圓球内容四面體之一邊八一六四九六五八為二率今所設之圓球徑一尺二寸為三率求得四率九寸七分九釐七豪九絲五忽八㣲有餘即圓球内容四面體之一邊也又用求球内各形之體積之定率比例以定率之圓球徑自乘再乘之正方體積一為一率圓球内容四面體積六四一五二九為二率今所設之圓球徑一尺二寸自乘再乘得一千七百二十八寸為三率求得四率一百一十寸八百五十一分二百五十釐有餘即圓球内容四面體之積也又用圓球積之定率比例以定率之圓球積一為一率圓球内容四面體積一二二五一七五三為二率今所設之圓球徑一尺二寸求得圓球積九百零四寸七百七十八分六百八十四釐有餘為三率求得四率一百一十寸八百五十一分二百四十九釐有餘即圓球内容四面體之積也設如圓球徑一尺二寸求内容正方體之每一邊及體積幾何法以圓球徑一尺二寸自乘得一百四十四寸三歸之得四十八寸開平方得六寸九分二釐八豪二絲零三㣲有餘即圓球内容正方體之每一邊以一邊自乘再乘得三百三十二寸五百五十三分七百四十四釐有餘即圓球内容正方體之積也如圖甲乙圓球徑一尺二寸内容甲丙丁乙戊己庚正方體試以丙丁一邊為股丁乙一邊為勾求得丙乙弦即每一面之對角斜線勾與股既相等則丙乙每一面對角斜線自乘方為丙丁或丁乙每邊自乘方之二倍矣又試以丙乙對角斜線為股甲丙一邊為勾求得甲乙弦即圓球徑則甲乙圓球徑自乘方又為甲丙類每邊自乘方之三倍矣故以圓球徑自乘三歸即得每邊自乘之積開平方即得圓球内容正方體之一邊以一邊自乘再乘即得圓球内容正方體之積也如有正方體之一邊求外切圓球徑則以一邊自乘三因之開平方即得圓球徑也又用求球内各形之一邊之定率比例以定率之圓球徑一為一率圓球内容正方體之一邊五七七三五二六為二率今所設之圓球徑一尺二寸為三率求得四率六寸九分二釐八豪二絲零三㣲有餘即圓球内容正方體之一邊也又用求球内各形之體積之定率比例以定率之圓球徑自乘再乘之正方體積一為一率圓球内容正方體積一九二四五八六為二率今所設之圓球徑一尺二寸自乘再乘得一千七百二十八寸為三率求得四率三百三十二寸五百五十三分七百四十八釐有餘即圓球内容正方體之積也又用圓球積之定率比例以定率之圓球積一為一率圓球内容正方體積三六七五五二五九為二率今所設之圓球徑一尺二寸求得圓球積九百零四寸七百七十八分六百八十四釐有餘為三率求得四率三百三十二寸五百五十三分七百四十八釐有餘即圓球内容正方體之積也設如圓球徑一尺二寸求内容八面體之每一邊及體積幾何法以圓球徑一尺二寸自乘得一尺四十四寸折半得七十二寸開平方得八寸四分八釐五豪二絲八忽一㣲有餘即圓球内容八面體之每一邊也乃以八面體之每一邊自乘得七十二寸以球徑一尺二寸再乘得八百六十四寸三歸之得二百八十八寸即圓球内容八面體之積也如圖甲乙圓球徑一尺二寸内容甲丙乙丁戊己八面體自正中對四角平分截之則成甲丙己丁戊乙丁戊丙己二尖方體甲乙圓球徑為二尖方體之共髙即甲丙乙丁正方面之對角斜線試以甲丙一邊為股乙丙一邊為勾則甲乙球徑為弦勾與股既相等則甲乙自乘方為甲丙自乘方之二倍故以甲乙球徑自乘折半開方即得甲丙為内容八面體之一邊以戊丙一邊自乘得戊丙己丁二尖方體之共底面積以甲乙共髙再乘三歸之得二尖方體積即八面體之總積也如有八面體之一邊求外切圓球徑則以一邊自乘加倍開平方得對角斜線即圓球徑也又用求球内各形之一邊之定率比例以定率之圓球徑一為一率圓球内容八面體之一邊七七一六七八為二率今所設之圓球徑一尺二寸為三率求得四率八寸四分八釐五豪二絲八忽一㣲有餘即圓球内容八面體之一邊也又用求球内各形之體積之定率比例以定率之圓球徑自乘再乘之正方體積一為一率圓球内容八面體積一六六六六六六六六為二率今所設之圓球徑一尺二寸自乘再乘得一千七百二十八寸為三率求得四率二百八十八寸即圓球内容八面體之積也又用圓球積之定率比例以定率之圓球積一為一率圓球内容八面體積三一八三九八八五為二率今所設之圓球徑一尺二寸求得圓球積九百零四寸七百七十八分六百八十四釐有餘為三率求得四率二百八十七寸九百九十九分九百九十八釐有餘即圓球内容八面體之積也設如圓球徑一尺二寸求内容十二面體之每一邊及體積幾何法以理分中末線之全分一為股小分三八一九六六一為勾求得弦一七四六六二六為一率小分三八一九六六一為二率今所設之圓球徑一尺二寸為三率求得四率四寸二分八釐一豪八絲六忽五㣲有餘即圓球内容十二面體之每一邊也乃以十二面體之每一邊用五等邊形求面積法求得每一面積三十一寸五十四分三十八釐五十七豪有餘又用五等邊形求外切圜徑法求得半徑即分角線三寸六分四釐二豪三絲七忽一㣲有餘為勾圓球半徑六寸為弦求得股四寸七分六釐七豪九絲二忽七㣲有餘為自圓球中心至每一面中心之立垂線與每一面積三十一寸五十四分三十八釐五十七豪相乘得一百五十寸三百九十八分八百零七釐有餘三歸之得五十寸一百三十二分九百三十五釐為一五角尖體積十二因之得六百零一寸五百九十五分二百二十釐有餘即圓球内容十二面體之總積也如圖甲乙圓球徑一尺二寸内容甲丙丁戊己十二面體自正中平分截之則成十等邊面形其所截之處皆正當每邊之一半故其所截之庚辛等線亦為甲丙兩角相對斜線之一半而為十等邊形之一邊試自十二面體之甲卯一邊正中至中心辰作庚辰垂線即為所截十等邊形外切圜之半徑與甲庚每邊之半甲辰圓球半徑共成甲庚辰勾股形庚辰為股甲庚為勾甲辰為弦庚辰即如理分中末線之全分甲庚即如理分中末線之小分何以知之蓋十二面體每面之壬子兩角相對斜線與甲丙等為全分則子丑一邊與甲卯等為大分若以壬子兩角相對斜線為大分則子丑一邊為小分兩角相對斜線之一半庚辛為大分則每邊之半甲庚即為小分矣又庚辰中心至每邊正中之垂線既為十等邊形外切圜之半徑而庚辛為十等邊形之一邊則庚辛為大分而庚辰必為全分矣因庚辰全分為股甲庚小分為勾而甲辰圓球半徑為弦故以理分中末線之全分為股小分為勾求得弦與小分之比同於甲辰半徑與甲庚半邊之比即同於今所設之甲乙全徑與甲卯全邊之比也既得一邊則用五等邊形求面積法求得壬癸子丑寅五等邊形面積又求得巳癸五等邊形外切圜半徑即分角線乃以辰癸圓球半徑為弦與辰甲等已癸分角線為勾求得辰巳股即圓球中心至内容十二面體每面中心之立垂線與壬癸子丑寅五等邊形面積相乘三歸之得辰壬癸子丑寅一五角尖體積十二因之即得圓球内容十二面體之總積也如有十二面體之每一邊求外切圓球徑則先求得自中心至每邊正中之垂線為股半邊為勾求得弦倍之即圓球全徑也又求邊法用求圓球内容正方體之一邊法以圓球徑一尺二寸自乘得一百四十四寸三歸之得四十八寸開平方得六寸九分二釐八豪二絲零三㣲有餘為圓球内容十二面體每一面兩角相對斜線乃以理分中末線之全分一為一率大分六一八三三九九為二率每一面兩角相對斜線六寸九分二釐八豪二絲零三㣲為三率求得四率四寸二分八釐一豪八絲六忽四㣲有餘即圓球内容十二面體之每一邊也如圖甲乙圓球徑一尺二寸内容甲丙丁戊己十二面體試於每一面各作一斜線相連則十二斜線之二十四端合為八角遂成正方體形其十二面之十二斜線即正方體之十二邊其八角即正方體之八角皆切於圓球之面故用求球内容正方體法求得正方體之一邊即十二面體每一面兩角相對之斜線既得斜線則以理分中末線之全分與大分之比即同於兩角相對之斜線與每一邊之比而得十二面體之每一邊也如有十二面體之每一邊求外切圓球徑則先求得每面兩角相對斜線為正方體之一邊用正方體求外切圓球徑之法亦即得圓球徑矣又用求球内各形之一邊之定率比例以定率之圓球徑一為一率圓球内容十二面體之一邊三五六八二二九為二率今