body:
  text: 欽定四庫全書御製數理精藴下編卷十三面部三勾股勾股弦和較相求法下股勾股積與和較相求正勾比例勾股弦和較相求法下設如有勾股較七尺勾股弦總和四十尺求勾股弦各幾何第三十四法以勾股弦總和四十尺内減勾股較七尺餘三十三尺為兩勾一弦之共數葢勾股弦總和為一勾一股一弦之共數内減勾股較是於股内減勾股較即又得一勾矣故為兩勾一弦也自乗得一千零八十九尺又以勾股較七尺自乗得四十九尺兩自乗數相減餘一千零四十尺折半得五百二十尺為長方積乃以勾股弦總和四十尺與兩勾一弦之共數三十三尺相加得七十三尺為長闊和用𢃄縱和數開方法算之得闊八尺為勾加勾股較七尺得十五尺為股於勾股弦總和四十尺内減勾八尺又減股十五尺餘十七尺為弦也如圖甲乙丙丁為兩勾一弦自乗之一大正方内戊己庚辛為弦自乗之一正方甲子戊壬丑乙寅己庚夘丙辰癸辛己丁為勾自乗之四正方壬戊辛癸子丑巳戊巳寅卯庚辛庚辰己為勾弦相乗之四長方弦自乗之一正方内容四勾股積為勾股相乗之二長方又勾股較自乗之一小正方今於甲乙丙丁兩勾一弦自乗之一大正方内減去午未申酉勾股較自乗之一小正方尚餘勾股相乗之二長方勾弦相乗之四長方勾自乗之四正方折半得勾股相乗之一長方勾弦相乗之二長方勾自乗之二正方與戌亥乾坎長方形等其濶即勾其長為兩勾兩弦一股其長濶和為三勾兩弦一股故以勾股弦總和與兩勾一弦之共數相併為長闊和用𢃄縱和數開方法算之得闊為勾也又法以勾股弦總和四十尺自乗得一千六百尺折半得八百尺為長方積乃以勾股較七尺為長闊較用𢃄縱較數開方法筭之得闊二十五尺為勾弦和得長三十二尺為股弦和於勾股弦總和四十尺内減勾弦和二十五尺餘十五尺為股減勾股較七尺餘八尺為勾又於勾弦和二十五尺内減勾八尺餘十七尺為弦也如圖甲乙丙丁為勾股弦總和自乗之一大正方内戊己庚丁為弦自乗之一正方辛壬癸己為股自乗之一正方子乙丑壬為勾自乗之一正方甲辰辛寅與癸己卯丙為勾弦相乗之二長方寅辛己戊與己癸卯庚為股弦相乗之二長方辰子壬辛與壬丑己癸為勾股相乗之二長方如以勾自乗之一正方與股自乗之一正方相併則又與弦自乗之一正方相等是為弦自乗之正方二股弦相乗之長方二勾弦相乗之長方二勾股相乗之長方二折半即得弦自乗之正方一股弦相乗之長方一勾弦相乗之長方一勾股相乗之長方一而與午未申酉勾弦和與股弦和相乗之長方等葢午未申酉之長方内戌亥乾酉為弦自乗之一正方午坎亥戌為股弦相乗之一長方亥艮申乾為勾弦相乗之一長方坎未艮亥為勾股相乗之一長方其濶即勾弦和其長即股弦和其長濶較即勾股較故以勾股較為長闊較用𢃄縱較數開方法算之得濶為勾弦和也設如有勾弦較九尺勾股弦總和四十尺求勾股弦各幾何第三十五法以勾股弦總和四十尺内減勾弦較九尺餘三十一尺為兩勾一股之共數盖勾股弦總和為一勾一股一弦之共數内減勾弦較是於弦内減勾弦較即又得一勾矣故為兩勾一股也自乗得九百六十一尺又以勾股弦總和四十尺與勾弦較九尺相加得四十九尺爲兩弦一股之共數葢勾股弦總和為一勾一股一弦之共數今加勾弦較是於勾數加勾弦較即又得一弦矣故為兩弦一股也自乗得二千四百零一尺兩數相減餘一千四百四十尺四歸之得三百六十尺為長方積乃以勾弦較九尺為長闊較用𢃄縱較數開方法算之得濶十五尺為股於勾股弦總和四十尺内減股十五尺餘二十五尺為勾弦和減勾弦較九尺餘十六尺折半得八尺為勾加勾弦較九尺得十七尺為弦也如圖甲乙丙丁為兩勾一股自乗之一大正方内戊己庚辛為股自乗之一正方甲子戊壬丑乙寅己庚卯丙辰癸辛己丁為勾自乗之四正方壬戊辛癸子丑己戊己寅卯庚辛庚辰己為勾股相乗之四長方又午未申酉為兩弦一股自乗之一大正方内戊己庚辛為股自乗之一正方午乾戊戌坎未艮己庚震申巽亥辛離酉為弦自乗之四正方戌戊辛亥乾坎巳戊巳艮震庚辛庚巽離為股弦相乗之四長方今於午未申酉之正方内減去甲乙丙丁之正方所餘四隅之午乾子甲壬戌等類四磬折形皆為弦自乗之方内減去勾自乗之方與股自乗之四正方積相等四面之戌壬癸亥等類四長方形乃勾弦較與股相乗之四長方戌戊為弦壬戊為勾故戌壬為勾弦較以四歸之則餘股自乗之一正方勾弦較與股相乗之一長方共為戌坤兌亥一長方其闊即股其長即股與勾弦較之和故以勾弦較為長闊較用𢃄縱較數開方法算之得濶為股也設如有股弦較二尺勾股弦總和四十尺求勾股弦各幾何第三十六法以勾股弦總和四十尺内減股弦較二尺餘三十八尺為兩股一勾之共數盖勾股弦總和為一勾一股一弦之共數内減股弦較是於弦内減股弦較即又得一股矣故為兩股一勾也自乗得一千四百四十四尺又以勾股弦總和四十尺與股弦較二尺相加得四十二尺為兩弦一勾之共數葢勾股弦總和為一勾一股一弦之共數今加股弦較是於股數加股弦較即又得一弦矣故為兩弦一勾也自乗得一千七百六十四尺兩數相減餘三百二十尺四歸之得八十尺為長方積乃以股弦較二尺為長闊較用𢃄縱較數開方法算之得闊八尺為勾於勾股弦總和四十尺内減勾八尺餘三十二尺為股弦和減股弦較二尺餘三十尺折半得十五尺為股加股弦較二尺得十七尺為弦也如圖甲乙丙丁為兩股一勾自乗之一大正方内戊己庚辛為勾自乗之一正方甲子戊壬丑乙寅己庚卯丙辰癸辛己丁為股自乗之四正方壬戊辛癸子丑巳戊己寅卯庚辛庚辰己為勾股相乗之四長方又午未申酉為兩弦一勾自乗之一大正方内戊己庚辛為勾自乗之一正方午乾戊戌坎未艮己庚震申巽亥辛離酉為弦自乗之四正方戌戊辛亥乾坎巳戊巳艮震庚辛庚巽離為勾弦相乗之四長方今於午未申酉之正方内減去甲乙丙丁之正方所餘四隅之午乾子甲壬戌等類四磬折形皆為弦自乗之方内減去股自乗之方與勾自乗之四正方積相等四面之戌壬癸亥等類四長方形乃股弦較與勾相乗之四長方戌戊為弦壬戊為股故戌壬為股弦較以四歸之則餘勾自乗之一正方股弦較與勾相乗之一長方共為戌坤兊亥一長方其闊即勾其長即勾與股弦較之和故以股弦較為長闊較用𢃄縱較數開方法算之得闊為勾也設如有勾股和二十三尺弦與勾股較之較十尺求勾股弦各幾何第三十七法以勾股和二十三尺自乗得五百二十九尺又以勾股和二十三尺與弦與勾股較之較十尺相加得三十三尺為兩勾一弦之共數葢弦與勾股較之較為一勾一股弦較之共數與勾股和相加則得兩勾一股一股弦較而股加股弦較即弦故為兩勾一弦之共數也自乗得一千零八十九尺兩自乗數相減餘五百六十尺折半得二百八十尺為長方積乃以弦與勾股較之較十尺與兩勾一弦之共數三十三尺相加得四十三尺為長濶和用𢃄縱和數開方法算之得闊八尺為勾於勾股和二十三尺内減勾八尺餘十五尺為股又於股十五尺内減勾八尺餘七尺為勾股較與弦與勾股較之較十尺相加得十七尺為弦也如圖甲乙丙丁為勾股和自乗之一大正方内戊己庚丁為股自乗之一正方辛乙壬己為勾自乗之一正方甲辛己戊與己壬丙庚為勾股相乗之二長方又癸子丑寅為兩勾一弦自乗之一大正方内卯辰巳寅為弦自乗之一正方未申酉辰亥乾申未乾子坎申申坎艮酉為勾自乗之四正方癸亥未午午未辰卯辰酉戌己酉艮丑戌為勾弦相乗之四長方今以兩正方相減則是癸子丑寅方内減去離辰坤震股自乗之一正方即如前圖之戊己庚丁然又未申酉辰勾自乗之一正方即如前圖之辛乙壬己然又巽未辰離辰酉兑坤勾股相乗之二長方即如前圖之甲辛己戊己壬丙庚然所餘之卯離震坤己寅一磬折形與勾自乗之一正方等弦自乗之正方内減股自乗之方則與勾自乗之方等再午巽離卯與坤兌戌己二小長方為股弦較與勾相乗之二長方若各補於勾自乗之二正方内即成勾與弦與勾股較之較相乗二長方葢弦與勾股較之較乃弦内減去勾股較之餘然弦内有一勾一勾股較一股弦較若減去勾股較則所餘為一勾一股弦較矣今以股弦較與勾相乗之長方補於勾自乗之正方内則其長為一勾一股弦較即弦與勾股較之較其濶即勾故為勾與弦與勾股較之較相乗之長方也合計之則為勾自乗二正方勾弦相乗二長方勾與弦與勾股較之較相乗二長方折半則餘勾自乗一正方勾弦相乗一長方勾與弦與勾股較之較相乗一長方之共積與金木水火長方形等其闊即勾其長為一勾一弦一弦與勾股較之較其長闊和為兩勾一弦一弦與勾股較之較故以弦與勾股較之較與兩勾一弦之共數相加用帯縱和數開方法算之得闊為勾也設如有勾股和二十三尺弦與勾股較之和二十四尺求勾股弦各幾何第三十八法以勾股和二十三尺自乗得五百二十九尺又以弦與勾股較之和二十四尺自乗得五百七十六尺兩數相加得一千一百零五尺為長方積乃以弦與勾股較之和二十四尺倍之得四十八尺為長闊較用𢃄縱較數開方法算之得十七尺為弦於弦與勾股較之和二十四尺内減弦十七尺餘七尺為勾股較於勾股和二十三尺内減勾股較七尺餘十六尺折半得八尺為勾加勾股較七尺得十五尺為股也如圖甲乙丙丁為勾股和自乗之一大正方内戊己庚丁為股自乗之一正方辛乙壬己為勾自乗之一正方甲辛己戊與己壬丙庚為勾股相乗之二長方又癸子丑寅為弦與勾股較之和自乗之一大正方内卯辰巳寅為弦自乗之一正方午子未辰為勾股較自乗之一正方癸午辰卯與辰未丑巳為勾股較與弦相乗之二長方兩大正方相併則得弦自乗三正方勾股較與弦相乗二長方共為申酉戌亥一長方形何也卯辰巳寅為一弦方戊己庚丁一股方與辛乙壬己一勾方相併為一弦方甲辛己戊己壬丙庚勾股相乗之二長方即四勾股積與午子未辰勾股較自乗之一正方相併又為一弦方癸午辰卯辰未丑巳即勾股較與弦相乗之二長方今二自乗方相加則成申酉戌亥之一大長方其闊即弦其長為三弦二勾股較其長濶較為二弦二勾股較故将弦與勾股較之和倍之為二弦二勾股較之共數用𢃄縱較數開方法算之得闊為弦也設如有勾弦和二十五尺弦與勾股和之較六尺求勾股弦各幾何第三十九法以勾弦和二十五尺自乗得六百二十五尺又以勾弦和二十五尺與弦與勾股和之較六尺相加得三十一尺為兩勾一股之共數葢勾弦和為一勾一弦之共數今於弦數内加弦與勾股和之較即為勾股和是為兩勾一股之共數矣與勾弦和二十五尺相乗得七百七十五尺兩數相減餘一百五十尺為長方積乃以勾弦和二十五尺為長濶和用𢃄縱和數開方法算之得長十五尺為股於股十五尺内減弦與勾股和之較六尺餘九尺為勾弦較與勾弦和二十五尺相加得三十四尺折半得十七尺為弦内減勾弦較九尺餘八尺為勾也如圖甲乙丙丁為勾弦和自乗之一大正方内戊巳庚丁為弦自乗之一正方辛乙壬己為勾自乗之一正方甲辛己戊與己壬丙庚為勾弦相乗之二長方又癸子丑寅為兩勾一股與勾弦和相乗之一大長方内卯辰己寅為股自乗之一正方午未