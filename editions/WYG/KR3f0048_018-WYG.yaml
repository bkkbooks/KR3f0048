半得六尺或以勾九尺取其三分之二亦得六尺即為内容圜徑也葢勾三分股四分弦五分者則於勾股和七分内減弦五分餘二分為内容圜徑見勾股容圜第二法是内容圜徑得股四分之二得勾三分之二也今九尺與十二尺之比同於三分與四分之比故十二尺與六尺之比仍同於四與二之比而九尺與六尺之比亦仍同於三與二之比也設如有正勾股知勾股和二十一尺求内容方邊幾何法以正勾股定分比例得勾九尺股十二尺以勾九尺七歸四因或以股十二尺七歸三因得五尺一寸四分二釐八毫有餘即内容方邊也葢内容方邊得勾七分之四得股七分之三見前法故必先比例得勾數或股數復比例得内容方邊也設如有正勾股知勾股和二十一尺求内容圜徑幾何法以正勾股定分之勾三分股四分相加之七分為一率内容圜徑二分為二率今所設之勾股和二十一尺為三率推得四率六尺即内容圜徑也葢勾三分股四分弦五分者其内容圜徑為二分見前法故勾股和之七分與内容圜徑二分之比即同於今所設之勾股和之二十一尺與内容圜徑六尺之比也總之正勾股形知一數即得所求之各數要先以勾三股四弦五求得所知之定分及所求之定分如勾股較則以勾三分與股四分相減餘一分又如弦與勾股較之和則以勾股較一分與弦五分相加得六分之類乃以所知之定分與所求之定分之比即同於今所知之數與今所求之數之比也設如有正勾股面積九十六尺求勾股弦各幾何法以正勾股定分之面積六分為一率勾三分自乗得九分為二率今所設之勾股積九十六尺為三率推得四率一百四十四尺為勾自乗之方開方得十二尺為勾如以正勾股定分之股四分自乗為二率則得今所設之股自乗之方如以正勾股定分之弦五分自乗為二率則得今所設之弦自乗之方各開方而即得各數矣或得勾而以正勾股定分之勾股弦各比例之亦可葢同式兩勾股形其面積互相為比即同於勾股形各相當界所作正方形互相為比見幾何原夲八卷第四節故以正勾股定分之面積六尺與勾股弦各方之比即同於今所設之面積九十六尺與勾股弦各方之比也又㨗法以面積九十六尺用正勾股定分之面積六尺除之得十六尺開方得四尺即知今所設之勾股弦為各加四倍之比例乃以正勾股定分之各數各加四倍即得各數葢兩直角方面形其兩方面之比例比之兩界之比例為連比例隔一位相加之比例見幾何原夲七卷第五節今勾股為長方之半正方與正方為比長方與長方為比其比例相同並見第六節故積大十六倍者界必大四倍既知其大四倍則以正勾股之定分各加四倍即得矣設如有正勾股知勾自乗股自乗弦自乗共積四百五十尺求勾股弦各幾何法以共積四百五十尺折半得二百二十五尺為弦自乗方積開方得一十五尺為弦既得弦則以勾股弦之定分比例之得九尺為勾得十二尺為股也如用面積為比例則以弦五分自乗之二十五分為一率勾三分自乗之九分為二率今所得之弦自乗方二百二十五尺為三率求得四率八十一尺為勾自乗方積開方得九尺為勾若以股四分自乗之十六分為二率則得四率一百四十四尺為股自乗方積開方得十二尺為股也葢弦自乗之一方既與勾自乗股自乗之二方等則勾自乗股自乗弦自乗之三方必與弦自乗之二方等故折半即得弦自乗之一方而開方得弦也御製數理精蘊下編卷十三
