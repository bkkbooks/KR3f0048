body:
  text: 欽定四庫全書御製數理精藴表卷一上八線表八線表説八線之用關於數理者甚大立表愈宻則為用愈精西洋舊表設半徑為十萬用以推測步算秒微或有不合既而又有新表設半徑為一千萬取數較精但逐分列表用中比例以求秒數止可用於正弦餘弦若切線割線至六十度以後其遞増之數不均用中比例尚不能宻合兹又用本法細推法見割圜每十秒遞折求零秒則用比例所差無多檢用亦便用表之法並列如左列表之法度至四十四度列於右方之上其分秒順列右行自上而下檢得某度某分秒對上層各線之數用之若有各線之數求度分秒者則對上層各線行内檢得某數橫對至右行即得某度分秒四十五度至八十九度列於左方之下其分秒逆列左行自下而上檢得某度某分秒對下層各線之數用之若有各線之數求度分秒者則對下層各線行内檢得某數橫對至左行即得某度分秒凡查零秒用中比例如檢一度三分十三秒之正弦則以一度三分十秒與一度三分二十秒相減餘十秒為一率一度三分十秒之正弦一八三七三四與一度三分二十秒之正弦一八四二一九相減餘四八五為二率三秒為三率求得四率一四五與一度三分十秒之正弦相加得一八三八七九即一度三分十三秒之正弦蓋多十秒則正弦多四八五今多三秒則正弦應多一四五為比例四率也如檢一度三分十三秒之餘弦則仍以十秒為一率一度三分十秒之餘弦九九九八三一二内減一度三分二十秒之餘弦九九九八三三餘九為二率三秒為三率求得四率三與一度三分十秒之餘弦相減餘九九九八三九即一度三分十三秒之餘弦蓋多十秒則餘弦少九今多三秒則餘弦應少三為比例四率也如有正弦一八三八七九求度分秒與一度三分十秒之正弦相較則多與一度三分二十秒之正弦相較則少即知在十秒二十秒之間乃以一度三分十秒與一度三分二十秒之正弦相減餘四八五為一率十秒為二率今有之正弦内減一度三分十秒之正弦餘一四五為三率求得四率三秒與一度三分十秒相加即得一度三分十三秒蓋多四八五則多十秒今多一四五則應多三秒為比例四率也如有餘弦九九九八三九求度分秒則以一度三分十秒之餘弦内減一度三分二十秒之餘弦餘九為一率十秒為二率一度三分十秒之餘弦内減今有之餘弦餘三為三率求得四率三秒與一度三分十秒相加即得一度三分十三秒蓋少九則多十秒今少三則應多三秒為比例四率也八線内有正矢餘矢二線正矢即半徑減餘弦之數餘矢即半徑減正弦之數故表内雖不列正矢餘矢而其數已寓矣
