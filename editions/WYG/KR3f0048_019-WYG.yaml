body:
  text: 欽定四庫全書御製數理精藴下編卷十四面部四三角形三角形凡三角形立於圓界之一半者為直角即勾股過圓界之一半者為鋭角不及圓界之一半者為鈍角然不拘鋭角鈍角自一角至底邊作垂線即分為兩直角是仍不離乎勾股也兩腰等者垂線即當底之一半而兩腰不等者所分底界則有大小不同故和較相比之法因之而生葢和求較較求和要必歸於勾股相求之理由勾股而得垂線則凡面積及内容方圓等形皆無不可得至於三角形角度相求之法乃割圓八線實所以極三角之用即如周髀所謂仰矩知髙俯矩知深是也故另為一卷茲但取三角形之面線相求諸法悉具圖觧以次勾股使與勾股相表裏焉設如有等邊三角形每邉十尺求中垂線幾何法以底邉十尺折半得五尺為勾任以兩腰之一邉十尺為弦勾弦求股得八尺六寸六分零二毫有餘即為中垂線也如圖甲乙丙三角形其甲乙甲丙兩腰相等則其底邊之乙丙兩角度亦必相等見幾何原夲二卷第九節今所求之垂線為甲丁即将甲乙丙三角形平分為兩直角三角形而甲丁乙甲丁丙皆為直角其度又等故所分之兩直角三角形為同式形而甲丁垂線又為兩三角形所共用之邉線則所分之底邊之乙丁丁丙焉得不等故将乙丙底邊折半為勾任以甲乙甲丙兩邉之一邊為弦求得股為中垂線也又法以底邊十尺折半得五尺自乗得二十五尺三因之得七十五尺開方得八尺六寸六分零二毫有餘即為中垂線也葢弦比勾大一倍則弦之自乗之方必比勾之自乗之方大四倍為連比例隔一位相加之比例見幾何原夲七卷第五節依勾弦求股之法於弦自乗方積之四倍内減勾自乗方積之一倍餘三倍即為股自乗之方積是中垂線之自乗方積為勾自乗方積之三倍故将底邊折半自乗三因之即與中垂線自乗之方積等而開方得中垂線也設如有鋭角三角形大腰一百二十二尺小腰一百一十二尺底一百五十尺求中垂線幾何法以底一百五十尺為一率大腰一百二十二尺與小腰一百一十二尺相加得二百三十四尺為二率以大腰一百二十二尺與小腰一百一十二尺相減餘十尺為三率求得四率十五尺六寸為底邊之較與底一百五十尺相減餘一百三十四尺四寸折半得六十七尺二寸為勾以小腰一百一十二尺為弦求得股八十九尺六寸為中垂線也如圖甲乙丙三角形甲乙為大腰甲丙為小腰乙丙為底甲丁為所求中垂線試以甲為心丙為界作一圜截甲乙大腰於庚截乙丙底於戊又将甲乙大腰引長至己作甲己線與甲丙小腰相等則己乙為兩腰之和庚乙為兩腰之較葢甲庚與甲丙等故庚乙為兩腰之較乙丙為底邊之和乙戊為底邉之較葢丁丙與丁戊等故乙戊為底邉之較今以乙丙底邉之和與乙己兩腰之和為比即同於乙庚兩腰之較與乙戊底邊之較為比為轉比例之四率幾何原夲九卷第八節自圜外一點至圜内所作之兩線此兩全線之比例同於圜外兩叚轉相比之比例故乙丙為一率乙己為二率乙庚為三率求得四率為乙戊既得乙戊則於乙丙底邊内減去乙戊餘戊丙折半得丁丙為勾甲丙為弦求為股為甲丁中垂線也又法以大腰一百二十二尺自乘得一萬四千八百八十四尺又以小腰一百一十二尺自乘得一萬二千五百四十四尺兩自乘數相減餘二千三百四十尺以底邊一百五十尺除之得十五尺六寸為底邊之較與底邊一百五十尺相減餘一百三十四尺四寸折半得六十七尺二寸為勾以小腰一百一十二尺為弦求得股八十九尺六寸為中垂線也如圖甲乙丙三角形試自甲角作甲丁垂線則分為甲丁乙甲丁丙兩勾股形甲乙甲丙皆為弦乙丁丁丙皆為勾共以甲丁為股乙丙為兩勾之和乙戊為兩勾之較今以甲乙弦自乘則成甲戊己乙一正方形内丁庚辛乙為乙丁勾自乘之一正方形於甲戊己乙正方形内減去丁庚辛乙正方形所餘甲戊己辛庚丁磬折形積即與甲丁股自乘之一正方形等又以甲丙弦自乘則成甲壬癸丙一正方形内丁子丑丙為丁丙勾自乘之一正方形於甲壬癸丙正方形内減去丁子丑丙正方形所餘甲壬癸丑子丁磬折形積亦與甲丁股自乘之一正方形等是則前圖之甲戊己辛庚丁磬折形與後圖之甲壬癸丑子丁磬折形相等矣若兩自乘之數相減則如甲戊己乙正方形内減去與甲壬癸丑子丁磬折形相等之甲戊己辛庚丁磬折形又減去丁子丑丙一小正方形所餘為子庚辛乙丙丑一小磬折形引而長之成一長方形其長即乙丁與丁丙之和其濶即乙丁與丁丙之較故以乙丁與丁丙之和除子庚辛乙丙丑磬折形之積而得乙丁與丁丙之較也又圖甲乙丙三角形作甲丁垂線分為兩勾股形共以甲丁垂線為股故甲乙弦自乘方内有甲丁股自乘一方乙丁勾自乘一方而甲丙弦自乘方内有甲丁股自乘一方丁丙勾自乘一方今兩勾股形之股既同則兩弦方相減所餘之數即兩勾方相減所餘之數故甲丁乙勾股形之甲乙弦自乘方内減甲丁丙勾股形之甲丙弦自乘方所餘庚辛乙寅丑子磬折形即與甲丁乙勾股形之丁乙勾自乘方内減甲丁丙勾股形之丁丙勾自乘方所餘乙卯辰己申未磬折形相等若将乙卯辰己申未磬折形引而長之遂成乙壬酉未長方形其長即乙丁丁丙兩勾之和其闊即乙丁丁丙兩勾之較其積即乙丁丁丙兩勾方相減之餘亦即甲乙甲丙兩弦方相減之餘是以兩弦自乘相減之餘積以兩勾之和除之而得兩勾之較也設如有鋭角三角形大腰十七尺小腰十尺底二十一尺求中垂線幾何法以底二十一尺為一率以大腰十七尺與小腰十尺相加得二十七尺為二率以大腰十七尺與小腰十尺相減餘七尺為三率求得四率九尺為底邊之較與底二十一尺相減餘十二尺折半得六尺為勾以小腰十尺為弦求得股八尺為中垂線也如圖甲乙丙三角形甲乙為大腰甲丙為小腰乙丙為底甲丁為所求中垂線試以甲為心丙為界作一圜截甲乙大腰於庚截乙丙底邊於戊又将甲乙大腰引長至己作甲己線與甲丙小腰等則己乙為兩腰之和庚乙為兩腰之較乙丙為底邊之和乙戊為底邉之較其乙丙與乙己之比即同於庚乙與乙戊之比為轉比例四率也又法以大腰十七尺自乘得二百八十九尺又以小腰十尺自乘得一百尺兩自乘數相減餘一百八十九尺以底二十一尺除之得九尺為底邊之較與底二十一尺相減餘十二尺折半得六尺為勾以小腰十尺為弦求得股八尺為中垂線也圖解同前設如有斜立鋭角三角形大腰二十一尺小腰十七尺底十尺求形外垂線幾何法以底十尺為一率大腰二十一尺與小腰十七尺相減餘四尺為二率大腰二十一尺與小腰十七尺相加得三十八尺為三率求得四率十五尺二寸為底與形外垂線兩邊連底之總内減去底十尺餘五尺二寸折半得二尺六寸為勾以小腰十七尺為弦求得股十六尺八尺為形外垂線也如圖甲乙丙三角形甲乙為大腰甲丙為小腰乙丙為底甲丁為所求形外垂線試以甲為心丙為界作一圜截甲乙大腰於庚又将甲乙大腰引長至己作甲己線與甲丙小腰相等復将乙丙底引長至戊作乙戊線則成甲乙戊三角形其乙丙為底邉之較乙戊為底邊之和乙庚為兩腰之較乙己為兩腰之和自圜外至圜内所作兩線之比例既同於圜外兩叚轉相比之比例則圜外兩叚之比例亦必同於兩全線轉相比之比例故乙丙與乙庚之比即同於乙己與乙戊之比為比例四率既得乙戊則減乙丙餘丙戊折半得丙丁為勾甲丙為弦求得股即甲丁垂線也又法以大腰二十一尺自乘得四百四十一尺又以小腰十七尺自乘得二百八十九尺兩自乘數相減餘一百五十二尺以底十尺除之得十五尺二寸為底與形外垂線兩邊連底之總内減底十尺餘五尺二寸折半得二尺六寸為勾以小腰十七尺為弦求得股十六尺八寸為形外垂線也如圖甲乙丙三角形将乙丙底引長至戊自甲作垂線至丁則丁戊與丁丙等又自甲至戊作甲戊線與甲丙小腰等則成甲丁乙甲丁戊兩勾股形甲乙甲戊皆為弦乙丁丁戊皆為勾共以甲丁為股而乙丙為兩勾之較乙戊為兩勾之和前法以和求較此法以較求和其理一也圖解並同前設如有鋭角三角形兩腰俱五尺底六尺求面積幾何法先以底六尺折半得三尺為勾任以兩腰之一邊五尺為弦求得股四尺為中垂線與底六尺相乘得二十四尺折半得一十二尺為三角面積也如圖甲乙丙三角形以乙丙底邊與甲丁中垂線相乘成戊乙丙己長方形積比三角形積正大一倍故折半得三角積也設如有鈍角三角形大腰十七尺小腰十尺底二十一尺求面積幾何法先用求中垂線法求得中垂線八尺與底二十一尺相乘得一百六十八尺折半得八十四尺為三角面積也如圖甲乙丙三角形先求甲丁垂線既得甲丁垂線乃與乙丙底邊相乘成戊乙丙己長方形比三角形積正大一倍故折半得三角積也又法以甲乙邊十七尺乙丙邊二十一尺甲丙邊十尺三數相加得四十八尺為三邊之總折半得二十四尺為半總以甲乙邊十七尺與半總二十四尺相減餘七尺為甲乙邊與半總之較以乙丙邊二十一尺與半總二十四尺相減餘三尺為乙丙邊與半總之較以甲丙邊十尺與半總二十四尺相減餘十四尺為甲丙邊與半總之較乃以半總二十四尺為一率甲丙邊與半總之較十四尺為二率乙丙邊與半總之較三尺與甲乙邊與半總之較七尺相乘得二十一尺為三率求得四率十二尺二十五寸開方得三尺五寸為三角形自中心至三邊之垂線與三邊之總四十八尺相乘得一百六十八尺折半得八十四尺即三角形之面積或以所得垂線三尺五寸與半總二十四尺相乘亦得八十四尺為三角形之面積也此法葢一率二率以線與線為比三率四率以面與面為比也如甲乙丙三角形自中心丁至三邊各作一垂線又自中心丁至三角各作一分角線即成六直角三角形俱兩兩相等丁巳丙與丁庚丙等丁巳乙與丁戊乙等丁戊甲與丁庚甲等又按甲戊度引乙丙線至辛則乙辛為三邊之半總即三較之和乙巳與乙戊等即甲丙邊與半總之較巳丙與丙庚等即甲乙邊與半總之較丙辛與甲戊甲庚等即乙丙邊與半總之較試自辛作直角将乙丁線引長作一乙辛壬直角形則壬辛與丁巳平行乙辛壬形與乙巳丁形遂為同式形其乙辛與乙巳之比即同於壬辛與丁巳之比然乙辛一率乙巳二率之數雖有而壬辛之數却無又但知巳丙與丙辛相乘之數即丁巳與壬辛相乘之數故以巳丙與丙辛相乘之數為三率何以知巳丙與丙辛相乘之數即丁巳與壬辛相乘之數試作壬丙線壬癸線使丙癸與丙辛等癸角辛角皆為直角癸丙辛角與辛壬癸角相合共成一百八十度然庚丙巳角為癸丙辛角之外角相合亦共成一百八十度是庚丙巳角與辛壬癸角等庚丁巳角與癸丙辛角等是以壬癸丙辛形與丙庚丁巳形為同式形而丙辛壬勾股形與丁己丙勾股形亦為同式形可互相比例矣以丁己作一率巳丙作二率丙辛作三率即得四率壬辛是以巳丙二率與丙辛三率相乘之數即與丁巳一率與壬辛四率相乘之數等故直以己丙丙辛相乘之數作三率也其所得四率即丁己自乘之數是故乙辛與乙巳之比同於丁己與壬辛相乘之面即己丙與丙辛相乘之面與丁己自乘之面之比也既得丁己自乘之面故開方而得丁巳為三角形自中心至三邊之垂線與丁戊丁庚俱相等又即三角形容圜之半徑也既得自中心至三邊之垂線則用垂線與三邊之總相乘所得一長方積即如用垂線與三邊各相乘所得三長方積合為一長方比三角形積大一倍故折半而得三角形之面積如以垂線與半總相乘即與三角形積等而不用折半矣設如有鋭角三角形大腰三十七尺小腰十五尺底四十四尺求内容正方邊幾何法先用求中垂線法求得中垂線十二尺與底邊四十四尺相加得五十六尺為一率中垂線十二尺為二率底邊四十四尺為三率推得四率九尺四寸二分八釐五毫有餘即三角形内所容正方之一邊也如圖甲乙丙三角形甲乙為大腰甲丙為小腰乙丙為底甲丁為所得中垂線戊己庚辛為今所求内容正方形試依甲丁中垂線度将乙丙線引長作乙癸線為五十六尺又與甲丙線平行作壬癸線又将甲乙線引長作壬乙線則成與甲乙丙同式之壬乙癸三角形復與底線平行作甲子線與丙癸等即與甲丁垂線等又與甲丁平行作子丑線與甲丁等則甲丁垂線所作甲丁丑子正方形即為壬乙癸三角形内所容之正方形矣故壬乙癸三角形之乙癸底與甲丁方邊之比即同於甲乙丙三角形之乙丙底與戊巳方邊之比故中垂線與底邊相加為一率中垂線為二率底邉為三率推得四率為内容正方之一邊也設如等邊三角形每邊一尺二寸求内容圜徑幾何法先用求中垂線法求得中垂線一尺零三分九釐二毫有餘以三歸之得三寸四分六釐四毫有餘即内容圜形半徑倍之得六寸九分二釐八毫有餘即内容圜形全徑也如圖甲乙丙三角形内容丁圜形先求得甲戊中垂線又自丙角至甲乙線界作丙巳垂線與甲戊中垂線相交於丁即三角形之中心亦即内容圜形之中心故丁戊與丁己即内容圜形之半徑又甲戊乙甲巳丁兩勾股形為同式形甲乙為乙戊之二倍則甲丁亦必為丁巳或丁戊之二倍丁戊既為内容圜形之半徑則甲丁即為内容圜形之全徑而甲戊中垂線必為丁戊半徑之三倍矣故求得甲戊中垂線以三歸之得丁戊即内容圜形之半徑倍之得庚戊即内容圜形之全徑也設如等邊三角形每邊一尺二寸求外切圜徑幾何法先用求中垂線法求得中垂線一尺零三分九釐二毫有餘三歸四因得一尺三寸八分五釐六毫有餘即外切圜形全徑也如圖甲乙丙三角形外切丁圜形先求得甲戊中垂線又自丙角至甲乙線界作丙己垂線與甲戊中垂線相交於丁即三角形之中心亦即外切圜形之中心故甲丁與丙丁即外切圜形之半徑又甲戊乙甲巳丁兩勾股形為同式形甲乙為乙戊之二倍則甲丁亦必為丁己或丁戊之二倍甲丁既為外切圜形之半徑則為甲戊中垂線之三分之二而甲戊中垂線却為甲庚全徑之四分之三矣故求得甲戊中垂線三歸四因得甲庚即外切圜形之全徑也又法以每邊一尺二寸自乘三歸四因開方得一尺三寸八分五釐六毫有餘即外切圜形全徑也如圖甲乙丙三角形外切甲乙丁丙圜形試自甲角作甲戊中垂線又引長作甲丁全徑線復自丁至乙作丁乙線遂成甲乙丁甲戊乙兩勾股形為同式形甲乙既為乙戊之二倍則甲丁亦必為乙丁之二倍故甲丁自乘方積比乙丁自乘方積大四倍若依勾弦求股之法言之則甲丁弦自乘方積内減乙丁勾自乘方積所餘為甲乙股自乘之方積今甲丁弦自乘方積既為乙丁勾自乘方積之四倍則是甲乙每邊自乘方積為甲丁全徑自乘方積之四分之三矣故以一邊自乘三歸四因即與全徑自乘之方積等而開方得外切圜形之全徑也設如有鋭角三角形大腰三百三十八尺小腰三百尺底四百一十八尺求内容圜徑幾何法先用求中垂線法求得中垂線二百四十尺與底四百一十八尺相乘得一十萬零三百二十尺以大腰三百三十八尺小腰三百尺底四百一十八尺三數相加得一千零五十六尺除之得九十五尺即内容圜半徑倍之得一百九十尺即内容圜全徑也如圖甲乙丙三角形内容戊圜形試自圜之中心至甲乙丙三角各作戊甲戊乙戊丙三線遂分甲乙丙三角形為甲戊乙甲戊丙乙戊丙三三角形其三邊皆為三角形之底而戊巳半徑皆為三角形之垂線今乙丙底邊與甲丁中垂線相乘所得之長方積原比甲乙丙三角形積大一倍即如将所分三三角形各用垂線乘底邊所得之三長方積合為一長方也三長方之長雖不同而濶則一故各以長除積而得濶者即如合三角形之三邊除三角形之倍積而得半徑也設如有鋭角三角形大腰一百八十三尺小腰一百六十八尺底二百二十五尺求外切圜徑幾何法用求中垂線法求得中垂線一百三十四尺四寸為一率小腰一百六十八尺為二率大腰一百八十三尺為三率推得四率二百二十八尺七寸五分即外切圜徑也如圖甲乙丙三角形甲乙為小腰甲丙為大腰乙丙為底甲丁為中垂線試作切三角一圜自甲角至圜對界作甲戊全徑線又自丙角至戊作丙戊線則甲丙戊三角形之丙角立於圜界之一半必為直角與甲丁垂線所分甲丁乙三角形之丁角等而戊角與乙角皆對甲丙弧其度又等故甲丙戊與甲丁乙兩三角形為同式形是以甲丁與甲乙之比同於甲丙與甲戊之比而為相當比例四率也設如有鈍角三角形大腰十七尺小腰十尺底二十一尺求外切圜徑幾何法用求中垂線法求得中垂線八尺為一率小腰十尺為二率大腰十七尺為三率推得四率二十一尺二寸五分即外切圜徑也如圖甲乙丙三角形甲乙為小腰甲丙為大腰乙丙為底甲丁為中垂線試作切三角一圜自甲角至圜對界作甲戊全徑線又自丙角至戊作丙戊線則甲丙戊三角形之丙角立於圜界之一半必為直角與甲丁垂線所分甲丁乙三角形之丁角等而戊角與乙角皆對甲丙弧其度又等故甲丙戊與甲丁乙兩三角形為同式形是以甲丁與甲乙之比同於甲丙與甲戊之比而為相當比例四率也御數精藴