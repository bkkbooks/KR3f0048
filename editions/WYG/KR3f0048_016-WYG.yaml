body:
  text: 欽定四庫全書御製數理精藴下編卷十一面部一平方帶縱平方平方平方者等邊四直角之面積也以形而言則為兩矩所合以積而言則為自乗之數因其有廣無厚故曰平方因其縱横相等故曰正方葢方積面也而其邊則線也有線求面則相乗而得積有面求線則開方而得邊開之之法略與歸除同但歸除有法有實而開方則有實而無法故古人立為商除廉隅之制以相求每積二位得邊之一位所謂一百一十定無疑一千三十有零餘九千九百不離十一萬方為一百推是也其法先從一角而剖其冪以自一至九自乗之數為方根與所有之積相審量其足減者而定之是為初商初商減盡無餘則方邊止一位若有餘實即初商方積外别成一磬折形其附初商之兩旁者謂之廉兩廉之角所合一小方謂之隅廉有二故倍初商為兩廉之共長是為廉法視餘積足廉法幾倍即是次商隅即次商之自乗故次商為隅法合廉隅而以次商乗之則得兩廉一隅之共積所謂初商方積外别成一磬折形者是也故次商為初商所得方邊之零如次商數與初商餘積相減尚有不盡之實則又成一磬折形而仍為兩廉一隅但較前廉愈長而隅愈小耳凡有幾層廉隅俱照初商之例逐層遞析之實盡而止實不盡者必非自乗之正數遞析之至於纎塵終有奇零若餘實不足廉隅法之數者則方邊為空位此開方之定法也面形不一而容積皆以方積為準故平方為算諸面之本諸面必通之方積而後可施其法也設如正方面積三十六尺開方問每一邊數幾何法列方積三十六尺自末位起算每方積二位定方邊一位今積止有二位則於六尺上作記定單位以自一至九自乗之方根數與之相審知與六尺自乗之數恰合乃以六尺書於方積六尺之上而以六尺自乗之三十六尺書於方積原數之下相減恰盡即得開方之數為六尺也如圖甲乙丙丁正方形每邊皆六尺其中函一尺小正方三十六自邊計之為六尺自乗之積以積開之則與六尺自乗方根之數相準故商除之恰盡也葢方積為二位是以方邊止一位方積即六尺自乗之數故無廉隅之可用次商如有餘積則自成廉隅而用次商矣設如正方面積一丈四十四尺開方問每一邊數幾何法列方積一丈四十四尺自末位起算每方積二位定方邊一位故隔一位作記即於四尺上定尺位一丈上定丈位其一丈為初商積與一丈自乗之數相合即定初商為一丈書於方積一丈之上而以一丈自乗之正方一丈書於初商積之下相減恰盡爰以方邊末位積四十四尺續書於下大凢以餘積續書於下者每取方積之二位以當方邊之一位也為次商廉隅之共積乃以初商之一丈作一十尺倍之得二十尺為廉法以除四十四尺足二尺即定次商為二尺書於方積四尺之上而以次商二尺為隅法與廉法二十尺相加共得二十二尺為廉隅共法書於餘積之左以次商二尺乗之得四十四尺與次商廉隅共積相減恰盡是開得一丈二尺為方面每一邊之數也如圖甲乙丙丁正方形每邊皆一丈二尺其中函積一丈四十四尺是為共積其從一角所分甲庚己戊正方形每邊一丈即初商數其中函正方積一丈即初商自乗數所餘庚己壬乙戊己辛丁兩長方為兩廉其各長十尺即初商數其各闊二尺即次商數廉有二故倍初商為廉法其己壬丙辛一小正方為隅其邊二尺亦即次商數故以次商為隅法合兩廉一隅成一磬折形附於初商自乗方之兩邊而成一總正方形此廉隅之法所由生也設如正方面積五百二十九尺開方問毎一邊數幾何此題正方面積之三位皆以尺命位似與前題分丈尺者不同然其取方積二位續書於下其末位即命為單位立算則與丈尺同也法列方積五百二十九尺自末位起算每方積二位定方邊一位故隔一位作記乃於九尺上定單位五百尺上定十位其五百尺為初商積以初商本位計之則五百尺為初商積之單位止與二自乗之數相準即定初商為二書於方積五百尺之上而以二自乗之四書於初商積之下相減餘一百尺爰以方邊第二位積二十九尺續書於下共一百二十九尺為次商廉隅之共積乃以初商之二作二十尺倍之得四十尺為廉法以除一百二十九尺足三尺即定次商為三尺書於方積九尺之上而以次商三尺為隅法與廉法四十尺相加共得四十三尺為廉隅共法書於餘積之左以次商三尺乗之得一百二十九尺與次商廉隅共積相減恰盡是開得二十三尺為方面每一邊之數也如圖甲乙丙丁正方形每邊皆二十三尺其中函積五百二十九尺是為共積其從一角所分甲庚己戊正方形每邊二十尺即初商數其中函積四百尺即初商自乗數所餘庚己壬乙戊己辛丁兩長方為兩廉其各長二十尺即初商數其各闊三尺即次商數其己壬丙辛一小正方為隅其邊三尺亦即次商數合兩廉一隅成一磬折形附於初商自乗方之兩邊而成一總正方形也設如正方面積五丈四十七尺五十六寸開方問每一邊數幾何法列方積五丈四十七尺五十六寸自末位起算每方積二位定方邊一位故隔一位作記即於六寸上定寸位七尺上定尺位五丈上定丈位其五丈為初商積與二丈自乗之數相準即定初商為二丈書於方積五丈之上而以二丈自乗之四丈書於初商積之下相減餘一丈即一百尺爰以方邊第二位積四十七尺續書於下共一百四十七尺為次商廉隅之共積乃以初商之二丈作二十尺倍之得四十尺為廉法以除一百四十七尺足三尺即定次商為三尺書於方積七尺之上而以次商三尺為隅法與廉法四十尺相加共得四十三尺為廉隅共法書於餘積之左以次商三尺乗之得一百二十九尺與次商廉隅共積相減餘一十八尺即一千八百寸復以方邊末位積五十六寸續書於下共一千八百五十六寸為三商廉隅之共積乃以初商次商之二丈三尺作二百三十寸倍之得四百六十寸為廉法以除一千八百五十六寸足四寸即定三商為四寸書於方積六寸之上而以三商四寸為隅法與廉法四百六十寸相加共得四百六十四寸為廉隅共法書於餘積之左以三商四寸乗之得一千八百五十六寸與三商廉隅共積相減恰盡是開得二丈三尺四寸為方面每一邊之數也設如正方面積四十五萬九千六百八十四尺開方問每一邊數幾何此題正方面積之六位皆以尺命位似與前題分丈尺寸三色者不同然其每取方積二位續書於下其末位即命為單位立算仍與丈尺寸同也法列方積四十五萬九千六百八十四尺自末位起算每方積二位定方邊一位故隔一位作記乃於四尺上定單位六百尺上定十位五萬尺上定百位其四十五萬尺為初商積以初商本位計之則五萬尺為初商積之單位而四十五萬尺為四十五與六自乗之數相準即定初商為六書於方積五萬尺之上而以六自乗之三十六書於初商積之下相減餘九萬尺爰以方邊第二位積九千六百尺續書於下共九萬九千六百尺為次商廉隅之共積以次商本位計之則六百尺為次商積之單位而九萬九千六百尺為九百九十六而初商之六即為六十故以初商之六作六十倍之得一百二十為廉法以除九百九十六足七倍即定次商為七書於方積六百尺之上而以次商七為隅法與廉法一百二十相加共得一百二十七為廉隅共法書於餘積之左以次商七乗之得八百八十九與次商廉隅共積相減餘一萬零七百尺復以方邊末位積八十四尺續書於下共一萬零七百八十四尺為三商廉隅之共積以三商本位計之則積與邊皆仍為本位乃以初商次商之六百七十倍之得一千三百四十為廉法以除一萬零七百八十四足八倍即定三商為八書於方積四尺之上而以三商八為隅法與廉法一千三百四十相加共得一千三百四十八為廉隅共法書於餘積之左以三商八乗之得一萬零七百八十四與三商廉隅共積相減恰盡是開得六百七十八尺為方面每一邊之數也設如正方面積三十五丈九十一尺六十寸四十九分開方問每一邊數幾何法列方積三十五丈九十一尺六十寸四十九分自末位起算每隔一位作記即於九分上定分位空寸上定寸位一尺上定尺位五丈上定丈位其三十五丈為初商積與五丈自乗之數相準即定初商為五丈書於方積五丈之上而以五丈自乗之二十五丈書於初商積之下相減餘一十丈即一千尺爰以方邊第二位積九十一尺續書於下共一千零九十一尺為次商廉隅之共積乃以初商五丈作五十尺倍之得一百尺為廉法以除一千零九十一尺足九尺即定次商為九尺書於方積一丈之上而以次商九尺為隅法與廉法一百尺相加共得一百零九尺為廉隅共法書於餘積之左以次商九尺乗之得九百八十一尺與次商廉隅共積相減餘一百一十尺即一萬一千寸復以方邊第三位積六十寸續書於下共一萬一千零六十寸為三商廉隅之共積乃以初商次商之五丈九尺作五百九十寸倍之得一千一百八十寸為亷法以除一萬一千零六十寸足九寸即定三商為九寸書於方積空寸之上而以三商九寸為隅法與廉法一千一百八十寸相加共得一千一百八十九寸為廉隅共法書於餘積之左以三商九寸乗之得一萬零七百零一寸與三商廉隅共積相減餘三百五十九寸即三萬五千九百分復以方邊末位積四十九分續書於下共三萬五千九百四十九分為四商廉隅之共積乃以初商次商三商之五丈九尺九寸作五千九百九十分倍之得一萬一千九百八十分為廉法以除三萬五千九百四十九分足三分即定四商為三分書於方積九分之上而以四商三分為隅法與廉法一萬一千九百八十分相加共得一萬一千九百八十三分為廉隅共法書於餘積之左以四商三分乗之得三萬五千九百四十九分與四商廉隅共積相減恰盡是開得五丈九尺九寸三分為方面每一邊之數也設如正方面積五百八十五萬六千四百尺開方問每一邊數幾何法列方積五百八十五萬六千四百尺補二空位以足其分自末空位起算毎隔一位作記於空尺上定單位四百尺上定十位五萬尺上定百位五百萬尺上定千位其五百萬尺為初商積以初商本位計之則五百萬尺為初商積之單位止與二自乗之數相準即定初商為二書於方積五百萬尺之上而以二自乗之四書於初商積之下相減餘一百萬尺爰以方邊第二位積八十五萬尺續書於下共一百八十五萬尺為次商廉隅之共積以次商本位計之則五萬尺為次商積之單位而一百八十五萬尺為一百八十五而初商之二即為二十故以初商之二作二十倍之得四十為廉法以除一百八十五足四倍即定次商為四書於方積五萬尺之上而以次商四為隅法與廉法四十相加共得四十四為㢘隅共法書於餘積之左以次商四乗之得一百七十六與次商廉隅共積相減餘九萬尺復以方邊第三位積六千四百尺續書於下共九萬六千四百尺為三商㢘隅之共積以三商本位計之則四百為三商積之單位而九萬六千四百尺為九百六十四而初商之二即為二百次商之四即為四十故以初商次商之二四作二百四十倍之得四百八十為廉法以除九百六十四足二倍即定三商為二書於方積四百尺之上而以三商二為隅法與㢘法四百八十相加共得四百八十二為廉隅共法書於餘積之左以三商二乗之得九百六十四與三商㢘隅共積相減恰盡是開得二千四百二十尺為方面每一邊之數也此法方積之末有二空位故所得方邊之末亦補一空位凢設數未至單位者皆依此例補足位分然後開之設如正方面積八十二丈六十二尺八十一寸開方問每一邊數幾何法列方積八十二丈六十二尺八十一寸自末位起算每隔一位作記於一寸上定寸位於二尺上定尺位於二丈上定丈位其八十二丈為初商積與九丈自乗之數相準即定初商為九丈書於方積二丈之上而以九丈自乗之八十一丈書於方積八十二丈之下相減餘一丈即一百尺爰以方邊第二位積六十二尺續書於下共一百六十二尺為次商廉隅之共積乃以初商九丈作九十尺倍之得一百八十尺為㢘法以除一百六十二尺其數不足是次商為空位也乃書一空於方積二尺之上以存次商之位復以方邊末位積八十一寸續書於下共一百六十二尺八十一寸即一萬六千二百八十一寸為三商㢘隅之共積仍以一百八十尺作一千八百寸為㢘法以除一萬六千二百八十一寸足九寸即定三商為九寸書於方積一寸之上而以三商九寸為隅法與㢘法一千八百寸相加共得一千八百零九寸為㢘隅共法書於餘積之左而以三商九寸乗之得一萬六千二百八十一寸與三商㢘隅共積相減恰盡是開得九丈零九寸為方面每一邊之數也此法方積無空位而商出之方邊有空位凡㢘法除餘積而數不足者皆依此例推之設如正方面積六千四百一十一萬二千零四十九尺開方問每一邊數幾何法列方積六千四百一十一萬二千零四十九尺自末位起算每隔一位作記於九尺上定單位空百尺上定十位一萬尺上定百位四百萬尺上定千位其六千四百萬尺為初商積以初商本位計之則四百萬為初商積之單位而六千四百萬為六千四與八自乗之數相合即定初商為八書於方積四百萬尺之上而以八自乗之六十四書於初商積之下相減無餘爰以方邊第二位積一十一萬尺續書於下為次商廉隅之共積以次商本位計之則一萬尺為次商積之單位而一十一萬尺為一十一而初商之八即為八十故以初商之八作八十倍之得一百六十為廉法以除一十一其數不足是次商為空位乃書一空於方積一萬尺之上以存次商之位復以方邊第三位積二千尺續書於下共一十一萬二千尺為三商廉隅之共積以三商本位計之則空百尺為三商積之單位而一十一萬二千尺為一千一百二十尺而初商之八即為八百次商之空即為空十故以初商次商之八空作八百倍之得一千六百為廉法以除一千一百二十其數仍不足是三商之為空位乃再書一空於方積空百尺之上以存三商之位復以方邊末位積四十九尺續書於下共一十一萬二千零四十九尺為四商廉隅之共積以四商本位計之則積與邊皆仍為本位乃以初商次商三商之八千倍之得一萬六千為廉法以除一十一萬二千零四十九足七倍即定四商為七書於方積九尺之上而以四商七為隅法與㢘法一萬六千相加共得一萬六千零七為㢘隅共法書於餘積之左而以四商七乗之得一十一萬二千零四十九與餘積相減恰盡是開得八千零七尺為方面每一邊之數也此法方積中雖有一空位而商出之方邊却有二空位凡開方遇此類者皆依此例推之設如有積一萬四千九百二十八尺開方問每一邊數幾何法列積一萬四千九百二十八尺自末位起算每隔一位作記於八尺上定單位九百尺上定十位一萬尺上定百位其一萬尺為初商積以初商本位計之則一萬尺為初商積之單位止與一自乗之數相合即定初商為一書於方積一萬尺之上而以一自乗之一書於初商積之下相減無餘爰以方邊第二位積四千九百尺續書於下為次商㢘隅之共積以次商本位計之則九百尺為次商積之單位而四千九百尺為四十九而初商之一即為一十故以初商之一作一十倍之得二十為廉法以除四十九足二倍即定次商為二書於方積九百尺之上而以次商二為隅法與㢘法二十相加共得二十二為㢘隅共法書於餘積之左以次商二乗之得四十四與次商廉隅共積相減餘五百尺復以方邊末位積二十八尺續書於下共五百二十八尺為三商廉隅之共積以三商本位計之則積與邊皆仍為本位乃以初商次商之一百二十俱倍之得二百四十為廉法以除五百二十八足二倍即定三商為二書於方積八尺之上而以三商二為隅法與廉法二百四十相加共得二百四十二為㢘隅共法書於餘積之左以三商二乗之得四百八十四與三商廉隅共積相減餘四十四尺不盡是開得一百二十二尺為方面每一邊之數仍餘四十四尺不盡也如欲以餘數再開則得方邊之寸數乃増書兩空於總積之後復續書兩空於四十四尺之後為幾十幾寸之位是則四十四尺作四千四百寸為四商廉隅之共積爰以初商次商三商之一百二十二尺作一千二百二十寸倍之得二千四百四十寸為廉法以除四千四百寸足一倍即定四商為一寸書於餘積空寸之上而以四商一為隅法與廉法二千四百四十寸相加共得二千四百四十一寸為廉隅共法書於餘積之左以四商一寸乗之仍得二千四百四十一寸與餘積相減餘一千九百五十九寸不盡如再以餘數開之則得方邊之分數乃又續書兩空於後増空十空寸之後復續書兩空於五十九寸之後為幾十幾分之位是則一千九百五十九寸作一十九萬五千九百分為五商廉隅之共積爰以初商次商三商四商之一百二十二尺一寸作一萬二千二百一十分倍之得二萬四千四百二十分為廉法以除一十九萬五千九百分足八倍即定五商為八分書於餘積空分之上而以五商八為隅法與㢘法二萬四千四百二十分相加共得二萬四千四百二十八分為廉隅共法書於餘積之左以五商八分乗之得一十九萬五千四百二十四分與餘積相減仍餘四百七十六分不盡是開得一百二十二尺一寸八分為方面每一邊之數也此法原積本非自乗所得之數雖遞析之終不能盡凡開方遇此類者皆依此例推之設如有一方臺上面共鋪方甎四千零九十六塊問每一邊得甎幾何法列方甎四千零九十六塊為方積於六塊上定單位空百塊上定十位其四千塊為初商積以初商本位計之則空百塊為初商積之單位而四千塊為四十與六自乗之數相準即定初商為六書於方積空百塊之上而以六自乗之三十六書於初商積之下相減餘四百塊爰以餘積九十六塊續書於下共四百九十六塊為次商廉隅之共積而以初商六作六十倍之得一百二十為廉法以除四百九十六足四倍即定次商為四書於方積六塊之上而以次商四為隅法與廉法一百二十相加共得一百二十四為廉隅共法書於餘積之左以次商四乗之得四百九十六與餘積相減恰盡是開得六十四塊為方臺上面每一邊之甎數也設如有三百六十一人用船分載其每船所載人數與共船數相等問共船幾何法列三百六十一人為方積於一人上定單位三百人上定十位其三百人為初商積以初商本位計之則三百為初商積之單位止與一自乗之數相準即定初商為一書於方積三百之上而以一自乗之一書於初商積之下相減餘二百爰以餘積六十一續書於下共二百六十一為次商廉隅之共積而以初商一作一十倍之得二十為廉法以除二百六十一足九倍即定次商為九書於方積一人之上而以次商九為隅法與廉法二十相加共得二十九為㢘隅共法書於餘積之左以次商九乗之得二百六十一與餘積相減恰盡是開得十九為共船數而每船載十九人也設如有銀七百八十四兩散給夫匠其每人所得銀數與其人數相等問共人數幾何法列七百八十四兩為方積於四兩上定單位七百兩上定十位其七百兩為初商積以初商本位計之則七百為初商積之單位止與二自乗之數相準即定初商為二書於方積七百之上而以二自乗之四書於初商積之下相減餘三百爰以餘積八十四續書於下共三百八十四為次商廉隅之共積而以初商二作二十倍之得四十為廉法以除三百八十四足八倍即定次商為八書於方積四兩之上而以次商八為隅法與㢘法四十相加共得四十八為㢘隅共法書於餘積之左以次商八乗之得三百八十四與餘積相減恰盡是開得二十八為共人數而每人得銀二十八兩也設如用船運粮六千五百六十一石欲取一船别用將此船米分載各船每船領去一石其本船尚餘一石問共船幾何法列米六千五百六十一石為方積於一石上定單位五百石上定十位其六千五百石為初商積以初商本位計之則五百石為初商積之單位而六千五百為六十五與八自乗之數相準即定初商為八書於方積五百之上而以八自乗之六十四書於初商積之下相減餘一百爰以餘積六十一續書於下共一百六十一為次商廉隅之共積而以初商八作八十倍之得一百六十為廉法以除一百六十一足一倍即定次商為一書於方積一石之上而以次商一為隅法與廉法一百六十相加共得一百六十一為廉隅共法書於餘積之左以次商一乗之仍得一百六十一與餘積相減恰盡是開得八十一為共船數而每船載米八十一石也此法葢因一船所載之米分與各船毎船各領一石即共去八十石故本船尚餘一石也設如有錢一萬五千六百二十五文買瓜每瓜一個與脚錢一文因無現錢將一瓜準作脚錢問瓜數幾何法列錢一萬五千六百二十五為方積於五文上定單位六百上定十位一萬上定百位其一萬為初商積以初商本位計之則一萬為初商積之單位止與一自乗之數相合即定初商為一書於方積一萬之上而以一自乗之一書於初商積之下相減無餘爰以第二位積五千六百續書於下為次商㢘隅之共積以次商本位計之則六百為次商積之單位而五千六百為五十六而初商之一即為一十故以初商之一作一十倍之得二十為廉法以除五十六足二倍即定次商為二書於方積六百之上而以次商二為隅法與㢘法二十相加共得二十二為㢘隅共法書於餘積之左以次商二乗之得四十四與次商廉隅共積相減餘一千二百復以末位積二十五續書於下共一千二百二十五為三商廉隅之共積以三商本位計之則積與邊皆仍為本位乃以初商次商之一百二十俱倍之得二百四十為㢘法以除一千二百二十五足五倍即定三商為五書於方積五文之上而以三商五為隅法與㢘法二百四十相加共得二百四十五為㢘隅共法書於餘積之左以三商五乗之得一千二百二十五與餘積相減恰盡是開得一百二十五為共瓜之數亦即每瓜之價也此法因每瓜應給脚錢一文今以一瓜準之即知一瓜之價與瓜之共數相等故以開方法算之而得也帶縱平方帶縱平方者兩等邊直角長方面積也有積數因長比闊之較或長與闊之和而得邊故曰帶縱葢正方之縱横皆同故止有積即可得其邊若長方則縱横不等知其積又必知其縱横相差之較或縱横相併之和始能得其邊故以長闊之較為問者則皆較為帶縱加所開之數商除之而得闊或四因積數加較自乗平方開之即長闊之和和加較半之而得長和減較半之而得闊或半較自乗加原積而開平方即得半和加半較而得長減半較而得闊如以長闊之和為問者則用和為帶縱減去所開之數商除之而得闊或四因積數減和自乗平方開之即長闊之較較減和半之而得闊較加和半之而得長或半和自乗減原積而開平方即得半較加半和而得長減半和而得闊夫用半較半和之法與四因積數之法同出一理葢四因積數加全較自乗故開方而得全和半較自乗加原積故開方而得半和四因積數減全和自乗故開方而得全較半和自乗減原積故開方而得半較此即面與線之比例面加四倍而邊加一倍邊得其半而積為四分之一也法雖不一要之皆使歸於正方以求其和較是則雖曰帶縱仍不外乎平方之理也設如有長方面積八尺縱多二尺問長闊各幾何法列積如開平方法商之積八尺止可商二尺乃以二尺書於原積八尺之上而以所商二尺加縱多二尺得四尺以所商二尺乗之得八尺書於原積之下相減恰盡即知長方之闊得二尺加入縱多二尺得四尺即為長方之長也如圖甲乙丙丁長方形容積八尺其甲乙邊長四尺甲丁邊闊二尺其甲乙長比甲丁闊所多戊乙即縱多之數初商所得二尺即甲戊己丁正方之每一邊葢因此法長闊兩邊俱止一位而積亦止一位故初商所得即為一邊而加入縱多即又一邊是以兩邊相乗而與原積相等也又法以積八尺用四因之得三十二尺而以縱多二尺自乗得四尺加八四因之數得三十六尺開方得六尺即為長闊相和之數乃以縱多二尺與長闊之和六尺相加得八尺折半得四尺即長方之長減縱多二尺得二尺即長方之闊也如圖甲乙丙丁長方形容積八尺四因之得甲乙丙丁戊己庚乙辛壬癸己子丁丑壬四長方形廻環相湊成一空心正方式再加入縱多二尺自乗之丑丙庚癸之一小正方形即成甲戊辛子之一大正方形其甲戊類每一邊即長闊之和故開方得長闊之和既得和加縱多是為倍長故折半而得長減縱多則為倍闊故折半而得闊或得長而減縱多亦得闊也又法先將縱多二尺折半得一尺為半較自乗仍得一尺與原積八尺相加得九尺平方開之得三尺為半和於半和減半較得二尺為闊於半和加半較得四尺為長如圖甲乙丙丁長方形甲乙為長甲丁為闊戊乙為縱多之較將較折半於庚而移庚乙丙辛置於丁己癸壬再加己辛子癸半較自乗之方則成甲庚子壬一正方形故開方而得甲庚甲壬之邊皆為半和也於甲壬之半和減丁壬之半較得甲丁之闊於甲庚之半和加庚乙之半較得甲乙之長也又圖甲乙丙丁長方形容積八尺將甲丁邊引長作丁辛與丁丙等則甲辛為長闊之和又如甲乙邊截甲丁於庚則庚丁為長闊之較甲辛和折半於己而庚丁較亦折半於己故以己為心甲為界作一半圜而引丙丁邊至戊界作一戊丁直線戊巳輻線則甲巳戊己巳辛皆為半和而庚己己丁皆為半較且甲丁戊丁丁辛又為連比例之三線矣其戊丁中率自乗之方與甲丁首率丁辛末率相乗之長方等見幾何原本九卷第三節則是戊丁自乗之方與原設甲乙丙丁長方之積等也又戊丁巳為勾股形其戊丁邊自乗之方與己丁邊自乗之方相併而與戊巳自乗之方等見幾何原本九卷第四節故與原設甲乙丙丁長方積等之戊丁自乗之方加以己丁半較自乗之數開方而得戊巳為半和於戊巳相等之己辛半和減己丁半較而得丁辛與丁丙等之闊又與戊巳相等之甲巳半和加己丁半較而得甲丁之長也設如有長方面積一千二百五十四尺縱多五尺問長闊各幾何法列積如開平方法商之其一千二百為初商積可商三十尺乃以三十尺書於原積二十尺之上而以初商三十尺加縱多五尺得三十五尺以初商三十尺乗之得一千零五十尺書於原積之下相減餘二百零四尺為次商廉隅之共積乃以初商三十尺倍之得六十尺加縱多五尺得六十五尺為廉法以除二百零四尺足三尺則以三尺書於原積四尺之上而以廉法六十五尺加隅法三尺得六十八尺為廉隅共法以次商三尺乗之得二百零四尺書於餘積之下與餘積相減恰盡即知長方之闊得三十三尺加縱多五尺得三十八尺即為長方之長也如圖甲乙丙丁長方形容積一千二百五十四尺其甲乙邊長三十八尺甲丁邊闊三十三尺其甲乙長比甲丁闊所多之甲辛即縱多之數其甲戊己庚長方形容積一千零五十尺即初商所減之積其辛壬與辛戊俱三十尺即初商數其甲戊三十五尺即初商加縱多之數其戊乙丑己壬己子癸兩長方為兩方廉庚壬癸丁小長方為縱廉方廉有二縱廉止一故倍初商加縱多數為廉法其己丑丙子為隅其長闊皆與次商等故以次商為隅法合兩方廉一縱廉一小隅成一磬折形環附初商長方之兩傍成一大長方與平方之理無異若次商仍減積不盡則又為兩方廉一縱廉一小隅復成一磬折形得三商四商以至多商皆依此法遞析開之又法以積一千二百五十四尺用四因之得五千零一十六尺而以縱多五尺自乗得二十五尺加入四因之數得五千零四十一尺開方得七十一尺即為長闊相和之數乃以縱多五尺與長闊之和七十一尺相加得七十六尺折半得三十八尺即長方之長減縱多五尺即長方之闊也又法先將縱多五尺折半得二尺五寸為半較自乗得六尺二十五寸與原積一千二百五十四尺相加得一千二百六十尺二十五寸開方得三十五尺五寸為半和於半和減半較得三十三尺為闊於半和加半較得三十八尺為長也設如有長方面積一十八萬一千四百六十丈縱多八丈問長闊各幾何法列積如開平方法商之其一十八萬丈為初商積可商四百丈乃以四百丈書於原積八萬丈之上而以初商四百丈加縱多八丈得四百零八丈以初商四百丈乗之得一十六萬三千二百丈書於原積之下相減餘一萬八千二百六十丈為次商廉隅之共積乃以初商四百丈倍之得八百丈加縱多八丈得八百零八丈為㢘法以除一萬八千二百六十丈足二十丈則以二十丈書於原積四百丈之上而以廉法八百零八丈加隅法二十丈得八百二十八丈為廉隅共法以次商二十丈乗之得一萬六千五百六十丈書於餘積之下與餘積相減餘一千七百丈為三商廉隅之共積乃以初商次商之二百四十丈俱倍之得八百四十丈加縱多八丈得八百四十八丈為廉法以除一千七百丈足二丈則以二丈書於原積空丈之上而以廉法八百四十八丈加隅法二丈得八百五十丈為廉隅共法以三商二丈乗之得一千七百丈書於餘積之下與餘積相減恰盡即知長方之闊得四百二十二丈加縱多八丈得四百三十丈即為長方之長也又法以縱多八丈折半得四丈為半較自乗得十六丈與原積一十八萬一千四百六十丈相加得一十八萬一千四百七十六丈開方得四百二十六丈為半和於半和減半較得四百二十二丈為闊於半和加半較得四百三十丈為長也設如有長方面積四萬五千二百九十六尺縱多一百四十六尺問長闊各幾何法列積如開平方法商之其四萬尺為初商積可商二百尺加縱多一百四十六尺得三百四十六尺以所商二百尺乗之得六萬九千二百尺大於原積是初商不可商二百尺也乃改商一百尺書於原積四萬尺之上而以所商一百尺加縱多一百四十六尺得二百四十六尺以初商一百尺乗之得二萬四千六百尺書於原積之下相減餘二萬零六百九十六尺為次商廉隅之共積乃以初商一百尺倍之得二百尺加縱多一百四十六尺得三百四十六尺為廉法以除二萬零六百九十六尺足五十尺則以五十尺書於原積二百尺之上而以廉法三百四十六尺加隅法五十尺得三百九十六尺為廉隅共法以次商五十尺乗之得一萬九千八百尺書於餘積之下與餘積相減餘八百九十六尺為三商廉隅之共積乃以初商次商之一百五十尺倍之得三百尺加縱多一百四十六尺得四百四十六尺為廉法以除八百九十六尺足二尺則以二尺書於原積六尺之上而以廉法四百四十六尺加隅法二尺得四百四十八尺為廉隅共法以三商二尺乗之得八百九十六尺書於餘積之下與餘積相減恰盡即知長方之闊得一百五十二尺加縱多一百四十六尺得二百九十八尺即為長方之長也此法原積初商應得二百尺因加縱多相乗得數大於原積故改商一百尺始合凡開帶縱方遇此類者皆依此例推之又法加縱多一百四十六尺折半得七十三尺為半較自乗得五千三百二十九尺與原積四萬五千二百九十六尺相加得五萬零六百二十五尺開方得二百二十五尺為半和於半和減半較得一百五十二尺為闊於半和加半較得二百九十八尺為長也設如有長方面積一萬六千一百二十八尺縱多七十二尺問長闊各幾何法列積如開平方法商之其一萬為初商積可商一百尺加縱多七十二尺得一百七十二尺以初商一百尺乗之得一萬七千二百尺大於原積是初商不可商一百尺也乃改商九十尺書於原積一百尺之上而以所商九十尺加縱多七十二尺得一百六十二尺以所商九十尺乗之得一萬四千五百八十尺書於原積之下相減餘一千五百四十八尺為次商廉隅之共積乃以初商九十尺倍之得一百八十尺加縱多七十二尺得二百五十二尺為廉法以除一千五百四十八尺足六尺則以六尺書於原積八尺之上而以廉法二百五十二尺加隅法六尺得二百五十八尺為廉隅共法以次商六尺乗之得一千五百四十八尺書於餘積之下與餘積相減恰盡即知長方之闊為九十六尺加縱多七十二尺得一百六十八尺即長方之長也此法原積初商應得一百尺因加縱多相乗得數大於原積故改商九十尺而原積一萬尺之上應開百位者空其位而不計也或縱多太大過於初商所得之數則用四因積數之法或用縱多折半之法設例在後設如有長方面積三萬四千五百六十九尺縱多三千八百三十二尺問長闊各幾何法列積如開平方法商之其三萬尺為初商積應商一百尺而縱多數為三千轉大如初商數凡遇此類則用四因積數加較自乗開方法之或用半較自乗加於原積開方之法為明白簡易也故以縱多三千八百三十二尺折半得一千九百一十六尺為半較自乗得三百六十七萬一千零五十六尺與原積三萬四千五百六十九尺相加得三百七十萬五千六百二十五尺開方得一千九百二十五尺為半和於半和減半較得九尺為闊於半和加半較得三千八百四十一尺為長也設如有月臺一座共用方甎一千九百二十塊其長比闊多八塊問長闊兩面各用甎幾何法以長比闊多八塊折半得四塊為半較自乗得十六塊與積數一千九百二十塊相加得一千九百三十六塊開方得四十四塊為半和於半和四十四塊減半較得四十塊為闊面甎數於半和加半較得四十八塊為長面甎數也設如有銀三百六十兩賞人其人數比每人所得銀數為五分之二問人數及每人所得銀數各幾何法先用比例分其總銀數以五分為一率二分為二率三百六十兩為三率得四率一百四十四兩開方得十二為人數以人數除共銀數三百六十兩得三十兩為每人所得之銀數也此法以人數為闊其每人所得銀數為長成一長方形人數既居銀數之五分之二是闊為二分長為五分也今將其共銀分作五分而取其二分即人數與所得銀數相等而成正方形矣故開方而得人數也設如有長方面積八尺長闊相和六尺問長闊各幾何法列積如開平方法商之積八尺止可商二尺乃以二尺書於原積八尺之上而以所商二尺與和數六尺相減餘四尺以所商二尺乗之得八尺書於原積之下相減恰盡即知長方之闊得二尺與和六尺相減得四尺即為長方之長也如圖甲乙丙丁長方形容積八尺其甲乙邊長四尺甲丁邊闊二尺其甲丁與甲乙相併得六尺即長闊之和初商所得二尺即甲戊己丁正方之每一邊葢兩邊俱止一位故以初商所得為一邊於長闊和内減去初商所餘即又一邊是以兩邊相乗而與原積相等也此法比較數為問者在加減之異其以較數為問者以所商之數與較數相加此以和數為問者則以所商之數與和數相減也又法以積八尺用四因之得三十二尺而以和數六尺自乗得三十六尺減去四因之數餘四尺開方得二尺即為長闊相較之數乃以較數二尺與和數六尺相加得八尺折半得四尺即長方之長減較二尺得二尺即長方之闊也如圖甲乙丙丁長方形容積八尺四因之得甲乙丙丁戊己庚乙辛壬癸己子丁丑壬四長方形廻環相湊成一空心正方式較之和數六尺自乗之甲戊辛子正方形所少者止正中之一小正方形故相減即餘丑丙庚癸之一小正方形其丑丙類每一邊即長闊之較故開方得長闊之較既得較加於和數是為倍長故折半而得長長減較而得闊也此法比較數為問者亦在加減之異其以較為問者用較自乗與四因數相加開方而得和此以和為問者用和自乗與四因數相減開方而得較也又法先將和數六尺折半得三尺為半和自乗得九尺與原積八尺相減得一尺平方開之仍得一尺為半較於半和減半較得二尺為闊於半和加半較得四尺為長如圖甲乙丙丁長方形甲乙為闊甲丁為長甲壬為長闊和丁壬與丁丙闊等折半為甲庚半和將甲乙丙丁長方内之庚辛丙丁移於乙丑癸己則成甲丑癸己辛庚一磬折形與甲庚半和自乗之甲丑子庚正方形相減餘己癸子辛一小正方形即半較自乗之方故開方而得半較也故甲丑之半和減乙丑之半較得甲乙之闊於甲庚之半和加庚丁之半較得甲丁之長也又圖甲乙丙丁長方形容積八尺甲壬為長闊之和甲庚己庚庚壬皆半和甲丁長減等甲乙闊之甲戊餘戊丁為長闊之較其庚丁則為半較而甲丁己丁丁壬又為連比例之三線故己丁中率自乗之方與甲丁首率丁壬末率相乗之長方等見幾何原本九卷第三節則是己丁自乗之方與原設甲乙丙丁長方之積等也又己庚丁為勾股形其己丁邊自乗之方與丁庚邊自乗之方相併而與己庚自乗之方等見幾何原本九卷第四節故於己庚半和自乗方内減去與原設甲乙丙丁長方積相等之己丁自乗之數開方而得庚丁為半較於己庚相等之庚壬半和内減庚丁半較而得丁壬與丁丙等之闊又於己庚相等之甲庚半和加庚丁半較而得甲丁之長也設如有長方面積八百六十四尺長闊相和六十尺問長闊各幾何法列積如開平方法商之其八百尺為初商積可商二十尺乃以二十尺書於原積八百尺之上而以初商二十尺與和數六十尺相減得四十尺以初商二十尺乗之得八百尺書於原積之下相減餘六十四尺為次商廉隅之共積乃以初商二十尺倍之得四十尺與和數六十尺相減餘二十尺為廉法以除六十四尺足三尺因廉法内尚要減去商數為法故取大數為四尺則以四尺書於原積四尺之上而以廉法二十尺與次商四尺相減得十六尺以次商四尺乗之得六十四尺書於餘積之下與餘積相減恰盡即知長方之闊得二十四尺與和六十尺相減餘三十六尺即為長方之長也如圖甲乙丙丁長方形容積八百六十四尺其甲乙邊闊二十四尺甲丁邊長三十六尺甲戊為長闊和六十尺其丁戊與甲乙等甲子二十尺為初商數與辛戊等甲辛四十尺則和内減去初商之數兩數相乗成甲子己辛長方形即初商所減之積也丁戊既與甲乙等辛戊又與甲子等則丁辛與子乙等丁庚己辛小長方積與庚丑壬丙長方積等是則次商廉隅之共積即子乙壬丑之積也次於甲戊和内減倍初商數四十尺如寅戊餘甲寅二十尺與子癸等為廉法子乙者為次商數也子乙與丑癸等則於子癸廉法内減丑癸餘子丑與次商子乙相乗得子乙壬丑小長方即次商所減之積故減原積恰盡也以初商甲子二十尺合次商子乙四尺得甲乙二十四尺為闊於甲戊長闊和六十尺内減與甲乙相等之丁戊闊二十四尺得甲丁三十六尺為長也三商以後皆倣此遞析開之又法以積八百六十四尺用四因之得三千四百五十六尺而以和六十尺自乗得三千六百尺減去四因之數餘一百四十四尺開方得一十二尺即為長闊之較乃以較十二尺與和六十尺相加得七十二尺折半得三十六尺即長方之長減較十二尺得二十四尺即長方之闊也又法先將和數六十尺折半得三十尺為半和自乗得九百尺與原積八百六十四尺相減得三十六尺開方得六尺為半較於半和減半較得二十四尺為闊於半和加半較得三十六尺為長也設如有長方面積一萬九千三百一十二尺長闊相和二百七十八尺問長闊各幾何法列積如開平方法商之其一萬尺為初商積可商一百尺乃以一百尺書於原積一萬尺之上而以初商一百尺與和數二百七十八尺相減得一百七十八尺以初商一百尺乗之得一萬七千八百尺書於原積之下相減餘一千五百一十二尺為次商廉隅之共積乃以初商一百尺倍之得二百尺與和數相減得七十八尺為廉法以除一千五百一十二尺止足一十尺因廉法内尚要減去商數為法故取大數為三十尺則以三十尺書於原積三百尺之上而以廉法七十八尺與次商三十尺相減得四十八尺以次商三十尺乗之得一千四百四十尺書與餘積之下與餘積相減餘七十二尺為三商廉隅之共積乃以初商次商之一百三十尺倍之得二百六十尺與和數二百七十八尺相減餘十八尺為廉法以除七十二尺止足四尺亦因取大於足除之數故定為六尺則以六尺書於原積二尺之上而以廉法十八尺與三商六尺相減得十二尺以三商六尺乗之得七十二尺書於餘積之下與餘積相減恰盡即知長方之闊得一百三十六尺與和二百七十八尺相減餘一百四十二尺即為長方之長也此法次商三商皆取大於足除之數反覆商除始能相符不若四因積數減和自乗開方之法或半和自乗減原積開方之法為整齊也法以一萬九千三百一十二尺用四因之得七萬七千二百四十八尺而以和二百七十八尺自乗得七萬七千二百八十四尺減去四因之數餘三十六尺開方得六尺即為長闊之較乃以較六尺與和二百七十八尺相加得二百八十四尺折半得一百四十二尺即長方之長減較六尺得一百三十六尺即長方之闊也設如有長方面積六萬九千三百六十尺長闊相和七百八十二尺問長闊各幾何法列積如開平方法商之其六萬為初商積可除二百尺而以二百尺與和數七百八十二尺相減得五百八十二尺以初商二百尺乗之得十一萬六千四百尺大於積數乃改商一百尺書於原積六萬尺之上而以所商一百尺與和數七百八十二尺相減得六百八十二尺以初商一百尺乗之得六萬八千二百尺書於原積之下相減餘一千一百六十尺為次商廉隅之共積乃以初商一百尺倍之得二百尺與和數七百八十二尺相減得五百八十二尺為廉法以除一千一百六十尺止足二尺爰書空位於原積三百尺之上而以二尺書於原積空尺之上而以廉法五百八十二尺與三商二尺相減得五百八十尺以三商二尺乗之得一千一百六十尺書於原積之下與餘積相減恰盡即知長方之闊得一百零二尺與和七百八十二尺相減餘六百八十尺即為長方之長也此法初商應商二百尺因減縱相乗得數轉大於原積故改商一百尺凡遇此類不若用四因積數之法與半和自乗之法算之法以和數七百八十二尺折半得三百九十一尺自乗得一十五萬二千八百八十一尺與原積六萬九千三百六十尺相減餘八萬三千五百二十一尺開方得二百八十九尺為半較於半和減半較得一百零二尺為闊於半和加半較得六百八十尺為長也設如有錢四千七百六十文買果樹不知數但知樹之共數與每株之價相加得一百七十四問樹數及價各幾何法以共數一百七十四折半得八十七為半和自乗得七千五百六十九與共錢四千七百六十文相減餘二千八百零九開方得五十三為半較於半和減半較餘三十四為樹數於半和加半較得一百四十為樹價也此法以樹數為闊樹價為長成一長方形其樹數與樹價相加即如長闊之和故以半和自乗減積開方得半較既得半較以減半和為樹數加半和為樹價也設如有法書一卷共一千一百五十九字其行數與每行字數相加共八十問行數及字數各幾何法以和數八十折半得四十為半和自乗得一千六百與共字一千一百五十九相減餘四百四十一開方得二十一為半較於半和加半較得六十一為行數於半和減半較餘十九為每行字數也設如有五百八十八人用船均載其船數與每船所載人數相加比船數多四分之三問船數與每船所載人數各幾何法先用比例分其積以三分為一率一分為二率五百八十八人為三率得四率一百九十六人用開平方法開之得十四為船數以三因之得四十二為每船所載之人數也此以船數為闊每船所載人數為長成一長方形船數與人數相加即如長闊之和和數既比船數多四分之三則是和數為四分每船所載人數為三分船數為一分即闊為一分長為三分也故將共人數三分之而取其一則人數與船數同為一分而成正方形矣故平方開之即得船數每船所載人數既為船數之三倍故三因之為所載人數也御製數理精藴下編卷十一
