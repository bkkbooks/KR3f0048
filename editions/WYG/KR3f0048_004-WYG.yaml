body:
  text: 欽定四庫全書御製數理精藴上編卷四幾何原本十一幾何原本十二幾何原本十一第一作三界度等之三角形及兩界度等之三角形法如欲作三界度等之三角形則作一甲乙線取甲乙之度為準以甲為心自甲至丙作弧一段又以乙為心自乙至丙作弧一段兩弧相交處至甲乙作二線即成三界度等之甲丙乙三角形矣葢甲乙丙三角形之甲乙甲丙丙乙三界原係一圜之輻線其度必等度既等而線未有不等者也若欲作兩度等之三角形仍作一甲乙線比甲乙線之度或大或小取一度以甲乙二處為圜心皆至丙作弧兩段仍於兩弧相交處作二線即成兩界度等之甲丙乙三角形矣葢甲丙丙乙二線雖比甲乙線或大或小然二線俱同為一圜之輻線其度自等兩度既等則兩界線亦必等也第二平分直線角為兩分法如甲乙丙角欲平分為兩分乃以一角為心任意作弧線一段則乙甲乙丙二線截於丁戊即成乙丁乙戊等度二線自弧兩端復作一丁戊線照丁戊線度依前節法作一三界度等之丁己戊三角形則己角與乙角正相對乃自乙角至己角作一乙己直線即分甲乙丙角為兩平分矣何也其乙丁己乙戊己兩三角形之乙丁乙戊二界是一圜之輻線其度等而丁己戊己二界是三界度等三角形之兩傍界其度亦等而乙己線既為兩形之共界其等無疑此兩三角形之各界度既各相等則與丁己戊己界相對之丁乙己戊乙己二角亦必相等可見矣見二卷第七節第三平分一直線為兩分法如有甲乙一直線欲平分為兩叚乃如第一節法於甲乙線上作乙甲丙乙三界度等之三角形又如第二節法平分甲丙乙角為二分自丙角作垂線至甲乙線即平分甲乙線於丁而甲丁丁乙兩叚必等也葢甲丙乙原為三界度等之三角形今作丙丁垂線平分為兩三角形則兩三角形之相當各角各界必俱等而甲丁丁乙為兩形相當之底界其度安得不等乎第四横線上立縱線法如有甲乙一横線欲於丙處立一縱線則於丙之兩傍任意取等度二分為戊丙己丙以戊為心於横線上作弧一叚又以己為心於横線上作弧一叚兩弧相交於丁此丁處正與丙相對自丁至丙作一直線即甲乙線上正立之縱線也試自戊己至丁作二線成一戊丁己三角形此形之丁戊丁己兩線俱同一圜之輻線其度必等而丁丙線既將戊己底線為兩平分則丁丙線必為甲乙線之垂線矣見二卷第十節第五有一横線自此線上不拘何處立縱線法如有甲乙一横線自此線上丙處至甲乙線欲作一縱線則以丙為心作弧線一叚截甲乙線於戊己乃自戊己至丙作二線成一戊丙己三角形又照第二節分角法平分丙角為二分自丙至甲乙線上作丙丁線則此丙丁線即為自丙至甲乙線之縱線也葢戊丙己三角形之丙戊丙己兩界度等故戊角與己角必等而丙丁線又平分丙角為二則所分之戊丙丁己丙丁兩角度亦等而丙丁戊丙丁己兩並角亦必等此兩並角既等則成兩直角既成兩直角則丙丁線必為甲乙横線之垂線矣見一卷第十節第六在横線一邊立縱線法如有甲乙横線在乙邊欲立一縱線則於甲乙線上不拘何處立為圜心如以丙為圜心自丙至乙為圜界旋轉作一圜則於甲乙線丁處相交即自丁處過丙心至相對界作一直線交圜界於戊乃自戊至乙作一戊乙直線即是乙邊所立之縱線也葢丁乙戊角因在半圜必為直角見四卷第十四節既為直角則戊乙線必為甲乙線之垂線既為垂線故為横線一邊所立之縱線也若甲乙線一邊之上有一戊㸃欲自戊至甲乙線一邊作一垂線則自戊至甲乙線任意作一戊丁斜線遂將戊丁斜線平分於丙於是以丙為心自戊旋轉作一圜則截甲乙線於己自戊至己作一直線即是欲作之垂線也葢戊己丁角既在半圜必為直角既為直角則戊己必為垂線矣第七一圜分為三百六十度法如甲乙丙丁一圜界欲分為三百六十度則取圜之輻線度縁圜界比之即分圜界為六叚將六叚各平分為二則為十二叚十二叚各平分為三則為三十六叚三十六叚各平分為十即成三百六十度矣第八一直線上作角度法如甲乙線上欲作三十度之角則用有度之圜依圜之丙丁輻線度截甲乙線於戊於是以甲為心自戊作弧一叚復依圜界之丙庚三十度之分自戊截弧於己乃自己至甲作一直線即成己甲戊三十度之角矣第九各種多界形倣己有之形或大或小叧作一同式形法如有甲乙丙一三角形欲倣此式叧作一形則考甲乙界度有㡬分如甲乙界度為三分今取其二分作一丁戊線又以甲丙界度亦作三分而取其二分以丁為圜心作弧一叚又以乙丙界度亦作三分而取其二分以戊為圜心作弧一段兩弧相交於己乃自己至丁戊作二線即成丁戊己一小三角形與原有甲乙丙大三角形為同式也葢丁戊己三角形之三界雖與甲乙丙三角形之三界不等而其相當各角之度俱等因其相當各角之度俱等故其相當各界之比例皆同相當各界之比例既同則其二形之式不得不同也若有一甲乙丙丁戊己六界形欲倣此式叧作一形則在此六界形作分角線分為四三角形照前法倣作四三角形即成一庚辛壬癸子丑小六界形其式與原有之甲乙丙丁戊己大六界形同也第十有一直線或上或下一㸃作與此線平行一線法如甲乙線上有一丙㸃欲自丙㸃作與甲乙線平行一線則以丙為圜心任意取甲乙線之近甲邊一處作弧一叚如丁又取甲乙線之近乙邊一處為心如戊乃照丙丁原度於丙㸃相對處作弧一叚如己復照丁戊度以丙為心於丙㸃相對處作弧一叚則二弧相交於己乃自丙至己交處作一丙己直線即為甲乙線之平行線也何則試自丁戊二處至丙己二處作二線即成丙丁戊己一四界形此四界形之丙丁己戊相對之兩縱線丙己丁戊相對之兩横線因依各度所取必两两相等既两两相等則必為平行線之四邊形然則丙己甲乙為平行線四邊形之二線豈有不平行之理哉第十一有一直線上作一正方形法如甲乙一直線欲作一正方形則以甲為心取甲乙度自乙至丙作乙弧線又以乙為心依甲乙度自甲至丁作一弧線又於甲乙線之兩端照本卷第六節立甲丙乙丁二縱線則乙丙弧截於丙甲丁弧截於丁乃自丙至丁作一直線即成甲乙丁丙一正方形也何則丙甲甲乙乙丁三線俱同為一圜之輻線其度必等而丁丙丙甲二線又俱切一圜界為兩尖相合其度亦必等見四卷第七節則四界俱等矣且甲乙二角又為垂線所立之角必成直角則丙丁二角亦必為直角而四角又等矣四角皆等故甲乙丁丙形為甲乙線上所立之正方形也第十二平分一弧為兩叚法如有甲乙弧欲平分為兩叚則自甲至乙作一甲乙弦線將此弦線照本卷第三節平分直線為兩分法作一戊丁縱線復自戊引至弧界截甲乙弧於丙即平分甲乙弧為甲丙丙乙兩叚矣葢丙丁縱線既平分甲乙弦線則亦必平分甲乙弧之全圜既平分甲乙弧之全圜則必平分甲乙弧為兩叚可知矣見四卷第六節第十三有一叚弧欲繼此弧作一全圜法如有甲乙一叚弧繼此弧欲作一全圜則在此弧界任意指三處如甲丙乙自甲乙二處至丙作甲丙丙乙二線照前節作平分甲丙丙乙兩弦之丁己戊己二線引長則相交於己乃以己為心繼甲乙弧界作一全圜即成甲乙弧之全圜也葢丁己戊己二線既平分甲丙丙乙二弦則必平分甲丙丙乙二弧見四卷第六節既平分甲丙丙乙二弧則其相交之處必為圜心故己為繼甲丙乙弧界所作全圜之圜心也第十四不拘何處有三㸃求縁此三㸃作一圜法如甲乙丙三㸃不在一直線上欲縁此三㸃作一圜則依前節作甲丙丙乙二線又平分此二線正中作丁己戊己二垂線引長至己處相交遂以己為心以甲乙丙為界作一圜則甲乙丙三㸃俱在一圜之界矣此節之理與前節同第十五有圜不知中心求知中心之法如有一甲乙丙丁圜不知其中心欲求知之則於此圜界隨便取甲乙丁三處從甲至乙至丁作二弦線將此二線平分正中為戊己二處自戊己作戊庚己庚兩垂線則相交於庚此庚即是甲乙丙丁圜之中心也此節之理亦與前同第十六有圜外一㸃將此㸃至圜界作切線法如一圜之外有一甲㸃欲將此甲㸃與圜界相切作一切線則以此甲㸃至圜心作一甲乙直線又以乙為心以甲為界作一甲丙圜界又自甲乙線所截圜之丁處作一丁己垂線則此垂線即截甲丙圜界於丙乃自丙至乙心作一丙乙直線復自丙乙所截圜界戊處作一戊甲線即是自甲㸃至圜界所作之切線也何則此乙丁乙戊既同為一圜之輻線其乙甲乙丙亦同為一圜之輻線則甲乙戊與丙乙丁兩三角形之各兩邊線必等而兩三角形又同一乙角然則兩三角形之每相當各角必俱等矣見二卷第六節夫丁丙線原為甲乙輻線之垂線則丁角必為直角而相當之戊角亦必為直角矣戊角既為直角則甲戊線亦必為乙丙輻線之垂線故甲戊與丙丁皆為圜界之切線也見四卷第九節第十七有圜内弦線欲與此弦線平行作圜外切線法如有一甲乙丙丁圜之乙丁弦線欲與此乙丁弦線平行作切圜之切線則從圜心戊至乙丁弦作戊己垂線平分乙丁弦線於己引長截圜界於甲為甲戊線又切甲處作庚辛線為甲戊之垂線即是所求之切線也何則此庚辛線既為甲戊線之垂線其戊甲庚角必為直角又己戊線既為乙丁線之垂線其戊己乙角亦必為直角然則戊甲庚角與戊己乙角既俱為直角其度必等因其度等故乙丁庚辛兩線為兩平行線也又戊甲線為圜之輻線而庚辛既為甲戊之垂線則必為甲乙丙丁圜之切線可知矣見四卷第九節第十八作函三角形之圜法如甲乙丙三角形欲作函此三角形之一圜則平分甲丙邊於丁平分丙乙邊於戊自丁戊作二垂線引長至己相交即以己為心任以甲丙乙三角形之一角為界作一甲丙乙庚圜即是函甲丙乙三角形之圜也此節之理與本卷第十三節同第十九圜内作等度四角形及等度八角形法如甲丙乙丁圜内欲作一等度四角形則以甲乙丙丁二徑線交於圜心皆作直角復自甲丙乙丁四處作甲丙丙乙乙丁丁甲四弦線即成甲丙乙丁等度之四角形也何則甲乙丙丁二徑線在圜心作直角相交則平分圜界為四分矣既平分圜界為四分則甲丙丙乙乙丁丁甲四弦線度必等而甲丙乙丁四角既俱立在一圜之半界亦必俱為直角見四卷第十四節既俱為直角必為正方形可知矣苟欲作等度八角形則照前平分圜界為四分將所分之每分又各平分為二分即平分圜界為八分乃作八弦線即成甲戊丙己乙庚丁辛一形為圜内等度八角形也第二十圜内作等度六角形三角形十二角形法如甲圜内欲作等度六角形則以圜之甲乙輻線為度將圜界分為乙丙丙丁丁戊戊己己庚庚乙六叚作六弦線即成一乙丙丁戊己庚等度之六角形也何則苟以乙為心以甲為界作一丙甲庚弧線則乙丙乙甲二線俱為丙甲庚圜之輻線而度必等夫乙丙丁戊己庚六界形之諸界因俱照甲乙輻線度所作故此形之六界俱相等也若欲作三角形則照前法將圜界分為六叚以所分六叚兩兩相合為三叚作乙丁丁己己乙三弦線即成一乙丁己等度三角形也若欲作十二角形亦照前法將圜界分為六叚以所分六叚各平分為二分作十二弦線即成一乙辛丙壬丁癸戊子己丑庚寅等度之十二角形也第二十一圜内作各種等度多界形總法苟甲圜内欲作等度多界各種形則察各種形之各角度見三卷第十七節如等度三角形之三角俱六十度四角形之四角俱九十度五角形之五角俱一百零八度六角形之六角俱一百二十度七角形之七角俱一百二十八度三十四分一十七秒八角形之八角俱一百三十五度九角形之九角俱一百四十度十角形之十角俱一百四十四度十一角形之十一角俱一百四十七度一十六分二十二秒十二角形之十二角俱一百五十度今甲圜内若欲作一等度九角形則以九角形之每角一百四十度與一百八十度相減餘四十度復以别有度之圜取四十度之分以分甲圜界即平分為乙丙丁戊己庚辛壬癸之九分再照平分度作乙丙丙丁丁戊戊己己庚庚辛辛壬壬癸癸乙九弦線即成甲圜内等度之九角形也何也從圜心甲作線至各角分九角形為九三角形其每三角形之三角共一百八十度内減去二界角一百四十度餘心角四十度即每界所對之角此九角形之每界即九心角之弦線故以心角度分圜界度即得九角形之分也凡圜内欲作等邊多界形皆依此法作之第二十二作函圜等度多界形法如欲作函圜之等度三角形四角形五角形或多界形則將圜界照欲作之幾界平分為幾段乃自圜心至所分各界作幾輻線於輻線之末各作切界線俱引長至合角即成函圜之等度多界形也如第一圖自甲心至庚辛壬三角作甲庚甲辛甲壬三線即成六三角形其庚甲乙庚甲丙兩三角形之庚乙庚丙二線為合尖切圜之線其度必等見四卷第七節而庚甲乙辛甲丁兩形之庚甲乙辛甲丁二角為對角其度又等庚乙甲辛丁甲之二角為輻線切線所成之角其度又皆為直角相等見四卷第五節則其餘一角亦必等而其乙甲甲丁二界又同為一圜之輻線其度必等則其他界亦必俱等可知再辛丙辛丁二線壬丁壬乙二線俱為合尖切圜之線其度相等而辛甲丙與壬甲乙兩三角形壬甲丁與庚甲丙兩三角形必俱與前每相當之角等則此六三角形俱相等矣六三角形俱相等則其庚乙乙壬壬丁丁辛辛丙丙庚相等之六界兩兩相合即成庚壬庚辛辛壬之三界其度安得不等乎故庚辛壬三角形為函圜等界形也其第二圖函圜四角形第三圖函圜五角形或更欲作多界形其理皆同第二十三作函等度多界形之圜法如甲乙丙三角形或甲乙丙丁四角形或甲乙丙丁戊五角形欲作函此三形之圜則任用此三形之甲乙乙丙二界平分於庚辛二處乃自庚辛二處各作垂線至各形中心相交為己即以己為心以各形之角為界作圜即成函此三形之圜也何也各形之界皆為圜之弦線而弦線上所作之垂線必皆交於圜心今甲乙乙丙二界上所作之庚己辛己二線既平分二界而相交於已則己必為圜心故以己為心作圜即成函各等界形之圜也第二十四作函於等度多界形之圜法如甲乙丙三角形或甲乙丙丁四角形或甲乙丙丁戊五角形欲在此三形内各作一圜則照前節平分甲乙乙丙二界作己庚己辛二垂線引長相交於己即以己為心以庚辛為界作圜即成多界形内所函之圜也何也己庚己辛二線是平分甲乙乙丙二線之垂線引長之必相交於各形之中心今既相交於己則己必為各形之心凡形心作垂線至各界其度必等即如圜之輻線故以己為心庚辛為界所作之圜即為各等界形所函之圜也第二十五有一三角形一圜形於此圜内作切圜界三角形與原有之三角形同式法如有甲乙丙一三角形丁戊己庚辛一圜形欲於此圜内作一切界三角形與原有之甲乙丙三角形同式則於圜界任意作與甲角相等之辛角將此角之兩邊線俱引至圜界作辛庚辛戊二線再自戊至庚作一戊庚線又於戊處作與乙角相等之庚戊丁角爰自戊至丁作一丁戊線復自庚至丁作一庚丁線成一丁戊庚三角形即是所求之圜内切界三角形與原有之甲乙丙三角形為同式也何則其庚辛戊三角形之辛角與庚丁戊三角形之丁角其尖既俱與圜界相切而共立於戊己庚一叚弧分其度必等見四卷第十二節此辛角原與甲角等則丁角亦必與甲角等又庚戊丁之戊角原係依甲乙丙之乙角之度而作者固相等夫丁角與甲角戊角與乙角既等則所餘之庚角與丙角亦必等其三角既俱等其兩形必為同式可知矣第二十六有一三角形一圜形於此圜外作切界三角形與原有之三角形同式法如有甲乙丙一三角形戊己庚一圜形欲於此圜外作一切界三角形與原有之甲乙丙三角形同式則將原有之甲乙丙三角形之乙丙底線引長至辛壬二處此兩傍即成辛乙甲壬丙甲二外角乃於圜心丁處作與辛乙甲角相等之戊丁庚角又作與壬丙甲角相等之己丁庚角則成丁戊丁己丁庚之三輻線於三輻線之末作三垂線引長相交成一癸子丑三角形即是所求之圜外切界三角形與原有之甲乙丙三角形為同式也何則凡三角形之三角相併必與二直角等見二卷第四節今戊丁庚子一四邊形可分為兩三角形則此四邊形之四角相併必與四直角等矣四直角内減去子戊丁子庚丁之兩直角所餘戊丁庚戊子庚兩角相併亦必與兩直角等也又辛乙甲外角與甲乙丙内角相併亦與二直角等見一卷第十四節其戊丁庚角既係依辛乙甲角之度而作者則戊子庚角必與甲乙丙角相等其庚丑己角亦必與甲丙乙角相等而己癸戊角又必與乙甲丙角相等三角俱等則兩形之式必相同也第二十七三角形内作切三界之圜法如有一甲乙丙三角形欲與此形内切三界作一圜則依此卷第二節之法將甲乙丙三角俱平分為兩分所分三角之三線俱引長使相交於丁自丁至甲乙乙丙丙甲三界線作丁戊丁己丁庚三垂線乃以丁為心以戊己庚為界作一圜即是三角形内之切界圜也何則戊甲丁與庚甲丁兩小三角形之甲角因自一角為兩平分其度必等又丁戊丁庚既係兩垂線則甲戊丁甲庚丁二角俱為直角而相等此戊甲丁庚甲丁兩小三角形内之二角既等其各三角必俱相等而又共用一甲丁線為邊則此兩三角形之各相當邊亦必俱等故丁戊線與丁庚線等者即是丁己線與丁戊線丁庚線等也此三線既等以為輻線作戊己庚圜則必與三角形之甲乙乙丙丙甲三界相切矣第二十八勾股形内作正方法如有一甲乙丙勾股形欲於此形内作一正方形則以丙為心以乙為界作一乙丁弧線將此弧線平分於戊自戊至丙作一戊丙線即平分丙角為兩分而截甲乙線於庚矣乃自庚與甲丙線平行作庚己線又自庚與乙丙線平行作庚辛線即成庚己丙辛一正方形為所求甲乙丙勾股形内之正方也何則甲丙乙勾股形之丙角原是直角今庚辛庚己二線各與甲丙乙丙平行則庚己丙辛之四角必俱為直角矣而庚己丙三角形内己庚丙角與己丙庚角又俱是直角之一半其度必等則己丙線與庚己線相等而庚辛線與己丙線庚己線與辛丙線皆為平行線内之垂線其度亦等故庚己己丙丙辛辛庚四線相等而庚己丙辛四角俱為直角是為甲乙丙勾股形内之正方形也第二十九勾股形内作正方第二法如有一甲乙丙勾股形欲於此形内作一正方則將乙丙線引長照甲乙線度増於乙丙作一壬丙線自此壬丙之兩末與甲乙線平行作丁壬癸丙兩垂線使其度俱與甲乙線等又自丁至癸與壬丙線平行作一丁癸線自丁至丙作一對角線截甲乙線於戊乃自戊與乙丙線平行作戊己線截甲丙線於己又自己與戊乙線平行作己庚垂線成一戊乙庚己正方形即為甲乙丙勾股形内欲作之正方也何則試將戊己線引長成辛戊己子線則此辛戊己子線與甲乙線分丁壬丙癸為四長方形其甲戊子癸長方與辛壬乙戊長方既為丁壬丙癸大長方對角線傍所成兩形其分必等見三卷第七節故子戊線與戊辛線之比例同於乙戊線與戊甲線之比例也然此子戊線與丙乙線等而戊辛線又與甲乙線等則丙乙線與甲乙線之比例亦同於乙戊線與戊甲線之比例也又甲乙丙與甲戊己兩三角形為同式故丙乙線與乙甲線之比例同於己戊線與戊甲線之比例而乙戊線與戊甲線之比例又同於己戊線與戊甲線之比例也乙戊線既與己戊線相等而乙庚線與戊己線己庚線與戊乙線又為兩平行線内之垂線其度相等故戊乙庚己四角俱為直角戊乙庚己四角既俱為直角則戊乙庚己之方形即是甲乙丙勾股形内之正方矣第三十三角形内作正方法如有甲乙丙三角形欲於此形内作一正方則自甲角至乙丙底線作一甲辛垂線將此垂線引長出甲角如乙丙底線度作一壬辛線又自壬兩分如乙丙線度與乙丙線平行作一子癸線又自癸至辛作癸辛線截甲乙線於丁自子至辛作子辛線截甲丙線於庚乃自丁至庚作一庚丁線此線必與乙丙平行又自庚丁二處作庚己丁戊二垂線即成丁戊己庚一正方形即為甲乙丙三角形内欲作之正方也何則壬辛線與壬子線之比同於辛丑線與丑庚線之比而辛壬線與壬癸線之比又同於辛丑線與丑丁線之比故辛壬線與癸子線之比亦必同於辛丑線與丁庚線之比也然辛壬與癸子原相等則辛丑與丁庚亦必相等矣辛丑與丁庚既等則丁戊戊己己庚庚丁四邊亦必俱等丁戊戊己己庚庚丁四邊既俱等則為甲乙丙三角形内之正方無疑矣第三十一有一直線將此線為正方對角線作正方法如有一甲乙直線欲以此線為對角線作一正方則將甲乙線平分為戊以戊為心以甲乙為界作一圜即於此圜内作一丙丁徑線為甲乙線之垂線乃自甲至丙自丙至乙自乙至丁自丁至甲作四直線即成甲丁乙丙一正方形為所求之正方也葢甲丙乙角丙乙丁角乙丁甲角丁甲丙角既俱在半圜内必俱為直角而甲戊丙丙戊乙乙戊丁丁戊甲四三角形之兩傍線俱是半徑線必相等又此四三角形之兩傍線所合之角俱為直角亦必相等則甲丙丙乙乙丁丁甲四直線必俱相等可知矣甲丙乙丁四邊形内四角既俱為直角而四邊線又俱相等則必為正方形而甲乙線為其對角線矣第三十二有一直線為正方邊與對角線相較之餘於此線求作其原正方法如有一甲乙線為正方邊與對角線相較之餘求作一正方則先將此甲乙線為一邊作甲乙丙丁一小正方形次自甲至丙作一小對角線於是以丙為心以乙為界作一圜乃引甲丙線至圜界戊處作一甲戊線將此甲戊線為度作一甲戊己庚大正方形即是所求之正方也試引甲乙線至己作甲己一對角線此對角線之乙己一叚必與戊己邊線相等何也其丙乙丙戊為一圜之二輻線既等則丙乙戊丙戊乙二角亦等若於丙乙己直角内減去丙乙戊角又於所作丙戊己直角内減去丙戊乙角所餘戊乙己乙戊己二角亦必相等此二角既等則乙己戊己兩線必等矣因其相等則所作甲戊己庚一大正方之甲己對角線與戊己一邊線相較則原有之甲乙線為其相較之餘可知矣㡬何原本十二第一有一直線將此線為底作一兩邊度等三角形使底之兩邊各一角俱比上一角為大一倍之三角形法如有一甲乙直線將此線為底欲作兩邊度等之三角形而底之兩邊各一角俱比上一角為大一倍則用十一卷第八節之法於甲乙線之兩頭各作一七十二度之角將兩邊線俱引長相交於丙即成一甲乙丙三角形為所求之形也何則凡三角形之三角相併為一百八十度與二直角等今此所作甲乙丙三角形之甲乙兩角既俱係七十二度則於一百八十度内減去甲乙二角共一百四十四度餘三十六度即為丙角之度三十六度者七十二度之半故甲乙兩底角比丙角各大一倍也第二有一直線依此線度作兩邊度等三角形使上一角小於兩底角一倍之三角形法如有甲乙一直線以此線為一邊復依此線度作一邊使此兩邊線所合之上一角小於兩底角一倍之三角形則用十一卷第八節之法以甲乙甲丙二線之甲末相合作一乙甲丙角為三十六度再自丙至乙作一乙丙直線為底即得一甲乙丙三角形為所求之形也何則將甲角三十六度與全形三角之共數一百八十度相減餘一百四十四度為乙丙兩底角之共數今甲丙線與甲乙線既等則乙角與丙角必等因其相等將兩底角共數一百四十四度折半得七十二度即為每一底角之數七十二度者三十六度之倍數故甲角比乙丙兩底角俱為小一倍也第三有一直線以此直線為一邊作等邊等角之五界形法如有甲乙一直線以此直線為一邊作一等邊等角之五界形則將此甲乙直線為底用此卷第一節法作一兩邊度等甲丙乙三角形其甲丙乙角為丙乙甲丙甲乙二角之各一半又用十一卷第十五節法於此三角形之週圍作一圜此甲丙丙乙兩直線原係相等其相對之兩弧亦必相等乃以此兩弧自戊丁二處為丙平分又自甲至戊自戊至丙自丙至丁自丁至乙作四直線即成甲乙丁丙戊五邊五角等度之五界形也何則其甲丙乙角原為丙乙甲角之一半則甲丙乙角為三十六度試自甲乙二處至圜心作甲己乙己二線成甲己乙一三角形則此甲己乙角比甲丙乙角亦為大一倍見四卷第十一節故甲己乙角為七十二度而甲乙弧線亦為七十二度矣以七十二度於全圜界三百六十度内減之餘二百八十八度折半得一百四十四度即為甲戊丙一叚弧線之數也冄將一百四十四度折半得七十二度即為甲戊一叚弧線之數也既得甲戊弧線之數則戊丙丙丁丁乙各弧線度俱各為七十二度矣甲乙乙丁丁丙丙戊戊甲五線既俱係相等弧之弦線則五線之度必俱等五線之度既等則此形又在圜之内而五角之度豈有不相等者哉第四有一直線分大小兩分為相連比例線法如甲乙直線為全分甲丙一叚為大分丙乙一叚為小分以甲乙全分與甲丙大分之比同於甲丙大分與丙乙小分之比則用此甲乙線為一邊線依此卷第二節法作兩邊等度之兩底角比上一角各大一倍之甲乙丁三角形又依此卷第三節法取乙丁線度作邊角俱等之甲戊乙丁已五邊形又自戊至丁作一直線截甲乙線於丙乃得甲丙一大叚為大分丙乙一小叚為小分即是所欲作之相連比例線也何則甲戊乙丁兩弧線度等則甲乙戊乙戊丁兩角度必等又乙戊丁角與乙甲丁角共立於乙丁弧其度必等再甲戊丁與甲乙丁二角亦同立於甲巳丁弧其度亦必等也至於甲乙丁角原比乙甲丁角大一倍故甲戊丁角比丙戊乙角丙乙戊角俱大一倍其甲丙戊角因為戊丙乙三角形之外角與丙乙戊丙戊乙兩内角等故甲丙戊與甲戊丙兩角相等此二角既等則甲丙甲戊兩線必等矣又甲戊戊乙兩線度原相等其戊甲乙角必與戊乙甲角等而甲乙戊一大三角形必與戊乙丙一小三角形為同式形矣葢小三角形之丙戊乙角與大三角形之戊甲乙角等而小三角形之丙乙戊角與大三角形之甲乙戊角為共角而等則小三角形之戊丙乙角與大三角形之甲戊乙角不得不等三角俱等非同式形而何是故甲乙線與甲戊線之比必同於乙戊線與丙乙線之比也夫甲戊原與甲丙相等而乙戊原與甲戊相等故乙戊亦與甲丙相等然則甲乙全線與所分甲丙大分之比必同於甲丙大分與丙乙小分之比可知矣故曰甲乙與甲丙甲丙與丙乙為相連比例之線也第五平分一直線為數叚法如有甲乙一直線欲平分為三分則自甲乙線之兩末作甲丙乙丁二平行線隨意取一甲戊度將甲丙線分為甲戊戊庚庚丙三叚又依甲戊度將乙丁線亦分為乙辛辛巳巳丁三叚乃自二平行線之三叚處復作甲丁戊己庚辛丙乙四平行線即平分甲乙直線為甲壬壬癸癸乙之三分矣試觀甲乙丁三角形之甲乙乙丁兩傍線為與甲丁線平行之壬己癸辛二線所分故俱為相當率今以甲乙全線與乙丁全線之比同於丁已叚與甲壬叚之比而已辛叚與壬癸叚之比辛乙叚與癸乙叚之比亦皆與甲乙全線與乙丁全線之比相同也因其比例俱同故丁乙線之丁巳巳辛辛乙三叚為平分而甲乙線之甲壬壬癸癸乙三叚亦為平分也第六有分數之直線將别一直線依此線分分為相當比例率法如有甲乙一直線原分為甲巳巳辛辛乙三叚又有一丙丁直線欲依此甲乙線分分作三分為相當比例之率則齊二線之一端以為平行線自甲乙線之甲端過丙丁線之丙端作一縱線復自甲乙線之乙端過丙丁線之丁端作一斜線則二線相交於戊乃自戊至所分巳辛二處作戊巳戊辛二線則丙丁線即分為丙庚庚壬壬丁三叚與甲乙線之甲巳己辛辛乙三叚為相當比例率也試審戊甲乙全形内戊丙庚戊甲已戊庚壬戊已辛戊壬丁戊辛乙之大小六三角形其相當各式皆同如戊丙庚與戊甲已為同式戊庚壬與戊巳辛為同式戊壬丁與戊辛乙為同式故丙庚與甲已為相當二界庚壬與已辛為相當二界壬丁與辛乙為相當二界此六線既各為相當界故各為相當比例率也第七有二直線作與此二線相連比例之第三線法如有甲乙甲丙二直線欲作與此二線相連比例之第三線則將甲乙甲丙二線之甲末合成一角照甲丙線度增於甲乙線為甲戊線自乙末至丙末作一乙丙線又與乙丙線平行自戊末作一戊己線將甲丙線引至已處乃成一甲已線其自丙末所分之丙已線即為與甲乙甲丙二線相連比例之第三線也葢已戊線既與丙乙線平行故甲乙丙三角形與甲戊己三角形為同式而甲乙甲丙乙戊丙已四叚必為相當比例之四率是以甲乙第一率與甲丙第二率之比即同於乙戊第三率與丙巳第四率之比也夫乙戊之度原與甲丙等故甲乙與甲丙之比即甲乙與乙戊之比而甲丙與丙已之比即乙戊與丙巳之比然則甲乙與甲丙甲丙與丙巳豈非相連比例之三線乎第八有三直線作與此三線相當比例之第四線法如有甲乙甲丙乙丁三線欲作與此三線相當比例之第四線則取甲丙線度叧作一甲丙線將此所作甲丙線照甲乙線度紀於乙於是以甲為心自乙作弧一叚又取原有之乙丁線度自乙截弧線於丁即自乙至丁作一乙丁線再依甲丙線度自甲過丁作一甲戊線又與乙丁線平行作一戊丙線此戊丙線即為原三線相當比例之第四線也葢甲丙戊三角形與甲乙丁三角形為同式故甲乙線與甲丙線之比即同於丁乙線與戊丙線之比因其比例相同故戊丙線為原有之甲乙甲丙乙丁三線相當比例之第四線也或欲作相當比例之數線則將甲角上下二線引長為甲癸甲子凡相當各二處任意截為㡬叚作㡬平行線既得相當比例之數線矣如以甲角之甲子甲癸二線截為丁乙戊丙庚巳壬辛子癸五叚於所截五處作五平行線即得相當比例之十率矣葢以甲乙與甲丙之比同於丁乙與戊丙之比以甲丙與甲巳之比同於戊丙與庚已之比以甲已與甲辛之比同於庚已與壬辛之比以甲辛與甲癸之比同於壬辛與子癸之比故將甲子甲癸二線雖分為無數叚作無數平行線其比例亦無不相同也第九有二直線欲叧作一線為此二線之中率法如有甲乙乙丙二線欲另作一線為此二線之中率則將甲乙乙丙二線相連為一甲丙全線乃平分全線於戊以戊為心以甲丙兩末為界作一半圜自二線相連乙處至圜界作一丁乙垂線即為原有甲乙乙丙二線之中率線也何也丁乙線既為圜徑上之垂線則甲乙丁乙乙丙為相連比例之三率見九卷第七節故甲乙線與乙丁線之比同於乙丁線與乙丙線之比也比例既同則所作乙丁線為原有甲乙乙丙二線之中率可知矣第十有二直線欲另作二線為此二線間之兩率法如有甲乙乙戊二直線欲另作二線為此二線間之兩率則將甲乙乙戊二線之乙末相合為直角又自此二線所合乙角引長為甲乙丙戊乙丁二線次將二矩尺之二角正置於丁戊甲丙二線上如一矩尺為己庚辛一矩尺為壬癸子乃以巳庚辛矩尺之一股切於丁戊線之戊末又以壬癸子矩尺之一股切於甲丙線之甲末仍使二矩尺之已庚癸子二股相合則癸庚二角亦為直角而不離於所跨之線其二矩尺之壬辛二股亦使不離於所切之線末乃自甲至癸自戊至庚自庚至癸作三線即截丁乙線於癸截乙丙線於庚成乙癸乙庚二線即為原有之甲乙乙戊二線間之兩率也何也如平分戊癸線於丑則丑為心戊為界成一戊庚癸半圜若平分甲庚線於寅則寅為心甲為界成一甲癸庚半圜今乙癸線為甲癸庚半圜徑線上之垂線故乙癸為甲乙乙庚二線之中率而乙庚線為戊庚癸半圜徑線上之垂線故乙庚又為癸乙乙戊二線之中率是以甲乙線與乙癸線之比同於乙癸線與乙庚線之比而乙癸線與乙庚線之比亦同於乙庚線與乙戊線之比因其比例相同故乙癸乙庚二線為甲乙乙戊二線間之兩率也第十一有三角形依一界作等積之直角四界形法如有甲乙丙一直角三角形欲依其乙丙界作一直角四界形與原三角形積等則與乙丙平行作一甲丁線又與甲乙平行作一丁丙線即成一甲乙丙丁直角四界形於是平分甲乙線於戊平分丙丁線於巳作一戊巳線則平分甲乙丙丁四界形為兩形此所分甲戊巳丁與戊乙丙已兩直角四界形之積俱與甲乙丙三角形之積相等也葢甲乙丙三角形為甲乙丙丁四界形之一半今所分甲戊巳丁與戊乙丙已兩四界形既俱為甲乙丙丁四界形之一半則必與甲乙丙三角形之積俱相等可知矣又如庚辛壬無直角之三角形依辛壬界作一直角四界形與原三角形積等則與辛壬平行作一庚癸線又自辛壬至庚癸線作子辛癸壬二垂線即成一子辛壬癸直角四界形於是平分子辛線於丑平分癸壬線於寅作一丑寅線則平分子辛壬癸四界形為兩形其所分子丑寅癸與丑辛壬寅兩直角四界形之積俱與庚辛壬三角形之積相等也試與庚辛線平行作一卯壬線即成庚辛壬卯一斜方形為與子辛壬癸方形同底同髙故其積必等見三卷第八節今庚辛壬三角形為庚辛壬卯形之一半則亦必為子辛壬癸方形之一半矣既為一半則所分子丑寅癸與丑辛壬寅直角四界形必與庚辛壬三角形之積相等可知矣第十二有一長方形作與此積相等之正方形法如有甲丙一長方形欲作與此長方形相等之正方形則將甲丙形之丙乙縱線合於甲乙横線照此卷第九節法求得甲乙丙乙二線之中率為丁乙線即以丁乙線為一邊作一丁戊正方形即與甲丙長方形之積相等也何則大凡相連比例三率内中率所作之正方形積與首率末率所作之長方形積相等今丁乙線既為甲乙丙乙二線之中率則丁乙線所作之丁戊正方形積焉得不與甲乙丙乙二線相合所作之甲丙長方形之積相等乎第十三凡多界形作與本形同式或大或小之形法如有甲乙丙丁戊已庚辛之多界形欲作比此形小一半之同式形則自此形中心壬處至各角作衆線又取甲乙乙丙丙丁丁戊戊己己庚庚辛辛甲各界度之一半與各界平行置於對角各線之間為癸子子丑丑寅寅卯卯辰辰巳巳午午癸之八線即成癸子丑寅卯辰巳午之形為原形每界減半之同式形也何也如對角線間所成之甲乙壬癸子壬大小兩三角形之甲乙癸子線既平行而又同一壬角則其相當各角俱等而兩形之式相同倣此推之其乙丙壬子丑壬二形丙丁壬丑寅壬二形丁戊壬寅卯壬二形戊已壬卯辰壬二形巳庚壬辰巳壬二形庚辛壬巳午壬二形辛甲壬午癸壬二形必俱為同式形此各相當大小兩形既俱同式則所作癸子丑寅卯辰已午小形之各邊為甲乙丙丁戊巳庚辛大形之各邊之一半而為同式形可知矣又如甲乙丙丁戊巳庚辛壬癸形從甲角作線至各角取乙丙度之一半置於甲乙甲丙二線之間與乙丙平行如子丑照此於諸對角線間作諸界之平行線即成甲子丑寅卯辰巳午未申小形為原形每界減半之同式形其理亦與前同若欲作比原形大㡬倍之形則以所作諸對角線按分引長而於本形外作諸界之平行線即成所欲作之大形也第十四作分釐尺法如甲戊尺三寸每寸欲分為百釐則將甲乙邊平分作十分將戊巳邊亦平分為十分對所分之分作諸横線與乙戊平行次將一寸之甲辛乙丙兩邊俱分為十分冄於甲辛邊之第一分作斜線至乙丙邊之乙處如此作十斜線俱與第一分斜線平行即分乙丙之一寸為一百釐也何也甲辛乙丙皆為一寸之度俱平分為十分矣若將每分又分為十釐即每寸亦得百釐然度狹線多必致相淆今作斜線横線各十其横斜相交處共有百分此百分即百釐也如第一斜線與第一横線相交之㸃即為一釐與第二横線相交之㸃即為二釐以至第十横線相交之㸃為十釐即甲辛邊所分之第一分之十釐也一斜線有十釐則十斜線豈非百釐乎由此推之若作二十横線則一斜線得二十釐每寸即分為二百釐作百横線則一斜線得百釐每寸即分為千釐其法甚簡而其用尤甚便也第十五凡有三角形知其一角之度及此一角之兩傍界或知其二角之度及此二角之間一界或不知角度但知三界欲求其餘角餘界法如有一甲乙丙三角形知丙角為三十八度四十四分及丙角兩傍之丙甲界長十四丈丙乙界長十三丈而欲知其餘角餘界則依十一卷第八節法作與丙角相等之三十八度四十四分之丁角將丁角兩傍之丁戊界作十四分丁巳界作十三分乃自戊至巳作一戊巳線成一丁戊巳小三角形與甲乙丙大三角形同式量其戊己邊得九分即大形之甲乙邊為九丈也再用有度之圜量取小形戊角得六十四度三十七分即大形甲角之度也小形巳角得七十六度三十九分即大形乙角之度也何也夫甲乙丙戊已丁兩三角形之式既同其相當各角各界必俱相等小形之丁角即與大形之丙角等其餘兩角亦必等小形之丁已邊既以十三分當大形丙乙邊之十三丈則小形戊巳邊之九分必當大形甲乙邊之九丈矣又或知甲乙丙三角形之乙角為七十六度三十九分丙角為三十八度四十四分及乙丙界長十三丈而欲知其餘角餘界則作己丁界為十三分照乙角丙角度作已角丁角於是畫巳戊丁戊二界相交於戊即成戊巳丁同式之小三角形此小形之戊角必與甲角等而小形之丁戊界十四分與大形之甲丙界十四丈相當小形之戊己界九分與大形之甲乙界九丈相當矣若知甲乙丙三角形之甲乙甲丙乙丙三界而不知其角則照前將三界之度作同式之小形量其三角之度即知大形之角度矣第十六作分數比例測量儀器法以甲丙乙半圜界分為一百八十度每度作六十分將此半圜之丁甲丁乙丁丙三半徑線照所容方界分截開分為一百分於每分上俱與三半徑平行作縱横線於甲乙徑線之甲乙兩末作兩定表以圜丁心為樞作一遊表如丁巳將此遊表亦如前所分一百分度作二百分復於此儀器後面作一垂線記號以掛墜線如庚即成一全儀器用以測髙深廣逺可知其各角各界之度矣如有一辛壬旗杆欲測其髙則將儀器按墜線立準看甲乙徑線兩末之定表與旗杆癸處相對乃為地平再將丁巳遊表與旗杆頂尖辛處相對次量儀器中心所對處至旗杆癸處得㡬何如有四十丈則看儀器丁乙線上自丁心至子得四十分以當地平四十丈即視與子相對垂線至遊表相交處有㡬何如丑子三十分即為旗杆自辛至癸相當數為三十丈也再加癸壬髙即得旗杆辛壬之共髙度矣蓋儀器上之丁子丑小三角形與所測得丁癸辛大三角形原為同式其相當各界之比例必俱相同故以丁子四十分與子丑三十分之比即同於丁癸四十丈與癸辛三十丈之比也若欲知丁辛弦線數即視遊表自丁至丑相交之處得㡬何如有五十分其相當數即為五十丈也若欲知丁癸辛三角形之各角度則視圜界與遊表相交處如巳其乙巳弧度即丁角三十五度一十三分其餘巳丙弧五十度四十七分即辛角度而癸辛線原與子丑垂線平行為平行線故癸角必是直角而為九十度也第十七倣各種地形畫圖法如有甲乙丙丁地形欲畫一圖則選能見各地之二處立儀器為戊為巳將戊與巳對准定表先自戊以遊表視庚辛壬癸等處得諸角之度皆細記之如庚戊巳角得八十一度辛戊巳角得五十度三十分壬戊巳角得四十五度八分癸戊巳角得三十三度二十分次自巳以遊表照前視庚辛壬癸等處得諸角之度亦細記之如庚已戊角得三十五度四十分辛巳戊角得四十度十分壬已戊角得四十七度二十五分癸巳戊角得七十度於是任意作一子丑線為戊己相當線於此子丑線之兩末作諸角與所記諸角相等將所作諸角之各線俱引長使相交於寅卯辰巳等處乃以庚辛壬癸所有之諸地形並其餘各處凡目之所見俱畫於圖之相當各界即成一午未申酉之圖即甲乙丙丁地形之圖也葢午未申酉圖内所作寅子丑卯子丑類諸三角形之角度皆與甲乙丙丁地形之庚戊已辛戊巳類諸三角形之角度相等而作故其相當各三角形俱為同式此所以全圖與全地形為同式也第十八畫地理圖欲約為小圖或欲廣為大圖法如有甲乙丙丁一地理圖欲約為小圖為原圖四分之一則用甲乙丙丁形界之四分之一畫一戊已庚辛形將甲乙丙丁原形任意分為數正方形而將小形亦分為數正方形視原圖中所有山川城郭村墅林園函於大圖之某正方分者約而畫入小圖某正方形内則此所畫之戊巳庚辛小圖即與原有甲乙丙丁大圖為同式矣第十九作比例尺平分線法如此比例尺欲作平分線則自甲樞心至乙丙二末作甲乙甲丙二線用本卷第五節法分之各平分為二百分即為比例尺之平分線也以用法明之如有丁戊一直線欲平分為十分則將比例尺一百分之己庚二㸃照丁戊線度展開勿令移動次取比例尺之第十分之辛壬二㸃相離之度即是丁戊線之十分之一分也何則自乙至丙作一線自己至庚作一線自辛至壬復作一線其甲乙丙三角形與甲己庚三角形為同式而甲己庚三角形又與甲辛壬三角形為同式是以所分甲己線與甲乙線之比同於己庚線與乙丙線之比而甲辛線與甲己線之比亦同於辛壬線與己庚線之比也然則十分之甲辛線既為百分之甲己線之十分之一其辛壬線亦必為己庚線之十分之一矣丁戊線原與己庚線同度則辛壬線亦為丁戊線之十分之一可知矣第二十作比例尺分圜線法如於比例尺欲作分圜線則自甲樞心至乙丙二末作甲乙甲丙二線乃平分甲乙線於未以未為心以甲乙二末為界作一半圜於是分圜界為一百八十度復以甲為圜心至所分圜界戊巳庚辛壬癸子丑等處作各弦線又將諸弦線度移於尺之甲乙甲丙二線則此二線即成一圜之諸弦之總線也以用法明之如寅卯寅辰二線所合寅角欲知其度則以寅為心作一辰卯弧將比例尺六十度之丁未兩㸃相距之度照寅辰或寅卯度展開勿令移動次取卯辰相距之度於比例尺上尋至八十度之申酉處恰符即是寅角為八十度也何則若自丁至未自申至酉作二線成甲申酉甲丁未兩同式三角形其相當各角各界俱為相當比例之率故甲未線與甲酉線之比同於丁未線與申酉線之比也夫甲未線既為比例尺所作甲庚六十度之弦線而甲酉線又為甲辛八十度之弦線其丁未線既與小圜寅卯輻線等而輻線原與六十度之弦線等然則丁未線即小圜六十度之弦線而申酉線亦為小圜八十度之弦線也以此得知寅角之卯辰度為八十度也第二十一作比例尺分面線法如此比例尺欲作分面線則以甲樞心處至乙丙二末作甲乙甲丙二線自甲截甲丙線於丁照所截甲丁度於甲心作一甲戊垂線自戊至丁作一戊丁線又照戊丁線度自甲截甲丙線於已自戊至已作一戊已線又照戊已線度自甲截甲丙線於庚自戊至庚作一戊庚線又照戊庚線度自甲截甲丙線於辛自戊至辛作一戊辛線又照戊辛線度自甲截甲丙線於壬自戊至壬作一戊壬線照此累累截之至丙末又將甲丙線所截各度移置甲乙線即成比例尺之分面線也何則於甲丁戊直角三角形之三界作卯丁辰戊戊已三正方形其甲丁甲戊二線因為相等度所作故卯丁辰戊二形必等再於戊甲丁直角相對之戊丁界所作之戊巳一方形亦必與直角兩旁界所作卯丁辰戊二方形相等也見九卷第四節次於甲已界作未巳正方形甲己界原與戊丁等則甲已界所作未已方形即與戊丁界所作之戊巳方形相等矣未巳方形既與戊巳方形等則必與卯丁辰戊二形相等而亦與卯丁之倍數相等矣夫甲巳界即大於卯丁形一倍為未巳形之一界也倣此論之則甲庚界即為比卯丁形大二倍形之界而甲辛甲壬等界即為比卯丁形大三倍四倍形之界可知矣以用法明之如有一癸子正方形欲作大二倍之正方形則將比例尺展開使其丁丑相距之度與癸子界度等次取比例尺寅庚相距之度即是比癸子方形大二倍之方形之一面界度也何則自丁至丑自庚至寅作丁丑庚寅二線成甲丁丑甲庚寅同式兩三角形則甲丁線與甲庚線之比即同於丁丑線與庚寅線之比也夫甲庚線所作方形原比甲丁線所作方形大二倍則庚寅線所作方形必比丁丑線所作方形亦大二倍矣丁丑之度原與子癸等則寅庚線豈非比子癸方形大二倍方形之一界乎第二十二作比例尺分體線法如於比例尺欲作分體線則以甲樞心之甲乙甲丙二線任作丁已一正方體取其戊己一界之度置於尺上自甲截甲乙線於庚次作比戊已界大一倍之辛壬線又於戊巳辛壬二線間照本卷第十節法作相連比例之癸子丑寅二率乃取癸子線度置於尺上仍自甲截甲乙線於辰則甲辰所作卯子正方體必比甲庚所作丁已正方體大一倍矣何則試將癸子線作卯子正方體則與丁己正方體為同式其二體相比之比例必同於戊已癸子二界所生連比例加二倍之比例今辛壬線既為戊巳相連比例之第四率則丁已卯子二體之比例必同於戊已辛壬二線之比例矣辛壬線既比戊己線大一倍則卯子體亦比丁已體大一倍可知矣又作比戊已界大二倍之己未線仍照本卷第十節法作戊已巳未二線間相連比例之申酉戌亥二率乃取申酉線度置於尺上自甲截甲乙線於乾則甲乾所作午酉正方體即比甲庚所作丁巳體大二倍矣照此屢倍戊己界求相連比例之四線取其第二線度置於尺之甲乙線上又按甲乙線所截各度移置甲丙線即成比例尺之分體線也以用法明之如有一坎庚正方體欲作大二倍之體則將比例尺展開使其庚與庚第一次所截之㸃相距之度與艮庚界度等次取比例尺乾與乾第三次所截之㸃相距之度即是比坎庚正方體大二倍之正方體之一界度也何則自比例尺之庚乾二處作庚庚乾乾二線即成甲庚庚甲乾乾同式兩三角形則甲庚線與甲乾線之比同於庚庚線與乾乾線之比例矣夫甲乾線所作方體原大於甲庚線所作正方體之二倍則乾乾線所作正方體必大於庚庚線所作正方體之二倍可知矣又㨗法設正方體界一百釐其積數一百萬釐以二因之成二百萬釐立方開之得界一百二十五釐又以三因之成三百萬釐立方開之得界一百四十四釐照此屢倍積數開立方將所得之數於分釐尺上取其度截比例尺之甲乙甲丙二線即成分體線與前求連比例之法無異也御製數理精藴上編卷四
