body:
  text: 欽定四庫全書御製數理精藴下編卷三十七末部七難題難題算術之學不外於線面體其間比例相求或借根借方等法既已分門别類於前然設問中有紆廻繁襍之不同者非審詳明辨則何以得其統緒兹又探賾鉤深編為難題一卷俾學者殫思觀變以不迷於入算之方庶幾數理之微人心之巧由此引而伸之觸類而長之將以窮天下之變亦不難也設如甲乙丙三人值班甲三日一次乙四日一次丙五日一次問三人何日同班法以三日與四日相乘得十二日再與五日相乘得六十日即三人同班之日也此法葢因六十為三四五皆可以度盡之數三與四相乘得十二日是甲乙同班之日而不能與丙同班三與五相乘得十五日是甲丙同班之日而不能與乙同班四與五相乘得二十日是乙丙同班之日而不能與甲同班惟六十日為甲第二十次值班之日為乙第十五次值班之日為丙第十二次值班之日故為三人同班之日也設如有錢不知總數以三數之餘二文以五數之餘三文以七數之亦餘二文問錢總數幾何法先以三數之率定為七十五數之率定為二十一七數之率定為十五乃以三數之率七十與餘二相乘得一百四十以五數之率二十一與餘三相乘得六十三以七數之率十五與餘二相乘得三十三數相併得二百三十三又以三五七遞乘得一百零五於二百三十三内減兩次餘二十三即總錢數也此法以三數之率定為七十者以其用七數五數皆盡惟用三數之餘一也今以餘二相乘得一百四十則是用七數五數皆盡惟用三數之餘二矣以五數之率定為二十一者以其用三數七數皆盡惟用五數之餘一也今以餘三相乘得六十三則是用三數七數皆盡惟用五數之餘三矣以七數之率定為十五者以其用三數五數皆盡惟用七數之餘一也今以餘二相乘得三十則是用三數五數皆盡惟用七數之餘二矣以此三數相併自為三數餘二五數餘三七數餘二之數又以三五七遞乘得一百零五者此數用三五七皆可數盡故二百三十三雖為三數餘二五數餘三七數餘二之數然減去一百零五餘一百二十八以三五七數之其所餘之數仍同也即再減去一百零五餘二十三以三五七數之其所餘之數亦同也是以問數在一百零五以下必二十三如問數在一百零五以上必一百二十八或二百三十三如原數更在二百三十三以上則遞加一百零五求之必有合也至其作率之法不過一乘一減如以三五七命算則以五七相乘得三十五以三減之餘二不可為率以其所餘為二難與他數相乘也故將三十五倍之得七十以三減之餘一故七十即為三數之率三七相乘得二十一以五減之餘一故二十一即為五數之率三五相乘得一十五以七減之餘一故十五即為七數之率或以五數七數九數命算皆倣此例推之設如三人治田一人日耘七畝一人日耕三畝一人日種五畝今令一人自耕自種自耘問一日治田幾何法以七畝三畝五畝連乘得一百零五畝為治田總衰數以每日耘七畝除之得十五日為耘田衰數以每日耕三畝除之得三十五日為耕田衰數以每日種五畝除之得二十一日為種田衰數三數相併得七十一日為一率一百零五畝為二率一日為三率得四率一畝四分七釐有餘即每日自耕自種自耘之數也此法葢因一日耘七畝則一百零五畝湏耘十五日一日耕三畝則一百零五畝湏耕三十五日一日種五畝則一百零五畝湏種二十一日併之得七十一日是一人自耕自種自耘治田一百零五畝即知一日治田一畝四分七釐有餘也設如甲乙二人甲借乙本銀一千二百両已經還訖仍欠四月利銀今乙又借甲銀八百両欲與前利銀抵兑問得月數幾何法以今借銀八百両為一率原借銀一千二百両為二率原欠利銀四月作一百二十日為三率得四率一百八十日以三十日歸之得六月為所求之日數也葢甲借乙之銀數多故月數少乙借甲之銀數少故月數多而其利相等為轉比例四率也設如原買小布一疋長一丈八尺闊一尺三寸價一錢一分七釐今買大布一疋長二丈五尺闊一尺六寸問價幾何法以原布長一丈八尺闊一尺三寸相乘得二十三尺四十寸為一率價一錢一分七釐為二率今布長二丈五尺闊一尺六寸相乘得四十尺為三率求得四率二錢即今布之價也凡物惟長不同或惟闊不同則各以其長闊為比例今長闊俱不同故以其長闊各相乘為面與面之比例也設如有銀三百九十六両令甲乙丙丁四人分之甲得二分之一又多十両乙得五分之三内少二十両丙得三分之一又多八両丁得四分之一内少六両問四人各得銀數幾何法先以總銀三百九十六両内減去甲多十両丙多八両餘三百七十八両又加乙少二十両丁少六両共得四百零四両為各分之總銀數乃以甲分母二乙分母五丙分母三丁分母四連乘之得一百二十為總衰數於總衰一百二十内取二分之一得六十為甲衰取五分之三得七十二為乙衰取三分之一得四十為丙衰取四分之一得三十為丁衰併之得二百零二衰為一率以各分總銀數四百零四両為二率一衰為三率得四率二両乃以二両用甲衰六十乘之得一百二十両加所多十両得一百三十両即甲所分之銀數用乙衰七十二乘之得一百四十四両内減所少二十両餘一百二十四両即乙所分之銀數用丙衰四十乘之得八十両加所多八両得八十八両即丙所分之銀數用丁衰三十乘之得六十両減所少六両餘五十四両即丁所分之銀數將四人所分之銀併之得三百九十六両以合原數也設如甲乙丙三商貨殖二年共得利銀八千五百八十両甲原出本銀三千両至滿八月収回一千両至滿十九月又添一千二百兩乙原出本銀二千四百両至滿六月収回八百両至滿十五月又添一千四百両丙原出本銀二千両滿七月悉収回至滿十七月别出本銀一千六百両問各人分得利銀若干法以甲本銀三千両與八月相乘滿八月収回一千両是八月以前皆為三千両得二萬四千両又以収回一千両與原本銀三千両相減餘二千両以八月與十九月相減餘十一月八月収回一千両餘二千両十九月後方添一千二百両則是八月以後十九月以前此十一月皆為二千両以十一月與二千両相乘得二萬二千両又以二千両加所添一千二百両得三千二百両以十九月與二年之二十四月相減餘五月十九月後添一千二百両是十九月以後二十四月以前此五月皆為三千二百両以五月與三千二百両相乘得一萬六千両以三得數相併共六萬二千両為甲之共衰數乙本銀二千四百両與六月相乘滿六月収回八百両是六月以前皆為二千四百両得一萬四千四百両又以収回八百両與原本銀二千四百両相減餘一千六百両以六月與十五月相減餘九月六月後収回八百両餘一千六百両十五月後方添一千四百両是六月以後十五月以前此九月皆為一千六百両以九月與一千六百両相乘得一萬四千四百両又以一千六百両加所添一千四百両得三千両以十五月與二年之二十四月相減餘九月十五月後添一千四百両是十五月以後二十四月以前此九月皆為三千両以九月與三千両相乘得二萬七千両三數相併共五萬五千八百両為乙之共衰數丙本銀二千両與七月相乘滿七月悉収回則七月以前皆為二千両得一萬四千両又以十七月與二十四月相減餘七月與别出本銀一千六百両相乘七月悉収回不算外至第十七月方出本一千六百両是十七月以後二十四月以前止七月也得一萬一千二百両二數相併共二萬五千二百両為丙之共衰數以甲乙丙三衰數相併甲六萬二千乙五萬五千八百丙二萬五千二百共得一十四萬三千両為一率總利銀八千五百八十両為二率一両為三率求得四率六分以各人衰數乘之甲得三千七百二十両乙得三千三百四十八両丙得一千五百一十二両為各人所得利銀之數也設如有一大石不知其重但知一小石重四両求大石重幾何法用一木杆結繫於中両端令平乃以大石掛於一端以小石作砣稱之如大石距提繫一寸小石距提繫六寸得平則以一寸為一率小石重四両為二率六寸為三率求得四率二十四両即大石之重也如圗甲乙為大石距提繫一寸甲丙為小石距提繫六寸丁為大石戊為小石戊小石之重即甲乙之分丁大石之重即甲丙之分故甲乙與戊小石之比同於甲丙與丁大石之比也設如有銀大小二錠共重十五両求大小錠各重幾何法用一木杆結繫於中両端令平乃以大錠小錠各掛一端如大錠距提繫四寸小錠距提繫六寸得平則以四寸六寸相加得十寸為一率共重十五両為二率大錠距提繫四寸為三率得四率六両即小錠之重如以小錠距提繫六寸為三率則得四率九両即大錠之重也如圗甲乙為大錠距提繫四寸甲丙為小錠距提繫六寸故以甲乙甲丙共分與丁戊共重之比同於甲乙與戊小錠之比亦同於甲丙與丁大錠之比也設如以戥稱銀戥數不足將砣上加四兩稱之得二百兩原砣重八兩問銀實重幾何法以原砣重八兩爲一率又以原砣八兩與加四兩相併得十二兩爲二率以今稱二百兩爲三率得四率三百兩爲原銀之重數也如圖甲乙爲二百兩之分丙爲砣重十二兩試將甲乙戥衡引長至丁甲丁爲三百兩之分戊爲原砣重八兩甲乙乗丙砣卽與甲丁乗戊砣之數等故以戊砣與甲乙之比同於丙砣與甲丁之比爲轉比例四率也設如戥子失去墜砣欲配一砣不知輕重以重三兩之物用六錢之砣稱之得四兩問原砣重幾何法以原重三兩爲一率今稱得四兩爲二率今砣重六錢爲三率求得四率八錢卽原砣之重也如圖甲乙爲戥盤距提繫之分丙爲物重甲丁爲三兩之分戊為原砣甲己為四両之分庚為今砣以比例論之甲乙與戊砣之比同於甲丁與丙重之比又甲乙與庚砣之比同於甲己與丙重之比是甲丁乘戊砣即與甲己乘庚砣之數等故以甲丁與庚砣之比即同於甲己與戊砣之比為轉比例四率也設如河口上寛十尺下寛六尺深五尺求每日流水幾何法以木板一塊置於水面用騐時儀墜子候之看六十秒内木板流逺幾丈如流逺十丈即以十丈變為一百尺乃以河上寛十尺與下寛六尺相加折半得八尺與河深五尺相乘得四十尺又與木板流逺一百尺相乘得四千尺即六十秒内所流之數又以六十秒収為一分為一率水流四千尺為二率以每日二十四小時化為一千四百四十分一小時為四刻一刻為十五分為三率求得四率五千七百六十萬尺即一日内所流之數也此法先用木板以騐所流之緩急水急則木随水流亦急水緩則木随水流亦緩看木之緩急即知水流之多少故先求得河口面積再以逺乘之即得水流之積數也設如有房一所不知間數亦不知房價但云每房六間每年租銀二十四両五年後適得本銀每房八間每年租銀三十五両八年後得本銀外又得利銀二千一百六十両問房數房價各幾何法以五年與每年二十四両相乘得一百二十両以八年與每年三十五両相乘得二百八十両是為每房六間租一百二十両適足每房八間租二百八十両盈二千一百六十両乃以六間互乘二百八十両得一千六百八十両以八間互乘一百二十両得九百六十両相減餘七百二十両為一率以六間與八間相乘得四十八間為二率以利銀二千一百六十両為三率得四率一百四十四間即房之總數也又以六間為一率五年得一百二十両為二率總房一百四十四間為三率得四率二千八百八十両即房價或以八間為一率八年得二百八十両為二率總房一百四十四間為三率得四率五千零四十両内減利銀二千一百六十両亦得二千八百八十両為房價也此法葢因五年八年之數不同故以五年八年與每年銀數相乘作總得租銀算也設如有銀買物不知銀數亦不知物價但云取銀六分之五買之則多六両取銀四分之三買之仍多二両問銀數及物價各幾何法以前分母六互乘後分子三得十八以後分母四互乘前分子五得二十相減餘二分為一率盈六両與盈二両相減餘四両為二率両分母互乘得二十四分為三率求得四率四十八両即為銀數取六分之五為四十両減盈六两得三十四両為物價或取四分之三得三十六両減盈二両亦得三十四両為物價也又先得物價之法以前分母六互乘後分子三得十八以後分母四互乘前分子五得二十又以十八互乘盈六両得盈一百零八両為加十八倍以二十互乘盈二両得盈四十両為加二十倍乃以十八倍與二十倍相減餘二倍為一率互乘所得両盈數相減餘六十八両為二率一倍為三率求得四率三十四両即物價加盈六両得四十両即原銀六分之五乃用五歸六因得四十八両為原銀數或於物價三十四両加盈二両得三十六両即原銀四分之三乃用三歸四因亦得四十八両為原銀數也此盈朒單法因帶分母子不同故用通分互乘以齊其分耳設如有銀買米不知米數亦不知米價只云買米四分之一用銀二十両則米少一石若買三分之一用銀二十四両則米多二石問米數及米價各幾何法以前分母四互乘得分子一得四以後分母三互乘前分子一得三乃以互乘所得後分子四互乘二十両得八十両互乘朒一石得朒四石又以互乘所得前分子三互乘二十四両得七十二両互乘盈二石得盈六石乃以朒四石與盈六石相加得十石為一率八十両與七十二両相減餘八両為二率一石為三率求得四率八錢即米一石之價也既得米價乃以八錢除二十両得二十五石減朒一石餘二十四石為米四分之一以四因之得九十六石即米數或以八錢除二十四両得三十石加盈二石得三十二石為米三分之一以三因之亦得九十六石為米數也葢以分母互乘前則為十二分之三後則為十二分之四両分母互乘得十二又以分子互乘前則為米十二分両分子互乘亦得十二分用銀八十两朒四石後則為米十二分用銀七十二両盈六石夫米之分數既同而銀差八両則盈朒差十石故知十石價八両即知一石價八錢也此䨇套盈朒之法但有米之分數又有石數故立法微不同若止帶零分則惟用通分法餘俱與䨇套盈朒之法同又先得米數之法以銀數列於上分數列於下乃以前分母四互乘後分子一得四以後分母三互乘前分子一得三又以二十両互乘後所得分子四得八十分互乘盈二石得盈四十石以二十四両互乘前所得分子三得七十二分互乘朒一石得朒二十四石乃以七十二分與八十分相減餘八分為一率朒二十四石與盈四十石相加得六十四石為二率両分母互乘得十二分為三率求得四率九十六石即原米數也既得米數四歸之得二十四石加朒一石得二十五石以除二十両得八錢為米價或將米數三歸之得三十二石減盈二石餘三十石以除二十四両亦得八錢為米價也葢用互乘前則為四百八十両二十両與二十四両互乘得四百八十両買米十二分之七十二朒二十四石後則為四百八十両買米十二分之八十盈四十石夫銀數既同而米差八分則盈朒相差六十四石故知八分為六十四石即知十二分為九十六石也又法以二十両朒一石俱用四因之得八十両朒四石因四分之一價二十両故用四因為米總價又以二十四両盈二石俱用三因之得七十二両盈六石因三分之一價二十四両故用三因為米總價作盈朒單法算以朒四石與盈六石相加得十石為一率八十両與七十二両相減餘八両為二率一石為三率求得四率八錢即米一石之價也此法葢因分數整齊故可比例而得其全分之價若有竒零則湏用前法或用通分法算之設如有一數不知幾何但云以三乘之再加一十又以四乘之再加二十又以五乘之再加三十又以六乘之再加四十共得六千七百問原數幾何法先以所加之一十以四乘之又以五乘之又以六乘之得一千二百再以所加之二十以五乘之又以六乘之得六百再以所加之三十以六乘之得一百八十乃以所得之三數相加得一千九百八十併所加之四十共二千零二十與共數六千七百相減餘四千六百八十為連乘之整數乃借一衰為原數以三乘之仍得三又以四乘之得一十二又以五乘之得六十又以六乘之得三百六十衰為一率原數一衰為二率以連乘整數四千六百八十為三率求得四率十三即為原數也此法葢因三乘原數外加一十而又用四乘五乘六乘則此一十己用四乘五乘六乘矣四乘後加二十而又用五乘六乘則此二十已用五乘六乘矣五乘後加三十而又用六乘則三十已用六乘矣故將一十二十三十之數亦用連乘併後所加之四十與共數相減然後為三四五六與原數連乘之整分而以三四五六連乘所得之三百六十與原數一為比例即同於今三四五六連乘所得之四千六百八十與原數十三之比例也設如甲乙二車運糧甲車先行二日乙車後行五日追及甲車比乙車運價少五錢又甲車先行二日乙車後行七日追過甲車八十里甲車比乙車運價少一両一錢問甲乙二車日行里數及運價各幾何法以乙車五日為正甲車七日為負里數相等作一空位甲車先行二日乙車行五日追及是乙車行五日甲車行七日其里數相等運價多五錢為正列於上又以乙車七日為正甲車九日為負過八十里為正運價多一両一錢為正列於下乃以上乙五日遍乘下乙七日甲九日多八十里多一両一錢得乙三十五日仍為正甲四十五日仍為負多行四百里運價多五両五錢仍為正又以下乙七日遍乘上乙五日甲七日運價多五錢得乙三十五日仍為正甲四十九日仍為負多三両五錢仍為正相等無可乘仍為空位於是以上層為主両下相較則乙各三十五日彼此減盡甲両下相減餘四日本層少變負為正里數無可加減仍得四百里為正價両下相減餘二両依本層為正即甲車四日行四百里運價二両也以四日除四百里得一百里為甲車每日所行之里數以四日除二両得五錢即甲車每日之運價以乙車七日比甲車九日多行八十里價多一両一錢計之則甲車九日行九百里加多八十里共九百八十里為乙車七日所行之里數以七日除之得一百四十里即乙車每日所行之里數甲車九日運價四両五錢加多一両一錢共五両六錢為乙車七日之運價以七日除之得八錢即乙車每日之運價也此法因有里數運價二種或名疊脚然不過除両次耳若里數為較運價為和難以分列正負者則分両法算之設如甲乙丙三人有銀各不知數只云甲得乙銀二分之一乙得丙銀三分之一丙得甲銀四分之一則各得七百两問三人原銀各幾何法先以甲三分乙一分共七百両列於上甲原銀四分丙得去一分餘三分又得乙一分故為甲三分乙一分共七百両丙無數作空位以足其分又以甲一分丙二分共七百両列於下丙原銀三分乙得去一分餘二分又得甲一分故為甲一分丙二分共七百両乙無數亦作空位以足其分乃以上甲三分遍乘下甲一分丙二分共七百両得甲三分丙六分共二千一百両又以下甲一分遍乘上甲三分乙一分共七百両仍得原數於是以下層為主両下相較則甲各三分彼此減盡乙一分無可減仍為一分依本層為正丙六分無可減仍為六分本層無數則為負銀両下相減餘一千四百両本層少爲負即乙一分比丙六分少一千四百両也次以乙一分為正丙六分為負少一千四百両為負列於上又以乙一分丙一分共七百兩列於下乙原銀二分甲得去一分餘一分又得丙一分故為乙一分丙一分共七百両因為和數故不用號因首色皆為一故省互乘両下相較則乙各一分彼此減盡丙六與丙一相加得七分銀一千四百與七百相加得二千一百両即為丙七分之共數以七除之得三百両為丙一分之數以丙原銀三分乘之得九百両為丙之銀數以乙一分丙一分共七百両計之則於七百両内減去丙一分三百両餘四百両即乙一分之數以乙原銀二分乘之得八百両為乙之銀數以甲三分乙一分共七百両計之則於七百両内減去乙一分四百両餘三百両三歸之得一百両即甲一分之數以甲原銀四分乘之得四百両為甲之銀數也設如有長方面積八百六十四歩一長二闊三和四較共三百一十二歩問長闊各幾何法以積數八因之得六千九百一十二歩為大長方形積乃以長闊和較共數三百一十二歩為長闊和折半得一百五十六歩為半和自乘得二萬四千三百三十六歩與六千九百一十二歩相減餘一萬七千四百二十四歩開平方得一百三十二歩為半較與半和一百五十六歩相減得二十四歩為原闊數以闊除原積八百六十四歩得三十六歩為原長數也此法葢因三和内有三長三闊加一長二闊共四長五闊如以四較加於四闊則又成四長是共得八長一闊此三百一十二歩即八長一闊之共數今將原積八倍之成一大長方形其闊即原闊其長為原長之八倍故以三百一十二為長闊和求得闊即為原闊以原闊除原積即得原長也設如買果木樹不知樹數亦不知樹價但知樹每株之價為樹共數之六倍而每株脚錢六文其脚錢并樹價共三千六百文問樹每株價及樹數各幾何法先以共錢三千六百文六因之得二萬一千六百文為長方積脚錢六文為縱多爰以縱多六文折半得三文為半較自乘得九文與二萬一千六百文相加得二萬一千六百零九文開平方得一百四十七文為半和内減半較三文得一百四十四文為樹每株之價六歸之得二十四為樹之共數也此法以樹數為闊樹價併脚錢為長成長方形因每株之價為樹數之六倍是長為闊之六倍又多六文故六倍其積則長比闊多六文故以帶縱開方法算之得闊為樹價六歸之得樹數也設如一河寛一丈二尺中間生一蒲草出水面三尺斜引蒲稍至岸適與岸齊問蒲長水深各幾何法以河寛一丈二尺折半得六尺為勾以蒲稍出水三尺為股弦較乃以勾六尺自乘得三十六尺以股弦較三尺除之得一十二尺為股弦和加股弦較三尺得一十五尺折半得七尺五寸為弦即蒲之長内減股弦較三尺餘四尺五寸為股即水之深也如圖甲乙為河寛丙丁為蒲長與甲丁等戊丁為水深丙戊為蒲稍出水三尺故戊丁為股甲戊為勾甲丁為弦丙戊為股弦較用有勾有股弦較之法求得股為水深得弦為蒲之長也設如圓柱髙二十一尺周四尺以繩自底至末繞柱七周與柱適齊問繩長幾何法以柱周四尺七因之得二十八尺為股柱髙二十一尺為勾求得弦三十五尺即繩之長也此法葢合七勾股為一勾股算也如圖甲乙為柱髙二十一尺甲丙為七分之一若將柱面平鋪之成一平面則丙丁即柱周四尺甲丁即繩繞柱之一周成甲丙丁勾股形今柱髙為甲丙之七倍繩長為甲丁之七倍故將柱周亦加七倍成甲乙戊勾股形甲乙為勾乙戊為股求得甲戊弦即繩長也設如一方匣内對角斜容一比例尺長一尺一寸寛三寸問匣方邊幾何法以比例尺寛三寸與長一尺一寸相加得一尺四寸自乘折半開方得九寸八分九釐九豪即方匣之邊數也如圗甲乙丙丁方匣内容戊己庚辛比例尺丁乙為對角斜線癸壬為比例