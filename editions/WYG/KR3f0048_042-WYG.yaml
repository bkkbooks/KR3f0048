髙亦不知其逺用日影測之問塔髙幾何法先立一表長六尺影長四尺同時看塔影所至記之閲時看表影長五尺塔影比先所記之處長幾尺如得八尺乃以表影差一尺為一率表髙六尺為二率影差八尺為三率求得四率四丈八尺即塔之髙也如圗甲乙為塔髙乙丙為先所記塔影乙丁為後所記塔影戊己為表髙己庚為先所記表影己辛為後所記表影戊庚辛與甲丙丁戊己庚與甲乙丙皆為同式形故庚辛與戊己之比同於丙丁與甲乙之比也設如逺望一村欲知其逺用放鎗騐時儀墜子候之問逺幾何法令一人在村邊放鎗一見烟出即用騐時儀墜子候之一聞鎗響即止計自見烟至聞響得幾秒如得三秒即以一秒為一率一百二十八丈五尺七寸為二率三秒為三率求得四率三百八十五丈七尺一寸即距村之逺也葢響與烟一時並出其見烟而未聞響者聲未至也故自見烟至聞響之分即路逺之分嘗以其分較之路逺五里得七秒以七歸之每秒得一百二十八丈五尺七寸聞雷亦然自一見電光至聞雷響候其秒數即得里數也設如梭形闊四尺中長九尺求積幾何法以中長九尺與闊四尺相乘得三十六尺折半得十八尺即梭形積也如圗甲乙丙丁梭形以乙丁與甲丙相乘則成戊己庚辛長方形其積比梭形多一倍故半之為梭形積也此法必甲乙與乙丙等甲丁與丁丙等或甲乙與甲丁等乙丙與丁丙等則其中長適為両三角形之垂線故長闊相乘折半而得積也若中長不得為垂線則湏先量得四邊數及長數或闊數用三角形求中垂線法算之設如三廣形上闊三尺中闊五尺下闊四尺上截長六尺下截長四尺求積幾何法以中闊五尺與上闊三尺相加折半得四尺與上截長六尺相乘得二十四尺又以中闊五尺與下闊四尺相加折半得四尺五寸與下截長四尺相乘得十八尺両數相併得四十二尺即三廣形積也如圗甲乙丙丁戊己三廣形以乙戊線分之則成甲乙戊己乙丙丁戊両梯形故用梯形求積之法見第十九卷直線形求得両梯形之積而併之即為三廣形積也舊術以上下闊相加折半加中闊與長相乘得積此必上下両截長數相等者然後可算若上下不相等湏用両梯形算之設如眉形両尖相距弦長二十四尺外弧距弦九尺内弧距弦四尺求積幾何法以両尖相距二十四尺為弦外弧距弦九尺為矢用弧矢求積法以矢九尺為首率弦二十四尺折半得十二尺為中率求得末率十六尺加矢九尺得二十五尺為圜徑折半得半徑十二尺五寸為一率半弦十二尺為二率半徑十萬為三率求得四率九萬六千為半外弧之正弦撿八線表得七十三度四十五分為半外弧之度分倍之得一百四十七度三十分為外弧之度分乃以三百六十度為一率外弧一百四十七度半為二率全徑二十五尺求得全周七十八尺五寸三分九釐八豪為三率求得四率三十二尺一寸七分九釐五豪為外弧之數與半徑十二尺五寸相乘折半得二百零一尺十二寸十八分為自圜心所分弧背三角形積又以矢九尺與半徑十二尺五寸相減餘三尺五寸與弦二十四尺相乘折半得四十二尺為自圜心至弦所分直線三角形積與弧背三角形積相減餘一百五十九尺一十二寸一十八分為外弧矢全積見第二十卷曲線形又以両尖相距二十四尺為弦内弧距弦四尺為矢亦用弧矢求積法求得内弧矢虚積六十五尺三十七寸六十分與外弧矢積相減餘九十三尺七十四寸五十八分即眉形積也如圗甲乙丙丁眉形甲丙為弦乙戊為外弧矢丁戊為内弧矢成甲乙丙戊甲丁丙戊両弧矢形故先求得甲乙丙戊弧矢形積又求得甲丁丙戊弧矢形積相減即得甲乙丙丁眉形積也設如橄㰖形長二尺四寸闊八寸求積幾何法以長二尺四寸為弦闊八寸折半得四寸為矢用弧矢求積法求得弧矢積六十五尺三十七寸六十分倍之得一百三十尺七十五寸二十分即橄㰖形積也如圗甲乙丙丁橄㰖形自甲至丙作甲丙線平分乙丁於戊則成甲乙丙戊甲丁丙戊両弧矢形故求得弧矢形積倍之即橄㰖形積也設如錢形徑一尺二寸求積幾何法以錢形徑一尺二寸求得圜面積一尺一十三寸零九分七十三釐又求得内容方積七十二寸相減餘四十一寸零九分七十三釐倍之得八十二寸一十九分四十六釐即錢形積也如圖甲乙丙丁錢形作戊己己庚庚辛辛戊四線則分為壬癸子丑寅卯辰巳八弧矢形故先求得圜形積又求得戊己庚辛内方積相減餘壬癸子丑四弧矢形倍之即得錢形積也設如銀錠形徑一尺二寸求積幾何法以銀錠形徑一尺二寸自乘得一尺四十四寸折半得七十二寸即銀錠形積也如圖甲乙丙丁戊己銀錠形以甲丁徑自乘折半則得乙丙戊己正方其所虚庚辛二弧矢形與所盈壬癸二弧矢形之積等故乙丙戊己正方積即與銀錠形之積等也設如甲乙丙丁四平圜共積二百一十七尺五十五寸五十三分一十釐甲圜徑比乙圜徑多三尺乙圜徑比丙圜徑多三尺丙圜徑比丁圜徑多二尺問四圜徑各幾何法用圜積方積定率比例以圜積一為一率方積一二七三二三九五四為二率四平圜共積二百一十七尺五十五寸五十三分一十釐為三率求得四率二百七十七尺為四平方共積乃以丙圜徑比丁圜徑所多之二尺自乘得四尺又以乙圜徑比丁圜徑所多之五尺丙比丁多二尺乙又比丙多三尺故乙比丁多五尺自乘得二十五尺又以甲圜徑比丁圜徑所多之八尺乙比丁多五尺甲又比乙多三尺故甲比丁多八尺自乘得六十四尺三數相併得九十三尺與四平方共積二百七十七尺相減餘一百八十四尺為長方積以丙圜徑比丁圜徑多二尺乙圜徑比丁圜徑多五尺甲圜徑比丁圜徑多八尺相加得十五尺為長闊之較用帶縱較數開平方法算之得闊八尺二歸之得四尺即丁圜徑加二尺得六尺即丙圜徑再加三尺得九尺即乙圜徑再加三尺得十二尺即甲圜徑也如圖甲乙丙丁四平圜形變為甲乙丙丁四平方形則四圜徑之較即四方邊之較故於四方形内減去壬癸子三較方餘戊己庚辛四小正方丑寅卯辰巳午六長方共成未申酉戌一長方戌亥為長闊之較即三邊較之共數故用帶縱較數開平方法算之得闊折半而得丁方邊即丁圜徑遞加之即得甲乙丙各圜徑也設如有一方形内不切方邊容一圜形但知方邊離圜界五丈方内圜外積三百二十一丈四十六尺零一寸八十四分問方邊圜徑各幾何法以方邊離圜界五丈自乘得二十五丈四因之得一百丈與方内圜外積三百二十一丈四十六尺零一寸八十四分相減餘二百二十一丈四十六尺零一寸八十四分乃以圜積定率七八五三九八一六與方積定率一相減餘二一四六一八四為一率方積一為二率今減餘積二百二十一丈四十六尺零一寸八十四分為三率求得四率一千零三十一丈九十五尺八十四寸五十八分為長方積又以二一四六一八四為一率一為二率以方邊離圜界五丈四因之得二十丈為三率求得四率九十三丈一尺九寸五分為長闊之較用帶縱較數開平方法算之得闊十丈即内圜徑加方邊離圜界共十丈得二十丈即外方邊也如圖甲乙丙丁方形内容戊圜形以方邊離圜界五丈自乘四因與積相減則減去己庚辛壬四小方形餘癸子丑寅四長方形及卯辰巳午四隅積今欲以卯辰巳午四隅積補足戊圜虚積共成未申酉戌長方形應以定率之方積圜積相減餘方内圜外積為一率方積為二率今所餘之卯辰巳午方内圜外積為三率則得四率為未亥方積而戊圜虚積即補足在其中然今乃以卯辰巳午四隅積并癸子丑寅四長方積共為三率則戊圜虚積固已補足而癸子丑寅四長方積必多補出之分是知癸子丑寅四長方形其寛仍為戌酉而亥酉之長必亦多補出之分矣癸子丑寅四長方形為二平行線内直角方形其面之互相為比同於其底之互相為比見幾何原本八卷第七節故又以定率之方積圜積相減餘方内圜外積為一率方積為二率以方邊離圜界五丈四因之得亥酉之長為三率求得四率即將亥酉之長亦増補出之分乃以此為長闊之較求得未申闊即為内圜徑也設如有一方形内不切方邊容一圜形但知方角離圜界二十一丈二尺一寸三分方内圜外積一千四百四十二丈九十二尺零三寸六十八分問方邊圜徑各幾何法以方角離圜界二十一丈二尺一寸三分自乘得四百五十丈倍之得九百丈與方内圜外積一千四百四十二丈九十二尺零三寸六十八分相減餘五百四十二丈九十二尺零三寸六十八分乃以定率弧矢積二八五三九八一六為一率方積一方内容圜積七八五三九八一六圜内容方積五相減餘二八五三九八一六為弧矢積圜内容方積五為二率今減餘積五百四十二丈九十二尺零三寸六十八分為三率求得四率九百五十一丈十六尺三十寸四十八分為長方積又以二八五三九八一六為一率五為二率以方角離圜界二十一丈二尺一寸三分用斜求方法求得四隅方邊十五丈四因之得六十丈為三率求得四率一百零五丈一尺一寸六分為長闊和用帶縱和數開平方法算之得闊十丈即内圜所容方邊以四隅方邊十五丈倍之得三十丈與内圜所容方邊十丈相加得四十丈即外方邊以内圜所容方邊十丈求得對角斜線十四丈一尺四寸二分即内圜徑加方角離圜界共四十二丈四尺二寸六分得五十六丈五尺六寸八分即外方對角斜線也如圖甲乙丙丁方形内容戊圜形以方角離圜界甲卯自乘倍之與積相減則減去己庚辛壬四小正方形以甲卯自乘折半得己正方形積故甲卯自乘倍之即得四正方形積也餘癸子丑寅四長方形而内虚未申酉戌四弧矢形今欲以所虚之未申酉戌四弧矢形變為卯辰巳午一正方形應以定率弧矢積為一率方積為二率未申酉戌四弧矢虚積為三率則得四率為卯辰巳午虚方積然今無未申酉戌四弧矢虚積而以癸子丑寅四長方形内虚未申酉戌四弧矢形之餘積為三率實積既變則虚積亦變故求得四率為卯辰亥乾長方形而内虚卯辰巳午正方形葢癸子丑寅四長方實積與午巳亥乾長方積之比同於弧矢積與方積之比則其所虚之未申酉戌四弧矢形與卯辰巳午正方形之比亦同於弧矢積與方積之比而癸子丑寅之共長與長亥之比亦必同於弧矢積與方積之比矣故以四長方之共邊比例得辰亥邊為長闊和求得卯辰闊為内圜所容正方形之每一邊也設如有一圜形内不切圜界容一方形但知圜界離方角五丈圜内方外積二百六十四丈十五尺九十二寸六十四分問圜徑方邊各幾何法以圜界離方角五丈自乗得二十五丈四因之得一百丈又以圜積定率七八五三九八一六為一率方積一為二率今圜内方外積二百六十四丈十五尺九十二寸六十四分為三率求得四率三百三十六丈三十三尺八十寸二十三分内減所得一百丈餘二百三十六丈三十三尺八十寸二十三分乃以定率弧矢積二八五三九八一六方積一内容圜積七八五三九八一六圜内容方積五相減餘二八五三九八一六用圜積變方積法通之得三六三三八二三為一率方積一為二率今減餘積二百三十六丈三十三尺八十寸二十三分為三率求得四率六百五十丈三十八尺七十四寸為長方積又以三六三三八二三為一率一為二率以圜界離方角五丈四因之得二十丈為三率求得四率五十五丈零三寸八分七釐四豪為長闊之較用帶縱較數開平方法算之得闊十丈即内方對角斜線用斜求方法算之得七丈零七寸一分即内方邊以内方對角斜線十丈加圜界離方角共十丈得二十丈即外圜徑也如圖甲乙圜形内容丙方形以圜積方積定率比例則變為丁戊己庚辛壬癸子方環形而多丑寅卯辰四弧矢形所變之積葢圜環變為方環今圜内方外積比圜環積多丑寅卯辰四弧矢形故所變之方環亦多丑寅卯辰四弧矢形所變之積也以圜界離方角五丈自乘四因與積相減則減去巳午未申四小方形餘酉戌亥乾四長方形及丑寅卯辰四弧矢形所變之積今欲以丑寅卯辰四弧矢形所變之積補成辛壬癸子正方形共成辛壬坎艮長方形應以定率四弧矢形已變之積為一率方積為二率設方積為一方内容圜積為七八五三九八一六圜内容方積為五内圜積與内方積相減餘二八五三九八一六是二八五三九八一六與一相比為弧矢積與外方積之定率也然今所多之四弧矢積先已用圜率變為方率故又以圜積七八五三九八一六為一率方積一為二率弧矢積二八五三九八一六為三率得四率三六三三八二三是三六三三八二三與一相比為已變之弧矢積與外方積之定率也今所多之丑寅卯辰四弧矢形已變之積為三率則得四率為辛壬癸子正方積然今乃以丑寅卯辰四弧矢形已變之積并酉戌亥乾四長方積共為三率則辛壬癸子正方積固已補足而酉戌亥乾四長方必多補出之分是知酉戌亥乾四長方其寛仍為子癸而癸坎之長必亦多補出之分矣故又以四弧矢形已變之積為一率方積為二率以圜界離方邊五丈四因之得癸坎之長為三率求得四率即將癸坎之長亦増補出之分乃以此為長闊之較求得辛壬闊即内方對角斜線也設如有一圜形内不切圜界容一方形但知圜界離方邊十五丈圜内方外積一千一百五十六丈六十三尺七十寸四十分問圜徑方邊各幾何法以圜界離方邊十五丈自乘得二百二十五丈四因之得九百丈又以圜積方積定率比例圜積七八五三九八一六為一率方積一為二率今圜内方外積一千一百五十六丈六十三尺七十寸四十分為三率求得四率一千四百七十二丈六十七尺六十寸四十六分内減所得九百丈餘五百七十二丈六十七尺六十寸四十六分乃以方内圜外積二一四六一八四方積一内容圜積七八五三九八一六相減餘二一四六一八四用圜積變方積法通之得二七三二三九五五為一率方積一為二率今減餘積五百七十二丈六十七尺六十寸四十六分為三率求得四率二千零九十五丈八十八尺六十三寸六十一分為長方積又以二七三二三九五五為一率一為二率以圜界離方邊十五丈四因之得六十丈為三率求得四率二百一十九丈五尺八寸八分為長闊和用帶縱和數開平方法算之得闊十丈即内方邊加圜界離方邊共三十丈得四十丈即外圜徑也如圖甲乙圜形内容丙方形以圜積方積定率比例則變為丁戊己庚辛壬癸子方環形而少丑寅卯辰四隅所變之積葢圜環變為方環今圜内方外積比圜環積少丑寅卯辰四隅故所變之方環亦少丑寅卯辰四隅所變之積也以圜界離方邊十五丈自乘四因與積相減則減去巳午未申四小正方形餘酉戌亥乾四長方形而内少丑寅卯辰四隅所變之積今欲以所虚之丑寅卯辰四隅形所變之積作為辛壬癸子正方形應以定率四隅形已變之積為一率方積為二率設方積為一方内容圜積為七八五三九八一六相減餘二一四六一八四是三一四六一八四與一口相比為圜外四隅積與外方積之定率也然今所少者乃圜外四隅積用圜積方積比例之數故又以圜積七八五三九八一六為一率方積一為二率圜外四隅積二一四六一八四為三率求得四率二七三二三九五五是二七三二三九五五與一相比為已變之四隅積與外方積之定率也丑寅卯辰四隅形已變之虚積為三率則得四率為辛壬癸子虚方積然今無辛壬癸子四隅形已變之虚積而以酉戌亥乾四長方内虚丑寅卯辰四隅形之餘積為三率實積既變則虚積亦變故求得四率為辛壬坎艮長方形而内虚辛壬癸子正方形葢酉戌亥乾四長方實積與子癸坎艮長方形之比同於己變之四隅積與方積之比則其所虚之丑寅卯辰四隅已變之積與辛壬癸子正方形之比亦同於己變之四隅積與方積之比而酉戌亥乾之共長與壬坎之比亦少同於己變之四隅積與方積之比矣故以四長方之共邊比例而得壬坎邊為長闊和求得辛壬闊為内方邊也設如有一大球體内容四小球體大球徑一尺二寸求小球徑幾何法以大球徑一尺二寸自乘得一尺四十四寸倍之得二百八十八寸為長方積以大球徑一尺二寸四因之得四尺八寸為長闊之較用帶縱較數開平方法算之得闊五寸三分九釐三豪即内容四小球之徑也如圖甲乙大球體内容丙丁戊己四小球體試自四小球之中心俱各作線聮之則成一四等面體又以甲乙大球心為心丙丁戊己小球心為界作一虚圓則成四等面體外切圓球體其四面體之一邊即小球徑以四面體外切丁庚虚球徑加一小球徑即大球徑故以大球徑自乘得甲乙辛壬正方形内甲癸丁子為小球徑自乘方即四面體每邊自乘方丁庚辛丑為四面體外切圓球徑自乘方癸乙庚丁子丁丑壬為四面體之每邊與外切圓球徑相乘二長方凡四面體每邊自乘方為外切圓球徑自乘方三分之二見第二十八卷球内容四面體法故甲癸丁子正方形為丁庚辛丑正方形三分之二將甲乙辛壬正方形倍之則得甲癸丁子二正方丁庚辛丑二正方癸乙庚丁四長方而丁庚辛丑二正方為甲癸丁子正方形之三倍是共得甲癸丁子五正方癸乙庚丁四長方即與寅卯辰巳長方積等其巳午長闊之較為甲乙球徑之四倍故四因大球徑為較縱求得闊即小球徑也如先有小球徑求大球徑則以小球徑為四面體之一邊自乘二歸三因開平方得四面體外切圓球徑再加一小球徑即大球徑也設如有一大球體内容六小球體大球徑一尺二寸求小球徑幾何法以大球徑一尺三寸自乘得一尺四十四寸為長方積以大球徑一尺二寸倍之得二尺四寸為長闊之較用帶縱較數開平方法算之得闊四寸九分七釐即内容六小球之徑數也如圖甲乙大球體内容丙丁戊己庚辛六小球體試自六小球之中心俱各作線聮之則成一八等面體其八面體之一邊即小球徑以八面體之對角線加一小球徑即大球徑故以大球徑自乘得甲乙壬癸正方形内甲子丙丑為小球徑自乘方即八面體每邊自乘方丙戌壬寅為八面體對角線自乘方子乙戊丙丑丙寅癸為八面體之每邊與對角線相乘二長方凡八面體每邊自乘方為對角線自乘方之一半見第二十七卷八面體法故丙戊壬寅一正方與甲子丙丑二正方等是甲乙壬癸一正方共為甲子丙丑三正方子乙戊丙二長方與卯辰巳午長方積等其午未長闊之較為甲乙球徑之二倍故倍大球徑為較縱求得闊即小球徑也如先有小球徑求大球徑則以小球徑為八面體之一邊自乘加倍開方得對角線再加一小球徑即大球徑也設如一大球體内容八小球體大球徑一尺二寸求小球徑幾何法以大球徑一尺二寸自乘得一百四十四寸折半得七十二寸為長方積以大球徑一尺二寸為長闊之較用帶縱較數開平方法算之得闊四寸三分九釐二豪即内容八小球之徑數也如圖甲乙大球體内容丙丁戊己庚辛壬癸八小球體試自八小球之中心俱各作線聮之則成一正方體其正方體之一邊即小球徑以正方體之丙壬對角斜線加一小球徑即大球徑故以大球徑自乘得甲乙子丑正方形内甲寅卯辰為小球徑自乘方卯巳子午為正方體對角斜線自乘方寅乙巳卯辰卯午丑為小球徑乘正方體對角斜線二長方凡正方對角斜線自乘方為每邊自乘方之三倍見第二十八卷球内容正方體法故卯巳子午正方形為甲寅卯辰正方形之三倍折半即得未甲辰申甲寅卯辰二正方寅乙巳卯一長方共成未乙巳申一長方甲乙球徑即長闊之較故用帶縱較數開平方法算之得闊即小球徑也如先有小球徑求大球徑則以小球徑為正方體之一邊自乘三因之開平方得正方體對角斜線再加一小球徑即大球徑也設如有三角形底十四尺中埀線十二尺大腰與小腰之較二尺求両腰各幾何法借一根為小腰則大腰為一根多二尺以一根自乗得一平方為小腰之面積内減中垂線十二尺自乗之一百四十四尺餘一平方少一百四十四尺為小分底之面積以一根多二尺自乘得一平方多四根多四尺為大腰之面積内減中垂線十二尺自乘之一百四十四尺餘一平方多四根少一百四十尺為大分底之面積又以底十四尺自乘得一百九十六尺内減去大小両分底之共面積二平方多四根少二百八十四尺餘四百八十尺少二平方少四根折半得二百四十尺少一平方少二根為小分底乘大分底之面積此數與大分底之面積及小分底之面積為連比例三率葢大分底之面積為首率而小分底乘大分底之面積為中率小分底之積為末率也乃以首率大分底之面積一平方多四根少一百四十尺與末率小分底之面積一平方少一百四十四尺相乘得一三乘方多四立方少二百八十四平方少五百七十六根多二萬零一百六十尺又以中率小分底乘大分底之面積二百四十尺少一平方少二根自乘得一三乘方多四立方少四百七十六平方少九百六十根多五萬七千六百尺此二數為相等両邊各減一三乘方四立方二萬零一百六十尺又各加四百七十六平方九百六十根得一百九十二平方多三百八十四根與三萬七千四百四十尺相等一百九十二平方多三百八十四根既與三萬七千四百四十尺相等則一平方多二根必與一百九十五尺相等乃以一百九十五尺為長方積以多二根作二尺為長闊較用帶縱較數開平方法算之得闊十三尺為一根之數即小腰加二尺得十五尺即大腰也設如有三角形底十四尺中垂線十二尺大腰與小腰之和二十八尺求大小腰各幾何法借一根為小腰則二十八尺少一根為大腰以一根自乘得一平方為小腰之面積内減中垂線十二尺自乘之一百四十四尺餘一平方少一百四十四尺為小分底之面積以二十八尺少一根自乘得七百八十四尺少五十六根多一平方為大腰之面積内減中垂線十二尺自乘之一百四十四尺餘一平方少五十六根多六百四十尺為大分底之而積又以底四十尺自乘得一百九十六尺内減去大小両分底之共面積二平方少五十六根多四百九十六尺餘五十六根少三百尺少二平方折半得二十八根少一百五十尺少一平方為小分底乘大分底之面積此數與大分底之面積及小分底之面積為連比例三率葢大分底之面積為首率而大分底乗小分底之而積為中率小分底之而積為末率也乃以首率大分底之面積一平方少五十六根多六百四十尺與末率小分底之面積一平方少一百四十四尺相乘得一三乘方少五十六立方多四百九十六平方多八千零六十四根少九萬二千一百六十尺又以中率小分底乘大分底之面積二十八根少一百五十尺少一平方自乘得一三乘方少五十六立方多一千零八十四平方少八千四百根多二萬二千五百尺此二數為相等両邊各減一三乘方又各加五十六立方得四百九十六平方多八千零六十四根少九萬二千一百六十尺與一千零八十四平方少八千四百根多二萬二千五百尺相等両邊各減四百九十六平方各加八千四百根又各加九萬二千一百六十尺得一萬六千四百六十四根與五百八十八平方多一十一萬四千六百六十尺相等一萬六千四百六十四根既與五百八十八平方多一十一萬四千六百六十尺相等則二十八根必與一平方多一百九十五尺相等故以一百九十五尺為長方積以二十八根作二十八尺為長闊和求得闊十三尺為一根之數即小腰也御製數理精藴下編巻三十七
