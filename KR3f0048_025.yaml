body:
  text: 欽定四庫全書御製數理精藴下編卷二十面部十曲線形曲線形設如圜徑一尺二寸問周幾何法用周徑定率比例以徑數一為一率周數三一四一五九二六五為二率今所設之圜徑一尺二寸為三率求得四率三尺七寸六分九釐九豪一絲一忽一微八纖即所求之圜之周數也蓋圜之數竒零不盡立法必自方數始是故圜內容形屢求勾股至億萬邊圜外切形屢求勾股至億萬邊內外凑集使圜周變為直線精密已極始為得之爰設圜徑為一而圜周得三一四一五九二六五有餘是為定率故以圜徑一與圜周三一四一五九二六五之比即同於今所設之圜徑一尺二寸與今所得之圜周三尺七寸六分九釐九豪一絲一忽一微八纖之比也又周徑定率比例以徑數一一三為一率周數三五五為二率今所設之圜徑一尺二寸為三率求得四率三尺七寸六分九釐九豪一絲一忽五微有餘為圜之周數也蓋以徑一周三一四一五九二六五之定率約之徑一一三周得三五四九九九九六九有餘進而為三五五則周數微大故今所得圜周亦微大然止在忽微之間耳又周徑定率比例以徑數七為一率周數二十二為二率今所設之圜徑一尺二寸為三率求得四率三尺七寸七分一釐四豪二絲八忽五微七纖有餘為圜之周數也蓋以徑一周三一四一五九二六五之定率約之徑七周得二一九九一一四八五有餘進而為二二則周數大而所得周數亦大至於舊術徑一圍三乃圜內容六等邊形之共度實小於圜之周線故徑一則圍三有餘圍三則徑一不足也設如圜周一丈五尺問徑幾何法用周徑定率比例以周數三一四一五九二六五為一率徑數一為二率今所設之圜周一丈五尺為三率求得四率四尺七寸七分四釐六豪四絲八忽二微有餘即所求之圜之徑數也蓋前法有徑求周故以定率之徑與定率之周為比即如今所設之徑與今所得之周為比此法有周求徑故以定率之周與定率之徑為比即如今所設之周與今所得之徑為比也又周徑定率比例以周數一為一率徑數三一八三九八八為二率今所設之圜周一丈五尺為三率求得四率四尺七寸七分四釐六豪四絲八忽二微為圜之徑數也蓋圜周為三一四一五九二六五則圜徑為一若圜周為一則圜徑為三一八三九八八其比例仍同也如以周數三五五為一率徑數一一三為二率今所設之圜周一丈五尺為三率亦得四率四尺七寸七分四釐六豪四絲七忽八微有餘為圜之徑數又或以周數二二為一率徑數七為二率今所設之圜周一丈五尺為三率則得四率四尺七寸七分二釐七豪二絲七忽二微有餘較之前法所得徑數稍小蓋徑為七而周稍小於二二若周為二二徑必稍大於七今截而為七則徑數稍小故所得徑數亦稍小也設如圜徑八寸問面積幾何法以圜徑八寸用徑求周法求得圜周二尺五寸一分三釐二豪七絲四忽一微二纖折半得一尺二寸五分六釐六豪二絲七忽零六纖與半徑四寸相乘得五十寸二十六分五十四釐八十二豪有餘即圜之面積也蓋圜之半徑線若與直角三角形之小邊線度等而圜之周界又與直角三角形之大邊線度等則此直角三角形之面積與圜形之面積相等見幾何原本四卷第二十一節如甲乙丙丁圜形其戊丙半徑與己庚辛直角三角形之己庚小邊線度等而甲乙丙丁圜周界與己庚辛直角三角形之庚辛大邊線度等則此己庚辛三角形之面積即與甲乙丙丁圜形之面積相等是故以戊丙半徑相等之己庚與乙丙丁半周相等之庚壬相乘所得之癸壬庚己長方形癸壬庚己長方形積即與己庚辛三角形積等即為圜之面積也如以全周與全徑相乘則以四歸之亦得圜面積蓋全徑為半徑之倍全周為半周之倍則全周全徑相乘之積必大於半周半徑相乘之積四倍為隔一位相加之比例故全周與全徑相乘以四歸之而得圜面積也又法用方邊圜徑相等方積圜積不同之定率比例以方積一為一率圜積七八五三九八一六為二率今所設之圜徑八寸自乘得六十四寸為三率求得四率五十寸二十六分五十四釐八十二豪有餘即圜之面積也此法蓋因圜徑方邊相等圜積方積不同故以圜徑自乘作方積定為面與面之比例如子寅圜徑為一則其自乘之辰己午未正方積為一而圜徑一所得之子丑寅卯圜面積為七八五三九八一六故以子寅圜徑一自乘之辰己午未正方積一與子寅圜徑所得之子丑寅卯圜面積七八五三九八一六之比即同於今所設之甲丙圜徑八寸自乘之戊己庚辛正方積六十四寸與今所得之甲乙丙丁圜面積五十寸二十六分五十四釐八十二豪有餘之比也又法用圜積方積相等圜徑方邊不同之定率比例以圜徑一為一率方邊八八六二二六九二為二率今所設之圜徑八寸為三率求得四率七寸零八釐九豪八絲一忽五微四纖有餘為與圜面積相等之正方形每邊之數自乘得五十寸二十六分五十四釐八十二豪有餘即圜之面積也此法蓋以圜積方積設為相等使圜徑與方邊不同先定為線與線之比例既得線而後自乘之為面也如子寅圜徑一其所得之積開方則得八八六二二六九二即為辰己午未正方之每邊是以子丑寅卯圜面積與辰己午未方面積為相等故子寅圜徑一與辰己方邊八八六二二六九二之比即同於今所設之甲丙圜徑八寸與今所得之戊己方邊七寸零八釐九豪八絲一忽五微四纖之比既得戊己方邊自乘得戊己庚辛方面積即與甲乙丙丁圜面積為相等也又法用方周圜周定率比例以方周數四五二為一率圜周數三五五為二率圜徑八寸自乘得六十四寸為三率求得四率五十寸二十六分五十四釐八十六豪有餘即圜之面積也此法蓋因方周與圜周之比同於方積與圜積之比見算法原本二卷第二十八節如子丑圜徑為一一三則子丑圜周為三五五寅卯辰己正方邊與圜徑同亦為一一三則寅卯辰己方周為四五二方邊一一三以四因之則得四五二試以正方面之午丑半徑為高寅卯辰己方周為底作一午丑未申長方形則比寅卯辰己正方形之面積大一倍又以圜面之午丑半徑為高子丑圜周為底作一午丑酉戌長方形則比子丑圜形之面積亦大一倍此兩長方形同以午丑為高故此兩長方面積之比例必同於兩底邊丑未與丑酉之比例且全與全之比例又同於半與半之比例故方積與圜積之比例亦必同於兩底邊丑未與丑酉之比例矣夫丑未即寅卯辰己方周丑酉即子丑圜周故以方周四五二與圜周三五五之比即同於今所設之甲丙圜徑自乘之戊己庚辛正方積與今所得之甲乙丙丁圜面積之比也又法以十四分為一率十一分為二率圜徑八寸自乘得六十四寸為三率求得四率五十寸二十八分五十七釐一十四豪有餘為圜之面積也此法亦係方周與圜周之比同於方積與圜積之比蓋圜徑七則圜周為二二半之得一一方邊七則方周為二八半之得一四故以十四分與十一分之比亦同於今所設圜徑自乘之方積與今所得圜面積之比也然所得之面積過大者因徑七圍二十二之定率其周既大故所得之圜積亦大也舊術圜積得方積四分之三求積則以圜徑自乘四分損一得圜積求徑則以圜積三分益一開方得圜徑此仍以徑一圍三立法故徑求積所得之數必小積求徑所得之數必大也設如圜周六尺六寸問面積幾何法以圜周六尺六寸用圜周求徑法求得圜徑二尺一寸零八豪四絲五忽二微有餘折半得一尺零五分零四豪二絲二忽六微有餘與半周三尺三寸相乘得三尺四十六寸六十三分九十四釐五十八豪有餘即圜之面積也又法用圜周方積與圜積定率比例以圜周方積一為一率圜積七九五七七四七為二率今所設之圜周六尺六寸自乘得四十三尺五十六寸為三率求得四率三尺四十六寸六十三分九十四釐五十九豪有餘即圜之面積也此法蓋以圜周自乘之正方積與圜積設為比例為面與面之比例也圜周為一則其自乘方積為一而圜周一所得之圜面積為七九五七七四七有餘故以圜周一自乘之方積一與圜積七九五七七四七之比即同於今所設之圜周六尺六寸自乘之方積四十三尺五十六寸與今所得之圜面積三尺四十六寸六十三分九十四釐五十九豪有餘之比也舊術圜積為周自乘方積十二分之一有圜周求積則以圜周自乘以十二除之得圜積有圜積求周則將圜積以十二因之開方得圜周此仍以徑一圍三立法故周求積所得之數必大積求周所得之數必小也設如圜面積六尺一十六寸問徑幾何法用圜徑方邊相等圜積方積不同之定率比例以圜積一為一率方積一二七三二三九五四為二率今所設之圜面積六尺一十六寸為三率求得四率七尺八十四寸三十一分五十五釐五十六豪六十四絲為與圜徑相等之正方邊之正方面積開方得二尺八寸零五豪六絲有餘即圜之徑數也蓋圜積為七八五三九八一六則方積為一若圜積為一則方積為一二七三二三九五四其比例仍同故以圜積一為一率者即如以圜積七八五三九八一六為一率而以方積一二七三二三九五四為二率者即如以方積一為二率也又法用圜積方積相等圜徑方邊不同之定率比例以方邊一為一率圜徑一一二八三七九一六為二率今所設之圜面積六尺一十六寸開方得二尺四寸八分一釐九豪三絲四忽有餘為三率求得四率二尺八寸零五豪六絲二忽有餘即圜之徑數也此法亦以圜積方積設為相等使圜徑與方邊不同故以圜面積開方得方邊為線與線之比例蓋方邊為八八六二二六九二則圜徑為一若方邊為一則圜徑為一一二八三七九一六其比例仍同故以方邊一為一率者即如以方邊八八六二二六九二為一率而以圜徑一一二八三七九一六為二率者即如以圜徑一為二率也又法用圜周方周定率比例以圜周三五五為一率方周四五二為二率今所設之圜面積六尺一十六寸為三率求得四率七尺八十四寸三十一分五十四釐九十二豪九十五絲有餘開方亦得二尺八寸零五豪六絲有餘為圜之徑數也又法以十一分為一率十四分為二率今所設之圜面積六尺一十六寸為三率求得四率七尺八十四寸開方得二尺八寸為圜之徑數也蓋徑七圍二十二之定率其徑既小則方周與方積亦皆小故開方所得之圜徑亦小也設如圜面積六尺一十六寸問周幾何法以圜面積六尺一十六寸用圜積求徑法求得圜徑二尺八寸零五豪六絲有餘又用圜徑求周法求得八尺七寸九分八釐二豪二絲有餘即圜之周數也又法用圜積與圜周方積定率比例以圜積一為一率圜周方積一二五六六三七六二為二率今所設之圜面積六尺一十六寸為三率求得四率七十七尺四十寸八十八分四十三釐零一豪有餘開方得八尺七寸九分八釐二豪有餘即圜之周數也蓋圜積為七九五七七四七則圜周自乘方積為一若圜積為一則圜周自乘方積為一二五六六三七六二其比例仍同故以圜積一與圜周自乘方積一二五六六三七六二之比即同於今所設之圜面積六尺一十六寸與今所得之圜周自乘方積七十七尺四十寸八十八分四十三釐零一豪之比既得圜周自乘方積開方即得圜周也設如撱圜形一音鴨蛋形大徑九尺小徑六尺問面積幾何法以大徑九尺與小徑六尺相乘得五十四尺為長方積乃用方邊圜徑相等方積圜積不同之定率比例以方積一為一率圜積七八五三九八一六為二率今所得之大小徑相乘之長方積五十四尺為三率求得四率四十二尺四十一寸一十五分零六十四豪即撱圜形之面積也蓋圜面積與撱圜面積之比同於圜外所切之正方形積與撱圜形外所切之長方積之比見幾何原本八卷第十二節則圜外所切之正方形積與圜面積之比亦必同於撱圜形外所切之長方形積與撱圜面積之比也如甲乙丙丁撱圜形甲丙大徑九尺乙丁小徑六尺以大徑與小徑相乘遂成戊己庚辛長方形此長方形積與撱圜形積之比即同於正方積與圜積之比故以定率之方積數為一率圜積數為二率今所得之大小徑相乘之長方積為三率求得四率為撱圜形之面積也設如撱圜形面積四十二尺四十一寸一十五分零六十四豪大徑九尺問小徑幾何法用圜徑方邊相等圜積方積不同之定率比例以圜積一為一率方積一二七三二三九五四為二率今所設之撱圜形面積四十二尺四十一寸一十五分零六十四豪為三率求得四率五十四尺為長方積以大徑九尺除之得六尺即撱圜形之小徑也蓋方面積與圜面積之比既同於長方面積與撱圜形面積之比則圜面積與方面積之比亦必同於撱圜形面積與長方面積之比也如甲乙丙丁撱圜形用定率比例而得戊己庚辛長方形其戊己長與甲丙大徑等其己庚闊與乙丁小徑等故以大徑除之得小徑也如有小徑求大徑則以所得長方積用小徑除之而得大徑也設如圓環形外周二十一尺三寸內周七尺一寸闊二尺二寸六分求面積幾何法以外周二十一尺三寸與內周七尺一寸相加得二十八尺四寸折半得一十四尺二寸以闊二尺二寸六分乘之得三十二尺零九寸二十分即圓環形之面積也如圖甲乙丙丁圓環形甲乙外周二十一尺三寸丙丁內周七尺一寸甲丙與丁乙皆二尺二寸六分試依甲乙大圜之戊乙半徑度與甲乙圜周度作一己庚辛直角三角形其己庚小邊與甲乙大圜之戊乙半徑等庚辛大邊與大圜之周界等則己庚辛直角三角形之面積與甲乙大圜之面積等又依丙丁小圜之戊丁半徑截己庚辛三角形之己庚小邊於壬又依丙丁小圜周度作壬癸線與庚辛平行則成己壬癸一小直角三角形其面積與丙丁小圜之面積等如於己庚辛大三角形內減己壬癸小三角形所餘癸辛庚壬斜尖方形之面積必與甲乙丙丁圓環形之面積等矣故如斜尖方形求積法以如丙丁內周之壬癸與如甲乙外周之庚辛相加折半得丑庚而以如丁乙闊之壬庚乘之得子丑庚壬一長方形與癸辛庚壬斜尖方形等即甲乙丙丁圓環形之面積也設如圓環形外徑二尺四寸內徑一尺二寸求面積幾何法以外徑二尺四寸求得周七尺五寸三分九釐八豪二絲有餘又以內徑一尺二寸求得周三尺七寸六分九釐九豪一絲有餘乃以內徑一尺二寸與外徑二尺四寸相減餘一尺二寸折半得六寸為圓環形之闊依前法算之得三尺三十九寸二十九分二十釐有餘為圓環形之面積也又法以外徑二尺四寸自乘得五尺七十六寸又以內徑一尺二寸自乘得一尺四十四寸兩數相減餘四尺三十二寸為方環面積乃用方積圜積定率比例以方積一為一率圜積七八五三九八一六為二率今所得之方環面積四尺三十二寸為三率求得四率三尺三十九寸二十九分二十釐有餘即圓環形之面積也此法蓋以方環圓環為比例即如用方積圜積定率為比例也分而言之則外徑自乘與外大圜面積為比內徑自乘與內小圜面積為比既得兩圜面積相減始為圓環面積今以內外徑各自乘相減即用方積圜積定率比例是合兩比例而為一比例也設如圓環形外周六尺六寸內周二尺二寸求面積幾何法以外周六尺六寸求得徑二尺一寸零八豪四絲有餘又以內周二尺二寸求得徑七寸零二豪八絲有餘兩徑相減餘一尺四寸零五豪六絲有餘折半得七寸零二豪八絲有餘為圓環形之闊依前法算之得三尺零八寸一十二分三十二釐有餘即圓環形之面積也又法以外周六尺六寸自乘得四十三尺五十六寸內周二尺二寸自乘得四尺八十四寸兩數相減餘三十八尺七十二寸乃用圜周方積與圜積定率比例以圜周方積一為一率圜積七九五七七四七為二率兩周自乘相減之餘三十八尺七十二寸為三率求得四率三尺零八寸一十二分三十九釐有餘即圓環形之面積也此法蓋以兩圜周自乘相減之餘積與圓環積為比例即如用圜周方積圜積定率為比例也分而言之則外周自乘與外大圜面積為比內周自乘與內小圜面積為比既得兩圜面積相減始為圓環面積今以內外周各自乘相減即用圜周方積圜積定率比例是合兩比例而為一比例也設如圓環形面積四百六十二尺闊七尺求內外徑各幾何法以闊七尺除圓環面積四百六十二尺得六十六尺即內外周相併折半之數為中周乃以周求徑法求得徑二十一尺零八釐四豪五絲有餘為內外徑相併折半之數為中徑加闊七尺得二十八尺零八釐四豪五絲有餘即外徑中徑內減闊七尺餘一十四尺零八釐四豪五絲有餘即內徑也如圖甲乙丙丁圓環形其面積四百六十二尺甲丙與丁乙皆七尺先所得之中周六十六尺為戊己周次所得之中徑二十一尺零八釐四豪五絲有餘為戊己徑其甲戊與戊丙等丁己與己乙等故甲戊與己乙兩段戊丙與丁己兩段皆與丁乙及甲丙闊度等是以於中徑內加闊得外徑減闊得內徑也又法先用圜積方積定率比例以圜積一為一率方積一二七三二三九五四為二率圓環積四百六十二尺為三率求得四率五百八十八尺二十三寸六十六分六十七釐有餘為方環積乃以闊七尺自乘得四十九尺以四因之得一百九十六尺與所得之方環積相減餘三百九十二尺二十三寸六十六分六十七釐有餘四歸之得九十八尺零五寸九十一分六十六釐有餘以闊七尺除之得一十四尺零八釐四豪五絲有餘為內圜徑加倍闊十四尺得二十八尺零八釐四豪五絲有餘為外圜徑也此法蓋以圓環積變為方環積即如前法方環積變為圓環積也如甲乙丙丁圓環形變為戊己庚辛壬癸子丑方環形內減戊寅壬辰卯已巳癸子午庚酉未丑申辛闊自乘之四正方形餘寅卯癸壬癸巳午子丑子酉申辰壬丑未四長方形四歸之餘寅卯癸壬一長方形以寅壬闊除之得壬癸長與丙丁內徑等加甲丙與丁乙得甲乙即外徑也設如圓環形面積三百零八尺闊七尺求內外周各幾何法以闊七尺除圓環面積三百零八尺得四十四尺為內外周相併折半之數為中周又用徑求周法以徑數一為一率周數三一四一五九二六五為二率闊七尺為三率求得四率二十一尺九寸九分一釐一豪四絲有餘為內外周相減折半之數為半較乃以半較二十一尺九寸九分一釐一豪四絲有餘與中周四十四尺相加得六十五尺九寸九分一釐一豪四絲有餘即外周數以半較二十一尺九寸九分一釐一豪四絲有餘與中周四十四尺相減餘二十二尺零八釐八豪六絲有餘即內周數也如圖甲乙丙丁圓環形其面積三百零八尺丁乙闊七尺試依甲乙大圜之戊乙半徑度與甲乙圜周度作一己庚辛直角三角形則己庚辛三角形之面積與甲乙大圜之面積等又依丙丁小圜之戊丁半徑截己庚辛三角形之己庚小邊於壬又依丙丁小圜周度作壬癸線與庚辛平行則成己壬癸一小直角之三角形積乃與丙丁小圜之面積等如於己庚辛大三角形內減己壬癸小三角形所餘癸辛庚壬斜尖方形之面積必與甲乙丙丁圓環面積等矣而癸辛庚壬斜尖方形積又與子丑庚壬長方形積等故以如丁乙闊之壬庚除之得丑庚為內外周相併折半之中周數又以寅庚全徑與庚辛全周之比同於丁乙圓環闊與子丑等與辛丑半較之比蓋丁乙為內外徑相減折半之較辛丑即內外周相減折半之較為相當比例四率也既得辛丑與丑卯等即辛庚外周大於丑庚中周之較亦即癸壬內周與卯庚等小於丑庚中周之較故於中周加半較得外周減半較得內周也設如圓環形面積三尺三十六寸內周一尺一寸求外周及闊各幾何法以內周一尺一寸用周求徑法求得內徑三寸五分零一豪有餘又用周徑求積法求得內周圜面積九寸六十二分七十七釐五十豪有餘與圓環積三尺三十六寸相加得三尺四十五寸六十二分七十七釐五十豪有餘即外周圓面積乃用圜積方積定率比例以圜積一為一率方積一二七三二三九五四為二率今所得之外周圜面積三尺四十五寸六十二分七十七釐五十豪有餘為三率求得四率四尺四十寸零六分六十九釐一十七豪有餘為外徑自乘之方積開方得二尺零九分七釐七豪有餘即外徑減去內徑三寸五分零一豪餘一尺七寸四分七釐六豪折半得八寸七分三釐八豪即圓環形之闊又用徑求周法求得周六尺五寸九分零一豪有餘即外周數也設如圓環形面積三百八十四尺外周八十八尺求內周及闊各幾何法以外周八十八尺用周求徑法求得外徑二十八尺零一分一釐二豪有餘又用周徑求積法求得外周圜面積六百一十六尺二十四寸六十四分有餘內減去圓環積三百八十四尺餘二百三十二尺二十四寸六十四分有餘為內周圜面積乃用圜積方積定率比例以圜積一為一率方積一二七三二三九五四為二率今所得之內周圜面積二百三十二尺二十四寸六十四分為三率求得四率二百九十五尺七十寸五十二分九十九釐五十豪有餘即內徑自乘之方積開方得一十七尺一寸九分六釐有餘即內徑與外徑二十八尺零一分一釐二豪相減餘一十尺八寸一分五釐二豪有餘折半得五尺四寸零七釐六豪即圓環形之闊又用徑求周法求得周五十四尺零二分二釐八豪有餘即內周數也設如圜徑一尺二寸今截弧矢形一段矢闊二寸四分求弦長幾何法以矢闊二寸四分為首率圜徑一尺二寸內減矢闊二寸四分餘九寸六分為末率首率末率相乘得二十三寸零四分開方得四寸八分為中率倍之得九寸六分即弧矢形之弦數也如圖甲乙圜徑一尺二寸截甲丙丁弧矢形其甲戊為矢闊二寸四分試自甲至丙作甲丙線自丙至乙作丙乙線遂成甲丙乙直角三角形而丙戊半弦即為其垂線故所截甲戊為首率戊乙為末率求得丙戊為中率見幾何原本九卷第二節並見勾股卷定勾股無零數法中倍之得丙丁即弧矢形之弦也又法以圜徑一尺二寸折半得半徑六寸為弦矢闊二寸四分與半徑六寸相減餘三寸六分為勾求得股四寸八分倍之得九寸六分得弧矢形之弦數也如圖甲乙圜徑一尺二寸折半得甲己半徑六寸與丙己等為弦又於甲己半徑六寸內減甲戊矢闊二寸四分餘戊己三寸六分為勾求得丙戊股倍之得丙丁為弧矢形之弦也設如圜徑一尺七寸今截弧矢形一段弦長一尺五寸求矢闊幾何法以弦長一尺五寸折半得半弦七寸五分自乘得五十六寸二十五分為長方積以圜徑一尺七寸為長闊和用帶縱和數開方法算之得闊四寸五分即矢之闊也如圖甲乙圜徑一尺七寸截甲丙丁弧矢形其丙丁為弦長一尺五寸自甲至丙自丙至乙作二線成甲丙乙直角三角形而丙戊為垂線故甲戊為首率戊乙為末率丙戊為中率中率自乘之正方與首率末率相乘之長方等今以丙丁弦折半得半弦丙戊自乘即與甲戊矢為闊戊乙截徑為長相乘之長方等故以甲乙為長闊和求得甲戊闊即矢也又法以圜徑一尺七寸折半得八寸五分為弦以弦長一尺五寸折半得七寸五分為股求得勾四寸與半徑八寸五分相減餘四寸五分即矢之闊也如圖甲乙圜徑一尺七寸折半得丙己半徑八寸五分為弦丙丁弦一尺五寸折半得丙戊七寸五分為股求得戊己勾與甲己半徑相減餘甲戊即矢之闊也又法以圜徑一尺七寸為弦弧弦一尺五寸為股求得勾八寸與圜徑一尺七寸相減餘九寸折半得四寸五分即矢之闊也如圖甲乙圜徑一尺七寸與丁庚等如自丙至庚作丙庚線則成丁丙庚直角三角形故以丁庚為弦丙丁為股求得丙庚勾與戊辛等以戊辛與甲乙全徑相減餘甲戊與辛乙兩假折半即得甲戊為矢之闊也設如弧矢形弦長一尺二寸矢闊四寸求圜徑幾何法以矢闊四寸為首率弦長一尺二寸折半得六寸為中率乃以中率六寸自乘用首率四寸除之得九寸為圜之截徑加矢闊四寸得一尺三寸即圜之徑數也如圖甲乙丙丁弧矢形甲丙弦長一尺二寸丁乙矢闊四寸試繼甲丁丙弧作一全圜法見幾何原本十一卷十三節將丁乙矢線引長作丁戊全徑線又自甲至丁作甲丁線自甲至戊作甲戊線遂成丁甲戊直角三角形而甲乙半弦即為其中垂線故丁乙矢為首率乙戊截徑為末率而甲乙半弦即為中率故丁乙與甲乙之比同於甲乙與乙戊之比而得乙戊截徑加丁乙矢即得丁戊為圜之全徑也設如弧矢形弦長八尺矢闊二尺求面積幾何法先用弧矢形有弦矢求圜徑法求得圜之全徑十尺折半得半徑五尺為一率半弦四尺為二率以半徑十萬為三率求得四率八萬為正弦數撿八線表得五十三度零七分四十九秒為半弧之度分倍之得一百零六度一十五分三十八秒為全弧之度分乃以全圜三百六十度化作一百二十九萬六千秒為一率全弧一百零六度十五分三十八秒化作三十八萬二千五百三十八秒為二率全徑十尺求得全周三十一尺四寸一分五釐九豪二絲有餘為三率求得四率九尺二寸七分二釐九豪八絲有餘為全弧之數與半徑五尺相乘得四十六尺三十六寸四十九分折半得二十三尺一十八寸二十四分五十釐為自圜心所分弧背三角形積又於半徑五尺內減矢二尺餘三尺與弦八尺相乘得二十四尺折半得十二尺為自圜心至弦所分直線三角形積與弧背三角形積二十三尺一十八寸二十四分五十釐相減餘一十一尺一十八寸二十四分五十釐即弧矢形之面積也如圖甲乙丙丁弧矢形甲丙弦長八尺丁乙矢闊二尺甲乙為半弦四尺試繼此弧作一全圜求得丁戊全徑解見前折半得己丁半徑既得半徑而甲乙半弦又即為甲丁半弧之正弦故比例得正弦數撿表而得甲丁半弧之度分倍之得甲丁丙全弧之度分又甲戊丙丁全圜之度分與甲丁丙全弧之度分之比同於甲戊丙丁全周之尺寸與甲丁丙全弧之尺寸之比而得甲丁丙全弧之數與己丁半徑相乘折半即得甲己丙丁弧背三角形之面積又於丁己半徑內減丁乙矢餘乙己為截半徑與甲丙弦相乘折半得甲己丙直線三角形面積與甲己丙丁弧背三角形面積相減餘即甲乙丙丁弧矢形之面積也設如圜形截弧矢一段所截弧度一百二十度弧界長二尺二寸求圜徑及弦長矢闊各幾何法以截弧一百二十度為一率全圜三百六十度為二率截弧二尺二寸為三率求得四率六尺六寸為圜之周數用圜周求徑法求得圜徑二尺一寸零八豪四絲有餘乃以半徑十萬為一率截弧一百二十度折半得六十度查正弦得八萬六千六百零三倍之得一十七萬三千二百零六即一百二十度之通弦為二率今所得之圜徑二尺一寸零八豪四絲有餘折半得一尺零五分零四豪二絲有餘為三率求得四率一尺八寸一分九釐三豪九絲有餘即弧矢形之弦數又以半徑十萬為一率六十度之餘弦五萬與半徑十萬相減餘五萬即六十度之正矢為二率今所得之半徑一尺零五分零四豪二絲有餘為三率求得四率五寸二分五釐二豪一絲有餘即弧矢形之矢數也如圖甲乙丙丁圜形截甲乙戊丁弧矢形一段知乙甲丁弧一百二十度又知乙甲丁弧界為二尺二寸求甲丙全徑及乙丁弦甲戊矢則以乙甲丁弧一百二十度與甲乙丙丁全圜三百六十度之比即同於乙甲丁弧界二尺二寸與甲乙丙丁全圜界六尺六寸之比也既得全周求得甲丙全徑折半於己心自己至乙作己乙半徑線則乙戊即如六十度之正弦乙丁即如一百二十度之通弦甲戊即如六十度之正矢故以半徑十萬與一百二十度之通弦一十七萬三千二百零六之比即同於己乙半徑一尺零五分零四豪二絲有餘與乙丁全弦一尺八寸一分九釐三豪九絲有餘之比又半徑十萬與六十度之正矢五萬之比即同於己乙半徑與甲戊矢五寸二分五釐二豪一絲有餘之比也設如圜形截弧矢一段任自弧界一處對圜心至弦作一斜線長一尺二寸將全弦分為大小兩段大段長一尺八寸小段長一尺六寸問圜徑幾何法以所作之斜線一尺二寸為一率截弦小段一尺六寸為二率大段一尺八寸為三率求得四率二尺四寸為自截弦處過圜心至圜對界之線將此線與所作之斜線一尺二寸相加得三尺六寸即圜徑也如圖甲乙丙丁圜形截甲乙丁弧矢形任自圜界甲對圜心戊至乙丁弦上作甲己斜線將乙丁弦分為乙己己丁兩段乙己小段一尺六寸己丁大段一尺八寸試將甲己斜線引長過圜心至圜對界丙作甲丙線又自甲至乙作甲乙線復自丁至丙作丁丙線遂成甲己乙丁己丙兩同式三角形乙角對甲丁弧丙角亦對甲丁弧甲角對乙丙弧丁角亦對乙丙弧兩己角為對角故兩三角形為同式形也故以甲己與乙己之比即同於己丁與己丙之比既得己丙與甲己相加即得甲丙為圜徑也設如圜形截弧矢一段任自弧界一處至弦作一垂線長一尺二寸將全弦分為大小兩段其大段長三尺小段長一尺問圜徑幾何法以所作垂線一尺二寸為一率截弦小段一尺為二率大段三尺為三率求得四率二尺五寸為自截弦處至圜對界之直線乃以此線與所作之垂線一尺二寸相加得三尺七寸為股以截弦小段一尺與大段三尺相減餘二尺為勾求得弦四尺二寸即圜徑也如圖甲乙丙丁圜形截甲乙丁弧矢形任自弧界甲至乙丁弦上作甲戊垂線長一尺二寸將乙丁弦分為乙戊戊丁兩假乙戊小段一尺戊丁大假三尺試將甲戊垂線引長至圜對界丙作甲丙線又自甲至乙作甲乙線復自丁至丙作丁丙線遂成甲戊乙丁戊丙兩同式三角形乙角對甲丁弧丙角亦對甲丁弧甲角對乙丙弧丁角亦對乙丙弧兩戊角俱為直角故兩三角形為同式形也故以甲戊與戊乙之比同於丁戊與戊丙之比既得戊丙與甲戊相加即得甲丙又以乙戊同己丁與戊丁相減餘戊己與甲庚等乃自甲至庚作甲庚線與乙丁平行則甲角為直角必立於圜界之一半又自庚至丙作庚丙線則又成庚甲丙勾股形故以庚甲為勾甲丙為股求得庚丙弦即圜徑也設如一大圜形內容四小圜形但知大圜形徑一尺二寸求小圜形徑幾何法以大圜形徑一尺二寸自乘倍之開方得一尺六寸九分七釐零五絲有餘內減大圜形徑一尺二寸餘四寸九分七釐零五絲有餘即小圜形徑也如圖甲大圜形內容乙丙丁戊四小圜形試切甲大圜形界作己庚辛壬正方形其方邊即大圜形全徑用方邊求斜弦法求得壬庚己辛兩斜弦即成己甲壬己甲庚庚甲辛壬甲辛四勾股形內各容一小圜形而四方邊遂為四勾股形之各弦兩斜弦各折半遂各為四勾股形之各勾股任取一勾股和減弦即得容圜全徑也解見勾股容圜法中設如一大圜形內容四小圜形但知小圜形徑五寸求大圜形徑幾何法以小圜形徑五寸自乘倍之開方得七寸零七釐一豪有餘加小圜形徑五寸得一尺二寸零七釐一豪有餘即大圜形徑也如圖甲大圜形內容乙丙丁戊四小圜形試連四小圜形中心作乙丙丙丁丁戊戊乙四線遂成乙丙丁戊一正方形用方邊求斜弦法求得乙丁斜弦加己乙與丁庚兩半徑即一小圜形之全徑即得己庚大圜形全徑也設如一大圜形內容三小圜形但知大圜形徑一尺二寸求內容小圜形徑幾何法以大圜形徑一尺二寸求得外切三角形之每邊為二尺零七分八釐四豪六絲有餘乃以大圜形徑一尺二寸為三角形之兩腰半徑六寸為中埀線用三角形容圜法求得容圜半徑二寸七分八釐四豪六絲有餘倍之得五寸五分六釐九豪二絲有餘即小圜形全徑也如圖甲大圜形內容乙丙丁三小圜形試求外切甲大圜界戊己庚三角形自圜心甲至戊己庚三角各作一分角線皆與圜之全徑等即成戊甲己己甲庚戊甲庚三三角形內各容一小圜形故任以兩全徑為兩腰一半徑為中垂線用三角形容圜法算之即得一小圜徑也設如一大圜形內容三小圜形但知小圜形徑五寸求大圜形徑幾何法以小圜形徑五寸為等邊三角形之每一邊用等邊三角形求外切圜形全徑法求得外切圜徑五寸七分七釐三豪五絲有餘加小圜全徑五寸得一尺零七分七釐三豪五絲有餘即大圜形全徑也如圖甲大圜形內容乙丙丁三小圜形試連三小圜形中心作乙丙乙丁丙丁三線遂成乙丙丁等邊三角形其每邊皆與小圜全徑等又切乙丙丁三角作一圜形用等邊三角形求外切圜形全徑法解見三角形卷求得乙戊徑線加己乙與戊庚兩半徑即一小圜形之全徑即得己庚大圜形全徑也御製數理精蘊下編卷二十
