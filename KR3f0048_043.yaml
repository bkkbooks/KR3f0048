一四為二率截用十四位以從簡易今開方二十三次所得之零數九二二六二八八九一四三七為三率得四率四六九二六三六一九七六五二即為開方第二十三次之假數前則為十空位二率有十四位而其前為十一空位今四率得十五位故前為十空位以加倍二十三次之率數八三八八六八乘之得三三六一二五三四五蓋開方第二十三次之假數為十五位并前十空位共二十五位今相乘得二十二位故前止有三空位亦共為二十五位也此截用十二位即為第一率一七七六九六之假數然首位之一開方雖命為單位其實則為千萬千萬之假數首位應為七故首位為七得七三三六一二五三四五是為一千零七萬七千六百九十六之假數又因其為連比例第九率故用九歸之得七七八一五一二五三八即為連比例第一率六之假數也明對數之目用遞次開方求假數法之七凡求假數先求得一至九一一至一九一一至一九一一至一九以及三位零一至九四空位零一至九五空位零一至九六空位零一至九七空位零一至九八空位零一至九九空位零一至九之九十九數而他數皆由此生然此九十九數內有以兩數相乘除而得者則以兩假數相加減即為所求真數之假數至五空位以後則又可以比例而得不必逐一而求也如一至九之九數惟二三七之三數用前遞次開方求假數法求之至於四則係二與二相乘所得之數故以二之假數三一二九九九五六六倍之得六二五九九九一三三即為四之假數至於五係以二除十所得之數故以二之假數與十之假數相減餘六九八九七四三四即為五之假數至於六係二與三相乘所得之數故以二之假數與三之假數相加得七七八一五一二五三八即為六之假數或先得六之假數內減二之假數即得三之假數至於八係二與四相乘所得之數故以二之假數與四之假數相加得九三八九九八六九九即為八之假數至於九係三與三相乘所得之數故以三之假數四七七一二一二五四七二倍之得九五四二四二五九四四即為九之假數或先得九之假數折半即得三十假數如一一至一九之九數惟一一一三一七一九之四數用前遞次開方求假數法求之至於一二係二與六相乘所得之數故以二之假數與六之假數相加得一七九一八一二四六四為一十二之假數內減首位之一餘七九一八一二四六四即為一二之假數蓋自一一至九空位零九其首位之一皆為單位首位以下為小餘試將一十二以十除之仍得一二則其首位之一即為單位二為小餘故於十二之假數內減首位之一即減去十之假數而所餘為一二之假數也至於一四乃二與七相乘所得之數故以二之假數與七之假數相加得一一四六一二八三五六七為一十四之假數內減首位之一餘一四六一二八三五六七即為一四之假數至於一五乃三與五相乘所得之數故以三之假數與五之假數相加得一一七六九一二五九六為一十五之假數內減首位之一餘一七六九一二五九六即為一五之假數餘皆倣此詳見對數闡微至於一一以後之假數則即可用前遞次開方表內相近數比例而得之如求一一之假數則以前表內開方第二十一次真數五空位後之零數一九七九五八七三五為一率截用十位以從簡便其假數七空位後之零數四七六八三七一五八二為二率亦截用十位今真數之零數一為一率添九空位以足其分得四率四三四二九四三有餘前亦仍為七空位因假數止用十二位故四率止求七位并七空位為十四位已為足用截前十二位得四三四二九即為一一之假數二因之得八六八五九第十三位滿五則進一數餘倣此即為一二之假數三因之得一三二八八即為一三之假數又以前表內開方第十九次真數五空位後之零數四三九一八四二一七三為一率其假數六空位後之零數一九七三四八六三二為二率今真數之零數四為三率添九空位以足其分得四率一七三七一七四前亦仍為六空位截前十二位得一七三七一七即為一四之假數不以前所得四率四因之者因前所得一一之假數四因之則微小且表內第十九次開方數與此所求真數相近故又用比例以求其準將所得一四之假數四歸五因將一四之假數四歸五因者因欲得一一之假數而以五因之也得二一七一四七即為一五之假數將所得一四之假數四歸六因得二六五七六即為一六之假數又以前表內開方第十八次真數五空位後之零數八七八三七三六三四為一率其假數六空位後之零數三八一四六九七二六五為二率今真數之零數七為三率得四率三四四八前亦仍為六空位截前十二位得三四五即為一七之假數不以前所得四率四歸七因者因前所得一四之假數四歸七因之則微小且表內第十八次開方數與此所求真數相近故又用比例以求其準將所得一七之假數七歸八因得一三四七四三四即為一八之假數又將所得一七之假數七歸九因得三九八六三即為一九之假數至於一一以後之假數則并不用比例蓋五空位零一之假數為四三四二九而前所得十五空位零一之假數亦為四三四二九其假數皆相同但遞退一位故以五空位零一至九之假數從未截去一位末位滿五以上則進一數前添一空位即得六空位零一至九之假數以六空位零一至九之假數從末截去一位前添一空位即得七空位零一至九之假數以七空位零一至九之假數從末截去一位前添一空位即得八空位零一至九之假數以八空位零一至九之假數從末截去一位前添一空位即得九空位零一至九之假數明對數之目用前所得九十九數求他假數法之一凡求假數既得前九十九數而他數有由此乘除而得者則以假數相加減即得所求之假數其不由乘除而得者謂之數根因無他數可以度盡即算法原本所謂連比例之至小數則其假數亦不可以加減而得然有雖為數根而前九十九數中有為其根所生者則逆求之即得原根之假數如前九十九數首位既皆為單位則以十乘之即為十以百乘之即為百以千乘之即為千以萬乘之即為萬故以二之假數與一十之假數相加即為二十之假數與一百之假數相加即為二百之假數與一千之假數相加即為二千之假數與一萬之假數相加即為二萬之假數又如十一之假數與一十之假數相加即為一百一十之假數以一五之假數與一百之假數相加即為一百零五之假數與一千之假數相加即為一千零五十之假數真數同則假數亦同但真數進一位則假數首位加一數耳又如三與七相乘得二十一則以三之假數與七之假數相加即為二十一之假數二與十一相乘得二十二則以二之假數與十一之假數相加即為二十二之假數至於二十三二十九之類則不以乘除而得是為數根若夫五十三雖亦為數根然以五十三與二相乘則得一百零六前既得一六之假數則與一百之假數相加即為一百零六之假數內減二之假數即為五十三之假數由此類推數自繁衍而其不可以乘除而得者則又以纍乘纍除之法而得之詳見後要未有出於前九十九數之外者也明對數之目用前所得九十九數求他假數法之二凡求假數其真數有以纍乘而得者則以假數纍加之即得所求之假數如二萬零七百零三為二萬與一三及一五纍乘所得之數則以二萬之假數四三一二九九九五六六與一三之假數一二八三七二二四七一及一五之假數二一六六六一七六相加得四三一六三三二八二一三即為二萬零七百零三之假數若先有假數四三一六三三二八二一三求真數則視假數內足減二萬之假數即以二萬之假數書於原假數下相減餘一五三二八六四七足減一三之假數即以一三之假數書於減餘之下相減餘二一六六六一七六與一五之假數恰合是知其假數為二萬與一三及一五之三假數相加所得之數則其真數即知為三真數纍乘所得之數矣乃以二萬與一三相乘得二萬零六百再以一五乘之得二萬零七百零三即為所求之真數也明對數之目用前所得九十九數求他假數法之三凡求假數而不知其真數為何數纍乘而得者則以所知前位之整數纍除之除得纍乘之真數則以其假數纍加之即得所求之假數如求二十三之假數而不知其為何數纍乘而得但知二十之假數為一三一二九九九五六六則以二十三為實以二十為法除之得一一又以兩層所減數按位相加得二二即二十與一一相乘之數以之為法除原實二十三得一四又以兩層所減數按位相加得二二八八即二二與一四相乘之數以之為法除原實二十三得一五又以兩層所減數按位相加得二二九九四四即二二八八與一五相乘之數以之為法除原實二十三得一二又以兩層所減數按位相加得二二九九八九九八八八即二二九九四四與一二相乘之數以之為法除原實二十三得一四又以兩層所減數按位相加得二二九九九九一八八四法止用十位故第十一位滿五以上者進一數用若不滿五則去之即二二九九八九九八八八與一四相乘之數以之為法除原實二十三得一三又以兩層所减數相加得二二九九九九八七八四即二二九九九九一八八四與一三相乘之數以之為法除原實二十三得一五又以兩層所減數按位相加得二二九九九九九九三四即二二九九九九八七八四與一五相乘之數以之為法除原實二十三得一二又以兩層所減數按位相加得二二九九九九九九八即二二九九九九九九三四與一二相乘之數以之為法除原實二十三得一八又以兩層所減數按位相加得二二九九九九九九九八即二二九九九九九九八與一八相乘之數以之為法除原實二十三得一八是知二十三係二十與一一及一四一五一二一四一三一五一二一八一八纍乘所得之數乃以其各假數纍加之得一三六一七二七八三六六即為二十三之假數也若先有假數一三六一七二七八三六六求真數則視假數內足減二十之假數即以二十之假數書於原假數之下相減餘六六九七八四四足減一一之假數即以一一之假數書於減餘之下相減餘一九三五一五五二四足減一四之假數即以一四之假數書於減餘之下相減餘二二七一八一五九四足減一五之假數即以一五之假數書於減餘之下相減餘一五七五四一八足減一二之假數即以一二之假數書於減餘之下相減餘一八九三九七足減一四之假數即以一四之假數書於減餘之下相減餘一五三二五四足減一三之假數即以一三之假數書於減餘之下相減餘二二九六六足減一五之假數即以一五之假數書於減餘之下相減餘一二五一足減一二之假數即以一二之假數書於減餘之下相減餘三八二足減一八之假數即以一八之假數書於減餘之下相減餘三五足減一八之假數即以一八之假數書於減餘之下相減恰盡是知其假數為此十一假數纍加所得之數而真數即為此十一真數纍乘所得之數乃以此十一真數纍乘之得二十三即為所求之真數也又如求五千六百八十九之假數而不知其為何數纍乘而得但知五千六百之假數為三七四八一八八二七則以五千六百八十九為實以五千六百為法除之得一一又以兩層所減數按位相加得五六五六即五千六百與一一相乘之數以之為法除原實五千六百八十九得一五又以兩層所減數按位相加得五六八四二八即五六五六與一五相乘之數以之為法除原實五千六百八十九得一八又以兩層所減數按位相加得五六八八八二七四二四即五六八四二八與一八相乘之數以之為法除原實五千六百八十九得一三又以兩層所減數按位相加得五六八八九九八八九即五六八八八二七四二四與一三相乘之數以之為法除原實五千六百八十九得一三又以兩層所減數按位相加得五六八八九九九七九六即五六八八九九八八九與一三相乘之數以之為法除原實五千六百八十九得一三又以兩層所減數按位相加得五六八八九九九九六七即五六八八九九九七九六與一三相乘之數以之為法除原實五千六百八十九得一五又以兩層所減數按位相加得五六八八九九九九九五即五六八八九九九九六七與一五相乘之數以之為法除原實五千六百八十九得一八是知五千六百八十九係五千六百與一一及一五一八一三一三一三一五一八纍乘所得之數乃以其各假數纍加之得三七五五三五九三三七一即為五千六百八十九之假數也若先有假數三七五五三五九三三七一求真數則視假數內足減五千六百之假數即以五千六百之假數書於原假數之下相減餘六八四七九六七一足減一一之假數即以一一之假數書於減餘之下相減餘二五二六五三二九三足減一五之假數即以一五之假數書於減餘之下相減餘三六四七一一七足減一八之假數即以一八之假數書於減餘之下相減餘一三一七四四八足減一三之假數即以一三之假數書於減餘之下相減餘一四五八四足減一三之假數即以一三之假數書於減餘之下相減餘一五五五足減一三之假數即以一三之假數書於減餘之下相減餘二五二足減一五之假數即以一五之假數書於減餘之下相減餘三五足減一八之假數即以一八之假數書於減餘之下相減恰盡是知其假數為此九假數纍加所得之數而真數即為此九真數纍乘所得之數乃以此九真數纍乘之得五千六百八十九即為所求之真數也求八線對數凡求八線之假數定半徑為一百億位數既多為用愈密且真數十一位則假數首位為一又取其便於用也先以正弦餘弦之真數求得假數復以正弦餘弦之假數加減之即得切線割線之假數如一分之正弦為二九八八八二求其假數得六四六三七二六一一九又如六十度之正弦為八六六二五四三八求其假數得九九三七五三六三一七如求六十度切線之假數則以六十度正弦之假數九九三七五三六三一七為二率半徑之假數一為三率六十度餘弦之假數九六九八九七四三為一率二三率相加內減一率餘一二三八五六六二七四即六十度正切線之假數如求六十度割線之假數則以半徑之假數一為二率又為三率六十度餘弦之假數九六九八九七四三為一率二率倍之內減一率餘一三一二九九九五七即六十度正割線之假數也對數用法設如一百二十三與四百五十六相乘問得幾何法以對數表之一二三之假數二八九九五一一一四與四五六之假數二六五八九六四八四二七相加得四七四八八六九九五四一乃查假數四七四八八六九九五四一所對之真數得五六八八即五萬六千零八十八為相乘所得之數也設如三千四百五十六與二千六百七十九相乘問得幾何法以對數表之三四五六之假數三五三八五七三七三三八與二六七九之假數三四二七九七二七一三六相加得六九六六五四六四四七四因對數表假數首位止於四真數止於五位故將相加所得假數首位之六暫當四查假數四九六六五四六四四七四相近略少者為四九六六五四五三二一六其相對之真數得九二五八六即為九二五八六因假數首位多二數則真數必多二位又以九二五八六之假數與九二五八七之假數相減餘四六九七為一率以九二五八六與九二五八七相減餘一為二率今相加所得之假數與九二五八六之假數相減餘一一二五八為三率得四率二四即真數九二五八六之後二位之數蓋假數多四六九七則真數多一百今假數多一一二五八則真數應多二十四為比例四率也乃以所得二四與九二五八六相加得九二五八六二四即九百二十五萬八千六百二十四為相乘所得之數也大凡真數二四位以後其假數之較相差無多故真數即可與假數為比例若用前纍乘纍除之法固為甚密然較之比例則難而得數則同此對數表所以止於五位也設如三千七百四十四以十六除之問得幾何法以對數表之三七四四之假數三五七三三三五八四一內減一六之假數一二四一一九九八二七餘二三六九二一五八五七四乃查假數二三六九二一五八五七四所對之真數得三三四即二百三十四為歸除所得之數也設有米三十二石令一千零二十四人分之問每一人應得幾何法以對數表之三二之假數首位加二為三五五一四九九七八三因法之假數大於實之假數故以實之假數加二即如以實之真數加兩空位也內減一二四之假數三一二九九九五六六餘四九四八五二一七因假數首位為即知真數應得單位其得數首位為升仍以假數首位加三查三四九四八五二一七所對之真數得三一七五因真數得四位故將假數首位作三查表若真數求五位則將假數首位作四查表或五位後仍有餘數則用比例求之即三升一合二勺五撮為每人所應得之數也設如甲乙丙直角形甲角五十度丙角四十度甲乙邊十二丈求丙乙邊丙甲邊各幾何法以甲角五十度之正弦假數九八八四二五三九六六五與甲乙邊十二丈作一二之假數四七九一八一二四六相加得一三九六三四三五二一二五內減丙角四十度之正弦假數九八八六七四九六七餘四一五五三六七七一五八為丙乙邊之假數查假數相近所對之真數得一四三一即一十四丈三尺零一分為丙乙邊也求丙甲邊則以乙角九十度之正弦假數一即半徑之數與甲乙邊十二丈之假數四七九一八一二四六相加得一四七九一八一二四六內減丙角四十度之正弦假數九八八六七四九六七餘四二七一一一三七四九三為丙甲邊之假數查假數相近所對之真數得一八六六九即一十八丈六尺六寸九分為丙甲邊也設如甲乙丙三角形甲角五十度甲乙邊十六丈甲丙邊十二丈問丙角乙角及乙丙邊各若干法以甲乙邊十六丈與甲丙邊十二丈相加得二十八丈為邊總甲乙邊與甲丙邊相減餘四丈為邊較甲角五十度與一百八十度相減餘一百三十度折半為六十五度為半外角乃以邊較四丈作四之假數三六二五九九九一三與半外角六十五度之正切假數一三三一三二七四五二二相加得一三九三三三八七四四三五內減邊總二十八丈作二八之假數四四四七一五八三一三餘九四八六二二九四一二二為半較角正切之假數查正切假數相近所對之真數得十七度二分為半較角與半外角相加得八十二度二分為對甲乙大邊之丙角與半外角六十五度相減餘四十七度五十八分為對甲丙小邊之乙角也又求丙乙邊則以五十度之正弦假數九八八四二五三九六六五與十六丈作一六之假數四二四一一九九八二七相加得一四八八三七三九四九二內減丙角八十二度二分之正弦假數九九九五七八八二九八餘四九二五八五七三九四為丙乙邊之假數查假數相近所對之真數得一二三七六即一十二丈三尺七寸六分為丙乙邊也凡真數用加減然後比例者須以真數加減得數再查假數依法算之餘皆倣此設如六十四自乘問得幾何法以對數表之六四之假數一八六一七九九七四用二因之得三六一二三五九九四八仍查假數所對之真數得四九六即四千零九十六為自乘所得之數也蓋自乘兩數相同則其兩假數亦相同故二因之即如二假數相加也設如正方面積三百六十一尺開平方問每一邊數幾何法以對數表之三六一之假數二五五七五七二一九折半得一二七八七五三六九仍查假數所對之真數得一九即一十九尺為開平方所得每邊之數也蓋正方面積之假數乃以每邊之假數加倍所得之數故折半即得每邊之假數對其真數即得每邊之數也設如正方面積一百五十二萬二千七百五十六尺開平方問每一邊數幾何法先以方積前五位一五二二七查得假數為四一八二六一四三四七七因方積係七位今止查得五位仍餘二位故將假數首位之四加二得六一八二六一四三四七七即為一五二二七之假數又以一五二二七與一五二二八相減餘一為一率以一五二二七之假數與一五二二八之假數相減餘二八五二四為二率方積之後二位數五六為三率得四率一五九七四蓋真數多一百則假數多二八五二四今真數多五十六則假數應多一五九七一四為比例四率也乃以所得四率與一五二二七之假數相加得六一八二六三三一九一即為一五二二七五六之假數折半得三九一三一五一五九六仍查假數所對之真數得一二三四即一千二百三十四尺為開平方所得每邊之數也又捷法以一五二二七之假數首位加二得六一八二六一四三四七七即為一五二二七之假數折半得三九一三七一七三八查假數相近略大者蓋一五二二七之假數略少於一五二二七五六之假數則其折半之假數亦必略少於一二三四之假數亦取略大者用之對其真數得一二三四即為每邊之數也此法因方根止四位查表即得不用比例故以方積前五位查表後有幾位則假數首位加幾數折半查假數相近者即可得之若方根過五位以上者須用比例則以方積查假數亦須用比例方得密合設如正方面積一百五十二兆四千一百五十七億六千五百二十七萬九千三百八十四尺問每一邊數幾何法以方積前五位一五二四一查得假數為四一八三一三四六三一因方積係十五位今止查得五位仍餘十位故將假數首位之四加十得一四一八三一三四六三一即為一五二四一之假數又以一五二四一與一五二四二相減截用六空位得一為一率以一五二四一之假數與一五二四二之假數相減餘二八四九四二為二率方積後十位數截用前六位得五七六五二七為三率因表中假數止於十一位則真數亦止須用十一位雖真數後再多幾位其假數前十一位亦相同故查表用五位比例用六位共為十一位得四率一六四二七七與一五二四一之假數相加得一四一八三二九八九八即為一五二四一五七六五二七之假數亦即同於一五二四一五七六五二七九三八四之假數折半得七九一五一四九四五四因假數首位為七即知真數應得八位今對數表假數首位止於四真數止於五位故將折半所得假數首位之七減去三得四九一五一四九四五四查假數相近略少者為四九一四九一九四三對其真數得一二三四五即為一二三四五因假數首位多三數則真數進三位又以一二三四五之假數與一二三四六之假數相減餘三五一七八三為一率以一二三四五與一二三四六相減餘一為二率今折半所餘之假數與一二三四五之假數相減餘二三八五一一為三率得四率六七八與一二三四五相加得一二三四五六七八即一千二百三十四萬五千六百七十八尺為開平方所得每一邊之數也設如勾二十七尺股三十六尺求弦若干法以對數表之二七之假數一四三一三六三七六四二倍之得二八六二七二七五二八四為勾自乘之假數仍查假數所對之真數得七二九為勾自乘之真數又以三六之假數一五五六三二五八倍之得三一一二六五一六為股自乘之假數仍查假數所對之真數得一二九六為股自乘之真數兩自乘之真數相加不以兩自乘之假數相加者蓋假數相加則是相乘故必對其真數然後相加也得二二五為弦自乘之真數查其假數得三三六四二五二七六折半得一六五三二一二五一三八仍查假數所對之真數得四五即四十五尺為開方所得之弦數也設如三十六自乘再乘問得幾何法以對數表之三六之假數一五五六三二五八用三因之得四六六八九七五二四仍查假數所對之真數得四六六五六即四萬六千六百五十六為自乘再乘所得之數也蓋自乘再乘係以方根乘二次則假數亦加二次故以方根之假數三因之即如以方根之假數加二次也其或位數多者依乘法之例推之設如正方體積一萬三千八百二十四尺開立方問每一邊數幾何法以對數表之一三八二四之假數四一四六三三七二五一用三歸之得一三八二一一二四一七仍查假數所對之真數得二四即二十四尺為開立方所得每邊之數也蓋正方體積之假數乃以每邊之假數三因所得之數故三歸之即得每邊之假數對其真數即得每邊之數也其或位數多者依平方之例推之設如方根一十六尺問三乘方積幾何法以對數表之一六之假數一二四一一九九八二七用四因之得四八一六四七九九三八仍查假數所對之真數得六五五三六即六萬五千五百三十六尺為三乘方之積數也蓋三乘方係以方根乘三次則其假數亦加三次故以方根之假數四因之即如以方根之假數加三次也其或位數多者亦依乘法之例推之設如三乘方積二萬零七百三十六尺問方根幾何法以對數表之二七三六之假數四三一六七二四九八四二用四歸之得一七九一八一二四六仍查假數所對之真數得一二即一十二尺為開三乘方所得方根之數也蓋三乘方積之假數乃以方根之假數四因所得之數故四歸之即得方根之假數對其真數即得方根之數也其或位數多者亦依平方之例推之大凡開諸乘方之理亦皆由於連比例蓋方根為連比例第一率平方積為第二率立方積為第三率三乘方積為第四率四乘方積為第五率五乘方積為第六率六乘方積為第七率七乘方積為第八率八乘方積為第九率九乘方積為第十率與借根方比例定位表同以第一率方根之假數各以率數乘之即得各乘方積之假數而以各乘方積之假數各以率數除之亦即得第一率方根之假數故由三乘方而進之四乘方求積則用五因求根則用五歸五乘方求積則用六因求根則用六歸推之至於九乘方求積則用十因求根則用十歸即至於一百乘方則以方根之假數用一百零一乘之即得方積之假數以方積之假數用一百零一除之即得方根之假數乘除之數愈繁愈見對數之易此對數之大用也御製數理精藴下編卷三十八
