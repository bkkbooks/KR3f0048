body:
  text: 欽定四庫全書御製數理精藴下編卷三十八末部八對數比例對數比例對數比例乃西士若往訥白爾所作以借數與真數對列成表故名對數表又有恩利格巴理知斯者復加增修行之數十年始至中國其法以加代乘以減代除以加倍代自乘故折半即開平方以三因代再乘故三歸即開立方推之至於諸乘方莫不皆以假數相求而得真數蓋為乘除之數甚繁而以假數代之甚易也其立數之原起於連比例蓋比例四率二率與三率相乘一率除之得四率而遞加遞減之四數第二數第三數相加減第一數則得第四數作者有見於此故設假數以加減代乘除之用此表之所以立也然連比例之大者莫如十百千萬蓋一與十十與百百與千千與萬萬與十萬其數皆為一而遞進一位取其整齊而無竒零也一為數之始以之乘除數皆不變故一之假數定為而十之假數定為一百之假數定為二千之假數定為三萬之假數定為四十萬之假數定為五推之百千萬億皆遞加一數此對數之大綱也其間之零數則用中比例纍求而得以首率末率兩真數相乘開方即得中率之真數以首率末率兩假數相加折半即得中率之假數又法用遞乘而得以真數遞次相乘其乘得之位數即所得之假數此二法者理雖易明而數則甚繁也又有遞次開方一法以真數遞次開方假數遞次折半至於數十次使彼此皆可為比例而假數由之而生又有相較之一法省開方之多次尤為甚捷至於他數之可以乘除得者如二與三相乘而得六則以二之假數與三之假數相加即為六之假數又以二除十而得五則以二之假數與十之假數相減即為五之假數之類其不由乘除而得者則又以纍乘纍除之法求之此對數之細目也今為推其理考其數先詳作表之原次明用表之法使學者知作者之難而用之甚易甚勿以易而忘其難也明對數之原之一凡真數連比例四率任對設遞加遞減之較相等之四假數其第二率相對之假數與第三率相對之假數相加內減第一率相對之假數即得第四率相對之假數若減第四率相對之假數即得第一率相對之假數如二四八十六連比例四率任對設二之假數為一四之假數為二八之假數為三十六之假數為四其遞加遞減之數皆為一以二率四相對之假數二與三率八相對之假數三相加得五內減一率二相對之假數一即得四率十六相對之假數四若減四率十六相對之假數四即得一率二相對之假數一或以二之假數為三四之假數為五八之假數為七十六之假數為九其遞加遞減之數皆為二以二率四相對之假數五與三率八相對之假數七相加內減一率二相對之假數三即得四率十六相對之假數九若減四率十六相對之假數九即得一率二相對之假數三明對數之原之二凡真數連比例三率任對設遞加遞減之較相等之三假數其中率相對之假數倍之內減首率相對之假數即得末率相對之假數若減末率相對之假數即得首率相對之假數如一三九連比例三率任對設一之假數為四三之假數為五九之假數為六其遞加遞減之數皆為一以中率三相對之假數五倍之得十內減首率一相對之假數四即得末率九相對之假數六若減末率九相對之假數六即得首率一相對之假數四或以一之假數為八三之假數為五九之假數為二其遞加遞減之數皆為三以中率三相對之假數五倍之內減首率一相對之假數八即得末率九相對之假數二若減末率九相對之假數二即得首率一相對之假數八明對數之原之三凡真數連比例幾率任對設遞加遞減之較相等之假數其中隔位取比例四率其第二率相對之假數與第三率相對之假數相加內減第一率相對之假數亦得第四率相對之假數若減第四率相對之假數亦得第一率相對之假數如二四八十六三十二六十四一百二十八二百五十六連比例幾率任對設二之假數為一四之假數為二八之假數為三十六之假數為四三十二之假數為五六十四之假數為六一百二十八之假數為七二百五十六之假數為八其遞加遞減之數皆為一任取四八六十四一百二十八之四率以二率八相對之假數三與三率六十四相對之假數六相加得九內減一率四相對之假數二即得四率一百二十八相對之假數七若減四率一百二十八相對之假數七即得一率四相對之假數二明對數之綱之一凡假數皆可隨意而定然一之假數必定為方與真數相應而真數連比例率十百千萬皆為一但遞進一位則其假數亦皆遞加一數蓋乘除之數始於一故一不用乘亦不用除而加減之數始於故無可加亦無可減也假數既以加減代乘除故一之假數必定為而一與十十與百百與千千與萬萬與十萬皆為加十倍之相連比例率然其數皆為一但遞進一位故一之假數定為者十之假數即定為一百之假數即定為二千之假數即定為三萬之假數即定為四十萬之假數即定為五百萬之假數即定為六千萬之假數即定為七億之假數即定為八亦皆遞加一數而假數即與位數相同試以一百與一千相乘得十萬為進二位以一百相對之假數二與一千相對之假數三相加即得十萬相對之假數五亦為加二數也以一十除一千得一百為退一位以一十相對之假數一與一千相對之假數三相減即得一百相對之假數二亦為減一數也如或以十之假數定為二百之假數定為四千之假數定為六是為遞加二數未嘗不可然真數進一位者假數則加二數即不得與位數相同矣明對數之綱之二凡真數不同而位數同者其假數雖不同而首位必同真數相同而遞進幾位者其假數首位必遞加幾數而次位以後却相同如自一至九真數皆為單位則假數首位皆為故二之假數為三一二九九九五七三之假數為四七七一二一二五四七四之假數為六二五九九九一三五之假數為六九八九七四三六之假數為七七八一五一二五四首位以後零數遞增至十則首位皆為一至百則首位皆為二至千則首位皆為三至萬則首位皆為四至十萬則首位皆為五如一十一一百一十一千一百一萬一千一十一萬雖遞進一位而其數皆為一一故其假數首位雖遞加一數而次位以後皆同為四一三九二六八五二明對數之目用中比例求假數法之一凡連比例率以首率末率兩真數相乘開方即得中率之真數以首率末率兩假數相加折半即得中率之假數如一十為首率一百為中率一千為末率以首率一十與末率一千相乘開平方得一百為中率以首率一十之假數一與末率一千之假數三相加折半得二即中率一百之假數蓋首率末率相乘與中率自乘之數等以首率末率兩假數相加即與中率之假數加倍之數等故折半為中率之假數也明對數之目用中比例求假數法之二凡十百千萬之假數既定而欲求其間零數之假數則以前後相近之兩數一為首率一為末率求得中率之真數並求得中率之假數纍次比例使中率恰得所求之真數其假數即為所求之假數如求九之假數因九在一與十之間則以一為首率十為末率相乘開方得三一六二二七七七為第一次之中率即以首率一之假數與末率十之假數一相加折半得五為第一次中率之假數此所得之中率較之首率去九為近故以所得之中率復為首率十為末率相乘開方得五六二三四一三二為第二次之中率即以第二次之首率末率兩假數相加折半得七五為第二次中率之假數又以第二次所得之中率復為首率十為末率相乘開方得七四九八九四二一為第三次之中率即以第三次之首率末率兩假數相加折半得八七五為第三次中率之假數又以第三次所得之中率復為首率十為末率相乘開方得八六五九六四三二為第四次之中率即以第四次之首率末率兩假數相加折半得九三七五為第四次中率之假數又以第四次所得之中率復為首率十為末率相乘開方得九三五七二四為第五次之中率即以第五次之首率末率兩假數相加折半得九六八七五為第五次中率之假數此所得之中率較之末率去九為近故以第五次所得之中率復為末率仍以第五次之首率為首率相乘開方得八九七六八七一三為第六次之中率即以第六次首率末率兩假數相加折半得九五三一二五為第六次中率之假數由此遞推去九漸近而即以相近之兩率比例相求得第七次之中率為九一三九八一七其假數為九六九三七五第八次之中率為九一七九七七七其假數為九五七三一二五第九次之中率為九一七三三三三其假數為九五五七八一二五第十次之中率為八九九七七九六其假數為九五四一一五六二五第十一次之中率為九七二八其假數為九五四五八九八四三七第十二次之中率為九二一三八八其假數為九五四三四五七三一第十三次之中率為八九九九六八八其假數為九五四二二三六三二八第十四次之中率為九八七三七其假數為九五四二八四六六七九第十五次之中率為九二四一二其假數為九五四二五四一五三第十六次之中率為八九九九九二五其假數為九五四二三八八九一五第十六次之中率為九八二一其假數為九五四二四六五二九第十八次之中率為九四一其假數為九五四二四二七六二第十九次之中率為八九九九九六五其假數為九五四二四七九八九第二十次之中率為八九九九九八四五其假數為九五四二四一七五二六第二十一次之中率為八九九九九九四三其假數為九五四二四二二二九四第二十二次之中率為八九九九九九九二其假數為九五四二四二四六七八第二十三次之中率為九一六其假數為九五四二四二五八七第二十四次之中率為九四其假數為九五四二四二五二七四第二十五次之中率為八九九九九九九八其假數為九五四二四二四九七六至第二十六次之中率則恰得九其假數為九五四二四二五一二五即所求之假數也然所得中率雖為九而七空位之後尚有竒零故所得之假數猶為稍大故開方之位數愈多則所得之假數愈密也明對數之目用遞次自乘求假數法之一凡連比例率之自小而大者以第一率之真數遞次自乘即得加倍各率之真數以第一率之假數遞次加倍即得加倍各率之假數而以各率之假數按率除之即得第一率之假數如以二為連比例第一率其假數為三一二九九九五七以第一率之真數二自乘得四為第二率之真數以第一率之假數三一二九九九五七加倍得六二五九九九一三為第二率之假數而以第二率之假數用二除之即得第一率之假數又以第二率之真數四自乘得十六為第四率之真數以第二率之假數六二五九九九一三加倍得一二四一一九九八二六為第四率之假數而以第四率之假數用四除之即得第一率之假數也明對數之目用遞次自乘求假數法之二凡連比例率自小而大者其假數之首位既因真數之位數而遞加故求假數者以所求之真數為連比例第一率遞次自乘即得加倍各率之真數以第一率假數之首位遞次加倍即得加倍各率之假數而真數自乘又進一位者則假數加倍後又加一數而以各率之假數按次除之即得所求第一率之假數如求二之假數則以二為連比例第一率是為單位故傍紀即第二率之假數首位為也又以第一率之真數二自乘得四為第二率之真數仍為單位故傍亦紀即第二率之假數首位亦為也又以第二率之真數四自乘得十六為第四率之真數是為進前一位故傍紀一即第四率之假數首位為一也又以第四率之真數十六自乘得二百五十六為第八率之真數以第四率之假數一倍之得二是為進前二位故傍紀二即第八率之假數首位為二也又以第八率之真數二百五十六自乘得六萬五千五百三十六為第十六率之真數以第八率之假數二倍之得四是為進前四位故傍紀四即第十六率之假數首位為四也又以第十六率之真數六萬五千五百三十六自乘得四十二億九千四百九十六萬七千二百九十六為第三十二率之真數以第十六率之假數四倍之得八又因第十六率真數自乘所得首位乃逢十又進一位之數故將假數加倍所得之八又加一得九是為進前九位故傍紀九即第三十二率之假數首位為九也由此遞乘至第一萬六千三百八十四率之真數則自單位以前共得四千九百三十二位故傍紀四九三二為第一萬六千三百八十四率之假數以一萬六千三百八十四除之得三一即為第一率二之假數蓋以一萬除四千為實不足法一倍則其首位必為也然其位數尚少故僅得五位若再遞乘至第一千三百七十四億四千六百九十五萬三千四百七十二率之真數則自單位以前共得四百一十三億七千五百六十五萬五千三百零七位即其假數為四一三七五六五五三七以率數除之得三一二九九九五六六即為第一率二之假數也此法蓋因真數進一位則假數首位加一數今遞乘所得之真數既得若干位則其假數首位必加若干數乃以首位為單位遞進向前者也而連比例各率之假數以率數除之即得第一率之假數故以率數除之所得第一率之假數為首位以後之零數也明對數之目用遞次開方求假數法之一凡連比例率之自大而小者以第一率之真數遞次開方即得加倍各率之真數以第一率之假數遞次折半即得加倍各率之假數而以各率之假數按率乘之即得第一率之假數如以二百五十六為連比例第一率其假數為二四八二三九九六五三以第一率之真數二百五十六開方得十六為第二率之真數以第一率之假數二四八二三九九六五三折半得一二四一一九九八二六為第二率之假數而以第二率之假數用二乘之即得第一率之假數又以第二率之真數十六開方得四為第四率之真數以第二率之假數一二四一一九九八二六折半得六二五九九九一三為第四率之假數而以第四率之假數用四乘之即得第一率之假數明對數之目用遞次開方求假數法之二凡遞次開方率皆用二倍蓋真數開方假數折半而折半即二歸故遞次折半之假數以遞次加倍之率數乘之即得第一率之假數如原數為第一率加倍得二為第一次開方之率數蓋折半即二歸以二歸者復用二乘必仍得原數也又加倍得四為第二次開方之率數蓋折半二次即四歸以四歸者復用四乘必亦得原數也遞次加倍則第三次之率為八第四次之率為十六第五次之率為三十二第六次之率為六十四第七次之率為一百二十八第八次之率為二百五十六第九次之率為五百一十二第十次之率為一千零二十四第二十次之率為一百零四萬八千五百七十六第三十次之率為十億七千三百七十四萬一千八百二十四第四十次之率為一兆零九百九十五億一千一百六十二萬七千七百七十六第五十次之率為一千一百二十五兆八千九百九十九億零六百八十四萬二千六百二十四凡有真數求假數皆以所求之數為第一率真數開方幾次則假數必折半幾次今雖無第一率之假數而苟得其折半第幾次之假數則加倍幾次必得第一率之假數故以加倍第幾次之率數與折半第幾次之假數相乘即得第一率之假數也明對數之目用遞次開方求假數法之三凡真數不可與假數為比例者因真數開方假數折半其相比之分數不同若開方至於數十次則開方之數即與折半之數相同故假數即可用真數比例而得是以凡求假數者皆以其真數開方至幾十次與此所得之假數相比即得其開方第幾十次之假數按前率數乘之即得所求之假數如真數為一十假數為一以真數一十開方得三一六二二七七六六一六八三七九三三一九九八八九三五四第二次開方得一七七八二七九四一三八九二二八一一九七三四一三第三次開方得一三三三五二一四三二一六三三二四二五六六五三八九三八第四次開方得一一五四七八一九八四六八九四五八一七九六六一九一八二一三第五次開方得一七四六七八二八三二一三一七四九七二一三八一七六五三八第六次開方得一三六六三二九二八四三七六九七九九七二九六二七三一三一第七次開方得一一八一五一七二一七一八一八一八四一四七三七二三八一四四如此遞次開方至第五十四次則得一一二七八一九一四九三二三二三五而與第五十三次開方所得折半之數同是故真數即可與假數為比例矣乃以一十之假數一折半得五第二次折半得二五第三次折半得一二五第四次折半得六二五第五次折半得三一二五第六次折半得一五六二五第七次折半得七八一二五如此遞次折半亦至第五十四次則得十七空位五五五一一一五一二三一二五七八二七即為第五十四次開方之假數於是以真數之零數一二七八一九一四九三二三二三五為一率假數之零數五五五一一一五一二三一二五七八二七為二率真數之零數一為三率一率為十七位則三率亦加十六空位以足其分得四率四三四二九四四八一九三二五一八四即為一一之假數前亦仍得十七空位蓋真數為一則假數為今真數之零數即比一多之較假數之零數即比多之較故以真數之較與假數之較為比例也凡求假數者皆以真數開方至幾十次首位得一又得十五空位則以其後之零數與此所得之假數為比例即得其開方第幾十次之假數按前率數乘之即得第一率之假數也明對數之目用遞次開方求假數法之四凡真數首位為一者則開方首位必得一若首位非一者則以真數遞乘幾次使首位得一即以遞乘所得之真數遞次開方至得十五空位乃以其後之零數與前法所得一一之假數相比例即得開方第幾次之假數按前率數乘之即得遞乘所得真數之假數再看遞乘所得真數為連比例第幾率則以第幾率之數除之即得所求之假數如求二之假數則以二為連比例第一率遞次乘之第二率得四第三率得八第四率得十六第五率得三十二第六率得六十四第七率得一百二十八第八率得二百五十六第九率得五百一十二第十率得一千零二十四是首位既得一又得一空位乃以此數命為第一率其首位之一千命為單位開方得一一一九二八八五一二五三八八一三八六二三九七第二次開方得一五九四六七四三七四六三四八三二六六五四二四第三次開方得一二九六八九六四四九八七八七三七三六二六八第四次開方得一一四八三三八二三七九四一八三一八三八第五次開方得一七四一四一六一六九九八三五三三六二四九六第六次開方得一三七六三六三九八二一一四七一七六一五第七次開方得一一八五三二五三五九一八五三五八二七七如此遞次開方至第十七次則得一一八九四二七五四八四四五三四三六三九五一五四四第二十七次則得一一七六七一八九三五七一四一九四八二六二第三十七次則得一一七二五六四四二四二三二五九四三四七七第四十七次則得一一六八五一六五七五三九四九七七是已得十五空位矣乃以前法所得真數之零數一為一率三率有十七位則一率亦加十六空位以足其分其假數十七空位後之零數四三四二九四四八一九三二五一八四為二率今所得真數之零數一六八五一六五七五三九四九七七為三率得四率七三一八五五九三六九六二三九二六八即為開方第四十七次之假數前亦仍為十七空位以加倍四十七次之率數一四七三七四八八三五五三二八乘之得一二九九九五六六三九八一一九五二六五即為第一率一二四之假數蓋開方第四十七次之假數為十八位前十七空位共三十五位今相乘得三十三位故前止有二空位亦共三十五位也此截用二十一位然一二四首位之一開方雖命為單位而其實則為千位千之假數首位應為三故首位加三得三一二九九九五六六三九八一一九五二六五是為一千零二十四之假數又因一千零二十四為二之連比例第十率故以十歸之得三一二九九九五六六三九八一一九五二六五即為所求之連比例第一率二之假數也明對數之目用遞次開方求假數法之五凡求假數真數開方之次數愈多則所得之假數愈密然用假數不過至十二位觀前遞次開方表內至九空位以後其開方之數與折半之數已同七位其零數所差甚微故真數開方至二十七次即可以立率如求二之假數按前法遞次乘之至第十率得一二四開方至二十七次得一一七六七一八九三五七一四一九四八二六二是已得九空位矣於是察前真數一遞次開方表內第三十四次數得一一三四二八九二三二六三八三九九二七七七亦為九空位即以其真數之零數一三四二八九二三二六三八三九九二七七七為一率其假數十一空位後之零數五八二七六六九一三四六七四七二二六五六二五為二率真數之零數一為三率一率為二十一位則三率亦加二十空位以足其分得四率四三四二九四四八一八七四一四七九九七二六九五五即為一一之假數前亦仍為十一空位乃即用此數為比例以真數之零數一為一率三率為二十二位則一率亦加二十一空位以足其分其假數十一空位後之零數四三四二九四四八一八七四一四七九九七二六九五五為二率今以一二四開方二十七次所得之零數一七六七一八九三五七一四一九四八二六二為三率得四率七六七四六五七九一三七七八九七一四三九即為一二四開方第二十七次之假數前亦仍為十一空位以加倍二十七次之率數一三四二一七七二八乘之得一二九九九五六六四即為第一率一二四之假數與前法所得之數同前法得三九八收之亦為四以後竒零微有不合止截用十二位再按前法首位加三而以率數十歸之即得三一二九九九五六六四為二之假數也此法較之前法開方省二十次而所得之數同故求假數者用此法亦便也明對數之目用遞次開方求假數法之六凡開方之數與折半之數雖不同然而不同之較遞次漸少故又有相較之法至開方第十次以後則以較數相減即得開方之數如求六之假數以六為連比例第一率遞次乘之得連比例第九率為一千零七萬七千六百九十六乃以此數命為第一率其首位之一千萬命為單位開方得一三八七七二八三三三六九六二四五六六三八四六五五一第二次開方得一一九三六七六六一三六九四六六一六七五八七二二九第三次開方得一九六七九一四六三九九九一七二八八九七二第四次開方得一四八三八四二六八八四六六二九八五四九二五三五第五次開方得一二四一八九八七八八二四六八五六三八八七二七與第四次開方所得折半之數漸近乃以第四次開方所得數折半首位之一不折半蓋首位之一諸次開方皆同其數不變也得二四一九二一三四四二三三一四九二七四六二六七與第五次開方所得數相減餘二九二五五五九八六二九二八九三七五四為第五次之較設使有第五次之較則將第四次開方所得數折