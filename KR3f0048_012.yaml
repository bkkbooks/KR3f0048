body:
  text: 欽定四庫全書御製數理精藴下編卷七線部五和較比例和較比例比例之中有和數較數而復有和較者用和數相比謂之和用較數相比謂之較至於設問中兩物相和兩價相和或每色中㡬物相和乃於和數中推求較數因較數而成比例是以和數為體而較數為用故謂之和較比例在九章一名貴賤差分一名貴賤相和其立法盖於縂物中求其相差之較或於每物中求其相差之較此貴賤差分法或用互乗以齊其數然後於互乗數中求其相差之較作為比例而得真數此貴賤相和法按法立算雖各不同要之縂以和數推出較數為比此和較之所以名也設如有銀四百零五兩七錢共買米麥五百石米每石價銀八錢六分麥每石價銀七錢二分五釐問米麥各該㡬何法以米麥共五百石用米每石價銀八錢六分乗之得四百三十兩與縂銀四百零五兩七錢相較則縂銀少二十四兩三錢又以米麥共五百石用麥每石價銀七錢二分五釐乗之得三百六十二兩五錢與縂銀相較則縂銀多四十三兩二錢乃以多少兩數相併得六十七兩五錢為一率米麥共五百石為二率少二十四兩三錢為三率得四率一百八十石即麥數於共五百石内減之餘三百二十石即米數如以多四十三兩二錢為三率得四率三百二十石亦即米數也此法盖以五百石俱為米計之則價應四百三十兩與今縂銀相較則縂銀少二十四兩三錢如以五百石俱為麥計之則價應三百六十二兩五錢與今縂銀相較則縂銀多四十三兩二錢是米五百石比麥五百石價多六十七兩五錢即麥五百石比米五百石價少六十七兩五錢也是知麥價比米價少六十七兩五錢而麥為五百石今縂銀比米價少二十四兩三錢則麥必為一百八十石也又米價比麥價多六十七兩五錢而米為五百石今縂銀比麥價多四十三兩二錢則米必為三百二十石也又法以米麥每石價銀相減餘一錢三分五釐為一率一石為二率以米麥共五百石用米價乗之得四百三十兩與縂銀四百零五兩七錢相減餘二十四兩三錢為三率得四率一百八十石即麥數於共五百石内減之餘三百二十石即米數如以米麥共五百石用麥價乗之得三百六十二兩五錢與縂銀四百零五兩七錢相減餘四十三兩二錢為三率得四率三百二十石亦即米數也此法盖因米一石比麥一石其價相差一錢三分五釐是知少一錢三分五釐而麥為一石今少二十四兩三錢則麥少為一百八十石也又多一錢三分五釐而米為一石今多四十三兩二錢則米必為三百二十石也前法以五百石縂價之較與五百石為比此法以每一石價之較與一石為比其理同也設如有銀一百兩共買紬絹一百疋紬每疋價銀一兩六錢絹每疋價銀八錢問紬絹各得㡬何法以紬絹共一百疋用紬價一兩六錢乗之得一百六十兩與共銀一百兩相較則共銀少六十兩又以紬絹共一百疋用絹價八錢乗之得八十兩與共銀一百兩相較則共銀多二十兩乃以多少兩數相併得八十兩為一率紬絹共一百疋為二率少六十兩為三率得四率七十五疋即絹數於共一百疋内減之餘二十五疋即紬數如以多二十兩為三率得四率二十五疋亦即紬數也此法盖以一百疋俱為紬計之則價應一百六十兩與共銀相較則共銀少六十兩如以一百疋俱為絹計之則價應八十兩與共銀相較則共銀多二十兩是紬一百疋比絹一百疋價多八十兩即絹一百疋比紬一百疋價少八十兩也是知絹價比紬價少八十兩而絹為一百疋今共價比紬價少六十兩則絹必為七十五疋也又紬價比絹價多八十兩而紬為一百疋今共價比絹價多二十兩則紬必為二十五疋也又法以紬絹每疋價銀相減餘八錢為一率紬一疋為二率以紬絹共一百疋用紬價乗之得一百六十兩與共銀一百兩相減餘六十兩為三率得四率七十五疋即絹數於共一百疋内減之餘二十五疋即紬數如以紬絹共一百疋用絹價乗之得八十兩與共銀一百兩相減餘二十兩為三率得四率二十五疋亦即紬數也此法盖因紬一疋比絹一疋其價相差八錢是知少八錢而絹為一疋今少六十兩則絹必為七十五疋也又多八錢而紬為一疋今多二十兩則紬必為二十五疋也設如雞同籠但知頭共三十六足共一百問雞各㡬何法以雞共三十六頭用雞二足乗之得七十二足與共足一百相較則共足多二十八又以雞共三十六頭用四足乗之得一百四十四足與共足一百相較則共足少四十四乃以多少兩數相併得七十二足為一率共三十六頭為二率少四十四足為三率得四率二十二即雞數於共三十六隻内減之餘十四即數如以多二十八足為三率得四率十四亦即數也此法盖以三十六俱為雞計之則應七十二足與今共足相較則共足多二十八若以三十六俱為計之則應一百四十四足與今共足相較則共足少四十四是三十六比雞三十六多七十二足即雞三十六比三十六少七十二足也是知雞少於七十二足而雞為三十六隻今雞少於四十四足則雞必為二十二隻也又多於雞七十二足而為三十六隻今多於雞二十八足則必為十四隻也又法以雞二足四足相減餘二足為一率一隻為二率又以共三十六隻用四足乗之得一百四十四足與共足一百相減餘四十四為三率得四率二十二即雞數於共三十六隻内減之餘十四即數如以共三十六隻用雞二足乗之得七十二足與共足一百相減餘二十八為三率得四率十四亦即數也此法盖因雞一隻比一隻差二足是知雞少於二足而雞為一隻今少於四十四足則雞必為二十二隻也又多於雞二足而為一隻今多於雞二十八足則必為十四隻也設如有羊一百四十隻大小不䓁共剪毛一百五十斤大羊每隻剪毛一斤二兩小羊每隻剪毛十二兩問大小羊各㡬何法以共羊一百四十隻用大羊剪毛十八兩乗之一斤作十六兩加二兩即十八兩也得二千五百二十兩與共剪毛二千四百兩相較一百五十斤變為兩得二千四百兩則共剪毛數少一百二十兩又以共羊一百四十隻用小羊剪毛十二兩乗之得一千六百八十兩與共剪毛二千四百兩相較則共剪毛數多七百二十兩乃以多少兩數相併得八百四十兩為一率共羊一百四十隻為二率多七百二十兩為三率得四率一百二十隻即大羊數於共一百四十隻内減之餘二十隻即小羊數如以少一百二十兩為三率得四率二十隻亦即小羊數也此法盖以一百四十隻俱為大羊計之則應剪毛二千五百二十兩與共剪毛數相較則共剪毛數少一百二十兩若以一百四十隻俱為小羊計之則應剪毛一千六百八十兩與共剪毛數相較則共剪毛數多七百二十兩是大羊一百四十隻比小羊一百四十隻多八百四十兩即小羊一百四十隻比大羊一百四十隻少八百四十兩也是知多八百四十兩而大羊為一百四十隻今少七百二十兩則大羊必為一百二十隻也又少八百四十兩而小羊為一百四十隻今少一百二十兩則小羊必為二十隻也又法以大羊剪毛十八兩小羊剪毛十二兩相減餘六兩為一率一隻為二率以共羊一百四十隻用小羊剪毛數乗之得一千六百八十兩與共剪毛二千四百兩相減餘七百二十兩為三率得四率一百二十隻即大羊數於共一百四十隻内減之餘二十隻即小羊數如以共羊一百四十隻用大羊剪毛數乗之得二千五百二十兩與共剪毛二千四百兩相減餘一百二十兩為三率得四率二十隻亦即小羊數也此法盖以大羊一隻比小羊一隻所剪毛差六兩是知多六兩而大羊為一隻今多七百二十兩則大羊必為一百二十隻也又少六兩而小羊為一隻今少一百二十兩則小羊必為二十隻也設如有玉在石中但知正方每邉四寸共重一百六十兩八錢問玉有㡬何法以方邉四寸自乗再乗得六十四寸為正方體積乃以六十四寸用玉寸方定率二兩六錢乗之得一百六十六兩四錢與共重一百六十兩八錢相較則共重少五兩六錢又以六十四寸用石寸方定率二兩五錢乗之得一百六十兩與共重一百六十兩八錢相較則共重多八錢乃以多少兩數相併得六兩四錢為一率玉六十四寸為二率多八錢為三率得四率八寸即玉數於共六十四寸内減之餘五十六寸即石數如以少五兩六錢為三率得四率五十六寸亦即石數也既得玉八寸則以玉寸方定率二兩六錢乗之得二十兩八錢即玉之重數於共重一百六十兩八錢内減之餘一百四十兩即石之重數如以石五十六寸用石寸方定率二兩五錢乗之得一百四十兩亦即石之重數也此法盖以六十四寸俱為玉計之則應重一百六十六兩四錢與共重數相較則共重數少五兩六錢若以六十四寸俱為石計之則應重一百六十兩與共重數相較則共重數多八錢是石六十四寸比玉六十四寸少六兩四錢即玉六十四寸比石六十四寸多六兩四錢也是知多六兩四錢而玉為六十四寸今多八錢則玉必為八寸也又少六兩四錢而石為六十四寸今少五兩六錢則石必為五十六寸也又法以玉寸方定率二兩六錢與石寸方定率二兩五錢相減餘一錢為一率一寸為二率以共積六十四寸用石寸方定率二兩五錢乗之得一百六十兩與共重一百六十兩八錢相減餘八錢為三率得四率八寸即玉數於共六十四寸内減之餘五十六寸即石數如以共積六十四寸用玉寸方定率二兩六錢乗之得一百六十六兩四錢與共重一百六十兩八錢相減餘五兩六錢為三率得四率五十六寸亦即石數也此法盖以玉一寸比石一寸其重差一錢是知多一錢而玉為一寸今多八錢則玉必為八寸也又少一錢而石為一寸今少五兩六錢則石必為五十六寸也設如有金銀共重三百二十一兩鎔於一處作成一正方體每邉三寸問金銀各重㡬何法以方邊三寸自乗再乗得二十七寸為正方體積乃以二十七寸俱作金算用金寸方定率十六兩八錢乗之得四百五十三兩六錢與共重三百二十一兩相較則共重少一百三十二兩六錢又以二十七寸俱作銀算用銀寸方定率九兩乗之得二百四十三兩與共重三百二十一兩相較則共重多七十八兩乃以多少兩數相併得二百一十兩六錢為一率金二十七寸重四百五十三兩六錢為二率多七十八兩為三率得四率一百六十八兩即金數於共重三百二十一兩内減之餘一百五十三兩即銀數如以銀二十七寸重二百四十三兩為二率少一百三十二兩六錢為三率得四率一百五十三兩亦即銀數也此法盖因金二十七寸比銀二十七寸多二百一十兩六錢即銀二十七寸比金二十七寸少二百一十兩六錢也是知金比銀多二百一十兩六錢而金為四百五十三兩六錢今多七十八兩則金必為一百六十八兩也又銀比金少二百一十兩六錢而銀為二百四十三兩今少一百三十二兩六錢則銀必為一百五十三兩也又法以銀寸方定率九兩與金寸方定率十六兩八錢相減餘七兩八錢為一率金一寸重十六兩八錢為二率以共積二十七寸用銀寸方定率九兩乗之得二百四十三兩與共重三百二十一兩相減餘七十八兩為三率得四率一百六十八兩即金數於共重三百二十一兩内減之餘一百五十三兩即銀數如以銀一寸重九兩為二率以共積二十七寸用金寸方定率十六兩八錢乗之得四百五十三兩六錢與共重三百二十一兩相減餘一百三十二兩六錢為三率得四率一百五十三兩亦即銀數也此法盖以金一寸比銀一寸其重相差七兩八錢是知多七兩八錢而金為十六兩八錢今多七十八兩則金必為一百六十八兩也又少七兩八錢而銀為九兩今少一百三十二兩六錢則銀必為一百五十三兩也設如有金器一件内有銀相参合共重一百七十兩四錢問金銀各重若干法用一桶盛水令滿将金器入内看溢出之水得正方寸數㡬何假如得十二寸即為金銀共積以金寸方定率十六兩八錢乗之得二百零一兩六錢與共重一百七十兩四錢相較則共重少三十一兩二錢又以銀寸方定率九兩乗之得一百零八兩與共重一百七十兩四錢相較則共重多六十二兩四錢乃以多少兩數相併得九十三兩六錢為一率金十二寸重二百零一兩六錢為二率多六十二兩四錢為三率得四率一百三十四兩四錢即金數於共重一百七十兩四錢内減之餘三十六兩即銀數如以銀十二寸重一百零八兩為二率少三十一兩二錢為三率得四率三十六兩亦即銀數也又法以金寸方定率十六兩八錢與銀寸方定率九兩相減餘七兩八錢為一率金一寸重十六兩八錢為二率以共積十二寸用銀寸方定率九兩乗之得一百零八兩與共重一百七十兩四錢相減餘六十二兩四錢為三率得四率一百三十四兩四錢即金數於共重一百七十兩四錢内減之餘三十六兩即銀數如以銀一寸重九兩為二率以共積十二寸用金寸方定率十六兩八錢乗之得二百零一兩六錢與共重一百七十兩四錢相減餘三十一兩二錢為三率得四率三十六兩亦即銀數也設如有金鑄一器重三百兩俱係九六成色今用九九成色及九一成色二䓁金替換問各得㡬何法以九六成色與三百兩相乗得二百八十八兩為原金數乃以九九成色與三百兩相乗得二百九十七兩與原金二百八十八兩相較則原金少九兩又以九一成色與三百兩相乗得二百七十三兩與原金二百八十八兩相較則原金多十五兩爰以多少兩數相併得二十四兩為一率三百兩為二率原金比九一成色多十五兩為三率得四率一百八十七兩五錢即九九成色金數於共重三百兩内減之餘一百一十二兩五錢即九一成色金數如以原金比九九成色少九兩為三率得四率一百一十二兩五錢亦即九一成色金數也盖九六成色金三百兩為十成金二百八十八兩而九九成色金三百兩為十成金二百九十七兩九一成色金三百兩為十成金二百七十三兩是知九九比九一多二十四兩而九九成色金為三百兩今九六比九一多十五兩則九九成色金必為一百八十七兩五錢也又九一比九九少二十四兩而九一成色金為三百兩今九六比九九少九兩則九一成色金必為一百一十二兩五錢也又法以九九與九一相減餘八分為一率金三百兩為二率以九一與九六相減餘五分為三率得四率一百八十七兩五錢即九九成色金數於共重三百兩内減之餘一百一十二兩五錢即九一成色金數如以九九與九六相減餘三分為三率得四率一百一十二兩五錢亦即九一成色金數也盖九九比九一多八分而九九成色金為三百兩今九六比九一多五分則九九成色金必為一百八十七兩五錢也又九一比九九少八分而九一成色金為三百兩今九六比九九少三分則九一成色金必為一百一十二兩五錢也設如甲乙二人有金成色不䓁甲金一兩可凖銀一十二兩乙金一兩可凖銀八兩今欲鎔為一處令金一兩凖銀九兩問甲乙二人於一兩金中各出金㡬何法以凖銀九兩為中數與甲金凖銀十二兩相較少三兩與乙金凖銀八兩相較多一兩乃以多少兩數併之得四兩為一率金一兩為二率比甲少三兩為三率得四率七錢五分即乙所出金數如以比乙多一兩為三率得四率二錢五分即甲所出金數也此法因銀十二兩與八兩皆金一兩所凖之數雖相乗其數不動故直以十二與八相減作一率以十二與九八與九之兩較相併得四即十二與八相減之餘數也盖乙比甲銀少四兩而乙金為一兩今比甲銀少三兩則乙金必為七錢五分也又甲比乙銀多四兩而甲金為一兩今比乙銀多一兩則甲金必為二錢五分也設如有錢四千九百九十五文買栗棗共五千枚只云栗九枚錢一十一文棗七枚錢四文問二色與價各得若干法先用互乗以齊其分以栗九與棗七相乗得六十三為乗出之縂物分即以六十三乗縂錢四千九百九十五文得三十一萬四千六百八十五文為乗出之縂錢數又以棗七乗栗價十一文得七十七文為乗出之栗價以栗九乗棗價四文得三十六文為乗出之棗價然後以栗棗共五千枚用栗價七十七文乗之得三十八萬五千文與乗出之縂錢三十一萬四千六百八十五文相較則縂錢少七萬零三百一十五文又以栗棗共五千枚用棗價三十六文乗之得一十八萬文與乗出之縂錢三十一萬四千六百八十五文相較則縂錢多一十三萬四千六百八十五文乃以栗價七十七文與棗價三十六文相減餘四十一文為一率一枚為二率多一十三萬四千六百八十五文為三率得四率三千二百八十五枚即栗數於共五千枚内減之餘一千七百一十五枚即棗數如以少七萬零三百一十五文為三率得四率一千七百一十五枚亦即棗數也既得栗數則以九枚為一率十一文為二率三千二百八十五枚為三率得四率四千零一十五文即栗之共價既得棗數則以七枚為一率四文為二率一千七百一十五枚為三率得四率九百八十文即棗之共價也如欲先得各價則以四十一文為一率栗價七十七文為二率多一十三萬四千六百八十五文為三率得四率二十五萬二千九百四十五文以六十三除之得四千零一十五文即栗之共價於共錢四千九百九十五文内減之餘九百八十文即棗之共價如以四十一文為一率棗價三十六文為二率少七萬零三百一十五文為三率得四率六萬一千七百四十文以六十三除之得九百八十文亦即棗之共價也此法九章名為貴賤相和盖因栗九枚棗七枚其數不同故用互乗以齊其分得栗六十三枚價七十七文棗六十三枚價三十六文今以六十三枚當一枚則為栗一枚價七十七文棗一枚價三十六文是其價各加六十三倍故将縂錢亦加六十三倍即為栗棗共五千枚共價三十一萬四千六百八十五文而栗一枚比棗一枚其價相差四十一文是知栗價比棗價多四十一文而栗為一枚今共價比棗價多一十三萬四千六百八十五文則栗必為三千二百八十五枚也又棗價比栗價少四十一文而棗為一枚今共價比栗價少七萬零三百一十五文則棗必為一千七百一十五枚也其先求各價者盖因栗價比棗價多四十一文而栗價為七十七文今共價比棗價多一十三萬四千六百八十五文則栗價少為二十五萬二千九百四十五文因各價皆為加六十三倍故以六十三除之得四千零一十五文為栗之共價也又棗價比栗價少四十一文而棗價為三十六文今共價比栗價少七萬零三百一十五文則棗價必為六萬一千七百四十文亦以六十三除之得九百八十文為棗之共價也又法以棗七枚栗九枚共五千枚列於上棗價四文栗價十一文共價四千九百九十五文列於下乃以下棗價四文遍乗上棗七枚栗九枚共五千枚得棗二十八枚栗三十六枚共二萬枚又以上棗七枚遍乗下棗價四文栗價十一文共價四千九百九十五文得棗價二十八文栗價七十七文共價三萬四千九百六十五文兩下相較則棗數與棗價同為二十八彼此減盡棗價比栗數多四十一共價比共數多一萬四千九百六十五爰以多四十一為一率栗九枚為二率多一萬四千九百六十五為三率得四率三千二百八十五枚即栗數於五千枚内減之餘一千七百一十五枚即棗數如以栗價十一文為二率得四率四千零一十五文即栗之共價於四千九百九十五文内減之餘九百八十文即棗之共價也若欲先得棗數則以栗九枚價十一文移於前棗七枚價四文移於後乃以下栗價十一文遍乗上栗九枚棗七枚共五千枚得栗九十九枚棗七十七枚共五萬五千枚又以上栗九枚遍乗下栗價十一文棗價四文共價四千九百九十五文得栗價九十九文棗價三十六文共價四萬四千九百五十五文兩下相較則栗數與栗價同為九十九彼此減盡棗價比棗數少四十一共價比共數少一萬零四十五爰以少四十一為一率棗七枚為二率少一萬零四十五為三率得四率一千七百一十五枚即棗數如以棗價四文為二率得四率九百八十文即棗之共價也此法與方程互乗齊分之理同其先求栗數而以棗數列於前者盖将棗數栗數共數皆加四倍棗價栗價共價皆加七倍則棗數與棗價相同是為每棗一枚價一文夫棗數與棗價既相同而減盡無餘則棗栗共數内之共棗數與棗栗共價内之共棗價亦必相同而減盡無餘所餘者即為共栗價多於共栗數之較是比每栗一枚價一文所多之數是知栗價比栗數多四十一文而栗為九枚栗價為十一文今共栗價比共栗數多一萬四千九百六十五文則栗必為三千二百八十五枚栗價必為四千零一十五文也其先求棗數而以栗數列於前者盖将栗數棗數共數皆加十一倍栗價棗價共價皆加九倍則栗數與栗價相同是為每栗一枚價一文夫栗數與栗價既相同而減盡無餘則栗棗共數内之共栗數與栗棗共價内之共栗價亦必相同而減盡無餘所餘者即為共棗價少於共棗數之較是比每棗一枚價一文所少之數是知棗價比棗數少四十一文而棗為七枚棗價為四文今共棗價比共棗數少一萬零四十五文則棗必為一千七百一十五枚棗價必為九百八十文也設如有僧一百人給饅首一百箇大僧一人給三箇小僧三人給一箇問大小僧數及各得饅首若干法先用互乗以齊其分以大僧一人與小僧三人相乗得三人為乗出之縂僧數即以三人乗饅首一百箇得三百箇為乗出之共饅首數又以小僧三人乗大僧饅首三箇得九箇為乗出之大僧饅首數以大僧一人乗小僧饅首一箇仍得一箇為乗出之小僧饅首數然後以共僧一百人與大僧饅首九箇相乗得九百箇與乗出之共饅首三百箇相較則共饅首少六百箇又以共僧一百人與小僧饅首一箇相乗得一百箇與乗出之共饅首三百箇相較則共饅首多二百箇乃以大僧饅首九箇與小僧饅首一箇相減餘八箇為一率一人為二率多二百箇為三率得四率二十五人即大僧數於共僧一百人内減之餘七十五人即小僧數如以少六百箇為三率得四率七十五人亦即小僧數也既得僧數則以一人為一率三箇為二率大僧二十五人為三率得四率七十五箇即大僧饅首數又以三人為一率一箇為二率小僧七十五人為三率得四率二十五箇即小僧饅首數也如欲先得饅首數則仍以八箇為一率大僧饅首九箇為二率今多二百箇為三率得四率二百二十五箇三歸之得七十五箇即大僧饅首數於共饅首一百箇内減之餘二十五箇即小僧饅首數如以八箇為一率小僧饅首一箇為二率今少六百箇為三率得四率七十五箇三歸之得二十五箇亦即小僧饅首數也此法用互乗得大僧三人饅首九箇小僧三人饅首一箇今以三人當一人則為大僧一人饅首九箇小僧一人饅首一箇是饅首為加三倍故将共饅首亦加三倍即為共僧一百人共饅首三百箇而大僧一人比小僧一人饅首差八箇是知多八箇而大僧為一人今多二百箇則大僧必為二十五人也又少八箇而小僧為一人今少六百箇則小僧必為七十五人也其先求饅首者因多八箇而大僧饅首為九箇今多二百箇則大僧饅首必為二百二十五箇因饅首為加三倍故以三歸之得七十五箇為大僧饅首數又少八箇而小僧饅首為一箇今少六百箇則小僧饅首必為七十五箇亦以三歸之得二十五箇為小僧饅首數也又法以小僧三人大僧一人共僧一百人列於上小僧饅首一箇大僧饅首三箇共饅首一百箇列於下乃以下小僧饅首一箇遍乗上小僧三人大僧一人共僧一百人仍得原數又以上小僧三人遍乗下小僧饅首一箇大僧饅首三箇共饅首一百箇得小僧饅首三箇大僧饅首九箇共饅首三百箇兩下相較則小僧人數與饅首數同為三彼此減盡大僧饅首數比人數多八共饅首數比共人數多二百爰以多八為一率大僧一人為二率多二百為三率得四率二十五人即大僧數於共一百人内減之餘七十五人即小僧數如以大僧饅首三箇為二率得四率七十五箇即大僧饅首數於共饅首一百箇内減之餘二十五箇即小僧饅首數也若欲先得小僧數則以大僧一人饅首三箇移於前小僧三人饅首一箇移於後乃以下大僧饅首三箇遍乗上大僧一人小僧三人共僧一百人得大僧三人小僧九人共僧三百人又以上大僧一人遍乗下大僧饅首三箇小僧饅首一箇共饅首一百箇仍得原數兩下相較則大僧與大僧饅首同為三彼此減盡小僧饅首數比人數少八共僧饅首數比共人數少二百爰以少八為一率小僧三人為二率少二百為三率得四率七十五即小僧人數如以小僧饅首一箇為二率得四率二十五箇即小僧饅首數也此法先求大僧數而以小僧列於前者盖将小僧饅首大僧饅首共僧饅首數皆加三倍則小僧人數與饅首數相同是為每小僧一人饅首一箇夫小僧數與饅首數既相同而減盡無餘則共僧數内之共小僧數與共饅首數内之共小僧饅首數亦必相同而減盡無餘所餘者即為大僧共饅首數多於共人數之較是比每大僧一人饅首一箇所多之數是知饅首比人數多八箇而大僧為一人大僧饅首為三箇今饅首比人數多二百箇則大僧必為二十五人大僧饅首必為七十五箇也其先求小僧數而以大僧列於前者盖将大僧小僧共僧數皆加三倍則大僧數與饅首數相同是為每大僧一人饅首一箇夫大僧數與饅首數既相同而減盡無餘則共僧數内之共大僧數與共饅首數内之共大僧饅首數亦必相同而減盡無餘所餘者即為小僧饅首數少於小僧數之較是比每小僧一人饅首一箇所少之數是知少八箇而小僧為三人小僧饅首為一箇今少二百箇則小僧必為七十五人小僧饅首必為二十五箇也設如有豆三十三石共換黄米京米一十九石止云每黄米三石值豆一石每京米一石值豆三石問二色米各得㡬何法先用互乗以齊其分以黄米三石與京米一石相乗得三石為乗出之共米數即以三石乗共豆三十三石得九十九石為乗出之共豆數以京米一石乗豆一石仍得一石為乗出黄米所值之豆數以黄米三石乗豆三石得九石為乗出京米所值之豆數然後以共米一十九石用黄米值豆一石乗之仍得一十九石與乗出之共豆九十九石相較則共豆多八十石又以共米一十九石用京米值豆九石乗之得一百七十一石與乗出之共豆九十九石相較則共豆多七十二石乃以黄米值豆一石與京米值豆九石相減餘八石為一率一石為二率少七十二石為三率得四率九石即黄米數於共米十九石内減之餘十石即京米數如以多八十石為三率得四率十石亦即京米數也此法用互乗得黄米三石值豆一石京米三石值豆九石今以米三石當一石則為黄米一石值豆一石京米一石值豆九石是豆為加三倍故将共豆亦加三倍即為共米一十九石共豆九十九石而黄米一石比京米一石所值豆差八石是知豆少八石而黄米為一石今少七十二石則黄米必為九石也又豆多八石而京米為一石今多八十石則京米必為十石也又法以黄米三石京米一石共米一十九石列於上黄米值豆一石京米值豆三石共豆三十三石列於下乃以下黄米值豆一石遍乗上黄米三石京米一石共米一十九石仍得原數又以上黄米三石遍乘下黄米值豆一石京米值豆三石共豆三十三石得黄米值豆三石京米值豆九石共豆九十九石兩下相較則黄米與所值豆同為三石彼此減盡京米所值豆比京米多八石共豆比共米多八十石爰以多八石為一率京米一石為二率多八十石為三率得四率十石即京米數於共米一十九石内減之餘九石即黄米數也如先求黄米數則以京米一石值豆三石移於前黄米三石值豆一石移於後乃以京米值豆三石遍乗上京米一石黄米三石共米一十九石得京米三石黄米九石共米五十七石又以上京米一石遍乗下京米值豆三石黄米值豆一石共豆三十三石仍得原數兩下相較則京米與所值豆俱為三石彼此減盡黄米所值豆比黄米少八石共豆比共米少二十四石爰以少八石為一率黄米三石為二率少二十四石為三率得四率九石即黄米數也此法先求京米數而以黄米列於前者盖将京米所值豆數黄米所值豆數共米所值豆數皆加三倍則黄米數與所值豆數相同是為每黄米一石值豆一石夫黄米數與所值豆數既相同而減盡無餘則共米數内之共黄米數與共豆數内之共黄米所值豆數亦必相同而減盡無餘所餘者即為共京米所值豆數多於共京米之較是比每京米一石值豆一石所多之數是知豆比米多八石而京米為一石今豆比米多八十石則京米必為十石也其先求黄米數而以京米列於前者盖将京米黄米共米皆加三倍則京米數與所值豆數相同是為每京米一石值豆一石夫京米數與所值豆數既相同而減盡無餘則共米數内之共京米數與共豆數内之共京米所值豆數亦必相同而減盡無餘所餘者即為黄米所值豆數比黄米所少之較是比每黄米一石值豆一石所少之數是知豆比米少八石而黄米為三石今豆比米少二十四石則黄米必為九石也設如有船桅共五十七槳共二百零四但知大船毎隻三桅六槳小船每隻一桅八槳問大小船數各若干法先用互乗以齊其分以大船三桅與小船一桅相乗得三桅為乗出之共桅數即以三桅乗共槳二百零四得六百一十二為乗出之共槳數以小船一桅乗大船六槳仍得六槳為乗出大船之槳數以大船三桅乗小船八槳得二十四槳為乗出小船之槳數然後以共桅五十七用大船六槳乗之得三百四十二與乗出之共槳六百一十二相較則共槳多二百七十又以共桅五十七用小船二十四槳乘之得一千三百六十八與乗出之共槳六百一十二相較則共槳少七百五十六乃以大船六槳與小船二十四槳相減餘十八槳為一率一桅為二率少七百五十六槳為三率得四率四十二即大船桅數三歸之得十四即大船數也於共桅五十七内減大船桅數餘十五即小船桅數亦即小船數如以得二百七十槳為三率得四率十五亦即小船桅數也此法用互乗得大船三桅六槳小船三桅二十四槳今以三桅當一桅則為大船一桅六槳小船一桅二十四槳是槳為加三倍故将共槳亦加三倍即為共五十七桅共六百一十二槳而大船一桅比小船一桅差十八槳是知少十八槳而大船為一桅今少七百五十六槳則大船必為四十二桅也多十八槳而小船為一桅今多二百七十槳則小船必為十五桅也又法以小船一桅大船三桅共五十七桅列於上小船八槳大船六槳共二百零四槳列於下乃以下小船八槳遍乗上小船一桅大船三桅共五十七桅得小船八桅大船二十四桅共四百五十六桅又以上小船一桅遍乗下小船八槳大船六槳共二百零四槳仍得原數两下相較則小船桅與槳同為八彼此減盡大船桅比槳多十八共桅比共槳多二百五十二爰以多十八為一率大船三桅為二率多二百五十二為三率得四率四十二桅即大船桅數三歸之得十四即大船數於五十七桅内減去大船四十二桅餘十五桅即小船桅數亦即小船數也如欲先得小船數則以大船三桅六槳移於前小船一桅八槳移於後乃以下大船六槳遍乗上大船三桅小船一桅共五十七桅得大船十八桅小船六桅共三百四十二桅又以上大船三桅遍乗下大船六槳小船八槳共二百零四槳得大船十八槳小船二十四槳共六百一十二槳兩下相較則大船桅與槳同為十八彼此減盡小船桅比槳少十八共桅比共槳少二百七十爰以少十八為一率小船一桅為二率少二百七十為三率得四率十五桅即小船桅數亦即小船數也此法先求大船桅數而以小船列於前者盖将小船桅數大船桅數共船桅數皆加八倍則小船桅數與槳數相同是為毎小船一桅一槳夫小船桅數與槳數既相同而減盡無餘則共桅數内之小船共桅數與共槳數内之小船共槳數亦必相同而減盡無餘所餘者即為大船共桅數多於大船共槳數之較是比每大船一桅一槳所多之數是知多十八桅而大船為三桅今多二百五十二桅則大船必為四十二桅也其先求小船桅數而以大船桅數列於前者盖将大船桅數小船桅數共船桅數皆加六倍槳數皆加三倍則大船桅數與槳數相同是為大船一桅一槳夫大船桅數與槳數既相同而減盡無餘則共桅數内之大船共桅數與共槳數内之大船共槳數亦必相同而減盡無餘所餘者即為小船共桅數少於小船共槳數之較是比每小船一桅一槳所少之數是知少十八桅而小船為一桅今少二百七十桅則小船必為十五桅也設如有銀八十七兩按飯銀馬銀二項分給衆人但知三人共給二兩飯銀七人共給五兩馬銀問人數及二項銀數各若干法以三人與七人相乗得二十一人又以三人乗馬銀五兩得一十五兩七人乗飯銀二兩得一十四兩爰以十四兩與十五兩相併得二十九兩為一率二十一人為二率共銀八十七兩為三率得四率六十三人即共人數也既得其人數則以三人為一率飯銀二兩為二率共六十三人為三率得四率四十二兩為飯銀數於共銀八十七兩内減之餘四十五兩即馬銀數如以七人為一率馬銀五兩為二率共六十三人為三率得四率四十五兩亦即馬銀數也盖三人給飯銀二兩則二十一人必給飯銀十四兩七人給馬銀五兩則二十一人必給馬銀十五兩夫二十一人既給飯銀十四兩馬銀十五兩是二十一人共給銀二十九兩矣是知有二十九兩為二十一人今有八十七兩則必為六十三人也又三人共給飯銀二兩則六十三人必共給飯銀四十二兩七人共給馬銀五兩則六十三人必共給馬銀四十五兩也設如賞人飯肉共用碗一百但知二人共飯一碗三人共肉一碗問共人數及二項各用碗若干法以二人與三人相乗得六人又以二人乗肉一碗得二碗三人乗飯一碗得三碗爰以三碗二碗相併得五碗為一率六人為二率共碗一百為三率得四率一百二十人即共人數也既得共人數則以二人為一率飯碗一為二率共一百二十人為三率得四率六十為飯碗數於共碗一百内減之餘四十即肉碗數如以三人為一率得四率四十亦即肉碗數也此法因二人共飯三人共肉其數不同故用互乗以齊其分盖二人共飯一碗則六人必共飯三碗三人共肉一碗則六人必共肉二碗夫六人既共飯三碗共肉二碗是六人共用五碗矣是知有五碗為六人今有一百碗則必為一百二十人也又二人共飯一碗則一百二十人必共飯六十碗三人共肉一碗則一百二十人必共肉四十碗也設如有兵三千四百七十四名每三人給衫絹七十尺每四人給褲絹五十尺問縂絹若干法以三人與四人相乗得十二人又以三人乗褲絹五十尺得一百五十尺四人乗衫絹七十尺得二百八十尺爰以十二人為一率二百八十尺與一百五十尺相併得四百三十尺為二率兵三千四百七十四名為三率得四率一十二萬四千四百八十五尺為共絹數也此法與前同但前法以共銀數求共人數故以銀數為一率人數為二率此法以共人數求共絹數故以人數為一率絹數為二率其比例之理一也設如賞人茶飯酒共用碗一千三百三十八但知三人共茶二碗五人共酒三碗七人共飯六碗問共人數及三項各用碗若干法先以三人茶二碗五人酒三碗互乗以三人與五人相乗得一十五人又以三人乗酒三碗得九碗五人乗茶二碗得十碗是為十五人共用茶酒十九碗復與七人飯六碗互乗以十五人與七人相乗得一百零五人又以十五人乗飯六碗得九十碗七人乗茶酒共十九碗得一百三十三碗爰以一百三十三碗與九十碗相併得二百二十三碗為一率一百零五人為二率共碗一千三百三十八為三率得四率六百三十人即共人數也既得共人數乃以三人為一率茶碗二為二率共六百三十人為三率得四率四百二十為茶碗數又以五人為一率酒碗三為二率共六百三十人為三率得四率三百七十八為酒碗數又以七人為一率飯碗六為二率共六百三十人為三率得四率五百四十為飯碗數也此法因用碗三項故用兩次互乗以齊其分得一百零五人應用三項碗共二百二十三是知有二百二十三碗為一百零五人今有一千三百三十八碗則必為六百三十人也既得共人數則以各項分數比例求之即得各項碗之共數矣設如有燈大小二䓁大燈居小燈三分之二但知大燈三盞用油四兩小燈四盞用油三兩共用油十八斤零七兩問大小燈數各若干法以大燈三盞與小燈四盞相乗得十二盞又以小燈四盞乗大燈用油四兩得大燈用油十六兩以大燈三盞乗小燈用油三兩得小燈用油九兩又将大燈用油十六兩二因之大燈二分故用二因得三十二兩将小燈用油九兩三因之小燈三分故用三因得二十七兩二數相併得五十九兩為一率十二盞為二率共油十八斤七兩通為二百九十五兩為三率得四率六十盞為燈一分之數二因之得一百二十盞即大燈數三因之得一百八十盞即小燈數也此法因有𢃄分而互乗所得之十二盞為一分之衰數又因共油數為大燈二分小燈三分之共數故亦二因十六兩三因九兩併之為五分之衰數是知油五分之衰數五十九兩與燈一分之衰數十二盞之比即同於五分共油二百九十五兩與一分燈數六十盞之比也既得一分為六十盞故二因之得大燈數三因之得小燈數也設如有銀二十五兩三錢買銅鐡二色其重相䓁鐡三斤價四錢銅二斤價五錢問斤數及各價㡬何法以鐡三斤與銅二斤相乗得六斤又以銅二斤乗鐡價四錢得八錢以鐡三斤乗銅價五錢得一兩五錢乃以八錢與一兩五錢相併得二兩三錢為一率六斤為二率縂銀二十五兩三錢為三率得四率六十六斤為銅鐡相䓁之斤數又以鐡三斤為一率價四錢為二率今鐡六十六斤為三率得四率八兩八錢即鐡價於共銀二十五兩三錢内減之餘十六兩五錢即銅價如以銅二斤為一率價五錢為二率今銅六十六斤為三率得四率十六兩五錢亦即銅價也盖鐡三斤價四錢則六斤價八錢銅二斤價五錢則六斤價一兩五錢是銅鐡各六斤而共價為二兩三錢故以二兩三錢與各六斤之比即同於共價二十五兩三錢與各六十六斤之比也既得各斤數則以各價比例求之即得各價數矣設如有米九百石令甲乙二處各因米價貴賤納之其所納之銀適相等甲處米價每石五錢乙處米價每石七錢問各米數及共價數㡬何法以乙七錢乗甲一石得七石以甲五錢乗乙一石得五石乃以七石與五石相併得十二石為一率以甲七石為二率縂米九百石為三率得四率五百二十五石即甲處納米之數於九百石内減之餘三百七十五石即乙處納米之數如以乙五石為二率得四率三百七十五石亦即乙處納米之數以甲五百二十五石與每石價五錢相乗得二百六十二兩五錢以乙三百七十五石與每石價七錢相乗亦得二百六十二兩五錢是其所納之銀數適相䓁也盖甲處每石價五錢則七石之價為三兩五錢乙處每石價七錢則五石之價亦為三兩五錢其價相䓁是十二石之中甲應七石乙應五石故以十二石與甲七石之比即同於縂米九百石與甲五百二十五石之比又十二石與乙五石之比即同於縂米九百石與乙三百七十五石之比也設如空車一日行三十里重車一日行二十里今載米至倉徃返足一日問距倉路逺㡬何法以空車行三十里與重車行二十里相乗得六百里又以重車行二十里乗空車一日得二十日以空車行三十里乗重車一日得三十日乃以二十日與三十日相併得五十日為一率六百里為二率一日為三率得四率一十二里即距倉之里數也盖空車一日行三十里則二十日行六百里重車一日行二十里則三十日亦行六百里一徃一返共五十日是知五十日徃返六百里則今一日必徃返十二里也設如重車一日行五十里輕車一日行七十五里今載米至倉五日徃返三次問距倉里數㡬何法以重車行五十里與輕車行七十五里相乗得三千七百五十里又以輕車行七十五里乗重車一日得七十五日以重車行五十里乗輕車一日得五十日乃以七十五日與五十日相併得一百二十五日為一率三千七百五十里為二率五日為三率得四率一百五十里即五日徃返之里數以三次除之得五十里即距倉之里數也此法與前法同前法一日徃返一次故所得即距倉之里數此法五日徃返三次故所得為徃返三次之里數是以用三次除之而得距倉之里數也御製數理精藴下編卷七
