body:
  text: 欽定四庫全書御製數理精蘊下編卷十六面部割圜割圜八線八線相求六宗限內三要總法二簡法求象各線割圜八線圜周定為三百六十度大而周天小而寸許皆如之蓋圜有大小而度分隨之其為數則同自圜心平分圜周為四分名曰四象限每一象限九十度一象限之中設為正弦餘弦正矢餘矢正切餘切正割餘割名之曰割圜八線設如甲乙丙丁之圜自圜心戊平分全圜為甲乙乙丙丙丁丁甲四象限其每一象限皆九十度乃自圜心戊任作一戊己半徑則將甲丁九十度之弧分為甲己己丁二段己丁為己戊丁角所對之弧甲己為甲戊己角所對之弧如命己戊丁為正角則甲戊己為餘角甲戊己為正角則己戊丁為餘角正角所對為正弧餘角所對為餘弧今以己丁為正弧故甲己為餘弧又自己與甲丙全徑平行作己辛線謂之通弦其對己丁正弧而立於戊丁半徑者曰正弦又與戊丁半徑平行作壬己線謂之餘弦以其為甲己餘弧之所對也於戊丁半徑內減戊庚餘庚丁謂之正矢於甲戊半徑內減壬戊餘甲壬謂之餘矢自圜界與甲戊半徑平行立於戊丁半徑之末作垂線仍與己戊丁角相對者曰正切將己戊半徑引長與正切相遇於癸成戊癸線謂之正割又自圜界與戊丁半徑平行作甲子線謂之餘切戊癸正割被甲子餘切截於子所分戊子謂之餘割每一角一弧即有正弦餘弦正矢餘矢己成四線於圜界之內復引出半徑於圜界之外而成正切餘切正割餘割之四線內外共為八線故曰割圜八線逐度逐分正弧之餘即為餘弧之正餘弧之正即為正弧之餘是以前四十五度之八線正餘互相對待為用不必復求後四十五度之八線也凡此八線皆九十度以內鋭角之所成若直角九十度者則不能成八線蓋因半徑即九十度之正弦甲戊半徑即甲丁弧之弦而切線割線為平行終無相遇之處也若鈍角過九十度以外者則於半周一百八十度內減其角度用其餘度之八線即如己庚為己丁弧之正弦亦即乙己弧之正弦也要之八線以正弦為本有正弦則諸線皆由此生故六宗三要皆係正弦之法六宗三要二簡法附西洋厯算家作割圜八線表始自圜內容六邊四邊十邊三邊五邊十五邊名曰六宗蓋用圜徑求各等邊形之一邊為相當弧之通弦以為立表之原故謂之宗然六者實本於三如六邊形之一邊即圜之半徑不藉他求數無零餘而理最易見此其一也四邊形之一邊則為半徑所作正方形之對角斜弦此又其一也十邊形之一邊則為半徑所作連比例三率之中率西法謂之理分中末線此又其一也至於三邊形則出於六邊五邊形則出於十邊十五邊形則又出於三邊及五邊非别自立一法也既得此六種形之一邊各半之即得六種弧之各正弦爰命此六種弧為本弧按法可求本弧之餘弦可求倍本弧之正弦餘弦亦可求半本弧之正弦餘弦是為三要又以不等兩弧之正弦餘弦求相加相減弧之正弦又兩弧距六十度前後之度等得其兩正弦之較即得距弧之正弦是又名為二簡法由此錯綜之可得正弦一百二十其中最小者為四十五分之弦其次一度三十分又次為二度十五分又次為三度如此每越四十五分而得一弦其自一分至四十四分之弦則以比例求之因弧分甚微與直線所差無幾故以弦求弦而得之此西法立割圜八線表之大綱也爾來西法對數表內有設連比例四率以求圜內容七邊九邊二法因推廣其理於六宗之外增求圜內容十八邊形十四邊形之法俱以半徑為首率求連比例四率之第二率即十八邊形十四邊形之每一邊而七邉又因之以生亦猶三邊之出於六邊五邊之出於十邊也有此二形與六宗相參伍可得正弦三百六十其中最小者為十五分之正弦又增一法求十五分之三分之一五分之正弦所少者止一分至四分之正弦較之四十五分為尤密可知矣今以六宗三要二簡法理分中末線并新增數法皆按類具例於左六宗圜內容六邊形四邊形三邊形十邊形五邊形十五邊形設如圜徑二十萬求內容六邊形之一邊幾何法以圜徑二十萬折半得半徑十萬即圜內容六邊形之每一邊也如甲圜內容六邊形每邊之弧得圜周六分之一皆六十度試自圜心甲至圜界乙丙二處作甲乙甲丙二半徑線成甲乙丙三角形則甲角所對之弧為六十度而甲乙甲丙兩腰俱為半徑既相等則乙角丙角亦必相等而各為六十度矣三角既等則三邊亦必相等故乙丙邊即與甲乙甲丙半徑相等也乙丙弧既為六十度則乙丙邊十萬為六十度之通弦折半得乙丁五萬即乙戊弧三十度之正弦也此即六邊起算之理前設圜徑為二兆者所以求其密合今設圜徑為二十萬所以取其便於用也設如圜徑二十萬求內容三邊形之一邊幾何法以圜徑二十萬為弦自乘得四百億又以半徑十萬為勾自乘得一百億相減餘三百億開方得股一十七萬三千二百零五小餘八七五六八即圜內容三邊形之每一邊也如甲圜內容三邊形每邊之弧得圜周三分之一皆一百二十度為六邊形每邊弧之一倍試自乙角過圜心至對界作乙丁全徑線又自丁依半徑度至丙作丁丙線則成六邊形之每一邊其丙丁弧即為三邊形之每邊弧之一半而丙角立於圜界之一半必為直角故半徑為勾全徑為弦求得股即三邊形之每一邊也乙丙弧既為一百二十度則乙丙邊一十七萬三千二百零五小餘八七五六八為一百二十度之通弦折半得乙戊八萬六千六百零二小餘五四三七八四即乙己弧六十度之正弦也設如圜徑二十萬求內容四邊形之一邊幾何法以圜徑二十萬折半得半徑十萬自乘得一百億倍之得二百億開方得一十四萬一千四百二十一小餘三五六二三七三即圜內容四邊形之每一邊也如甲圜內容四邊形每邊之弧得圜周四分之一皆九十度試自圜心甲至圜界乙丙二處作甲乙甲丙二半徑線成甲乙丙勾股形若命甲乙半徑為股則甲丙半徑為勾若命甲丙半徑為股則甲乙半徑為勾因勾股皆為半徑故以半徑自乘倍之開方而得弦即如勾股各自乘併之開方而得弦也乙丙弧既為九十度則乙丙邊一十四萬一千四百二十一小餘三五六二三七三為九十度之通弦折半得乙丁七萬零七百一十小餘六七八一一八六即乙戊弧四十五度之正弦也理分中末線此西法名也因命一線為首率將此首率分為大小兩分大分為中率小分為末率與原線共為相連比例三率故謂之理分中末線也設如以十萬為首率作相連比例三率使中率末率相加與首率等求中率末率各幾何法以十萬自乘得一百億為長方積以十萬為長闊之較用帶縱較數開方法算之得闊六萬一千八百零二即相連比例之中率以中率與首率十萬相減餘三萬八千一百九十七即相連比例之末率也此法蓋因連比例三率之首率末率相乘之長方積與中率自乘之正方積等而首率之中有一中率一末率之數故首率自乘之一正方積中有首率中率相乘之一長方又有首率末率相乘之一長方即如甲乙為首率丙乙為中率甲丙為末率丙乙中率自乘之正方為丁戊乙丙甲丙末率與甲乙首率相乘之長方為甲丙庚辛甲辛與甲乙等此一正方一長方之積等而甲乙首率自乘之正方為甲乙己辛丙乙中率與甲乙首率相乘之長方為丙乙己庚丙庚與甲乙等夫甲丙庚辛之長方既與丁戊乙丙之正方等則甲乙己辛之正方亦必與丁戊己庚之長方等是以丁戊己庚長方形之闊即中率其長比闊之較即首率故以首率自乘為長方積仍以首率為長比闊之較用帶縱平方法開之得闊為中率也又法以首率十萬為股首率十萬折半得五萬為勾求得弦一十一萬一千八百零三內減勾五萬餘六萬一千八百零三為相連比例之中率以中率與首率相減餘三萬八千一百九十七即為相連比例之末率也如圖甲乙與乙丙皆為首率今以甲乙為股乙丙折半得乙丁為勾求得甲丁弦試依甲丁弦度將乙丁勾引長至戊作丁乙戊線仍自甲至戊作一圜界則甲丁戊丁同為半徑且皆為弦於戊丁弦內減乙丁勾所餘乙戊與己乙等即中率於甲乙首率內減去與乙戊相等之己乙中率所餘甲己即末率也此法與前法理實相同帶縱較數開方法有以半較自乘與原積相加開方得半和於半和內減半較得闊者今此法以首率為股自乘得甲乙丙壬正方形即與庚戊丙辛長方形積等乙丙即長闊之較乙丁即半較戊丁即半和今以乙丁為勾自乘甲乙為股自乘相加開方得甲丁弦即如乙丁半較自乘與甲乙自乘原積相加開方而得甲丁與戊丁等戊丁內減乙丁餘戊乙即半和內減半較得闊為中率也設如圜徑二十萬求內容十邊形之一邊幾何法用連比例三率有首率求中率末率使中率末率相加與首率等之法以圜徑二十萬折半得十萬為首率自乘得一百億為長方積以十萬為長闊之較用帶縱較數開方法算之得六萬一千八百零三小餘三九八八七四九為連比例之中率即圜內容十邊形之每一邊也如甲圜內容十邊形每邊之弧得圜周十分之一皆三十六度其通弦即圜內十邊形之一邊試自圜心甲至圜界乙丙二處作甲乙甲丙二半徑線遂成甲乙丙三角形復自圜界乙至圜界戊作一乙戊線則截甲丙線於丁又成乙丙丁三角形而乙戊遂為一百零八度之通弦此乙丙丁三角形與甲乙丙三角形為同式形乙丙丁三角形之乙角當戊丙弧為乙丙弧之倍則乙丙丁三角形之乙角與甲乙丙三角形之甲角等又同用丙角其餘一角亦必等故為同式形其相當各邊俱成相連比例故甲乙與乙丙之比同於乙丙與丙丁之比為相連比例三率而甲乙為首率乙丙為中率丙丁為末率也又甲乙丙三角形其甲角既居全圜十分之一為三十六度則乙角必比甲角大一倍為七十二度三角形之三角共一百八十度甲角既為三十六度則乙丙兩角必為一百四十四度平分之各得七十二度比甲角為大一倍也而乙丙丁三角形之乙角與甲乙丙三角形之甲角等則甲丁乙三角形之乙角亦必與甲角等是則甲丁乙三角形必兩邊相等之三角形而乙丙丁三角形亦為兩邊相等之三角形也夫甲丁既與丁乙等而丁乙又與乙丙中率等則甲丁亦必與中率等矣是以甲丁中率與丁丙末率相加與甲丙首率等故用連比例三率有首率求中率法算之得中率為十邊形之一邊也又法以圜徑二十萬折半得半徑十萬為股自乘得一百億又以半徑十萬折半得五萬為勾自乘得二十五億相加得一百二十五億開方得弦一十一萬一千八百零三小餘三九八八七四九於弦數內減去勾數餘六萬一千八百零三小餘三九八八七四九即圜內容十邊形之每一邊也如甲圜內容十邊形每邊之弧得圜周十分之一皆三十六度試自圜心甲至圜界乙作甲乙半徑線為股又自圜心甲取直角作甲丙半徑線折半得甲丁為勾求得乙丁弦內減與甲丁相等之戊丁餘乙戊即與乙己等為圜內容十邊形之每一邊也乙己弧既為三十六度則乙己邊六萬一千八百零三小餘三九八八七四九為三十六度之通弦折半得乙庚三萬零九百零一小餘六九九四三七四即乙辛弧十八度之正弦也設如圜徑二十萬求內容五邊形之一邊幾何法以半徑十萬為底仍以半徑十萬與圜內容十邊形之一邊六萬一千八百零三小餘三九八八七四九為兩腰用三角形求中垂線法算之得中垂線五萬八千七百七十八小餘五二五二二九二倍之得一十一萬七千五百五十七小餘五四五八四即圜內容五邊形之每一邊也如甲圜內容五邊形每邊之弧得圜周五分之一皆七十二度試自圜心甲至圜界乙丙二處作甲乙甲丙二半徑線遂成甲乙丙三角形其乙丙邊為七十二度之通弦如以乙丙弧七十二度折半於丁作乙丁線即圜內容十邊形之一邊仍自圜心甲至圜界丁作甲丁半徑線又成甲乙丁三角形而甲丁線平分乙丙線於戊此乙戊線為甲乙丁三角形之中垂線即五邊形每邊之一半故以甲丁半徑為底甲乙半徑為大腰乙丁十邊形之一邊為小腰求得乙戊中垂線倍之為五邊形之每一邊也又法以半徑十萬為股自乘得一百億圜內容十邊形之一邊六萬一千八百零三小餘三九八八七四九為勾自乘得三十八億一千九百六十六萬零一百一十二小餘四八九九九五八五八五一相加得一百三十八億一千九百六十六萬零一百一十二小餘四八九九九五八五八五一開方得弦一十一萬七千五百五十七小餘五四五八四即圜內容五邊形之每一邊也此法蓋因半徑自乘十邊形之一邊自乘兩自乘方積相併即與五邊形之一邊自乘之方積等故用勾股求弦之法算之如甲圜內容五邊形將乙丙弧折半於丁作乙丁線即圜內容十邊形之一邊仍自圜心甲至丁作甲丁半徑線遂成甲乙丁三角形又依乙丁線度截甲丁半徑於己作乙己線成乙己丁三角形與甲乙丁三角形為同式形故甲乙為首率乙丁為中率己丁為末率甲己亦與乙丁等為中率而乙丙邊平分己丁末率於戊又成乙戊丁勾股形乙戊五邊形每邊之半為股丁戊末率之半為勾乙丁中率為弦試依甲丁半徑度作甲庚辛丁正方形又依乙丙五邊形之一邊度作乙丙癸壬正方形其甲庚辛丁正方形內甲子丑已為乙丁弦自乘之一正方甲已既與乙丁弦等故甲子丑已為弦自乘之正方已寅辛丁長方形亦與乙丁弦自乘之一正方等丁辛原與甲丁首率等己丁末率與丁辛首率相乘自與乙丁中率自乘之正方等而子庚寅丑長方形為乙丁弦自乘之一正方內少勾自乘之四正方蓋子庚辛卯長方形為首率與末率相乘之長方與乙丁中率自乘之正方等內却少丑寅辛卯正方形而丑寅辛卯正方形實為戊丁勾自乘之四正方故子庚寅丑長方形為乙丁弦自乘之一正方少勾自乘之四正方也是則甲丁半徑自乘之甲庚辛丁正方形內有弦自乘之三正方而少勾自乘之四正方再加乙丁弦自乘之一正方共得弦自乘之四正方而少勾自乘之四正方大凡弦自乘之正方內原有勾自乘之一正方股自乘之一正方今弦自乘之四正方內少勾自乘之四正方即與股自乘之四正方等而乙丙一邊自乘之乙丙癸壬正方形實為乙戊股自乘之四正方然則甲丁半徑自乘方與乙丁十邊形之一邊自乘方相併既與乙戊股自乘之四正方等而乙丙一邊自乘之正方豈不與甲丁半徑自乘乙丁十邊形之一邊自乘之兩正方等乎故以甲丁半徑為股乙丁十邊形之一邊為勾求得弦而為五邊形之一邊也又法以半徑十萬自乘得一百億為長方積仍以半徑十萬為長闊之較用帶縱較數開方法算之得長一十六萬一千八百零三小餘三九八八七四九折半得八萬零九百零一小餘六九九四三七四為自圜心至五邊形每邊之垂線乃以半徑十萬為弦圜心至五邊形每邊之垂線為股求得勾五萬八千七百七十八小餘五二五二二九二倍之得一十一萬七千五百五十七小餘五四五八四即圜內容五邊形之每一邊也如甲圜內容五邊形將乙丙弧折半於丁作乙丁線即圜內容十邊形之一邊仍自圜心甲至丁作甲丁半徑線成甲乙丁三角形又依乙丁線度截甲丁半徑於己作乙己線成乙己丁三角形與甲乙丁三角形為同式形故甲乙為首率乙丁為中率己丁為末率甲己亦與乙丁等為中率而乙丙邊平分己丁末率於戊是以己戊與戊丁俱為半末率而甲戊自圜心至邊之垂線則為一中率半末率之共數今以半徑首率自乘為長方積開帶縱平方得長乃首率與中率之和其內有兩中率一末率折半得一中率半末率即甲戊自圜心至邊之垂線既得甲戊垂線乃以甲乙半徑為弦甲戊垂線為股求得乙戊勾倍之得乙丙即圜內容五邊形之一邊也或以乙丁中率為弦戊丁半末率為勾求得乙戊股倍之亦即圜內容五邊形之一邊也乙丙弧既為七十二度則乙丙邊一十一萬七千五百五十七小餘五四五八四為七十二度之通弦折半得乙戊五萬八千七百七十八小餘五二五二二九二即乙丁弧三十六度之正弦也設如圜徑二十萬求內容十五邊形之一邊幾何法以半徑十萬為弦圜內容五邊形之半五萬八千七百七十八小餘五二五二二九二為勾求得股八萬零九百零一小餘六九九四三七五內減半徑之半五萬餘三萬零九百零一小餘六九九四三七五為股次以圜內容三邊形之一邊一十七萬三千二百零五小餘八七五六八內減圜內容五邊形之一邊一十一萬七千五百五十七小餘五四五八四餘五萬五千六百四十八小餘三二九八四折半得二萬七千八百二十四小餘一五一四九二為勾求得弦四萬一千五百八十二小餘三三八一六三五即圜內容十五邊形之每一邊也如甲圜內容十五邊形每邊之弧得圜周十五分之一皆二十四度試從圜界乙作圜內容三邊形又作圜內容五邊形將三邊形之每一邊弧分五段五邊形之每一邊弧分三段即得十五邊形之每一邊弧如戊庚與己丁二段皆為十五邊形之弧故以甲丁半徑為弦丁丙五邊之半為勾求得甲丙股內減甲辛自圜心至三角底邊之垂線為半徑之半餘辛丙與癸丁或壬庚等復於三邊形之戊己邊內減五邊形之庚丁邊即如戊己線內減壬癸餘戊壬與癸己二段折半得癸己或戊壬今任以癸丁或壬庚為股癸己或戊壬為勾求得己丁弦或戊庚弦即圜內容十五邊形之每一邊也己丁弧既為二十四度則己丁邊四萬一千五百八十二小餘三三八一六三五為二十四度之通弦折半得己子二萬零七百九十一小餘一六九八一七即己丑弧十二度之正弦也新增按分作相連比例四率法設如以十萬為一率作相連比例四率使一率與四率相加與二率三倍等問二率三率四率各幾何法以一率十萬自乘再乘得一千兆成一立方積為實又以一率十萬自乘三因之得三百億成三平面積為法以除原實一千兆得三萬乃以三萬自乘再乘得二十七兆益於原實一千兆內得一千零二十七兆為共實按除法以所得三萬與法三百億相因得九百兆與共實相減餘一百二十七兆為第二位實以法之三百億除之得四千乃以首位所得三萬合次位所得四千共三萬四千自乘再乘得三十九兆三千零四十億仍益於原實一千兆內得一千零三十九兆三千零四十億為共實按除法減首位所得三萬與法三百億相因之九百兆又減次位所得四千與法三百億相因之一百二十兆餘一十九兆三千零四十億為第三位實以法之三百億除之得六百所餘太多因益積故取略大之數為七百合前兩位所得三萬四千共三萬四千七百自乘再乘得四十一兆七千八百一十九億二千三百萬仍益於原實一千兆內得一千零四十一兆七千八百一十九億二千三百萬為共實按除法減首位所得三萬與法三百億相因之九百兆又減次位所得四千與法三百億相因之一百二十兆又減三位所得七百與法三百億相因之二十一兆餘七千八百一十九億二千三百萬為第四位實以法之三百億除之得二十合前三位所得三萬四千七百共三萬四千七百二十自乘再乘得四十一兆八千五百四十二億一千零四萬八千仍益於原實一千兆內得一千零四十一兆八千五百四十二億一千零四萬八千為共實按除法減首位所得三萬與法三百億相因之九百兆又減次位所得四千與法三百億相因之一百二十兆又減三位所得七百與法三百億相因之二十一兆又減四位所得二十與法三百億相因之六千億餘二千五百四十二億一千零四萬八千為末位實以法之三百億除之得八所餘亦太多因益積仍取略大之數為九合前四位所得三萬四千七百二十共三萬四千七百二十九自乘再乘得四十一兆八千八百六十七億六千六百四十萬零二千四百八十九仍益於原實一千兆內得一千零四十一兆八千八百六十七億六千六百四十萬二千四百八十九為共實按除法以五次所得之數與法相因之數遞減之仍餘一百六十七億六千六百四十萬二千四百八十九不盡是共除得三萬四千七百二十九為相連比例之二率也以二率之三萬四千七百二十九自乘得一十二億零六百一十萬三千四百四十一以一率之十萬除之得一萬二千零六十一為三率以二率之三萬四千七百二十九三倍之得十萬四千一百八十七內減去一率之十萬餘四千一百八十七為四率如以三率之一萬二千零六十一自乘以二率之三萬四千七百二十九除之亦得四千一百八十七為四率也此為益實歸除之法蓋因此法止有一率之數作相連比例四率使一率與四率之共數與二率三倍等而連比例四率之理一率自乘用四率再乘與二率自乘再乘之數等今立法以一率自乘再乘為原實較之三倍二率與一率自乘之面積相乘之數却少一二率自乘再乘之數故以纍除所得之數屢次自乘再乘益入原實然後按法除之始足二率三倍之數也如圖甲乙為一率庚子子辰辰乙皆為二率庚甲為四率庚乙為一率四率之共數又為二率之三倍甲乙丙丁戊己為一率自乘再乘之正方體庚乙丙丁壬癸為三倍二率與一率自乘面積相乘之長方體一率自乘三因之得三平面如以二率乘之成三扁方體合之即成三倍二率乘一率自乘面積之一長方體比一率自乘再乘之正方體多一庚甲酉戊壬癸扁方體此扁方體即一率自乘用四率再乘之數與二率自乘再乘之積等若於一率自乘再乘之正方體內加入二率自乘再乘之正方體即如於甲乙丙丁戊己正方體上加一庚甲酉戊壬癸之扁方體成庚乙丙丁壬癸之長方體而以一率自乘之乙丙丁申方面除之必得庚乙為二率之三倍苟合乙丙丁申與辰己午未及子丑寅卯三方面除之必得庚子或子辰或辰乙為二率若不加積止以三方面除之則所得仍為一率之三分之一比二率數必小故以屢除所得之數屢次自乘再乘益入原積則積漸增而得數亦漸大遞及末位則所少之積已足而除得之數即為二率之全數焉設如圜徑二十萬求內容十八邊形之一邊幾何法用連比例四率有一率求二率使一率與四率相加與二率三倍等之法以圜徑二十萬折半得十萬為一率自乘再乘得一千兆為實又以半徑十萬自乘三因之得三百億為法按益實歸除之法除實得三萬四千七百二十九小餘六三五五三三四為二率即圜內十八邊形之每一邊也如甲圜內容十八邊形每邊之弧得圜周十八分之一皆二十度其通弦即圜內十八邊形之一邊試自圜心至圜界乙丙作甲乙甲丙二半徑線遂成甲乙丙三角形復自圜界乙至圜界庚作一乙庚線則截甲丙線於戊又成乙丙戊三角形而乙庚為六十度之通弦復自圜界丙按丙戊線度至乙庚線之丁作一丙丁線則又成丙丁戊三角形此三三角形皆為同式形乙丙戊三角形之乙角當庚丙弧為乙丙弧之倍則乙丙戊三角形之乙角與甲乙丙三角形之甲角等又與甲乙丙三角形同用丙角丙丁戊三角形之丁丙線與甲辛半徑平行則丙丁戊三角形之丙角與甲丙辛三角形之甲角為相對錯角亦必等又與乙丙戊三角形同用戊角是此三三角形之各角互相等而為同式形也其相當各邊俱成相連比例故甲乙與乙丙之比同於乙丙與丙戊之比乙丙與丙戊之比又同於丙戊與戊丁之比為相連比例四率而甲乙為一率乙丙為二率丙戊為三率戊丁為四率也又乙庚為六十度之通弦與甲乙一率等而乙戊丁己己庚三段皆與乙丙二率等是乙庚一率中有乙丙二率之三倍而少一丁戊四率也必以乙庚一率與丁戊四率相加方與乙丙二率之三倍等故用連比例四率有一率求二率法算之得二率為十八邊形之一邊也乙丙弧既為二十度乙丙邊三萬四千七百二十九小餘六三五五三三四為二十度之通弦折半得一萬七千三百六十四小餘八一七七六六七即十度之正弦也設如圜徑二十萬求內容九邊形之一邊幾何法以半徑十萬為底仍以半徑十萬與圜內容十八邊形之一邊三萬四千七百二十九小餘六三五五三三四為兩腰用三角形求中垂線法算之得中垂線三萬四千二百零二小餘一四三三二六倍之得六萬八千四百零四小餘二八六六五二即圜內容九邊形之每一邊也如甲圜容九邊形每邊之弧得圜周九分之一皆四十度試自圜心甲至圜界乙丙二處作甲乙甲丙二半徑線遂成甲乙丙三角形其乙丙邊為四十度之通弦如以乙丙弧四十度折半於丁作乙丁線即圜內容十八邊形之一邊仍自圜心甲至圜界丁作甲丁半徑線又成甲乙丁三角形而甲丁線平分乙丙線於戊此乙戊線為甲乙丁三角形之中垂線即九邊形每邊之一半故以甲丁半徑為底甲乙半徑為大腰乙丁十八邊形之一邊為小腰求得中垂線倍之為九邊形之每一邊也乙丙弧既為四十度乙丙邊為四十度之通弦其乙戊中垂線三萬四千二百零二小餘一四三三二六即乙丁弧二十度之正弦也按分作相連比例四率又法設如以十萬為一率作相連比例四率使一率與四率相加與二率兩倍再加一三率之數等問二率三率四率各幾何法以一率十萬自乘再乘得一千兆成一立方體為實又以一率十萬自乘二因之得二百億成二平面積為法以除原實一千兆得五萬為盡數因減實大於益實故取略小之數為四萬乃以四萬自乘再乘得六十四兆益於原實一千兆內得一千零六十四兆為益實復以所得四萬自乘得一十六億以一率十萬再乘得一百六十兆於益實內減之餘九百零四兆為正實按除法以所得四萬與法二百億相因得八百兆與正實相減餘一百零四兆為第二位實以法之二百億除之得五千仍取略小之數為四千乃以首位所得四萬合次位所得四千共四萬四千自乘再乘得八十五兆一千八百四十億益於原實一千兆內得一千零八十五兆一千八百四十億為益實復以所得四萬四千自乘得一十九億三千六百萬以一率十萬再乘得一百九十三兆六千億於益實內減之餘八百九十一兆五千八百四十億為正實按除法減首位所得四萬與法二百億相因之八百兆又減次位所得四千與法二百億相因之八十兆餘一十一兆五千八百四十億為第三位實以法之二百億除之得五百合前兩位所得四萬四千共四萬四千五百自乘再乘得八十八兆一千二百一十一億二千五百萬益於原實一千兆內得一千零八十八兆一千二百一十一億二千五百萬為益實復以所得四萬四千五百自乘得一十九億八千零二十五萬以一率十萬再乘得一百九十八兆零二百五十億於益實內減之餘八百九十兆零九百六十一億二千五百萬為正實按除法減首位所得四萬與法二百億相因之八百兆又減次位所得四千與法二百億相因之八十兆又減三位所得五百與法二百億相因之一十兆餘九百六十一億二千五百萬為第四位實以法之二百億除之實不足法乃以第四位為空位而第五位得四故以四為末位合前四位所得四萬四千五百空十共四萬四千五百零四自乘再乘得八十八兆一千四百四十八億九千零一十三萬六千零六十四益於原實一千兆內得一千零八十八兆一千四百四十八億九千零一十三萬六千零六十四為益實復以所得四萬四千五百零四自乘得一十九億八千零六十萬六千零一十六以十萬再乘得一百九十八兆零六百零六億零一百六十萬於益實內減之餘八百九十兆零八百四十二億八千八百五十二萬六千零六十四為正實按除法以五次所得之數於法相因之數遞減之仍餘四十二億八千八百五十三萬六千零六十四不盡是共除得四萬四千五百零四為相連比例之二率也以二率之四萬四千五百零四自乘得一十九億八千零六十萬六千零一十六以一率之十萬除之得一萬九千八百零六為三率以二率之四萬四千五百零四二因之與三率之一萬九千八百零六相加得十萬八千八百一十四減去一率之十萬餘八千八百一十四為四率如以三率之一萬九千八百零六自乘以一率之四萬四千五百零四除之亦得八千八百一十四為四率也此為益實兼減實歸除之法蓋因此法止有一率之數作相連比例四率使一率與四率之共數與二率兩倍再加一三率之數等而相連比例四率之理一率自乘用四率再乘與二率自乘再乘之數等又一率自乘用三率再乘與二率自乘用一率再乘之數等今立法以一率自乘再乘為原實較之二率加倍與一率自乘之面積相乘之數却少一一率自乘四率再乘之數又多一一率自乘三率再乘之數故以屢除所得之數屢次自乘再乘益入原實又以屢除所得之數屢次自乘以一率再乘與益實相減然後按法除之始足二率兩倍之數也如圖甲乙為一率庚子子辰皆為二率辰乙為三率庚甲為四率庚乙為一率四率之共數又為二率兩倍再加一三率之共數甲乙丙丁戊巳為一率自乘再乘之正方體庚乙丙丁壬癸為兩倍二率併一三率與一率自乘面積相乘之長方體比一率自乘再乘之正方體多一庚甲酉戊壬癸扁方體此扁方體即一率自乘四率再乘之扁方體與二率自乘再乘之積等比兩倍二率與一率自乘面積相乘之扁方體多一辰乙丙丁午未扁方體此扁方體即一率自乘三率再乘之扁方體與二率自乘一率再乘之積等若於一率自乘再乘之正方體內加入二率自乘再乘之數再減去二率自乘一率再乘之數即如於甲乙丙丁戊己正方體內加入庚甲酉戊壬癸之扁方體減去辰乙丙丁午未之扁方體成一庚辰己午壬癸之扁方體而以一率自乘之辰己午未方面除之必得庚辰為二率之兩倍苟合辰巳午未子丑寅卯二方面除之必得庚子或子辰為二率若不益少減多而以二方面除之則所得仍為一率之二分之一比二率數必大故以屢除所得之數屢次自乘再乘益入原積復以屢除所得之數自乘用一率再乘逐層與原積相減遞及末位則所少之積漸足所多之積漸消而除得之數即為二率之全數焉設如圜徑二十萬求內容十四邊形之一邊幾何法用連比例四率有一率求第二率使一率與四率相加與二率兩倍再加一三率等之法以圜徑二十萬折半得十萬為一率自乘再乘得一千兆為實又以半徑十萬自乘倍之得二百億為法按益實兼減實歸除之法除實得四萬四千五百零四小餘一八六七九一三為二率即圜內十四邊形之每一邊也如甲圜內容十四邊形每邊之弧得圜周十四分之一皆二十五度四十二分五十一秒有餘其通弦即圜內十四邊形之一邊試自圜心至圜界乙丙作甲乙甲丙二半徑線遂成甲乙丙三角形復自圜界乙至圜界庚作一乙庚線則截甲丙線於戊又成乙丙戊三角形復自圜界丙按丙戊線度至乙庚線之丁作一丙丁線則又成丙丁戊三角形此三三角形皆為同式形乙戊丙三角形之乙角當丙庚弧為乙丙弧之倍則乙戊丙三角形之乙角與乙甲丙三角形之甲角等又與乙甲丙三角形同用丙角而丙丁戊三角形之丁丙線與甲辛半徑平行即丙丁戊三角形之丙角與甲丙辛三角形之甲角為相對錯角亦必等又與乙丙戊三角形同用戊角是此三三角形之各角互相等而為同式形也其相當各邊俱成相連比例故甲乙與乙丙之比同於乙丙與丙戊之比乙丙與丙戊之比又同於丙戊與戊丁之比為相連比例四率而甲乙為一率乙丙為二率丙戊為三率戊丁為四率也又按乙戊度作壬戊線與丁丙平行則截甲乙線於壬乃自壬與乙丙平行作壬子線復自壬與乙戊平行作壬癸線則又成甲壬子與壬戊癸丙三角形與乙丙戊三角形等成壬癸子一三角形與丙丁戊三角形等其甲子癸戊皆與乙丙二率等而癸子與丁戊四率等是甲丙一率內有兩二率一三率而少一四率也若以甲丙一率與癸子四率相加方與二率之兩倍再加一三率之數等故用連比例四率有一率求二率法算之得二率為十四邊形之每一邊也設如圜徑二十萬求內容七邊形之一邊幾何法以半徑十萬為底仍以半徑十萬與圜內容十四邊形之一邊四萬四千五百零四小餘一八六七九一三為兩腰用三角形求中垂線法算之得中垂線四萬三千三百八十八小餘三七三九一一八倍之得八萬六千七百七十六小餘七四七八二三六即圜內容七邊形之每一邊也如甲圜容七邊形每邊之弧得圜周七分之一皆五十一度二十五分四十二秒有餘試自圜心甲至圜界乙丙二處作甲乙甲丙二半徑線遂成甲乙丙三角形其乙丙邊為五十一度二十五分四十二秒有餘之通弦如以乙丙弧五十一度二十五分四十二秒有餘折半於丁作乙丁線即圜內容十四邊形之一邊仍自圜心甲至圜界丁作甲丁半徑線又成甲乙丁三角形而甲丁線平分乙丙線於戊此乙戊線為甲乙丁三角形之中垂線即七邊形每邊之一半故以甲丁半徑為底甲乙半徑為大腰乙丁十四邊形之一邊為小腰求得乙戊中垂線倍之為七邊形之每一邊也三要有本弧之正弦求本弧之餘弦有本弧之正弦餘弦求倍弧之正弦餘弦有本弧之正弦餘弦求半弧之正弦餘弦設如本弧三十六度之正弦五萬八千七百七十八小餘五二五二二九二求餘弧五十四度之正弦幾何法以三十六度之正弦五萬八千七百七十八小餘五二五二二九二為勾半徑十萬為弦求得股八萬零九百零一小餘六九九四三七五為五十四度之正弦即三十六度之餘弦也如甲乙丙九十度之一象限其甲乙正弧三十六度乙丙餘弧五十四度乙丁為三十六度之正弦試自乙至象限中心戊作乙戊半徑線遂成乙丁戊勾股形乙戊為弦乙丁為勾求得丁戊股與乙己等為乙丙餘弧五十四度之正弦即甲乙正弧三十六度之餘弦也設如本弧三十六度之正弦五萬八千七百七十八小餘五二五二二九二餘弦八萬零九百零一小餘六九九四三七五求倍弧七十二度之正弦餘弦各幾何法以半徑十萬為一率本弧之正弦五萬八千七百七十八小餘五二五二二九二為二率本弧之餘弦八萬零九百零一小餘六九九四三七五為三率求得四率四萬七千五百五十二小餘八二五八一四七倍之得九萬五千一百零五小餘六五一六二九四即倍弧七十二度之正弦也求餘弦則以三十六度之正弦五萬八千七百七十八小餘五二五二二九二自乘以半徑十萬除之得三萬四千五百四十九小餘一五二八一二倍之得六萬九千零九十八小餘三五六二四與半徑十萬相減餘三萬零九百零一小餘六九九四三七六即倍弧七十二度之餘弦也如甲乙丙九十度之一象限其甲乙弧三十六度倍之為甲丁弧七十二度乙己為三十六度之正弦庚乙為三十六度之餘弦與戊辛等蓋辛甲與乙己等則戊辛必與戊己等戊己即庚乙也丁壬為七十二度之正弦試與乙己平行作辛癸