形為同式形其相當各邊俱成相連比例故戊甲為一率甲庚為二率庚辛為三率辛壬為四率也今甲己七十二度之通弦內有甲庚二率之三倍而少一辛壬四率蓋己癸癸壬辛甲三段皆與甲庚二率等而癸壬辛甲二段內却重辛壬一小段是甲己通弦內有己癸癸壬辛甲三二率而少一辛壬四率也若以甲己通弦為髙與一率半徑自乘之方面相乘所成之長方體則比三倍二率為高與一率半徑自乘之方面相乘所成之長方體必少一四率為高與一率半徑自乘之方面相乘所成之扁方體此扁方體與二率自乘再乘之正方體等故以一率半徑自乘之三方面為法除實每次所得二率之數自乘再乘益入原積則積漸增與三倍二率與一率半徑自乘之方面相乘所成之長方體合而除得之數即為二率既得甲庚二率為二十四度之通弦半之得甲子即甲丑弧十二度之正弦也二簡法有兩弧之正弦餘弦求兩弧相加相減之正弦有距六十度前後相等弧之正弦求距弧之正弦設如四十五度之正弦七萬零七百一十小餘六七八一一八六餘弦亦七萬零七百一十小餘六七八一一八六又有二十四度之正弦四萬零六百七十三小餘六六四三七五餘弦九萬一千三百五十四小餘五四五七六四二求兩弧相加六十九度之正弦及兩弧相減二十一度之正弦各幾何法以半徑十萬為一率四十五度之正弦七萬零七百一十小餘六七八一一八六為二率二十四度之餘弦九萬一千三百五十四小餘五四五七六四二為三率求得四率六萬四千五百九十七小餘四一八八二又以半徑十萬為一率四十五度之餘弦七萬零七百一十小餘六七八一一八六為二率二十四度之正弦四萬零六百七十三小餘六六四三七五為三率求得四率二萬八千七百六十小餘六二三八四七六乃以兩四率相加得九萬三千三百五十八小餘四二六四九六即兩弧相加所得六十九度之正弦如以兩四率相減餘三萬五千八百三十六小餘七九四九五四五即兩弧相減所餘二十一度之正弦也如甲乙丙丁九十度之一象限其乙甲弧四十五度乙己為四十五度之正弦己戊為四十五度之餘弦於乙甲弧四十五度加丙乙弧二十四度得丙甲弧六十九度又於乙甲弧四十五度減乙子弧二十四度餘子甲弧二十一度試自丙至子作丙子線則丙乙弧乙子弧皆為二十四度丙庚與庚子皆為二十四度之正弦庚戊則為二十四度之餘弦今以乙戊半徑為一率乙己四十五度之正弦為二率庚戊二十四度之餘弦為三率求得四率庚辛與壬癸等又以乙戊半徑為一率己戊四十五度之餘弦為二率丙庚二十四度之正弦為三率求得四率丙壬故以丙壬加於庚辛庚辛原與壬癸等共得丙癸即丙甲弧六十九度之正弦如於庚辛內減與丙壬相等之庚卯餘卯辛與子丑等即子甲弧二十一度之正弦也蓋乙己戊與庚辛戊為同式勾股形故乙戊與乙己之比同於庚戊與庚辛之比為相當比例四率又寅癸戊與乙己戊亦為同式勾股形而寅癸戊勾股形之寅角與丙庚寅勾股形之寅角為兩尖相對角其度等癸角與庚角俱為直角其度又等則戊角必與丙角等如作庚壬線成丙壬庚勾股形則此形之丙角既與乙己戊勾股形之戊角等而壬角又為直角與乙己戊勾股形之己角等故亦為同式勾股形而乙戊與己戊之比同於丙庚與丙壬之比為相當比例四率也設如八十四度之弧距六十度二十四度其正弦九萬九千四百五十二小餘一八九五三六八又有三十六度之弧距六十度亦二十四度其正弦五萬八千七百七十八小餘五二五二二九二求距弧二十四度之正弦幾何法以八十四度之正弦九萬九千四百五十二小餘一八九五三六八內減三十六度之正弦五萬八千七百七十八小餘五二五二二九二餘四萬零六百七十三小餘六六四三七六即距弧二十四度之正弦也如有距六十度前二十四度為三十六度其正弦五萬八千七百七十八小餘五二五二二九二距弧二十四度之正弦四萬零六百七十三小餘六六四三七六求距六十度後二十四度為八十四度之正弦則以三十六度之正弦五萬八千七百七十八小餘五二五二二九二與距弧二十四度之正弦四萬零六百七十三小餘六六四三七六相加得九萬九千四百五十二小餘一八九五三六八即八十四度之正弦也又如有距六十度後二十四度為八十四度其正弦九萬九千四百五十二小餘一八九五三六八距弧二十四度之正弦四萬零六百七十三小餘六六四三七六求距六十度前二十四度為三十六度之正弦則以八十四度之正弦九萬九千四百五十二小餘一八九五三六八與距弧二十四度之正弦四萬零六百七十三小餘六六四三七六相減餘五萬八千七百七十八小餘五二五二二九二即三十六度之正弦也如甲乙丙丁九十度之一象限其己甲弧六十度丙甲弧八十四度丙距己二十四度乙甲弧三十六度乙距己亦二十四度丙庚為八十四度之正弦乙辛為三十六度之正弦與壬庚等丙壬為兩正弦之較試自巳至象限中心戊作己戊線又自丙至乙作丙乙線則丙癸癸乙皆為距弧二十四度之正弦與丙壬兩正弦之較相等蓋己戊甲角六十度則己戊丁角為三十度丙庚與丁戊平行則丙子己角與丁戊己角為二平行線上所成之內外角必相等皆為三十度丙癸子角為直角則子丙癸角必為六十度矣又自乙至子作乙子線則乙癸子與丙癸子為同形勾股形癸乙子角亦必為六十度癸子乙角亦必為三十度兩勾股形合之共成一丙乙子三角形而丙子乙角亦必為六十度矣三角度既等則三邊必相等今丙壬為丙子之半丙癸為丙乙之半丙子既與丙乙等故丙壬亦必與丙癸等也有此法凡有六十度以前各弧之正弦則以各距弧之正弦與之相加可得六十度以後三十度各弧之正弦若有六十度以後各弧之正弦則以各距弧之正弦與之相減可得六十度以前三十度各弧之正弦六十度前後三十度之正弦用加減而即得較之勾股比例諸法甚為簡便也八線相求設如四十八度之正弦七萬四千三百一十四小餘四八二五四七七餘弦六萬六千九百一十三小餘六六三五八求正矢正切正割各幾何法以半徑十萬內減四十八度之餘弦六萬六千九百一十三小餘六六三五八餘三萬三千零八十六小餘九三九三六四二為正矢以餘弦六萬六千九百一十三小餘六六三五八為一率正弦七萬四千三百一十四小餘四八二五四七七為二率半徑十萬為三率求得四率一十一萬一千零六十一小餘二五一四八三為正切以餘弦六萬六千九百一十三小餘六六三五八為一率半徑十萬為二率仍以半徑十萬為三率求得四率一十四萬九千四百四十七小餘六五四九八六六為正割也如圖甲乙弧四十八度甲丙為正弦甲丁為餘弦與丙戊等乙丙為正矢故乙戊半徑內減與甲丁餘弦相等之丙戊餘乙丙即為正矢己乙為正切巳戊為正割甲丙戊己乙戊兩勾股形為同式形故丙戊餘弦與甲丙正弦之比同於乙戊半徑與己乙正切之比為相當比例四率又丙戊餘弦與甲戊半徑之比同於乙戊半徑與己戊正割之比亦為相當比例四率也又正切求正割捷法以餘弧折半得二十一度乃以二十一度之正切三萬八千三百八十六小餘四三三五三六與本弧之正切一十一萬一千零六十一小餘二五一四八三相加得一十四萬九千四百四十七小餘六五四八三三三即為本弧之正割也如圖甲乙弧四十八度己乙為正切己戊為正割試將甲庚餘弧四十二度折半得庚辛二十一度移於乙壬又作乙癸為乙壬弧二十一度之正切與己乙相加得己癸與己戊正割相等蓋甲戊乙角四十八度己乙戊角為直角九十度二角併之為一百三十八度於一百八十度內減之餘四十二度為戊己乙角今於甲戊乙角四十八度加乙戊壬角二十一度遂成己戊癸角為六十九度仍與戊己乙角四十二度相加於一百八十度內減之所餘亦六十九度即為戊癸己角戊癸己角既與己戊癸角相等則己戊與己癸邊亦必相等也有此法則凡有逐度逐分之切線求割線可止用加法不用四率矣又凡有本弧之正切正割相減即得半餘弧之正切若有本弧之正割及半餘弧之正切相減即得本弧之正切也設如四十八度之正弧七萬四千三百一十四小餘四八二五四七七餘弦六萬六千九百一十三小餘六六三五八求餘矢餘切餘割各幾何法以半徑十萬內減四十八度之正弦七萬四千三百一十四小餘四八二五四七七餘二萬五千六百八十五小餘五一七四五二三為餘矢以正弦七萬四千三百一十四小餘四八二五四七七為一率餘弦六萬六千九百一十三小餘六六三五八為二率半徑十萬為三率求得四率九萬零四十小餘四四四二九七為餘切以正弦七萬四千三百一十四小餘四八二五四七七為一率半徑十萬為二率仍以半徑十萬為三率求得四率一十三萬四千五百六十三小餘二七二九六七為餘割也如圖甲乙弧四十八度甲丙為正弦與丁戊等甲丁為餘弦巳丁為餘矢故已戊半徑內減與甲丙正弦相等之丁戊餘己丁即為餘矢庚己為餘切庚戊為餘割甲丁戊庚己戊兩勾股形為同式形故丁戊正弦與甲丁餘弦之比同於己戊半徑與庚己餘切之比為相當比例四率又丁戊正弦與甲戊半徑之比同於己戊半徑與庚戊餘割之比亦為相當比例四率也又餘切求餘割捷法以本弧折半得二十四度乃以二十四度之正切四萬四千五百二十二小餘六八六五三一與本弧之餘切九萬零四十小餘四四四二九七相加得一十三萬四千五百六十三小餘二七二九六七即為本弧之餘割也如圖甲乙弧四十八度庚己為其餘切庚戊為其餘割試將甲乙正弧四十八度折半得辛乙二十四度移於壬己又作癸己為壬己弧二十四度之正切與庚己相加得庚癸與庚戊餘割相等蓋甲戊己角四十二度庚己戊角為直角九十度二角相併為一百三十二度於一百八十度內減之餘四十八度為戊庚己角今於甲戊己角四十二度加己戊壬角二十四度遂成庚戊癸角為六十六度仍與戊庚己角四十八度相加於一百八十度內減之所餘亦為六十六度即為戊癸庚角戊癸庚角既與庚戊癸角相等則庚戊與庚癸邊亦必相等也有此法則凡有逐度逐分之切線求餘割亦可止用加法不用四率矣又凡有本弧之餘切餘割相減即得半本弧之正切若有本弧之餘割及半本弧之正切相減即得本弧之餘切矣求象限內各線總法六宗並新增十八邊形及九邊形之每邊各半之得八弧之正弦用要法之一各求其餘弦次取十二度十五邊之半用要法之三折半四次得六度三度一度三十分及四十五分之正弦復用新增法求其三分之一得十五分之正弦復求其三分之一即得五分之正弦既得五分之正弦乃用簡法之一求六十度以內之正弦每越五分而得一弦可得七百二十又用簡法之二求六十度以外之正弦亦越五分而得一弦又得三百六十如以一度之弦與五十九度之弦相加即六十一度之弦以二度之弦與五十八度之弦相加即六十二度之弦以至二十九度之弦與三十一度之弦相加即得八十九度之弦也總而計之一象限中共得正弦一千零八十己居全表五分之一象限中逐分計之共正弦五千四百故一千零八十為五分之一也再以五分之弦用要法之三得二分三十秒之弦復用新增法求其三分之一得五十秒之弦乃以五十秒之弧為一率五十秒之弦為二率一分之弧化六十秒為三率得四率為一分之弦既得一分之弦即用簡法之一簡法之二錯綜加減之則一象限中每度每分之正弦悉得矣既得每度每分之正弦則用前八線相求之法即得每度每分之切割諸線矣如於一分之中欲析為六十秒則以比例四率求之即得每秒之八線也御製數理精蘊下編卷十六
