body:
  text: 欽定四庫全書御製數理精藴下編卷十七面部三角形邊線角度相求三角形邊線角度相求三角形有直角者為勾股無直角者作中垂線分為兩直角形則亦成兩勾股是皆有其二而得其一或有其三而分為二概以邊線相求者也至於割圜之法則凡三角形有一角即有八線皆成勾股而可比例以相求故三角形不論角之直與鋭鈍要以角度為凖而三角之度必與兩直角之度等角之大者所對之邊亦大角之小者所對之邊亦小凡三角三邊但知其三而其餘者悉可得若直角則惟知其二而其餘者亦可得此三角之法所由立而測量之用所由廣也如知兩角一邊求又一邊者以對所知之角與對所求之角為比即如所知之邊與所求之邊為比也知兩邊一角求又一角者以對所知之邊與對所求之邊為比即如所知之角與所求之角為比也或所知之一角在所知兩邊之間而求又一角者則角無所對之邊而邊亦無所對之角必用兩邊之和較與所知角之外角半弧之切線為比而得所求兩角與所知角之外角半弧之較既得較而角度亦得矣又如知三邊而求三角者則以三角形求中垂線法分為兩直角形而三角自隨之而得或用三邊之方面按法比例而得兩直角形之各一角既得一角而三角亦可得矣若止有三角則三邊無所約束故不成法蓋角度為虛率而邊線為實數無實數而虛率可馭總以比例四率展轉用之惟在分合有法相度得宜耳設如甲乙丙直角三角形乙角為直角九十度知丙角五十七度丙乙邊五丈求甲乙邊幾何法以丙角五十七度與象限九十度相減餘三十三度為甲角乃以甲角為對所知之角其正弦五萬四千四百六十四為一率丙角為對所求之角其正弦八萬三千八百六十七為二率丙乙邊為所知之邊其數五丈為三率求得四率七丈六尺九寸九分三釐有餘即甲乙為所求之邊也如丙丁戊一象限己戊弧為丙角之正弧己庚線為丙角之正弦丁己弧為丙角之餘弧即甲角之正弧辛己線為丙角之餘弦即甲角之正弦是故丙角五十七度之餘弧為三十三度丙角五十七度之餘弦為三十三度之正弦己庚丙與甲乙丙兩勾股形為同式形故甲角正弦丙庚即辛己與丙角正弦己庚之比同於丙乙邊與甲乙邊之比為相當比例四率也又法以半徑十萬為一率丙角五十七度之正切一十五萬三千九百八十六為二率丙乙邊五丈為三率求得四率七丈六尺九寸九分三釐即甲乙邊也如丙丁戊一象限切己戊弧作庚戊線為丙角之正切則丙戊為半徑庚戊丙與甲乙丙兩勾股形為同式形故丙戊半徑與庚戊正切之比同於丙乙邊與甲乙邊之比為相當比例四率也設如甲乙丙直角三角形乙角為直角九十度知丙角二十三度三十五分甲乙邊三十二丈求丙乙邊幾何法以丙角二十三度三十五分與九十度相減餘六十六度二十五分為甲角乃以丙角為對所知之角其正弦四萬零八為一率以甲角為對所求之角其正弦九萬一千六百四十八為二率甲乙邊為所知之邊其數三十二丈為三率求得四率七十三丈三尺零三分有餘即丙乙為所求之邊也如丙丁戊一象限己戊弧為丙角之正弧己庚線為丙角之正弦丁己弧為丙角之餘弧即甲角之正弧辛己線為丙角之餘弦即甲角之正弦故丙角二十三度三十五分之餘弧為六十六度二十五分丙角二十三度三十五分之餘弦為六十六度二十五分之正弦己庚丙與甲乙丙兩勾股形為同式形故丙角正弦己庚與甲角正弦丙庚之比同於甲乙邊與丙乙邊之比為相當比例四率也又法以半徑十萬為一率丙角二十三度三十五分之餘切線二十二萬九千零七十三為二率甲乙邊三十二丈為三率求得四率七十三丈三尺零三分有餘即丙乙邊也如丙丁戊一象限切丁己弧作丁庚線為丙角之餘切即甲角之正切則丁丙為半徑丙丁庚與甲乙丙兩勾股形為同式形故丁丙半徑與丁庚餘切之比同於甲乙邊與丙乙邊之比為相當比例四率也設如甲乙丙直角三角形乙角為直角九十度知丙角四十三度三十七分丙乙邊二十一尺求甲丙邊幾何法以丙角四十三度三十七分與九十度相減餘四十六度二十三分為甲角乃以甲角為對所知之角其正弦七萬二千三百九十七為一率甲角正弦即丙角餘弦或直用丙角餘弦亦可以乙角為對所求之角其正弦即半徑十萬為二率丙乙邊為所知之邊其數二十一尺為三率求得四率二十九尺零六釐有餘即甲丙為所求之邊也如丙丁戊一象限己戊弧為丙角之正弧丁己弧為丙角之餘弧即甲角之正弧辛己線為丙角之餘弦即甲角之正弦與丙庚等己丙線為半徑即九十度之正弦己庚丙與甲乙丙兩勾股形為同式形故甲角正弦丙庚與半徑己丙之比同於丙乙邊與甲丙邊之比為相當比例四率也又法以半徑十萬為一率丙角四十三度三十七分之正割一十三萬八千一百二十七為二率丙乙邊二十一尺為三率求得四率二十九尺零六釐有餘即甲丙邊也如丙丁戊一象限切己戊弧作庚戊線為丙角之正切則丙戊為半徑庚丙為正割庚戊丙與甲乙丙兩勾股形為同式形故丙戊半徑與庚丙正割之比同於丙乙邊與甲丙邊之比為相當比例四率也設如甲乙丙直角三角形乙角為直角九十度知丙角五十一度五十一分甲丙邊八十九丈零二寸二分求甲乙邊丙乙邊各幾何法以丙角五十一度五十一分與九十度相減餘三十八度零九分為甲角求甲乙邊則以乙角為對所知之角其正弦即半徑十萬為一率以丙角為對所求之角其正弦七萬八千六百四十為二率甲丙邊為所知之邊其數八十九丈零二寸二分為三率求得四率七十丈零六分有餘即甲乙為所求之邊也求丙乙邊亦以乙角為對所知之角其正弦即半徑十萬為一率而以甲角為對所求之角其正弦六萬一千七百七十二為二率甲丙邊為所知之邊其數八十九丈零二寸二分為三率求得四率五十四丈九尺九寸有餘即丙乙為所求之邊也如丙丁戊一象限己戊弧為丙角之正弧己庚線為丙角之正弦丁己弧為丙角之餘弧即甲角之正弧辛己線為丙角之餘弦即甲角之正弦己庚丙與甲乙丙兩勾股形為同式形故半徑己丙與丙角正弦己庚之比同於甲丙邊與甲乙邊之比為相當比例四率又半徑巳丙與甲角正弦丙庚之比同於甲丙邊與丙乙邊之比為相當比例四率也又法求甲乙邊以丙角五十一度五十一分之正割一十六萬一千八百八十五為一率其正切一十二萬七千三百零六為二率甲丙邊八十九丈零二寸二分為三率求得四率七十丈零六分有餘即甲乙邊也求丙乙邊則仍以丙角正割一十六萬一千八百八十五為一率而以半徑十萬為二率仍以甲丙邊八十九丈零二寸二分為三率求得四率五十四丈九尺九寸有餘即丙乙邊也如丙丁戊一象限己戊弧為丙角之正弧庚戊線為丙角之正切庚丙線為丙角之正割庚戊丙與甲乙丙兩勾股形為同式形故丙角正割庚丙與正切庚戊之比同於甲丙邊與甲乙邊之比又丙角正割庚丙與半徑丙戊之比同於甲丙邊與丙乙邊之比皆為相當比例四率也設如甲乙丙直角三角形乙角為直角九十度知甲乙邊二十丈丙乙邊三十四丈六尺四寸一分求甲角丙角各幾何法以甲乙邊二十丈為一率丙乙邊三十四丈六尺四寸一分為二率半徑十萬為三率求得四率一十七萬三千二百零五為甲角之正切撿八線表得六十度即甲角之度與九十度相減餘三十度即丙角之度也如先求丙角則以丙乙邊三十四丈六尺四寸一分為一率甲乙邊二十丈為二率半徑十萬為三率求得四率五萬七千七百三十五為丙角之正切撿八線表得三十度即丙角之度與九十度相減餘六十度即甲角之度也如圖先求甲角則如甲丁戊一象限己戊弧為甲角六十度之弧庚戊為甲角之正切甲戊為半徑甲戊庚與甲乙丙兩勾股形為同式形故甲乙邊與丙乙邊之比同於甲戊半徑與庚戊正切之比為相當比例四率先求丙角則如丙丁戊一象限己丁弧為丙角三十度之弧辛丁為丙角之正切丙丁為半徑丙丁辛與丙乙甲兩勾股形為同式形故丙乙邊與甲乙邊之比同於丙丁半徑與辛丁正切之比為相當比例四率也又法以甲乙邊二十丈與丙乙邊三十四丈六尺四寸一分相加得五十四丈六尺四寸一分為兩邊之和為一率又以甲乙邊二十丈與丙乙邊三十四丈六尺四寸一分相減餘一十四丈六尺四寸一分為兩邊之較為二率以乙角之外角九十度折半得四十五度為半外角其正切十萬為三率四十五度之正切與半徑十萬等求得四率二十六萬七千九百四十八為半較角之正切撿八線表得十五度為半較角與半外角四十五度相減餘三十度即丙角之度如以半較角十五度與半外角四十五度相加得六十度即甲角之度也如圖甲乙丙直角三角形以乙直角為心甲乙小邊為半徑作一甲戊丁圜截丙乙大邊於戊將丙乙引長至圜界丁則丁乙戊乙俱為半徑與甲乙等自丁至丙即兩邊之和自戊至丙即兩邊之較甲乙丁角即乙角之外角試自甲至戊作一甲戊線則成甲乙戊直角三角形其乙甲戊與乙戊甲二角相併與甲乙丁外角度等今折半用其正切即如用甲戊乙角之正切又心角與邊角度等其切線亦等故自甲至丁作一丁甲線即甲戊丁角之正切又戊甲丙角即甲角大於甲戊乙角之較又即丙角小於甲戊乙角之較故於圜界戊至甲丙邊己作己戊線與甲丁線平行即戊甲己角之正切且丙丁甲三角形與丙戊己三角形為同式形故兩邊之和丙丁與甲戊丁半外角切線甲丁之比即同於兩邊之較丙戊與半較角切線己戊之比為相當比例四率也設如甲乙丙直角三角形乙角為直角九十度知甲乙邊六十尺丙乙邊三十二尺求甲丙邊幾何法以甲乙邊六十尺為一率丙乙邊三十二尺為二率半徑十萬為三率求得四率五萬三千三百三十三為甲角之正切撿八線表得二十八度零四分即甲角之度如用丙乙邊作一率甲乙邊作二率即先得丙角度乃以甲角為對所知之角其正弦四萬七千零五十為一率乙角為對所求之角其正弦即半徑十萬為二率丙乙邊為所知之邊其數三十二尺為三率求得四率六十八尺零一分二釐有餘即甲丙為所求之邊也又既得甲角之後用割線法則以半徑為一率甲角之正割為二率甲乙邊為三率求得四率即甲丙為所求之邊也或得丙角則用丙角之正割為二率丙乙邊為三率亦得甲丙邊若得丙角仍用甲乙邊為三率則用丙角餘割即甲角之正割為二率而亦得甲丙邊也又法用勾股求弦以甲乙為股丙乙為勾求得弦即甲丙邊也法已載於勾股集中設如甲乙丙直角三角形乙角為直角九十度知甲丙邊一百零二丈二尺丙乙邊四十八丈求甲角丙角各幾何法以甲丙邊為對所知之邊其數一百零二丈二尺為一率丙乙邊為對所求之邊其數四十八丈為二率乙角為所知之角其正弦即半徑十萬為三率求得四率四萬六千九百六十六為甲角之正弦撿八線表得二十八度零一分即甲角之度也甲角之餘弦即丙角之正弦如撿八線表餘弦數得六十一度五十九分即丙角之度也如甲丁戊一象限己庚為甲角正弦辛己與甲庚等為甲角之餘弦即丙角之正弦甲庚己與甲乙丙兩勾股形為同式形故甲丙邊與丙乙邊之比同於甲己半徑與己庚正弦之比為相當比例四率也又法以丙乙邊四十八丈為一率甲丙邊一百零二丈二尺為二率半徑十萬為三率求得四率二十一萬二千九百一十六為丙角之正割撿八線表得六十一度五十九分即丙角之度也其丙角之餘割即甲角之正割如撿餘割數得二十八度零一分即甲角之度也如丙丁戊一象限丙戊為半徑己戊為丙角之正切己丙為丙角之正割甲乙丙與己戊丙兩勾股形為同式形故丙乙邊與甲丙邊之比同與丙戊半徑與己丙正割之比為相當比例四率也設如甲乙丙鋭角三角形知乙丙邊三十二丈乙角六十度丙角四十六度求甲乙邊甲丙邊各幾何法以乙角六十度與丙角四十六度相加得一百零六度與半圜一百八十度相減餘七十四度為甲角求甲丙邊則以甲角為對所知之角其正弦九萬六千一百二十六為一率以乙角為對所求之角其正弦八萬六千六百零三為二率乙丙邊為所知之邊其數三十二丈為三率求得四率二十八丈八尺二寸九分有餘即甲丙為所求之一邊也求甲乙邊則仍以甲角為對所知之角其正弦九萬六千一百二十六為一率而以丙角為對所求之角其正弦七萬一千九百三十四為二率仍以乙丙邊為所知之邊其數三十二丈為三率求得四率二十三丈九尺四寸六分有餘即甲乙為所求之又一邊也如圖甲乙丙三角形作含三角形之圜則每界角各對一弧試自圜心丁作三角形各邊之垂線即將每角所對之弧平分一半各成兩心角其每一心角與相當各界角之度等見幾何原本四卷第十三節是以乙角所對甲丙弧原係一百二十度今為丁庚癸垂線所平分各為六十度一為甲丁癸一為癸丁丙皆與乙角原度等丙角所對甲乙弧原係九十二度今為丁戊辛垂線所平分各為四十六度一為甲丁辛一為辛丁乙皆與丙角原度等甲角所對乙丙弧原係一百四十八度今為丁己壬垂線所平分各為七十四度一為乙丁壬一為壬丁丙皆與甲角原度等乙己為乙丁壬角之正弦己丙為壬丁丙角之正弦亦即甲角之正弦甲庚為甲丁癸角之正弦庚丙為癸丁丙角之正弦亦即乙角之正弦甲戊為甲丁辛角之正弦戊乙為辛丁乙角之正弦亦即丙角之正弦故求甲丙邊者以乙己與甲庚之比或己丙與庚丙之比皆同於乙丙與甲丙之比又如求甲乙邊者以己丙與甲戊之比或乙己與戊乙之比皆同於乙丙與甲乙之比俱是半與半全與全之比例而各為相當比例四率也又圖求甲丙邊者則用甲丙為半徑自丙角至甲乙界作丙丁垂線為甲角正弦又依甲丙度截丙乙於戊使戊乙與甲丙等凡用正弦比例因在圜內皆同半徑今使戊乙與甲丙相同而後正弦之大小乃見乃自戊至甲乙界又作戊己垂線為乙角正弦觀戊己小於丙丁則知甲丙同戊乙亦小於乙丙故甲角正弦丙丁與乙角正弦戊己之比同於乙丙邊與甲丙邊之比為相當比例四率也又如求甲乙邊者則用甲乙為半徑自乙角至甲丙界作乙丁垂線為甲角正弦又依甲乙度截乙丙於戊使戊丙與甲乙等乃自戊至甲丙界又作戊己垂線為丙角正弦觀戊己小於乙丁則知甲乙同戊丙亦小於乙丙故甲角正弦乙丁與丙角正弦戊己之比同於乙丙邊與甲乙邊之比為相當比例四率也又法求甲乙邊以乙角六十度之餘切五萬七千七百三十五與丙角四十六度之餘切九萬六千五百六十九相加得一十五萬四千三百零四為一率乙角之餘割一十一萬五千四百七十為二率乙丙邊三十二丈為三率求得四率二十三丈九尺四寸六分有餘即甲乙邊求甲丙邊則仍以兩角餘切相加之一十五萬四千三百零四為一率而以丙角餘割一十三萬九千零一十六為二率仍以乙丙邊三十二丈為三率求得四率二十八丈八尺二寸九分有餘即甲丙邊也此法蓋以甲乙丙一鋭角三角形分為甲丁乙甲丁丙兩直角三角形即如乙角六十度與象限九十度相減餘三十度為甲丁乙三角形之甲角又丙角四十六度與象限九十度相減餘四十四度為甲丁丙三角形之甲角乙角之餘切戊己即甲丁乙三角形之甲角之正切如壬癸乙角之餘割己乙即甲丁乙三角形之甲角之正割如甲壬而丙角之餘切庚辛即甲丁丙三角形之甲角之正切如癸子丙角之餘割庚丙即甲丁丙三角形之甲角之正割如甲子若乙角丙角兩餘切相加即兩甲角正切相加之和如壬子甲癸壬與甲丁乙兩三角形為同式形甲癸子與甲丁丙兩三角形為同式形故甲壬子與甲乙丙兩三角形亦為同式形是故求甲乙邊者以壬子與甲壬之比同於乙丙與甲乙之比求甲丙邊者以壬子與甲子之比同於乙丙與甲丙之比皆為相當比例四率也設如甲乙丙鋭角三角形知甲角五十度乙角七十度乙丙邊九丈七尺八寸求丙角甲乙邊甲丙邊各幾何法以甲角五十度與乙角七十度相加得一百二十度與半圜一百八十度相減餘六十度為丙角求甲乙邊則以甲角為對所知之角其正弦七萬六千六百零四為一率以丙角為對所求之角其正弦八萬六千六百零三為二率乙丙邊為所知之邊其數九丈七尺八寸為三率求得四率一十一丈零五寸六分有餘即甲乙為所求之一邊也求甲丙邊則仍以甲角為對所知之角其正弦七萬六千六百零四為一率而以乙角為對所求之角其正弦九萬三千九百六十九為二率仍以乙丙邊為所知之邊其數九丈七尺八寸為三率求得四率一十一丈九尺九寸六分有餘即甲丙為所求之又一邊也此法所知之角與邊雖與前法少異然總是有兩角一邊得其所餘一角則仍與前法同矣設如甲乙丙鈍角三角形知乙角二十四度丙角三十六度三十分乙丙邊七十九丈零一寸求甲乙邊甲丙邊各幾何法以乙角二十四度與丙角三十六度三十分相加得六十度三十分與半圜一百八十度相減餘一百一十九度三十分為甲鈍角求甲乙邊則以甲鈍角為對所知之角夫甲角既為鈍角過九十度乃用其外角將甲角一百一十九度三十分與半圜一百八十度相減餘六十度三十分為甲角之外角其正弦八萬七千零三十六為一率凡鈍角之外角其正弦即鈍角之正弦解見割圜集內丙角為對所求之角其正弦五萬九千四百八十二為二率乙丙邊為所知之邊其數七十九丈零一寸為三率求得四率五十三丈九尺九寸七分即甲乙為所求之一邊也如求甲丙邊則仍以甲角為對所知之角用其外角正弦八萬七千零三十六為一率而以乙角為對所求之角其正弦四萬零六百七十四為二率仍以乙丙邊七十九丈零一寸為三率求得四率三十六丈九尺二寸三分有餘如既得甲乙邊而以丙角為對所知之角其正弦為一率甲乙邊為所知之邊其數為三率所得亦同即甲丙為所求之又一邊也此法亦有兩角一邊但甲為鈍角故用外角正弦求法略異試以求甲乙邊言之則甲乙邊為半徑於甲角之外作乙丁垂線則成乙甲丁之外角其乙丁垂線即乙甲丁外角之正弦又按甲乙邊度截乙丙邊於戊使戊丙與甲乙半徑等作戊己垂線即丙角之正弦夫戊己丙與乙丁丙兩勾股形為同式形故乙甲丁外角之正弦乙丁與丙角之正弦戊己之比即同於乙丙邊與等甲乙邊之戊丙之比為相當比例四率也其求甲丙邊用外角正弦其理亦同又法求甲乙邊以乙角二十四度之餘切二十二萬四千六百零四與丙角三十六度三十分之餘切一十三萬五千一百四十二相加得三十五萬九千七百四十六為一率乙角之餘割二十四萬五千八百五十九為二率乙丙邊七十九丈零一寸為三率求得四率五十三丈九尺九寸七分有餘即甲乙邊求甲丙邊則仍以兩角餘切相加之三十五萬九千七百四十六為一率而以丙角之餘割一十六萬八千一百一十七為二率乙丙邊七十九丈零一寸為三率求得四率三十六丈九尺二寸三分有餘即甲丙邊也此法蓋以甲乙丙一鈍角三角形分為甲丁乙甲丁丙兩直角三角形其乙角之餘切戊己即甲丁乙三角形之甲角之正切如壬癸乙角之餘割己乙即甲丁乙三角形之甲角之正割如甲壬而丙角之餘切庚辛即甲丁丙三角形之甲角之正切如癸子丙角之餘割庚丙即甲丁丙三角形之甲角之正割如甲子乙角丙角兩餘切相加之數即兩甲角正切相加之和如壬子甲癸壬與甲丁乙兩三角形為同式形甲癸子與甲丁丙兩三角形為同式形故甲壬子與甲乙丙兩三角形亦為同式形是以求甲乙邊者以壬子與甲壬之比同於乙丙與甲乙之比求甲丙邊者以壬子與甲子之比同於乙丙與甲丙之比皆為相當比例四率也設如甲乙丙鈍角三角形知乙角三十三度三十八分四十秒丙外角五十五度五十三分乙丙邊一十六丈求甲角甲乙邊甲丙邊各幾何法以乙角三十三度三十八分四十秒與丙外角五十五度五十三分相減餘二十二度一十四分二十秒即甲角取甲角當以丙外角與半圜一百八十度相減餘為丙鈍角仍以丙鈍角與乙角相加又與半圜一百八十度相減餘為甲角今止以丙外角內減乙角即得甲角者蓋因丙外角與乙甲二內角相並之度等又三角形三角相並共為一百八十度與半圜等今於半圜內減去丙鈍角所餘為丙外角而一百八十度內減丙鈍角則餘乙甲二角共度是甲乙二角共度與丙外角之度等故於丙外角內減去乙角即甲角也求甲乙邊則以甲角為對所知之角其正弦三萬七千八百四十七為一率以丙外角為對所求之角其正弦八萬二千七百九十為二率乙丙邊為所知之邊其數一十六丈為三率求得四率三十五丈即甲乙為所求之一邊求甲丙邊則仍以甲角為對所知之角其正弦三萬七千八百四十七為一率而以乙角為對所求之角其正弦五萬五千四百零四為二率仍以乙丙邊為所知之邊其數一十六丈為三率求得四率二十三丈四尺二寸二分有餘如既得甲乙邊而以丙外角為對所知之角其正弦為一率甲乙邊為所知之邊其數為三率所得亦同即甲丙為所求之又一邊也此法亦有兩角一邊與前法同但先有外角少異耳又法求甲乙邊以乙角三十三度三十八分四十秒之餘切一十五萬零二百五十九與丙外角五十五度五十三分之餘切六萬七千七百四十八相減餘八萬二千五百一十一為一率乙角之餘割一十八萬零四百九十三為二率乙丙邊一十六丈為三率求得四率三十五丈即甲乙邊求甲丙邊則仍以兩角餘切相減之八萬二千五百一十一為一率而以丙外角之餘割一十二萬零七百八十八為二率仍以乙丙邊一十六丈為三率求得四率二十三丈四尺二寸二分有餘即甲丙邊也此法蓋以乙丙邊引長自甲角作甲丁垂線遂成甲丁乙甲丁丙兩直角三角形甲丁丙三角形之丙角即甲乙丙三角形之丙角之外角其餘切戊己即甲丁丙三角形之甲角之正切如壬癸丙外角之餘割己丙即甲丁丙三角形之甲角之正割如甲壬甲乙丙三角形之乙角之餘切庚辛即甲丁乙三角形之甲角之正切如子癸甲乙丙三角形之乙角之餘割辛乙即甲丁乙三角形之甲角之正割如甲子甲丁丙三角形之丙角餘切與甲丁乙三角形之乙角餘切相減之數即兩甲角之正切相減之較如子壬甲癸壬三角形與甲丁丙三角形為同式形甲癸子三角形與甲丁乙三角形為同式形故甲子壬三角形與甲乙丙三角形亦為同式形是以子壬與甲子之比同於乙丙與甲乙之比又子壬與甲壬之比同於乙丙與甲丙之比皆為相當比例四率也設如甲乙丙鋭角三角形知甲角六十度甲乙邊四十丈甲丙邊二十六丈一尺零八分求乙角丙角及乙丙邊各幾何法以甲乙邊四十丈與甲丙邊二十六丈一尺零八分相加得六十六丈一尺零八分為兩邊之和為一率又以甲乙邊四十丈與甲丙邊二十六丈一尺零八分相減餘一十三丈八尺九寸二分為兩邊之較為二率以甲角六十度與半圜一百八十度相減餘一百二十度為外角折半得六十度為半外角其正切一十七萬三千二百零五為三率求得四率三萬六千三百九十七為半較角之正切撿八線表得二十度為半較角與半外角六十度相減餘四十度即乙角之度如以半較角二十度與半外角六十度相加得八十度即丙角之度也既得乙丙兩角即以丙角為對所知之角其正弦九萬八千四百八十一為一率以甲角為對所求之角其正弦八萬六千六百零三為二率甲乙邊為所知之邊其數四十丈為三率求得四率三十五丈一尺七寸五分有餘即乙丙為所求之邊也如圖甲乙丙鋭角三角形以甲角為心甲丙小邊為半徑作一丙丁戊圜截甲乙大邊於戊將甲乙引長至圜界丁則甲丁甲戊俱為半徑與甲丙等自丁至乙即兩邊之和自戊至乙即兩邊之較丁甲丙角即甲角之外角試自丙至戊作一丙戊線則成甲丙戊三角形其甲丙戊與甲戊丙二角併之與丁甲丙外角度等今折半用其正切即如用丁戊丙角之正切又心角與邊角度等其切線亦等故自丙至丁作一丙丁線即丁戊丙角之正切又戊丙乙角即丙角大於甲戊丙角之較亦即乙角小於甲戊丙角之較故自圜界戊至乙丙邊己作己戊線與丙丁平行即戊丙己角之正切且乙丁丙三角形與乙戊己三角形為同式形故兩邊之和丁乙與丁戊丙半外角切線丁丙之比即同於兩邊之較戊乙與半較角切線戊己之比為相當比例四率也又法自丙角作丙丁垂線分為丙丁甲丙丁乙兩直角形算之先用丙丁甲直角形求丙丁垂線及甲丁分邊以丁角為對所知之角其正弦即半徑十萬為一率以甲角為對所求之角其正弦八萬六千六百零三為二率甲丙邊為所知之邊其數二十六丈一尺零八分為三率求得四率二十二丈六尺一寸有餘為丙丁垂線又以丁角為對所知之角其正弦即半徑十萬為一率以甲角六十度與九十度相減餘三十度即甲丙丁角即丙之分角為對所求之角其正弦五萬為二率直用甲角餘弦亦可甲丙邊為所知之邊其數二十六丈一尺零八分為三率求得四率十三丈零五寸四分為甲丁分邊既得甲丁分邊乃與甲乙邊四十丈相減餘二十六丈九尺四寸六分為丁乙分邊於是用丙丁乙直角形求乙角及乙丙邊以丁乙二十六丈九尺四寸六分為一率丙丁二十二丈六尺一寸有餘為二率半徑十萬為三率求得四率八萬三千九百零八為乙角正切撿八線表得四十度為乙角以乙角四十度與甲角六十度相加得一百度與一百八十度相減餘八十度為丙角既得乙丙兩角則用兩角一邊求又一邊之法算之即得乙丙邊矣或先求乙丙邊則以丁乙二十六丈九尺四寸六分為勾丙丁二十二丈六尺一寸為股求得弦三十五丈一尺七寸五分有餘即乙丙邊也又法先求甲丁分邊比例而得乙角以半徑十萬為一率即丁直角之正弦以甲角六十度之餘弦五萬為二率即丙分角之正弦以甲丙邊二十六丈一尺零八分為三率求得四率十三丈零五寸四分為甲丁分邊乃以甲丁分邊十三丈零五寸四分為一率以甲丁分邊與甲乙全邊四十丈相減餘二十六丈九尺四寸六分為丁乙分邊為二率甲角六十度之餘切五萬七千七百三十五為三率求得四率一十一萬九千一百七十六為乙角餘切撿表得四十度即乙角也如甲角之戊庚一象限其庚己為甲角之餘切而庚己甲與甲丁丙為同式形又如乙角之辛癸一象限其壬癸為乙角之餘切而壬癸乙與乙丁丙為同式形故甲丁與丁乙之比同於庚己與壬癸之比也又法用甲角餘割餘切求乙角丙角以甲丙邊二十六丈一尺零八分為一率甲乙邊四十丈為二率甲角六十度餘割一十一萬五千四百七十為三率求得四率一十七萬六千九百一十一為甲角餘切與乙角餘切之共數即甲丙丁與乙丙丁兩分角之共切又將甲角六十度與象限九十度相減餘三十度即甲丙丁之分角撿其正切五萬七千七百三十五與兩分角之共切一十七萬六千九百一十一相減餘一十一萬九千一百七十六為丁丙乙分角之正切即乙角之餘切撿表得四十度即乙角之度也以乙角四十度與甲角六十度相加得一百度又與半圜一百八十度相減餘八十度即丙角之度也如甲乙丙鋭角三角形作丙丁垂線分為甲丁丙與乙丁丙兩直角形以丙角為心作一戊己庚半圜則丙丁垂線平分於己兩邊各成一象限試與甲乙邊平行作一辛壬線則辛己一段為甲丙丁分角之正切即甲角之餘切己壬一段為乙丙丁分角之正切又即乙角之餘切而辛丙為甲丙丁分角之正割亦即甲角之餘割辛壬丙與甲乙丙兩三角形為同式形故甲丙邊與甲乙邊之比即同於甲角餘割辛丙即甲丙丁分角之正割與甲丙丁乙丙丁兩分角之正切相合之辛壬之比為相當比例四率也既得辛壬兩分角之共切內減去甲丙丁分角三十度之正切辛己所餘己壬為乙丙丁分角之正切即為乙角之餘切撿表即得乙角也設如甲乙丙鈍角三角形知甲角一百一十九度三十四分甲乙邊五十四尺甲丙邊三十六尺九寸求乙角丙角及乙丙邊各幾何法以甲乙邊五十四尺與甲丙邊三十六尺九寸相加得九十尺九寸為兩邊之和為一率又以甲乙邊與甲丙邊相減餘一十七尺一寸為兩邊之較為二率以甲角一百一十九度三十四分與半圜一百八十度相減餘六十度二十六分為外角折半得三十度一十三分為半外角其正切五萬八千二百四十為三率求得四率一萬零九百五十六為半較角之正切撿八線表得六度一十五分為半較角與半外角三十度一十三分相減餘二十三度五十八分即乙角之度如以半較角六度一十五分與半外角三十度