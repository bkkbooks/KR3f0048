body:
  text: 欽定四庫全書御製數理精藴下編卷八線部六盈朒單法雙套盈朒盈有餘也朒不足也設有餘不足以求適中亦為因較而得正數之法此固比例法也但比例以實數求實數而盈朒則以虛數求實數然虛數皆與實數相較而生盈朒之差則虛數亦實數也比例以所有之三率求所餘之一率而盈朒則所有為兩數且兩數之中各藏一數其實亦三率也其間有一盈一朒者則以兩數相加為相較之率有兩盈或兩朒者則以兩數相減為相較之率有一盈一適足或一朒一適足者則無可加減而或盈或朒之數即其較也法不一致惟在相較以得其差理本一原惟在互比以得其實錯綜變幻其用不窮所謂以實御虛和較互見者庶幾盡於此矣一盈一朒設如有人分銀不知人數亦不知銀數只云每人七兩分之則餘四兩每人九兩分之則少十二兩問人數及銀數各若干法以七兩與九兩相減餘二兩為一率一人為二率盈四兩與朒十二兩相加共十六兩為三率推得四率八即為人數以八人與每人七兩相乘得五十六兩加盈四兩得六十兩即為銀數或以八人與每人九兩相乘得七十二兩減朒十二兩餘六十兩亦為銀數也此法蓋因前設分七兩後設分九兩是每一人多分二兩也然每人分七兩則總銀盈四兩每人分九兩則總銀朒十二兩是盈朒相差共十六兩矣夫一人多分二兩而總銀差十六兩則二兩為一人之所多而十六兩為八人之所多可知矣故二兩與一人之比同於十六兩與八人之比而為比例四率也既得人數以每人七兩計之則八人應得五十六兩因銀尚餘四兩故加四兩得六十兩為銀數也若以每人九兩計之則八人應得七十二兩因銀少十二兩故減十二兩餘六十兩為銀數也此先得人數之法也又先得銀數之法用互乘以齊其分以九兩乘盈四兩為加九倍得盈三十六兩以七兩乘朒十二兩為加七倍得朒八十四兩相加得一百二十兩為二率七倍與九倍相減餘二倍為一率一倍為三率推得四率六十兩即為銀數既得銀數則於六十兩內減盈四兩餘五十六兩以每人七兩除之得八為人數或於六十兩加朒十二兩共七十二兩以每人九兩除之亦得八為人數也此法以九兩互乘盈四兩者將盈四兩加九倍也盈四兩加九倍則為盈三十六兩既以盈數加九倍則總銀數與所分七兩亦皆當加九倍七兩加九倍則為六十三兩是則九倍之總銀每人六十三兩分之盈三十六兩也以七兩互乘朒十二兩者將朒十二兩加七倍也朒十二兩加七倍則為朒八十四兩既以朒數加七倍則總銀數與所分九兩亦皆當加七倍九兩加七倍則亦為六十三兩是則七倍之總銀每人六十三兩分之朒八十四兩也夫每人既皆分六十三兩則是所分之加倍共銀數亦必相同然九倍銀數則盈七倍銀數則朒因九倍比七倍多二倍是盈朒相加之一百二十兩即此二倍之銀數也知二倍為一百二十兩即知一倍之為幾何矣故以二為一率一百二十兩為二率一為三率推得四率六十兩為銀數也既得銀數則於六十兩內減盈四兩餘五十六兩即為分七兩者之共數而以七兩除之得八人或於六十兩加朒十二兩得七十二兩即為分九兩者之共數而以九兩除之亦得八人也此先得銀數之法也又法將盈四兩與朒十二兩相加得十六兩為一率七兩與九兩相減餘二兩為二率盈四兩為三率得四率五錢與所分七兩相加得七兩五錢為每人應得之數又以五錢除盈四兩得八為人數或仍以十六兩為一率二兩為二率以朒十二兩為三率得四率一兩五錢與所分九兩相減亦得七兩五錢為每人應得之數又以一兩五錢除朒十二兩亦得八為人數以八人與每人七兩五錢相乘得六十兩為銀數也此法蓋因九兩與七兩相較差二兩盈四兩與朒十二兩相併為十六兩是總銀盈朒共差十六兩由於每人之多二兩也今銀尚盈四兩則每人分七兩者其每一分應多五錢而為七兩五錢矣故十六兩與二兩之比同於四兩與五錢之比而為比例四率也且一人多五錢而共多四兩則其為八人可知矣故五錢與一人之比同於四兩與八人之比亦為比例四率也若以朒數論之則總銀共差十六兩者由於每人少二兩今銀朒十二兩則每人分九兩者其每一分應少一兩五錢而為七兩五錢矣且一人少一兩五錢而共少十二兩則其為八人又可知矣既得人數則以八人與每人七兩五錢相乘得六十兩而為總銀數也此先得每一人所得銀數之法也要之第一法先求人數第二法先求物價第三法先求適足之數立法雖各不同而各先得其一一得而無不得者實由於理之一貫者也設如衆人共出銀買物不知人數亦不知物價只云每人出銀四兩則不足四兩每人出銀六兩則多六兩問人數及物價各若干法以出四兩與出六兩相減餘二兩為一率一人為二率朒四兩與盈六兩相加共十兩為三率推得四率五即為人數以五人與每人四兩相乘得二十兩加朒四兩共得二十四兩即為物價或以五人與每人六兩相乘得三十兩減盈六兩亦得二十四兩為物價也此法蓋因前設出四兩後設出六兩是每一人多出二兩也然出四兩則朒四兩出六兩則盈六兩是盈朒相差共多十兩矣夫一人多出二兩而總價即多十兩則二兩為一人之所多而十兩為幾人之所多可知矣故以比例四率求之而得五人也既得人數以每人出四兩計之則五人應出二十兩因於物價朒四兩故加四兩得二十四兩為物價若以每人出六兩計之則五人應出三十兩因於物價盈六兩故減六兩亦得二十四兩為物價也此法與首題第一法盈朒之加減不同者首題以共人所分共銀為問故分少則總銀必盈分多則總銀必朒其所謂盈朒者乃銀數之盈朒故得人數與分銀數相乘加盈減朒而得銀數也此以共人所出共銀為問故出少則比物價為朒出多則比物價為盈其所謂盈朒者乃出數之盈朒故得人數與出銀數相乘減盈加朒而得物價也法總一理但加減盈朒之間少不同耳又先得銀數之法以六兩乘朒四兩為加六倍得朒二十四兩以四兩乘盈六兩為加四倍得盈二十四兩相加得四十八兩為二率四倍與六倍相減餘二倍為一率一倍為三率推得四率二十四兩即為物價既得物價則於二十四兩內減朒四兩餘二十兩以每人四兩除之得五即為人數或於二十四兩加盈六兩共三十兩以每人六兩除之亦得五為人數也此法蓋將朒四兩加六倍為二十四兩則物價亦當加六倍而出四兩者亦必加六倍而為出二十四兩矣將盈六兩加四倍為二十四兩則物價亦當加四倍而出六兩者亦必加四倍而為出二十四兩矣夫每人同出二十四兩則其加倍共出之數亦必相同然比六倍物價則朒比四倍物價則盈者因六倍比四倍多二倍是盈朒相差之四十八兩即二倍物價也故以二為一率四十八兩為二率一為三率推得四率二十四兩為物價也既得物價則於二十四兩減朒四兩餘二十兩即為出四兩者所共出之數而以四兩除之得五人或於二十四兩加盈六兩共三十兩即為出六兩者所共出之數而以六兩除之亦得五人也又法將朒四兩與盈六兩相加共十兩為一率將出四兩與出六兩相減餘二兩為二率朒四兩為三率得四率八錢與出四兩相加得四兩八錢為每人應出之數又以八錢除朒四兩得五為人數或仍以十兩為一率二兩為二率盈六兩為三率得四率一兩二錢於出六兩內減之餘四兩八錢亦為每人應出之數又以一兩二錢除盈六兩亦得五為人數以五人與四兩八錢相乘得二十四兩為物價也此法蓋因盈朒之相差十兩由於每人之多二兩今欲補足所朒之四兩則每人應多八錢若欲損所盈之六兩則每人應少一兩二錢故十兩與二兩之比同於四兩與八錢之比亦同於六兩與一兩二錢之比也且一人多八錢即益所朒之四兩一人減一兩二錢即損所盈之六兩則其為五人也可知矣既得人數則以五人與每人四兩八錢相乘得二十四兩而為物價之總銀也設如衆人乘船渡河每一船載十三人則餘十二人若每一船載十八人則餘一船問共人數及船數各若干法以餘十二人為盈十二人餘一船為朒十八人乃以每船所載十三人與每船所載十八人相減餘五人為一率一船為二率盈十二人與朒十八人相加共三十人為三率推得四率六即為船數以六船與每船載十三人相乘得七十八人加盈十二人得九十為人數或以六船與每船十八人相乘得一百零八人減朒十八人亦餘九十為人數也蓋每一船多載五人而盈朒相差為三十人故五人與一船之比同於三十人與六船之比也以每船十三人計之六船共載七十八人加無船之十二人共九十人以每船十八人計之六船應載一百零八人因一船無人則減去十八人餘九十人或減一船餘五船與十八人相乘亦得九十人也又先得人數之法以每船載十八人乘盈十二人為加十八倍得盈二百一十六人又以每船載十三人乘朒十八人為加十三倍得朒二百三十四人二數相加得四百五十人為二率以十三倍與十八倍相減餘五倍為一率一倍為三率推得四率九十即為人數減盈十二人餘七十八人以每船十三人除之得六為船數或於九十人加朒十八人共一百零八人以每船十八人除之亦得六為船數也蓋十八人與十三人互乘皆得二百三十四人而十二人加十八倍則共人數之加十八倍者為每船二百三十四人餘二百一十六人也若以十八人加十三倍則共人數之加十三倍者為每船二百三十四人又少二百三十四人也二百三十四人為一船所載之人分十八倍比十三倍多五倍是盈朒相差之共四百五十人即五倍人數故五倍與四百五十人之比即如一倍與九十人之比也既得人數減去所餘之十二人以每船十三人除之得船數或加一船之十八人以每船十八人除之亦得船數焉又法將盈十二人與朒十八人相加得三十人為一率十三人與十八人相減餘五人為二率盈十二人為三率得四率二人與每船十三人相加得十五人為每船應載之數又以二人除盈十二人得六為船數或仍以三十人為一率五人為二率以朒十八人為三率得四率三人與每船十八人相減餘十五人為每船應載之數又以三人除十八人亦得六為船數以六船與每船十五人相乘得九十為人數也蓋盈朒之相差三十人由每船多五人今欲合載所盈之十二人則每船十三人者應加二人而為十五人欲分載所朒之十八人則每船十八人者應減三人而為十五人也且一船加二人即合載十二人一船減三人即分載十八人則其為六船也可知矣兩盈設如有人分果不知人數亦不知果數只云每人十二枚盈十二枚每人十三枚盈六枚問人數與果數各若干法以每人十二枚與十三枚相減餘一枚為一率一人為二率以盈六枚與盈十二枚相減餘六枚為三率推得四率六為人數以六人與十二枚相乘得七十二枚加盈十二枚得八十四枚為果數若以六人與十三枚相乘得七十八枚加盈六枚亦得八十四枚為果數也蓋一人多一枚而兩盈相差六枚其為六人可知故凡所分之數相減餘一者其盈朒之差即人數也又先得果數之法以十三枚乘盈十二枚為加十三倍得盈一百五十六枚以十二枚乘盈六枚為加十二倍得盈七十二枚相減餘八十四枚為二率十二倍與十三倍相減餘一倍為一率仍以一倍為三率推得四率八十四枚為果數內減盈十二枚餘七十二枚以每人十二枚除之得六為人數若於八十四枚減盈六枚餘七十八枚以每人十三枚除之亦得六為人數也蓋十二倍比十三倍差一倍則盈朒相差八十四枚即一倍之果數故凡互乘差一倍者則互乘所得盈朒之差即為總數既得人數又得總數則以人數除總數即得每人所分之數矣又法以兩盈數相減為一率互乘所得之兩盈數相減為二率一人為三率得四率即為每人所應得之數也此題前二法固以兩盈相減即為人數互乘所得兩盈相減即為總數蓋因十二與十三相減餘一數故也其或餘幾數者亦即為幾倍人數或為幾倍總數其以人數除總數即同於以幾倍人數除幾倍總數也設如有緞一匹欲作新帳幔一架先摺作六幅每幅比舊制長一尺二寸後摺作七幅每幅比舊制長二寸問緞之長及舊帳之長各若干法以長一尺二寸用六幅因之得盈七尺二寸以長二寸用七幅因之得盈一尺四寸乃以六幅與七幅相減餘一幅為一率一尺四寸與七尺二寸相減餘五尺八寸為二率一幅為三率推得四率五尺八寸為舊帳之長加盈一尺二寸共七尺以六幅乘之得四十二尺為緞之長也若於五尺八寸加二寸得六尺以七幅乘之亦得四十二尺蓋摺作六幅每幅盈一尺二寸是六幅共盈七尺二寸也摺作七幅每幅盈二寸是七幅共盈一尺四寸也七幅比六幅多一幅而兩盈相差五尺八寸且兩盈之數皆比舊帳為盈則五尺八寸為舊帳之長可知矣既得舊帳之數則加一尺二寸而以六幅乘之即得緞之長數也或以六幅與五尺八寸相乘加盈七尺二寸亦得緞之長數蓋七尺二寸者原係六因一尺二寸所得之數則加於舊帳而總乘之與各乘其數而後加之一也若以七幅算之其理亦同又先得緞之長法以七幅乘盈七尺二寸為加七倍得盈五十尺零四寸以六幅乘盈一尺四寸為加六倍得盈八尺四寸相減餘四十二尺為二率六倍與七倍相減餘一倍為一率仍以一倍為三率推得四率四十二尺為緞之長減盈七尺二寸以六幅除之得五尺八寸為舊帳之長也若減盈一尺四寸以七幅除之亦得五尺八寸蓋將六幅加七倍七幅加六倍皆得四十二幅是七倍緞之長比舊帳四十二幅長五十尺零四寸六倍緞之長比舊帳四十二幅長八尺四寸是兩盈相差四十二尺即一倍緞之長也既得緞之長則減其共盈數而以幅數除之即得舊帳之長或先以幅數除之而減其每幅之盈亦得舊帳之長也兩朒設如有銀買馬不知銀數亦不知馬數但云每一匹十五兩不足八十兩每一匹十三兩仍不足十六兩問馬數及銀數各若干法以十三兩與十五兩相減餘二兩為一率一馬為二率朒十六兩與朒八十兩相減餘六十四兩為三率推得四率三十二為馬數以三十二匹與每匹十五兩相乘得四百八十兩減朒八十兩得四百兩為銀數若以三十二匹與每匹十三兩相乘得四百一十六兩減朒十六兩亦得四百兩為銀數也蓋一馬差二兩則總銀差六十四兩二兩與一馬之比即同於六十四兩與三十二馬之比也既得馬數則與每匹之價相乘而減其所朒之數即得銀數矣又先得銀數之法以十三兩乘朒八十兩為加十三倍得朒一千零四十兩以十五兩乘朒十六兩為加十五倍得朒二百四十兩相減餘八百兩為二率十三倍與十五倍相減餘二倍為一率一倍為三率推得四率四百兩為銀數加朒八十兩共四百八十兩以每匹十五兩除之得三十二為馬數或於四百兩加朒十六兩共四百一十六兩以每匹十三兩除之亦得三十二為馬數也蓋將十五兩加十三倍十三兩加十五倍皆得一百九十五兩馬價齊同祗十三倍銀數則朒一千零四十兩十五倍銀數則朒二百四十兩是兩朒相差八百兩即二倍之銀數故以四率求之而得銀數也既得銀數則加其所朒之數以每匹之價除之即得馬數矣設如有米易布不知米數亦不知布數但云易布二十匹則米少一石易布十六匹則米仍少二斗問米數及布數各若干法以十六匹與二十匹相減餘四匹為一率二斗與一石相減餘八斗為二率一匹為三率推得四率二斗為布每匹所值米數以二斗與二十匹相乘得四石減朒一石餘三石為米數若以二斗與十六匹相乘得三石二斗減朒二斗亦餘三石為米數既得米數以每匹二斗除之得十五匹為布數也又先得米數之法以十六匹乘朒一石為加十六倍得朒十六石以二十匹乘朒二斗為加二十倍得朒四石相減餘十二石為二率十六倍與二十倍相減餘四倍為一率一倍為三率推得四率三石為米數加朒一石共四石為一率二十匹為二率三石為三率得四率十五匹為布數或於三石加朒二斗共三石二斗為一率十六匹為二率三石為三率亦得四率十五匹為布數也蓋二十匹加十六倍十六匹加二十倍皆為易布三百二十匹而十六倍其米數則朒十六石二十倍其米數則朒四石是兩朒相差十二石即相差四倍之米數故以比例求之得米數也既得米數則加朒一石為四石即足易布二十匹故四石與二十匹之比同於三石與十五匹之比也或加朒二斗得三石二斗即足易布十六匹故三石二斗與十六匹之比亦同於三石與十五匹之比也又先得布數之法以朒二斗與朒一石相減餘八斗為一率十六匹與十二匹相減餘四匹為二率朒一石為三率得四率五匹與二十匹相減餘十五匹為布數又以五匹為一率朒一石為二率十五匹為三率推得四率三石為米數也若仍以八斗為一率四匹為二率朒二斗為三率則得四率一匹與十六匹相減亦得十五匹為布數又以一匹為一率二斗為二率十五匹為三率亦得四率三石為米數也此法即先求適足之理蓋十五匹即適足之數也一盈一適足設如按户納糧不知户數亦不知糧數只云每户三升盈六石每户二升五合適足問人户及糧數各若干法以二升五合與三升相減餘五合為一率盈六石變為六千合為二率一户為三率推得四率一千二百為户數與每户二升五合相乘得三十石為糧數也蓋每户多五合而總糧多六石其為一千二百户可知故五合與六石之比同於一與一千二百之比也此以一户為三率者二三率原可互易變之以明比例之理也既得户數則與二升五合相乘適足三十石之數矣若以一千二百户與每户三升相乘得三十六石減盈六石亦得三十石為糧數也又先得糧數之法以二升五合乘盈六石為加二十五倍以合為單位得盈一百五十石以三升乘適足為加三十倍仍得適足蓋全糧一分每户二升五合而適足若將全糧加三十倍為三十分則二升五合亦當加三十倍為七斗五升是全糧三十分每户七斗五升仍適足也故即以一百五十石為二率將二十五倍與三十倍相減餘五倍為一率一倍為三率推得四率三十石為糧數以每户二升五合除之得一千二百為户數或加盈六石為三十六石以每户三升除之亦得一千二百為户數也設如有井不知其深有繩不知其長只云將繩作三摺入井長八尺將繩作五摺入井適足問井深繩長各若干法以三摺與五摺相減餘二摺為一率長八尺用三摺因之得盈二丈四尺為二率一摺為三率推得四率一丈二尺為井深以五摺乘之得六丈為繩長或以三摺乘之加盈二丈四尺亦得六丈為繩長也蓋摺作三摺每摺盈八尺是三摺共盈二丈四尺也五摺比三摺多二摺而盈與適足無可加減則盈二丈四尺即為二摺之數其一摺為一丈二尺矣井深既為五摺之一故一摺之數即為井深之數也既得井深則以五摺乘之得繩長之數或以三摺乘之加盈二丈四尺亦得繩長之數也又先得繩長之法以五摺乘盈二丈四尺為加五倍得盈一十二丈以三摺乘適足為加三倍仍得適足故即以一十二丈為二率三倍與五倍相減餘二倍為一率一倍為三率推得四率六丈為繩長以五摺除之得一丈二尺為井深或減盈二丈四尺餘三丈六尺以三摺除之亦得一丈二尺為井深也一朒一適足設如計日登程不知日數亦不知路程只云每日行五十五里則離所欲至之地共差六十里每日行六十里適足問日數及路程各若干法以五十五里與六十里相減餘五里為一率一日為二率朒六十里為三率推得四率十二為日數與每日六十里相乘得七百二十里為路數若以日數十二與每日行五十五里相乘得六百六十里是不到六十里也加朒六十里亦得七百二十里也又先得路程之法以六十里乘朒六十里為加六十倍得朒三千六百里以五十五里乘適足為加五十五倍仍得適足故即以三千六百里為二率五十五倍與六十倍相減餘五倍為一率一倍為三率推得四率七百二十里為路程以每日六十里除之得十二為日數或於七百二十里內減朒六十里餘六百六十里以每日五十五里除之亦得十二為日數也設如有直田一段欲截一頭作園只云截長十步不足三十二步截長十二步適足問截積及原濶各若干法以十步與十二步相減餘二步為一率朒三十二步為二率一步為三率推得四率十六步為原濶與十二步相乘得一百九十二步為截積或與十步相乘加朒三十二步亦得一百九十二步為截積也蓋長十步則少三十二步長十二步則適足是三十二步者即長二步與原濶相乘之積故以二步除之得原濶也既得原濶則與截長十二步相乘得截積或與截長十步相乘加朒三十二步亦得截積也又先得截積之法以十二步乘朒三十二步為加十二倍得朒三百八十四步以十步乘適足為加十倍仍得適足故即以三百八十四步為二率以十倍與十二倍相減餘二倍為一率一倍為三率推得四率一百九十二步為截積以截長十二步除之得十六步為原濶或於一百九十二步內減朒三十二步餘一百六十步以截長十步除之亦得十六步為原濶也雙套盈朒盈朒之法皆以每人幾何而盈幾何每人幾何而朒幾何為問其首數皆為一故以一人之較與共較為比例而得人數即欲先求共數不過用一互乘以齊其分而已故為單法若雙套則以幾人幾何而盈幾何幾人幾何而朒幾何為問其首數已不同故必先用一互乘以齊之而後可以為比若欲先求共數則用兩互乘是以謂之雙套至於比例相求之理則仍與單法同也一盈一朒設如有人分銀不知人數亦不知銀數只云每四人分銀三兩則盈六兩每六人分銀九兩則朒三兩問人數與銀數各若干法以四人互乘九兩得三十六兩以六人互乘三兩得十八兩相減餘十八兩為一率四人六人互乘得二十四人為二率盈六兩與朒三兩相加得九兩為三率推得四率十二即為人數既得人數乃以四人為一率三兩為二率十二人為三率推得四率九兩加盈六兩得十五兩即為銀數或以六人為一率九兩為二率十二人為三率推得四率十八兩減朒三兩亦餘十五兩為銀數也此法必用互乘以齊其數者蓋單法以所分數相減為一率一人為二率盈朒相加為三率今三兩為四人之所分九兩為六人之所分不可以相減而為一率也四人與六人人數不同不可以為二率也所以必用互乘以齊之一則為二十四人分十八兩雖為加六倍其比例仍同於四人分三兩也一則為二十四人分三十六兩雖為加四倍其比例仍同於六人分九兩也是以十八兩與三十六兩相減餘十八兩為二十四人之所差而盈朒差九兩即知為幾人之所差故十八兩與二十四人之比即同於九兩與十二人之比也既得人數之後而仍用比例四率者何也蓋單法所分之銀數為一人之所分故以人數與所分之銀數相乘加盈減朒而即得總銀今則所分之銀數為四人或六人之所分故每幾人與所分幾何之比即如總人與總銀之比而得四率加盈減朒始得總銀數也又捷法以四人歸除三兩每一人應得七錢五分以六人歸除九兩每一人應得一兩五錢乃照盈朒單法列之為每人七錢五分分之盈六兩每人一兩五錢分之朒三兩是以七錢五分與一兩五錢相減餘七錢五分為一率一人為二率盈六兩與朒三兩相加得九兩為三率推得四率十二為人數既得人數則以一人為一率一兩五錢為二率十二人為三率推得四率十八兩減朒三兩餘十五兩為銀數也或以每人七錢五分為二率推得四率九兩加盈六兩亦得十五兩為銀數也此法以四人除三兩以六人除九兩皆為度盡之數若數有竒零度不盡者則必用互乘之法而後可又先得銀數之法以四人互乘九兩得三十六兩又以三十六兩互乘盈六兩為加三十六倍得盈二百一十六兩以六人互乘三兩得一十八兩又以一十八兩互乘朒三兩為加十八倍得朒五十四兩兩數相加得二百七十兩為二率十八倍與三十六倍相減餘十八倍為一率一倍為三率推得四率十五兩為銀數既得銀數乃以三兩為一率四人為二率十五兩減盈六兩餘九兩為三率推得四率十二為人數或以九兩為一率六人為二率十五兩加朒三兩共十八兩為三率亦得四率十二為人數也蓋單法以所分之數相減為一率以所分之數互乘盈朒之數相減為二率一倍為三率得四率為銀數今則三兩為四人之所分九兩為六人之所分其數不同即三兩與九兩互乘亦皆得二十七兩而一則為三十六人分二十七兩加九倍也一則為十八人分二十七兩加三倍也其數亦仍不同不可相為比例故必以四人六人互乘為二十四人以齊其人數又必以十八與三十六互乘盈朒之數以齊其所分銀數然後人數與所分銀數俱同可以設為比例是以十八兩加三十六倍三十六兩加十八倍皆為六百四十八兩即如三十六倍其銀數則每二十四人分六百四十八兩盈二百一十六兩若十八倍其銀數則每二十四人分六百四十八兩朒五十四兩也然則盈朒相差二百七十兩即十八倍銀數之所差矣故十八倍與二百七十兩之比即同於一倍與十五兩之比而為比例四率也既得銀數而減盈加朒為比例四率者蓋以所分之銀數與幾何人之比即如減盈加朒之總銀數與總人數之比也又先得銀數之法以四人互乘九兩得三十六兩以六人互乘三兩得十八兩相減餘十八兩為一率以互乘所得之十八兩為二率盈六兩與朒三兩相加得九兩為三率推得四率九兩加盈六兩得十五兩為銀數若以三十六兩為二率則得四率十八兩減朒三兩亦得十五兩為銀數既得銀數則以三兩為一率四人為二率十五兩內減盈六兩餘九兩為三率推得四率十二為人數也若以九兩為一率六人為二率十五兩內加朒三兩共十八兩為三率亦得四率十二為人數此法蓋合兩四率而為一四率原法以十八兩為一率二十四人為二率九兩為三率得四率十二為人數又如以二十四人為一率十八兩為二率與四人為一率三兩為二率者同因其俱為四與三之比例十二人為三率則得四率九兩加盈六兩得十五兩為銀數今將兩四率合為一四率則前四率中省以二十四乘後四率中省以二十四除故以十八兩為一率又為二率以九兩為三率而得四率九兩加盈六兩為銀數也設如衆人共出銀買物不知人數亦不知物價只云每八人出銀七兩則盈四兩五錢每九人出銀六兩則朒三兩問人數及物價各若干法以八人互乘六兩得四十八兩以九人互乘七兩得六十三兩相減餘十五兩為一率八人九人互乘得七十二人為二率盈四兩五錢與朒三兩相加得七兩五錢為三率推得四率三十六即為人數既得人數乃以八人為一率七兩為二率三十六人為三率推得四率三十一兩五錢減盈四兩五錢餘二十七兩即為物價或以九人為一率六兩為二率三十六人為三率推得四率二十四兩加朒三兩亦得二十七兩為物價也此法用互乘以齊其數一則變為七十二人出六十三兩一則變為七十二人出四十八兩其相差十五兩是十五兩為七十二人之所差則盈朒相加之七兩五錢即知為三十六人之所差故十五兩與七十二人之比即同於七兩五錢與三十六人之比也既得人數仍用比例四率以每幾人與所出幾何之比即如總人與總銀之比而得數內減盈加朒即為物價也又先得銀數之法以八人互乘六兩得四十八兩又以四十八兩互乘盈四兩五錢為加四十八倍得盈二百一十六兩以九人互乘七兩得六十三兩又以六十三兩互乘朒三兩為加六十三倍得朒一百八十九兩二數相加得四百零五兩為二率四十八倍與六十三倍相減餘十五倍為一率一倍為三率推得四率二十七兩為銀數既得銀數乃以七兩為一率八人為二率二十七兩內加盈四兩五錢共三十一兩五錢為三率推得四率三十六為人數或以六兩為一率九人為二率於二十七兩減朒三兩餘二十四兩為三率亦得四率三十六為人數也此法用互乘以齊人數銀數而成比例故八人與九人互乘皆為七十二人以六十三兩與四十八兩互乘皆為出三千零二十四兩此數比四十八倍之物價則盈二百一十六兩比六十三倍之物價則朒一百八十九兩其盈朒之相差為四百零五兩其四十八倍與六十三倍相差為十五倍以十五倍與四百零五兩之比即同於一倍與二十七兩之比也既得銀數仍用比例四率蓋以所出之銀數與幾何人之比即如加盈減朒之總銀數與總人數之比也兩盈設如衆人輪班值日不知人數亦不知日數只云每四人值五日則盈二十日每八人值九日仍盈八日問人數及日數各若干法以四人互乘九日得三十六日以八人互乘五日得四十日相減餘四日為一率四人八人互乘得三十二人為二率盈八日與盈二十日相減餘十二日為三率推得四率九十六為人數既得人數乃以四人為一率五日為二率九十六人為三率推得四率一百二十日減盈二十日餘一百為日數或以八人為一率九日為二率九十六人為三率推得四率一百零八日減盈八日亦餘一百為日數也此法用互乘以齊其分一則變為三十二人值四十日一則變為三十二人值三十六日其相差為四日知四日為三十二人之所差則兩盈相減之十二日即知為九十六人之所差矣既得人數則以每幾人與值幾日之比即同於總人與總日之比而於得數之內減其所盈即為日數也又先得日數之法以四人互乘九日得三十六日又以三十六日互乘盈二十日為加三十六倍得盈七百二十日以八人互乘五日得四十日又以四十日互乘盈八日為加四十倍得盈三百二十日相減餘四百日為二率三十六倍與四十倍相減餘四倍為一率一倍為三率推得四率一百為日數既得日數乃以五日為一率四人為二率一百日內加盈二十日共一百二十日為三率推得四率九十六為人數或以九日為一率八人為二率一百日內加盈八日共一百零八日為三率亦得四率九十六為人數也蓋八人四人互乘皆為三十二人三十六日四十日互乘皆為一千四百四十日然比三十六倍日數則盈七百二十日比四十倍日數則盈三百二十日二數相差為四百日三十六倍與四十倍相差為四倍知四倍之為四百日即知一倍之為一百日矣既得日數則以所值之幾日與幾人之比即同於加盈之總日數與總人數之比也兩朒設如有人分絹分之不盡只云每三人五匹少二十匹每六人九匹少十匹問人數及絹數各若干法以三人互乘九匹得二十七匹以六人互乘五匹得三十匹相減餘三匹為一率三人六人互乘得一十八人為二率朒十匹與朒二十匹相減餘十匹為三率推得四率六十為人數既得人數則以三人為一率五匹為二率六十人為三率推得四率一百匹減朒二十匹餘八十匹為絹數若以六人為一率九匹為二率六十人為三率推得四率九十匹減朒十匹亦得八十匹為絹數也此法用互乘以齊其數一則變為十八人分三十匹朒二十匹一則變為十八人分二十七匹朒十匹三十匹比二十七匹相差三匹朒二十匹比朒十匹相差十匹知三匹為十八人之所差即知十匹為六十人之所差故三匹與十八人之比即同於十匹與六十人之比也又先得絹數之法以三人乘九匹得二十七匹六人乘五匹得三十匹相減餘三匹為一率三十匹為二率朒十匹與朒二十匹相減餘十匹為三率推得四率一百匹減朒二十匹餘八十匹為絹數也若以二十七匹為二率則求得四率九十匹減􅀈十匹亦得八十匹為絹數既得絹數則加朒二十匹共一百匹為三率五匹為一率三人為二率推得四率六十為人數也此法亦合兩四率而為一四率蓋原法以三匹為一率十八人為二率十匹為三率得四率六十為人數又如以十八人為一率三十匹為二率與三人為一率五匹為二率者同因其俱為三與五之比例六十人為三率得四率一百匹減朒二十匹餘八十匹為絹數今合兩四率為一四率則前四率中省以一十八乘後四率中省以一十八除也一盈一適足設如衆人支糧每三人支九石盈五十四石每四人支十四石適足問人數與糧數各若干法以三人互乘十四石得四十二石以四人互乘九石得三十六石相減餘六石為一率三人四人互乘得十二人為二率盈與適足無可加減即以盈五十四石為三率推得四率一百零八為人數既得人數乃以四人為一率十四石為二率一百零八人為三率推得四率三百七十八石為糧數或以三人為一率九石為二率一百零八人為三率推得四率三百二十四石加盈五十四石亦得三百七十八石為糧數也此法用互乘以齊其分一則變為十二人支三十六石一則變為十二人支四十二石其相差六石知六石為十二人之所差即知五十四石為一百零八人之所差矣既得人數則以每幾人與支幾石之比即同於總人數與總糧數之比也又先得糧數之法以三人互乘十四石得四十二石又以四十二石互乘盈五十四石為加四十二倍得盈二千二百六十八石以四人互乘九石得三十六石又以三十六石互乘適足為加三十六倍仍得適足故即以盈二千二百六十八石為二率三十六倍與四十二倍相減餘六倍為一率一倍為三率推得四率三百七十八石為糧數既得糧數乃以十四石為一率四人為二率三百七十八石為三率推得四率一百零八為人數或以九石為一率三人為二率三百七十八石內減盈五十四石餘三百二十四石為三率亦得四率一百零八為人數也蓋三十六石與四十二石互乘皆為支一千五百一十二石然四十二倍其糧數則盈二千二百六十八石三十六倍其糧數則適足三十六倍與四十二倍差六倍知六倍之為二千二百六十八石即知一倍之為三百七十八石矣既得糧數則以所支之幾石與幾人之比即同於總糧數與總人數之比也一朒一適足設如以車運米每四車載六十石則米少六十石每三車載四十石則米適足問車數與米數各若干法以四車互乘四十石得一百六十石以三車互乘六十石得一百八十石相減餘二十石為一率三車四車互乘得十二車為二率朒與適足無可加減即以朒六十石為三率推得四率三十六為車數既得車數則以十二車為一率以互乘所得之一百六十石為二率與三車為一率四十石為二率同以其俱為三與四十之比例也三十六車為三率推得四率四百八十石為米數若將互乘所得之一百八十石為二率則得四率五百四十石減朒六十石亦得四百八十石為米數也此法互乘後一得十二車載一百八十石一得十二車載一百六十石其相差為二十石知二十石為十二車之所差即知六十石為三十六車之所差故二十石與十二車之比即同於六十石與三十六車之比也又先得米數之法欲省互乘則將兩車數變為同等以四車載六十石用四歸三因為三車載四十五石則兩首數同矣乃以四十石與四十五石相減餘五石為一率四十石為二率朒六十石為三率推得四率四百八十石為米數既得米數即以四十石為一率三車為二率四百八十石為三率推得四率三十六即車數也此法不用互乘止將兩首數變為同等極為簡捷然必其數可以度盡為同等者方可用之若其數不能度盡則必仍用互乘之法焉御製數理精藴下編卷八
