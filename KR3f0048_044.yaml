body:
  text: 欽定四庫全書御製數理精藴下編卷三十九末部九比例規解平分線分體線分面線更體線更面線五金線比例規解比例尺代算凡㸃線面體乘除開方皆可以規度而得然於畫圖製器尤所必需誠算器之至善者焉究其立法之原總不越乎同式三角形之比例蓋同式三角形其各角各邊皆為相當之率今張尺之兩股為三角形之兩腰其尺末相距即三角形之底遂成兩邊相等之三角形於中任截兩邊相等之各三角形則其各腰之比例必與各底之比例相當也一曰平分線以御三率一曰分面線一曰更面線以御面羃一曰分體線一曰更體線以御體積一曰五金線以御輕重一曰分圓線一曰正弦線一曰正切線一曰正割線以御測量併製平儀諸器凡此十線或總歸一器或分為數體任意為之無所不可今將各線之分法及用法併著於篇此外又有假數尺即用對數及正弦割切諸線之對數為之用於三率比例測量尤為簡捷亦詳其法於後平分線自甲樞心至乙丙兩股之末作甲乙甲丙二線依幾何原本十二卷十九節之法將甲乙甲丙二線俱平分為二百分即為平分線也尺之長短任意為之尺短則平分一百分尺長則平分四五百分或一千分亦可分愈多而用愈便也設如一丁戊線欲加五倍問得幾何法以比例尺平分線第十分之己庚二㸃依丁戊線度展開勿令移動次取平分線第五十分之辛壬二㸃相離之度作丁癸線即丁戊線之五倍也蓋十分之㸃為己與庚而甲己庚為兩邊相等之三角形甲己甲庚為腰己庚相距為底又五十分之㸃為辛與壬而甲辛壬為兩邊相等之三角形甲辛甲壬為腰辛壬相距為底此兩三角形為同式形故甲庚與己庚之比同於甲壬與辛壬之比而甲庚與甲壬之比亦同於己庚與辛壬之比甲壬既為甲庚之五倍則辛壬必為己庚之五倍而丁癸亦為丁戊之五倍可知矣若欲將丁戊線加十五倍則仍以丁戊線度於十分上定尺取平分線第一百五十分之子丑二㸃相離之度作寅卯線即為丁戊線之十五倍也若欲將丁戊線加三分之二則將平分線第三十分之辰巳二㸃依丁戊線度展開勿令移動而取平分線第五十分之午未二㸃相離之度作申酉線即為丁戊線加三分之二也以丁戊線為三分而加二分共得五分因三與五之㸃近樞難用故用三十與五十其比例同也若有丁癸丁戊二線欲定其比例之分數則將平分線第一百分之戌亥二㸃依丁癸線度展開勿令移動次取丁戊線度尋至平分線第二十分之乾坎二㸃其相離之度恰符即定為一百分之二十約為五分之一即丁癸丁戊兩線之比例也要之用尺之法不外於三率求四率如以一率為腰二率為底而定尺則三率復為腰而其底即四率也以一率為腰三率為底而定尺則二率復為腰而其底亦即四率也若以一率為底二率為腰而定尺則三率復為底而其腰則四率也諸線之用雖各不同其比例之理則一也設如一丁戊線欲分為六分問每分幾何法以比例尺平分線第六十分之己庚二㸃依丁戊線度展開勿令移動次取平分線第十分之辛壬二㸃相離之度截丁戊線於癸則丁癸即丁戊線六分之一也蓋六十分之㸃為己與庚而甲己庚為兩邊相等之三角形甲己甲庚為腰己庚相距為底又十分之㸃為辛與壬而甲辛壬亦為兩邊相等之三角形甲辛甲壬為腰辛壬相距為底此兩三角形為同式形則甲庚與甲壬之比同於己庚與辛壬之比甲壬既為甲庚六分之一則辛壬必為己庚六分之一而丁癸亦為丁戊線六分之一可知矣若欲分丁戊線為七分則將平分線第七十分之子丑二㸃依丁戊線度展開勿令移動次取平分線第十分之辛壬二㸃相離之度截丁戊線於寅則丁寅即丁戊線七分之一也又若丁戊線欲取七分之三則仍以丁戊線度於七十分上定尺而取平分線第三十分之卯辰二㸃相離之度截丁戊線於己則丁己即丁戊線七分之三也設如有十三人每人給銀七兩問其銀幾何法以比例尺平分線第十分之丁戊二㸃依分釐尺七釐之度展開勿令移動次取平分線第一百三十分之己庚二㸃相離之度於分釐尺上量之得九分一釐即得共銀為九十一兩也蓋十分之㸃為丁與戊而甲丁戊為兩邊相等之三角形甲丁甲戊為腰丁戊相距為底又一百三十分之㸃為己與庚而甲己庚亦為兩邊相等之三角形甲己甲庚為腰己庚相距為底此兩三角形為同式形故甲戊十分與甲庚一百三十分之比同於丁戊七釐與己庚九分一釐之比也又以十分當一人故以一百三十分當十三人以七釐當七兩故九分一釐即為九十一兩蓋十分與一人之比同於一百三十分與十三人之比而七釐與七兩之比亦同於九分一釐與九十一兩之比也設如每官一員每月給公費錢二千二百文共給錢八千八百文問官員幾何法以比例尺平分線第二十二分之丁戊二㸃依分釐尺一分之度展開勿令移動次取平分線第八十八分之己庚二㸃相離之度於分釐尺上量之得四分即得官四員也蓋二十二分之㸃為丁與戊而甲丁戊為兩邊相等之三角形甲丁甲戊為腰丁戊相距為底又八十八分之㸃為己與庚而甲己庚為兩邊相等之三角形甲己甲庚為腰己庚相距為底此兩三角形為同式形故甲戊二十二分與甲庚八十八分之比同於丁戊一分與己庚四分之比也又以二十二分當錢二千二百故以八十八分當錢八千八百以一分當官一員故四分即為官四員蓋二十二分與二千二百之比同於八十八分與八千八百之比而一分與一員之比亦同於四分與四員之比也設如原有粟五斗易布二匹今有粟三石問易布幾何法以比例尺平分線第二十分之丁戊二㸃四倍五斗之數因五分近樞難用故用四倍之數也依分釐尺二分之度展開勿令移動次取平分線第一百二十分之己庚二㸃相離之度四倍三石之數三石為三十斗故四倍之得一百二十也於分釐尺上量之得一寸二分即得布十二匹也蓋二十分之㸃為丁與戊一百二十分之㸃為己與庚而甲丁戊與甲己庚為同式兩三角形故甲戊二十分與甲庚一百二十分之比同於丁戊二分與己庚一寸二分之比也又以二十分當五斗為四倍之數故以一百二十分當三石亦為四倍之數以二分當二匹故一寸二分即為十二匹蓋二十分與五斗之比同於一百二十分與三石之比而二分與二匹之比亦同於一寸二分與十二匹之比也設如有二十七及十八之兩數問其相連比例之三數幾何法以比例尺平分線第二十七分之丁戊二㸃依分釐尺一分八釐之度展開勿令移動次取平分線第十八分之己庚二㸃相離之度於分釐尺上量之得一分二釐即相連比例之第三數為十二也蓋二十七分之㸃為丁與戊十八分之㸃為己與庚而甲丁戊與甲己庚為同式三角形故甲戊二十七與甲庚十八之比同於丁戊十八與己庚十二之比也丁戊與甲庚既同為十八即連比例之中率則己庚十二為連比例之第三率無疑矣設如有勾五尺股十二尺問弦幾何法以比例尺平分線甲丁四十分甲戊三十分之丁戊二㸃依本線五十分之度展開勿令移動次取平分線甲庚五十分當勾數甲己一百二十分當股數之己庚二㸃相離之度於本線上量之為一百三十分即得弦十三尺也蓋勾三股四弦五為勾股弦之定數今以甲戊三十甲丁四十為兩腰而丁戊五十為底則其兩腰相交之甲角必為直角故以今有之勾股數為兩腰而取其底即為所求之弦數也若有勾五尺有弦十三尺而求股則取本線一百三十分之度自五十分之庚㸃尋至一百二十分之己㸃其相離之度恰符即得股十二尺矣設如有圓徑三十五寸問圓周幾何法以比例尺平分線第二十一分之丁戊二㸃徑率七之三倍也因七分近樞故用三倍之數依分釐尺三分五釐之度展開勿令移動次取平分線第六十六分之己庚二㸃相離之度周率二十二之三倍也因徑率用三倍故周率亦三倍之於分釐尺上量之得一寸一分即一百一十寸為所求之圓周也蓋二十一分之㸃為丁與戊六十六分之㸃為己與庚而甲丁戊與甲己庚為同式三角形故甲戊二十一與丁戊三分五釐之比同於甲庚六十六與己庚一寸一分之比而甲戊與甲庚既為徑與周之比例則丁戊與己庚亦必為徑與周之比例矣又甲戊為徑率之三倍故甲庚亦用周率之三倍而丁戊以一釐當一寸故己庚亦以一釐當一寸其比例俱相當也分面線自甲樞心至乙丙兩股之末作甲乙甲丙二線依幾何原本十二卷二十一節之法分之即為分面線也或設正方面界一百釐其積數一萬釐以二因之得二萬釐開平方得一百四十一釐為積二萬釐之根又以三因之得三萬釐開平方得一百七十三釐為積三萬釐之根照此屢倍積數開平方將所得之數於分釐尺上取其度按度截比例尺之甲乙甲丙二線即成分面線也設如有甲乙丙三正方形甲形每邊一寸其積數之比例甲為一分乙為六分丙為九分今欲作一大正方形與甲乙丙三正方形之積等問其邊幾何法以比例尺分面線第一分之兩㸃因甲方之積為一分故用一分也依甲正方形每邊一寸之度展開勿令移動乃併三正方面積共十六分即取分面線第十六分兩㸃相距之度於分釐尺上量之得四寸即所求大正方形之每一邊用其度作正方形其積與甲乙丙三正方形之共積等也蓋十六分所作正方形原比一分所作正方形大十六倍則十六分相距之度所作正方形亦必比一分相距之度所作正方形大十六倍矣一分相距之度即甲正方形之一邊其積為一分則以十六分相距之度所作正方形其積必為十六分與三正方形之共積相等也設如有大小等邊三角形小形每邊一寸大形每邊四寸今欲將兩面積相減取其餘積作同式等邊三角形問其邊幾何法以比例尺分面線第一分之兩㸃依小形每邊一寸之度展開勿令移動次以大形每邊四寸之度於分面線上尋至第十六分之兩㸃其相距之度恰合即大形與小形之比例為十六與一相減餘十五為較積即取分面線第十五分兩㸃相距之度於分釐尺上量之得三寸八分七釐即較形之每一邊也蓋大小同式多邊形之比例同於相當界所作正方形之比例見幾何原本八卷第九節今十六分所作正方形與一分所作正方形之比例為十六與一則十六分相距之度所作正方形與一分相距之度所作正方形之比例亦為十六與一矣夫大小兩距度即大小兩三角形之相當界其所作兩正方形之比例既為十六與一則大小兩三角形之比例亦必為十六與一矣既得兩形之比例乃相減以得較既得較積之比例復用積以求邊即得所求之邊數也設如有五等邊形每邊二尺欲三倍其積作同式五等邊形問其每邊幾何法以比例尺分面線第一分之兩㸃依分釐尺二寸之度展開勿令移動次取第三分兩㸃相距之度於分釐尺上量之得三寸四分五釐即三尺四寸五分為所求大形之每一邊用其度作五等邊形其積與原形之三倍等也蓋大小同式形之比例同於相當界所作正方形之比例見幾何原本八卷第九節今一分所作正方形與三分所作正方形之比例為一與三則一分相距之度所作正方形與三分相距之度所作正方形之比例亦必為一與三矣夫一分相距之度即原形之界則以三分相距之度為大形之界其積為原形之三倍可知矣又以二寸當原形之邊二尺故三寸四分五釐即為三尺四寸五分也設如有六等邊形每邊三尺欲取其積四分之三作同式六等邊形問其每邊幾何法以比例尺分面線第四分之兩㸃依分釐尺三寸之度展開勿令移動次取分面線第三分兩㸃相距之度於分釐尺上量之得二寸六分即二尺六寸為所求小形之每一邊用其度作六邊形其積即為原形四分之三也蓋大小同式形之比例同於相當界所作正方形之比例今四分所作正方形與三分所作正方形之比例為四與三則四分相距之度所作正方形與三分相距之度所作正方形之比例亦必為四與三矣夫四分相距之度即原形之界則以三分相距之度為小形之界其積為原形四分之三可知矣又以三寸當原形之邊三尺故二寸六分即為二尺六寸也設如有三率相連比例數首率二尺末率八尺問中率幾何法以比例尺分面線第二分之兩㸃依分釐尺二寸之度展開勿令移動次取分面線第八分兩㸃相距之度於分釐尺上量之得四寸即四尺為相連比例之中率也蓋相連比例三率其首率所作正方形與中率所作正方形之比同於首率與末率之比今首率為二尺末率為八尺則首率所作正方形與中率所作正方形之比例即如二與八之比例故以二分相距之度為首率之數則八分相距之度必為中率之數可知矣又首率用二寸當二尺故中率四寸即為四尺也設如有正方面積一千六百尺問每一邊幾何法以比例尺分面線第一分之兩㸃依分釐尺一寸之度展開勿令移動乃以一寸之十分作十尺自乘得一百尺與積數一千六百尺相較其比例如一與十六即取分面線第十六分兩㸃相距之度於分釐尺上量之得四寸即四十尺為所求正方之每一邊也蓋一分之積既為一百尺則十六分之積必為一千六百尺而一分相距之度既為方積一百尺之每一邊則十六分相距之度必為方積一千六百尺之每一邊矣又以一寸當十尺故四寸即為四十尺也設如有正方面積九千零二十五尺問每一邊幾何法以比例尺分面線第一百分之兩㸃依分釐尺一寸之度展開勿令移動乃以一寸之一百釐作一百尺自乘得一萬尺與積數九千零二十五尺相較其比例如一百與九十有餘即取分面線第九十分有餘相距之度於分釐尺上量之得九分五釐即九十五尺為所求正方之每一邊也蓋一百分之積既為一萬尺則九十分有餘之積必為九千餘尺而一百分相距之度既為方積一萬尺之每一邊則九十分有餘相距之度必為方積九千餘尺之每一邊矣又以一寸當一百尺故九分五釐即為九十五尺也更面線自甲樞心至乙丙兩股之末作甲乙甲丙二線設積數一億用面部內面積相等邊線不同之定率比例得各形之邊線其方邊一萬圜徑一萬一千二百八十四三等邊一萬五千一百九十七五等邊七千六百二十四六等邊六千二百零四七等邊五千二百四十六八等邊四千五百五十一九等邊四千零二十二十等邊三千六百零五將各形邊數於分釐尺上取其度按度截比例尺之甲乙甲丙二線即成更面線也設如有甲圓形徑一尺二寸欲作一正方形其積與圓積等問每邊幾何法以比例尺更面線圓號之兩㸃依分釐尺一寸二分之度展開勿令移動次取方號之兩㸃相距之度於分釐尺上量之得一寸零六釐即一尺零六分為正方形之每一邊用其度作正方形其積與圜積等也蓋圓號與方號之比例原為同積之圓徑與方邊之比例則其兩距度之比例亦必為圓徑與方邊之比例今圓號相距之度既為圓徑則方號相距之度必為方邊無疑矣又以一寸二分當圓徑一尺二寸故一寸零六釐即為方邊一尺零六分也設如有甲三邊形每邊一十五尺又有乙五邊形每邊十尺欲併作一正方形問每邊幾何法以比例尺更面線三邊號之兩㸃依分釐尺一寸五分之度展開勿令移動次取方號之兩㸃相距之度於分釐尺上量之得九分八釐七豪即九尺八寸七分為正方形之每一邊用其度作正方形其積與甲三邊形積等也又以五邊號之兩㸃依分釐尺一寸之度展開勿令移動次取方號之兩㸃相距之度於分釐尺上量之得一寸三分一釐即十三尺一寸為方正形之每一邊用其度作正方形其積與乙五邊形積等也乃將兩正方形用分面線求其積之比例以分面線第十分之兩㸃依小方邊九分八釐七豪之度展開勿令移動復以大方邊一寸三分一釐之度於分面線上尋至第十七分六釐之處其相距之度恰合即兩方形之比例為十分與十七分六釐併之得二十七分六釐即取分面線第二十七分六釐相距之度於分釐尺上量之得一寸六分四釐即十六尺四寸為正方形之每一邊用其度作正方形其積與甲乙兩形之積等也蓋甲乙兩形不同類不能得其比例即不能相加故先用更面線將甲乙兩形俱變為正方形復用分面線求其比例而併之即得所求大正方形之一邊也設如有甲八邊形每邊十二尺又有乙六邊形每邊六尺今將兩面積相減用其餘積作一七邊形問其邊幾何法以比例尺更面線八邊號之兩㸃依分釐尺一寸二分之度展開勿令移動次取七邊號兩㸃相距之度於分釐尺上量之得一寸三分八釐即十三尺八寸為七邊形之每一邊用其度作七邊形其積與甲八邊形積等也又以六邊號之兩㸃依分釐尺六分之度展開勿令移動次取七邊號兩㸃相距之度於分釐尺上量之得五分零七豪即五尺零七分為七邊形之每一邊用其度作七邊形其積與乙六邊形積等也乃將兩七邊形用分面線求其比例以分面線第十分之兩㸃依小七邊形之邊五分零七豪之度展開勿令移動復以大七邊形之邊一寸三分八釐之度於分面線上尋至第七十八分之處其相距之度恰合即兩七邊形之比例為十分與七十八分相減餘六十八分即取分面線第六十八分相距之度於分釐尺上量之得一寸三分即十三尺為所求七邊形之每一邊用其度作七邊形其積與甲乙兩形相減之餘積等也蓋甲乙兩形不同類不能得其比例即不能相減故先用更面線將甲乙兩形俱變為七邊形復用分面線求其比例而後相減即得所求七邊形之一邊也設如有十等邊形積四千四百四十五尺問每一邊幾何法先以比例尺分面線第一分之兩㸃依分釐尺一寸之度展開勿令移動乃以一寸之十分作十尺自乘得一百尺與積四千四百四十五尺相較其比例如一與四十四又九之五即取分面線第四十四分又九之五相距之度於分釐尺上量之得六寸六分又三之二即六十六尺又三分尺之二為方形之一邊用其度作正方形其積與十邊形積等也乃以更面線方號之兩㸃依方形每邊六寸六分又三分之二之度展開勿令移動次取十邊號兩㸃相距之度於分釐尺上量之得二寸四分即二十四尺為所求十邊形之每一邊也蓋正方形為各面形比例之宗故凡有積求邊者必先用分面線求得方形之邊然後用更面線使方號兩㸃相距之度與方邊等而取所求形之號兩㸃相距之度即所求形之一邊自圓形三邊形以至九邊形皆同一法也分體線自甲樞心至乙丙兩股之末作甲乙甲丙二線依幾何原本十二卷二十二節之法分之即為分體線也或設正方體界一百釐其積數一百萬釐以二因之得二百萬釐開立方得一百二十六釐為積二百萬釐之根又以三因之得三百萬釐開立方得一百四十四釐為積三百萬釐之根照此屢倍積數開立方將所得之數於分釐尺上取其度按度截比例尺之甲乙甲丙二線即成分體線也設如有甲乙丙三正方體甲形每邊二寸其積數之比例甲為一分乙為三分丙為四分今欲作一大正方體與甲乙丙三正方體之積等問其邊幾何法以比例尺分體線第一分之兩㸃依甲正方體每邊二寸之度展開勿令移動乃併三正方體積共八分即取八分兩㸃相距之度於分釐尺上量之得四寸即所求大正方體之每一邊用其度作正方體其積與甲乙丙三正方體之共積等也蓋八分所作正方體原比一分所作正方體大八倍則八分相距之度所作正方體亦必比一分相距之度所作正方體大八倍矣一分相距之度即甲正方體之一邊其積為一分則以八分相距之度所作正方體其積必為八分與三正方體之共積相等也設如有大小兩四等面體小體每邊一寸大體每邊三寸今將兩體積相減取其餘積作同式四面體問其邊幾何法以比例尺分體線第一分之兩㸃依小體每邊一寸之度展開勿令移動次以大體每邊三寸之度於分體線尋至第二十七分之兩㸃其相距之度恰合即大形與小形之比例為二十七與一相減餘二十六為較積即取分體線第二十六分兩㸃相距之度於分釐尺上量之得二寸九分六釐即較體之每一邊也蓋大小同式體之比例同於相當界所作正方體之比例見幾何原本十卷第七節今二十七分所作正方體與一分所作正方體之比例為二十七與一則二十七分相距之度所作正方體與一分相距之度所作正方體之比例亦必為二十七與一矣夫大小兩距度即大小兩體之相當界其所作兩正方體之比例既為二十七與一則大小兩四面體之比例亦必為二十七與一矣既得兩體之比例乃相減以得較既得較積之比例復用積以求邊即得所求之邊數也設如有八等面體每邊一尺欲四倍其積作同式八等面體問其每邊幾何法以比例尺分體線第一分之兩㸃依分釐尺一寸之度展開勿令移動次取第四分兩㸃相距之度於分釐尺上量之得一寸五分九釐即一尺五寸九分為所求體之一邊用其度作八等面體其積與原體之四倍等也蓋大小同式體之比例同於相當界所作正方體之比例今一分所作正方體與四分所作正方體之比例為一與四則一分相距之度所作正方體與四分相距之度所作正方體之比例亦必為一與四矣夫一分相距之度即原體之界則以四分相距之度為大體之界其積為原體之四倍可知矣又以一寸當原形邊一尺故一寸五分九釐即為一尺五寸九分也設如有圓球徑三尺欲取其積五分之二作同式圓球體問其徑幾何法以比例尺分體線第五分之兩㸃依分釐尺三寸之度展開勿令移動次取分體線第二分兩㸃相距之度於分釐尺上量之得二寸二分一釐即二尺二寸一分為所求小體之一邊用其度為徑作圓球體其積為原體五分之二也蓋大小同式體之比例同於相當界所作正方體之比例今五分所作正方體與二分所作正方體之比例為五與二則五分相距之度所作正方體與二分相距之度所作正方體之比例亦必為五與二矣夫五分相距之度即原體之徑則以二分相距之度為小體之徑其積為原體五分之二可知矣又以三寸當原體之徑三尺故二寸二分一釐即為二尺二寸一分也設如有四率相連比例數一率八尺四率二十七尺求二率三率各幾何法以比例尺分體線第八分之兩㸃依分釐尺八分之度展開勿令移動次取分體線第二十七分之兩㸃相距之度於分釐尺上量之得一寸二分即十二尺為連比例四率之第二率既得二率乃用平分線有一率二率求連比例第三率之法以平分線第八分之兩㸃依分釐尺一寸二分之度展開勿令移動次取平分線第十二分兩㸃相距之度於分釐尺上量之得一寸八分即十八尺為連比例四率之第三率也蓋相連比例四率其一率所作正方體與二率所作正方體之比例同於一率與四率之比例今一率為八尺四率為二十七尺則一率所作正方體與二率所作正方體之比例即如八與二十七之比例故以八分相距之度為一率之數則二十七分相距之度必為二率之數可知矣又一率用八分當八尺故二率一寸二分即為十二尺至於求第三率之法即平分線求連比例三率之理也設如有正方體積二萬七千尺問每一邊幾何法以比例尺分體線第一分之兩㸃依分釐尺一寸之度展開勿令移動乃以一寸之十分作十尺自乘再乘得一千尺與積數二萬七千尺相較其比例如一與二十七即取分體線第二十七分兩㸃相距之度於分釐尺上量之得三寸即三十尺為所求正方體之每一邊也蓋一分之積既為一千尺則二十七分之積必為二萬七千尺而一分相距之度既為方積一千尺之每一邊則二十七分相距之度必為方積二萬七千尺之每一邊矣又以一寸當十尺故三寸即為三十尺也設如有正方體積八十三萬零五百八十四尺問每一邊幾何法以比例尺分體線第一百分之兩㸃依分釐尺一寸之度展開勿令移動乃以一寸之一百釐作一百尺自乘再乘得一百萬尺與積數八十三萬零五百八十四尺相較其比例如一百與八十三有餘即取分體線第八十三分有餘相距之度於分釐尺上量之得九分四釐即九十四尺為所求正方體之每一邊也蓋一百分之積既為一百萬尺則八十三分有餘之積必為八十三萬餘尺而一百分相距之度既為方積一百萬尺之每一邊則八十三分有餘相距之度必為方積八十三萬餘尺之每一邊矣又以一寸當一百尺故九分四釐即為九十四尺也設如有銀正方體每邊二寸問重幾何法以比例尺分體線第九分之兩㸃銀正方一寸之定率為九兩故用九分度依分釐尺一寸之度展開勿令移動次取分釐尺二寸之度於分體線上尋至第七十二分之兩㸃其相距之度恰合即七十二兩為銀正方體之重數也蓋各體重數之比例與積數之比例等相距之度一寸其積為九分相距之度二寸其積則為七十二分今相距一寸之九分既為正方一寸銀體之重數則相距二寸之七十二分必為正方二寸銀體之重數矣又以九分當九兩故七十二分為七十二兩也設如有大銅球體徑二寸重三十一兩四錢一分今有小銅球體徑一寸二分問重幾何法以比例尺分體線第三十一分四釐之處依大球徑二寸之度展開勿令移動次取小球徑一寸二分之度於分體線上尋至第六分七釐有餘之處其相距之度恰合即六兩七錢有餘為小銅球體之重數也蓋各體重數之比例與積數之比例等相距之度二寸其積為三十一分四釐相距之度一寸二分其積則為六分七釐今相距一寸之三十一分四釐既為徑二寸大銅球體之重數則相距一寸二分之六分七釐必為徑一寸二分小銅球體之重數矣又以三十一分四釐當三十一兩四錢故六分七釐即為六兩七錢也更體線自甲樞心至乙丙兩股之末作甲乙甲丙二線設積數一兆用體部內體積相等邊線不同之定率比例得各體之邊線其立方邊一萬球徑一萬二千四百零七四面體邊二萬零三百九十七八面體邊一萬二千八百四十九十二面體邊五千零七十二二十面體邊七千七百一十將各體邊線數於分釐尺上取其度按度截比例尺之甲乙甲丙二線即成更體線也設如有甲球體徑二尺欲作一正方體其積與球積等問每邊幾何法以比例尺更體線球號之兩㸃依分釐尺二寸之度展開勿令移動次取方號之兩㸃相距之度於分釐尺上量之得一寸六分一釐即一尺六寸一分為正方體之每一邊用其度作正方體其積與甲球積等也蓋球號與方號之比例原為同積之球徑與立方邊之比例則其兩距度之比例亦必為球徑與立方邊之比例今球號相距之度既為球徑則方號相距之度必為方邊無疑矣又以二寸當球徑二尺故一寸六分一釐即為一尺六寸一分也設如有甲四面體每邊三尺又有乙八面體每邊四尺欲併作一正方體問每邊幾何法以比例尺更體線四面號之兩㸃依分釐尺三寸之度展開勿令移動次取方號兩㸃相距之度於分釐尺上量之得一寸四分六釐即一尺四寸六分為正方體之每一邊用其度作正方體其積與甲四面體積等也又以八面號之兩㸃依分釐尺四寸之度展開勿令移動次取方號兩㸃相距之度於分釐尺上量之得三寸一分一釐即三尺一寸一分為正方體之每一邊用其度作正方體其積與乙八面體積等也乃將兩正方體用分體線求其積之比例以分體線第一分之兩㸃依小方體每邊一寸四分六釐之度展開勿令移動復以大方體每邊三寸一分一釐之度於分體線上尋至第九分五釐之處其相距之度恰合即兩方體之比例為一與九分五釐併之得十分五釐即取分體線第十分五釐相距之度於分釐尺上量之得三寸二分即三尺二寸為正方體之每一邊用其度作正方體其積與甲乙兩體之積等也蓋甲乙兩體不同類不能得其比例即不能相加故先用更體線將甲乙兩體俱變為正方體復用分體線求其比例而併之即得所求大方體之一邊也設如有甲正方體每邊二尺又有乙球體徑亦二尺今將兩體積相減用其餘積作十二面體問其邊幾何法以比例尺更體線方號之兩㸃依分釐尺二寸之度展開勿令移動次取十二面號兩㸃相距之度於分釐尺上量之得一寸零一釐四豪即一尺零一分四釐為十二面體之每一邊用其度作十二面體其積與甲正方體積等也又以球號之兩㸃依分釐尺二寸之度展開勿令移動次取十二面號兩㸃相距之度於分釐尺上量之得八分一釐七豪即八寸一分七釐為十二面體之每一邊用其度作十二面體其積與乙球體積等也乃將兩十二面體用分體線求其比例以分體線第十分之兩㸃依小十二面體每邊八分一釐七豪之度展開勿令移動復以大十二面體每邊一寸零一釐四豪之度於分體線上尋至第十九分其相距之度恰合即兩十二面體之比例為十分與十九分相減餘九分即取分體線第九分兩㸃相距之度於分釐尺上量之得七分九釐即七寸九分為所求十二面體之每一邊用其度作十二面體與甲乙兩體相減之餘積等也蓋甲乙兩體不同類不能得其比例即不能相減故先用更體線將甲乙兩體俱變為十二面體復用分體線求其比例而後相減即得所求十二面體之一邊也設如有二十面體積一萬七千四百五十五尺問每一邊幾何法先以比例尺分體線第一分之兩㸃依分釐尺一寸之度展開勿令移動乃以一寸之十分作十尺自乘再乘得一千尺與積數一萬七千四百五十五尺相較其比例如一與十七又九之五即取分體線第十七分又九之五相距之度於分釐尺上量之得二寸五分九釐即二十五尺九寸為正方體之一邊用其度作正方體其積與二十面體積等也乃以更體線方號之兩㸃依正方體每邊二寸五分九釐之度展開勿令移動次取二十面號兩㸃相距之度於分釐尺上量之得二寸即二十尺為所求二十面體之每一邊也蓋正方體為各體形比例之宗故凡有積求邊者必先用分體線求得方體之邊然後用更體線使方號兩㸃相距之度與方邊等而取所求體之號兩㸃相距之度即所求體之一邊自球體四面體至二十面體皆同一法也五金線自甲樞心至乙丙兩股之末作甲乙甲丙二線用各體權度比例定率數金重十六兩八錢水銀重十二兩二錢八分鉛重九兩九錢三分銀重九兩銅重七兩五錢鐵重六兩七錢錫重六兩三錢為各體正方一寸輕重之比例定率數有三十餘種尺不能盡載惟此數者其用為多故止載此若重數相等則其積數必不同故又用轉比例之法求其體積之比例命金之積為十億則與金同重之水銀積為十三億六千八百零七萬八千一百七十五水銀重十二兩二錢八分為一率金重十六兩八錢為二率金積十億為三率得四率即水銀積餘倣此鉛之積為十六億九千一百八十四萬二千九百銀之積為十八億六千六百六十六萬六千六百六十六銅之積為二十二億四千萬鐵之積為二十五億零七百四十六萬二千六百八十六錫之積為二十六億六千六百六十六萬六千六百六十六既得各體之積數乃開立方求其方根則金之數為一千水銀之數為一千一百一十鉛之數為一千一百九十一銀之數為一千二百三十一銅之數為一千三百零八鐵之數為一千三百五十八錫之數為一千三百八十六爰將各根數於分釐尺上取其度按度截比例尺之甲乙甲丙二線即成五金線也設如有金球徑二尺欲作一銀球其重與金球等問徑幾何法以比例尺五金線金號之兩㸃依分釐尺二寸之度展開勿令移動次取銀號兩㸃相距之度於分釐尺上量之得二寸四分六釐即二尺四寸六分為銀球徑用其度作銀球即與金球重等也蓋金號與銀號之比例原為同重之金體邊與銀體邊之比例則金號與銀號兩距度之比例亦必為同重之金體邊與銀體邊之比例今金號相距之度既為金球徑則銀號相距之度必為銀球徑可知矣又以二寸當金球徑二尺故二寸四分六釐即為二尺四寸六分也設如有金正方體每邊一寸重十六兩八錢今欲作銀八面體其重與金正方體等問每一邊幾何法先以比例尺更體線正方體之兩㸃依正方每邊一寸之度展開勿令移動次取八面體兩㸃相距之度於分釐尺上量之得一寸二分八釐有餘即為金正方體等重之金八面體之每一邊數乃以五金線金號之兩㸃依金八面體每邊一寸二分八釐之度展開勿令移動次取銀號兩㸃相距之度於分釐尺上量之得一寸五分八釐有餘即為銀八面體之每一邊用其度作八面體其重與金正方體等也蓋兩體不同類不能得其比例故先用更體線變正方體為八面體而後用五金線比例之其法與前同也設如有銅正方體每邊二寸重六十兩今有鉛一百兩欲鑄為球體問徑幾何法先以分體線第六十分之兩㸃原重六十兩故取六十分依銅正方體每邊二寸之度展開勿令移動次取分體線第一百分兩㸃相距之度今重一百兩故取一百分於分釐尺上量之得二寸三分七釐即重一百兩之銅正方體之每一邊又以更體線正方號之兩㸃依正方每邊二寸三分七釐之度展開勿令移動次取球號兩㸃相距之度於分釐尺上量之得二寸九分四釐即重一百兩之銅球徑復以五金線銅號之兩㸃依銅球徑二寸九分四釐之度展開勿令移動次取鉛號兩㸃相距之度於分釐尺上量之得二寸六分八釐即重一百兩之鉛球徑也蓋兩重數不同而兩體又不同不能得其比例故先用分體線變為同重之銅正方體又用更體線變為同重之銅球體乃用五金線銅與鉛之邊線以比例之而後得其徑數也設如銀正方一寸重九兩問銅正方一寸重幾何法以五金線銀號之兩㸃依正方一寸之度展開勿令移動次取銅號兩㸃相距之度於分釐尺上量之得一寸零五釐二豪即為重九兩之銅正方邊數乃以分體線九十分之兩㸃依一寸零五釐二豪之度展開勿令移動而以今銅正方一寸之度於分體線上尋至七十五分之兩㸃其相距之度恰合即七兩五錢為銅正方一寸重數也蓋銀重九兩其方邊一寸則銅重九兩其方邊必為一寸零五釐二豪又銅方邊一寸零五釐二豪其重九兩則銅方邊一寸其重即為七兩五錢也設如有銀正方體每邊二寸重七十二兩今欲作一銅二十面體其邊與正方體等問重幾何法先以比例尺更體線正方體之兩㸃依正方每邊二寸之度展開勿令移動次取二十面體兩㸃相距之度於分釐尺上量之得一寸五分四釐有餘即為銀正方體等重之銀二十面體之每一邊乃以五金線銀號之兩㸃依銀二十面體每邊一寸五分四釐之度展開勿令移動次取銅號兩㸃相距之度於分釐尺上量之得一寸六分三釐有餘即為銀二十面體同重之銅二十面體之每一邊復以分體線第七十二分之兩㸃依銅二十面體每邊一寸六分三釐之度展開勿令移動而以今所作銅二十面體每邊二寸之度於分體線上尋至第一百三十分有餘之處其相距之度恰合即一百三十兩有餘為銅二十面體之重數也蓋兩體不同類不能得其比例故先用更體線變正方體為二十面體又用五金線變銀二十面體為銅二十面體復用分體線有邊求重之法比例之然後得其重數也御製數理精藴下編卷三十九
