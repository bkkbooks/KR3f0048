body:
  text: 欽定四庫全書御製數理精藴下編卷十線部八方程和數類變較數類法和較兼用類和較交類附方程方者比也程者式也因設數齊其分以比方之定為已成之式凡法皆如之故曰方程蓋用互乘者所以齊其分使其首數皆同減盡而餘一法一實以得一數也法雖有三色四色以至多色不過纍乘纍減亦歸於一法一實而已其二色者設二行三色者設三行有幾色者必設幾行若三色設二行四色設三行即不可算若二色設三行三色設四行則其一行又可以不用是故解方程者又謂凡設數必成方而後可算也然其要總在於分和較和數相比者則互乘而相減較數相比者古人定為正負之名以辨加減異同之號正負異號則相加正負同號則相減其理與盈朒同蓋正者為主之數負者虛比之數其始也任以首色為正互乘衆色與首色同類者皆正也與首色異類者皆負也其繼也以互乘所得之數視正負之同異而加減之然加減之餘又有正變為負負變為正者總之因彼此而分正負由多少而成虛實互乘之後任以一層為主凡異號相加者悉依本層其號皆不變也若同號相減者本層多其號亦不變本層少反減者則正變為負負變為正蓋此多則彼少彼少則此多也至於首色減盡則第二色即為首色故加減之後首色為負者悉變之以便互乘加減始不淆也今定為例和數者不用正負之號較數者則用正負之號和較兼用者和仍不用正負之號而較則用之和較交變者則隨其法而辨别之以定其號焉或有非方程之本法而可以方程算者則又别為設問以附其後古人所謂以御錯糅正負者庶乎盡於此矣和數類設如馬四匹牛六頭共價四十八兩馬三匹牛五頭共價三十八兩問馬牛各價幾何法以馬四匹牛六頭共價四十八兩列於上馬三匹牛五頭共價三十八兩列於下乃以上馬四匹遍乘下馬三匹牛五頭價銀三十八兩得馬十二匹牛二十頭價銀一百五十二兩又以下馬三匹遍乘上馬四匹牛六頭價銀四十八兩得馬十二匹牛十八頭價銀一百四十四兩兩下相較則馬各十二匹彼此減盡牛二十頭內減十八頭餘二頭價銀一百五十二兩內減一百四十四兩餘八兩爰以餘牛二頭除餘銀八兩得四兩即牛每頭之價以牛五頭乘之得二十兩為牛五頭之共價於馬牛共價三十八兩內減去二十兩餘十八兩為馬三匹之共價以馬三匹除之得六兩即馬每匹之價也此法蓋以首色二數遍乘各數使其分數齊等即互乘齊分之理故馬四匹遍乘馬三匹牛五頭價銀三十八兩則為各增四倍馬三匹遍乘馬四匹牛六頭價銀四十八兩則為各增三倍兩下各色既俱各增倍分則其比例皆同是故馬兩下相平而減盡無餘牛兩下相減餘二頭價銀兩下相減餘八兩是為相當之數蓋一百五十二兩內減去一百四十四兩即減去馬十二匹牛十八頭之共價而所餘之八兩為牛二頭之價也又如以牛數列於前馬數列於後則先得馬價法以牛六頭馬四匹共價四十八兩列於上牛五頭馬三匹共價三十八兩列於下乃以下牛五頭遍乘上牛六頭馬四匹價銀四十八兩得牛三十頭馬二十匹價銀二百四十兩又以上牛六頭遍乘下牛五頭馬三匹價銀三十八兩得牛三十頭馬十八匹價銀二百二十八兩兩下相較則牛各三十頭彼此減盡馬二十匹內減十八匹餘二匹價銀二百四十兩內減二百二十八兩餘十二兩爰以餘馬二匹除餘銀十二兩得六兩即馬每匹之價以馬三匹乘之得十八兩為馬三匹之共價於牛馬共價三十八兩內減去十八兩餘二十兩為牛五頭之共價以牛五頭除之得四兩即牛每頭之價也此法用互乘後則牛兩下相平而減盡無餘馬兩下相減餘二匹價銀兩下相減餘十二兩即為相當之數蓋二百四十兩內減去二百二十八兩即減去牛三十頭馬十八匹之共價而所餘之十二兩為馬二匹之價也大凡方程之法各色俱可以更互相求者皆如此類也設如緞二匹紗六匹紬八匹共價八十四兩緞一匹紗四匹紬七匹共價六十兩緞三匹紗五匹紬九匹共價九十兩問緞紗紬各價幾何法先以緞二匹紗六匹紬八匹共價八十四兩列於上緞一匹紗四匹紬七匹共價六十兩列於下乃以上緞二匹遍乘下緞一匹紗四匹紬七匹價銀六十兩得緞二匹紗八匹紬十四匹價銀一百二十兩又以下緞一匹遍乘上緞二匹紗六匹紬八匹價銀八十四兩仍得原數兩下相較則緞各二匹彼此減盡紗八匹內減六匹餘二匹紬十四匹內減八匹餘六匹價銀一百二十兩內減八十四兩餘三十六兩即為紗二匹紬六匹價銀三十六兩也緞既兩下相平而減盡無餘則所餘紗二匹紬六匹價銀三十六兩即為相當之數蓋一百二十兩內減去八十四兩即減去緞二匹紗六匹紬八匹之共價而所餘三十六兩為紗二匹紬六匹之共價也次以緞一匹紗四匹紬七匹價銀六十兩列於上緞三匹紗五匹紬九匹價銀九十兩列於下乃以下緞三匹遍乘上緞一匹紗四匹紬七匹價銀六十兩得緞三匹紗十二匹紬二十一匹價銀一百八十兩又以上緞一匹遍乘下緞三匹紗五匹紬九匹價銀九十兩仍得原數兩下相較則緞各三匹彼此減盡紗十二匹內減五匹餘七匹紬二十一匹內減九匹餘十二匹價銀一百八十兩內減九十兩餘九十兩即為紗七匹紬十二匹價銀九十兩也緞既兩下相平而減盡無餘則所餘紗七匹紬十二匹價銀九十兩即為相當之數蓋一百八十兩內減九十兩即減緞三匹紗五匹紬九匹之共價而所餘九十兩為紗七匹紬十二匹之共價也於是將兩次所得之餘作二色方程算之其紗二匹紬六匹價銀三十六兩列於上紗七匹紬十二匹價銀九十兩列於下以下紗七匹遍乘上紗二匹紬六匹價銀三十六兩得紗十四匹紬四十二匹價銀二百五十二兩以上紗二匹遍乘下紗七匹紬十二匹價銀九十兩得紗十四匹紬二十四匹價銀一百八十兩兩下相較則紗各十四匹彼此減盡紬四十二匹內減二十四匹餘十八匹價銀二百五十二兩內減一百八十兩餘七十二兩爰以餘紬十八匹除餘銀七十二兩得四兩即紬每匹之價以紬六匹乘之得二十四兩為紬六匹之共價於紗紬共價三十六兩內減二十四兩餘十二兩為紗二匹之共價以紗二匹除之得六兩即紗每匹之價也以緞二匹紗六匹紬八匹共價八十四兩計之則紗六匹共價三十六兩紬八匹共價三十二兩紗紬共價為六十八兩於共價八十四兩內減六十八兩餘十六兩為緞二匹之共價以緞二匹除之得八兩即緞每匹之價也設如有上中下三等人户納糧上等五户中等十二户下等三户共納糧一石二斗六升又上等四户二等二户共納糧五斗二升又中等二十户下等二十五户共納糧一石五斗問上中下三等每户各納糧幾何法先以上等五户中等十二户下等三户納糧一石二斗六升列於上上等四户因無中等故作空位以存其分餘仍對位列之下等二户納糧五斗二升列於下乃以下層上等四户遍乘上層上等五户中等十二户下等三户納糧一石二斗六升得上等二十户中等四十八户下等十二户納糧五石零四升又以上層上等五户遍乘下層上等四户下等二户納糧五斗二升得上等二十户下等十户納糧二石六斗兩下相較則上等各二十户彼此減盡中等四十八户無可減仍得四十八户下等十二户內減十户餘二户納糧五石零四升內減二石六斗餘二石四斗四升即為中等四十八户下等二户共納糧二石四斗四升也上等既兩下相平而減盡無餘則所餘中等四十八户下等二户納糧二石四斗四升即為相當之數蓋五石零四升內減二石六斗即減去上等二十户下等十户之共糧數而所餘二石四斗四升為中等四十八户下等二户之共糧數也既得中等四十八户下等二户之二色則中等二十户下等二十五户亦即為二色故即作二色方程算之其中等四十八户下等二户納糧二石四斗四升列於上中等二十户下等二十五户納糧一石五斗列於下乃以上層中等四十八户遍乘下層中等二十户下等二十五户納糧一石五斗得中等九百六十户下等一千二百户納糧七十二石又以下層中等二十户遍乘上層中等四十八户下等二户納糧二石四斗四升得中等九百六十户下等四十户納糧四十八石八斗兩下相較則中等各九百六十户彼此減盡下等一千二百户內減四十户餘一千一百六十户納糧七十二石內減四十八石八斗餘二十三石二斗爰以所餘下等一千一百六十户除餘糧二十三石二斗得二升即下等每户納糧之數以下等二户乘之得四升為下等二户納糧之共數於中等下等共納糧二石四斗四升內減四升餘二石四斗為中等四十八户納糧之共數以中等四十八户除之得五升即中等每户納糧之數以上等四户下等二户共納糧五斗二升計之因無中户故省一次則下等二户共納糧四升於五斗二升內減四升餘四斗八升為上等四户納糧之共數以上等四户除之得一斗二升即上等每户納糧之數也設如有銀賞四等人各不知數只云一等一人二等二人三等三人四等四人共賞銀三十兩又一等二人二等三人三等四人四等五人共賞銀四十四兩又一等四人二等五人三等七人四等八人共賞銀七十七兩又一等六人二等五人三等四人四等二人共賞銀六十六兩問每等人各賞銀幾何法先以一等一人二等二人三等三人四等四人共銀三十兩列於上一等二人二等三人三等四人四等五人共銀四十四兩列於下乃以下一等二人遍乘上一等一人二等二人三等三人四等四人共銀三十兩得一等二人二等四人三等六人四等八人共銀六十兩又以上一等一人遍乘下一等二人二等三人三等四人四等五人共銀四十四兩仍得原數兩下相較則一等各二人彼此減盡二等兩下相減餘一人三等兩下相減餘二人四等兩下相減餘三人共銀兩下相減餘一十六兩即二等一人三等二人四等三人共銀十六兩也蓋六十兩內減四十四兩即減去一等二人二等三人三等四人四等五人之共銀數故所餘之十六兩為二等一人三等二人四等三人之共銀數也次以一等二人二等三人三等四人四等五人共銀四十四兩列於上一等四人二等五人三等七人四等八人共銀七十七兩列於下乃以下一等四人遍乘上一等二人二等三人三等四人四等五人共銀四十四兩得一等八人二等十二人三等十六人四等二十人共銀一百七十六兩又以上一等二人遍乘下一等四人二等五人三等七人四等八人共銀七十七兩得一等八人二等十人三等十四人四等十六人共銀一百五十四兩兩下相較則一等各八人彼此減盡二等兩下相減餘二人三等兩下相減餘二人四等兩下相減餘四人共銀兩下相減餘二十二兩即二等二人三等二人四等四人共銀二十二兩也蓋一百七十六兩內減一百五十四兩即減去一等八人二等十人三等十四人四等十六人之共銀數故所餘之二十二兩為二等二人三等二人四等四人之共銀數也次以一等四人二等五人三等七人四等八人共銀七十七兩列於上一等六人二等五人三等四人四等二人共銀六十六兩列於下乃以下一等六人遍乘上一等四人二等五人三等七人四等八人共銀七十七兩得一等二十四人二等三十人三等四十二人四等四十八人共銀四百六十二兩又以上一等四人遍乘下一等六人二等五人三等四人四等二人共銀六十六兩得一等二十四人二等二十人三等十六人四等八人共銀二百六十四兩兩下相較則一等各二十四人彼此減