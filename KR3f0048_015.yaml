負故相加得七斤仍依本層為負鐵兩層皆負故亦相減餘二斤仍依本層為負價兩層皆正故亦相減餘四錢本層少乃變正為負即錫二斤比鉛七斤鐵二斤價少四錢也蓋銅彼此減盡錫上層少四斤下層少六斤是下層比上層所少為二斤即上層比下層多二斤也鉛上層少四斤下層多三斤下之所多即上之所少是上層比下層少七斤也鐵上層少八斤下層少六斤是上層比下層所少為二斤也價上層多二錢下層多六錢是下層比上層所多為四錢即上層比下層少四錢也錫多二斤鉛少七斤鐵少二斤價即少四錢故為錫二斤比鉛七斤鐵二斤價少四錢也次以銅二斤為正錫二斤為負鉛一斤為正鐵二斤為負價多二錢為正列於上又銅一斤錫二斤為正鉛三斤鐵八斤為負相等作一空位列於下乃以下銅一斤遍乘上銅二斤錫二斤鉛一斤鐵二斤價多二錢仍得原數又以上銅二斤遍乘下銅一斤錫二斤鉛三斤鐵八斤得銅二斤錫四斤仍為正鉛六斤鐵十六斤仍為負相等無可乘仍為空位於是以上層為主兩下相較則銅各二斤彼此減盡錫一正一負故相加得六斤仍依本層為負鉛一正一負故亦相加得七斤仍依本層為正鐵兩層皆負故相減餘十四斤本層少乃變負為正價多二錢與相等無可加減仍得二錢為正即鉛七斤鐵十四斤比錫六斤價多二錢也蓋銅彼此減盡錫上層少二斤下層多四斤下之所多即上之所少是上層比下層少六斤也鉛上層多一斤下層少六斤下之所少即上之所多是上層比下層多七斤也鐵上層少二斤下層少十六斤是下層比上層所少為十四斤即上層比下層多十四斤也鉛多七斤鐵多十四斤錫少六斤而價即多二錢故為鉛七斤鐵十四斤比錫六斤價多二錢也因首色銅數減盡則錫即轉而為首應為正今錫六斤為負則重列三色之際不能一體須俱變其號然後為順故將錫六斤變負為正而以鉛七斤鐵十四斤價多二錢俱變正為負蓋原鉛七斤鐵十四斤比錫六斤價多二錢今變為錫六斤比鉛七斤鐵十四斤價少二錢也若以下層為主則相加應依下層為正即不用變次以銅一斤錫二斤為正鉛三斤鐵八斤為負相等作一空位列於上又銅五斤為正錫四斤鉛二十四斤為負鐵三十斤為正價少二錢為負列於下乃以下銅五斤遍乘上銅一斤錫二斤鉛三斤鐵八斤得銅五斤錫十斤為正鉛十五斤鐵四十斤為負相等無可乘仍為空位又以上銅一斤遍乘下銅五斤錫四斤鉛二十四斤鐵三十斤價少二錢仍得原數於是以上層為主兩下相較則銅各五斤彼此減盡錫一正一負故相加得十四斤仍依本層為正鉛兩層皆負故相減餘九斤本層少乃變負為正鐵一正一負故相加得七十斤仍依本層為負價少二錢與相等無可加減仍得二錢本層無數乃變負為正即錫十四斤鉛九斤比鐵七十斤價多二錢也蓋銅彼此減盡錫上層多十斤下層少四斤下之所少即上之所多是上層比下層多十四斤也鉛上層少十五斤下層少二十四斤是下層比上層所少為九斤即上層比下層多九斤也鐵上層少四十斤下層多三十斤下之所多即上之所少是上層比下層少七十斤也價下層少二錢即上層多二錢也錫多十四斤鉛多九斤鐵少七十斤價即多二錢故為錫十四斤鉛九斤比鐵七十斤價多二錢也爰將三次所得之餘作三色方程算之先以錫二斤為正鉛七斤鐵二斤價少四錢俱為負列於上又錫六斤為正鉛七斤鐵十四斤價少二錢俱為負列於下乃以下錫六斤遍乘上錫二斤鉛七斤鐵二斤價少四錢得錫十二斤為正鉛四十二斤鐵十二斤價少二兩四錢俱為負又以上錫二斤遍乘下錫六斤鉛七斤鐵十四斤價少二錢得錫十二斤為正鉛十四斤鐵二十八斤價少四錢俱為負於是以上層為主兩下相較則錫各十二斤彼此減盡鉛兩層皆負故相減餘二十八斤仍依本層為負鐵兩層皆負故亦相減餘十六斤本層少乃變負為正價兩層皆負故亦相減餘二兩仍依本層為負即鐵十六斤比鉛二十八斤價少二兩也蓋錫彼此減盡鉛上層少四十二斤下層少十四斤是上層比下層所少為二十八斤也鐵上層少十二斤下層少二十八斤是下層比上層所少為十六斤即上層比下層多十六斤也價上層少二兩四錢下層少四錢是上層比下層所少為二兩也鐵多十六斤鉛少二十八斤價即少二兩故為鐵十六斤比鉛二十八斤價少二兩也次以錫六斤為正鉛七斤鐵十四斤價少二錢俱為負列於上又錫十四斤鉛九斤為正鐵七十斤為負價多二錢為正列於下乃以下錫十四斤遍乘上錫六斤鉛七斤鐵十四斤價少二錢得錫八十四斤為正鉛九十八斤鐵一百九十六斤價少二兩八錢俱為負又以上錫六斤遍乘下錫十四斤鉛九斤鐵七十斤價多二錢得錫八十四斤鉛五十四斤為正鐵四百二十斤為負價多一兩二錢為正於是以上層為主兩下相較則錫各八十四斤彼此減盡鉛一正一負故相加得一百五十二斤仍依本層為負鐵兩層皆負故相減餘二百二十四斤本層少乃變負為正價一正一負故相加得四兩仍依本層為負即鐵二百二十四斤比鉛一百五十二斤價少四兩也蓋錫彼此減盡鉛上層少九十八斤下層多五十四斤下之所多即上之所少是上層比下層少一百五十二斤也鐵上層少一百九十六斤下層少四百二十斤是下層比上層所少為二百二十四斤即上層比下層多二百二十四斤也價上層少二兩八錢下層多一兩二錢下之所多即上之所少是上層比下層少四兩也鐵多二百二十四斤鉛少一百五十二斤價即少四兩故為鐵二百二十四斤比鉛一百五十二斤價少四兩也爰將兩次所得之餘作二色方程算之其所餘鉛兩首色俱為負是為同號可以互乘減盡故不變其號即將鉛二十八斤為負鐵十六斤為正價少二兩為負列於上又鉛一百五十二斤為負鐵二百二十四斤為正價少四兩為負列於下乃以下鉛一百五十二斤遍乘上鉛二十八斤鐵十六斤價少二兩得鉛四千二百五十六斤為負鐵二千四百三十二斤為正價少三百零四兩為負又以上鉛二十八斤遍乘下鉛一百五十二斤鐵二百二十四斤價少四兩得鉛四千二百五十六斤為負鐵六千二百七十二斤為正價少一百一十二兩為負兩下相較則鉛各四千二百五十六斤彼此減盡鐵兩層皆正故亦相減餘三千八百四十斤價兩層皆負故亦相減餘一百九十二兩即鐵三千八百四十斤之共價以鐵三千八百四十斤除之得五分即鐵每一斤之價也以鐵十六斤乘之得八錢為鐵十六斤之共價鐵十六斤既比鉛二十八斤價少二兩則加二兩得二兩八錢為鉛二十八斤之共價以鉛二十八斤除之得一錢即鉛每一斤之價也以錫六斤比鉛七斤鐵十四斤價少二錢計之則鉛七斤價七錢鐵十四斤價亦七錢共一兩四錢錫六斤既比鉛七斤鐵十四斤價少二錢則減二錢餘一兩二錢為錫六斤之共價以錫六斤除之得二錢即錫每一斤之價也再以銅三斤比錫二斤鉛二斤鐵四斤價多一錢計之則錫二斤價四錢鉛二斤價二錢鐵四斤價二錢共八錢銅三斤既比錫二斤鉛二斤鐵四斤價多一錢則加一錢共九錢為銅三斤之共價以銅三斤除之得三錢即銅每一斤之價也和較兼用類設如有大小二石不知其重只云二大石比七小石少三十斤三大石二小石共三百三十斤問大小石各重幾何法以大石二為正小石七為負少三十斤為負列於上大石三小石二共重三百三十斤列於下乃以上大石二遍乘下大石三小石二重三百三十斤得大石六小石四共重六百六十斤又以下大石三遍乘上大石二小石七少三十斤得大石六仍為正小石二十一仍為負少九十斤亦仍為負兩下相較則大石各六彼此減盡小石四加小石二十一得小石二十五六百六十斤加九十斤得七百五十斤乃小石二十五之共數以小石二十五除之得三十斤即一小石之重數以二因之得六十斤為二小石之共數於大小石共重三百三十斤內減之餘二百七十斤為三大石之共數以三除之得九十斤即一大石之重數也此法蓋因三大石二小石共重三百三十斤為和數皆一類為正故不用正負之號遇正則為同類相減遇負則為異類相加相加之後仍為和數者以其依本層之號故亦不用正號蓋六大石四小石共重六百六十斤而六大石比二十一小石少九十斤則加九十斤即六大石與二十一小石等矣故小石二十五共重七百五十斤以二十五除之而得一小石之重數也既得小石之重數則於和數共重三百三十斤內減二小石重六十斤餘為三大石之共數若於較數七小石之共重二百一十斤內減少三十斤所餘即為二大石之共數既得三大石或二大石之共數乃以大石數除之即得一大石之重數矣設如有米用牛馬騾三色載之各不知數只云牛二馬三騾四共載八石馬三騾三與牛三所載相等牛四馬一比騾八所載多三石問各載幾何法先以牛二馬三騾四共米八石列於上次以牛三為正馬三騾三為負相等作一空位列於下題言馬三騾三比牛三則馬騾應為正牛應為負因列法以牛為首故以牛為正馬騾為負即牛三比馬三騾三相等其理一也乃以上牛二遍乘下牛三馬三騾三得牛六仍為正馬六騾六仍為負又以下牛三遍乘上牛二馬三騾四共載八石得牛六馬九騾十二共載二十四石於是以下層為主兩下相較若以上層為主則相加數皆為負况首色減盡二色即轉而為首即變負為正故不若以下層為主而皆為正也則牛各六彼此減盡馬九加馬六得馬十五因依本層為和數故不用號騾十二加騾六得騾十八二十四石無可加減仍為二十四石即馬十五騾十八共載二十四石也蓋牛六馬九騾十二共載二十四石而牛六與馬六騾六相等則將本層牛六變為馬六騾六矣故為馬十五騾十八共載二十四石也次以牛三為正馬三騾三為負相等作一空位列於上牛四馬一為正騾八為負多三石為正列於下乃以上牛三遍乘下牛四馬一騾八多三石得牛十二為正馬三亦為正騾二十四為負多九石為正又以下牛四遍乘上牛三馬三騾三得牛十二為正馬十二為負騾十二為負於是以上層為主兩下相較則牛各十二彼此減盡馬一正一負故相加得十五仍依本層為正騾兩層皆負故相減餘十二仍依本層為負九石無可加減仍為九石依本層為正即馬十五比騾十二所載多九石也蓋牛彼此減盡馬上層多三下層少十二是上層比下層多十五也騾上層少二十四下層少十二是上層比下層所少為十二也馬多十五騾少十二而米即多九石故為馬十五比騾十二所載多九石也爰將兩次所得之餘如和較兼用二色方程法算之其馬十五騾十八共米二十四石列於上又馬十五為正騾十二為負多米九石為正列於下因首色皆為十五兩數齊同即不用互乘兩下相較則馬各十五彼此減盡騾十八加騾十二得三十米二十四石減九石餘十五石乃騾三十共載之數以三十除之得五斗即為每一騾所載之數以騾十二乘之得六石為騾十二共載之數加馬十五之多九石得十五石即為馬十五共載之數以馬十五除之得一石為每一馬所載之數以牛三與馬三騾三相等計之則馬三應載三石騾三應載一石五斗共四石五斗以牛三除之得一石五斗即為每一牛所載之數也設如有銀買綾羅絹三色各不知價只云綾一匹羅二匹絹四匹共價七兩四錢又綾二匹絹八匹比羅四匹多六兩八錢又綾三匹比羅六匹絹七匹少一兩二錢問各價幾何法先以綾一羅二絹四共銀七兩四錢列於上和數皆為正不用號又綾二為正羅四為負絹八為正多六兩八錢為正列於下乃以下綾二遍乘上綾一羅二絹四共銀七兩四錢得綾二羅四絹八共銀十四兩八錢又以上綾一遍乘下綾二羅四絹八多六兩八錢仍得原數於是以上層為主兩下相較則綾各二彼此減盡羅一正一負故相加得羅八依本層為正絹兩層皆正故相減恰盡價兩層皆正亦相減餘八兩乃羅八匹之共價蓋綾彼此減盡絹亦減盡惟羅上層多四匹下層少四匹是上層比下層多八匹而價即多八兩故為羅八匹之共價也以羅八除之得一兩即為羅每一匹之價也次以綾二為正羅四為負絹八為正多六兩八錢為正列於上又綾三為正羅六為負絹七為負少一兩二錢為負列於下乃以下綾三遍乘上綾二羅四絹八多六兩八錢得綾六為正羅十二為負絹二十四為正多二十兩四錢為正又以上綾二遍乘下綾三羅六絹七少一兩二錢得綾六為正羅十二為負絹十四為負少二兩四錢為負於是以上層為主兩下相較則綾各六彼此減盡羅兩層皆負亦減盡絹一正一負故相加得三十八銀一正一負故相加得二十二兩八錢乃絹三十八匹之共價蓋綾彼此減盡羅亦減盡絹上層多二十四匹下層少十四匹是上層比下層多三十八匹也銀上層多二十兩四錢下層少二兩四錢是上層比下層多二十二兩八錢也絹多而銀亦多故為絹之共價也以絹三十八除之得六錢即絹每一匹之價也以綾一羅二絹四共價七兩四錢計之則羅二匹應價二兩絹四匹應價二兩四錢共四兩四錢於共價七兩四錢內減之餘三兩即綾每一匹之價也此法互乘相減之後即得一法一實故省重列二色若物與價俱各減盡者則此層必為彼層之幾倍與少一層者同是為少一行不可算也和較交變類設如有琴瑟箏三種樂器各不知價但知琴一張瑟三張箏三張共價九十兩又琴一張瑟二張箏五張共價八十八兩又琴三張瑟八張箏五張共價二百二十兩問琴瑟箏每張各價幾何法先以琴一瑟三箏三共銀九十兩列於上又琴一瑟二箏五共銀八十八兩列於下因和數皆為正故不用號因首色皆為一故省互乘即以上層為主兩下相較則琴各一彼此減盡瑟兩下相減餘一本層多仍為正箏兩下相減餘二本層少變正為負銀九十兩減八十八兩餘二兩本層多亦仍為正即瑟一比箏二價多二兩也蓋兩層琴各一張其價必相等但上層多瑟一張下層多箏二張則上層多銀二兩即瑟一比箏二所多之價也次以琴一瑟二箏五共銀八十八兩列於上又琴三瑟八箏五共銀二百二十兩列於下乃以下琴三遍乘上琴一瑟二箏五共銀八十八兩得琴三瑟六箏十五共銀二百六十四兩又以上琴一遍乘下琴三瑟八箏五共銀二百二十兩仍得原數於是以上層為主兩下相較則琴各三彼此減盡瑟兩下相減餘二本層少變正為負箏兩下相減餘十本層多仍為正銀二百六十四兩減二百二十兩餘四十四兩本層多亦仍為正即箏十比瑟二價多四十四兩也蓋兩層琴各三張其價必相等但上層多箏十張下層多瑟二張則丄層多銀四十四兩即箏十張比瑟二張所多之價也因首色減盡則瑟轉而為首應為正今瑟為負重列二色之際不能一體須俱變其號然後為順故將瑟二變負為正而以箏十與價多四十四兩俱變正為負蓋原箏十比瑟二多四十四兩今變為瑟二比箏十少四十四兩也若以下層為主則本層多即得瑟二為正不用變號爰將兩次所得之餘如較數二色方程算之其瑟一為正箏二為負多二兩為正列於上瑟二為正箏十為負少四十四兩為負列於下乃以下瑟二遍乘上瑟一箏二多二兩得瑟二仍為正箏四為負多四兩為正又以上瑟一遍乘下瑟二箏十少四十四兩仍得原數兩下相較則瑟各二彼此減盡箏兩層皆負故相減餘六多四兩與少四十四兩相加得四十八兩即箏六張之共價也蓋瑟皆為二張則其共價必相等然比箏四張之價則多比箏十張之價則少是多少相加之四十八兩即箏十與箏四相差六張之價也乃以箏六除銀四十八兩得八兩為箏每張之價以箏十因之得八十兩為箏十張之共價瑟二張既比箏十張少四十四兩則於八十兩內減四十四兩餘三十六兩即為瑟二張之共價以瑟二除之得十八兩為瑟每張之價以琴一瑟三箏三共銀九十兩計之則瑟三價五十四兩箏三價二十四兩共七十八兩於共銀九十兩內減之餘十二兩即琴每一張之價也設如有古量斛庾釜三種盛米各數不同只云三斛二釜比二庾多一石零八升又二斛比三庾五釜少六石又一斛一庾比二釜多一石三斗二升問斛庾釡各盛米若干法先以斛三為正庾二為負釜二為正多一石零八升為正列於上又斛二為正庾三釜五為負少六石亦為負列於下乃以下斛二遍乘上斛三庾二釜二多一石零八升得斛六仍為正庾四為負釜四為正多二石一斗六升亦為正又以上斛三遍乘下斛二庾三釜五少六石得斛六仍為正庾九釜十五俱為負少十八石亦為負於是以上層為主兩下相較則斛各六彼此減盡庾兩層皆負故相減餘五本層少乃變負為正釡一正一負故相加得十九仍依本層為正多二石一斗六升與少十八石相加得二十石一斗六升仍依本層為正即五庾十九釡共二十石一斗六升也蓋斛彼此減盡庾上層少四下層少九是下層比上層所少為五即上層比下層多五也釜上層多四下層少十五是上層比下層多十九也米上層多二石一斗六升下層少十八石是上層比下層多二十石一斗六升也庾釜多則米亦多故為五庾十九釜共二十石一斗六升也次以斛二為正庾三釡五與少六石俱為負列於上又斛一庾一為正釜二為負多一石三斗二升為正列於下乃以上斛二遍乘下斛一庾一釡二多一石三斗二升得斛二庾二為正釡四為負多二石六斗四升為正又以下斛一遍乘上斛二庾三釜五少六石仍得原數於是以上層為主兩下相較則斛各二彼此減盡庾一正一負故相加得五仍依本層為正釜兩層皆負故相減餘一本層少乃變負為正多二石六斗四升與少六石相加得八石六斗四升仍依本層為正即五庾一釜共八石六斗四升也蓋斛彼此減盡庾上層多二下層少三是上層比下層多五也釜上層少四下層少五是下層比上層所少為一即上層比下層多一也米上層多二石六斗四升下層少六石是上層比下層多八石六斗四升也庾釜多而米亦多故為五庾一釡共八石六斗四升也爰以兩次所得之餘如和數二色方程算之其庾五釜十九共二十石一斗六升列於上庾五釡一共八石六斗四升列於下變為和數故不用號夫首數皆為五則省互乘兩下相較庾各五彼此減盡釡十九減一餘十八米二十石一斗六升減八石六斗四升餘十一石五斗二升即為釜十八所盛之共數以十八除之得六斗四升為每一釜所盛之數於八石六斗四升內減之餘八石為庾五所盛之共數以五除之得一石六斗為每一庾所盛之數以斛三釡二比庾二多一石零八升計之則庾二應三石二斗加多一石零八升得四石二斗八升即為斛三釜二之共數減釡二之一石二斗八升餘三石為斛三所盛之共數以三除之得一石為每一斛所盛之數也設如用船車駝運糧各不知數只云三船比七車一駝少三十三石六斗二車比一船十二駝少二十一石六斗八駝比一船三車少二十一石六斗問船車駝各載幾何法先以船三為正車七駝一與少三十三石六斗俱為負列於上又船一改為正車二改為負駝十二亦改為正少二十一石六斗改為多二十一石六斗亦為正列於下蓋二車比一船十二駝少二十一石六斗即一船十二駝比二車多二十一石六斗也乃以上船三遍乘下船一車二駝十二多二十一石六斗得船三為正車六為負駝三十六為正多六十四石八斗為正又以下船一遍乘上船三車七駝一少三十三石六斗仍得原數於是以上層為主兩下相較則船各三彼此減盡車兩層皆負故相減餘一本層少乃變負為正駝一正一負故相加得三十七仍依本層為正多六十四石八斗與少三十三石六斗相加得九十八石四斗亦依本層為正即車一駝三十七共載九十八石四斗也蓋船彼此減盡車上層少六下層少七是下層比上層所少為一即上層比下層多一也駝上層多三十六下層少一是上層比下層多三十七也糧上層多六十四石八斗下層少三十三石六斗是上層比下層多九十八石四斗也車多駝多則糧亦多故九十八石四斗為車一駝三十七之共數也次以船一為正車二為負駝十二為正多二十一石六斗為正列於上又船一車三俱改為正駝八改為負少二十一石六斗改為多二十一石六斗為正列於下蓋八駝比一船三車少二十一石六斗即一船三車比八駝多二十一石六斗也首數皆一故省互乘即以上層為主兩下相較則船各一彼此減盡車一正一負故相加得五仍依本層為負駝一正一負故亦相加得二十仍依本層為正糧兩層皆正相減恰盡即為駝二十與車五相等今車應轉為首色為正故重列之際須俱變其號以車變負為正駝變正為負即為車五與駝二十相等也蓋兩下相較船數相等上層少車二下層多車三上之所少即下之所多是下層多車五上層多駝十二下層少駝八下之所少即上之所多是上層多駝二十今既兩下糧數相等則為車五與駝二十相等矣爰以兩次所得之餘如和較兼用二色方程算之其車一駝三十七共糧九十八石四斗列於上因為和數故不用號又車五為正駝二十為負列於下糧兩下相等故無數可列仍作空以存其位乃以下車五遍乘上車一駝三十七共糧九十八石四斗得車五駝一百八十五共糧四百九十二石又以上車一遍乘下車五駝二十仍得原數兩下相較則車各五彼此減盡駝一百八十五加駝二十得二百零五糧止一層無數可加減仍得四百九十二石即駝二百零五所載之共數也以駝二百零五除之得二石四斗為每一駝所載之數以二十乘之得四十八石為駝二十所載之共數車五既與之相等即以車五除之得九石六斗即為每一車所載之數以三船比七車一駝少三十三石六斗計之則一駝應二石四斗七車應六十七石二斗共六十九石六斗減三船少三十三石六斗餘三十六石為三船所載之共數以三除之得十二石為每一船所載之數也設如有錢買瓜桃榴梨四色只云瓜二桃四共價一百五十六文瓜一梨八共價一百二十六文桃二榴七共價一百六十文榴四梨七共價一百四十八文問瓜桃榴梨各價幾何法先以瓜二桃四共價一百五十六文列於上因題有四色而此行無榴梨乃各作空位以存其分餘俱照式對位列之又以瓜一梨八共價一百二十六文列於下因為和數故不用號乃以上瓜二遍乘下瓜一梨八共價一百二十六文得瓜二梨十六共價二百五十二文又以下瓜一遍乘上瓜二桃四共價一百五十六文仍得原數於是以下層為主兩下相較則瓜各二彼此減盡桃四無可減仍為四依本層為正榴仍為空位梨十六無可減仍為十六本層無數乃變正為負價二百五十二文內減一百五十六文餘九十六文本層少乃變正為負即為桃四比梨十六價少九十六文也蓋瓜皆為二則其共價必相等然上層有梨十六則共價二百五十二文下層有桃四則共價一百五十六文其相差之九十六文即桃四比梨十六所少之價也至是瓜既已減盡但餘三色即變四色為三色而以桃為首對位列之是以桃四為正此行無榴數故仍作空位以存其分餘俱對位列之梨十六為負少九十六文為負列於上桃二榴七共價一百六十文列於下因為和數故不用號乃以上桃四遍乘下桃二榴七共價一百六十文得桃八榴二十八共價六百四十文又以下桃二遍乘上桃四梨十六少九十六文得桃八仍為正梨三十二仍為負少一百九十二文為負於是以上層為主兩下相較則桃各八彼此減盡榴二十八無可減仍為二十八依本層為正梨三十二無可加仍為三十二本層無數乃變負為正六百四十文與少一百九十二文相加得八百三十二文仍依本層為正即榴二十八梨三十二共價八百三十二文也蓋桃彼此減盡上層多榴二十八下層少梨三十二即上層多梨三十二故多與少相差之八百三十二文即榴二十八梨三十二之共價也至是桃又減盡但餘二色即變三色為二色而以榴為首對位列之是以榴二十八梨三十二共價八百三十二文列於上榴四梨七共價一百四十八文列於下乃以上榴二十八遍乘下榴四梨七共價一百四十八文得榴一百一十二梨一百九十六共價四千一百四十四文又以下榴四遍乘上榴二十八梨三十二共價八百三十二文得榴一百一十二梨一百二十八共價三千三百二十八文兩下相較則榴各一百一十二彼此減盡梨兩下相減餘六十八價兩下相減餘八百一十六文即梨六十八之共價也以梨六十八除之得十二文為梨每個之價以七因之得八十四文為梨七之共價於榴梨共價一百四十八文內減之餘六十四文為榴四之共價以四除之得十六文即榴每個之價以桃二榴七共價一百六十文計之則榴七應價一百一十二文於桃榴共價一百六十文內減之餘四十八文為桃二之共價以二除之得二十四文為桃每個之價再以瓜二桃四共價一百五十六文計之則桃四應價九十六文於桃瓜共價一百五十六文內減之餘六十文為瓜二之共價以二除之得三十文即瓜每個之價也附法設如有石二塊大小不等不知重數只有銅條一根重十二兩均分十二分以繩繫於第五分之上一頭五分一頭七分將大石掛於銅條一頭離提繫五分而以小石作匜稱之離提繫得六分始平又將小石掛在銅條一頭離提繫五分而以大石作匜稱之離提繫得四分始平問大小二石各重幾何法先以五分加一倍與十二分相較餘二分折半得一分與五分相加為六分乃以五分為一率六分為二率餘二分作二兩為三率得四率二兩四錢即五分之端加二兩四錢始與七分相平也爰將二兩四錢以大石離提繫五分因之得十二兩為五大石比六小石所多之數大石離提繫五分小石離提繫六分而平是大石重六分小石重五分也若五大石六小石則各得三十分其重始等然五分之一端應加二兩四錢是大石重六分尚多二兩四錢也若五大石則多十二兩矣故為五大石比六小石多十二兩也又將二兩四錢以小石離提繫五分因之亦得十二兩為四大石比五小石所少之數小石離提繫五分大石離提繫四分而平是小石重四分大石重五分也若五小石四大石則各得二十分其重始等然五分之一端應加二兩四錢是小石重四分尚多二兩四錢也若五小石則多十二兩矣故為五小石比四大石多十二兩因以大石為首故變為四大石比五小石少十二兩也因作較數方程法算之以大石五為正小石六為負重多十二兩為正列於上又大石四為正小石五為負重少十二兩為負列於下乃以上大石五遍乘下大石四小石五少十二兩得大石二十小石二十五少六十兩又以下大石四遍乘上大石五小石六多十二兩得大石二十小石二十四多四十八兩兩下相較則大石各二十彼此減盡小石兩層皆負故相減餘一重少六十兩與多四十八兩相加得一百零八兩即為一小石之重數以小石六因之得六百四十八兩為六小石之共重數加五大石所多十二兩得六百六十兩為五大石之共重數以五歸之得一百三十二兩即為一大石之重數也此本疊借互徵之法而以方程算之稍為簡易焉設如有銀一千六百四十兩兄弟二人分之各不知數只云兄之四分之一弟之六分之一共三百五十兩問兄弟各分銀幾何法以一千六百四十兩為兄四分弟六分之共銀數以三百五十兩為兄一分弟一分之共銀數如和數方程法算之以兄四分弟六分共銀一千六百四十兩列於上兄一分弟一分共銀三百五十兩列於下乃以下兄一分遍乘上兄四分弟六分共銀一千六百四十兩仍得原數又以上兄四分遍乘下兄一分弟一分共銀三百五十兩得兄四分弟四分共銀一千四百兩兩下相較則兄各四分彼此減盡弟兩下相減餘二分銀兩下相減餘二百四十兩即弟二分之共銀數以弟二分除之得一百二十兩為弟一分之銀數以弟六分乘之得七百二十兩即弟所分之共銀數於共銀一千六百四十兩內減之餘九百二十兩即兄所分之共銀數也此法用疊借互徵算之亦可設如甲乙二人分果不知其數只云甲豫乙九枚則乙與甲等乙豫甲九枚則一甲與二乙等問甲乙分果各幾何法將甲豫乙九枚以二因之得一十八枚為一甲比一乙所多之數蓋甲豫乙九枚則甲與乙等若甲不豫乙則甲多九枚乙少九枚是甲比乙多十八枚也又將乙豫甲九枚以三因之得二十七枚為一甲比二乙所少之數蓋乙豫甲九枚則一甲與二乙等若乙不豫甲則乙多九枚二乙必多十八枚甲少九枚是一甲比二乙少二十七枚也因作較數方程法算之以甲一為正乙一為負多十八枚為正列於上又甲一為正乙二為負少二十七枚為負列於下因甲首色皆為一故不用互乘兩下相較則甲各一彼此減盡乙兩層皆負故相減餘一果一正一負故相加得四十五枚即為乙之果數如甲多十八枚得六十三枚即為甲之果數也若甲與乙九枚則甲餘五十四乙亦得五十四是甲與乙相等若乙與甲九枚則乙餘三十六甲得七十二是一甲與二乙相等也此法用疊借互徵算之亦可設如有田二千六百五十畝令上中下三等農夫分耕上等四十人中等五十人下等七十人上等比中等每人多七畝中等比下等每人多五畝問上中下三等每人各耕幾何法以二千六百五十畝為和以多七畝多五畝為較如和較兼用三色方程法算之先以上等四十人中等五十人下等七十人共田二千六百五十畝列於上因為和數故不用號又上等一人為正中等一人為負多七畝為正列於下無下等則作空以存其位乃以下上等一人遍乘上上等四十人中等五十人下等七十人共田二千六百五十畝仍得原數又以上上等四十人遍乘下上等一人中等一人多七畝得上等四十人為正中等四十人為負多二百八十畝為正於是以上層為主兩下相較則上等各四十人彼此減盡中等五十人加四十人得九十人下等無可加減仍得七十人田二千六百五十畝減二百八十畝餘二千三百七十畝即中等九十人下等七十人共田二千三百七十畝也因依本層故仍為和數次以中等九十人下等七十人共田二千三百七十畝列於上因為和數故不用號又中等一人為正下等一人為負多五畝為正列於下乃以下中等一人遍乘上中等九十人下等七十人共田二千三百七十畝仍得原數又以上中等九十人遍乘下中等一人下等一人多五畝得中等九十人為正下等九十人為負多四百五十畝為正兩下相較則中等各九十人彼此減盡下等七十人加九十人得一百六十人田二千三百七十畝減四百五十畝餘一千九百二十畝即下等一百六十人之共數也以下等一百六十人除之得十二畝為下等每人所耕之數加五畝得十七畝為中等每人所耕之數又加七畝得二十四畝為上等每人所耕之數也此法本和數比例以方程算之亦可御製數理精藴下編卷十
