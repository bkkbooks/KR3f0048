body:
  text: 欽定四庫全書御製數理精藴下編卷三十四末部四借根方比例線類線類設如有一竹竿長一丈欲分為大小兩分大分比小分多四尺問大小分各幾何法借一根為小分則大分即為一根多四尺兩數相加得二根多四尺與一丈相等二根既多四尺乃減去所多四尺餘二根又於一丈內亦減去四尺餘六尺是為二根與六尺相等二根既與六尺相等則一根必與三尺相等前既借一根為小分則三尺即小分再加四尺得七尺即大分也此減法也於一丈內減去大分所多之四尺餘六尺折半得三尺即小分之數此法甚易蓋因借根比例之首先設此以明其理使人由淺以入深也設如有銀三百四十三兩分給衆匠其為首一人所得之銀與衆匠人數相等衆匠每人得銀六兩問共人數幾何法借一根為為首一人所得之銀數亦即為衆匠之人數以衆匠之人數一根與六兩相乘得六根為衆匠之銀數相加得七根與三百四十三兩相等七根既與三百四十三兩相等則一根必與四十九兩相等即為首一人所得之銀數亦即衆匠之人數以四十九人與六兩相乘得二百九十四兩即衆匠所得共銀數再加為首一人所得銀數四十九兩得三百四十三兩以合原數也此歸除法也以每匠得銀六兩加一兩得七兩以除共銀三百四十三兩即得四十九兩為為首一人所得銀數亦即衆匠之人數蓋為首一人之銀既與衆匠人數等若以為首一人之銀分給衆匠每人必多得一兩故於每人之銀數外加一兩以除共銀即得也設如有繩二條不言丈數但知其長短之比例同於九與五其相差之較與短繩除長繩所得之數相等問二繩各長若干法借九根為長繩之數五根為短繩之數兩數相減餘四根以五根除九根得一八即一丈八尺是為四根與一丈八尺相等四根既與一丈八尺相等則一根必與四尺五寸相等九因之得四丈零五寸即長繩數五因之得二丈二尺五寸即短繩數以二丈二尺五寸與四丈零五寸相減餘一丈八尺以二丈二尺五寸除四丈零五寸亦得一丈八尺也此歸除法設如甲乙丙三人有銀不言數但知甲乙共銀九十兩乙丙共銀四十五兩甲丙共銀七十三兩問三人各銀幾何法借一根為三人之總銀數以甲乙共銀九十兩計之則丙為一根少九十兩以乙丙共銀四十五兩計之則甲為一根少四十五兩以甲丙共銀七十三兩計之則乙為一根少七十三兩三數相加得三根少二百零八兩而與所借之一根相等三根少二百零八兩與一根各加二百零八兩得三根與一根多二百零八兩相等三根少二百零八兩內加二百零八兩則補足三根整數一根上再加二百零八兩則為一根多二百零八兩矣三根與一根再各減一根則餘二根與二百零八兩相等二根既與二百零八兩相等則一根必與一百零四兩相等即三人之總銀數總銀一百零四兩內減甲乙共銀九十兩餘一十四兩為丙銀數減乙丙共銀四十五兩餘五十九兩為甲銀數減甲丙共銀七十三兩餘三十一兩為乙銀數也此加減法也如以三數相加得二百零八兩折半得一百零四兩即總銀數總銀數內減甲乙共銀數餘為丙銀數總銀數內減甲丙共銀數餘為乙銀數總銀數內減乙丙共銀數餘為甲銀數也設如甲乙丙三人有銀不言數但知甲乙共銀數比丙銀多六十八兩乙丙共銀數比甲銀多一百兩丙甲共銀數比乙銀多一百二十四兩問三人各銀幾何法借二根為三人之總銀數以甲乙共銀數比丙銀多六十八兩計之則甲乙共銀為一根多三十四兩丙銀為一根少三十四兩二根既為三人之總銀數平分之則甲乙應得一根丙應得一根甲乙共銀比丙所多六十八兩平分之則甲乙應得三十四兩丙應得三十四兩甲乙所得為多丙所得為少故甲乙為一根多三十四兩丙為一根少三十四兩共相差為六十八兩下倣此以乙丙共銀數比甲銀多一百兩計之則乙丙共銀為一根多五十兩甲銀為一根少五十兩以丙甲共銀數比乙銀多一百二十四兩計之則丙甲共銀為一根多六十二兩乙銀為一根少六十二兩乃以丙銀一根少三十四兩甲銀一根少五十兩乙銀一根少六十二兩三數相加得三根少一百四十六兩而與所借之二根相等三根少一百四十六兩與二根各加一百四十六兩得三根與二根多一百四十六兩相等三根與二根再各減二根則餘一根與一百四十六兩相等一根既與一百四十六兩相等則二根必與二百九十二兩相等即三人之總銀數前既以丙銀為一根少三十四兩乃於一百四十六兩內減三十四兩餘一百一十二兩即丙銀數甲為一根少五十兩乃於一百四十六兩內減五十兩餘九十六兩即甲銀數乙為一根少六十二兩乃於一百四十六兩內減六十二兩餘八十四兩即乙銀數也此加減法也如以甲乙比丙所多之六十八兩與乙丙比甲所多之一百兩相加得一百六十八兩折半得八十四兩即乙銀數又以乙丙比甲所多之一百兩與甲丙比乙所多之一百二十四兩相加得二百二十四兩折半得一百一十二兩即丙銀數再以乙丙數相加得一百九十六兩內減去乙丙比甲所多之一百兩餘九十六兩即甲銀數也設如有銀分賞衆人不言銀數亦不言人數但知第一人得銀一兩又得餘銀之十分之一第二人得銀二兩又得餘銀之十分之一第三人得銀三兩又得餘銀之十分之一以下分賞之數皆準此例所得之銀皆相等問人數及銀數各幾何法借一根為第一人所得餘銀之數則一兩多一根為第一人所得總銀數又第一人得餘銀十分之一則餘銀必為十根減去一根仍餘九根再於九根內減去第二人所得之二兩為九根少二兩以九根少二兩取其十分之一得十分根之九少二錢與第二人之二兩相加得二兩作二十錢多十分根之九少二錢為與第一人所得之一兩作一十錢多一根相等一兩多一根與二兩多十分根之九少二錢各加二錢得一兩二錢多一根與二兩多十分根之九相等多一根與多十分根之九各減十分根之九餘一兩二錢多十分根之一與二兩相等一兩二錢與二兩又各減一兩二錢則餘十分根之一與八錢相等十分根之一既與八錢相等則一根必與八兩相等即第一人所得餘銀之數乃以十因之得八十兩又加第一人所得之一兩共八十一兩即原共銀數第一人得一兩又加餘銀八十兩之十分之一八兩共為九兩第二人得二兩又加餘銀七十兩之十分之一七兩亦共為九兩第三人得三兩又加餘銀六十兩之十分之一六兩亦共為九兩第四人得銀四兩又加餘銀五十兩之十分之一五兩亦共為九兩第五人得銀五兩又加餘銀四十兩之十分之一四兩亦共為九兩第六人得銀六兩又加餘銀三十兩之十分之一三兩亦共為九兩第七人得銀七兩又加餘銀二十兩之十分之一二兩亦共為九兩第八人得銀八兩又加餘銀十兩之十分之一一兩亦共為九兩第九人得銀九兩銀盡無餘是共九人每人得銀九兩皆相等也此加減法也以分母十與分子一相減餘九即人數以人數九自乘得八十一即總銀數也蓋惟人數與每人所得銀數相等者每人遞加一兩又各加餘銀十分之一所得始能相等故以人數自乘即得銀數也設如有人行路共二千八百里步行則日行七十里坐船則日行九十里乘馬則日行一百里但知步行之日數倍於坐船坐船之日數倍於乘馬問步行及坐船乘馬之日數各若干法借一根為乘馬之日數則坐船之日數為二根步行之日數為四根以一根與一百里相乘得一百根為乘馬所行之里數以二根與九十里相乘得一百八十根為坐船所行之里數以四根與七十里相乘得二百八十根為步行所行之里數三數相加得五百六十根是為五百六十根與二千八百里相等五百六十根既與二千八百里相等則一百根必與五百里相等前既以一百根為乘馬所行之里數則與一百根相等之五百里即乘馬所行之里數以乘馬每日行一百里除之得五日與一根相等即乘馬所行之日數倍之得十日即坐船所行之日數以坐船每日行九十里乘之得九百里為坐船所行之里數再以坐船所行之十日倍之得二十日即步行之日數以步行每日行七十里乘之得一千四百里為步行之里數以乘馬所行之五百里與坐船所行之九百里及步行之一千四百里相併共得二千八百里以合原數也此遞加比例法用借衰互徵法算之亦可設如一驢一馬一車共馱載一千五百二十斤馬所馱之數倍於驢仍多四十斤車所載之數倍於馬驢共馱之數却少四十斤問驢馬車各馱載幾何法借一根為驢所馱之數則馬為二根多四十斤車為六根多四十斤驢馬數相併得三根多四十斤倍之為六根多八十斤內減去少四十斤則為六根多四十斤三數相加得九根多八十斤是為九根多八十斤與一千五百二十斤相等多八十斤與一千五百二十斤各減去八十斤則餘九根與一千四百四十斤相等九根既與一千四百四十斤相等則一根必與一百六十斤相等即驢所馱之數倍之得三百二十斤再加四十斤得三百六十斤為馬所馱之數將馬驢所馱之數相加得五百二十斤倍之得一千零四十斤再減去四十斤得一千斤即車所載之數驢馱一百六十斤馬馱三百六十斤車載一千斤三數相加共一千五百二十斤以合原數也此按數加減比例法用借衰互徵法算之亦可設如有銀三百八十五兩令十一人挨次遞加三兩分之問每人各得若干法借一根為第一人所得銀數以十一乘之得十一根又以第一人至第十一人遞加三兩計之共得多一百六十五兩是為十一根多一百六十五兩與三百八十五兩相等十一根多一百六十五兩與三百八十五兩各減一百六十五兩則餘十一根與二百二十兩相等十一根既與二百二十兩相等則一根必與二十兩相等即第一人所得銀數遞加三兩則知第二人得二十三兩第三人得二十六兩第四人得二十九兩第五人得三十二兩第六人得三十五兩第七人得三十八兩第八人得四十一兩第九人得四十四兩第十人得四十七兩第十一人得五十兩各數相加共得三百八十五兩以合原數也此按數加減比例法設如有銀四百七十四兩令十二人挨次遞加分之但知第一人得銀一十二兩問每人各得若干法借一根為每人遞加之數以第一人至第十二人遞加一根計之則得六十六根再以十二兩與十二人相乘得一百四十四兩是為六十六根多一百四十四兩與四百七十四兩相等六十六根多一百四十四兩與四百七十四兩各減去一百四十四兩則餘六十六根與三百三十兩相等六十六根既與三百三十兩相等則一根必與五兩相等即每人遞加之數以第一人所得十二兩加五兩即第二人所得十七兩依此遞加則知第三人得二十二兩第四人得二十七兩第五人得三十二兩第六人得三十七兩第七人得四十二兩第八人得四十七兩第九人得五十二兩第十人得五十七兩第十一人得六十二兩第十二人得六十七兩各數相加共得四百七十四兩以合原數也此按數加減比例法設如一人借銀營利三次每次得利之後則還銀二百四十兩復以餘銀作本其每次所得利銀皆與每次本銀相等至第三次還銀後則銀盡無餘問原借銀若干法借一根為原借本銀數則第一次利銀亦為一根是本利共二根除還銀二百四十兩則初次餘銀即為二根少二百四十兩再以二根少二百四十兩為第二次本銀數加第二次利銀則為四根少四百八十兩除還銀二百四十兩則第二次餘銀即為四根少七百二十兩再以四根少七百二十兩為第三次本銀數加第三次利銀則為八根少一千四百四十兩除還銀二百四十兩則第三次餘銀當為八根少一千六百八十兩八根少一千六百八十兩而銀盡無餘即八根與一千六百八十兩相等也八根既與一千六百八十兩相等則一根必與二百一十兩相等即原借本銀之數因每次所得利銀皆與本銀相等故以原借本銀之數倍之得四百二十兩除還二百四十兩餘一百八十兩為第二次本銀之數又倍之得三百六十兩又除還二百四十兩餘一百二十兩為第三次本銀之數又倍之得二百四十兩再還二百四十兩則銀恰盡無餘也此按分遞折比例法用疊借互徵法算之亦可設如甲乙丙三人各作一器則甲六日可完乙八日可完丙二十四日可完今命三人同作問得日幾何法借一千一百五十二根三分母連乘之數為三人同作完之日數以甲六日計之則甲每日得一百九十二根以乙八日計之則乙每日得一百四十四根以丙二十四日計之則丙每日得四十八根三數相加共得三百八十四根與一日相等三百八十四根既與一日相等則一千一百五十二根必與三日相等即三人同作完之日數也此和數比例法設如甲丙二商不言本銀若干但知甲之本銀四倍於丙而甲本銀內減去七十二兩則兩人之銀適等問二人本銀各幾何法借一根為丙本銀數則甲本銀為四根以甲本銀減七十二兩與丙銀相等計之則於甲本銀四根內減七十二兩是為甲四根少七十二兩與丙一根相等四根少七十二兩與一根各加七十二兩得四根與一根多七十二兩相等四根與一根各減去一根則餘三根與七十二兩相等三根既與七十二兩相等則一根必與二十四兩相等即丙本銀數再加七十二兩得九十六兩即甲本銀數也此較數比例法設如甲乙二人分銀其數相等甲用過一百兩乙用過三十兩則乙之餘銀三倍於甲問二人原各分銀幾何法借一根為原分銀之數則甲之餘銀為一根少一百兩乙之餘銀為一根少三十兩乙之餘銀既三倍於甲則將甲餘銀一根少一百兩三倍之為三根少三百兩即與乙之餘銀一根少三十兩相等矣三根少三百兩與一根少三十兩各加三百兩則得三根與一根多二百七十兩相等甲三根少三百兩今加三百兩則補足三根整數乙一根少三十兩今加三百兩以三十兩補原少之數則止多二百七十兩三根與一根各減去一根則餘二根與二百七十兩相等二根既與二百七十兩相等則一根必與一百三十五兩相等前既借一根為原分銀之數則此一百三十五兩即原分銀之數矣甲用過一百兩餘三十五兩乙用過三十兩餘一百零五兩故乙之餘銀三倍於甲也此較數比例法用疊借互徵法算之亦可設如甲乙二人行路兩日行到初日乙所行之路四倍於甲次日甲所行之路三倍於乙但知初日乙行二百四十里甲行六十里問次日二人各行若干法借一根為次日乙所行之路則甲次日所行之路為三根以初日乙行二百四十里與一根相加得一根多二百四十里為乙兩日所行之路以初日甲行六十里與三根相加得三根多六十里為甲兩日所行之路是為乙一根多二百四十里與甲三根多六十里相等一根與三根各減一根多二百四十里與多六十里各減六十里則餘一百八十里與二根相等一百八十里既與二根相等則九十里必與一根相等即次日乙所行之路三因之得二百七十里即次日甲所行之路以乙次日所行九十里與初日所行二百四十里相加得三百三十里以甲次日所行二百七十里與初日所行六十里相加亦得三百三十里是兩人同行俱到也此較數比例法設如有甲乙二商各有本銀生理但知乙本銀比甲本銀多六兩數年得利之後甲本利共銀比原銀為十一倍乙本利共銀比原銀為七倍而兩人之銀適等問二人原有本銀各幾何法借一根為甲本銀數則乙本銀為一根多六兩甲本利共銀既比原銀為十一倍則以十一乘一根得十一根為甲本利共銀數乙本利共銀既比原銀為七倍則以七乘一根多六兩得七根多四十二兩為乙本利共銀數是為甲十一根與乙七根多四十二兩相等十一根與七根各減七根餘四根與四十二兩相等四根既與四十二兩相等則一根必與十兩零五錢相等即甲原銀之數十一乘之得一百一十五兩五錢即甲本利共銀之數以六兩與十兩零五錢相加得一十六兩五錢即乙原銀之數七因之亦得一百一十五兩五錢為乙本利共銀之數也此較數比例法用疊借互徵法算之亦可設如甲乙二人分銀其數相等甲銀外加三百兩乙銀外加六十五兩則甲之共銀三倍於乙問二人原各分銀若干法借一根為原分銀之數則乙之共銀為一根多六十五兩甲之共銀為一根多三百兩甲之共銀既三倍於乙則將乙之共銀一根多六十五兩三倍之為三根多一百九十五兩即與甲之共銀一根多三百兩相等矣三根多一百九十五兩與一根多三百兩各減一百九十五兩則餘三根與一根多一百零五兩相等三根與一根再各減去一根則餘二根與一百零五兩相等二根既與一百零五兩相等則一根必與五十二兩五錢相等前既借一根為原分銀之數則此五十二兩五錢即原分銀之數矣以五十二兩五錢與六十五兩相加得一百一十七兩五錢為乙之共銀數以五十二兩五錢與三百兩相加得三百五十二兩五錢為甲之共銀數即乙之共銀之三倍也此較數比例法用疊借互徵法算之亦可設如金球十二銀球十八其輕重適等若將銀球七換金球七則銀球邊多三百二十二兩問金球銀球各重幾何法借一根為金球換銀球之差數以七乘之得七根為七金球換七銀球之差數是為七根與三百二十二兩相等七根既與三百二十二兩相等則一根必與四十六兩相等即一金球一銀球相換之差數一金球一銀球相換之差數既為四十六兩則一金球比一銀球之重必差二十三兩一金球比一銀球既重二十三兩則十二金球比十二銀球必重二百七十六兩如以銀球再加六個十八個即與十二金球等是銀球六個與二百七十六兩相等也乃以六歸之得四十六兩即一銀球之重數加二十三兩得六十九兩即一金球之重數以四十六兩與十八銀球相乘得八百二十八兩以六十九兩與十二金球相乘亦得八百二十八兩也此較數比例法設如一人買縀十二匹一人買紬三十二匹用銀適等但知緞每匹價比紬每匹價多六兩問紬緞價銀各若干法借一根為紬價則緞價為一根多六兩各以總數乘之則紬總價得三十二根緞總價得十二根多七十二兩是為紬價三十二根與緞價十二根多七十二兩相等三十二根與十二根各減去十二根則餘二十根與七十二兩相等二十根既與七十二兩相等則一根必與三兩六錢相等即紬每匹之價加緞每匹比紬每匹多六兩得九兩六錢即緞每匹之價以九兩六錢乘十二匹得一百一十五兩二錢為緞總價以三兩六錢乘三十二匹亦得一百一十五兩二錢為紬總價兩數適等也此較數比例法設如甲乙二人共買緞一百匹甲買三十八匹止與銀三百一十二兩乙買六十二匹止與銀六百兩而兩人所欠之銀適等問緞價及欠銀各若干法借一根為緞每匹價銀數則甲三十八匹總銀數為三十八根又甲止與銀三百一十二兩則甲所欠之銀即為三十八根少三百一十二兩乙六十二匹總銀數為六十二根又乙止與銀六百兩則乙所欠之銀即為六十二根少六百兩是為甲三十八根少三百一十二兩與乙六十二根少六百兩相等少三百一十二兩與少六百兩各加六百兩得三十八根多二百八十八兩與六十二根相等乙為六十二根少六百兩今加六百兩則補足六十二根整數甲為三十八根少三百一十二兩今加六百兩以三百一十二兩補原少之數則止多二百八十八兩也又三十八根與六十二根各減去三十八根則餘二十四根與二百八十八兩相等二十四根既與二百八十八兩相等則一根必與十二兩相等即緞每匹之價銀數再以十二兩乘三十八匹得四百五十六兩即甲所買緞之總銀數內減甲與銀三百一十二兩餘一百四十四兩為甲所欠銀數又以十二兩乘六十二匹得七百四十四兩為乙所買緞之總銀數內減乙與銀六百兩亦餘一百四十四兩為乙所欠銀數也此較數比例法設如有米分給大小二等工人但知小工人數比大工人數為七倍大工人給米一升二合小工人給米八合共給過米五石四斗四升問人數米數各幾何法借一根為大工人之數則七根為小工人之數以一根與一升二合相乘作一十二合得一十二根為大工人米數以七根與八合相乘得五十六根為小工人米數兩米數相加得六十八根與五石四斗四升相等六十八根既與五石四斗四升相等則十二根必與九斗六升相等前既以十二根為大工人米數則與十二根相等之九斗六升即大工人之米數爰以大工人每人所得一升二合除之得八十人與一根相等即大工人之數七因之得五百六十即小工人之數以八合乘之得四石四斗八升即小工人之米數也此和較比例法用疊借互徵法算之亦可設如有銀一百兩分給大小二等匠人共一百名大匠人每人給銀一兩五錢小匠人每人給銀五錢問大小匠人各若干法借一根為大匠人數則小匠人為一百少一根以一兩五錢與一根相乘得十五根為大匠人共銀數又以五錢與一百少一根相乘得五十兩作五百錢少五根為小匠人共銀數兩銀數相加得五十兩作五百錢多十根原少五根加十五根則反多十根也與銀一百兩作一千錢相等五十兩與一百兩各減去五十兩則餘十根與五十兩相等十根既與五十兩相等則十五根必與七十五兩即七百五十錢相等前既以十五根為大匠人共銀數則與十五根相等之七十五兩即大匠人之共銀數爰以大匠人每人所得一兩五錢除之得五十人與一根相等即大匠人之數於共一百人內減大匠人五十人餘五十人即小匠人之數以五錢乘之得二十五兩即小匠人之共銀數也此和較比例法用方程法算之亦可設如有銀一百兩分賞馬步兵共一百名馬兵一人賞三兩步兵三人賞一兩問馬步兵各若干法借一根為步兵所得銀數則馬兵所得銀數即為三根相加得四根為馬步兵共得銀數是為四根與一百兩相等四根既與一百兩相等則一根必與二十五兩相等即步兵所得銀數於一百兩內減之餘七十五兩為馬兵所得銀數以每人三兩歸之得二十五即馬兵人數於一百名內減之餘七十五即步兵人數也此和較比例法設如雞同籠但知共頭三十六共足一百問雞各若干法借一根為數則雞為三十六少一根以四足乘一根得四根為之共足數以雞二足乘雞三十六少一根得七十二少二根為雞之共足數兩數相加得七十二多二根與一百相等七十二與一百各減七十二則餘二根與二十八相等二根既與二十八相等則一根必與十四相等即數於共三十六內減十四餘二十二即雞數十四以四足乘之得五十六為共足數雞二十二以二足乘之得四十四為雞共足數相加得一百以合原數也此和較比例法設如有人行路乘馬乘船共六十三日乘馬日行一百六十里乘船日行一百四十四里乘船所行之里數比乘馬所行之里數為十八倍問乘馬乘船之日數各若干法借一根為乘馬之日數則乘船之日數為六十三日少一根以一根與一百六十里相乘得一百六十根為乘馬所行之里數以六十三日少一根與一百四十四里相乘得九千零七十二里少一百四十四根為乘船所行之里數乘船所行里數既為乘馬所行里數之十八倍則以十八乘乘馬所行之里數一百六十根得二千八百八十根是為二千八百八十根與九千零七十二里少一百四十四根相等二千八百八十根與少一百四十四根各加一百四十四根得三千零二十四根與九千零七十二里相等三千零二十四根既與九千零七十二里相等則一百六十根必與四百八十里相等前既以一百六十根為乘馬所行之里數則與一百六十根相等之四百八十里即乘馬所行之里數以乘馬每日所行一百六十里除之得三日與一根相等即乘馬所行之日數以三日與六十三日相減餘六十日為乘船所行之日數以乘船每日行一百四十四里乘之得八千六百四十里即乘船所行之里數為乘馬所行之里數之十八倍也此和較比例法用疊借互徵法算之亦可設如有青緞藍緞二色共七十匹青緞每匹長四十七尺藍緞每匹長六十尺其藍緞總尺數比青緞總尺數多二十七尺問青緞藍緞二色各若干法借一根為青緞匹數則藍緞為七十匹少一根各以尺數乘之則青緞之總尺數得四十七根藍緞之總尺數得四千二百尺少六十根於藍緞總尺數內減去比青緞所多之二十七尺得四千一百七十三尺少六十根是為青緞四十七根與藍緞四千一百七十三尺少六十根相等四十七根與少六十根各加六十根得一百零七根與四千一百七十三尺相等一百零七根既與四千一百七十三尺相等則四十七根必與一千八百三十三尺相等前既以四十七根為青緞之總尺數則與四十七根相等之一千八百三十三尺即青緞之總尺數以每匹長四十七尺除之得三十九匹與一根相等即青緞之匹數以三十九匹與七十匹相減餘三十一匹即藍緞之匹數以三十一匹與六十尺相乘得一千八百六十尺即藍緞之總尺數比青緞多二十七尺也此和較比例法設如有人買絹紬二色共價銀一百二十七兩四錢絹一尺價銀七分紬一尺價銀一錢四分其絹之尺數比紬之尺數為五倍問絹紬尺數各若干法借一根為紬之尺數則絹之尺數為五根以紬價一錢四分作一十四分乘一根得一十四根為紬共價以絹價七分乘五根得三十五根為絹共價兩數相加共得四十九根是為四十九根與一百二十七兩四錢相等四十九根既與一百二十七兩四錢相等則十四根必與三十六兩四錢相等前既以十四根為紬共價則與十四根相等之三十六兩四錢即紬之共價以紬每尺價一錢四分除之得二百六十尺與一根相等即紬之尺數五因之得一千三百尺即絹之尺數也此和較比例法設如甲有十成銀一百二十四兩丙有三成銀不知數但知將二色銀鎔於一處則俱為五成銀問三成銀幾何法借一根為丙銀數因二色銀鎔於一處俱為五成故以五成與丙銀三成相減餘二成為每兩所少之數以五成與甲銀十成相減餘五成為每兩所多之數乃以每兩所少二成乘丙銀一根得二根以每兩所多五成乘甲銀一百二十四兩得六百二十成是為二根與六百二十成相等丙之所少即甲之所多其數相等也以丙銀每兩少二成除之則得一根與三百一十兩相等前既借一根為丙銀數則與一根相等之三百一十兩即丙之銀數也此和較比例法設如有銀大小共九百二十四錠重二百七十六兩大錠重三分兩之一小錠重七分兩之二問大小錠各若干法借一根為大錠數則小錠為九百二十四錠少一根因大錠重三分兩之一小錠重七分兩之二其分母不同乃以兩分母三與七相乘得二十一為共母數又以小錠分母七互乘大錠分子一得七即變三分之一為二十一分之七為大錠之重數又以大錠分母三互乘小錠分子二得六即變七分之二為二十一分之六為小錠之重數乃以一根與大錠分子七相乘得七根為大錠之重數以九百二十四錠少一根與小錠分子六相乘得五千五百四十四少六根為小錠之重數兩數相加得五千五百四十四多一根為共重數又各重數既皆通為二十一分則共重二百七十六兩亦以分母二十一通之得五千七百九十六是為五千五百四十四多一根與五千七百九十六相等五千五百四十四與五千七百九十六各減五千五百四十四則餘一根與二百五十二相等即大錠之共數與共九百二十四錠相減餘六百七十二為小錠之共數以大錠重三分兩之一與大錠共數相乘得八十四兩為大錠之共重數以小錠重七分兩之二與小錠共數相乘得一百九十二兩為小錠之共重數相加得二百七十六兩以合原數也此和較比例法設如衆人雇船每人出銀一兩二錢則少四兩四錢每人出銀一兩五錢則多八兩二錢問人數及船價銀各若干法借一根為人數以一根與一兩五錢相乘得十五根則船價銀為十五根少八兩二錢又以一根與一兩二錢相乘得十二根則船價銀又為十二根多四兩四錢此二數為相等兩邊各加八兩二錢得十五根與十二根多十二兩多錢相等兩邊再各減十二根則餘三根與十二兩六錢相等三根既與十二兩六錢相等則一根必與四兩二錢相等前既借一根為人數則此四兩二錢即為四十二人為雇船之人數以每人出一兩二錢乘之得五十兩零四錢再加四兩四錢得五十四兩八錢為船價以每人出一兩五錢乘之得六十三兩減去八兩二錢亦為五十四兩八錢兩數相同也此盈朒法設如有銀買緞二色下號緞每匹價銀八兩上號緞每匹價銀十一兩若俱買下號者則銀多二百九十六兩若俱買上號者則銀多三十二兩問緞數及銀數各若干法借一根為緞數以一根與十一兩相乘得十一根為上號緞共價則共銀為十一根多三十二兩又以一根與八兩相乘得八根為下號緞共價則共銀為八根多二百九十二兩此二數為相等兩邊各減三十二兩得十一根與八根多二百六十四兩相等兩邊再各減八根則餘三根與二百六十四兩相等三根既與二百六十四兩相等則一根必與八十八兩相等前既借一根為緞數則此八十八兩即為八十八匹為緞之總數以每匹八兩乘之得七百零四兩為下號緞共價數加多二百九十六兩得一千兩為共有銀數以每匹十一兩乘之得九百六十八兩為上號緞共價數加多三十二兩亦得一千兩兩數相同也此盈朒法設如有井一口不知其深有繩一條不知其長但知取繩六分之一比井深少三尺四寸取繩四分之一比井深適等問井深及繩長各若干法借二十四根為繩長數兩分母相乘之數取其四分之一得六根則井深即為六根又取其六分之一得四根則井深又為四根多三尺四寸此二數為相等兩邊各減四根得二根與三尺四寸相等二根既與三尺四寸相等則一根必與一尺七寸相等而二十四根必與四丈零八寸相等即繩之長數也取其六分之一得六尺八寸再加三尺四寸共得一丈零二寸為井深或取其四分之一亦得一丈零二寸兩數相同也此盈朒法設如有人買房用本銀三分之二則比房價多五十九兩用本銀五分之二則比房價少四十九兩八錢問本銀房價各若干法借十五根為本銀數兩分母相乘之數以用本銀三分之二比房價多五十九兩計之則房價為十根少五十九兩以用本銀五分之二比房價少四十九兩八錢計之則房價又為六根多四十九兩八錢此二數為相等兩邊各加五十九兩得十根與六根多一百零八兩八錢相等兩邊再各減去六根則餘四根與一百零八兩八錢相等四根既與一百零八兩八錢相等則一根必與二十七兩二錢相等而十五根必與四百零八兩相等即本銀數取其三分之二得二百七十二兩減多五十九兩得二百一十三兩為房價數又將本銀取其五分之二得一百六十三兩二錢加少四十九兩八錢亦得二百一十三兩兩數相同也此盈朒法設如有銀分給二等人其上等人比下等人多一倍上等人比下等人每人多得四兩今欲與下等人每人三兩則銀多七十三兩每人四兩則銀少二十兩問人數及銀數各若干法借一根為下等人數則上等人數為二根以一根與四兩相乘得四根為下等人所得共銀數以二根與八兩下等每人四兩上等多四兩故每人八兩相乘得十六根為上等人所得共銀數兩數相加得二十根為上下二等人所得共銀數則原銀數即為二十根少二十兩又以一根與三兩相乘得三根為下等人所得共銀數以二根與七兩相乘得十四根為上等人所得共銀數兩數相加得十七根為上下二等人所得共銀數則原銀數即為十七根多七十三兩此兩數為相等兩邊各加二十兩得二十根與十七根多九十三兩相等兩邊再各減十七根則餘三根與九十三兩相等三根既與九十三兩相等則一根必與三十一兩相等前既借一根為下等人數則此三十一兩即為三十一人為下等人數倍之得六十二人即上等人數以下等三十一人用三兩乘之得九十三兩以上等六十二人用七兩乘之得四百三十四兩兩數相加共得五百二十七兩再加所多七十三兩得六百兩為原銀數若以下等三十一人用四兩乘之得一百二十四兩以上等六十二人用八兩乘之得四百九十六兩兩數相加共得六百二十兩減去所少二十兩亦得六百兩兩數相同也此盈朒法設如有人分銀不言人數亦不言銀數但知每四人分銀十八兩則銀少八兩每三人分銀十一兩則銀多十二兩問人數及銀數各若干法借十二根為人數以四人分銀十八兩計之則每人應得四兩五錢爰以四兩五錢乘十二根得五十四根為共分銀之數而原銀即為五十四根少八兩以三人分銀十一兩計之則每人應得三兩又三分兩之二爰以三兩又三分兩之二乘十二根得四十四根為共分銀之數而原銀又為四十四根多十二兩此兩數為相等兩邊各加八兩得五十四根與四十四根多二十兩相等兩邊各減四十四根得十根與二十兩相等十根既與二十兩相等則十二根必與二十四兩相等前既借十二根為人數則此二十四兩即為二十四人為共人數也以三人為一率十一兩為二率二十四人為三率求得四率八十八兩加多十二兩共一百兩為原銀數或以四人為一率十八兩為二率二十四人為三率求得四率一百零八兩減少八兩亦得一百兩兩數相同也此雙套盈朒法設如有一商人販緞不言每匹價銀之數亦不言每匹稅銀之數但知販緞八十匹納稅用緞四匹則多銀二兩販緞三百一十匹納稅用緞十四匹則少銀六兩五錢問每匹價銀及稅銀幾何法借一根為緞一匹之價銀數以納稅用緞四匹多銀二兩計之則緞八十匹之稅銀數為四根少銀二兩以納稅用緞十四匹少銀六兩五錢計之則緞三百一十匹之稅銀數為十四根多銀六兩五錢此兩緞數不相等故難用比例須用互乘法以八十匹與三百一十匹相乘得二萬四千八百匹為共緞數乃以三百一十匹乘四根少銀二兩得一千二百四十根少銀六百二十兩為二萬四千八百匹之稅銀數又以八十匹乘十四根多銀六兩五錢得一千一百二十根多五百二十兩亦為二萬四千八百匹之稅銀數此兩緞數既為相等故乘出之稅銀數亦為相等兩邊各加六百二十兩得一千二百四十根與一千一百二十根多一千一百四十兩相等兩邊再各減一千一百二十根則餘一百二十根與一千一百四十兩相等一百二十根既與一千一百四十兩相等則一根必與九兩五錢相等即緞一匹之價銀數以緞四匹與銀九兩五錢相乘得三十八兩減去多二兩餘三十六兩即緞八十匹之稅銀數以八十匹除三十六兩得四錢五分即緞一匹之稅銀數以四錢五分與緞三百一十匹相乘得一百三十九兩五錢即緞三百一十匹之稅銀數又以緞十四匹與九兩五錢相乘得一百三十三兩再加少六兩五錢亦得一百三十九兩五錢兩數相同也此雙套盈朒法設如有銀一千二百零九兩令甲乙二人分之取甲四分之一與乙三分之一相加即與甲銀等問二人各得幾何法借十二根兩分母相乘數為甲銀數則乙銀為一千二百零九兩少十二根取甲銀四分之一為三根取乙銀三分之一為四百零三兩少四根相加得四百零三兩少一根是為十二根與四百零三兩少一根相等十二根與少一根各加一根得十三根與四百零三兩相等十三根既與四百零三兩相等則十二根必與三百七十二兩相等即甲銀數於總銀內減甲銀數餘八百三十七兩即乙銀數取甲銀四分之一得九十三兩取乙銀三分之一得二百七十九兩相加得三百七十二兩與甲銀等也此借衰互徵法用方程法算之亦可設如有銀一千兩令甲乙丙三人分之乙所得之數倍於甲仍多三十兩丙所得之數倍於乙問每人各得若干法借一根為甲銀數則乙為二根多三十兩丙為四根多六十兩三數相併共得七根多九十兩而與一千兩相等九十兩與一千兩各減九十兩餘七根與九百一十兩相等七根既與九百一十兩相等則一根必與一百三十兩相等即甲所得銀數倍之再加三十兩得二百九十兩為乙所得銀數又倍之得五百八十兩為丙所得銀數也此借衰互徵法用方程法算之亦可設如甲乙丙三人分銀六千兩乙得甲三分之一丙得乙二分之一問三人各得幾何法借一根為甲銀數則乙銀為三分根之一丙銀為六分根之一三數相加得六分根之九以甲一根為六分則乙為六分根之二丙為六分根之一共得六分根之九即一根半與六千兩相等各以六乘之得九根與三萬六千兩相等九根既與三萬六千兩相等則一根必與四千兩相等即甲銀數三分之得一千三百三十三兩又三分兩之一為乙銀數又二分之得六百六十六兩又三分兩之二為丙銀數也又法借一根為丙銀數則乙銀為二根甲銀為六根相加得九根與六千兩相等九根既與六千兩相等則一根必與六百六十六兩又三分兩之二相等即丙銀數倍之得一千三百三十三兩又三分兩之一為乙銀數三因之得四千兩即甲銀數也此借衰互徵法設如有金銀錫銅四色不言重數但知共數五分之二為銅數金銀錫共數七分之四為錫數金銀共數八分之五為銀數金重三千零二十四兩問四色各重若干法借二百八十根為共數用三分母連乘之數取其可以度盡也取其五分之二得一百一十二根為銅數與二百八十根相減餘一百六十八根為金銀錫之共數取其七分之四得九十六根為錫數與一百六十八根相減餘七十二根為金銀之共數又取其八分之五得四十五根為銀數與七十二根相減餘二十七根為金數是為二十七根與三千零二十四兩相等二十七根既與三千零二十四兩相等則一根必與一百一十二兩相等四十五根必與五千零四十兩相等即銀數九十六根必與一萬零七百五十二兩相等即錫數一百一十二根必與一萬二千五百四十四兩相等即銅數四數相加共得三萬一千三百六十兩以所借共重二百八十根與每一根之一百一十二兩相乘亦得三萬一千三百六十兩為四色之共數也此借衰互徵法設如有銀三百五十六兩分與三等人一等五人二等四人三等三人一等所得倍於二等內少二兩二等所得倍於三等又多四兩問三等人每人各得幾何法借一根為三等一人所得銀數則二等一人所得銀數為二根多四兩一等一人所得銀數為四根多六兩以各等共人數因之則三等所得共銀數為三根二等所得共銀數為八根多十六兩一等所得共銀數為二十根多三十兩三數相加共得三十一根多四十六兩為與三百五十六兩相等三十一根多四十六兩與三百五十六兩各減去四十六兩則餘三十一根與三百一十兩相等三十一根既與三百一十兩相等則一根必與十兩相等即三等一人所得銀數倍之加四兩得二十四兩即二等一人所得銀數又倍之減二兩得四十六兩即一等一人所得銀數三等三人共得三十兩二等四人共得九十六兩一等五人共得二百三十兩三數相加共得三百五十六兩以合原數也此借衰互徵法設如甲丙二人共有米三百八十四石甲納官八分之一丙納官六分之一共納五十四石問二人原米及納官米各若干法借一根為甲納米數則丙納米為五十四石少一根將甲納米一根八因之得八根為甲原米數丙納米五十四石少一根六因之得三百二十四石少六根為丙原米數相加得三百二十四石多二根為甲丙共米數是為三百二十四石多二根與三百八十四石相等三百二十四石與三百八十四石各減去三百二十四石餘二根與六十石相等二根既與六十石相等則一根必與三十石相等即甲所納米數八因之得二百四十石為甲原米數以甲原米數與三百八十四石相減餘一百四十四石為丙原米數六歸之得二十四石即丙所納米數也此疊借互徵法用方程法算之亦可設如甲乙二人不言本銀若干但知以乙本銀三分之一與甲本銀相加再加六十兩共得一千兩以甲本銀五分之一與乙本銀相加亦得一千兩問二人本銀各幾何法借十五根兩分母相乘數為乙本銀數以乙三分之一與甲本銀相加又加六十兩共得一千兩計之則甲本銀應得九百四十兩少五根取其五分之一則為一百八十八兩少一根以甲本銀五分之一一百八十八兩少一根與乙本銀十五根相加得一百八十八兩多十四根與一千兩相等一邊一百八十八兩一邊一千兩各減去一百八十八兩則得十四根與八百一十二兩相等十四根既與八百一十二兩相等則一根必與五十八兩相等前既借十五根為乙本銀數乃以十五乘之得八百七十兩即乙本銀數取其三分之一得二百九十兩與一千兩相減又減六十兩餘六百五十兩即甲本銀數也此疊借互徵法用方程法算之亦可設如甲乙二商不言本銀若干但知各得利銀九十兩其甲之本利共銀三倍於乙之本銀乙之本利共銀二倍於甲之本銀問每人本銀幾何法借三根為甲之本銀數加利銀九十兩得三根多九十兩為甲之本利共銀數甲之本利共銀既三倍於乙之本銀則乙之本銀數即為一根多三十兩再加利銀九十兩得一根多一百二十兩為乙之本利共銀數亦為甲之本銀之二倍也乃以甲之本銀三根倍之得六根與乙之一根多一百二十兩相等六根與一根各減去一根則餘五根與一百二十兩相等五根既與一百二十兩相等則三根必與七十二兩相等即甲之本銀數加利銀九十兩得一百六十二兩三歸之得五十四兩為乙之本銀數以乙本銀五十四兩加利銀九十兩共一百四十四兩為甲之本銀之二倍也此疊借互徵法用方程法算之亦可設如甲丙二人有銀不言其數但知甲銀加九兩為丙銀之三倍丙銀加七兩為甲銀之二倍問二人各銀若干法借六根三倍二倍相乘數為甲銀數加九兩為六根多九兩甲銀加九兩既為丙銀之三倍則以三歸之得二根多三兩為丙銀數加七兩為二根多十兩丙銀加七兩既為甲銀之二倍則以二歸之得一根多五兩仍為甲銀數先借六根與今所得一根多五兩既同為甲銀數則其數必等六根與一根各減一根餘五根與五兩相等五根既與五兩相等則六根必與六兩相等即甲銀數加九兩得一十五兩三歸之得五兩即丙銀數加七兩得一十二兩即甲銀六兩之二倍也此疊借互徵法用方程法算之亦可設如甲丙二人有銀不言其數但知將丙銀與甲二兩則甲銀為丙銀之二倍若將甲銀與丙三兩則丙銀為甲銀之三倍問二人各銀若干法借六根二倍三倍相乘數為甲原銀數加丙與甲二兩得六根多二兩以丙銀與甲二兩則甲銀為丙銀之二倍計之則以六根多二兩半之得三根多一兩為丙餘銀數丙先以二兩與甲則丙之原銀必為三根多三兩加甲與丙二兩得三根多六兩以甲銀與丙三兩則丙銀為甲銀之三倍計之則以三根多六兩三歸之得一根多二兩為甲餘銀數甲先以三兩與丙則甲之原銀必為一根多五兩夫先借六根與今所得一根多五兩既同為甲原銀數則其數必等六根與一根各減一根餘五根與五兩相等五根既與五兩相等則六根必與六兩相等即甲原銀之數加丙與甲二兩得八兩半之得四兩為丙餘銀之數丙餘銀既為四兩則原銀必為六兩加甲與丙三兩得九兩三歸之得三兩即甲餘銀之數也此疊借互徵法用方程法算之亦可設如甲乙二人共銀一千二百四十兩於甲銀內加乙銀四分之一乙銀內加甲銀五分之一其數相等問二人原銀各幾何法借二十根兩分母相乘數為甲原銀數則一千二百四十兩少二十根為乙原銀數甲原銀五分之一為四根乙原銀四分之一為三百一十兩少五根將甲原銀五分之一四根與乙原銀一千二百四十兩少二十根相加得一千二百四十兩少十六根原少二十根加入四根止少十六根將乙原銀四分之一三百一十兩少五根與甲原銀二十根相加得三百一十兩多十五根原二十根補乙少五根餘十五根此二數為相等少十六根與多十五根各加十六根則得一千二百四十兩與三百一十兩多三十一根相等再一千二百四十兩與三百一十兩各減三百一十兩則餘九百三十兩與三十一根相等九百三十兩既與三十一根相等則六百兩必與二十根相等前既借二十根為甲原銀數則此六百兩即甲原銀之數以六百兩與一千二百四十兩相減餘六百四十兩即乙原銀之數若甲銀內加乙原銀四分之一一百六十兩乙銀內加甲原銀五分之一一百二十兩則俱為七百六十兩也此疊借互徵法用方程法算之亦可設如甲原有銀五十兩乙原有銀八十兩乙用過之銀比甲用過之銀為三分之一甲所餘之銀比乙所餘之銀亦為三分之一問二人用銀及餘銀各若干法借一根為乙用過銀數則甲用過之銀為三根而乙所餘之銀為八十兩少一根甲所餘之銀為五十兩少三根甲餘銀既比乙餘銀為三分之一則以甲餘銀五十兩少三根三因之為一百五十兩少九根是為乙餘銀八十兩少一根與甲餘銀一百五十兩少九根相等少一根與少九根各加九根得八十兩多八根與一百五十兩相等再八十兩與一百五十兩各減八十兩餘八根與七十兩相等八根既與七十兩相等則一根必與八兩七錢五分相等即乙用過銀數三因之得二十六兩二錢五分即甲用過銀數以甲用過銀數與甲原有銀數相減餘二十三兩七錢五分為甲所餘銀數三因之得七十一兩二錢五分即乙所餘銀數也此疊借互徵法用方程法算之亦可設如甲乙丙三人有銀不言數但知甲銀比乙銀所多之數與丙銀四分之一相等乙銀比丙銀所多之數與甲銀五分之一相等若以乙銀五分之二與丙銀相較則丙銀多一百一十四兩問三人各銀幾何法借五根為乙銀數則丙銀數為二根多一百一十四兩於乙銀數五根內減去丙銀數二根多一百一十四兩餘三根少一百一十四兩為乙銀比丙銀所多之數與甲銀五分之一相等五因之得一十五根少五百七十兩為甲銀數又於甲銀數一十五根少五百七十兩內減去乙銀數五根餘十根少五百七十兩為甲銀比乙銀所多之數與丙銀四分之一相等四因之得四十根少二千二百八十兩亦為丙銀數此四十根少二千二百八十兩與二根多一百一十四兩既同為丙銀數是為相等乃於二根多一百一十四兩與四十根少二千二百八十兩各加二千二百八十兩得二根多二千三百九十四兩與四十根相等二根與四十根再各減二根則餘三十八根與二千三百九十四兩相等三十八根既與二千三百九十四兩相等則一根必與六十三兩相等而五根必與三百一十五兩相等即乙銀數丙銀數既為二根多一百一十四兩乃以六十三兩倍之得一百二十六兩即二根之數亦即乙五分之二之數加一百一十四兩共得二百四十兩即丙銀數甲銀比乙銀所多之數既為丙銀四分之一乃以丙銀數四歸之得六十兩與乙銀三百一十五兩相加得三百七十五兩即甲銀數也此疊借互徵法用方程法算之亦可設如甲乙丙三人有銀但知甲銀七十兩乙銀三十四兩而丙銀不知數如以丙銀與甲銀相減又以丙銀與乙銀相減其甲銀之餘則三倍於乙問丙銀若干法借一根為丙銀數則甲丙相減之餘為七十兩少一根乙丙相減之餘為三十四兩少一根甲之餘銀既三倍於乙則以乙丙相減之餘三十四兩少一根三因之得一百零二兩少三根是為七十兩少一根與一百零二兩少三根相等少一根與少三根各加三根得七十兩多二根與一百零二兩相等七十兩與一百零二兩各減七十兩則餘二根與三十二兩相等二根既與三十二兩相等則一根必與十六兩相等即丙銀數與甲銀七十兩相減餘五十四兩與乙銀三十四兩相減餘十八兩是甲餘銀為乙餘銀之三倍也此疊借互徵法用方程法算之亦可設如甲乙丙三人各有銀不言數但知將乙銀十兩與甲則甲乙二人之銀相等若將丙銀十四兩與乙則乙丙二人之銀相等若將甲銀十八兩與丙則丙銀比甲銀為五倍問三人各銀若干法借一根為甲原銀數則乙之原銀必為一根多二十兩以十兩與甲則皆為一根多十兩其數相等丙之原銀必為一根多四十八兩乙之原銀既為一根多二十兩再加十四兩俱為一根多三十四兩其數相等又甲之原銀既為一根以十八兩與丙計之則為一根少十八兩丙之原銀既為一根多四十八兩今再加十八兩則為一根多六十六兩此丙之一根多六十六兩比甲之一根少十八兩既為五倍則以甲之一根少十八兩五因之得五根少九十兩而與丙之一根多六十六兩為相等少九十兩與多六十六兩各加九十兩得五根與一根多一百五十六兩相等五根與一根各減一根則餘四根與一百五十六兩相等四根既與一百五十六兩相等則一根必與三十九兩相等即甲原銀之數甲原銀既為三十九兩則乙原銀必為五十九兩以十兩與甲則皆得四十九兩乙原銀既為五十九兩則丙原銀必為八十七兩以十四兩與乙則皆得七十三兩丙原銀既為八十七兩甲原銀既為三十九兩甲以十八兩與丙則丙為一百零五兩而甲為二十一兩是丙銀比甲銀為五倍也此疊借互徵法用方程法算之亦可設如甲乙丙三人有銀但知甲銀二萬五千兩乙得甲丙共銀二分之一丙得甲乙共銀八分之一問乙丙二人各銀幾何法借二根為丙銀數則甲乙共銀數為十六根乙銀數為十六根少二萬五千兩甲丙共銀數為二根多二萬五千兩半之又得乙銀數為一根多一萬二千五百兩十六根少二萬五千兩與一根多一萬二千五百兩既同為乙銀數則為相等十六根少二萬五千兩與一根多一萬二千五百兩各加二萬五千兩得十六根與一根多三萬七千五百兩相等十六根與一根各減一根則餘十五根與三萬七千五百兩相等十五根既與三萬七千五百兩相等則二根必與五千兩相等即丙銀數與甲銀二萬五千兩相加得三萬兩半之得一萬五千兩即乙銀數也此疊借互徵法用方程法算之亦可設如一商貿易不言本銀若干但知第一次所得利銀比本銀為四分之一用去銀二十兩第二次所得利銀比第二次本銀為五分之二用去銀十四兩第三次所得利銀比第三次本銀為三分之一用去銀十五兩合計所餘利銀共八十兩問原本銀及每次所得利銀各幾何法借十二根為原本銀數則第一次利銀為三根本利相加得十五根內減用去銀二十兩得十五根少二十兩為第二次本銀數取其五分之二得六根少八兩為第二次利銀數本利相加得二十一根少二十八兩又減用去銀十四兩得二十一根少四十二兩為第三次本銀數取其三分之一得七根少十四兩為第三次利銀數以第三次本利相加得二十八根少五十六兩又減用去銀十五兩則為二十八根少七十一兩而原借十二根與所餘利銀八十兩遂為十二根多八十兩是為二十八根少七十一兩與十二根多八十兩相等少七十一兩與多八十兩各加七十一兩得二十八根與十二根多一百五十一兩相等二十八根與十二根各減十二根得十六根與一百五十一兩相等十六根既與一百五十一兩相等則十二根必與一百一十三兩二錢五分相等即原本銀數四歸之得二十八兩三錢一分二釐五毫即第一次所得利銀數本利相加減用去二十兩得一百二十一兩五錢六分二釐五毫即第二次本銀數取其五分之二得四十八兩六錢一二分五釐即第二次所得利銀數本利一相加又減用去十四兩得一百五十六兩一錢八分七釐五毫即第三次本銀數三歸之得五十二兩零六分二釐五毫即第三次所得利銀數本利相加又減用去十五兩得一百九十三兩二錢五分即原本銀與三次所餘共利銀相加之數蓋原本銀一百一十三兩二錢五分又加所餘共利銀八十兩即一百九十三兩二錢五分兩數相等也此疊借互徵法設如有人貿易四次第一次所得利銀比原本銀為九分之一用去銀比原本銀為十二分之一第二次所得利銀比原本銀為六分之一用去銀比原本銀為九分之四第三次所得利銀比原本銀為四分之一用去銀比原本銀為二分之一第四次所得利銀比原本銀為三分之一用去銀比原本銀為三分之二合四次利銀已用盡仍用本銀六百兩問本利銀各若干法借三十六根為本銀數借三十六者以九與十二與六皆係用三可以度盡之數獨四與九不能度盡故借四九相乘之數則各分母皆可以度盡也則第一次利銀為四根第二次利銀為六根第三次利銀為九根第四次利銀為十二根四數相加共得三十一根為四次利銀之共數第一次用去為三根第二次用去為十六根第三次用去為十八根第四次用去為二十四根四數相加共得六十一根為四次用去銀之共數以四次利銀皆用盡仍用本銀六百兩計之則四次利銀之共數三十一根仍如本銀六百兩乃與四次用去銀之共數六十一根相等也三十一根與六十一根各減去三十一根則餘三十根與六百兩相等三十根既與六百兩相等則一根必與二十兩相等而三十六根必與七百二十兩相等即本銀數三十一根又與六百二十兩相等即利銀數六十一根又與一千二百二十兩相等即用去銀數也此疊借互徵法設如甲乙丙丁四人同出銀作生理內甲丙丁三人所出銀不言數但知乙出銀五兩若將甲所出銀二分之一與乙又將乙所出銀五分之一與丙又將丙所出銀七分之一與丁又將丁所出銀九分之一與甲則四人所出之銀皆相等問四人各出銀若干法借二根為甲出銀數則甲將一根二分之一與乙乙將一兩五分之一與丙是甲為一根乙為一根多四兩今以甲與乙相較則數不相等蓋因甲尚當得丁銀九分之一也甲因未得丁銀九分之一故比乙銀少四兩是四兩即丁銀之九分之一也九分之一既為四兩則三十六兩即為丁原銀數丁既以四兩與甲則丁所餘止三十二兩以丁三十二兩與乙一根多四兩相較其數又不相等蓋因丁尚當得丙銀七分之一也丁因未得丙銀七分之一故比乙銀差一根少二十八兩於乙一根多四兩內減去三十二兩即餘一根少二十八兩也是一根少二十八兩即丙銀之七分之一也七分之一既為一根少二十八兩則七根少一百九十六兩即為丙原銀數丙既以一根少二十八兩與丁則丙所餘為六根少一百六十八兩再加乙所與之一兩則丙得六根少一百六十七兩矣夫四人既按分各與之則乙為一根多四兩甲餘一根又得丁四兩亦為一根多四兩丁餘三十二兩又得丙一根少二十八兩亦為一根多四兩其數皆相等則丙之六根少一百六十七兩亦必與一根多四兩為相等矣少一百六十七兩與多四兩各加一百六十七兩得六根與一根多一百七十一兩相等六根與一根各減一根則餘五根與一百七十一兩相等五根既與一百七十一兩相等則一根必與三十四兩二錢相等而二根必與六十八兩四錢相等即甲所出銀數又七根必與二百三十九兩四錢相等內減去一百九十六兩丙原為七根少一百九十六兩餘四十三兩四錢為丙所出銀數乃於丁所出銀內減九分之一餘三十二兩加丙銀之七分之一六兩二錢得三十八兩二錢於丙所出銀內減七分之一餘三十七兩二錢加乙銀之五分之一一兩亦得銀三十八兩二錢於乙所出銀內減五分之一餘四兩加甲銀之二分之一三十四兩二錢亦得銀三十八兩二錢於甲所出銀內減二分之一餘三十四兩二錢加丁銀之九分之一四兩亦得銀三十八兩二錢也此疊借互徵法用方程法算之亦可設如甲乙丙丁戊五人各出銀不言數但知甲乙共銀二百四十兩丙銀為甲銀三分之一丁銀為乙銀四分之一戊銀七十二兩與丙丁共數相等問五人各銀若干法借十二根為甲銀數則乙銀為二百四十兩少十二根丙銀為四根丁銀為六十兩少三根以丙丁二數相加得六十兩多一根而與戊銀七十二兩相等七十二兩與六十兩各減六十兩得十二兩與一根相等十二兩既與一根相等則十二根必與一百四十四兩相等即甲銀數甲乙共銀二百四十兩內減甲銀數餘九十六兩即乙銀數將甲銀數三歸之得四十八兩即丙銀數將乙銀數四歸之得二十四兩即丁銀數也此疊借互徵法用方程法算之亦可設如有銀六百兩令甲乙丙丁戊己六人分之甲乙共得二百兩丙丁共得二百兩戊己共得二百兩丙所得銀比甲所得銀為四分之一戊所得銀比丁所得銀為三分之一乙所得銀比己所得銀為二分之一問六人各分銀幾何法借十二根為甲所得銀數則乙所得銀為二百兩少十二根丙所得銀為三根丁所得銀為二百兩少三根戊所得銀為六十六兩又三分兩之二少一根戊比丁為三分之一以三除丁數即是己所得銀為四百兩少二十四根乙比己為二分之一以二乘乙數即是以戊己兩數相加得四百六十六兩又三分兩之二少二十五根是為二百兩與四百六十六兩又三分兩之二少二十五根相等二百兩與四百六十六兩又三分兩之二少二十五根各加二十五根得二百兩多二十五根與四百六十六兩又三分兩之二相等二百兩與四百六十六兩又三分兩之二各減二百兩則餘二十五根與二百六十六兩又三分兩之二相等二十五根既與二百六十六兩又三分兩之二相等則一根必與十兩又三分兩之二相等三根必與三十二兩相等即丙所得銀數四因之得一百二十八兩為甲所得銀數甲乙共得二百兩內減甲所得銀數餘七十二兩為乙所得銀數丙丁共得二百兩內減丙所得銀數餘一百六十八兩為丁所得銀數乙所得銀七十二兩二因之得一百四十四兩為己所得銀數丁所得銀一百六十八兩三歸之得五十六兩為戊所得銀數也此疊借互徵法用方程法算之亦可設如有駝一羣七十二個馬一羣不知數牛一羣與駝馬相併之數等羊一羣與駝馬相乘之數等又為牛數之六十倍問馬牛羊各幾何法借一根為馬數則一根多七十二為牛數以駝數七十二與馬數一根相乘得七十二根為羊數再以牛數一根多七十二與六十相乘得六十根多四千三百二十亦為羊數此兩數既同為羊數則為相等七十二根與六十根各減六十根則餘十二根與四千三百二十相等十二根既與四千三百二十相等則一根必與三百六十相等即馬一羣之數與駝數相加得四百三十二即牛一羣之數再與六十相乘得二萬五千九百二十即羊一羣之數以駝七十二與馬三百六十相乘亦得二萬五千九百二十為相等也此疊借互徵法用方程法算之亦可設如有大小二石不知重數有銅條一根重十二兩均分十二分以繩繫於第五分之上一頭五分一頭七分將大石挂於銅條之端離提繫五分而以小石作匜稱之離提繫六分始平又將小石挂於銅條之端離提繫五分而以大石作匜稱之離提繫四分始平問二石各重若干法先以五分加一倍與十二分相減餘二分折半得一分與五分相加為六分乃以五分為一率六分為二率餘二分之重二兩為三率求得四率二兩四錢即五分之端加二兩四錢始與七分相平也今大石離提繫五分小石離提繫六分而平是大石重六分小石重五分而大石多二兩四錢則小石為大石六分之五而少二兩也銅條五分之端應加二兩四錢而平今大石在五分之一頭是大石多二兩四錢也將二兩四錢以大石之六分除之每分得四錢是大石比小石每分多四錢以小石五分計之則大石比小石多二兩故小石為大石之六分之五而少二兩也又小石離提繫五分大石離提繫四分而平是小石重四分大石重五分而小石多二兩四錢則小石為大石五分之四而多二兩四錢也銅條五分之端應加二兩四錢而平今小石在五分之一頭是小石多二兩四錢也將二兩四錢以小石之四分除之每分得六錢是小石比大石每分多六錢以小石四分計之則小石比大石多二兩四錢故小石為大石之五分之四而多二兩四錢也乃借三十根六分五分相乘之數為大石之重數以小石為大石六分之五而少二兩計之則小石之重為二十五根少二兩以小石為大石五分之四而多二兩四錢計之則小石之重又為二十四根多二兩四錢此兩數為相等兩邊各加二兩得二十五根與二十四根多四兩四錢相等兩邊再各減去二十四根餘一根與四兩四錢相等一根既與四兩四錢相等則三十根必與一百三十二兩相等即大石之重數六歸之得二十二兩五因之得一百一十兩減去二兩得一百零八兩即小石之重數或以大石之重數五歸之得二十六兩四錢四因之得一百零五兩六錢加二兩四錢亦得一百零八兩為小石之重數也此疊借互徵法用方程法算之亦可設如有銀買馬牛二色馬四匹牛八頭共價五十六兩又馬三匹牛五頭共價三十八兩問馬牛各價若干法借一根為牛一頭之價則前牛八頭之共價為八根前馬四匹之共價為五十六兩少八根而後牛五頭之共價為五根乃以前馬四匹為一率共價五十六兩少八根為二率後馬三匹為三率求得四率四十二兩少六根為後馬三匹之共價內加後牛五頭之共價五根得四十二兩少一根為後馬三匹牛五頭之共價與後共價三十八兩相等四十二兩少一根與三十八兩各加一根得四十二兩與三十八兩多一根相等四十二兩與三十八兩多一根再各減去三十八兩則餘四兩與一根相等即牛一頭之價八因之得三十二兩為前牛八頭之共價於前共價五十六兩內減之餘二十四兩為前馬四匹之共價四歸之得六兩為馬一匹之價又以後馬三匹因之得十八兩為後馬三匹之共價於後共價三十八兩內減之餘二十兩為後牛五頭之共價五歸之亦得四兩為牛一頭之價也此二色和數方程法設如有錢買桃梨二色桃四個比梨八個少錢十二文桃九個比梨六個多錢二十一文問桃梨多價若干法借一根為桃一個之價則前桃四個之共價為四根前梨八個之共價為十二文多四根而後桃九個之共價為九根乃以前梨八個為一率共價十二文多四根為二率後梨六個為三率求得四率九文多三根為後梨六個之共價加後桃比梨多錢二十一文得三十文多三根與後桃九個之共價九根相等九桃比六梨多二十一文故以二十一文與六梨之價相加即與九桃之價等也三十文多三根與九根各減去三根則餘三十文與六根相等三十文既與六根相等則五文必與一根相等即桃一個之價四因之得二十文為前桃四個之共價加入桃比梨少錢十二文得三十二文為前梨八個之共價八歸之得四文為梨一個之價又以後梨六個因之得二十四文為後梨六個之共價加入桃比梨多錢二十一文得四十五文為後桃九個之共價九歸之亦得五文為桃一個之價也此二色較數方程法設如有銀買緞紗紬三色初次買緞二匹紗六匹紬八匹共價八十四兩二次買緞一匹紗四匹紬七匹共價六十兩三次買緞三匹紗五匹紬九匹共價九十兩問緞紗紬每匹各價若干法借一根為紬每匹之價則初次紬之共價為八根二次紬之共價為七根三次紬之共價為九根而初次緞之共價為八十四兩少八根仍少紗六匹乃以初次緞二匹為一率緞價八十四兩少八根仍少紗六匹為二率二次緞一匹為三率求得四率四十二兩少四根仍少紗三匹為二次緞價加入二次紬價七根紗四匹得四十二兩多三根仍多紗一匹為二次緞一匹紗四匹紬七匹之共價與二次共價六十兩相等四十二兩多三根多紗一匹與六十兩各減去四十二兩餘三根多紗一匹與十八兩相等三根多紗一匹與十八兩再各減去三根餘紗一匹與十八兩少三根相等即紗一匹之價為十八兩少三根也又以二次緞一匹為一率緞價四十二兩少四根仍少紗三匹為二率三次緞三匹為三率求得四率一百二十六兩少十二根仍少紗九匹為三次緞價加入三次紬價九根紗五匹得一百二十六兩少三根仍少紗四匹為三次緞三匹紗五匹紬九匹之共價與三次共價九十兩相等一百二十六兩少三根少紗四匹與九十兩各加紗四匹得一百二十六兩少三根與九十兩多紗四匹相等一百二十六兩少三根與九十兩多紗四匹再各減去九十兩餘三十六兩少三根與紗四匹相等即紗四匹之價為三十六兩少三根也前所得紗一匹之價為十八兩少三根今又得紗四匹之價為三十六兩少三根此二分雖同而匹數不一故又以紗一匹為一率前所得之紗一匹之價十八兩少三根為二率今紗四匹為三率求得四率七十二兩少十二根為紗四匹之價乃與後所得紗四匹之價三十六兩少三根相等三十六兩少三根與七十二兩少十二根各加十二根得三十六兩多九根與七十二兩相等三十六兩多九根與七十二兩再各減去三十六兩餘九根與三十六兩相等九根既與三十六兩相等則一根必與四兩相等即紬一匹之價也紗一匹之價既為十八兩少三根則於十八兩內減去三根之共數十二兩餘六兩即紗一匹之價初次紗六匹以紗價六兩乘之得三十六兩初次紬八匹以紬價四兩乘之得三十二兩兩數相加得六十八兩與初次共銀八十四兩相減餘十六兩為緞二匹之價二歸之得八兩即緞一匹之價也其二次緞之共價為八兩紗之共價為二十四兩紬之共價為二十八兩相加共得六十兩三次緞之共價為二十四兩紗之共價為三十兩紬之共價為三十六兩相加共得九十兩皆合原數也此三色和數方程法設如甲乙丙三人各有銀買銅鐵錫三色甲買銅二斤鐵二斤錫一斤共銀九錢乙買銅三斤比鐵六斤錫二斤之價多二錢丙買銅二斤鐵四斤與錫四斤之價相等問銅鐵錫每斤各價若干法借一根為錫每斤之價則甲錫之價即為一根乙錫之價為二根丙錫之價為四根而甲銅之共價為九錢少一根仍少鐵二斤乃以甲銅二斤為一率銅價九錢少一根仍少鐵二斤為二率乙銅三斤為三率求得四率一兩三錢五分少一根半仍少鐵三斤為乙銅三斤之價內減比錫二斤鐵六斤所多之二錢餘一兩一錢五分少一根半仍少鐵三斤與乙錫二斤之共價二根多鐵六斤相等一兩一錢五分少一根半少鐵三斤與二根多鐵六斤各加鐵三斤得一兩一錢五分少一根半與二根多鐵九斤相等一兩一錢五分少一根半與二根多鐵九斤再各減去二根餘一兩一錢五分少三根半與鐵九斤相等即鐵九斤之價為一兩一錢五分少三根半也又以甲銅二斤之共價九錢少一根仍少鐵二斤即為丙銅二斤之共價丙銅與甲銅俱為二斤故其共價相等省一四率也加鐵四斤得九錢少一根多鐵二斤與丙錫四斤之共價四根相等九錢少一根多鐵二斤與四根各加一根得九錢多鐵二斤與五根相等九錢多鐵二斤與五根再各減去九錢餘鐵二斤與五根少九錢相等即鐵二斤之價為五根少九錢也前所得鐵九斤之價為一兩一錢五分少三根半今又得鐵二斤之價為五根少九錢此二分雖同而斤數不一故又以鐵二斤為一率今所得之鐵二斤之價五根少九錢為二率前所得之鐵九斤為三率求得四率二十二根半少四兩零五分為鐵九斤之價乃與前所得鐵九斤之價一兩一錢五分少三根半相等二十二根半少四兩零五分與一兩一錢五分少三根半各加四兩零五分得二十二根半與五兩二錢少三根半相等二十二根半與五兩二錢少三根半再各加三根半得二十六根與五兩二錢相等二十六根既與五兩二錢相等則一根必與二錢相等即錫每斤之價也鐵二斤之價既為五根少九錢則以五根之共數一兩內減去九錢餘一錢為鐵二斤之共價半之得五分即鐵每斤之價於甲共銀九錢內減去鐵二斤之價一錢又減去錫一斤之價二錢餘六錢為銅二斤之共價半之得三錢為銅每斤之價也其乙銅三斤之共價為九錢乙鐵六斤之共價為三錢乙錫二斤之共價為四錢是銅三斤比錫二斤鐵六斤之價多二錢也丙銅二斤之共價為六錢丙鐵四斤之共價為二錢丙錫四斤之共價為八錢是銅二斤鐵四斤與錫四斤之價等也此三色和較兼用方程法御製數理精藴下編卷三十四
