body:
  text: 欽定四庫全書御製數理精藴下編卷四十末部十比例規解分圓線假數尺正弦線數尺正切線線假正割線割盡日晷法正弦假切數尺線假數尺分圓線即圓內之通弦線自甲樞心至乙丙兩股之末作甲乙甲丙二線依幾何原本十二卷二十節之法分之即為分圓線也或用八線表三十分之正弦倍之即一度之通弦一度之正弦倍之即二度之通弦一度三十分之正弦倍之即三度之通弦至於九十度之正弦倍之即一百八十度之通弦以所得通弦之數於分釐尺上取其度按度截比例尺之甲乙甲丙二線即成分圓線也設如甲乙半徑六寸丙乙弧二十九度問丙乙通弦幾何法以比例尺分圓線六十度之兩㸃依半徑六寸之度展開勿令移動次取分圓線二十九度兩㸃相距之度於分釐尺上量之得三寸即丙乙通弦之數也蓋圓之半徑與六十度之通弦等六十度之通弦既為六寸則二十九度相距之三寸即為二十九度之通弦可知矣設如甲乙半徑六寸丙乙通弦三寸問丙乙弧度幾何法以比例尺分圓線六十度之兩㸃依半徑六寸之度展開勿令移動次取通弦三寸之度於分圓線上尋至二十九度之兩㸃其相距之度恰合即丙乙弧為二十九度也蓋圓之半徑與六十度之通弦等通弦六寸相當之度為六十度則丙乙通弦三寸相當之二十九度即為丙乙弧之度可知矣設如丙乙弧三十一度丙乙通弦一寸零三釐問甲乙半徑幾何法以比例尺分圓線三十一度之兩㸃依通弦一寸零三釐之度展開勿令移動次取六十度兩㸃相距之度於分釐尺上量之得二寸即甲乙半徑也蓋六十度之通弦與圓之半徑等三十一度之通弦為一寸零三釐則六十度之通弦二寸即為圓之半徑可知矣設如圓徑六寸內容五等邊形問每一邊幾何法以比例尺分圓線六十度之兩㸃依半徑三寸之度展開勿令移動次以圓周三百六十度用五歸之得七十二度即五等邊形每邊相當之弧乃取分圓線七十二度兩㸃相距之度於分釐尺上量之得三寸五分有餘即圓內五等邊形之一邊也蓋圓內容五邊形之每一邊即七十二度之通弦而半徑又即六十度之通弦六十度之通弦為三寸則七十二度之通弦三寸五分有餘即為圓內容五等邊形之一邊可知矣設如有甲乙丙三角形問乙角之度幾何法以乙角為心任以一處為界作丁戊弧則乙丁乙戊皆為圓之半徑丁己戊為乙角之通弦乃以比例尺分圓線六十度之兩㸃依乙丁半徑之度展開勿令移動次取丁己戊通弦之度於分圓線上尋至三十度之兩㸃其相距之度恰合即乙角為三十度也正弦線自甲樞心至乙丙兩股之末作甲乙甲丙二線用八線表正弦線自一度至九十度之數自八十度至九十度正弦每度之較甚微若尺小不能分或隔一度而作一㸃或隔五度而作一㸃於分釐尺上取其度按度截比例尺之甲乙甲丙二線即成正弦線也設如甲乙半徑六寸丙乙弧二十一度問丙丁正弦幾何法以比例尺正弦線九十度之兩㸃依半徑六寸之度展開勿令移動次取正弦線二十一度兩㸃相距之度於分釐尺上量之得二寸一分五釐即丙丁正弦之數也蓋圓之半徑與九十度之正弦等九十度之正弦既為六寸則二十一度相距之二寸一分五釐即為二十一度之正弦可知矣若用分圓線則以分圓線六十度之兩㸃依半徑六寸之度展開勿令移動次以丙乙弧二十一度倍之得四十二度即取分圓線四十二度兩㸃相距之度於分釐尺上量之得四寸三分為四十二度之通弦折半得二寸一分五釐即丙丁正弦之數也蓋正弦之弧為弧背之一半正弦為通弦之一半故求得倍弧之通弦折半即半弧之正弦此分圓線與正弦線可以互相為用也設如甲乙半徑六寸乙丁正弦三寸問乙丙弧之度幾何法以比例尺正弦線九十度之兩㸃依半徑六寸之度展開勿令移動次取正弦三寸之度於正弦線上尋至三十度之兩㸃其相距之度恰合即乙丙弧為三十度也蓋圓之半徑與九十度之正弦等正弦六寸相當之度為九十度則正弦三寸相當之三十度為丙乙弧之度可知矣若用分圓線則以分圓線六十度之兩㸃依半徑六寸之度展開勿令移動次以正弦三寸倍之得六寸於分圓線上尋之得六十度折半得三十度亦即乙丙弧之度也設如甲乙弧三十二度甲丙正弦一寸零六釐問乙丁半徑幾何法以比例尺正弦線三十二度之兩㸃依正弦一寸零六釐之度展開勿令移動次取九十度兩㸃相距之度於分釐尺上量之得二寸即乙丁半徑也蓋九十度之正弦與圓之半徑等三十二度之正弦為一寸零六釐則九十度之正弦二寸即為圓之半徑可知矣若用分圓線則以三十二度倍之得六十四度以正弦一寸零六釐倍之得通弦二寸一分二釐乃以分圓線六十四度之兩㸃依通弦二寸一分二釐之度展開勿令移動次取分圓線六十度兩㸃相距之度於分釐尺上量之得二寸即乙丁半徑也設如簡平儀下盤作節氣線問其法若何法自甲圓心作乙丙徑線又自甲平分作赤道線即為春分秋分線乃以比例尺正弦線九十度之兩㸃依甲乙半徑之度展開勿令移動次取二十三度半兩㸃相距之度二至黃赤道大距度於赤道線左右丙乙徑上作識如丁戊依識與赤道平行作線即為夏至冬至線丁為夏至戊為冬至復以正弦線九十度之兩㸃依甲戊二十三度半之正弦線度展開勿令移動而取十五度三十度四十五度六十度七十五度之各兩㸃相距之度於赤道左右作識悉與赤道平行作線即成二十四節氣線也蓋赤道即春分秋分距二分十五度之線左為驚蟄寒露右為清明白露距二分三十度之線左為雨水霜降右為穀雨處暑距二分四十五度之線左為立春立冬右為立夏立秋距二分六十度之線左為大寒小雪右為小滿大暑距二分七十五度之線左為小寒大雪右為芒種小暑距二分九十度之線左即冬至右即夏至也設如簡平儀下盤欲作時刻線問其法若何法如前作徑線及赤道二至線乃以比例尺正弦線九十度之兩㸃依半徑即春秋分線之半之度展開勿令移動次取十五度三十度及四十五度六十度七十五度之各兩㸃相距之度自圓心於赤道線上下作識即春秋分時之二十四時刻也又以比例尺正弦線九十度之兩㸃依冬夏至線之半展開勿令移動取十五度三十度四十五度六十度七十五度之各兩㸃相距之度自圓徑與二至線相交之處於二至線上下作識即二至時之二十四時刻也乃用三㸃串圓之法將二至及二分之㸃連為一線即成時刻線矣蓋中心橫線為卯正酉正距中心十五度之線上為辰初酉初下為卯初戌初距中心三十度之線上為辰正申正下為寅正戌正距中心四十五度之線上為巳初申初下為寅初亥初距中心六十度之線上為巳正未正下為丑正亥正距中心七十五度之線上為午初未初下為丑初子初距中心九十度之線即圓周上為午正下為子正也正切線自甲樞心至乙丙兩股之末作甲乙甲丙二線用八線表正切線自一度至四十五度之數於分釐尺上取其度按度截比例尺之甲乙甲丙二線即成正切線也至於四十五度以後則與四十五度以前相為正餘蓋四十五度之正切線與半徑等四十五度以前之正切線即四十五度以後之餘切線而半徑與正切之比同於餘切與半徑之比故切線止用四十五度即足九十度之用也設如甲乙半徑六寸乙丙弧三十五度問丁乙切線幾何法以比例尺正切線四十五度之兩㸃依半徑六寸之度展開勿令移動次取正切線三十五度兩㸃相距之度於分釐尺上量之得四寸二分即丁乙切線之數也蓋圓之半徑與四十五度之切線等四十五度之切線既為六寸則三十五度相距之四寸二分即為三十五度之切線可知矣設如甲乙半徑六寸乙丙弧五十八度問丁乙切線幾何法以五十八度與九十度相減餘三十二度為餘弧乃以比例尺正切線三十二度之兩㸃依半徑六寸之度展開勿令移動次取四十五度兩㸃相距之度於分釐尺上量之得九寸六分即丁乙切線之數也蓋圓之半徑與四十五度之切線等而三十二度之正切即為五十八度之餘切夫半徑與正切之比既同於餘切與半徑之比故以三十二度相距之六寸當半徑而四十五度相距之九寸六分即為五十八度之切線也凡過四十五度者皆倣此設如甲乙半徑六寸丙乙切線四寸二分問丁乙弧之度幾何法以比例尺正切線四十五度之兩㸃依半徑六寸之度展開勿令移動次取切線四寸二分之度於正切線上尋至三十五度之兩㸃其相距之度恰合即丁乙弧為三十五度也蓋圓之半徑與四十五度之切線等切線六寸相當之度為四十五度則切線四寸二分相當之三十五度即為乙丁弧之度可知矣設如甲乙弧三十五度丙乙切線一寸零五釐問丁乙半徑幾何法以比例尺正切線三十五度之兩㸃依切線一寸零五釐之度展開勿令移動次取正切線四十五度兩㸃相距之度於分釐尺上量之得一寸五分即丁乙半徑也蓋四十五度之切線與圓之半徑等三十五度之切線為一寸零五釐則四十五度之切線一寸五分即為丁乙半徑可知矣設如地平上立表髙四尺日中影長三尺六寸零二釐問日髙度幾何法以比例尺正切線四十五度之兩㸃依分釐尺四寸之度展開勿令移動次取分釐尺三寸六分零二豪之度於正切線上尋至四十二度之兩㸃其相距之度恰合乃以四十二度與九十度相減得四十八度為日距地平之髙度也蓋地平上立表取影以表為半徑則影為日距地平之餘切線如甲乙表髙為半徑乙丙影長為切線求得乙丁弧為甲角之度故與九十度相減得丙角始為日距地平之度也設如壁上立橫表四尺日中影長二尺四寸零三釐問日髙度幾何法以比例尺正切線四十五度之兩㸃依分釐尺四寸之度展開勿令移動次取分釐尺二寸四分零三豪之度於正切線上尋至三十一度之兩㸃其相距之度恰合即日距地平之髙為三十一度也蓋壁上立橫表取影以表為半徑則影即日距地平之正切線如甲乙橫表為半徑甲丙影長為切線求得甲丁弧為乙角之度與乙丙戊角之度等故即為日距地平之髙度也正割線自甲樞心至乙丙兩股之末作甲乙甲丙二線用八線表正割線自初度至七十度之數初度割線即圓之半徑自一度至十度其每度之較甚微若尺小不能分或隔五度作一㸃自七十度以上漸與切線平行其數甚大尺上不能容故止取七十度也於分釐尺上取其度按度截比例尺之甲乙甲丙二線即成正割線也設如甲乙半徑六寸乙丙弧四十一度問甲丁割線幾何法以比例尺正割線初度之兩㸃依半徑六寸之度展開勿令移動次取正割線四十一度兩㸃相距之度於分釐尺上量之得七寸九分五釐即甲丁割線之數也蓋初度尚無切線故其割線即圓之半徑初度之割線既為六寸則四十一度相距之七寸九分五釐即為四十一度之割線可知矣設如甲乙半徑六寸甲丙割線一尺二寸問丁乙弧之度幾何法以比例尺正割線初度之兩㸃依半徑六寸之度展開勿令移動次取割線一尺二寸之度於正割線上尋至六十度之兩㸃其相距之度恰合即丁乙弧為六十度也蓋初度之割線即圓之半徑割線六寸相當之度為初度則割線一尺二寸相當之六十度即為丁乙弧之度可知矣設如甲乙弧四十四度半丙丁割線二寸一分零三豪問丁乙半徑幾何法以比例尺正割線四十四度半之兩㸃依割線二寸一分零三豪之度展開勿令移動次取初度兩㸃相距之度於分釐尺上量之得一寸五分即丁乙半徑之數也蓋初度之割線即圓之半徑四十四度半之割線為二寸一分零三豪則初度之割線一寸五分即為丁乙半徑可知矣作地平日晷法以北極出地四十度為準法先作南北東西線相交於甲各成直角次作甲乙丙晷表取甲角五十度為赤道髙丙角四十度為北極高而乙角為直角次取晷表之甲乙度截南北線於丁為半徑作圜用比例尺分圓線比得十五度三十度四十五度六十度七十五度之各分分圜界作識乃自丁圜心引出各界作線至東西線上即得午正前後各初正時刻或以甲乙為半徑用比例尺正切線比得十五度三十度四十五度六十度七十五度之各切線自甲左右作識於東西線上亦即午正前後各初正時刻甲為午正距甲十五度前為午初後為未初距甲三十度前為巳正後為未正距甲四十五度前為巳初後為申初距甲六十度前為辰正後為申正距甲七十五度前為辰初後為酉初也乃以晷表之丙為晷心至各㸃作線即時刻線也卯正酉正各距午正前後九十度故自丙晷心與東西線平行作線即卯正酉正線卯正以前酉正以後則日轉在北影轉在南故與辰初酉初反對作線即卯初戌初線也次按刻細分則自午正甲㸃每加三度四十五分而得一刻蓋十五度當四刻而三度四十五分則當一刻也此法蓋因北極為天之樞赤道為天之帶太陽雖由黃道而行時刻皆以赤道而定故以晷表之甲乙指赤道丙乙指北極而東西線即為赤道線丙乙即為過極經圈甲乙即為半徑午正太陽在正南則影在正北若偏東偏西若干度則其切線即其影之長故以甲乙為半徑作圜而分圜界者即所以求切線至於用比例尺正切線者正以切線分時刻也地平日晷作節氣線法法以甲乙丙晷表之甲角與丙乙平行作戊己線而以甲乙為半徑用比例尺正切線比得二十三度三十分二十二度四十分二十度十二分十六度二十三分十一度三十分五度五十五分之各切線自甲左右作識於戊己線上即得各節氣日影界春秋分為赤道冬至距赤道南夏至距赤道北各二十三度三十分小寒大雪距赤道南芒種小暑距赤道北各二十二度四十分大寒小雪距赤道南小滿大暑距赤道北各二十度十二分立春立冬距赤道南立夏立秋距赤道北各十六度二十三分雨水霜降距赤道南穀雨處暑距赤道北各十一度三十分驚蟄寒露距赤道南清明白露距赤道北各五度五十五度或以二十三度三十分之正切線甲戊為半徑作圜將甲乙線引長平分為四象限用比例尺分圓線比得十五度三十度四十五度六十度七十五度之各圜界又以乙戊為半徑作戊己弧而依所分甲戊小圜界各與甲乙平行作線截戊己弧界又自乙至戊己各弧界作線截戊甲己線亦即得各節氣日影界甲為春秋分距甲十五度左為驚蟄寒露右為清明白露距甲三十度左為雨水霜降右為穀雨處暑距甲四十五度左為立春立冬右為立夏立秋距甲六十度左為大寒小雪右為小滿大暑距甲七十五度左為小寒大雪右為芒種小暑乃自乙至各㸃作線與午正時刻線相交其相交之㸃即午正各節氣日影界也若求未初節氣線則先以丙乙為半徑作圜又依甲乙度截午正線於庚而以未初線與赤道相交之辛㸃至庚相距之度截圜界於壬作壬辛線乃與壬辛取直角作癸子十字線以壬辛為半徑如前法比得二十三度三十分等距緯之各切線於辛左右作識於癸子線乃自壬至各㸃作線與未初時刻線相交其相交之㸃即未初各節氣日影界也倣此類推則得各時刻之各節氣日影界或用捷法另取一紙畫甲乙丙表式將乙甲乙戊乙己類各節氣線俱畫長些如求未初節氣線則以丙合於晷心丙而以甲乙春秋分線合於未初時刻線與赤道相交之辛㸃乃於各節氣線與未初時刻線相交之處俱作㸃識之即得未初各節氣之日影界餘倣此乃將各時刻線與莭氣線相交之㸃作線聫之即成節氣線也蓋春秋分日行赤道而晷表之甲乙指赤道故赤道線即為春秋分線春秋分時日在赤道則午正日影在甲春分以後秋分以前日在赤道北夏至而極北則影在南春分以前秋分以後日在赤道南冬至而極南則影在北故以甲乙為半徑而取各距度之切線為各節氣之影界且切線與半徑成直角故先與甲乙取直角作十字線而後得其切線也甲乙本直立之線與之取直角則戊端應在晷面下己端應在空中出晷面上而其距午正線之逺近與平面斜線之度同蓋平與立之理一也其以冬夏至之影界為半徑作圜用分圓線求之者蓋半徑與冬夏至距緯正弦之比同於各節氣距二分度之正弦與各節氣距緯正弦之比故以甲戊為半徑作圜為一率又以乙戊為半徑作戊己弧則甲戊切線即變為冬夏至距緯之正弦為二率而用分圓線所分各圜界即得各節氣距二分度之正弦為三率其自圜界作線截戊己弧即得各節氣距緯之正弦為四率既得各節氣之距緯度又自乙至各弧界作線截戊甲己線則戊甲己線仍為各節氣距緯之切線故用正弦即如用切線也然雖得各節氣之影界而猶不在午正線之上故自乙至各節氣㸃作線交於午正線乃自乙表端照至各節氣㸃所必經之處故為午正節氣日影界也至於未初春秋分時則日影至辛乙辛為影線成乙甲辛勾股形甲乙為股甲乙表直立故為股甲辛為勾乙辛為弦故以甲乙度截午正線於庚而取庚辛之度即與乙辛影線之度等又乙辛線與丙乙為直角成丙乙辛立勾股形丙乙為勾乙辛影線為股丙辛時刻線為弦蓋丙乙為過極經圈乙辛為赤道影線經圈與赤道無在而非直角故乙辛與影線亦無在而非直角也故以丙乙為半徑作圜而取庚辛度截圜界於壬成丙壬辛平勾股形即與丙乙辛立勾股形相等丙壬與丙乙等壬辛與乙辛等丙辛仍為弦線故成相等勾股形爰以壬辛影線為半徑與壬辛作直角取各節氣之切線為各節氣日影界皆與午正取節氣線之法同至其捷法乃以已成之勾股已分之切線轉移用之尤為便捷也向南壁上畫立面日晷法以北極出地四十度為準法先作直線及東西橫線相交於甲各成直角次作甲乙丙晷表取甲角四十度丙角五十度而乙為直角乃依地平日晷作時刻線法求之即得各時刻線蓋晷表之甲丙指天頂甲乙指赤道故丙甲乙角定為四十度則乙甲丁外角為五十度即赤道之髙度也丙乙指南極丙戊指地平故甲丙乙角定為五十度則乙丙戊外角為四十度乃南極入地之度即北極出地之度也甲乙既指赤道丙乙既指南極則丙乙即為過極經圈甲乙即為半徑午正太陽在正南則影在正北若偏東偏西若干度則其切線即其影之長皆與地平日晷之法同至於作節氣線之法亦與地平日晷同但赤道線以上為春分前秋分後至冬至之節氣線赤道線以下為春分後秋分前至夏至之節氣線蓋春分以後秋分以前日行赤道北夏至而極北其度髙故其影在下也秋分以後春分以前日行赤道南冬至而極南其度卑故其影在上也向東壁上畫立面日晷法以北極出地四十度為準法先安甲乙直表與壁面成直角甲乙表不拘尺寸次作甲丙垂線及甲丁橫線各成直角次以甲為心作甲丙丁象限弧用比例尺分圓線比得赤道髙五十度之弧為丁戊自甲至戊作甲戊赤道線乃以甲乙表長為半徑用比例尺正切線比得十五度三十度四十五度六十度七十五度之各切線於赤道線上作識按識作十字線即成時刻線也甲㸃為卯正距甲十五度前為卯初後為辰初距甲三十度為辰正距甲四十五度為巳初距甲六十度為巳正距甲七十五度為午初蓋時刻生於赤道春秋分時卯正日出正東與表對射故無影若向南若干度則其切線即其影之長至於午正則距卯正九十度切線與割線平行故無切線而日影即與壁面平行故亦無影也若於向西壁上畫晷則以午初為未初巳正為未正巳初為申初辰正為申正辰初為酉初卯正為酉正卯初為戌初餘俱與向東壁上畫晷法同向東壁上立面日晷畫節氣線法法以乙表端至卯初㸃相距之度為半徑用比例尺正切線比得二十三度三十分二十二度四十分二十度十二分十六度二十三分十一度三十分五度五十五分之各切線於卯初線左右作識即得各節氣日影界春秋分為赤道冬至距赤道南夏至距赤道北各二十三度三十分小寒大雪距赤道南芒種小暑距赤道北各二十二度四十分大寒小雪距赤道南小滿大暑距赤道北各二十度十二分立春立冬距赤道南立夏立秋距赤道北各十六度二十三分雨水霜降距赤道南穀雨處暑距赤道北各十一度三十分驚蟄寒露距赤道南清明白露距赤道北各五度五十五分又以乙表端至卯正㸃相距之度即甲乙表長為半徑比得各節氣距緯度之切線於卯正線左右作識即為卯正各節氣日影界凡各時刻節氣俱以乙表端至各時刻㸃相距之度為半徑比得各節氣距緯度之切線於各時刻線左右作識即得各時刻各節氣之日影界將各㸃作線聨之即成節氣線也蓋春秋分時日在赤道故其影界即在赤道線之上其自表端至各時刻㸃相距之度即春秋分各時刻之影線也若春分以後秋分以前日在赤道北夏至而極北則影在南春分以前秋分以後日在赤道南冬至而極南則影在北故以表端至各時刻㸃相距之度為半徑而取各節氣距緯度之切線即為各時刻各節氣之日影界聨之即成節氣線也向西壁法同假數尺法按分釐尺二百分之度作甲丁乙丙二平行線又作甲乙丁丙二線令成直角乃取假數表內自一至一百所對之假數於分釐尺上取其度如二之假數為三一則為三寸零一釐截甲丁乙丙二邊依所截㸃作線與甲乙邊平行又將甲乙丁丙二邊各平分為十分作線與甲丁平行自一十以上又依分釐尺法於各平行線之間悉作斜線則斜線與直線相交之處即其間零數之度如一至一一之斜線其與第一直線相交之處即一一也故假數雖止於一百而可以當一千之用若尺止長一尺則如上圖截去自一至九之數從一十起至一百止蓋十之假數為一而百之假數為二今既截去一尺則假數即減去首位之一取其零數作寸分釐豪用時則以十為單總之假數尺雖始於一十終於一百小之則可以為單為零大之則可以為千為萬皆因假數之首位雖遞加一數而其後之零數皆同故可以進退為用惟在比例分明加減詳審則其用自無窮也設如有十二人每人給銀四兩五錢問共銀幾何法以假數尺之四分五釐即從一十至四十五之度與一十二分相加得五十四分即五十四兩為共銀數也蓋一人與四兩五錢之比同於一十二人與五十四兩之比而真數以乘得者假數以加得之故以四分五釐當四兩五錢以十二分當十二人兩線相加即得五十四兩為共銀數也設如有米四百八十石每石價銀七錢五分問共價銀幾何法以假數尺之七分五釐即自一十至七十五之度與四十八分相加過於一百分之度乃以其過於一百分之餘度自假數尺十分以上量之得三十六分即三百六十兩為共價銀數也蓋以四十八分當四百八十石是以單當十則相加過於一百分即為過於一千分矣而以其過於一千分之餘度自十分以上量之是以十分當千分則三十六分即為三千六百分既以七分五釐當七錢五分故三千六百分即為三百六十兩也設如有銀五百一十二兩令三十二人分之問每人幾何法以假數尺之五十一分二釐內減去三十二分以其餘度自假數尺十分以上量之得十六分即十六兩為每人之銀數也蓋三十二人與五百一十二兩之比同於一人與十六兩之比而真數以除得者假數以減得之故以五十一分二釐當五百一十二兩以三十二分當三十二人相減用其餘度自十分以上量之是以十分當一分故十六分即為一分六釐既以五十一分二釐當五百一十二兩則一分六釐即為十六兩也設如有米四十二石令六十人分之問每人幾何法以假數尺之四十二分內減去六分即自一十至六十之度不足於一十之分乃以其不足於一十之度自假數尺一百以下減之餘七十分即七斗為每人之米數也蓋以四十二分當四十二石以六分當六十人而以相減不足於一十之分自一百以下減之是以百分當十分則所餘之七十分即為七分矣且以六分當六十人是所減之數以單當十則減餘之數即以十為單而單即為零故所餘之七分即為七釐既以四十二分當四十二石故七釐即為七斗也設如每銀二兩五錢兑錢四千七百五十文今有銀八兩問兑錢幾何法以假數尺之二十五分與四十七分五釐相減餘度與八十分相加過於一百分乃以其過於一百分之餘度自假數尺十分以上量之得十五分二釐即一萬五千二百為共錢數也蓋二兩五錢與四千七百五十文之比同於八兩與一萬五千二百文之比故以二兩五錢為一率四千七百五十為二率八兩為三率得一萬五千二百為四率本宜以二率與三率相加內減去一率而得四率今先於二率內減去一率以其餘度與三率相加而得四率其理同也又四率既過於一百分而以其過於一百分之餘度自十分上量之是以十分當百分故十五分二釐即為一百五十二分既以四十七分半當四千七百五十則一百五十二分即為一萬五千二百也設如有銀六兩買米五石今有銀四兩八錢問買米幾何法以假數尺之六十分內減去五十分餘度與四十八分相減得四十分即四石為米數也蓋六兩與五石之比同於四兩八錢與四石之比故以六兩為一率五石為二率四兩八錢為三率得四石為四率本宜以二率與三率相加內減去一率而得四率今先於一率內減去二率以其餘度與三率相減而得四率其理同也總之二率大於一率者則四率亦大於三率故以二率多於一率之分與三率相加而得四率若二率小於一率者則四率亦小於三率故以二率小於一率之分與三率相減而得四率用雖不同而理實一也正弦假數尺法按分釐尺二百分之度作甲丁乙丙二平行線又作甲乙丁丙二線令成直角乃取八線對數表內自一度至九十度之正弦假數減去首位之八於分釐尺上取其度如一度之正弦假數為八二四一八減去首位之八餘二四一八即為二寸四分一釐八豪截甲丁乙丙二邊依所截㸃作線與甲乙邊平行又將甲乙丁丙二邊各平分為十二分作線與甲丁平行又依分釐尺法於各平行線之間悉作斜線則斜線與直線相交之處即其間之分數如自一度至二度之斜線其與第一直線相交之處即一度五分其與第二直線相交之處即一度十分蓋一度有六十分故直線分為十二每一直線當五分若於直線之間酌量取之則五分中之零分亦可得其大槩矣若尺小止用一百分則截去自一度至五度之數從六度起至九十度止蓋九十度之正弦假數首位為一一度之正弦假數首位為八相減餘二故二尺之內始可容自一度至九十度之分今既截去一尺則假數首位須再減去一數故從六度起六度之正弦假數首位為九減去首位之九取其零數作寸分釐豪至九十度則恰得一尺之分也設如甲乙丙三角形甲角四十四度三十分丙角五十三度乙丙邊五尺三寸七分問甲乙邊幾何法以正弦假數尺之四十四度三十分與五十三度相減用其餘度與假數尺之五十三分七釐相加得六丁一分一釐即六尺一寸一分為甲乙邊也蓋甲角正弦與丙角正弦之比同於乙丙邊與甲乙邊之比故以四十四度三十分之正弦為一率五十三度之正弦為二率假數尺之五十三分七釐當乙丙邊為三率得六十一分一釐當甲乙邊為四率本宜以二率與三率相加內減去一率而得四率今先於二率內減去一率以其餘度與三率相加而得四率其理同也設如甲乙丙三角形甲乙邊六尺一寸一分甲丙邊七尺五寸九分乙角八十二度三十分問丙角幾何法以假數尺之六十一分一釐與七十五分九釐相減用其餘度與正弦假數尺之八十二度三十分相減得五十三度為丙角度也蓋甲丙邊與甲乙邊之比同於乙角正弦與丙角正弦之比故以七十五分九釐當甲丙邊為一率六十一分一釐當甲乙邊為二率八十二度三十分之正弦為三率得乙角五十三度為四率本宜以二率與三率相加內減去一率而得四率今先於一率內減去二率餘度與三率相減而得四率其理同也切線假數尺法按分釐尺二百分之度作甲丁乙丙二平行線又作甲乙丁丙二線令成直角乃取八線對數表內自一度至四十五度之切線假數減去首位之八於分釐尺上取其度截甲丁乙丙二邊依所截㸃作線與甲乙邊平行又將甲乙丁丙二邊各平分為十二分作線與甲丁平行又依分釐尺法於各平行線之間悉作斜線則斜線與直線相交之處即其間之分數皆與正弦假數尺同至於四十五度以後則與四十五度以前相為正餘蓋四十五度之正切線與半徑等四十五度以前之正切線即四十五度以後之餘切線而半徑與正切之比同於餘切與半徑之比故切線尺止用四十五度正餘相對即足八十九度之用若尺小止用一百分則截去自一度至五度之數從六度起至四十五度止其餘度則至八十四度止亦與正弦假數尺同也設如甲乙丙直角三角形甲丙邊四尺三寸六分乙丙邊四尺二寸九分問甲角幾何法以假數尺之四十三分六釐與四十二分九釐相減用其餘度與切線假數尺之四十五度相減得四十四度三十分為甲角度也蓋甲丙邊與乙丙邊之比同於半徑與甲角切線之比故以四十三分六釐當甲丙邊為一率四十二分九釐當乙丙邊為二率四十五度之切線當半徑為三率得甲角四十四度三十分為四率也因二率小於一率故於一率內減去二率餘數於三率內減之即得四率也設如甲乙丙直角三角形甲角五十三度甲丙邊三十二尺三寸問乙丙邊幾何法以切線假數尺之五十三度與半徑相減用其餘度與假數尺之三十二分三釐相加得四十二分九釐即四十二尺九寸為乙丙邊也蓋半徑與甲角正切線之比同於甲丙邊與乙丙邊之比而甲角餘切線與半徑之比亦同於甲丙邊與乙丙邊之比故以五十三度之餘切線為一率四十五度之切線當半徑為二率三十二分三釐當甲丙邊為三率得四十二分九釐當乙丙邊為四率因五十三度切線自四十五度起是已減去半徑矣故以二率與三率相加即得四率不必更減一率也割線假數尺法按分釐尺二百分之度作甲丁乙丙二平行線又作甲乙丁丙二線令成直角乃取八線對數表內自一度至八十九度之割線假數減去首位之一於分釐尺上取其度截甲丁乙丙二邊依所截㸃作線與甲乙邊平行又將甲乙丁丙二邊各平分為十二分作線與甲丁平行又依分釐尺法於各平行線之間悉作斜線則斜線與直線相交之處即其間之分數皆與正弦假數尺同若尺小止用一百分則截去自八十五度至八十九度之數從度起至八十四度止蓋度之割線即半徑其假數為一今從度起即減去半徑之數至八十四度以後則假數甚大一尺之內不能容故止八十四度止也設如甲乙丙直角三角形甲角四十五度三十分甲丙邊四十二尺九寸問甲乙邊幾何法以割線假數尺之四十五度三十分與假數尺之四十二分九釐相加得六十一分一釐即六十一尺一寸為甲乙邊也蓋半徑與甲角割線之比同於甲丙邊與甲乙邊之比故以半徑為一率四十五度三十分之割線為二率四十二分九釐當甲丙邊為三率得六十一分一釐當甲乙邊為四率因割線先巳減去半徑之數故二率與三率相加即得四率不必更減半徑也設如甲乙丙直角三角形甲丙邊四十二尺九寸甲乙邊五十三尺七寸問甲角幾何法以假數尺之四十二分九釐與五十三分七釐相減用其餘度自割線假數尺度以上量之得三十七度為甲角度也蓋甲丙邊與甲乙邊之比同於半徑與甲角割線之比故以四十二分九釐當甲丙邊為一率五十三分七釐當甲乙邊為二率半徑為三率得三十七度當甲角為四率因度之割線即半徑故以一率二率相減之餘度自度以上量之即如與半徑相加也御製數理精藴下編卷四十
