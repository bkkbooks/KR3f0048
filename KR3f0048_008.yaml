body:
  text: 欽定四庫全書御製數理精藴下編卷三線部一正比例轉比例合率比例正比例帶分轉比例帶分比例凡物彼此相形並之而用加較之而用減聚之而用乘散之而用除觀之不過兩率然乘除之間四率之理已默寓其中如因乘命法曰人幾何每人得物幾何求總物幾何則是每一人得物幾何與幾何人共得物幾何相比而成四率乃自小而得大者也如歸除命法曰有物幾何命幾何人分之每人得物幾何則是共人幾何共物幾何與每一人得物幾何相比而成四率乃自大而得小者也蓋因命數以一人為法故乘與除各省其率耳是雖名為乘除而實為相比之四率也至於比例正法則所該甚廣大而推步七政天行測量髙深廣逺小而量功命事度大移小無一非由比例而得蓋以兩數為比例用今有之數即可以得未有之數也比例之理雖分相連相當二種而相當比例之中實又兼相連比例相當比例一率比二率如三率比四率而相連比例首率比中率若中率比末率者即是中率為二率而又為三率也盡人皆知線有線之比例面有面之比例體有體之比例殊不知差分盈朒方程借衰疉借之類正皆比例之屬也然此類中有合數之比例分數之比例均數之比例借數之比例非條分縷析各項專論則不備故仍舊各自為類而獨於比例中最切者詳明其理以列法焉其法一名異乘同除或名為準測或名為順單以原有之兩件相除故為同除以今有之一件乘之故為異乘如先乘而後除亦同而今則質言之曰正比例蓋以原有之兩件為一率二率以今有之一件為三率而所求之一件則為四率也一名為同乘異除或名為變測或名為互視或名為逆單以原有之兩件相乘故為同乘以今有之一件除之故為異除而今則質言之曰轉比例蓋以原有之兩件為二率三率以今有之一件為一率而所求之一件則為四率也然論其乘除之名雖異究其比例之理則一而已今以數明之如原有之兩數為二與四今有之一數為八以原有之二作一率原有之四作二率今有之八作三率即得今所求之四率為十六而一率二與二率四之比即三率八與四率十六之比為相當之比例也如原有之兩數為八與四今有之一數為十六以原有之八作二率原有之四作三率今有之十六作一率即得今所求之四率為二而一率十六與二率八之比即三率四與四率二之比或以一率十六與三率四之比即同於二率八與四率二之比皆為相當之比例也總之乘除之名有異同四率之列有更換而既成比例之後其理無不歸於大同由此引伸觸類推而廣之有合幾四率而為一四率者則名為同乘同除或名為重測或名為順較逆較而今則質言之曰合率比例蓋其理亦不過合幾乘而為一乘合幾除而為一除各按四率參互錯綜豈能出於比例之外哉凡此各種比例俱設數例於後以明立法之根加之解説以廣用法之意正比例設如有銀買米每米一石銀八錢今買米二百四十石問共該銀若干法以米一石為一率銀八錢為二率今買米二百四十石為三率二三率相乘一率除之得四率一百九十二兩即共銀數也蓋一石與二百四十石為加二百四十倍而八錢與一百九十二兩亦為加二百四十倍見幾何原本六卷第十五節故一石與八錢之比即同於二百四十石與一百九十二兩之比也此法一率是一止用八錢乘二百四十石亦得但為明正比例之理故首設一二易法使人好推尋也設如有銀買米每銀一兩買米一石三斗今有銀三百二十兩問共買米若干法以銀一兩為一率米一石三斗為二率今銀三百二十兩為三率二三率相乘一率除之得四率四百一十六石即共米數也蓋一兩與一石三斗之比即同於三百二十兩與四百一十六石之比也設如有銀賞人每三人賞銀一兩八錢今有二百四十人問共該銀若干法以三人為一率一兩八錢為二率今有二百四十人為三率二三率相乘一率除之得四率一百四十四兩即共銀數也蓋三人與一兩八錢之比即同於二百四十人與一百四十四兩之比也設如有穀換米每穀一石四斗換米八斗四升今有穀三十二石六斗八升問換米若干法以穀一石四斗為一率米八斗四升為二率今有穀三十二石六斗八升為三率二三率相乘一率除之得四率一十九石六斗零八合即所換共米數也蓋穀一石四斗與米八斗四升之比即同於穀三十二石六斗八升與米一十九石六斗零八合之比也設如天上二度當地面四百里今七度該里數若干法以原有之二度為一率四百里為二率今有之七度為三率二三率相乘一率除之得四率一千四百里即七度之里數也蓋一率二與二率四之比為加一倍而三率七與四率十四之比亦為加一倍故二率得一率中之幾分之幾則四率亦得三率中之幾分之幾而為相當比例四率也設如一星一日內行一度三十分今問八刻內應行若干法以原數一日變作九十六刻為一率一度三十分變作九十分一度作六十分加入三十分共九十分為二率今星行八刻為三率二三率相乘一率除之得四率七分半即八刻內所行之數蓋九十六刻與九十分之比即同於八刻與七分半之比也然將日變為刻者因每日九十六刻不以十進位又今所有者為八刻故以刻數與刻數相比也度變為分者因每度六十分亦不以十進位而今八刻內所行者必為分故以分數與分數相比也設如驗時儀算炮聲自煙起至聞聲計七秒得五里今得十四秒問里數若干法以七秒為一率五里為二率今得十四秒為三率二三率相乘一率除之得四率十里即十四秒之里數也蓋七秒與五里之比即同於十四秒與十里之比也設如有羊四百六十隻共賣銀八十二兩八錢問每羊一隻價銀幾何法以羊四百六十隻為一率銀八十二兩八錢為二率羊一隻為三率推得四率一錢八分即每羊一隻之價也此法三率是一止用羊四百六十隻歸除八十二兩八錢亦得但列四率法中不得不備其一體也設如有羊一羣共二百四十隻又生羔七十二隻問加羊羣內十分之幾法以羊二百四十隻為一率十分為二率今生羔七十二隻為三率推得四率三分即為加羊羣內十分之三也蓋二百四十與十分之比即同於七十二與三分之比若將二百四十作十分每分得二十四將羊羔七十二作三分每分亦得二十四總而約之故為十分之三也設如有田科糧每三畝科糧八斗四升今有四千六百三十五畝問得糧若干法以三畝為一率八斗四升為二率今有四千六百三十五畝為三率推得四率一千二百九十七石八斗即所得共糧數也蓋三畝與八斗四升之比即同於四千六百三十五畝與一千二百九十七石八斗之比也設如用古量法豆區釜皆以四進有八十豆當二十區有二十區當釜若干法以八十豆為一率二十區為二率又為三率推得四率五釜即二十區所當釜數也此正比例中相連比例法也蓋因二十區與二十區相乘得四百區而八十豆與五釜相乘亦得四百區二十區既為二率又為三率故謂相連比例是以八十豆與二十區之比即同於二十區與五釜之比也設如一商原有本銀三千兩一年得利銀九百兩今復將九百兩為本問一年得利若干法以三千兩為一率九百兩為二率又為三率推得四率二百七十兩即九百兩所得之利也此法以九百兩為二率又為三率蓋三千兩與九百兩之比為三與九之比例而九百兩與二百七十兩之比亦為三與九之比例也轉比例設如有田一畝原闊八步長三十步今闊要十二步問長得幾何法以今闊十二步為一率原長三十步為二率原闊八步為三率二三率相乘一率除之得四率二十步即今闊十二步之長也此法以原有之兩數相乘以今有之一數除之而得今所求之數者因乘出兩數相同故也在正比例原有之兩件為一率二率今有之一件為三率而今所求之一件為四率俱以原有之一件與今有之一件相乘其積相同在轉比例則原有之兩件為二率三率今有之一件為一率而今所求之一件為四率是原有之兩件相乘今有之兩件相乘其積相同此兩法異同之故也雖今闊比原闊多而今長却比原長少故原有之闊八步與長三十步相乘得二百四十步而今有之闊十二步與長二十步相乘亦得二百四十步其積既同是以轉而比之自成比例蓋今闊比原闊多三分之一今長比原長少三分之一其比例相同見幾何原本七卷第三節故今闊十二步與原闊八步之比即同於原長三十步與今長二十步之比也若借正比例論之以原闊八步為一率原長三十步為二率今闊十二步為三率二三率相乘一率除之得四率四十五步則是今闊比原闊多今長亦比原長多所容積數亦多而與一畝之數不合矣故轉以今闊十二步為一率原長三十步為二率原闊八步為三率而得四率二十步是為一率與三率之比同於二率與四率之比也設如有地寬二十丈長一百二十丈今換地寬三十丈問長得幾何法以今寬三十丈為一率原長一百二十丈為二率原寬二十丈為三率二三率相乘一率除之得八十丈即今寬三十丈之長也此法原有之寬與長相乘得二千四百丈今有之寬與長相乘亦得二千四百丈其積既同故轉而比之自成比例以今寬比原寬以原長比今長俱三與二之比例是以今寬三十丈與原寬二十丈之比即同於原長一百二十丈與今長八十丈之比也設如傭工開渠八人開之二十日完今加倍用十六人開之問得幾日完法以今十六人為一率原二十日為二率原八人為三率二三率相乘一率除之得四率十日即十六人完工之日也此法因工少而用日多故加人使工多而用日少蓋今十六人與原八人之比即今之工加一倍而原二十日與今十日之比則今所得之日亦必減一倍故一率十六人與三率八人之比即同於二率二十日與四率十日之比也設如有地四百八十畝八人耕之十二日完今用六人耕之問得幾日完法以今六人為一率原十二日為二率原八人為三率二三率相乘一率除之得四率十六日即六人耕完之日也此法人數日數不同而所耕之田則同為四百八十畝而所用之工又同為九十六故以八人論一日八工十二日則用九十六工以六人論一日六工十六日亦用九十六工也故轉用四率自成比例以一率六人與三率八人之比即同於二率十二日與四率十六日之比也設如衆軍支米足用四年則每人每月支米三斗今欲將四年之米足用十二年問每人每月應支幾何法以今欲用十二年為一率原支米三斗為二率足用四年為三率二三率相乘一率除之得四率一斗即足用十二年每人每月應支之數也此法支米多則足用年數少今支米少則足用年數多蓋四年與十二年之比在年為加三分之二而三斗與一斗之比在米又為減三分之二其比例固同也設如木星十二年一周天每年行三十度土星則二十八年一周天問每年行幾度法以土星所行一周二十八年為一率木星每年所行三十度為二率木星所行一周十二年為三率二三率相乘一率除之得四率十二度五十一分二十五秒有餘即土星每年所行之度數也蓋木星周天比土星年數少而行度却多土星周天比木星年數多而行度却少多得少而少反得多故轉而比之以二十八年與十二年之比即同於三十度與十二度有餘之比也設如一人借人之絹寬三尺長二十四丈今還絹寬四尺問長該若干法以今絹寬四尺為一率原絹長二十四丈為二率原絹寬三尺為三率二三率相乘一率除之得四率十八丈即為今所還寬四尺絹之長也蓋原絹寬三尺長二十四丈相乘得七百二十尺今絹寬四尺長十八丈相乘亦得七百二十尺因其積數相同故今絹寬四尺與原絹寬三尺之比即同於原絹長二十四丈與今絹長十八丈之比也設如驗時儀墜子其繩長四尺四寸八分一釐二豪八絲四刻內來往共三千次今造一墜欲使來一秒往一秒問繩長若干法以四刻化三千六百秒為今墜子往來次數自乘得一千二百九十六萬次為一率原墜繩長四尺四寸八分一釐二豪八絲為二率以原墜往來三千次自乘得九百萬次為三率二三率相乘一率除之得四率三尺一寸一分二釐即今所求墜繩之長也夫以四刻化秒者蓋以所求之墜子欲其來一秒往一秒也故秒數即次數四刻所化之秒即今墜子在四刻內往來之次數也其比例以次數自乘者因墜子往來之際已成平面形故以往來之方數相比為面比面而原墜與今墜之長數相比為線比線務使其類相當而後可以相比也是以今墜往來次數自乘與原墜往來次數自乘之比即同於原墜長數與今墜長數之比也然原墜於四刻內往來之次數少而墜却長今墜於四刻內往來之次數多而墜却短故以今墜之往來次數與原墜之往來次數為比即同於原墜之長與今墜之長為比所以為轉比例也設如有正方池一面每邊十二丈今欲作寬八丈之池使其池面積數與方池等問長得幾何法以今池寬八丈為一率原池長十二丈為二率原池寬十二丈為三率推得四率十八丈即今欲作池之長也此轉比例中相連比例法也蓋原池方面每邊十二丈其積一百四十四丈即二率三率相乘之數今所得四率長十八丈與一率寬八丈相乘亦得一百四十四丈兩數相等故以一率今池寬八丈與三率原池寬十二丈之比即同於二率原池長十二丈與四率今池長十八丈之比也設如原用金九兩係九成今用八成金折還當加幾兩法以今金八成為一率原金九兩為二率原金九成為三率推得四率十兩零一錢二分五釐內減九兩餘一兩一錢二分五釐即八成金當加之數也此法二率三率為體雖不同而數則一故亦為相連比例蓋以原金九兩又係九成相乘得十成金八兩一錢以今之八成與所得十兩零一錢二分五釐相乘亦得十成金八兩一錢是八成與九成之比即同於九兩與十兩零一錢二分五釐之比也合率比例設如以夏布換棉布但知每夏布三丈價銀二錢每棉布七丈價銀七錢五分今有夏布四十五丈問換棉布若干法以夏布三丈與棉布價銀七錢五分相乘得二兩二錢五分為一率夏布價銀二錢與棉布七丈相乘得一兩四錢為二率夏布四十五丈為三率推得四率二十八丈即夏布四十五丈所換之棉布數也此法乃兩比例合為一比例也如分作兩比例明之每夏布三丈價銀二錢今夏布四十五丈則價銀應得三兩此一比例也棉布價銀七錢五分得棉布七丈今夏布四十五丈之價三兩則應得棉布二十八丈此又一比例也夫銀三兩原為夏布四十五丈之價則夏布四十五丈所換之棉布二十八丈價銀亦應三兩可知矣蓋兩比例中一以三丈作一率一以七錢五分作一率故三丈與七錢五分相乘得二兩二錢五分而為一率是合兩一率而為一一率也一以二錢作二率一以七丈作二率故二錢與七丈相乘得一兩四錢而為二率是合兩二率而為一二率也而後比例之三率即前比例之四率如以兩三率相乘為三率則所得四率亦為兩四率相乘之數必須以前比例之四率除之方得後比例之四率故即以夏布之四十五丈為三率而得棉布之二十八丈為四率也設如以芝麻換黃米但知每芝麻三石換菉豆五石每菉豆四石換黃米三石今有芝麻五十四石問換黃米若干法以芝麻三石與菉豆四石相乘得十二石為一率又以菉豆五石與黃米三石相乘得十五石為二率芝麻五十四石為三率推得四率六十七石五斗即芝麻五十四石所換之黃米數也此法亦兩比例合為一比例也如分作兩比例明之每芝麻三石換菉豆五石則芝麻五十四石必換菉豆九十石此一比例也菉豆四石換黃米三石則菉豆九十石必換黃米六十七石五斗此又一比例也夫菉豆九十石原為芝麻五十四石所換則菉豆九十石所換之黃米即芝麻五十四石所換之黃米可知矣蓋以兩比例之各一率相乘為一率兩比例之各二率相乘為二率者即合兩次乘除為一次乘除也設如養兵七百名每年額餉一萬二千六百兩內有新著伍兵三百名已應役七個月問該餉銀若干法以原養兵七百名與十二個月相乘得八千四百為一率額餉一萬二千六百兩為二率新兵三百名與七個月相乘得二千一百為三率推得四率三千一百五十兩即兵三百名七個月應得之餉銀數也此法亦兩比例合為一比例也如分作兩比例明之兵七百名得一萬二千六百兩則兵三百名應得五千四百兩乃兵三百名十二個月應得之數此一比例也兵三百名十二個月應得五千四百兩則七個月應得三千一百五十兩此又一比例也今以兩比例之各一率相乘為一率兩比例之各三率相乘為三率者亦如兩比例之各一率二率相乘合為一一率二率也設如原有鵝八隻換雞二十隻又雞三十隻換鴨九十隻又鴨六十隻換羊二隻今有羊五隻問換鵝幾何法以所換羊二隻與所換鴨九十隻相乘得一百八十隻再以所換雞二十隻乘之得三千六百隻為一率又以原鴨六十隻與原雞三十隻相乘得一千八百隻又以原鵝八隻乘之得一萬四千四百隻為二率今羊五隻為三率推得四率二十隻即羊五隻所換之鵝數也此法乃三比例合為一比例也如分作三比例明之羊二隻換鴨六十隻則羊五隻必換鴨一百五十隻此一比例也鴨九十隻換雞三十隻則鴨一百五十隻必換雞五十隻此二比例也雞二十隻換鵝八隻則雞五十隻必換鵝二十隻此三比例也夫雞五十隻原為鴨一百五十隻之所換而鴨一百五十隻又原為羊五隻之所換則雞五十隻所換之鵝二十隻即為羊五隻之所換可知矣今以三比例之各一率連乘之為一率又以三比例之各二率連乘之為二率者正合三比例為一比例也設如原有菽三斗換黍二斗又黍四斗換稷三斗又稷五斗換稻四斗又稻六斗換麥五斗今有麥七斗問換菽幾何法以所換麥五斗與所換稻四斗相乘得二石復以所換稷三斗乘之得六石再以所換黍二斗乘之得一十二石為一率又以原有稻六斗與原有稷五斗相乘得三石復以原有黍四斗乘之得一十二石再以原有菽三斗乘之得三十六石為二率今有麥七斗為三率推得四率二石一斗即麥七斗所換之菽數也此合四比例為一比例也如分作四比例明之麥五斗換稻六斗則麥七斗必換稻八斗四升此一比例也稻四斗換稷五斗則稻八斗四升必換稷一石零五升此二比例也稷三斗換黍四斗則稷一石零五升必換黍一石四斗此三比例也黍二斗換菽三斗則黍一石四斗必換菽二石一斗此四比例也夫黍一石四斗原為稷一石零五升之所換而稷一石零五升又為稻八斗四升之所換而稻八斗四升又為麥七斗之所換則黍一石四斗所換之菽二石一斗即為麥七斗之所換可知矣今以四比例之各一率連乘之為一率又以四比例之各二率連乘之為二率者正合四比例為一比例也設如原有工人一百開河四十丈二十日工完今有工人一千開河八十丈問得日數幾何法以今有工人一千與原開河四十丈相乘得四萬丈為一率二十日為二率以原有工人一百與今開河八十丈相乘得八千丈為三率推得四率四日即一千人開河八十丈之日數也此法以原有今有兩數互乘以比例者所以齊其分也試將兩首位一千工與一百工互乘得十萬工然後互乘丈數原有一邊得四萬丈今有一邊得八千丈是原一百工開四十丈則十萬工開四萬丈其比例相同今一千工開八十丈則十萬工開八千丈其比例亦同也因兩工數相同故以四萬丈與二十日之比即同於八千丈與四日之比蓋原有十萬工開河四萬丈二十日可完今亦有十萬工開河八千丈則四日可完為比例四率也然此法實係兩比例合為一比例也如分作兩比例明之則先以人工為比例原一百工開二十日今一千工即應開二日為今一千工開河四十丈之日數此一轉比例也次用丈數為比例原四十丈應開二日今八十丈則應開四日為今一千工開河八十丈之日數此一正比例也法以兩比例之一率相乘為一率兩比例之三率相乘為三率者正合兩比例為一比例也設如原有書一百篇六人寫之十日完每篇三百字今有書二百篇八人寫之十二日完問每篇得字若干法以今有二百篇與原有六人相乘得一千二百又以原有十日乘之得一萬二千為一率每篇三百字為二率以原有一百篇與今有八人相乘得八百又以今有十二日乘之得九千六百為三率推得四率二百四十字即今八人寫十二日每篇之字數也試將兩首位一百篇與二百篇互乘得二萬篇然後互乘人工與日原有一邊得一萬二千工今有一邊得九千六百工蓋原有二萬篇用一萬二千工每篇三百字今亦有二萬篇用九千六百工其每篇必二百四十字為比例四率也然此法實係三比例合為一比例也如分作三比例明之則先以篇數為比例原一百篇每篇三百字今勻為二百篇則每篇只應一百五十字此一轉比例也然人數不同故次以人數為比例原六人寫之每篇應一百五十字今八人寫之則每篇應二百字此一正比例也然日數又不同故次以日數為比例原寫十日每篇應二百字今寫十二日則每篇應二百四十字此又一正比例也法以三比例之各一率連乘之為一率三比例之各三率連乘之為三率者正合三比例為一比例也設如原雇人寫書每篇六百字八人寫二十日得一百二十篇今寫書每篇四百五十字却用十二人寫三十日問得篇數幾何法以今有四百五十字與原有八人相乘得三千六百又以原有二十日乘之得七萬二千為一率一百二十篇為二率以原有六百字與今有十二人相乘得七千二百又以今有三十日乘之得二十一萬六千為三率推得四率三百六十篇即今十二人寫三十日之篇數也試將兩首位六百字與四百五十字互乘得二十七萬字然後互乘人工與日原有一邊得七萬二千工今有一邊得二十一萬六千工蓋原有一邊二十七萬字用七萬二千工得一百二十篇今一邊亦二十七萬字用二十一萬六千工則得三百六十篇為比例四率也然此法亦係三比例合為一比例也如分作三比例明之則先以字數為比例原每篇六百字為一百二十篇今每篇四百五十字則必勻為一百六十篇此一轉比例也然人數不同故次以人數為比例原八人寫之應得一百六十篇今十二人寫之則應得二百四十篇此一正比例也然日數又不同故次以日數為比例原寫二十日應得二百四十篇今寫三十日則應得三百六十篇此又一正比例也法以三比例之各一率連乘之為一率三比例之各三率連乘之為三率者正合三比例為一比例也設如海船內原有甜水二萬零一百六十斤每人每日用二斤足用四個月今又添四千零三十二斤合前數共二萬四千一百九十二斤欲用六個月問每日每人應用幾何法以原有二萬零一百六十斤與今六個月相乘得一十二萬零九百六十個月為一率每人每日用水二斤通為三十二兩為二率以今有二萬四千一百九十二斤與原四個月相乘得九萬六千七百六十八個月為三率推得四率二十五兩六錢即今每人每日應用之數也試將兩首位數互乘得四億八千七百七十一萬零七百斤然後互乘月數原有一邊得九萬六千七百六十八個月今有一邊得一十二萬零九百六十個月蓋原有水四億八千七百七十一萬零七百斤足用九萬六千七百六十八個月每人得三十二兩今有水亦四億八千七百七十一萬零七百斤欲用十三萬零九百六十個月則每人得二十五兩六錢為轉比例四率也然此法亦係兩比例合為一比例也如分作兩比例明之則先以水數為比例原有水二萬零一百六十斤每人每日用三十二兩今水二萬四千一百九十二斤則每人每日應用三十八兩四錢此一正比例也然月數不同故次以月數為比例原用四個月每日應用三十八兩四錢今欲用六個月則每日應用二十五兩六錢此一轉比例也法以兩一率相乘為一率兩三率相乘為三率者正合兩比例為一比例也設如原有米八萬石用車二十四輛日行四十里二十日運完今有米十萬石用車三十輛日行六十里問運完日數幾何法以原有八萬石與今用車三十輛相乘得二百四十萬輛又以今行六十里乘之得一億四千四百萬里為一率二十日為二率以今有十萬石與原用車二十四輛相乘亦得二百四十萬輛又以原行四十里乘之得九千六百萬里為三率推得四率十三日又三分日之一即今米十萬石運完之日數也試將兩首位數互乘得八十億石然後互乘車數里數原有一邊得九千六百萬里今有一邊得一億四千四百萬里蓋原有米八十億石用車二百四十萬輛行九千六百萬里得二十日運完今有米亦八十億石亦用車二百四十萬輛行一億四千四百萬里故十三日又三分日之一運完為轉比例四率也然此法亦係三比例合為一比例也如分作三比例明之則先以米數為比例原米八萬石運二十日今米十萬石則應運二十五日此一正比例也然車數不同故次以車數為比例原車二十四輛應運二十五日今車三十輛則應運二十日此一轉比例也然日行里數又不同故次以里數為比例原行四十里應運二十日今行六十里則應運十三日又三分日之一此又一轉比例也法以三比例之各一率連乘之為一率三比例之各三率連乘之為三率者正合三比例為一比例也設如原有麥子一萬二千石車十二輛每車載三石日行八十里四十日運完今有麥三萬石車十六輛每車載四石日行六十里問運完日數幾何法以原有麥子一萬二千石與今車十六輛相乘得一十九萬二千輛又以今每車載麥四石乘之得七十六萬八千石又以今行六十里乘之得四千六百零八萬里為一率四十日為二率以今有麥子三萬石與原有車十二輛相乘得三十六萬輛又以原每車載麥三石乘之得一百零八萬石又以原行八十里乘之得八千六百四十萬里為三率推得四率七十五日即今麥三萬石運完之日數也試將兩首位數互乘得三億六千萬石然後互乘車數石數里數原有一邊得八千六百四十萬里今有一邊得四千六百零八萬里蓋原有麥三億六千萬石用車三十六萬輛載一百零八萬石行八千六百四十萬里得四十日運完今有麥亦三億六千萬石用車一十九萬二千輛載七十六萬八千石行四千六百零八萬里得七十五日運完為轉比例四率也然此法係四比例合為一比例也如分作四比例明之則先以麥數為比例原麥一萬二千石運四十日今麥三萬石則應運一百日此一正比例也然車數不同故次以車數為比例原車十二輛應運一百日今車十六輛則應運七十五日此一轉比例也然每車所載石數不同故次以石數為比例原每車載三石應運七十五日今每車載四石則應運五十六日二五即四分日之一此又一轉比例也然日行里數又不同故次以里數為比例原日行八十里應運五十六日二五今日行六十里則應運七十五日此又一轉比例也法以四比例之各一率連乘之為一率四比例之各三率連乘之為三率者正合四比例為一比例也正比例帶分設如有銀買米每米一石價銀八錢四分今買米三分石之二問該銀若干法以米一石用分母三通為三分為一率銀八錢四分為二率分子二分為三率二三率相乘一率除之得四率五錢六分即銀數也蓋米一石通為三分以三分與八錢四分之比即同於二分與五錢六分之比皆為三分之二之比例也設如有人行路行過五分之二係八十里問總里數幾何法以分子二分為一率分母五分為二率行過八十里為三率二三率相乘一率除之得四率二百里即總里數也蓋總里數之五分之二為八十里以二分與五分之比即同於八十里與二百里之比皆為五分之二之比例也設如有銀買米每米三分石之二價銀七分兩之五今買米四分石之三問該銀若干法以三分石之二為一率七分兩之五為二率四分石之三為三率用通分乘法以二率分母七與三率分母四相乘得二十八為乘出之分母又以二率分子五與三率分子三相乘得一十五為乘出之分子是為二十八分之十五為二率三率相乘之數以一率三分石之二除之因分母除不盡乃用通分互乘代除之法除之以乘出之分母二十八與一率之分子二相乘得五十六為除出之分母又以一率之分母三與乘出之分子十五相乘得四十五為除出之分子即得四率五十六分兩之四十五為所求之數也如求真數則變零分為兩以分母五十六為一率一兩為二率分子四十五為三率推得四率八錢餘二不盡命為五十六分錢之二約為二十八分錢之一即所求之真數也設如有銀買蠟每銀二兩六錢買蠟十斤零五分斤之二又七兩零二分兩之一今有銀九錢問買蠟幾何法以銀二兩六錢為一率以蠟十斤通為一百六十兩又五分斤之二通為六兩四錢又七兩零二分兩之一通為七兩五錢共得一百七十三兩九錢為二率今有銀九錢為三率推得四率六十兩零一錢九分收為三斤零十二兩一錢九分即所求之蠟數也此法雖有零分而分兩實可相通故各相通以為比例四率也設如有銀買羽絨每三分丈之一價銀四分兩之三今欲買八分丈之七問該銀若干法以原羽絨三分丈之一為一率原銀四分兩之三為二率今羽絨八分丈之七為三率用通分乘法以二率分母四與三率分母八相乘得三十二為乘出之分母又以二率分子三與三率分子七相乘得二十一為乘出之分子是為三十二分之二十一為二率三率相乘之數乃以一率三分丈之一除之因分母除不盡乃用通分互乘代除之法除之以乘出之分母三十二與一率之分子一相乘仍得三十二為除出之分母又以一率之分母三與乘出之分子二十一相乘得六十三為除出之分子即得四率三十二分兩之六十三為所求之數也滿分母三十二分收為一兩餘三十一六十三分內減去三十二分仍餘三十一為一兩又三十二分兩之三十一如求真數則以分母三十二為一率一兩為二率分子三十一為三率推得四率九錢六分八釐七豪五絲與整數一兩相加得一兩九錢六分八釐七豪五絲即真數也設如有銀買緞每緞二匹共價八兩又五分兩之四今欲買三十六匹問共價若干法以二匹為一率共價八兩用分母五通為四十分加分子四得四十四分為二率今買三十六匹為三率推得四率七百九十二分以每分母五分收為一兩得一百五十八兩又五分兩之二以五分為一率一兩為二率七百九十二分為三率推得四率一百五十八兩餘二分即命為五分兩之二即所求之數也如以五分兩之二收為四錢五分為一兩則二分為四錢則得一百五十八兩四錢即緞三十六匹之共價也如以子母分變為真數求之二匹共價八兩又五分兩之四則五分為一兩四分為八錢是二匹共價為八兩八錢即以二匹為一率八兩八錢為二率三十六匹為三率亦得四率一百五十八兩四錢為緞三十六匹之共價也轉比例帶分設如一案長九尺寬一尺六寸今欲將原長減三分之一其面積仍與原案等問寬幾何法以原長九尺用分母三歸之得每分三尺於原長九尺內減去一分之三尺餘六尺為今長為一率原寬一尺六寸為二率原長九尺為三率二三率相乘一率除之得四率二尺四寸即今所求之寬也此法因分母三可以度盡原長故變今長為真數與他率為比例也設如營造原每日用五十六人為一月又九分月之三可以完工今每日用六十四人問完工之日得幾何法以今用六十四人為一率以分母九通一月為九分加入分子三共為九分月之十二為二率原用五十六人為三率推得四率九分月之十分半滿分母九分收為一月餘一分半十分半內減去九分餘一分半約為六分月之一即得一月又六分月之一為今用六十四人完工之日也蓋六十四人與一月又九分月之三之比即同於五十六人與一月又六分月之一之比也設如原有一門簾用綾一丈二尺其綾寬一尺五寸今欲作一新簾其綾比原綾寬七分尺之三問應用長數幾何法以原寬一尺五寸用分母七通為十分半加入分子三得今寬一十三分半為一率原長一丈二尺為二率原寬十分半為三率推得四率九尺又一百三十五分尺之四十五約為三分尺之一即得九尺又三分尺之一為今應用之長數也蓋今寬十三分半與原寬十分半之比即同於原長一丈二尺與今長九尺又三分尺之一之比也設如城守兵一營其糧可支一年又七分年之二今汰去三分之一問應支年數幾何法先以年分母七通一年為七分加入分子二得七分年之九又以兵分子一減分母三得二為三分之二為現存兵數汰去三分之一則存者為三分之二因兩分母不同故用互乘以齊之以兩分母三七相乘得二十一為共母分即原兵分以年分母七互乘兵分子二得十四為今存兵分以兵分母三互乘年分子九得二十七為原年分即以所通今存兵十四分為一率原年數二十七分為二率原兵二十一分為三率推得四率二十一分年之四十分半滿分母二十一分收為一年餘十九分半四十分半內減二十一分餘十九分半約為七分年之六分半即得一年又七分年之六分半為今應支之年數也蓋今存兵比原兵少三分之一則支糧年數必多三分之一故今存兵十四分與原兵二十一分之比即同於原年數二十七分與今年數四十分半之比也御製數理精藴下編卷三
