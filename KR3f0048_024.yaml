body:
  text: 欽定四庫全書御製數理精藴下編卷十九面部九各面形縂論直線形各面形總論面之爲形成於方圜直線所成皆方之類曲線所成皆圜之類立法則方爲圜之本度圜者必以方而度方者必以矩所謂方有盡而圜無盡是也論理則圜又爲衆界形之本葢衆界形或函圜或函於圜其邊皆當弧線之度故求衆界形者必以圜界爲宗也因有方圜衆界之各異是以邊線等者面積不等如衆界形之毎一邊與圜徑俱設爲一則方面積爲一而圜面積爲七八五三九八一六三等邊形之面積爲四三三一二七五等邊形之面積爲一七二四七七四一六等邊形之面積爲二五九八七六二七等邊形之面積爲三六三三九一二四八等邊形之面積爲四八二八四二七一二九等邊形之面積爲六一八一八二四二十等邊形之面積爲七六九四二八八三此各形之面積皆以方積比例者也或以圜面積設爲一則圜徑得一一二八三小餘七九一六如圜徑與衆界形之毎一邊俱設爲一一二八三小餘七九一六則圜面積爲一而三等邊形之面積爲五五一三二八八九方面積爲一二七三二三九五四五等邊形之面積爲二一九五七九八六六等邊形之面積爲三三七九七三三四七等邊形之面積爲四六二六八四九八八等邊形之面積爲六一四七七四四三五九等邊形之面積爲七八七九四三二十等邊形之面積爲九七九六五七九九此各形之面積皆以圜積比例者也葢因各形之邊線相等面積不同故皆定爲面與面之比例也面積等者邊線不等如衆界形之面積與圜面積俱設爲一則方邊爲一而圜徑爲一一二八三七九一六三等邊形之毎邊爲一五一九六七一三七五等邊形之毎邊爲七六二三八七五六等邊形之毎邊爲六二四三二四七等邊形之毎邊爲五二四五八一二六八等邊形之毎邊爲四五五八九八五九等邊形之毎邊爲四二一九九六三十等邊形之毎邊爲三六五一五八此各形之邊線皆以方邊比例者也或以圜徑設爲一則圜面積爲七八五三九八一六三三九七四四八三如圜面積與衆界形之面積俱設爲七八五三九八一六三三九七四四八三則圜徑爲一而二等邊形之毎邊爲一三四六七七三六九四等邊形卽正方之毎邊爲八八六二二六九二五等邊形之毎邊爲六七五六四七九三六等邊形之毎邊爲五四九八一八五七等邊形之毎邊爲四六四八九八三八等邊形之毎邊爲四三三一二八八九等邊形之毎邊爲三五六四四一四十等邊形之毎邊爲三一九四九四一八此各形之邊線皆以圜徑比例者也葢因各形之面積相等邊線不同故皆定爲線與線之比例也然自衆界形之中心分之則又各成三角形皆以勾股爲準則故勾股三角形雖爲面而不囿於面之中却别立一章焉要之衆界形邊求積者歸之勾股積求邊者歸之正方引而伸之觸類而長之凡爲面形者不能違是也直線形設如正方形每邊五十尺問對角斜線幾何法以方邊五十尺自乗得二千五百尺倍之得五千尺開方得七十尺七寸一分零六豪有餘即所求之對角斜線也如圖甲乙丙丁正方形其甲乙乙丙丙丁丁甲每邊皆五十尺甲丙為所求對角斜線甲乙為股則乙丙為勾乙丙為股則甲乙為勾因甲乙與乙丙相等皆可互為勾股故以一邊自乗倍之開方得弦卽如各自乗相併開方而得弦也又用定率比例法以定率之方邊一爲一率對角斜線一四一四二一三五為二率今所設之方邊五十尺為三率求得四率七十尺七寸一分零六豪有餘卽所求之對角斜線也葢定率設方邊為一千萬其對角斜線為一千四百一十四萬二千一百三十五故定率之方邊一千萬與定率之對角斜線一千四百一十四萬二千一百三十五之比卽如今所設之方邊五十尺與所求之對角斜線七十尺七寸一分零六豪有餘之比也若有對角斜線求方邊則以對角斜線自乗折半開方所得為正方形之每一邊也葢甲丙弦自乗之方與甲乙股乙丙勾兩正方相併之積等今以甲丙弦自乗折半則必與甲乙或乙丙自乗之一正方相等故開方而得每一邊也或用定率比例法以定率之對角斜線一四一四二一三五為一率方邊一為二率今所設之對角斜線為三率求得四率卽方邊也設如正方形每邊二尺今將其積倍之問得方邊幾何法以每邊二尺自乗得四尺倍之得八尺開方得二尺八寸二分八釐四豪有餘卽所求之方邊數也如圖甲乙丙丁正方形每邊二尺其面積四尺倍之得八尺卽如戊乙己庚正方形其每邊即甲乙丙丁方形之對角斜線試於戊乙己庚正方形内作甲乙丙丁正方形以乙為心戊為界作戊己弧與丁角相切則丁乙與己乙皆為半徑其度相等葢丁乙對角斜線自乗之方為甲乙邊自乗之方之二倍故戊乙己庚正方形卽為甲乙丙丁正方形之二倍而戊甲丁丙己庚磬折形積即與甲乙丙丁正方形積相等也設如正方形每邊二尺今將其積四倍之問得方邊幾何法以每邊二尺倍之得四尺卽所求之方邊數也如圖甲乙丙丁正方形每邊二尺其面積四尺四倍之得一十六尺卽如戊乙己庚正方形之面積其每邊得甲乙丙丁正方形每邊之二倍是故不用四倍其積開方止以每邊二尺倍之而卽得也此法葢因兩方面之比例比之兩界之比例為連比例隔一位相加之比例見幾何原本七卷第五節故戊乙己庚正方面積一十六尺與甲乙丙丁正方面積之四尺相比為四分之一而戊乙己庚正方邊之四尺與甲乙丙丁正方邊之二尺之比為二分之一夫十六與八八與四四與二皆為二分之一之連比例而十六與四之比其間隔八之一位故為連比例隔一位相加之比例也設如長方形長十二尺闊八尺今將其積倍之仍與原形為同式形問得長闊各幾何法以闊八尺自乗得六十四尺倍之得一百二十八尺開方得一十一尺三寸一分三釐七豪有餘即所求之闊旣得闊乃以原闊八尺為一率原長十二尺為二率今所得闊一十一尺三寸一分三釐七豪有餘為三率求得四率一十六尺九寸七分零五豪有餘卽所求之長也或以長十二尺自乗倍之開方亦得一十六尺九寸七分零五豪有餘為所求之長也如圖甲乙丙丁長方形甲乙闊八尺甲丁長十二尺將其積倍之即如戊己庚辛長方形此兩長方面積之比例卽同於其相當二界各作一正方面積之比例見幾何原本七卷第七節故依甲乙丙丁長方形之丁丙闊界作丁丙壬癸正方形將其積倍之卽如戊己庚辛長方形之辛庚闊界所作之辛庚子丑正方形故開方得辛庚為所求之闊也既得辛庚之闊則以甲乙與甲丁之比卽同於戊己與戊辛之比得戊辛為所求之長也若以原長自乗倍之開方卽如以二長界各作一正方形互相為比例也設如長方形長十二尺闊八尺今將其積四倍之仍與原形為同式形問得長闊各幾何法以闊八尺倍之得十六尺卽所求之闊又以原長十二尺倍之得二十四尺即所求之長也如圖甲乙丙丁長方形甲乙闊八尺甲丁長十二尺將其積四倍之卽如戊己庚辛長方形其每邊得甲乙丙丁長方形每邊之二倍是故不用四倍其積開方止以各邊之數倍之而即得也此法葢因兩長方面之比例既同於其相當二界各作一正方面之比例而兩正方面之比例比之二界之比例為連比例隔一位相加之比例故兩長方面之比例較之兩界之比例亦為連比例隔一位相加之比例也設如三角形面積三千尺底闊八十尺問中長幾何法以積三千尺倍之得六千尺用底闊八十尺除之得七十五尺卽所求之長也如圖甲乙丙三角形其積倍之成丁乙丙戊長方形乙丙為底闊故以底闊除長方積得甲己為中長也設如兩兩等邊無直角斜方形一日象目形小邊皆二十五丈大邊皆三十九丈對兩小角斜線五十六丈問面積㡬何法以對角斜線分斜方形為兩三角形算之以對角斜線五十六丈為底大邊三十九丈小邊二十五丈為兩腰用三角形求中垂線法求得中垂線十五丈乃以對角斜線五十六丈與中垂線十五丈相乗得八百四十丈即斜方形之面積也如圖甲乙丙丁斜方形甲丁乙丙二小邊皆二十五丈甲乙丁丙二大邊皆三十九丈甲丙對兩小角斜線五十六丈今以甲丙斜線分甲乙丙丁斜方形為甲乙丙甲丁丙兩三角形俱以甲丙為底甲丁與丁丙為兩腰求得丁戊或乙己皆為中垂線故以甲丙斜線與丁戊垂線相乗所得甲丙庚辛長方形比甲丁丙三角形積大一倍而甲乙丙丁斜方形亦函兩三角形積故所得之甲丙庚辛長方形與甲乙丙丁斜方形之面積相等也設如不等邊兩直角斜方形直角之邊長五十丈上闊二十丈下闊二十八丈問面積幾何法以上闊二十丈與下闊二十八丈相加得四十八丈折半得二十四丈與長五十丈相乗得一千二百丈即斜方形之積面也如圖甲乙丙丁斜方形以上闊甲丁與下闊乙丙相加得乙戊折半為乙己與甲乙長相乗遂成甲乙己庚長方形其斜方外所多之丁庚辛勾股形與斜方内所少之辛己丙勾股形之積等故所得之甲乙己庚長方形即甲乙丙丁斜方形之面積也又法上闊下闊相併與長相乗得數折半即斜方形之面積也葢前法上闊下闊相加折半而後與長相乗此法則上闊下闊相加卽與長相乗而後折半其理一也設如梯形長三十丈上闊十二丈下闊二十丈問面積㡬何法以上闊十二丈與下闊二十丈相加得三十二丈折半得十六丈與長三十丈相乗得四百八十丈即梯形之面積也如圖甲乙丙丁梯形以上闊甲丁與下闊乙丙相加得乙戊折半為乙己與丁己長相乗遂成庚乙己丁長方形其梯形外所多之甲庚乙勾股形與梯形内所少之丁己丙勾股形之面積等故所得之庚乙己丁長方形卽甲乙丙丁梯形之面積也又法以上闊下闊相併與長相乗得數折半即梯形之面積也設如三角形自尖至底中長二百尺底闊一百五十尺今欲自尖截長一百二十尺問截闊㡬何法以中長二百尺為一率底闊一百五十尺為二率截長一百二十尺為三率求得四率九十尺即所截之闊也如圖甲乙丙三角形甲丁中長二百尺乙丙底闊一百五十尺甲戊為所截長一百二十尺而甲丁與乙丙之比即同於甲戊與己庚之比也如以截闊求截長則以底闊為一率中長為二率截闊為三率所得四率即所截之長也設如不等邊兩直角斜方形長九十尺上闊二十尺下闊三十八尺今欲截中闊二十七尺問上下各截長㡬何法以上闊二十尺與下闊三十八尺相減餘一十八尺為一率長九十尺為二率以上闊二十尺與所截中闊二十七尺相減餘七尺為三率求得四率三十五尺即上所截之長以上所截之長三十五尺與總長九十尺相減餘五十五尺即下所截之長也如欲先得下所截之長則仍以上闊二十尺與下闊三十八尺相減餘一十八尺為一率長九十尺為二率乃以所截中闊二十七尺與下闊三十八尺相減餘一十一尺為三率求得四率五十五尺即下所截之長也如圖甲乙丙丁斜方形甲乙為長九十尺與丁戊等乙丙為下闊三十八尺甲丁為上闊二十尺與乙戊等己庚為所截中闊二十七尺上闊與下闊相減餘戊丙十八尺上闊與所截中闊相減餘辛庚七尺而戊丙與丁戊之比即同於辛庚與丁辛之比也又甲乙丙丁斜方形上闊與下闊相減餘戊丙十八尺所截中闊與下闊相減餘壬丙十一尺而戊丙與丁戊之比又同於壬丙與庚壬之比也如有所截上長或所截下長求截闊則以總長為一率上下闊相減所餘為二率截長為三率求得四率有上截長則與上闊相加有下截長則與下闊相減所得即所截之闊也設如梯形面積一千五百尺下闊四十尺中長五十尺問上闊幾何法以積一千五百尺倍之得三千尺用長五十尺除之得六十尺為上下兩闊相和之數内減下闊四十尺餘二十尺即上闊也如圖甲乙丙丁梯形倍之成甲乙己戊斜方形試將己角取直作己辛線則截斜方形一叚為己辛戊勾股形如以己辛戊勾股形移補於甲庚乙遂成庚乙己辛長方形其積原與甲乙己戊斜方形等今用庚乙中長除之得乙己即上下兩闊相和之數内減乙丙下闊所餘丙己與甲丁等即上闊也設如不等邊兩直角斜方形積九千六百尺長一百二十尺上下兩闊相差之較四十尺問上闊下闊各㡬何法以積九千六百尺倍之得一萬九千二百尺用長一百二十尺除之得一百六十尺為上下兩闊相和之數内減上下兩闊相差之較四十尺餘一百二十尺折半得六十尺為上闊加上下兩闊相差之較四十尺得一百尺即下闊也如圖甲乙丙丁斜方形其甲乙長一百二十尺甲丁上闊與乙丙下闊相差戊丙四十尺試將原積倍之遂成甲乙己庚長方形故以甲乙長除之得乙己為上下闊相和之數内減戊丙上下兩闊相差之較餘數折半得乙戊與甲丁等為上闊加戊丙較得乙丙為下闊也設如梯形面積六千六百五十尺長九十五尺上下兩闊相差之較二十尺問上闊下闊各幾何法以積六千六百五十尺倍之得一萬三千三百尺用長九十五尺除之得一百四十尺為上下兩闊相和之數内減上下兩闊相差之較二十尺餘一百二十尺折半得六十尺為上闊加上下兩闊相差之較二十尺得八十尺為下闊也如圖甲乙丙丁梯形甲戊長九十五尺甲丁上闊與乙丙下闊相差乙戊與己丙共二十尺試將原積倍之成甲乙庚辛斜方形與壬乙庚癸長方形之積等故以甲戊長除壬乙庚癸長方形得乙庚為上下兩闊相和之数内減乙戊與己丙上下兩闊相差之較餘折半得戊己與甲丁等為上闊加乙戊與己丙上下兩闊相差之較得乙丙為下闊也設如方環形外周二百八十丈内周一百二十丈求面積幾何法以外周二百八十丈四歸之得七十丈自乗得四千九百丈又以内周一百二十丈四歸之得三十丈自乗得九百丈兩自乗数相減餘四千丈卽方環之面積也如圖甲乙丙丁外周二百八十丈四歸之得甲乙之一邊自乗得甲乙丙丁大方積戊己庚辛内周一百二十丈四歸之得戊己之一邊自乗得戊己庚辛小方積兩方積相減所餘即方環之面積也又法以外周二百八十丈自乗得七萬八千四百丈内周一百二十丈自乗得一萬四千四百丈兩數相減餘六萬四千丈以十六除之得四千丈即方環面積也前法將内外周各四歸之而得内外方邊故以内外方邊各自乗相減而得方環面積此法即以内外周各自乘相減以十六除之而得方環面積也葢内外周為内外方邊之四倍内外周自乘之積必比内外方邊自乘之積大十六倍凡方邊大一倍則面積大四倍今方邊大四倍故面積大十六倍為隔一位相加之連比例也是以兩周各自乗相減之餘積比兩方邊各自乘相減之餘積亦大十六倍也又有方環面積求外方邊至内方邊之闊則以外周二百八十丈與内周一百二十丈相加得四百丈折半得二百丈以除方環面積四千丈得二十丈即外方邊至内方邊之闊也如圖自方環内邊作壬癸子丑二線則甲乙癸壬子丑丙丁為外方邊與闊相乘之二長方壬戊辛子己癸丑庚為内方邊與闊相乘之二長方引而長之成寅夘辰己一長方其長即半外周與半内周之和其闊即外方邊至内方邊之闊故以外周與内周相併折半除方環面積而得外方邊至内方邊之闊也又法以内方邊三十丈與外方邊七十丈相減餘四十丈折半得二十丈亦即外方邊至内方邊之闊也如圖甲丁為外方邊減與戊辛内方邊相等之壬子餘甲壬與子丁折半得甲壬即方環之闊也設如方環面積四千尺闊二十尺求内外方邊各幾何法以闊二十尺自乘得四百尺四因之得一千六百尺與環積四千尺相減餘二千四百尺四歸之得六百尺以闊二十尺除之得三十尺即内方邊又以闊二十尺倍之得四十尺加内方邊三十尺得七十尺即外方邊也如圖甲乙丙丁戊己庚辛方環形内減甲寅戊壬辰乙癸已子辛卯丁庚丑丙巳闊自乘之四正方餘寅辰巳戊辛庚巳卯壬戊辛子巳癸丑庚四長方四歸之得寅辰已戊一長方其闊即方環之闊其長即方環内邊之長故以寅戊闊除之得戊己為内方邊也又法置環積四千尺以闊二十尺除之得二百尺四歸之得五十尺加闊二十尺得七十尺即外方邊於五十尺内減闊二十尺餘三十尺即内方邊也如圖甲乙丙丁戊己庚辛方環積以闊除之即得壬癸子丑為内周外周相併折半之中數以四歸之即得壬癸一邊與戊寅等故加闊得外邊減闊得内邊也設如勾股形股三十六尺勾二十七尺今從上叚截勾股形積五十四尺問截長闊各幾何法以股三十六尺為一率勾二十七尺為二率截積五十四尺倍之得一百零八尺為三率求得四率八十一尺開方得九尺即所截之闊既得所截之闊則以勾二十七尺為一率股三十六尺為二率所截之闊九尺為三率求得四率十二尺即所截之長也此法一率與二率為線與線之比例三率與四率為面與面之比例也如圖甲乙丙勾股形甲乙為股三十六尺乙丙為勾二十七尺甲丁戊勾股形為截積五十四尺是故甲乙與乙丙之比應同於甲丁與丁戊之比然而無甲丁之數故將截積倍之為甲丁與丁戊相乘之長方則甲乙與乙丙之比必同於甲丁與丁戊相乘之長方與丁戊自乘之正方之比葢截積倍之成己甲丁戊長方形丁戊自乘成庚丁戊辛正方形此二形為二平行線内直角方形其面之互相為比同於其底之互相為比見幾何原本八卷第七節故開方而得丁戊為所截之闊又乙丙與甲乙之比即同於丁戊與甲丁之比而得甲丁為所截之長也若先求截長則以勾二十七尺為一率股三十六尺為二率倍截積一百零八尺為三率求得四率一百四十四尺開方得十二尺為所截之長葢乙丙與甲乙之比同於丁戊與甲丁之比亦必同於丁戊與甲丁相乘之長方與甲丁自乘之正方之比截積倍之成甲丁戊己長方形甲丁自乘成甲丁庚辛正方形此二形之面互相為比亦同於其底之互相為比也故開方而得甲丁為所截之長也既得截長則用比例四率求之亦得所截之闊矣又法以勾二十七尺與股三十六尺相乘折半得勾股積四百八十六尺為一率所截之勾股形積五十四尺為二率勾二十七尺自乘得七百二十九尺為三率求得四率八十一尺開方得九尺為所截之闊若以股二十六尺自乘得一千二百九十六尺為三率則得四率一百四十四尺開方得十二尺為所截之長也如圖甲乙丙勾股形截甲丁戊勾股形積五十四尺此兩勾股形為同式形故甲乙丙勾股積與甲丁戊勾股積之比同於乙丙勾自乘之乙己庚丙正方形與丁戊勾自乘之丁辛壬戊正方形之比亦必同於甲乙股自乗之癸子乙甲正方形與甲丁股自乗之丑寅丁甲正方形之比也設如勾股形股三十六尺勾二十七尺今從下叚截斜方形積四百三十二尺問截長及上闊各幾何法以股三十六尺為一率勾二十七尺為二率截積四百三十二尺倍之得八百六十四尺為三率求得四率六百四十八尺乃以勾二十七尺自乗得七百二十九尺内減所得四率六百四十八尺餘八十一尺開方得九尺為所截之上闊既得所截之上闊則以勾二十七尺為一率股三十六尺為二率所截之上闊九尺與勾二十七尺相減餘一十八尺為三率求得四率二十四尺即所截之長也此法亦係線與線為比面與面為比也如圖甲乙丙勾股形甲乙為股三十六尺乙丙為勾二十七尺丁乙丙戊斜方形為截積四百三十二尺其甲乙與乙丙之比應同於戊己即丁乙與己丙之比然而無戊己之數故將截積倍之遂成戊己之長與丁戊乙丙上下兩闊之和相乘之長方形將此長方形為三率所得四率即丁戊乙丙上下兩闊之較即己丙也與丁戊乙丙上下兩闊之和相乘之長方形也葢截積倍之成庚丁乙辛長方形己丙兩闊之較與两闊之和相乘成壬己丙癸長方形此二長方形同以兩闊之和為長故丁乙與己丙之比即如庚丁乙辛長方形與壬己丙癸長方形之比也又己丙上下兩闊之較與丁戊乙丙上下兩闊之和相乘之積與丁戊乙丙上下兩闊之數各自乗相減之餘積等試依乙丙度作子丑寅卯一大正方形又依丁戊度作子辰巳午一小正方形兩正方形相減所餘為辰丑寅卯午巳磬折形引而長之遂成辰丑申未長方形其辰丑即上下兩闊之較其丑申即上下兩闊之和故所得四率長方形積與辰丑寅卯午巳磬折形之積等今於乙丙自乘之子丑寅卯大正方形内減辰丑寅卯午巳磬折形所餘即丁戊自乘之子辰巳午小正方形故開方而得丁戊為所截之闊也既得所截之闊則以丁戊與乙丙相減餘巳丙而乙丙與甲乙之比卽同於己丙與戊己卽丁乙之比也又法以勾二十七尺與股三十六尺相乘折半得勾股積四百八十六尺内減從下叚所截之斜方積四百三十二尺餘五十四尺即為從上段所截之勾股形積依前法比例求之所得亦同設如三角形中長二十尺底闊一十五尺今從上段截三角形積五十四尺問截長闊各幾何法以底闊一十五尺為一率中長二十尺為二率截積五十四尺倍之得一百零八尺為三率求得四率一百四十四尺開方得一十二尺即所截之長既得所截之長則以中長二十尺為一率底闊十五尺為二率所截之長十二尺為三率求得四率九尺卽所截之闊也此法亦一率與二率為線與線之比例三率與四率為面與面之比例也如圖甲乙丙三角形甲丁中長二十尺乙丙底闊十五尺甲戊己三角形為截積五十四尺是故乙丙與甲丁之比應同於戊己與甲庚之比然而無戊己之數故將截積倍之為戊己與甲庚相乘之長方則乙丙與甲丁之比必同於戊己與甲庚相乘之長方與甲庚自乘之正方之比故開方而得甲庚為所截之長又甲丁與乙丙之比同於甲庚與戊己之比而得戊己為所截之闊也若先求截闊則以中長二十尺為一率底闊一十五尺為二率倍截積一百零八尺為三率求得四率八十一尺開方得九尺為所截之闊葢甲丁與乙丙之比同於甲庚與戊己之比亦同於甲庚與戊己相乘之長方與戊己自乘之正方之比故開方而得戊己為所截之闊也既得截闊則用比例四率求之亦得所截之長矣又法以底闊十五尺與中長二十尺相乘折半得三角積一百五十尺為一率所截之三角積五十四尺為二率以底闊十五尺自乘得二百二十五尺為三率求得四率八十一尺開方得九尺為所截之闊若以中長二十尺自乘得四百尺為三率則得四率一百四十四尺開方得十二尺為所截之長也如圖甲乙丙三角形截甲戊己三角形積五十四尺此兩三角形為同式形故甲乙丙三角形積與甲戊己三角形積之比同於甲丁中長自乘之甲丁辛壬正方形與甲庚截長自乘之甲庚癸子正方形之比亦同於乙丙底闊自乘之乙丙丑寅正方形與戊己截闊自乘之戊巳卯辰正方形之比也設如三角形中長二十尺底闊十五尺今從下段截梯形積九十六尺問截長及上闊各幾何法以中長二十尺為一率底闊十五尺為二率截積九十六尺倍之得一百九十二尺為三率求得四率一百四十四尺乃以底闊十五尺自乘得二百二十五尺内減所得四率一百四十四尺餘八十一尺開方得九尺為所截之上闊既得所截之上闊則以底闊十五尺為一率中長二十尺為二率所截之上闊九尺與底闊十五尺相減餘六尺為三率求得四率八尺即所截下段之長也如圖甲乙丙三角形甲丁為中長二十尺乙丙為底闊十五尺戊乙丙己梯形為截積九十六尺戊己為所截之闊庚丁與戊辛己壬等為所截之長乙辛壬丙兩叚為截闊與底闊之較是故甲丁與乙丙之比應同於庚丁與乙辛壬丙兩段之比矣葢甲丁與乙丁之比同於等庚丁之戊辛與乙辛之比又甲丁與丁丙之比同於等庚丁之己壬與壬丙之比合之則甲丁與乙丁丁丙兩叚之比亦同於庚丁與乙辛壬丙兩段之比也但今無庚丁之數故將截積倍之遂成庚丁所截之長與戊己乙丙上下兩闊之和相乘之長方形將此長方形為三率所得四率即乙辛壬丙上下兩闊之較與戊己乙丙上下兩闊之和相乘之長方形也又乙辛壬丙上下兩闊之較與戊己乙丙上下兩闊之和相乘之積與戊己乙丙上下兩闊之數各自乘相減之餘積等故以所得四率長方形積與乙丙自乘方積相減即餘戊己自乘方積開方而得戊己為所截之闊也既得戊己截闊則於乙丙底闊内減之餘乙辛壬丙而乙丙與甲丁之比又同於乙辛壬丙兩段與庚丁截長之比也又法以底闊十五尺與中長二十尺相乘折半得三角形積一百五十尺内減從下段所截之梯形積九十六尺餘五十四尺卽為從上段所截之三角形積依前法比例求之所得亦同設如不等邊兩直角斜方形長二十四尺上闊十二尺下闊二十尺今從上段截積一百六十八尺問截長闊各幾何法以長二十四尺為一率下闊二十尺内減上闊十二尺餘八尺為二率截積一百六十八尺倍之得三百三十六尺為三率求得四率一百一十二尺乃以上闊十二尺自乘得一百四十四尺與所得四率一百一十二尺相加得二百五十六尺開方得十六尺即所截之闊既得所截之闊則以上下兩闊相減之較八尺為一率長二十四尺為二率截闊十六尺内減上闊十二尺餘四尺為三率求得四率十二尺即所截之長也此法亦係一率與二率為線與線之比例三率與四率為面與面之比例也如圖甲乙丙丁斜方形甲乙長二十四尺與丁戊等甲丁為上闊十二尺乙丙為下闊二十尺甲己庚丁斜方形為截積一百六十八尺是故丁戊與戊丙之比應同於丁辛與辛庚之比然而無丁辛之數故將截積倍之爲丁辛截長與甲丁己庚上中兩闊之和相乘之長方形為三率所得四率即辛庚上中兩闊之較與甲丁己庚上中兩闊之和相乘之長方形也又辛庚上中兩闊之較與甲丁己庚上中兩闊之和相乘之積與甲丁己庚上中兩闊之數各自乘相減之餘積等試依己庚度作壬癸子丑一大正方形又依甲丁度作壬寅卯辰一小正方形兩正方形相減所餘為寅癸子丑辰卯磬折形引而長之遂成寅癸巳午長方形其寅癸即上中兩闊之較其癸己即上中兩闊之和故所得四率長方形積與寅癸子丑辰卯磬折形之積等今於甲丁自乘之壬寅卯辰小正方形外加寅癸子丑辰卯磬折形即得巳庚自乘之壬癸子丑大正方形故開方而得已庚為所截之闊也既得所截之闊則以己庚與甲丁相減餘辛庚而戊丙與丁戊之比卽同於辛庚與丁辛之比也又法將斜方形增作勾股形算之以上闊十二尺與下闊二十尺相減餘八尺為一率長二十四尺為二率上闊十二尺為三率求得四率三十六尺為斜方形上所增小勾股形之股與斜方形之長二十四尺相加得六十尺為斜方形與所增小勾股形相併所成之大勾股形之股乃以上闊十二尺為小勾所得三十六尺為小股相乘得四百三十二尺折半得二百一十六尺為斜方形上所增之小勾股形積與截積一百六十八尺相加得三百八十四尺為所截之勾股形積乃用勾股形從上段截勾股積法算之而得所截之闊焉如圖甲乙丙丁斜方形增作勾股形為壬乙丙其上闊甲丁與下闊乙丙相減所餘為戊丙以戊丙與丁戊之比同於甲丁與壬甲之比得壬甲為小勾股形之股以壬甲與甲乙相加得壬乙為大勾股形之股又壬甲丁勾股形積與甲己庚丁斜方形截積相加得壬己庚勾股形積即壬乙丙大勾股形從上段截壬己庚勾股形積也設如不等邊兩直角斜方形長二十四尺上闊十二尺下闊二十尺今從下段截積二百一十六尺求截長闊各幾何法以長二十四尺為一率下闊二十尺内減上闊十二尺餘八尺為二率截積二百一十六尺倍之得四百三十二尺為三率求得四率一百四十四尺乃以下闊二十尺自乘得四百尺内減所得四率一百四十四尺餘二百五十六尺開方得一十六尺為所截之闊既得所截之闊則以上下兩闊相減之較八尺為一率長二十四尺為二率下闊二十尺内減截闊十六尺餘四尺為三率求得四率十二尺即所截下段之長也此與勾股形從下叚截斜方形積之理同前法從上段截積所得四率為上闊與截闊各自乘相減之餘積上闊小而截闊大故以上闊自乘與所得四率相加開方而得截闊此法從下段截積所得四率為下闊與截闊各自乘相減之餘積下闊大而截闊小故以下闊自乘内減所得四率開方而得截闊也設如梯形長十二丈上闊五丈下闊十一丈今從上段截積二十四丈問截長闊各幾何法以長十二丈為一率上闊五丈與下闊十一丈相減餘六丈為二率截積二十四丈倍之得四十八丈為三率求得四率二十四丈乃以上闊五丈自乘得二十五丈與所得四率二十四丈相加得四十九丈開方得七丈即所截之闊既得所截之闊則以上下兩闊相減之較六丈為一率長十二丈為二率截闊七丈内減上闊五丈餘二丈為三率求得四率四丈即所截之長也此法亦係一率與二率為線與線之比例三率與四率為面與面之比例也如圖甲乙丙丁梯形甲戊長十二丈甲丁上闊五丈戊己庚辛俱相等乙丙下闊十一丈乙戊與己丙兩段為上下兩闊相減之較六丈甲壬癸丁小梯形為截積二十四丈是故甲戊總長與乙戊己丙上下兩闊之較之比應同於甲庚截長與壬庚辛癸上中兩闊之較之比然無甲庚之數故將截積倍之為甲庚截長與甲丁壬癸上中兩闊之和相乘之長方形為三率所得四率即壬庚辛癸上中兩闊之較與甲丁壬癸上中兩闊之和相乘之長方形也又壬庚辛癸上中兩闊之較與甲丁壬癸上中兩闊之和相乘之積與甲丁壬癸上中兩闊之數各自乘相減之餘積等故以所得四率長方形積與甲丁自乘方積相加即得壬癸自乗方積開方而得壬癸為所截之闊也既得壬癸截闊則以上下兩闊相減之乙戊己丙兩叚與甲戊總長之比卽同於上中兩闊相減之壬庚辛癸兩叚與甲庚截長之比矣又法將梯形增作三角形算之以上闊五丈與下闊十一丈相減餘六丈為一率長十二丈為二率上闊五丈為三率求得四率十丈為梯形上所増小三角形之中長與梯形之長十二丈相加得二十二丈為梯形與所増小三角形相併所成之大三角形之中長乃以上闊五丈為底所得十丈為中長相乗得五十丈折半得二十五丈為梯形上所増之小三角形積與截積二十四丈相加得四十九丈為所截之三角形積乃用三角形從上段截三角積法算之而得所截之闊焉如圖甲乙丙丁梯形增作三角形為子乙丙其上闊甲丁與下闊乙丙相減所餘為乙戊己丙而乙戊己丙與甲戊之比即同於甲丁與子丑之比得子丑為小三角形之中長以子丑與等甲戊之丑寅相加得子寅為大三角形之中長又子甲丁三角形積與甲壬癸丁斜方形截積相加得子壬癸三角形積即子乙丙大三角形從上段截子壬癸三角形積也設如梯形長十二丈上闊五丈下闊十一丈今自下叚截積七十二丈問截長闊各幾何法以長十二丈為一率上闊五丈與下闊十一丈相減餘六丈為二率以截積七十二丈倍之得一百四十四丈為三率求得四率七十二丈乃以下闊十一丈自乗得一百二十一丈内減所得四率七十二丈餘四十九丈開方得七丈即所截之闊既得所截之闊則以上下兩闊相減之較六丈為一率長十二丈為二率截闊七丈與下闊十一丈相減餘四丈為三率求得四率八丈即所截之長也如圖甲乙丙丁梯形甲戊長十二丈甲丁上闊五丈與戊己等乙丙下闊十一丈乙戊與己丙兩段為上下兩闊相減之較六丈庚乙丙辛梯形為截積七十二丈是故甲戊總長與乙戊己丙上下兩闊之較之比應同於庚壬截長與乙壬癸丙中下兩闊之較之比然無庚壬之數故將截積倍之為庚壬截長與庚辛乙丙中下兩闊之和相乗之長方形為三率所得四率卽乙壬癸丙中下兩闊之較與庚辛乙丙中下兩闊之和相乗之長方形也又乙壬癸丙中下兩闊之較與庚辛乙丙中下兩闊之和相乗之積與庚辛乙丙中下兩闊之數各自乗相減之餘積等故以所得四率長方形積與乙丙自乗方積相減即餘庚辛自乗方積開方而得庚辛為所截之闊也設如梯形長一百二十尺上闊二十尺下闊八十尺今自一邊截勾股積四百五十尺問截長闊各幾何法以長一百二十尺為一率上闊二十尺與下闊八十尺相減餘六十尺折半得三十尺為二率截積四百五十尺倍之得九百尺為三率求得四率二百二十五尺開方得一十五尺為所截之闊既得所截之闊則以上下兩闊相減折半之三十尺為一率長一百二十尺為二率截闊十五尺為三率求得四率六十尺為所截之長也如圖甲乙丙丁梯形甲丁上闊二十尺與戊己等乙丙下闊八十尺甲戊長一百二十尺乙戊為上下闊相減折半之三十尺庚乙辛為所截勾股積四百五十尺甲乙戊勾股形與庚乙辛勾股形為同式形故立算與勾股形從上段截勾股積之法相同也設如梯形長一百二十尺上闊四十尺下闊八十尺今自一邊截斜方形積四千二百尺問截上闊下闊各幾何法以上闊四十尺與下闊八十尺相減餘四十尺折半得二十尺為所截斜方形上闊與下闊之較又以截積四千二百尺倍之得八千四百尺以長一百二十尺餘之得七十尺為所截斜方形上闊與下闊之和内減上闊下闊之較二十尺餘五十尺折半得二十五尺為上闊加較二十尺得四十五尺為下闊也如圖甲乙丙丁梯形甲丁為上闊四十尺與戊己等乙丙為下闊八十尺甲戊為長一百二十尺甲乙辛庚為所截斜方形積四千二百尺倍之成壬癸辛庚長方形乙戊為所截斜方形上下兩闊之較今以甲戊長除壬癸辛庚長方積得癸辛為上下兩闊之和内減乙戊上下兩闊之較餘癸乙與戊辛折半得戊辛與甲庚等即所截斜方形之上闊加乙戊上下兩闊之較得乙辛即所截斜方形之下闊也設如三角形小腰邊二十丈大腰邊三十四丈底邊四十二丈面積三百三十六丈今欲平分面積一半與原三角形為同式形問所截三邊各幾何法以原面積三百三十六丈為一率原面積折半得一百六十八丈為二率底邊四十二丈自乗得一千七百六十四丈為三率求得四率八百八十二丈開方得二十九丈六尺九寸八分四釐八豪有餘為所截之底邊乃以全底邊四十二丈為一率大腰邊三十四丈為二率所截之底邊二十九丈六尺九寸八分四釐八豪有餘為三率求得四率二十四丈零四寸一分六釐二豪有餘為所截之大腰邊仍以全底邊四十二丈為一率小腰邊二十丈為二率所截之底邊二十九丈六尺九寸八分有餘為三率求得四率十四丈一尺四寸二分一釐三豪有餘即所截之小腰邊也如圖甲乙丙三角形平分面積一半成丁戊丙三角形此兩三角形既為同式形則甲乙丙三角形之面積與丁戊丙三角形之面積之比同於各邊各自乗之正方面積與所截各邊各自乗之正方面積之比故以甲乙丙三角形面積為一率丁戊丙三角形面積為二率乙丙底邊自乗如乙己庚丙正方面為三率所得四率即戊丙截底自乗如戊辛壬丙正方面故開方得戊丙也既得戊丙則乙丙與甲丙之比同於戊丙與丁丙之比又乙丙與甲乙之比同於戊丙與丁戊之比俱為相當比例四率也若取原積三分之一或幾分之幾者則將其積以其分數歸之比例並同又法以乙丙邊四十二丈自乗折半開方即得戊丙邊甲丙邊自乗折半開方即得丁丙邊甲乙邊自乗折半開方即得丁戊邊此即面與面比線與線比之理也又法設全積為一尺半積為五十寸乃以五十寸開方得七寸零七釐一豪零六忽而以各邊之數乗之即得各邊所截之數葢全積為一尺其全邊亦為一尺半積為五十寸其截邊為七寸零七釐一豪零六忽今以一尺與全邊之比即同於七寸零七釐一豪零六忽與截邊之比又因一尺為一率故省一率之除止用乗而即得也若取幾分之一者皆倣此類推之設如大小兩正方面積共四百一十尺大正方邊比小正方邊多六尺問兩正方邊及面積各幾何法以兩正方面積共四百一十尺倍之得八百二十尺又以多六尺自乗得三十六尺與倍共積八百二十尺相減餘七百八十四尺開方得二十八尺為大小兩正方邊之和加大正方比小正方每邊所多六尺得三十四尺折半得十七尺為大正方之邊内減六尺餘十一尺為小正方之邊以大正方邊十七尺自乗得二百八十九尺為大正方之面積以小正方邊十一尺自乗得一百二十一尺為小正方之面積也如圖甲乙丙丁一大正方形丁戊己庚一小正方形戊丙為兩正方邊之較試以兩正方之共積倍之則得甲辛壬庚一正方形仍餘癸子丙戊兩正方邊之較自乗之一正方形葢癸丑壬己正方形與甲乙丙丁正方形等乙辛丑子正方形與丁戊己庚正方形等其中疊一癸子丙戊正方形即戊丙較自乗之積故以戊丙較自乗與所倍共積相減即得甲辛壬庚正方形開方得甲庚為兩正方邊之和加較折半得丁丙為大正方邊内減戊丙較得丁戊為小正方邊既得方邊則各自乗即得各面積矣又法以兩正方邊之較六尺自乗得三十六尺與兩正方共積四百一十尺相減餘三百七十四尺折半得一百八十七尺為長方積以兩正方邊之較六尺為長闊之較用帶縱較數開方法算之得闊十一尺為小正方之邊加較六尺得十七尺為大正方之邊也如圖甲乙丙丁一大正方形丁戊己庚一小正方形戊丙為兩正方邊之較以戊丙邊較自乗得辛壬丙戊一正方形與共積相減餘甲乙壬辛己庚磬折形如以癸乙壬辛長方形移於庚己子丑即戊甲癸子丑一長方形折半得丁戊子丑一長方形庚丑與戊丙等即長闊之較故用帶縱較數開方法算之得丁戊闊即小方邊加庚丑較得丁丑與丁丙等即大方邊也設如大小兩正方面積共六百一十七尺大小兩正方邊共三十五尺問大小兩正方邊及面積各幾何法以兩正方面積共六百一十七尺倍之得一千二百三十四尺又以兩正方邊共三十五尺自乗得一千二百二十五尺與倍共積一千二百三十四尺相減餘九尺開方得三尺為大小兩正方邊之較與共邊三十五尺相加得三十八尺折半得十九尺為大正方之邊内減兩正方邊之較三尺餘十六尺為小正方之邊以大正方邊十九尺自乗得三百六十一尺為大正方之面積以小正方邊十六尺自乗得二百五十六尺為小正方之面積也如圖甲乙丙丁一大正方形丁戊己庚一小正方形甲庚為兩正方邊之和戊丙為兩正方邊之較試以兩正方之共積倍之則得甲辛壬庚正方形而多癸子丙戊較自乗之一正方形故以甲庚共邊自乗得甲辛壬庚正方形與倍共積相減卽餘癸子丙戊一小正方形開方得戊丙即兩正方邊之較與兩正方邊之和相加折半得丁丙為大正方邊内減戊丙較得丁戊為小正方邊旣得方邊則各自乗卽得各面積矣又法以兩正方邊之和三十五尺自乗得一千二百二十五尺内減兩正方共積六百一十七尺餘六百零八尺折半得三百零四尺為長方積以兩正方邊之和三十五尺為長闊和用帶縱和數開方法算之得闊十六尺為小正方之邊與共積三十五尺相減餘十九尺為大正方之邊也如圖甲乙丙丁一大正方形戊己庚辛一小正方形以共邊自乗得壬癸子丑一正方形内減與甲乙丙丁大正方形相等之寅癸卯辰一正方形又減與戊己庚辛小正方形相等之午辰己丑一正方形餘壬寅辰午與辰卯子己二長方形折半得壬寅辰午一長方形其壬午長與甲乙大方邊等壬寅闊與戊己小方邊等兩正方之共邊卽長闊之和故用帶縱和數開方法算之得闊為小方邊得長為大方邊也設如大小兩正方形大正方邊比小正方邊多七尺大正方積比小正方積多三百四十三尺問大小兩正方邊各幾何法以大正方積比小正方積所多三百四十三尺用大正方邊比小正方邊所多七尺除之得四十九尺為大小兩正方邊之和加兩正方邊之較七尺得五十六尺折半得二十八尺為大正方之邊與共邊四十九尺相減餘二十一尺為小正方之邊也如圖甲乙丙丁一大正方形戊己庚辛一小正方形試於甲乙丙丁大正方形内作與戊己庚辛相等之甲壬癸子小正方形則壬乙丙丁子癸磬折形即大正方比小正方所多之積引而長之成壬乙丑寅一長方形其壬乙闊即兩正方邊之較乙丑長卽兩正方邊之和故以壬乙兩正方邊之較除之得乙丑兩正方邊之和以乙丑與丁乙相加折半得乙丙為大正方形之邊將乙丙與乙丑共邊相減餘丙丑與子癸等卽戊己為小正方形之邊也設如大小兩正方形共邊三十一尺大正方積比小正方積多一百五十五尺問大小兩正方邊各幾何法以大正方積比小正方積所多一百五十五尺用共邊三十一尺除之得五尺為大小兩正方邊之較與共邊三十一尺相加得三十六尺折半得十八尺為大正方之邊與共邊三十一尺相減餘十三尺為小正方之邊也如圖甲乙丙丁一大正方形戊己庚辛一小正方形試於甲乙丙丁大正方形内作與戊己庚辛相等之甲壬癸子小正方形則壬乙丙丁子癸磬折形即大正方比小正方所多之積引而長之成壬乙丑寅長方形其乙丑長即兩正方邊之和其壬乙闊即兩正方邊之較故以乙丑兩正方邊之和除之得壬乙與乙丑相加折半得乙丙為大正方形之邊以乙丙與乙丑相減餘丙丑與子癸等即戊己為小正方形之邊也設如大小兩正方形共積一百三十尺大正方積比小正方積多三十二尺問大小兩正方邊各幾何法以大正方積比小正方積所多三十二尺與共積一百三十尺相減餘九十八尺折半得四十九尺為小正方之積開方得七尺為小正方之邊又以小正方積四十九尺與大正方積比小正方積多三十二尺相加得八十一尺為大正方之積開方得九尺為大正方之邊也如圖甲乙丙丁一大正方形戊己庚辛一小正方形試於甲乙丙丁大正方形内作與戊己庚辛相等之壬癸丙子小正方形則甲乙癸壬子丁磬折形即大正方比小正方所多之積以此磬折形積與兩正方形之共積相減餘壬癸丙子與戊己庚辛兩小正方形折半得戊己庚辛一小正方形故開方得戊己為小方邊又以戊己庚辛相等之壬癸丙子小正方形積與甲乙癸壬子丁磬折形積相加即得甲乙丙丁大正方形故開方得甲乙為大方邊也設如不等三正方形共積三百八十一尺大方邊比次方邊多三尺次方邊比小方邊多三尺問三方邊各幾何法以大方邊比次方邊所多三尺與次方邊比小方邊所多三尺相加得六尺為大方邊比小方邊所多之較自乗得二十六尺又以次方邊比小方邊所多三尺自乗得九尺兩數相併得四十五尺與共積三百八十一尺相減餘三百三十六尺三因之得一千零八尺為長方積以大方邊比小方邊多六尺倍之得十二尺又以次方邊比小方邊多三尺倍之得六尺兩數相併得十八尺為長闊之較用帶縱較數開方法算之得闊二十四尺三歸之得八尺為小正方形之邊加次方邊比小方邊多三尺得十一尺為次正方形之邊又加大方邊比次方邊多三尺得十四尺為大正方形之邊也如圖甲乙丙丁一大正方形戊己庚辛一次正方形壬癸子丑一小正方形試於甲乙丙丁大正方形内作與壬癸子丑相等之寅乙卯辰小正方形則辰己即大正方邊比小正方邊所多之較又於戊己庚辛次正方形内作與壬癸子丑相等之午己未申小正方形則申酉即次正方邊比小正方邊所多之較以辰己自乗得辰己丁戌一正方形以申酉自乗得申酉辛亥一正形形以所得兩正方形之共積與三正方形之共積相減則餘寅乙卯辰午己未申壬癸子丑三小正方形及甲寅辰戌辰卯丙己戊午申亥申未庚酉四長方形又試將此所餘三小正方形及四長方形之積共作壬癸乾坎一長方形加三倍卽成艮癸乾震一大長方形其艮癸闊為壬癸小方邊之三倍與癸巽等巽乾卽長闊之較而巽離乃辰己與甲寅相併之數為大方邊比小方邊所多之較之二倍離乾乃申酉與戊午相併之數為次方邊比小方邊所多之較之二倍故以大方邊與小方邊之較倍之得巽離又以次方邊與小方邊之較亦倍之得離乾巽離與離乾相併得巽乾為長闊之較用帶縱較數開方法算之得艮癸闊三歸之得壬癸為小正方形之邊加次方邊比小方邊所多之較卽得次正方形之邊又加大方邊比次方邊所多之較卽得大正方形之邊也設如甲乙丙丁不等邊無直角四邊形甲乙邊十尺甲丁邊十七尺丁丙邊二十八尺乙丙邊三十五尺自丁角至乙角斜線二十一尺問面積幾何法以丁乙斜線分為甲乙丁丁乙丙兩三角形算之先用甲乙丁三角形求得甲戊埀線八尺與乙丁二十一尺相乗折半得八十四尺為甲乙丁三角形之面積又用丁乙丙三角形求得丁己垂線一十六尺八寸與乙丙三十五尺相乗折半得二百九十四尺為丁乙丙三角形之面積以兩三角形之面積相併得三百七十八尺卽甲乙丙丁四邊形之面積也凡無法多邊形皆任以兩角作對角斜線分為幾三角形算之舊術四不等邊形分為兩段一為勾股形一為斜方形葢必有二平行線然後可算若此法非二平行線者則必分為丁己丙與丁甲庚二勾股形甲乙己庚一斜方然後可算不如分為兩三角形算之為簡㨗而密合也設如甲乙丙三角形面積三百八十四尺乙丙底邊二十二尺今自甲角將原積平分為二問每分底邊幾何法以乙丙底邊三十二尺折半得十六尺卽每分底邊之數也葢自甲至乙丙線上作甲戊垂線則甲丁乙甲丁丙兩三角形同以甲戊為髙即為二平行線内同底兩三角形其面積必等見幾何原本三卷第十節故甲丁乙甲丁丙兩三角形積為相等而各得甲乙丙三角形積之一半也如分三分或四分者倣此類推設如甲乙丙丁二平行線無直角四邊形甲乙邊八丈丙丁邊十二丈面積一百六十丈今將原積分為四分問每分截邊幾何法以甲乙八丈與丙丁十二丈相加得二十丈四歸之得五丈即每分所截之邊乃自甲量至戊得五丈自戊至丙作戊丙線成甲戊丙三角形為第一分又從丙量至己得五丈自戊至己作戊己線成丙戊己三角形為第二分又從己量至庚得五丈自戊至庚作戊庚線成己戊庚三角形為第三分又自庚至丁餘二丈自戊至乙餘三丈庚丁與戊乙相併亦得五丈成戊庚丁乙斜方形即為第四分也葢甲乙與丙丁二線既為平行自乙至辛作乙辛垂線則三三角形與一斜方形同以乙辛為高其邊線既等則所得各形之面積亦必相等而各為四邊形面積之四分之一也設如甲乙丙丁戊不等邊無直角五邊形面積一十九丈九十八尺甲乙邊二丈五尺乙丙邊三丈九尺丙丁邊六丈丁戊邊一丈五尺甲戊邊四丈一尺自甲角至丙角斜線五丈六尺自甲角至丁角斜線五丈二尺今自甲角將面積平分為三分問截各邊幾何法以面積十九丈九十八尺三分之每分得六丈六十六尺乃以甲丙甲丁二斜線分為甲乙丙甲丙丁甲丁戊三三角形算之用三角形求面積法求得甲乙丙三角形面積四丈二十尺甲丙丁三角形面積一十三丈四十四尺甲丁戊三角形面積二丈三十四尺因甲乙丙甲丁戊兩三角形面積俱不足一分所應得之數而甲丙丁三角形面積又過一分所應得之數故先以甲乙丙三角形面積四丈二十尺與每分所應得六丈六十六尺相減餘二丈四十六尺卽第一分應得甲乙丙三角形面積外又截甲丙丁三角形以補之之數乃以甲丙丁三角形面積一十三丈四十四尺為一率所應截之二丈四十六尺為二率丙丁邊六丈為三率求得四率一丈零九寸八分有餘為甲丙丁三角形補甲乙丙三角形分數之邊如丙己乃自甲至己作甲己線成甲乙丙己不等邊四邊形為第一分又以甲丙丁三角形面積一十三丈四十四尺為一率每分所應得六丈六十六尺為二率丙丁邊六丈為三率求得四率二丈九尺七寸三分有餘為甲丙丁三角形内應得一分之邊如己庚又自甲至庚作甲庚線成甲己庚三角形為第二分餘甲庚丁戊不等邊四邊形即第三分此三分之面積俱為相等也葢兩形同髙者其面積之比例同於其底邊之比例故以甲丙丁三角形面積與甲丙己三角形截積之比同於丙丁與丙己之比而得甲丙己三角形面積為二丈四十六尺與甲乙丙三角形面積四丈二十尺相加得六丈六十六尺又甲丙丁三角形面積與甲己庚三角形面積之比同於丙丁與己庚之比而得甲己庚三角形面積六丈六十六尺則所餘甲庚丁戊四邊形面積亦必為六丈六十六尺若以甲丁戊三角形面積二丈三十四尺與每分六丈六十六尺相減餘四丈三十二尺卽甲庚丁三角形面積乃以甲丙丁三角形面積與甲庚丁三角形面積之比同於丙丁與庚丁之比而得庚丁一丈九尺二寸八分有餘與丙己己庚相加得六丈以合丙丁原數也御製數理精蘊下編卷十九
