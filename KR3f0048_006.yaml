body:
  text: 欽定四庫全書御製數理精藴下編卷一首部一度量權衡命位加法減法因乘歸除度量權衡虞書同律度量衡蓋度量衡皆本於律而律為萬事之本也漢志曰度者分寸尺丈引所以度長短也本起於黃鐘之長以子榖秬黍中者一黍之廣度之九十分黃鐘之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣量者籥合升斗斛所以量多少也本起於黃鐘之籥以子榖秬黍中者千二百實其籥合籥為合十合為升十升為斗十斗為斛而五量嘉矣權者銖兩斤鈞石所以權輕重也本起於黃鐘之重一籥容千二百黍重十二銖兩之為兩十六兩為斤三十斤為鈞四鈞為石而五權謹矣通考曰律度量衡並因秬黍散為諸法其率可通外此則代不一名度之異名者如左傳注方丈曰堵三堵曰雉長三丈高一丈易緯通卦驗十馬尾為一分孫子算術曰蠶所吐絲為忽十忽為絲十絲為豪十豪為釐十釐為分十分為寸十寸為尺十尺為丈小爾雅曰跬一舉足也倍跬謂之步四尺謂之仞倍仞謂之尋倍尋謂之常五尺謂之墨倍墨謂之丈倍丈謂之端倍端謂之兩倍兩謂之匹匹百謂之束孔安國又以八尺為仞説文曰人手却十分動脈為寸口十寸為尺周制寸咫尺尋常仞皆以人體為法又曰婦人手八寸謂之咫周尺也又曰丈丈夫也周制以八寸為尺十尺為丈人長八尺故曰丈夫量之異名者如左傳齊舊四量豆區釜鍾四升曰豆各自其四以登於釜六斗四升釜十則鍾六十四斗論語注十六斗曰庾十六斛曰秉孫子算術曰六粟為圭十圭為抄十抄為撮十撮為勺十勺為合漢應劭又以四圭為撮孟康以六十四黍為圭小爾雅一手之盛謂之溢兩手謂之掬掬四謂之豆豆四謂之區區四謂之釡釜二有半謂之藪藪二有半謂之缶缶二謂之鍾鍾二謂之秉秉十六斛衡之異名者如漢志注應劭曰十黍為纍十纍為銖小爾雅二十四銖曰兩兩有半曰捷倍捷曰舉倍舉曰鋝鋝謂之鍰二鍰四兩謂之斤斤十謂之衡衡有半謂之稱稱二謂之鈞鈞四謂之石石四謂之鼓通考唐劉承圭以忽萬為分絲則千豪則百釐則十轉以十倍倍之則為一錢黍以二千四百枚為一兩纍以二百四十銖以二十四是則度量衡之名不一故其為制不同而紛雜難用然時易世殊古今沿革有必不可比而同者故入算之際不過取其大同者以審不齊之物耳要之度定于丈量定于石衡定於兩大之而遞進于無窮小之而遞析於不可測爰悉其名目于左以為數學之所資焉度法丈以下曰尺十寸寸十分分十釐釐十豪豪十絲絲十忽忽十微微十纖纖十沙沙十塵塵十埃埃十渺渺十漠漠以下皆以十析糢糊逡巡須臾瞬息彈指剎那六德虛空清淨量法石以下曰斗十升升十合合十勺勺十撮撮十抄抄十圭圭六粟粟衡法兩以下曰錢十分分十釐釐十豪豪十絲絲十忽忽以下並與度法同凡度量衡自單位以上則曰十百千萬億兆京垓秭穰溝澗正載極恆河沙阿僧秪那由他不可思議無量數自億以上有以十進者如十萬曰億十億曰兆之類有以萬進者如萬萬曰億萬億曰兆之類有以自乘之數進者如萬萬曰億億億曰兆之類今立法從中數厯法則曰宮三十度度六十分分六十秒秒六十微微六十纖纖六十忽忽六十芒芒六十塵塵又有日十二時又為二十四小時時八刻又以小時為四刻刻十五分分以下與前同田法則曰頃百畝畝積二百四十步分積二十四步里法則三百六十步計一百八十丈為一里古稱在天一度在地二百五十里今尺驗之在天一度在地二百里蓋古尺得今尺之十分之八實緣縱黍橫黍之分也石法二千五百寸按漢志曰斛重二鈞又曰四鈞為石是二斛為一石也古尺斛積一千六百二十寸為今尺之八百六十寸有竒倍之得古尺石積三千二百四十寸為今尺之一千七百二十寸有竒以權法凖之石重一百二十斤求其積古尺應得三千一百一十寸為今尺之一千六百五十寸有竒今之權法又加古一倍則今尺石積應得三千三百寸有竒今現行斛積為一千五百八十寸石積為三千一百六十寸舊算書所載數各不同而多以二千五百寸為率總之古今尺度不同古今量法亦不一須先求其斗斛之積數然後用其積數以比例之方得密合今設例從舊數命位凡數視所命單位為本如度法命丈為單位則尺寸分釐皆為竒零命尺為單位則寸以下為竒零而丈則進而為十若命寸為單位則分以下為竒零而尺則進而為十丈則進而為百量法命石為單位則斗升合勺皆為竒零命斗為單位則升以下為竒零而石則進而為十若命升為單位則合以下為竒零而斗則進而為十石則進而為百衡法命兩為單位則錢分釐豪皆為竒零命錢為單位則分以下為竒零而兩則進而為十若命分為單位則釐以下為竒零而錢則進而為十兩則進而為百故凡列數單為一位十為二位百為三位千為四位萬為五位如有數一萬二千三百四十五則以單位為末向前列之共有五位即知此數首位是萬矣至于厯法宮度分秒日時刻分之定位則每項命兩位如宮曰幾十幾宮度曰幾十幾度分曰幾十幾分之類蓋因秒以六十而進分分以六十而進度度以三十而進宮故常例一位即命一等者宮度時刻則兩位命為一等而每一等有十單之别焉此又命位之最要者也凡數未至單位者必須作以存其位如有數一萬二千三百四十丈則補作以存單位如上式又如有數一萬二千丈則補作以存百十單之位如下式凡數單位後有竒零者必作點於單位上以志之如有金三百四十五兩六錢七分命兩為單位則於五上作點志之如上式又如有米六石五斗四升三合命石為單位則於六上作點志之如下式凡列衆數幾多位中有空者必作以存其位如有數二萬零四百五十六此中千位無數故必作於萬後百前以存其位如上式又如有數一萬零三十四此中千位百位俱無數故補作兩於萬後十前以存其位如下式凡宮度分秒皆兩位列之如有一十一宮二十度三十二分四十五秒列位如上式又如日時刻分列位日時分則兩位刻止一位列之如二十一日一十八時三刻零二分列位如下式加減乘除算法以加減乘除為入門然究其終雖至于千變萬化總不出乎此但用法不同耳或應取其相和之數則用加或應取其相較之數則用減或應聚而總其積則用乘或應散而取其分則用除又有先加而後減者或先減而後加者有先乘而後除者或先除而後乘者又有加減與乘除先後互用者古稱九章命算自方田以至勾股數有繁簡理有顯晦法有淺深算有難易然何一不從加減乘除而得故淺言之則算法之入門究言之實算法之全體也加法加者合衆數而成總也蓋數始于一終於九至十又復為一等而上之十百千萬以至億兆京垓皆得名之為一即皆自一而加者也今自一位言之有自一至九之數合前後之位言之有單十百千萬之等先自單數加起成十則進前一位仍為一以單數紀本位下挨次併之即得總數若夫宮度時刻斤兩之類則不以十進必足其所命之分始進一位如宮度足六十分進一度足三十度進一宫如時刻足十五分進一刻足四刻進一時足二十四時進一日如斤兩足十六兩進一斤之類至於定位則以原數列于上加數列于下或大數列於上小數列於下按法依次對位列之加畢所得之數依原列之位定之設如有數一萬二千三百四十五與六千七百八十九相加法以原數橫列於上加數橫列於下按位相對加之如九與五相對單從單八與四相對十從十百千萬數俱各從其類單位之五九相加得十四進十於前位為一志之作一點於前位為志如進二十則作二點如進三十則作三點本位紀四書於橫格下次十位之四八相加得十二併所進之一為十三復進十於前位為一志之本位紀三次百位之三七相加得十併所進之一為十一復進十於前位為一志之本位紀一次千位之二六相加得八併所進之一為九於是本位紀九至於萬位獨有原數無可加則仍紀一所加之數共得一萬九千一百三十四即總數也設如有數一萬四千五百四十五與一萬七千三百五十相加法以原數橫列於上加數橫列於下加數內單位無數故作以存其位仍按位相對加之單位之五對無可加仍紀五次十位之四五相加得九本位紀九次百位之五三相加得八本位紀八次千位之四七相加得十一進十於前位為一志之本位紀一次萬位之一與一相加得二併所進之一為三於是本位紀三所加之數共得三萬一千八百九十五即總數也設如有二十三丈零五寸六分與二丈八尺六寸二分相加法以原數橫列於上加數橫列於下原數內尺位無數故作以存其位仍按位相對加之分位之六二相加得八本位紀八次寸位之五六相加得十一進十於前位為一志之本位紀一次尺位之八對無可加乃併所進之一為九本位紀九次丈位之三二相加得五本位紀五至于十位獨有原數無可加則仍紀二所加之數共得二十五丈九尺一寸八分即總數也設如有糧四萬五千零三十一石與三千零九十石相加法以原數橫列於上加數橫列於下原數內百位無數加數內百位單位俱無數故各作以存其位仍按位相對加之石位之一對無可加仍紀一次十位之三九相加得十二進十於前位為一志之本位紀二次百位與無可加則以所進之一為本位數故下紀一次千位之五三相加得八本位紀八至於萬位獨有原數無可加則仍紀四所加之數共得四萬八千一百二十一石即總數也設如有銀八兩六錢五分四釐與四兩零六分二釐相加法以原數橫列于上加數橫列于下加數內錢位無數故作以存其位仍按位相對加之釐位之四二相加得六本位紀六次分位之五六相加得十一進十於前位為一志之本位紀一次錢位之六對無可加乃併所進之一為七本位紀七次兩位之八四相加得十二進十於前位為一志之本位紀二至于十位無數則紀所進之一為一所加之數共得十二兩七錢一分六釐即總數也設如有田三區一區五百九十二畝三分一區八百五十五畝九分一區七百八十二畝五分相加法以田三區按位橫列相對加之分位之三九五相加得十七進十於前位為一志之本位紀七次畝位之二五二相加得九併所進之一為十進十於前位為一志之本位紀次十位之九五八相加得二十二併所進之一為二十三進二十於前位為二志之本位紀三次百位之五八七相加得二十併所進之二為二十二進二十於前位為二志之本位紀二至于千位無數則紀所進之二為二所加之數共得二千二百三十畝零七分即總數也設如有銀九宗一宗八千八百五十二兩一宗三千二百一十一兩一宗五百二十兩一宗九百三十八兩一宗二千五百九十兩一宗一千二百一十五兩一宗二千五百一十八兩一宗五千三百六十六兩一宗四千三百七十二兩相加法因九宗數繁難加故分為三次三次復併為一次則得共數其八千八百五十二兩三千二百一十一兩五百二十兩相併則得一萬二千五百八十三兩其九百三十八兩二千五百九十兩一千二百一十五兩相併則得四千七百四十三兩其二千五百一十八兩五千三百六十六兩四千三百七十二兩相併則得一萬二千二百五十六兩既得三總數又將三數併之得二萬九千五百八十二兩即九宗共數也設如九宮二十度三十分二十六秒與六宫一十八度二十分五十秒相加法以原數橫列於上加數橫列於下其每項各命兩位仍按各位相對加之秒之單位六對無可加仍紀六秒之十位二五相加得七十乃以六十秒進一分志於分之本位秒之十位紀一次分之單位與無可加則以所進之一為本位數故下紀一次分之十位三二相加得五故下紀五次度之單位八對無可加仍紀八次度之十位二一相加得三十乃以三十度進一宮志於宮之本位度之十位紀次宮之本位九六相加得十五併所進之一為十六因十二宮滿一周天故逢十二去之餘四故下紀四所加之數共得四宫八度五十一分一十六秒即總數也設如一日一十五時二刻八分與一日一十二時三刻九分相加法以原數橫列於上加數橫列於下日時分則合兩位共加刻則仍命以單位蓋以四刻進一小時故也分位之八與九相加得十七十五分進一刻故於刻之本位下志一餘二故單位下紀二十位下紀次刻位之二與三相加得五併所進之一為六四刻進一時故於時之本位下志一餘二故本位紀二次時之單位五二相加得七併所進之一得八時之十位一與一相加得二共為二十八二十四時進一日故於日之本位下志一餘四故時之單位下紀四十位下紀次日之單位一與一相加得二併所進之一為三故下紀三所加之數共得三日四時二刻二分即總數也設如有物重三十四斤十五兩五錢與二十一斤十四兩三錢相加法以原數橫列於上加數橫列於下其錢位斤位與斤之十位仍皆按位相對加之兩位與兩之十位則合其數共加之兩以十六方進一斤故合而加之如列數有兩數無十數者仍作以存十兩之位錢位之五三相加得八本位紀八兩位之原數十五加數十四相加共得二十九則進十六兩於前斤位為一志之其所餘十三兩則於兩位紀三十位紀一次斤位之四一相加得五併所進之一為六本位紀六次十位之三二相加得五本位紀五所加之數共得五十六斤十三兩八錢即總數也減法減者較衆數而得餘也凡以少減多以小減大原有之數書於上應減之數書於下橫列必對其位相減必從其類如千減千百減百之類如或下數大於上數不足減則借前位之一以減本位加法由後而進前減法則借前而退後其理一也詳見設如中前位作一點以志之既得本位則前位所借之一併於前數而為減數然兩數相減必先辨其多寡首位必大於減數始可其定位亦照原列之次為減餘位設如有數五萬六千七百八十九內減四萬三千六百四十二法自單位減起單位之九減二餘七故下紀七十位之八減四餘四故下紀四百位之七減六餘一故下紀一千位之六減三餘三故下紀三萬位之五減四餘一故下紀一所減之數得一萬三千一百四十七即餘數也設如有數二萬三千六百七十二內減一萬六千四百八十一法自單位減起單位之二減一餘一故下紀一十位之七減八為下大於上則借前位之一前位下作一點為志作本位之十共十七減八餘九故下紀九百位之六減四併十位所借之一則為六減五餘一故下紀一千位之三減六為下大於上則借前位之一前位亦作一點為志作本位之十共十三減六餘七故下紀七萬位之二減一併千位所借之一則為二減二恰盡故下紀所減之數得七千一百九十一即餘數也設如有六丈七尺八寸九分一釐內減三丈四尺五寸九分九釐法自釐位減起釐位之一減九為下大於上則借前位之一前位下作一點為志作本位之十共十一減九餘二故下紀二分位之九減九併釐位所借之一則為九減十亦為下大於上故復借前位之一前位下作一點為志作本位之十共十九減十餘九故下紀九寸位之八減五併所借之一則為八減六餘二故下紀二尺位之七減四餘三故下紀三丈位之六減三餘三故下紀三所減之數得三丈三尺二寸九分二釐即餘數也設如有米六十五石四斗三升二合內減四十六石二斗七升三合法自合位減起合位之二減三為下大於上則借前位之一前位下作一點為志作本位之十共十二減三餘九故下紀九升位之三減七併合位所借之一則為三減八為下大於上則借前位之一前位下作一點為志作本位之十共十三減八餘五故下紀五斗位之四減二併升位所借之一則為四減三餘一故下紀一石位之五減六為下大於上則借前位之一前位下作一點為志作本位之十共十五減六餘九故下紀九十位之六減四併所借之一則為六減五餘一故下紀一所減之數得十九石一斗五升九合即餘數也設如有銀十五兩三錢六分七釐內減九兩二錢三分四釐法自釐位減起釐位之七減四餘三故下紀三分位之六減三餘三故下紀三錢位之三減二餘一故下紀一兩位之五減九為下大於上則借前位之一前位下作一點為志作本位之十共十五減九餘六故下紀六十位之一減兩位所借之一恰盡故下紀所減之數得六兩一錢三分三釐即餘數也設如七宮一十八度二十七分五十二秒內減九宮二十一度三十五分四十三秒法自秒位減起秒之單位二減三為下大於上則借前位之一前位下作一點為志作本位之十共十二減三餘九故下紀九秒之十位五減四併所借之一則為五減五恰盡故下紀分之單位七減五餘二故下紀二分之十位二減三為下大於上則借度位之一為六十分度位下作一點為志六十分與原二十分共為八十分內減三十分餘五十分故下紀五度之單位八減一併所借之一則為八減二餘六故下紀六度之十位一減二為下大於上則借宮位之一為三十度宮位下作一點為志三十度與原十度共為四十度內減二十度餘二十度故下紀二宮之單位七減九併所借之一則為七減十為下大於上則外借一周天為十二宮十二宮與原七宮共為十九宮內減十宮餘九宮故下紀九所減之數得九宮二十六度五十二分九秒即餘數也設如一十二日二十二時三刻零九分內減一十一日二十三時三刻十分法自分位減起日位刻位俱各按單位相減其分位時位則合兩位減之分位之九減十為下大于上則借刻位之一為十五分刻之本位下作一點為志十五分與原九分共為二十四分內減十分餘十四分故分之單位紀四分之十位紀一刻之本位三減三併所借之一則為三減四為下大于上則借時位之一為四刻時之單位下作一點為志四刻與原三刻共為七刻內減四刻餘三刻故本位下紀三時位之二十二減二十三併所借之一則為二十二減二十四為下大于上則借日位之一為二十四時日之本位下作一點為志二十四時與原二十二時共為四十六時內減二十四時餘二十二時故時之單位下紀二時之十位下亦紀二日位之二減一併所借之一則為二減二恰盡故下紀日之十位之一減一恰盡故亦紀所減之數得二十二時三刻一十四分即餘數也設如有物十五斤零四兩八錢內減十二斤十二兩三錢法自錢位減起錢位之八減三餘五故下紀五兩位之四減二似非下大于上然原數兩之十位為十六兩為一斤故作於斤後兩前以存十兩之位而減數兩之十位為一則為四兩減十二兩亦為下大于上故借斤位之一為十六兩斤位下作一點為志十六兩與原四兩共為二十兩內減十二兩餘八兩故兩之單位紀八十位紀斤位之五減二併所借之一則為五減三餘二故下紀二十位之一減一恰盡故下紀所減之數得二斤零八兩五錢即餘數也因乘因乘者生數也以數生數有生生不已之義焉凡有幾數彼此按次加之為得總數然所加之次數多則必至於煩而無統此因乘之所以立也因者一位相因而得如二因三而成六四因二而成八也乘者多位相乘而得如兩位以上則各以每位所因之數而又層纍以積之也其法以原數為實乘數為法實列於上法列于下必使法實相當如千對千百對百十對十單對單之類按法乘實合而加之為所得數定位之法視其法實所命之單位後有竒零與否如無竒零則實中所命之單位相對即法尾之數若有竒零則法實相乘者法實之一位統得數之二位如單位後竒零有一位則截得數之二位竒零有二位則截得數之四位向前為單位計之法實相乘再以法乘者即自乘再乘也法實之一位統得數之三位如單位後竒零有一位則截得數之三位竒零有二位則截得數之六位向前為單位計之是故得數以一位論者則為單十百千之類以兩位論者則為自乘之類以三位論者則為自乘再乘之類錯綜交互用法不一必須臨題詳審求其無誤始為得之具見設如於左設如有三人每人賞縀二匹問共得幾匹法以三人為實列於上二匹為法列于下以二因三得六即書於本位下定位以實之三人即是單位而法又止一位為匹今得數之六與實之單位相對故知六是匹位得共數為六匹也設如有八人每人賞米六石問共得幾石法以八人為實列于上六石為法列于下以六因八得四十八將四書於前位下前位為十位故十數紀前位下八書於本位下本位為單位故單數紀本位下定位以實之八人即是單位而法亦止一位為石今得數之八與實之單位相對即知八是石位而四在石之前一位故知四是十位得共數為四十八石也設如有一十二人每人賞銀五兩問共得幾兩法以一十二人為實列於上五兩為法列于下命兩位與人之單位相齊先以五乘二得一十將十進前一位作一點志之紀於本位下此數無單故下紀次以五乘一仍得五併所進之一為六故書六於本位下一雖為十位而以五乘一則一下為本位矣共得六定位因實之單位對法之兩位而得數之與實之單位相對故知為兩位而六為十位得共數為六十兩也設如有二十四人每人賞銀三兩六錢問共得幾兩法以二十四人為實列於上三兩六錢為法列於下命錢位與人之單位相齊乃以法之六遍乘實之二四其所得之單位數即對本法位下書之六乘四得二十四將二十進前一位作二點志之四書於本位下次以六乘二得一十二將十進前一位為一書之二併所進之二為四故書四於本位下二雖為十位而以六乘二則二下即為本位矣法之六既與實乘畢次以法之三遍乘實之二四其所得之單位數即對本法位下書之三乘四得一十二將十進前一位作一點志之二書於本位下次以三乘二得六併所進之一為七故書七於本位下法之三又與實乘畢乃用加法併之共得八六四總書于下定位以實尾之四係四人為單位而法尾為錢今得數末位之四與實之單位相對即知四是錢位二位為兩三位為十兩得共數為八十六兩四錢也設如有田三百六十畝每畝納糧三升五合問共得若干法以三百六十畝為實列于上三升五合為法列於下實之單位無數則補以存其位命合位與畝之單位相齊乃以法之五遍乘實之三六其所得之單位數即對本法位下書之五乘仍為故下紀五乘六得三十將三十進前一位作三點志之本位紀五乘三得一十五將十進前一位為一書之五併所進之三為八故書八於本位下又以法之三遍乘實之三六其所得之單位數即對本法位下書之三乘仍為故下紀三乘六得一十八將十進前一位作一點志之八書於本位下三乘三得九併所進之一為十故進前一位為一書之本位紀乘畢用加法併之共得一二六總書於下定位以實尾之係單位法尾是合今得數末位之與實之單位相對即知末位之是合前一位是升向前數至首位得十石因知共數為一十二石六斗也設如有田三頃五十畝每頃納糧一石二斗三升問共得若干法以三頃五十畝為實列於上因畝位無數故作以存其位一石二斗三升為法列於下命石位與頃之單位相齊題中言每頃納一石故石與頃對為單位乃以法之三遍乘實之三五其所得之單位數即對本法位下書之三乘仍得故下紀次以三乘五得一十五將十進前一位作一點志之五書於本位下次以三乘三得九併所進之一為十故進前一位為一書之本位紀又以法之二遍乘實之三五其所得之單位數即對本法位下書之二乘仍得故下紀二乘五得一十將十進前一位作一點志之本位紀二乘三得六併所進之一為七故書七於本位下又以法之一遍乘實之三五其所得之單位數即對本法位下書之一乘仍得一乘五仍得五一乘三仍得三俱各書於本位下乘畢用加法併之共得四三五總書於下定位因每頃納糧一石二斗三升即命頃為單位而石亦為單位其後二位則為竒零凡法實之竒零有一位則統得數之兩位今竒零既有二位則統得數之四位故從後截去四位而第五位定為石因知共數為四石三斗零五合也設如有金三十六兩每兩價銀九兩九錢八分問共價幾何法以三十六兩為實列於上九兩九錢八分為法列於下實中錢位分位俱無數則補作以存其位命分位與分位相齊乃以法之八遍乘實之三六先以八乘仍得故下紀次以八乘六得四十八將四十進前一位作四點志之八書於本位下次以八乘三得二十四將二十進前一位為二書之四併所進之四為八故書八於本位下又以法之九遍乘實之三六先以九乘仍得故下紀次以九乘六得五十四將五十進前一位作五點志之四書於本位下次以九乘三得二十七將二十進前一位作二點志之七併所進之五為十二十又進前一位為一併所志之二為三故前位書三本位書二又以法之九遍乘實之三六先以九乘仍得故下紀次以九乘六得五十四將五十進前一位作五點志之四書於本位下次以九乘三得二十七將二十進前一位作二點志之七併所進之五為十二十又進前一位為一併所志之二為三故前位書三本位書二乘畢用加法併之共得三五九二八定位因題言每兩價銀九兩九錢八分爰以兩為單位其後二位則為竒零竒零既有二位則統得數之四位故從後截去四位而第五位定為兩第六位為十第七位為百因知共數為三百五十九兩二錢八分也設如有物二十六斤求兩數法以二十六斤為實列於上以每斤十六兩為法列於下乃以法之六遍乘實之二六其所得之單位數即對本法位下書之六乘六得三十六將三十進前一位作三點志之六書于本位下次以六乘二得一十二將十進前一位為一書之二併所進之三為五故書五於本位下又以法之一遍乘實之二六其所得之單位數即對本法位下書之一乘六仍得六故下書六次以一乘二仍得二故下書二乘畢用加法併之得四一六定位因實尾是單位而法尾又是兩位故得數末位之六即為單位為兩而前一位為十又前一位為百因知得數為四百一十六兩也又法斤求兩身加六名為定身加法蓋以十六兩之十為一乘之仍得原數故以本身加六即得如二十六斤則從首位加起二六加一十二將一對實之十位二對實之單位下書之又六六加三十六則三對實之單位而六對實之單位後一位書之用加法相併得四一六定位以原斤數之後一位為兩今得數末位之六在原斤數之後一位即知是兩因知得數為四百一十六兩也設如周天三百六十度每度六十分問共得若干分法以三百六十度為實列于上以六十分為法列于下因單位俱無數故各作以存其位乃以法之遍乘實之三六仍皆得故各紀於各位下又以法之六遍乘實之三六其所得之單位數即對本法位下書之六乘仍得故本位下紀次以六乘六得三十六將三十進前一位作三點志之六書於本位下次以六乘三得一十八將十進前一位作一點志之八併所進之三為十一十又進前一位為一併所志之一為二故前位書二本位書一乘畢用加法併之共得二一六定位以實之末位是單位法之末位是分今求分數故得數末位之即是分之單位向前數至首位得萬因知共數為二萬一千六百分也設如有驗時儀墜子來一秒往一秒今十五分問共得來往幾秒法以十五分為實列於上以每分六十秒為法列於下乃以法之遍乘實之一五仍皆得故各紀於本位下又以法之六遍乘實之一五其所得之單位數即對本法位下書之六乘五得三十將三十進前一位作三點志之本位紀次以六乘一仍得六併所進之三為九故書九於本位下定位以實之末位是單位法之末位是秒今求秒數故得數末位之即是秒之單位其前一位為十又前一位為百因知共數為九百秒也設如一尺二寸自乘求積以本數乘本數故為自乘法以一尺二寸互為法實列于上下乃以法之二遍乘實之一二其所得之單位數即對本法位下書之二乘二得四故下書四次以二乘一仍得二故下書二又以法之一遍乘實之一二其所得之單位數即對本法位下書之一乘二仍得二故下書二次以一乘一仍得一故下書一乘畢用加法併之共得一四四定位因自乘數成平方面其每一尺正方面容積一百寸故百寸為尺百尺為丈俱以兩位命之今實之末位為寸即命為單位法之末位是寸得數末位之四與實之單位相對即知為寸位向前第二位為十寸第三位為百寸既以百寸為尺即知得數為一尺四十四寸也若命尺為單位則于尺上命位其後一位為竒零故于得數內從末截去二位以第三位為尺蓋自乘乃兩數相乘兩數既各有一位零數故截去兩位算也今得數有三位即知首位為一尺首位既為尺末位又既為寸則中一位為十寸可知矣設如一尺二寸自乘再乘求積以本數乘本數所得之數又以本數乘之故謂之自乘再乘法先以一尺二寸互為法實按法自乘得一尺四十四寸又以一尺四十四寸為實復以一尺二寸為法按法乘之共得一七二八定位因自乘再乘數成立方體其每一尺正方體容積一千寸故以千寸為尺千尺為丈俱以三位命之今實之末位為寸即命為單位法之末位是寸得數末位之八與實之單位相對即知為寸位向前第二位為十寸第三位為百寸第四位為千寸既以千寸為一尺即知得數為一尺七百二十八寸也若命尺為單位則於尺上命位其後一位為竒零故于得數內從末截去三位以第四位為尺蓋自乘再乘乃以三數相乘三數既各有一位零數故截去三位算也今得數有四位即知首位為一尺首位既為尺末位又既為寸則中二位為十寸百寸可知矣歸除歸除者分數也以數分數有各得均齊之義焉凡有兩數以此數減彼數減得幾次即為所得然所減之次數多則益至於紛而難紀此歸除之所以立也歸者一位歸之而得如歸作幾分而均分之也除者多位除之而得蓋以所得之數與法相因而於實內除去也其法以原數為實橫列於下除數為法橫列於上法之小於實者法之首位與實之首位列齊法之大於實者則法比實退一位看實足法幾倍即為得數自法之末位上紀所得之數既得數乃以所得與法相因書於實下與實相減餘者即為次商實依次按法歸除以恰盡為度減餘者乃所得與法相因之數在實中所減者其數每與法位相對即初商之餘實也至於實位所餘之數則每次取下一位續於減餘之末以為每商之實若實無餘位而歸除仍未盡者則按位添以紀之如實不足法之一倍者則得數為定位之法以法中所命單位與原實相對之數為所得之首位數若實之位數少於法者則作幾位以補足法然後位數一覽即明至於一位歸除捷法則竟以原數書於上就身用幾分分之得數書於下其定位仍照原列之位定之具見設如於左設如有緞六匹令三人分之問每人得幾匹法以六匹為實列於下三人為法列於上今法與實俱為單位而法比實小故列法與實相齊爰看實足法幾倍今足二倍故書二於法上乃以得數之二與法之三相因得六書於實下與實相減恰盡即得數為二匹也定位因法之三人即為單位而實亦止一位為匹是法之單位與實之匹位相對故得數為二匹也設如有米六十四石令八人分之問每人得幾石法以六十四石為實列於下八人為法列于上因法之八大於實之首位之六故將法退一位書之爰看實足法幾倍今足八倍故書八於法上乃以得數之八與法之八相因得六十四書於實下其所得單位數即對得數之本位下書之與實相減恰盡即得數為八石也定位因法之八人即為單位而與實之石位相對故得數為八石也設如有銀三百四十三兩令七人分之問每人得幾兩法以三百四十三兩為實列於下七人為法列於上因法之七大於實之首位之三故將法退一位書之爰看實足法幾倍今實前兩位為三四足法之四倍何以知其足法之四倍蓋實之三十四內足法之七之四倍為二十八如法之七之五倍則為三十五比實則大矣故書四於法上乃以得數之四與法之七相因得二十八書於實下其所得單位數即對得數之本位下書之後倣此與實相減餘六次取實數所餘之三書於減餘之後共六三為次商實爰看實之六三足法幾倍今足九倍故書九於得數之次乃以得數之九與法之七相因得六十三書於次商實之下與實相減恰盡即得數為四十九兩也定位因法之七人即為單位而與實中之兩之十位相對故得數首位即為十而次位為兩是知每人得四十九兩也設如有絲四十五斤共織得緞九十二丈二尺五寸問每斤織得若干法以九十二丈二尺五寸為實列於下四十五斤為法列於上因法之首位四小於實之首位九故列法與實相齊爰看實之九二足法之二倍故書二於法上乃以得數之二與法之四五相因得九書於實下與實相減餘二次取實數所餘之二書於減餘之後共二二為次商實今實之二二不足法之四五之一分故得數為乃紀於上復取實數所餘之五書於二二之後共二二五為三商實次商實之二二不足法之四五故再取實之一位續書於下謂之三商實者位為次商故也爰看實之二二五足法之五倍故書五於上乃以得數之五與法之四五相因得二二五書於實下與實相減恰盡即得數為二丈零五寸也定位因法之五斤為單位而與實之丈位相對故得數首位即為丈等而下之為尺為寸是知每斤織得二丈零五寸也設如有田四十五畝六分共納榖五十七石問每畝納榖若干法以五十七石為實列於下四十五畝六分為法列於上因法之首位四小於實之首位五故列法與實相齊又因實之位數少於法故補作以足其位爰看實之五七足法之一倍故書一於法上乃以得數之一與法之四五六相因仍得四五六書於實下與實相減餘一一四此後實無餘位故添書一於減餘之末為次商實爰看一一四足法之二倍故書二於上乃以得數之二與法之四五六相因得九一二書於實下與實相減餘二二八又添書一於減餘之末為三商實爰看二二八足法之五倍故書五於上乃以得數之五與法之四五六相因得二二八書於實下與實相減恰盡即得數為一石二斗五升也定位因法之五畝為單位而與實之石位相對故得數首位為石是知每畝納榖一石二斗五升也設如有丹砂一兩價值錢二萬五千文問每錢一文該得丹砂幾何法以丹砂一兩為實列於下錢二萬五千為法列於上因法之首位二大於實之首位一故將法退一位列之又因法之百位十位單位俱無數故各作以存其位而實亦作五位以補足法爰看實足法之四倍故書四於法上乃以得數之四與法之二五相因得一書於實下與實相減恰盡即得數為四絲也定位因法之末位係單位故從實之首位一兩數至法之單位相對之位為絲是知每錢一文得丹砂四絲也設如有銀一千二百五十兩買果賞人每果一枚價二釐五豪問買果若干法以一千二百五十兩補五位為實列於下因法之末位是豪故補五位與法相對蓋命實為一千二百五十萬豪也二釐五豪為法列於上爰看實之一二五足法之五倍故書五於法上乃以得數之五與法之二五相因得一二五書於實下與實相減恰盡然實後尚有五位故得數後亦添五位為五十萬也定位因法實俱至豪位止即命豪為單位爰從實之末位數至法之單位相對之位為十萬是知得果為五十萬枚也設如有物重三百八十四兩問得斤數若干法以三百八十四兩為實列於下每斤一十六兩為法列於上爰看實之三八足法之二倍故書二於法上乃以得數之二與法之一六相因得三十二書於實下與實相減餘六次取實數之四書於減餘之後共為六四因足法之四倍故書四於上乃以得數之四與法之一六相因得六十四書於實下與實相減恰盡即得數為二十四斤也定位因法之兩數為單位而與實之十位相對故知得數為二十四斤也又法名為斤稱流法其法曰一退六二五如一萬兩則為六百二十五斤一千兩則為六十二斤半一百兩則為六斤二分半皆以十遞析退者退一位命之也二一二五如二萬兩則為一千二百五十斤二千兩則為一百二十五斤二百兩則為十二斤半不言退者對位命之也餘倣此三一八七五四二五五三一二五六三七五七四三七五八五九五六二五如三百八十四兩則列於上先以三之一八七五通之爰將一對三之本位以下依次向後書之次以八之五通之將五對八之本位書之次以四之二五通之將二對四之本位書之五則列於次位三數書畢乃以加法併之得數為二十四斤定位因兩之前一位為斤今得數之四在兩之前一位故四即為斤位而又前一位則為十位是知得數為二十四斤也設如周天三百六十度分十二宮問每宮得若干度法以三百六十度為實列於下一十二宮為法列於上爰看實之三六足法之三倍故書三於法上乃以得數之三與法之一二相因得三六書於實下與實相減恰盡然實後尚有位故得數後亦添一位即得數為三十度也定位因法之二為單位而與實之十位相對故得數首位為十而每宮為三十度也設如一日之中得一千四百四十分以九十六刻分之問每刻得若干分法以一千四百四十分為實列於下以九十六刻為法列於上爰看實之一四四僅足法之一倍故書一於法上乃以得數之一與法之九六相因仍得九六書於實下與實相減餘四八次取實之位書於減餘之後共為四八因足法之五倍故書五於上乃以得數之五與法之九六相因得四八書於實下與實相減恰盡即得數為一十五分也定位因法之六為單位而與實之十位相對故得數首位為十而每刻為一十五分也一位歸除捷法設如有銀三十四萬五千六百七十八兩作二分分之問每分若干法以三十四萬五千六百七十八兩為實列於上視首位之三足二分之幾何今足一倍故下書一一二除二餘一乃移於下位為十下位作點為志併下位之四共為十四足二分之七倍故下書七二七除一十四恰盡次五足二分之二倍故下書二二二除四餘一移於下位為十併下位之六共為十六足二分之八倍故下書八二八除一十六恰盡次七足二分之三倍故下書三二三除六餘一移於下位為十併下位之八共為十八足二分之九倍故下書九二九除一十八恰盡定位因得數仍原數之位故知每分得一十七萬二千八百三十九兩也設如有銀一十二萬三千四百五十三兩作九分分之問每分若干法以一十二萬三千四百五十三兩為實列於上因首位之一小於九分故移於下位為十併下位之二共為十二足九分之一倍故下書一一九除九餘三移於下位為三十併下位之三共為三十三足九分之三倍故下書三三九除二十七餘六移於下位為六十併下位之四共為六十四足九分之七倍故下書七七九除六十三餘一移於下位為十併下位之五共為十五足九分之一倍故下書一一九除九餘六移於下位為六十併下位之三共為六十三足九分之七倍故下書七七九除六十三恰盡定位因得數比原數退一位故知每分得一萬三千七百一十七兩也御製數理精藴下編卷一
